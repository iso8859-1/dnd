regelglossar:
- name: Abenteuer
  beschreibung: Es folgen Definitionen verschiedener Regeln. Ein Abenteuer ist eine Serie von Begegnungen. Siehe auch Aus
    den beim Durchspielen erlebten Geschehnissen entwickelt sich eine Geschichte.
  Regelbuch: SRD 5.2.1
- name: Abrunden
  beschreibung: „Begegnung“. Wenn eine Zahl im Spiel multipliziert oder geteilt wird, rundest du das Ergebnis gegebenenfalls
    ab. Selbst bei Dezimalstellen größer als fünf wird abgerundet. Manche Regeln machen eine Ausnahme
  Regelbuch: SRD 5.2.1
- name: Aktion
  beschreibung: 'und besagen, dass du aufrunden sollst. In deinem Zug kannst du eine Aktion ausführen. Wähle aus, ob du eine
    der Aktionen unten Siehe auch oder eine der besonderen Aktionen ausführst, die deine Merkmale dir gewähren. „Die Spielregeln“
    („Aktionen“). Diese Aktionen AngriffMagie wirkenSuchen sind anderswo in diesem Glossar definiert: AusweichenRückzugVerstecken
    BeeinflussenSpurtVerwenden HelfenStudierenVorbereiten'
  Regelbuch: SRD 5.2.1
- name: Anfälligkeit
  beschreibung: Wenn du anfällig für eine Schadensart bist, ist der Schaden dieser Art gegen dich verdoppelt. Siehe auch Die
    Anfälligkeit wird pro Instanz des Schadens nur einmal angewendet. „Die Spielregeln“
  Regelbuch: SRD 5.2.1
- name: Angriff (Aktion)
  beschreibung: '(„Schaden und Heilung“). Wenn du die Angriffsaktion ausführst, kannst du einen Angriffswurf mit einer Waffe
    oder einem Waffen an- und ablegen: waffenlosen Angriff ausführen. Wenn du einen Angriff ausführst, kannst du als Teil
    dieser Aktion eine Waffe an- oder ablegen. Tu dies entweder vor oder nach dem Angriff. Wenn du eine Waffe vor dem Angriff
    anlegst, musst du sie bei diesem Angriff nicht zwangsläufig verwenden. Zum Anlegen einer Waffe gehört es, sie aus einer
    Scheide zu ziehen oder sie aufzuheben. Zum Ablegen einer Waffe gehört es, sie in eine Scheide zu stecken, sie zu verstauen
    oder Bewegung zwischen Angriffen: fallenzulassen. Wenn du dich in deinem Zug bewegst und ein Merkmal wie Zusätzlicher
    Angriff hast, das dir mehr als einen Angriff als Teil der Angriffsaktion gewährt, kannst du die Bewegung teilweise oder
    ganz nutzen, um dich zwischen deinen Angriffen zu bewegen.'
  Regelbuch: SRD 5.2.1
- name: Angriffswurf
  beschreibung: Ein Angriffswurf ist eine W20-Prüfung, die einen Siehe auch Angriff mit einer Waffe, einen waffenlosen Angriff
    oder einen Zauberangriff repräsentiert.
  Regelbuch: SRD 5.2.1
- name: Attributswert und -modifikator
  beschreibung: '„Die Spielregeln“ („W20-Prüfungen“). Eine Kreatur hat sechs Attributswerte mit entspre- chenden Modifikatoren:
    Stärke, Geschick lichkeit, Konstitution, Intelligenz, Weisheit und Charisma. Füge den Modifikator hinzu, wenn du eine
    W20-Prüfung mit dem jeweiligen Attribut ausführst oder von Siehe auch einer Regel aufgefordert wirst, ihn hinzuzufügen.'
  Regelbuch: SRD 5.2.1
- name: Attributswurf
  beschreibung: „Die Spielregeln“ („Die sechs Attribute“). Ein Attributswurf ist eine W20-Prüfung, die den Einsatz von einem
    der sechs Attribute (oder einer bestimmten Fertigkeit, die mit einem Attribut Siehe auch assoziiert ist) repräsentiert,
    um eine Herausforde- rung zu überwinden. „Die Spielregeln“
  Regelbuch: SRD 5.2.1
- name: Ausströmung (Wirkungsbereich)
  beschreibung: („W20-Prüfungen“ und „Übung“). Eine Ausströmung ist ein Wirkungsbereich, der von einer Kreatur oder einem
    Gegenstand in geraden Linien in alle Richtungen ausgeht. Der Effekt, der die Ausströmung erzeugt, definiert deren Wirkungsdistanz.
    Eine Ausströmung bewegt sich mit ihrem Ursprung (Kreatur oder Gegenstand), sofern sie kein unmittelbarer oder ortsfester
    Effekt ist. Der Ursprung ist nicht im Wirkungsbereich
  Regelbuch: SRD 5.2.1
- name: Ausweichen (Aktion)
  beschreibung: 'enthalten, es sei denn, der Wirker beschließt dies. Die Ausweichaktion bietet dir die folgenden Vorzüge:
    Bis zum Beginn deines nächsten Zugs ist jeder Angriffswurf gegen dich im Nachteil, sofern du den Angreifer sehen kannst,
    und du bist bei Geschicklichkeitsrettungswürfen im Vorteil. Du verlierst diese Vorzüge, wenn du kampfunfähig'
  Regelbuch: SRD 5.2.1
- name: Beeinflussen (Aktion)
  beschreibung: 'bist oder deine Bewegungsrate 0 beträgt. Mit der Beeinflussen-Aktion kannst du ein Monster zu etwas drängen.
    Beschreibe oder stelle rollenspie- lerisch dar, wie du mit dem Monster kommunizierst. Versuchst du, es zu täuschen, einzuschüchtern,
    zu amüsieren oder zu überreden? Der SL bestimmt dann, ob das Monster bereitwillig, nicht bereitwillig oder zögerlich auf
    deine Interaktion reagiert. Daraus ergibt sich, ob ein Attributswurf erforderlich ist, Bereitwillig: wie unten erläutert.
    Wenn deine Beeinflussung mit den Interessen des Monsters übereinstimmt, ist kein Attributswurf erforderlich: Das Monster
    kommt deinen Wünschen auf seine Art nach.'
