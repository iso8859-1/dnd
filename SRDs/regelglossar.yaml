    wie weit du dich noch bewegen kannst. Ist das Ergebnis 0 oder negativ, so kannst du dich im aktuellen Zug nicht mehr bewegen.
    Beispiel: Falls du über eine Bewegungsrate von neun Metern und eine Flugbewegungsrate von zwölf Metern verfügst, könntest
    du drei Meter weit fliegen, drei Meter weit gehen und dich dann wieder in die Luft erheben, um sechs Meter weit Änderungen
    deiner Bewegungsraten: zu fliegen. Wenn ein Effekt deine Bewegungsrate vorübergehend erhöht oder verringert, werden besondere
    Bewegungsraten für die gleiche Dauer um den gleichen Betrag erhöht oder verringert. Beispiel: Wenn deine Bewegungs- rate
    auf 0 verringert ist und du eine Kletterbewe- gungsrate hast, wird diese ebenfalls auf 0 verringert. Wenn deine Bewegungsrate
    halbiert wird und du über eine Flugbewegungsrate verfügst, wird diese'
