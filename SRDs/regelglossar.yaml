- name: Bewegungsrate
  beschreibung: 'dich sind im Vorteil. Eine Kreatur hat eine Bewegungsrate. Diese ist die Strecke in Metern, die die Kreatur
    höchstens Siehe auch zurücklegen kann, wenn sie sich in ihrem Zug bewegt. „Fliegen“, „Klettern“, „Kriechen“, „Schwimmen“,
    „Springen“ und „Die Spielregeln“ Besondere Bewegungsraten: („Kampf“). Manche Kreaturen haben besondere Bewegungsraten
    wie eine Flug-, Grab-, Kletter- oder Schwimmbewegungsrate, wie jeweils in diesem Glossar definiert. Wenn du mehrere Bewegungsraten
