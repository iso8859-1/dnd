- name: Weitsprung
  beschreibung: Bei einem Weitsprung springst du bis zu einer Anzahl von Metern, die einem Drittel deines Stärkewerts entspricht,
    sofern du unmittelbar vor dem Sprung mindestens drei Meter zurückgelegt hast. Bei einem Weitsprung aus dem Stand kannst
    du nur halb so weit springen. In beiden Fällen kostet dich jeder gesprungene Meter einen Meter deiner Bewegungsrate. Wenn
    du in schwierigem Gelände landest, musst du einen SG-10-Geschicklichkeitswurf (Akrobatik) bestehen, um auf den Füßen zu
    landen. Bei einem Misserfolg hast du den Zustand Liegend. Diese Weitsprung-Regel geht davon aus, dass die Höhe des Sprungs
    keine Rolle spielt (wie bei einem Sprung über einen Fluss oder eine Felsspalte). Der SL kann einen erfolgreichen SG-10-Stärkewurf
    (Athletik) von dir verlangen, wenn du ein niedriges Hindernis wie eine Hecke oder eine niedrige Mauer (nicht höher als
    ein Viertel deiner Sprungdistanz) überwinden willst. Misslingt der Wurf, so kollidierst
  Regelbuch: SRD 5.2.1
- name: Wertekasten
  beschreibung: 'du mit dem Hindernis. Ein Wertekasten enthält die Spielwerte eines Monsters. Jeder Wertekasten enthält nach
    dem Größe: Namen des Monsters folgende Informationen: Die möglichen Größenkategorien lauten Siehe auch Winzig, Klein,
    Mittelgroß, Groß, Riesig und Kreaturentyp: Gigantisch. „Größe“. In diesem Eintrag ist die Kreaturen- Siehe auch familie
    des Monsters angegeben, gegebenenfalls mit beschreibenden Bezeichnungen. Gesinnung: „Kreaturentyp“. Die Gesinnung ist
    ein Vorschlag für Siehe auch das Monster. Der SL bestimmt seine tatsächliche RK, Initiative und TP: Gesinnung. „Gesinnung“.
    Diese Einträge nennen Rüstungsklasse, Initiative und Trefferpunkte des Monsters, jeweils unter „Die Spielregeln“ beschrieben.
    Hinter den Trefferpunkten sind die Trefferpunktewürfel des Monsters in Klammern angegeben, außerdem gegebenenfalls der
    Beitrag seiner Konstitution zu seinen Trefferpunkten. Nach dem Initiativemodifikator ist ein Initiativewert genannt. Manche
    Kreaturen, die auf magische Art erzeugt wurden, haben weder Trefferwürfel- noch Bewegungsrate: Initiativeinformationen.
    Hier sind Bewegungsrate Siehe auch und vorhandene besondere Bewegungsraten des Monsters aufgeführt. „Flugbewegungsrate“,
    „Grabbewegungsrate“, „Kletterbewegungsrate“ Attributswerte: und „Schwimmbewegungsrate“. Die Attributswerte, Modifikatoren
