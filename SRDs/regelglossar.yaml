- name: Zylinder (Wirkungsbereich)
  beschreibung: Regel ist der Zustand Erschöpft. Ein Zylinder ist ein Wirkungsbereich, der in geraden Linien von einem Ursprungspunkt
    in der Mitte einer der kreisförmigen Stirnseiten des Zylinders ausgeht. Der Effekt, der den Zylinder erzeugt, definiert
