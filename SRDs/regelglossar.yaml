regelglossar:
- name: Abenteuer
  beschreibung: 'Ein Abenteuer ist eine Serie von Begegnungen.

    Siehe auch Aus den beim Durchspielen erlebten Geschehnissen entwickelt sich eine Geschichte.

    „Begegnung“.'
  rule book: SRD 5.2.1
- name: Abrunden
  beschreibung: 'Wenn eine Zahl im Spiel multipliziert oder geteilt wird, rundest du das Ergebnis gegebenenfalls ab.

    Selbst bei Dezimalstellen größer als fünf wird abgerundet. Manche Regeln machen eine Ausnahme und besagen, dass du aufrunden
    sollst.'
  rule book: SRD 5.2.1
- name: Aktion
  beschreibung: 'In deinem Zug kannst du eine Aktion ausführen.

    Wähle aus, ob du eine der Aktionen unten

    Siehe auch oder eine der besonderen Aktionen ausführst, die deine Merkmale dir gewähren.

    „Die Spielregeln“ („Aktionen“). Diese Aktionen

    Angriff Magie wirken Suchen sind anderswo in diesem Glossar definiert:

    Ausweichen Rückzug Verstecken

    Beeinflussen Spurt Verwenden

    Helfen Studieren Vorbereiten'
  rule book: SRD 5.2.1
- name: Anfälligkeit
  beschreibung: 'Wenn du anfällig für eine Schadensart bist, ist der Schaden dieser Art gegen dich verdoppelt.

    Siehe auch Die Anfälligkeit wird pro Instanz des Schadens nur einmal angewendet. „Die Spielregeln“ („Schaden und Heilung“).'
  rule book: SRD 5.2.1
- name: Angriff (Aktion)
  beschreibung: 'Wenn du die Angriffsaktion ausführst, kannst du einen Angriffswurf mit einer Waffe oder einem

    Waffen an- und ablegen:

    waffenlosen Angriff ausführen.

    Wenn du einen Angriff ausführst, kannst du als Teil dieser Aktion eine

    Waffe an- oder ablegen. Tu dies entweder vor oder nach dem Angriff. Wenn du eine Waffe vor dem

    Angriff anlegst, musst du sie bei diesem Angriff nicht zwangsläufig verwenden. Zum Anlegen einer

    Waffe gehört es, sie aus einer Scheide zu ziehen oder sie aufzuheben. Zum Ablegen einer Waffe gehört es, sie in eine Scheide
    zu stecken, sie zu verstauen oder

    Bewegung zwischen Angriffen:

    fallenzulassen.

    Wenn du dich in deinem Zug bewegst und ein Merkmal wie

    Zusätzlicher Angriff hast, das dir mehr als einen

    Angriff als Teil der Angriffsaktion gewährt, kannst du die Bewegung teilweise oder ganz nutzen, um dich zwischen deinen
    Angriffen zu bewegen.'
  rule book: SRD 5.2.1
- name: Angriffswurf
  beschreibung: 'Ein Angriffswurf ist eine W20-Prüfung, die einen

    Siehe auch Angriff mit einer Waffe, einen waffenlosen Angriff oder einen Zauberangriff repräsentiert.

    „Die Spielregeln“ („W20-Prüfungen“).'
  rule book: SRD 5.2.1
- name: Attributswert und -modifikator
  beschreibung: 'Eine Kreatur hat sechs Attributswerte mit entspre- chenden Modifikatoren: Stärke, Geschick lichkeit,

    Konstitution, Intelligenz, Weisheit und Charisma. Füge den Modifikator hinzu, wenn du eine W20-Prüfung mit dem jeweiligen
    Attribut ausführst oder von

    Siehe auch einer Regel aufgefordert wirst, ihn hinzuzufügen.

    „Die Spielregeln“ („Die sechs Attribute“).'
  rule book: SRD 5.2.1
- name: Attributswurf
  beschreibung: 'Ein Attributswurf ist eine W20-Prüfung, die den

    Einsatz von einem der sechs Attribute (oder einer bestimmten Fertigkeit, die mit einem Attribut

    Siehe auch assoziiert ist) repräsentiert, um eine Herausforde- rung zu überwinden. „Die Spielregeln“ („W20-Prüfungen“
    und „Übung“).'
  rule book: SRD 5.2.1
- name: Ausströmung (Wirkungsbereich)
  beschreibung: 'Eine Ausströmung ist ein Wirkungsbereich, der von einer Kreatur oder einem Gegenstand in geraden

    Linien in alle Richtungen ausgeht. Der Effekt, der die Ausströmung erzeugt, definiert deren

    Wirkungsdistanz.

    Eine Ausströmung bewegt sich mit ihrem

    Ursprung (Kreatur oder Gegenstand), sofern sie kein unmittelbarer oder ortsfester Effekt ist.

    Der Ursprung ist nicht im Wirkungsbereich enthalten, es sei denn, der Wirker beschließt dies.'
  rule book: SRD 5.2.1
- name: Ausweichen (Aktion)
  beschreibung: 'Die Ausweichaktion bietet dir die folgenden Vorzüge:

    Bis zum Beginn deines nächsten Zugs ist jeder

    Angriffswurf gegen dich im Nachteil, sofern du den Angreifer sehen kannst, und du bist bei

    Geschicklichkeitsrettungswürfen im Vorteil.

    Du verlierst diese Vorzüge, wenn du kampfunfähig bist oder deine Bewegungsrate 0 beträgt.'
  rule book: SRD 5.2.1
- name: Beeinflussen (Aktion)
  beschreibung: 'Mit der Beeinflussen-Aktion kannst du ein Monster zu etwas drängen. Beschreibe oder stelle rollenspie- lerisch
    dar, wie du mit dem Monster kommunizierst.

    Versuchst du, es zu täuschen, einzuschüchtern, zu amüsieren oder zu überreden? Der SL bestimmt dann, ob das Monster bereitwillig,
    nicht bereitwillig oder zögerlich auf deine Interaktion reagiert. Daraus ergibt sich, ob ein Attributswurf erforderlich
    ist,

    Bereitwillig:

    wie unten erläutert.

    Wenn deine Beeinflussung mit den

    Interessen des Monsters übereinstimmt, ist kein

    Attributswurf erforderlich: Das Monster kommt deinen Wünschen auf seine Art nach.

    Nicht bereitwillig:

    Wenn deine Beeinflussung mit den Interessen oder der Gesinnung des Monsters in

    Konflikt steht, ist kein Attributswurf erforderlich:

    Zögerlich:

    Das Monster kommt deinen Wünschen nicht nach.

    Wenn du das Monster zu etwas bewegen willst, was es nicht unbedingt tun will, musst du einen Attributswurf ausführen,
    der von der Haltung des Monsters betroffen ist:

    Gleichgültig, freundlich gesinnt oder feindlich gesinnt, wie jeweils in diesem Glossar definiert.

    In der Tabelle „Attributswürfe zum Beeinflussen“ findest du Vorschläge, welcher Attributswurf je nach deiner Interaktion
    mit dem Monster auszuführen ist. Der SL wählt den Attributswurf aus. Dieser hat einen Standard-SG in Höhe von 15 oder
    dem Intelligenzwert des Monsters, je nachdem, welcher Wert höher ist. Bei einem Erfolg tut das

    Monster, was du willst. Misslingt der Wurf, so musst du 24 Stunden (oder eine Dauer nach Vorgabe des

    SL) abwarten, ehe du erneut versuchen kannst,

    Attributswürfe es auf diese Art zu zum beeinflussen. Beeinflussen

    Attributswurf Interaktion

    Charismawurf Ein Monster amüsieren (Auftreten)

    Charismawurf Ein Monster einschüchtern (Einschüchtern)

    Charismawurf Ein Monster täuschen, (Täuschen) das dich versteht

    Charismawurf Ein Monster überzeugen, (Überzeugen) das dich versteht

    Weisheitswurf Ein Tier oder eine Monstrosität (Mit Tieren umgehen) sanft überreden'
  rule book: SRD 5.2.1
- name: Begegnung
  beschreibung: 'Eine Begegnung ist eine Szene in einem Abenteuer, die Teil von mindestens einer der drei Säulen des

    Siehe auch Spiels ist: soziale Interaktion, Erkundung oder

    Kampf. „Die Spielregeln“ („Soziale

    Interaktion“, „Erkundung“ und „Kampf“).'
  rule book: SRD 5.2.1
- name: Besessenheit
  beschreibung: 'Manche Effekte bewirken, dass eine Kreatur von einem anderen Wesen besessen ist. Der Effekt der

    Inbesitznahme definiert, wie die Besessenheit

    Schutz vor Gut und Böse funktioniert. Besessenheit kann durch den Zauber

    Gutes und Böses bannen verhindert und durch den

    Zauber beendet werden.'
  rule book: SRD 5.2.1
- name: Besetzter Bereich
  beschreibung: Ein Bereich ist besetzt, wenn sich eine Kreatur darin befindet oder er vollständig mit Gegenständen angefüllt
    ist.
  rule book: SRD 5.2.1
- name: Betäubt (Zustand)
  beschreibung: 'Wenn du den Zustand Betäubt hast, wirken

    Kampfunfähig:

    folgende Effekte auf dich:

    Du hast den Zustand

    Beeinträchtigte Rettungswürfe:

    Kampfunfähig.

    Du scheiterst bei Stärke- und Geschicklichkeitsrettungswürfen

    Beeinträchtigte Angriffe:

    automatisch.

    Angriffswürfe gegen dich sind im Vorteil.'
  rule book: SRD 5.2.1
- name: Bewegungsrate
  beschreibung: 'Eine Kreatur hat eine Bewegungsrate. Diese ist die Strecke in Metern, die die Kreatur höchstens

    Siehe auch zurücklegen kann, wenn sie sich in ihrem Zug bewegt. „Fliegen“, „Klettern“, „Kriechen“, „Schwimmen“, „Springen“
    und „Die Spielregeln“

    Besondere Bewegungsraten:

    („Kampf“).

    Manche Kreaturen haben besondere Bewegungsraten wie eine Flug-,

    Grab-, Kletter- oder Schwimmbewegungsrate, wie jeweils in diesem Glossar definiert. Wenn du mehrere Bewegungsraten hast,
    wähle eine aus, wenn du dich bewegst. Du kannst in deinem Zug zwischen deinen Bewegungsraten wechseln. Ziehe bei jedem
    Wechsel die Entfernung, die du bereits zurückgelegt hast, von der neuen Bewegungsrate ab. Das Ergebnis bestimmt, wie weit
    du dich noch bewegen kannst. Ist das Ergebnis 0 oder negativ, so kannst du dich im aktuellen Zug nicht mehr bewegen. Beispiel:
    Falls du über eine Bewegungsrate von neun Metern und eine Flugbewegungsrate von zwölf Metern verfügst, könntest du drei
    Meter weit fliegen, drei Meter weit gehen und dich dann wieder in die Luft erheben, um sechs Meter weit

    Änderungen deiner Bewegungsraten:

    zu fliegen.

    Wenn ein

    Effekt deine Bewegungsrate vorübergehend erhöht oder verringert, werden besondere Bewegungsraten für die gleiche Dauer
    um den gleichen Betrag erhöht oder verringert. Beispiel: Wenn deine Bewegungs- rate auf 0 verringert ist und du eine Kletterbewe-
    gungsrate hast, wird diese ebenfalls auf 0 verringert.

    Wenn deine Bewegungsrate halbiert wird und du über eine Flugbewegungsrate verfügst, wird diese ebenfalls halbiert.'
  rule book: SRD 5.2.1
- name: Bewusstlos (Zustand)
  beschreibung: 'Wenn du den Zustand Bewusstlos hast, wirken

    Inert:

    folgende Effekte auf dich:

    Du hast die Zustände Kampfunfähig und

    Liegend, und du lässt fallen, was immer du gehalten hast. Wenn dieser Zustand endet, bist du weiterhin liegend.

    Keine Bewegungsrate:

    Deine Bewegungsrate

    Beeinträchtigte Angriffe:

    beträgt 0 und kann nicht erhöht werden.

    Angriffswürfe gegen

    Beeinträchtigte Rettungswürfe:

    dich sind im Vorteil.

    Du scheiterst bei Stärke- und Geschicklichkeitsrettungswürfen

    Automatische kritische Treffer:

    automatisch.

    Jeder Angriffs- wurf, der dich trifft, ist ein kritischer Treffer, sofern der Angreifer sich im Abstand von bis zu 1,5
    Metern

    Ohne Bewusstsein:

    von dir befindet.

    Du nimmst deine Umgebung nicht wahr.'
  rule book: SRD 5.2.1
- name: Bezaubert (Zustand)
  beschreibung: 'Wenn du den Zustand Bezaubert hast, wirken

    Kein Schaden am Zauberwirker:

    folgende Effekte auf dich:

    Du kannst den Zauberwirker weder angreifen noch als Ziel schädigender Fähigkeiten und magischer Effekte

    Sozialer Vorteil:

    auswählen.

    Der Zauberwirker ist bei

    Attributswürfen, die soziale Interaktionen mit dir betreffen, im Vorteil.'
  rule book: SRD 5.2.1
- name: Blind (Zustand)
  beschreibung: 'Wenn du den Zustand Blind hast, wirken folgende

    Nicht sehfähig:

    Effekte auf dich:

    Eine blinde Kreatur kann nicht sehen, und jeder Attributswurf, der Sicht erfordert,

    Beeinträchtigte Angriffe:

    misslingt automatisch.

    Angriffswürfe gegen dich sind im Vorteil, und deine Angriffswürfe sind im Nachteil.'
  rule book: SRD 5.2.1
- name: Blindsicht
  beschreibung: 'Blindsicht erlaubt dir, auf eine bestimmte Reichweite zu sehen, ohne physische Sicht zu benötigen.

    Auf diese Reichweite kannst du auch bei Dunkelheit oder im Zustand Blind alles sehen, was sich nicht in vollständiger
    Deckung befindet. Du kannst sogar

    Kreaturen und Gegenstände mit dem Zustand

    Unsichtbar sehen.'
  rule book: SRD 5.2.1
- name: Blutig
  beschreibung: Eine Kreatur ist blutig, solange sie höchstens die Hälfte ihrer Trefferpunkte hat.
  rule book: SRD 5.2.1
- name: Bonusaktion
  beschreibung: 'Eine Bonusaktion ist eine besondere Aktion, die du im selben Zug ausführen kannst, in dem du auch eine Aktion
    ausführst. Du kannst höchstens eine Bonusaktion pro Zug ausführen, und dies nur

    Siehe auch dann, wenn eine Regel es ausdrücklich besagt.

    „Die Spielregeln“ („Aktionen“).'
  rule book: SRD 5.2.1
- name: Brand (Gefahr)
  beschreibung: 'Brennende Kreaturen und Gegenstände erleiden zu Beginn jedes ihrer Züge 1W4 Feuerschaden.

    Du kannst dich als Aktion selbst löschen, indem du dir den Zustand Liegend gibst und dich auf dem Boden rollst. Das Feuer
    erlischt auch, wenn es erstickt oder durch Wasser gelöscht wird.'
  rule book: SRD 5.2.1
- name: Charakterbogen
  beschreibung: 'Ein Charakterbogen ist ein Blatt Papier oder

    Siehe auch ein digitales Dokument, mit dem du die Daten deines Charakters nachverfolgst.

    „Charaktererstellung“.'
  rule book: SRD 5.2.1
- name: Dämmriges Licht
  beschreibung: Siehe auch Ein Bereich mit dämmrigem Licht ist leicht verschleiert. „Leicht verschleiert“ und „Die Spielregeln“
    („Erkundung“).
  rule book: SRD 5.2.1
- name: Deckung
  beschreibung: 'Deckung bietet einem Ziel dahinter ein gewisses

    Maß an Schutz. Es gibt drei Deckungsgrade, von denen jeder dem Ziel einen anderen Vorzug bietet:

    Teildeckung (Bonus von +2 auf RK und Geschick- lichkeitsrettungswürfe), Dreivierteldeckung (Bonus von +5 auf RK und Geschicklichkeitsrettungs-
    würfe) und vollständige Deckung (das Ziel kann nicht direkt anvisiert werden). Für ein Ziel hinter

    Siehe auch verschiedenen Deckungsgraden gilt nur der Grad, der den höchsten Schutz bietet.

    „Die Spielregeln“ („Kampf“).'
  rule book: SRD 5.2.1
- name: Dehydrierung (Gefahr)
  beschreibung: 'Kreaturen benötigen täglich eine gewisse Menge von Wasser je nach ihrer Größe, wie in der Tabelle „Täglicher
    Wasserbedarf“ dargestellt. Eine Kreatur, die weniger als die Hälfte der täglich erforderlichen

    Wassermenge trinkt, erhält am Ende des Tages eine Erschöpfungsstufe. Erschöpfung durch

    Dehydrierung kann nicht entfernt werden, ehe

    Siehe auch die Kreatur nicht die vollständige Tagesmenge

    Täglicher an Wasser trinkt. Wasserbedarf „Erschöpfung“.

    Größe Wassermenge Größe Wassermenge

    Winzig 1 Liter Groß 16 Liter

    Klein 4 Liter Riesig 64 Liter

    Mittel 4 Liter Gigantisch 256 Liter'
  rule book: SRD 5.2.1
- name: Dunkelheit
  beschreibung: 'Siehe auch

    Dunkle Bereiche sind komplett verschleiert.

    „Komplett verschleiert“ und „Die Spielregeln“ („Erkundung“).'
  rule book: SRD 5.2.1
- name: Dunkelsicht
  beschreibung: 'Wenn du Dunkelsicht hast, kannst du auf die angegebene Reichweite bei dämmrigem Licht sehen wie bei hellem
    Licht und bei Dunkelheit

    Siehe auch wie bei dämmrigem Licht. Farben nimmst du bei

    Dunkelheit nur als Graustufen wahr.

    „Die Spielregeln“ („Erkundung“).'
  rule book: SRD 5.2.1
- name: Einstimmung
  beschreibung: 'Manche magischen Gegenstände erfordern, dass eine bestimmte Bindung an sie hergestellt wird, ehe ihre magischen
    Eigenschaften genutzt werden können: Dies ist die sogenannte Einstimmung.

    Siehe auch Eine Kreatur kann auf höchstens drei magische

    Gegenstände zugleich eingestimmt sein.

    „Ausrüstung“ („Magische Gegenstände“).'
  rule book: SRD 5.2.1
- name: Erfahrungspunkte
  beschreibung: 'Charaktere verdienen Erfahrungspunkte (EP), wenn sie Herausforderungen meistern und Aben- teuer abschließen.
    Die EP werden vom Spielleiter verliehen. Wenn die EP eines Charakters bestimmte

    Siehe auch Schwellenwerte erreichen, wird die Stufe des

    Charakters erhöht. „Stufenaufstiege“.'
  rule book: SRD 5.2.1
- name: Erschöpfung (Zustand)
  beschreibung: 'Wenn du den Zustand Erschöpft hast, wirken

    Erschöpfungsstufen:

    folgende Effekte auf dich:

    Dieser Zustand ist kumulativ. Wann immer er auf dich wirkt, erhältst du 1 Erschöpfungsstufe hinzu. Wenn du sechs

    Beeinträchtigte W20-Prüfungen:

    Erschöpfungsstufen hast, stirbst du.

    Wenn du eine W20-Prüfung ausführst, ist das Ergebnis um einen Betrag in doppelter Höhe deiner

    Verringerte Bewegungsrate:

    Erschöpfungsstufen verringert.

    Deine Bewegungs- rate ist um eine Anzahl von Metern in Höhe des

    Erschöpfungsstufen entfernen:

    1,5-Fachen deiner Erschöpfungsstufe verringert.

    Wenn du eine lange Rast abschließt, wird eine deiner Erschöp- fungsstufen entfernt. Sobald du keine Erschöp- fungsstufen
    mehr hast, endet der Zustand.'
  rule book: SRD 5.2.1
- name: Erschütterungssinn
  beschreibung: 'Eine Kreatur mit Erschütterungssinn kennt den

    Ort von Kreaturen und bewegten Gegenständen innerhalb einer bestimmten Reichweite, sofern sie und die erkannten Ziele
    beide in Kontakt mit derselben Oberfläche (dem Boden, einer Wand, einer Decke) oder derselben Flüssigkeit sind.

    Erschütterungssinn kann keine Kreaturen oder

    Gegenstände in der Luft erspüren und zählt nicht als Form der Sicht.'
  rule book: SRD 5.2.1
- name: Erstickung (Gefahr)
  beschreibung: 'Eine Kreatur kann für eine Zeitspanne die Luft anhalten, die ihrem Konstitutionsmodifikator plus 1 in Minuten
    entspricht (mindestens 30 Sekunden).

    Danach setzt die Erstickung ein. Solange eine Kreatur keine Luft bekommt oder erstickt, erhält sie am Ende jedes ihrer
    Züge eine Erschöpfungsstufe. Sobald sie wieder atmen kann, werden alle Erschöpfungsstufen entfernt, die sie durch die
    Erstickung erhalten hat.'
  rule book: SRD 5.2.1
- name: Expertise
  beschreibung: 'Expertise ist ein Merkmal, das deine Anwendung von Fertigkeiten verbessert, in denen du Übung hast.

    Wenn du einen Attributswurf mit einer Fertigkeit ausführst, in der du Übung und Expertise hast, ist dein Übungsbonus bei
    diesem Wurf verdoppelt, sofern der Bonus nicht schon durch ein anderes

    Merkmal verdoppelt wird.

    Wenn du Expertise erhältst, dann in einer

    Fertigkeit, in der du Übung hast. Du kannst nur einmal Expertise in einer Fertigkeit haben, in der

    Siehe auch du Übung hast.

    „Die Spielregeln“ („Übung“).'
  rule book: SRD 5.2.1
- name: Feindlich gesinnt (Haltung)
  beschreibung: 'Eine feindlich gesinnte Kreatur steht dir negativ gegenüber. Du bist bei Attributswürfen zum

    Siehe auch Beeinflussen von Kreaturen, die dir feindlich gesinnt sind, im Nachteil. „Beeinflussen“.'
  rule book: SRD 5.2.1
- name: Fertigkeit
  beschreibung: 'Eine Fertigkeit ist ein Spezialgebiet, das mit einem

    Attributswurf assoziiert ist. Wenn du Übung in einer Fertigkeit hast und einen Attributswurf ausführst, der mit dieser
    Fertigkeit assoziiert ist,

    Siehe auch kannst du dem Ergebnis deinen Übungsbonus hinzufügen. „Die Spielregeln“ („Übung“).'
  rule book: SRD 5.2.1
- name: Festgesetzt (Zustand)
  beschreibung: 'Wenn du den Zustand Festgesetzt hast, wirken

    Keine Bewegungsrate:

    folgende Effekte auf dich:

    Deine Bewegungsrate

    Beeinträchtigte Angriffe:

    beträgt 0 und kann nicht erhöht werden.

    Angriffswürfe gegen dich sind im Vorteil, und deine Angriffswürfe sind

    Beeinträchtigte Rettungswürfe:

    im Nachteil.

    Du bist bei

    Geschicklichkeitsrettungswürfen im Nachteil.'
  rule book: SRD 5.2.1
- name: Fliegen
  beschreibung: 'Verschiedene Effekte können eine Kreatur flugfähig machen. Wenn du im Flug einen der Zustände

    Kampfunfähig oder Liegend erhältst oder deine

    Flugbewegungsrate auf 0 sinkt, stürzt du ab.

    Siehe auch Du kannst unter diesen Umständen in der Luft bleiben, sofern du schweben kannst.

    „Flugbewegungsrate“ und „Stürzen“.'
  rule book: SRD 5.2.1
- name: Flüche
  beschreibung: 'Durch manche Effekte im Spiel wird eine Kreatur oder ein Gegenstand verflucht. Der Effekt, der den

    Fluch brechen

    Fluch bewirkt, definiert dessen Auswirkungen.

    Vollständige Genesung

    Flüche können durch die Zauber und sowie andere magische

    Effekte entfernt werden, die ausdrücklich Flüche beenden.'
  rule book: SRD 5.2.1
- name: Flugbewegungsrate
  beschreibung: 'Eine Flugbewegungsrate kann verwendet werden, um sich durch die Luft zu bewegen. Mit einer

    Siehe auch Flugbewegungsrate kannst du in der Luft bleiben, bis du landest, abstürzt oder stirbst.

    „Bewegungsrate“ und „Fliegen“.'
  rule book: SRD 5.2.1
- name: Freier Bereich
  beschreibung: 'Ein Bereich ist frei, wenn sich keine Kreaturen darin aufhalten und er nicht vollständig mit

    Gegenständen angefüllt ist.'
  rule book: SRD 5.2.1
- name: Freundlich gesinnt (Haltung)
  beschreibung: 'Eine freundlich gesinnte Kreatur steht dir positiv gegenüber. Du bist bei Attributswürfen zum

    Siehe auch Beeinflussen von Kreaturen, die dir freundlich gesinnt sind, im Vorteil. „Beeinflussen“.'
  rule book: SRD 5.2.1
- name: Gefahr
  beschreibung: 'Siehe auch Gefahren resultieren aus der Umgebung.

    „Brand“, „Dehydrierung“, „Erstickung“, „Sturz“ und „Unterernährung“.'
  rule book: SRD 5.2.1
- name: Gegenstand
  beschreibung: 'Ein Gegenstand ist ein unbelebtes, klar abgrenzbares

    Ding. Zusammengesetzte Dinge wie Gebäude

    Siehe auch bestehen aus mehr als einem Gegenstand.

    „Gegenstände zerstören“.'
  rule book: SRD 5.2.1
- name: Gegenstände zerstören
  beschreibung: 'Gegenstände können durch Angriffe und manche

    Zauber beschädigt werden. Dabei gelten die Regeln unten. Wenn ein Gegenstand besonders empfindlich ist, kann der SL einer
    Kreatur gestatten, ihn mit der

    Angriffs- oder Verwenden-Aktion automatisch zu

    Rüstungsklasse:

    zerstören.

    In der Tabelle „Rüstungsklasse eines Gegenstands“ findest du RK-Vorschläge für

    Rüstungsklasse verschiedene Materialien. eines Gegenstands

    RK Material RK Material 11 Papier, Seil, Stoff 19 Eisen, Stahl 13 Eis, Glas, Kristall 21 Mithral 15 Holz 23 Adamant 17
    Stein

    Trefferpunkte:

    Ein Gegenstand wird zerstört, wenn seine Trefferpunkte auf 0 sinken. In der

    Tabelle „Trefferpunkte eines Gegenstands“ findest du Vorschläge für die Trefferpunkte zerbrechlicher sowie stabiler Gegenstände
    von höchstens großer

    Größe. Wenn du die Trefferpunkte eines riesigen oder gigantischen Gegenstands nachverfolgen willst, unterteile den Gegenstand
    in Abschnitte von höchstens großer Größe und verfolge deren

    Trefferpunkte jeweils separat. Der SL bestimmt, ob das Zerstören eines Teils von einem Gegenstand den Trefferpunkte gesamten
    Gegenstand eines Gegenstands einstürzen lässt.

    Größe Zerbrechlich Stabil

    Winzig (Flasche, Schloss) 2 (1W4) 5 (2W4)

    Klein (Laute, Truhe) 3 (1W6) 10 (3W6)

    Mittelgroß 4 (1W8) 18 (4W8)

    (Fass, Kronleuchter)

    Groß (Esstisch, Karren) 5 (1W10) 27 (5W10)

    Schadensarten und Gegenstände:

    Gegenstände sind immer gegen Gift und psychischen Schaden immun. Der SL könnte entscheiden, dass manche

    Schadensarten bei einem Gegenstand besonders effektiv oder ineffektiv sind. Beispielsweise eignet sich Wuchtschaden gut,
    um Gegenstände zu zerschmettern, jedoch schlecht, um etwas zu zerschneiden. Gegenstände aus Papier oder Stoff

    Schadensschwellenwert:

    könnten anfällig für Feuerschaden sein.

    Große Gegenstände wie

    Burgmauern haben oft zusätzliche Widerstandskraft,

    Siehe auch die von einem Schadensschwellenwert repräsentiert

    Keine Attributswerte:

    wird. „Schadensschwellenwert“.

    Gegenstände haben keine

    Attributswerte, es sei denn, eine Regel weist ihnen solche Werte zu. Ohne Attributswerte kann ein

    Gegenstand keine Attributswürfe ausführen, und er scheitert bei allen Rettungswürfen.'
  rule book: SRD 5.2.1
- name: Gegner
  beschreibung: Eine Kreatur ist dein Gegner, wenn sie im Kampf gegen dich kämpft, dir aktiv schaden will oder von den Regeln
    oder vom SL als dein Gegner bestimmt wurde.
  rule book: SRD 5.2.1
- name: Gelähmt (Zustand)
  beschreibung: 'Wenn du den Zustand Gelähmt hast, wirken

    Kampfunfähig:

    folgende Effekte auf dich:

    Du hast den Zustand

    Keine Bewegungsrate:

    Kampfunfähig.

    Deine Bewegungsrate

    Beeinträchtigte Rettungswürfe:

    beträgt 0 und kann nicht erhöht werden.

    Du scheiterst bei Stärke- und Geschicklichkeitsrettungswürfen automatisch.

    Beeinträchtigte Angriffe:

    Angriffswürfe gegen

    Automatische kritische Treffer:

    dich sind im Vorteil.

    Jeder Angriffs- wurf, der dich trifft, ist ein kritischer Treffer, sofern der Angreifer sich im Abstand von bis zu 1,5
    Metern von dir befindet.'
  rule book: SRD 5.2.1
- name: Gelegenheitsangriffe
  beschreibung: 'Wenn eine Kreatur, die du sehen kannst, mithilfe ihrer Aktion, ihrer Bonusaktion, ihrer Reaktion oder einer
    ihrer Bewegungsraten deine Reichweite verlässt, kannst du einen Gelegenheitsangriff ausführen. Nutze dazu eine Reaktion,
    um einen

    Nahkampfangriff mit einer Waffe oder einen waffenlosen Angriff gegen die provozierende Kreatur auszuführen. Der Angriff
    erfolgt unmittelbar,

    Siehe auch bevor die Kreatur deine Reichweite verlässt.

    „Die Spielregeln“ („Kampf“).'
  rule book: SRD 5.2.1
- name: Gepackt (Zustand)
  beschreibung: 'Wenn du den Zustand Gepackt hast, wirken folgende

    Keine Bewegungsrate:

    Effekte auf dich:

    Deine Bewegungsrate

    Beeinträchtigte Angriffe:

    beträgt 0 und kann nicht erhöht werden.

    Du bist bei Angriffs- würfen gegen alle Ziele außer der Kreatur, die dich

    Beweglich:

    gepackt hält, im Nachteil.

    Die Kreatur, die dich gepackt hält, kann dich ziehen oder tragen, wenn sie sich bewegt.

    Allerdings kostet sie dies doppelt so viel Bewegung, sofern du nicht winzig oder um mindestens zwei

    Kategorien kleiner als sie bist.'
  rule book: SRD 5.2.1
- name: Gepackt halten
  beschreibung: 'Eine Kreatur kann eine andere Kreatur packen und festhalten. Charaktere tun dies üblicherweise im

    Rahmen eines waffenlosen Angriffs. Viele Monster haben besondere Angriffe, die ihnen gestatten, ihre

    Siehe auch Beute rasch zu packen. Wird eine Kreatur gepackt, so gelten die nachstehenden Regeln.

    Zustand Gepackt:

    „Gepackt“ und „Waffenloser Angriff“.

    Wird eine Kreatur erfolgreich

    Eine gepackte Kreatur pro Hand:

    gepackt, so hat sie den Zustand Gepackt.

    Eine Kreatur muss eine freie Hand haben, um eine andere

    Kreatur packen zu können. Manche Wertekästen und Spieleffekte gestatten einer Kreatur, ein Ziel mithilfe eines Tentakels,
    eines Mauls oder eines anderen Körperteils zu packen. Welchen Körperteil auch immer eine Kreatur einsetzt, sie kann damit
    nur jeweils eine Kreatur gepackt halten, und sie kann diesen Körperteil nicht verwenden, um auf eine andere Kreatur zu
    zielen, es sei denn, sie

    Den Zustand Gepackt beenden:

    beendet zuvor den Haltegriff.

    Eine gepackte

    Kreatur kann ihre Aktion verwenden, um einen

    Stärkewurf (Athletik) oder Geschicklichkeitswurf (Akrobatik) gegen den Flucht-SG des Haltegriffs auszuführen. Bei einem
    Erfolg endet der Zustand

    Gepackt. Der Zustand endet ebenfalls, wenn die

    Kreatur, die eine andere gepackt hält, kampfunfähig wird oder ihr Abstand zum gepackten Ziel die

    Reichweite des Haltegriffs überschreitet. Außerdem kann die Kreatur, die eine andere gepackt hält, das

    Ziel jederzeit loslassen (keine Aktion erforderlich).'
  rule book: SRD 5.2.1
- name: Gesinnung
  beschreibung: 'Die Gesinnung einer Kreatur beschreibt ihre grundsätzlichen ethischen Ansichten und Ideale.

    Sie ist eine Kombination aus zwei Faktoren: der moralischen Haltung (gut, böse, neutral) und der

    Einstellung zum Gesetz (rechtschaffen, chaotisch, neutral). Diese Faktoren erlauben neun mögliche

    Siehe auch Kombinationen, beispielsweise rechtschaffen gut oder neutral böse. „Charaktererstellung“ („Deinen Charakter
    erstellen“).'
  rule book: SRD 5.2.1
- name: Gestaltwandeln
  beschreibung: 'Verwandlung

    Wenn ein Effekt dich verwandelt, beispielsweise

    Tiergestalt oder der Zauber , ist in der Beschreibung des Effekts angegeben, was mit dir geschieht. Sofern in der Beschreibung
    nicht anders angegeben, werden alle Effekte, die gerade auf dich wirken – Zustände, Zauber, Flüche und dergleichen – von
    einer Gestalt auf die andere übertragen. Wenn du stirbst, verwandelst du dich in deine wahre Gestalt zurück.'
  rule book: SRD 5.2.1
- name: Gleichgültig (Haltung)
  beschreibung: 'Wenn eine Kreatur dir gegenüber gleichgültig ist, hat sie kein Interesse daran, dir zu helfen

    Siehe auch oder dich zu beeinträchtigen. Gleichgültig ist die Standardhaltung von Monstern.

    „Beeinflussen“.'
  rule book: SRD 5.2.1
- name: Gleichzeitige Effekte
  beschreibung: 'Wenn in einem Zug mehrere Dinge zugleich passieren, entscheidet die Person am Spieltisch, die gerade am Zug
    ist – Spieler oder SL –, in welcher

    Reihenfolge diese Dinge geschehen. Beispiel: Wenn zu Beginn des Zugs eines Spielercharakters zwei

    Effekte auftreten, entscheidet der Spieler, welcher

    Effekt sich zuerst ereignet.'
  rule book: SRD 5.2.1
- name: Grabbewegungsrate
  beschreibung: 'Kreaturen mit Grabbewegungsrate können ihre Bewegung ganz oder teilweise verwenden, um sich durch Sand, Erde,
    Schlamm oder Eis zu bewegen. Sie können sich nicht durch massives

    Siehe auch Gestein graben, sofern sie nicht über ein Merkmal verfügen, das ihnen dies gestattet.

    „Bewegungsrate“.'
  rule book: SRD 5.2.1
- name: Größe
  beschreibung: 'Kreaturen sowie Gegenstände gehören jeweils zu einer Größenkategorie: Winzig, Klein, Mittelgroß,

    Groß, Riesig oder Gigantisch. Die Größe einer

    Kreatur bestimmt, wie viel Platz die Kreatur im

    Siehe auch Kampf einnimmt. Die Größe eines Gegenstands beeinflusst seine Trefferpunkte.

    „Gegenstände zerstören“ und „Die Spielregeln“ („Kampf“).'
  rule book: SRD 5.2.1
- name: Haltung
  beschreibung: 'Monster haben Spielercharakteren gegenüber eine anfängliche Haltung: Sie können ihnen

    Siehe auch gegenüber freundlich gesinnt, feindlich gesinnt oder gleichgültig sein. „Feindlich gesinnt“, „Freundlich gesinnt“,
    „Gleichgültig“ und „Beeinflussen“.'
  rule book: SRD 5.2.1
- name: Heilung
  beschreibung: Siehe auch Heilung besteht darin, dass du Trefferpunkte zurückerhältst. „Die Spielregeln“ („Schaden und Heilung“).
  rule book: SRD 5.2.1
- name: Heldische Inspiration
  beschreibung: 'Wenn du als Spielercharakter Heldische Inspiration hast, kannst du sie verbrauchen, um mit einem

    Würfel sofort nach dem Wurf erneut zu würfeln.

    In diesem Fall musst du das neue Ergebnis verwenden.

    Verfügst du über Heldische Inspiration und erhältst dann noch weitere, so geht diese verloren, sofern du sie nicht an
    einen Spielercharakter weitergibst, der keine hat.'
  rule book: SRD 5.2.1
- name: Helfen (Aktion)
  beschreibung: 'Wenn du die Helfen-Aktion ausführst, vollziehst

    Einen Attributswurf unterstützen:

    du eine der folgenden Handlungen:

    Wähle eine deiner Übungen in einer Fertigkeit oder im

    Umgang mit Werkzeug sowie einen Verbündeten aus, der dir nahe genug ist, dass du ihn verbal oder physisch unterstützen
    kannst, wenn er einen Attributswurf ausführt. Der Verbündete ist bei seinem nächsten Attributswurf mit der ausgewählten
    Fertigkeit oder dem ausgewählten

    Werkzeug im Vorteil. Dieser Vorzug gilt nur, wenn der Verbündete ihn vor Beginn deines nächsten

    Zugs einsetzt. Der SL entscheidet, ob deine Hilfe

    Einen Angriffswurf unterstützen:

    möglich ist.

    Du lenkst einen Gegner im Abstand von bis zu 1,5 Metern von dir vorübergehend ab, sodass der nächste

    Angriffswurf eines deiner Verbündeten gegen ihn im Vorteil ist. Dieser Vorzug gilt nur, wenn der Verbündete ihn vor Beginn
    deines nächsten

    Zugs einsetzt.'
  rule book: SRD 5.2.1
- name: Helles Licht
  beschreibung: 'Siehe auch Eine normale Beleuchtung gilt als helles Licht.

    „Die Spielregeln“ („Erkundung“).'
  rule book: SRD 5.2.1
- name: Herausforderungsgrad
  beschreibung: 'Der Herausforderungsgrad (HG) fasst zusammen, wie gefährlich ein Monster für eine Gruppe von vier Spielercharakteren
    ist. Vergleiche den HG des Monsters mit der Stufe der Charaktere.

    Ist der HG höher, so ist das Monster wahrscheinlich eine Bedrohung. Ist der HG niedriger, so ist das

    Monster wahrscheinlich keine große Bedrohung.

    Die Umstände und die Anzahl der Spielercharaktere haben erheblichen Einfluss darauf, wie gefährlich ein Monster im Spiel
    tatsächlich ist. Der Abschnitt „Werkzeugkasten fürs Spiel“ („Kampfbegegnungen“)

    enthält Ratschläge für den SL, wie der HG beim Planen

    Siehe auch möglicher Kampfbegegnungen zu verwenden ist.

    „Wertekasten“.'
  rule book: SRD 5.2.1
- name: Hochsprung
  beschreibung: 'Bei einem Hochsprung springst du eine Anzahl von Metern empor. Sie entspricht einem Drittel der

    Summe aus deinem Stärkemodifikator + 3, sofern du unmittelbar vor dem Sprung mindestens drei Meter zurückgelegt hast.
    Bei einem Hochsprung aus dem Stand kannst du nur halb so hoch springen.

    In beiden Fällen kostet dich jeder gesprungene

    Meter einen Meter deiner Bewegungsrate.

    Du kannst deine Arme während eines Sprungs um die Hälfte deiner Größe nach oben strecken.

    So kannst du mit den Händen eine Höhe erreichen, die deiner Sprunghöhe plus deiner 1,5-fachen

    Körpergröße entspricht.'
  rule book: SRD 5.2.1
- name: Illusionen
  beschreibung: 'Manche Zauber und anderen Effekte erzeugen magische Illusionen. Ein solcher Effekt definiert, was die Illusion
    tut und welche Sinne oder mentalen

    Bereiche sie täuscht.

    Wenn eine Illusion sich im Raum manifestiert, ist sie körperlos und hat kein Gewicht, doch sie wirkt von der Umgebung
    betroffen, als wäre sie real, sofern der hervorrufende Effekt nichts anderes angibt. Beispiel: Die visuelle Illusion einer
    Kreatur wirft Schatten und verursacht Reflexionen, und

    Wind scheint sie zu beeinflussen. Entsprechend erzeugt eine akustische Illusion bei passenden räumlichen Gegebenheiten
    Echos.'
  rule book: SRD 5.2.1
- name: Immunität
  beschreibung: 'Wenn du gegen eine Schadensart oder einen

    Zustand immun bist, kannst du davon in keiner

    Weise beeinflusst werden.'
  rule book: SRD 5.2.1
- name: Improvisierte Waffen
  beschreibung: 'Eine improvisierte Waffe ist ein Gegenstand, der behelfsmäßig als Waffe geführt wird, beispielsweise eine
    zerbrochene Flasche, ein

    Tischbein oder eine Bratpfanne. Auch einfache

    Waffen und Kriegswaffen gelten als improvisierte

    Waffen, wenn sie anders als vorgesehen verwendet werden. Wenn beispielsweise mit einer Fernkampfwaffe ein Nahkampfangriff
    ausgeführt oder eine Nahkampfwaffe ohne

    Wurfwaffe-Eigenschaft geworfen wird, so zählt sie bei diesem Angriff als improvisierte Waffe.

    Für improvisierte Waffen gelten die nachstehenden

    Übung:

    Regeln.

    Du fügst Angriffswürfen mit einer improvisierten Waffe nicht deinen Übungsbonus

    Schaden:

    hinzu.

    Bei einem Treffer bewirkt die Waffe 1W4 Schaden einer Art, die dem SL beim jeweiligen

    Reichweite:

    Gegenstand passend erscheint.

    Wird die Waffe geworfen, so liegt die Grundreichweite bei sechs Metern und die

    Waffenäquivalente:

    Maximalreichweite bei 18 Metern.

    Wenn eine improvisierte

    Waffe an eine einfache Waffe oder eine Kriegswaffe erinnert, kann der SL bestimmen, dass sie wie diese

    Waffe funktioniert. In dem Fall gelten die Regeln dieser Waffe. Beispielsweise könnte der SL ein

    Tischbein als Knüppel behandeln.'
  rule book: SRD 5.2.1
- name: Initiative
  beschreibung: 'Die Initiative bestimmt die Reihenfolge der Züge während eines Kampfs. In den Kampfregeln unter „Die Spielregeln“
    wird erläutert, wie die Initiative ausgewürfelt wird.

    Manchmal könnte der SL bestimmen, dass die Kampfteilnehmer ihre Initiativewerte verwenden, anstatt die Initiative auszuwürfeln.

    Dein Initiativewert entspricht 10 plus deinem

    Geschicklichkeitsmodifikator. Wenn du bei

    Initiativewürfen im Vorteil bist, erhöhe deinen

    Initiativewert um 5. Wenn du bei Initiativewürfen

    Siehe auch im Nachteil bist, verringere deinen Initiativewert um 5. „Die Spielregeln“ („Kampf“).'
  rule book: SRD 5.2.1
- name: Kampagne
  beschreibung: 'Siehe auch Eine Kampagne besteht aus einer Reihe einzelner

    Abenteuer. „Abenteuer“.'
  rule book: SRD 5.2.1
- name: Kampfunfähig (Zustand)
  beschreibung: 'Wenn du den Zustand Kampfunfähig hast, wirken

    Inaktiv:

    folgende Effekte auf dich:

    Du kannst keine Aktionen, Bonusaktionen

    Keine Konzentration:

    oder Reaktionen ausführen.

    Deine Konzentration ist

    Stumm:

    unterbrochen.

    Überrascht:

    Du kannst nicht sprechen.

    Wenn du beim Auswürfeln der

    Initiative kampfunfähig bist, so bist du bei diesem

    Wurf im Nachteil.'
  rule book: SRD 5.2.1
- name: Kegel (Wirkungsbereich)
  beschreibung: 'Ein Kegel ist ein Wirkungsbereich, der von einem

    Ursprungspunkt in geraden Linien in einer Richtung nach Wahl des Wirkers ausgeht. Die Breite eines

    Kegels an einem beliebigen Punkt auf seiner

    Länge entspricht dem Abstand dieses Punkts vom Ursprungspunkt. Beispiel: Ein Kegel ist an einem Punkt auf seiner Länge,
    der 4,5 Meter vom

    Ursprungspunkt entfernt liegt, 4,5 Meter breit.

    Der Effekt, der den Kegel erzeugt, definiert dessen maximale Länge.

    Der Ursprungspunkt eines Kegels ist nicht im

    Wirkungsbereich enthalten, es sei denn, der Wirker beschließt dies.'
  rule book: SRD 5.2.1
- name: Kletterbewegungsrate
  beschreibung: 'Du kannst eine Kletterbewegungsrate anstatt der normalen Bewegungsrate verwenden, um dich an vertikalen Oberflächen
    zu bewegen, ohne die zusätzliche Bewegung zu benötigen,

    Siehe auch die beim Klettern normalerweise anfällt.

    „Bewegungsrate“ und „Klettern“.'
  rule book: SRD 5.2.1
- name: Klettern
  beschreibung: 'Beim Klettern kostet dich jeder Meter, den du zurücklegst, einen zusätzlichen Meter Bewegungsrate (zwei zusätzliche
    Meter in schwierigem Gelände).

    Du kannst diese zusätzlichen Kosten ignorieren, wenn du über eine Kletterbewegungsrate verfügst und sie beim Klettern
    verwendest.

    Nach Ermessen des SL kann das Klettern an rutschigen Oberflächen oder solchen mit wenigen

    Griffmöglichkeiten einen erfolgreichen SG-15-

    Stärkewurf (Athletik) erfordern.'
  rule book: SRD 5.2.1
- name: Komplett verschleiert
  beschreibung: 'Siehe auch In komplett verschleierten Bereichen hast du den

    Zustand Blind. „Blind“, „Dunkelheit“ und „Die Spielregeln“ („Erkundung“).'
  rule book: SRD 5.2.1
- name: Konzentration
  beschreibung: 'Manche Zauber und andere Effekte erfordern

    Konzentration, um aktiv zu bleiben. Dies ist in ihrer Beschreibung angegeben. Wenn der

    Wirker des Effekts seine Konzentration verliert, endet der Effekt. Hat der Effekt eine maximale

    Wirkungsdauer, so ist in der Beschreibung des

    Effekts angegeben, wie lange der Wirker sich auf ihn konzentrieren kann: „Bis zu 1 Minute“, „1 Stunde“ oder eine andere
    Dauer. Der Wirker kann seine

    Konzentration jederzeit beenden – dazu ist keine

    Aktion erforderlich. Folgende Faktoren stören

    Weiterer Effekt, der Konzentration erfordert:

    oder beenden die Konzentration:

    Du verlierst die Konzentration auf einen Effekt, sobald du einen Zauber oder einen sonstigen Effekt wirkst, der ebenfalls
    Konzentration erfordert.

    Schaden:

    Wenn du Schaden erleidest, musst du einen Konstitutionsrettungswurf bestehen, um die Konzentration aufrechtzuerhalten.
    Der SG beträgt 10 oder die Hälfte des erlittenen Schadens (abgerundet), je nachdem, welcher Wert höher ist.

    Kampfunfähig oder tot:

    Er kann höchstens 30 betragen.

    Deine Konzentration endet, wenn du kampfunfähig wirst oder stirbst.'
  rule book: SRD 5.2.1
- name: Kreatur
  beschreibung: Siehe auch Alle Wesen im Spiel einschließlich der Spieler- charaktere sind Kreaturen. „Kreaturentyp“.
  rule book: SRD 5.2.1
- name: Kreaturen in den Zustand Bewusstlos versetzen
  beschreibung: 'Wenn du die Trefferpunkte einer Kreatur mit einem

    Nahkampfangriff auf 0 senken würdest, kannst du sie stattdessen auf 1 Trefferpunkt senken. In diesem

    Fall hat die Kreatur den Zustand Bewusstlos und beginnt eine kurze Rast.

    Die Kreatur bleibt bewusstlos, bis sie Treffer- punkte zurückerhält, oder bis ihr jemand mit einer

    Aktion und einem erfolgreichen SG-10-Weisheitswurf (Heilkunde) Erste Hilfe leistet.'
  rule book: SRD 5.2.1
- name: Kreaturentyp
  beschreibung: 'Alle Kreaturen einschließlich der Spielercharaktere weisen in den Regeln ein Schlagwort auf, das ihren

    Kreaturentyp bezeichnet. Die meisten Spieler- charaktere haben den Kreaturentyp Humanoide.

    Aberration Humanoide Schlick

    Es gibt folgende Kreaturentypen im Spiel:

    Celestisch Konstrukt Tier

    Drache Monstrosität Unhold

    Elementar Pflanze Untoter

    Feenwesen Riese

    Die Typen haben keine eigenen Regeln, doch manche

    Regeln im Spiel wirken bei unterschiedlichen

    Kreaturentypen verschieden.'
  rule book: SRD 5.2.1
- name: Kriechen
  beschreibung: 'Wenn du kriechst, kostet dich jeder Meter, den du zurücklegst, einen zusätzlichen Meter Bewegungsrate

    Siehe auch (zwei zusätzliche Meter in schwierigem Gelände).

    „Bewegungsrate“.'
  rule book: SRD 5.2.1
- name: Kritischer Treffer
  beschreibung: 'Wenn du beim W20-Angriffswurf eine 20 würfelst, erzielst du einen kritischen Treffer, und der Angriff trifft
    unabhängig von etwaigen Modifikatoren und der RK des Ziels. Bei einem kritischen Treffer kannst du mit zusätzlichen Würfeln
    würfeln, um den

    Schaden zu bestimmen, den das Ziel durch den Angriff erleidet. Würfle zweimal mit allen Schadenswürfeln

    Siehe auch des Angriffs und addiere die Ergebnisse. Wende dann die relevanten Modifikatoren an.

    „Die Spielregeln“ („Schaden und Heilung“).'
  rule book: SRD 5.2.1
- name: Kugel (Wirkungsbereich)
  beschreibung: 'Eine Kugel ist ein Wirkungsbereich, der von einem Ursprungspunkt in geraden Linien in alle

    Richtungen ausgeht. Der Effekt, der die Kugel erzeugt, definiert die Wirkungsdistanz als Radius der Kugel.

    Der Ursprungspunkt der Kugel ist im Wirkungs- bereich des Zaubers enthalten.'
  rule book: SRD 5.2.1
- name: Kurze Rast
  beschreibung: 'Eine kurze Rast ist eine einstündige Ruhepause, während der eine Kreatur höchstens leichte

    Aktivitäten wie Lesen, Reden, Essen oder Wache halten ausführt. Du musst mindestens einen

    Treffer punkt haben, um eine kurze Rast zu

    Vorzüge der Rast:

    beginnen.

    Wenn du die Rast beendest,

    Trefferpunktewürfel verbrauchen:

    erhältst du die folgenden Vorzüge:

    Du kannst mindestens einen deiner Trefferpunktewürfel verbrauchen, um Trefferpunkte zurückzuerhalten.

    Würfle mit jedem Trefferpunktewürfel, den du auf diese Art verbrauchst, und füge dem

    Ergebnis deinen Konstitutionsmodifikator hinzu. Du erhältst Trefferpunkte in der Höhe des Gesamtergebnisses zurück (mindestens
    1).

    Du kannst nach jedem Wurf entscheiden, ob du einen weiteren Treffer punktewürfel verbrauchen

    Besonderes Merkmal:

    willst.

    Manche Merkmale werden durch eine kurze Rast aufgeladen. Wenn du ein solches Merkmal hast, wird es wie in seiner

    Die Rast unterbrechen:

    Beschreibung angegeben aufgeladen.

    Eine kurze Rast kann auf folgende Arten unterbrochen werden:

    • Initiative auswürfeln • Einen Zauber wirken, der kein Zaubertrick ist • Schaden erleiden

    Eine unterbrochene kurze Rast gewährt keine

    Vorzüge.'
  rule book: SRD 5.2.1
- name: Lange Rast
  beschreibung: 'Eine lange Rast ist eine ausgedehnte Ruhepause von mindestens acht Stunden, die jeder Kreatur zur Verfügung
    steht. Während einer langen

    Rast schläfst du mindestens sechs Stunden lang und führst höchstens zwei Stunden lang leichte

    Aktivitäten wie Lesen, Reden, Essen oder Wache halten aus.

    Während du schläfst, hast du den Zustand

    Bewusstlos. Hast du eine lange Rast beendest, so musst du mindestens 16 Stunden warten, ehe du die nächste beginnst.

    Vorzüge der Rast:

    Du musst mindestens einen Trefferpunkt haben, um eine lange Rast zu beginnen. Wenn du die Rast beendest, erhältst

    Alle TP zurückerhalten:

    du die folgenden Vorzüge:

    Du erhältst alle verlorenen Trefferpunkte und alle verbrauchten

    Trefferpunktewürfel zurück. Wenn dein Treffer- punktemaximum verringert wurde, ist es jetzt

    Attributswerte wiederhergestellt:

    wieder normal.

    Wenn deine

    Attributswerte verringert waren, sind sie jetzt

    Erschöpfung verringert:

    wieder normal.

    Wenn du Erschöpfungs- stufen hattest, werden diese um eine Stufe

    Besonderes Merkmal:

    verringert.

    Manche Merkmale werden durch eine lange Rast aufgeladen. Wenn du ein solches Merkmal hast, wird es wie in seiner

    Die Rast unterbrechen:

    Beschreibung angegeben aufgeladen.

    Eine lange Rast kann auf folgende Arten unterbrochen werden:

    • Initiative auswürfeln • Einen Zauber wirken, der kein Zaubertrick ist • Schaden erleiden • Eine Stunde lang gehen oder
    andere körperliche

    Anstrengungen unternehmen

    Wenn du vor der Unterbrechung mindestens eine

    Siehe auch Stunde lang gerastet hast, erhältst du die Vorzüge einer kurzen Rast. „Kurze Rast“.

    Du kannst die lange Rast unmittelbar nach der Unterbrechung fortsetzen. In diesem Fall ist pro Unterbrechung eine zusätzliche
    Stunde Rast erforderlich, um diese zu beenden.'
  rule book: SRD 5.2.1
- name: Leicht verschleiert
  beschreibung: 'Du bist bei Weisheitswürfen (Wahrnehmung)

    Siehe auch im Nachteil, die du ausführst, um etwas in einem leicht verschleierten Bereich zu sehen.

    „Dämmriges Licht“ und „Die Spielregeln“ („Erkundung“).'
  rule book: SRD 5.2.1
- name: Liegend (Zustand)
  beschreibung: 'Wenn du den Zustand Liegend hast, wirken folgende

    Eingeschränkte Bewegung:

    Effekte auf dich:

    Deine einzigen

    Bewegungsmöglichkeiten bestehen darin, entweder zu kriechen oder Bewegung in Höhe der Hälfte deiner Bewegungsrate (abgerundet)

    zu verbrauchen, um aufzustehen und den Zustand damit zu beenden. Wenn deine Bewegungsrate

    Beeinträchtigte Angriffe:

    0 beträgt, kannst du nicht aufstehen.

    Du bist bei Angriffs- würfen im Nachteil. Angriffswürfe gegen dich sind im Vorteil, wenn der Angreifer sich im Abstand
    von bis zu 1,5 Metern von dir befindet. Anderenfalls sind Angriffswürfe gegen dich im Nachteil.'
  rule book: SRD 5.2.1
- name: Linie (Wirkungsbereich)
  beschreibung: 'Eine Linie ist ein Wirkungsbereich, der in gerader

    Linie von einem Ursprungspunkt ausgeht. Länge und Breite dieses Wirkungsbereichs sind in der

    Beschreibung definiert. Der Effekt, der die Linie erzeugt, definiert ihre Länge und Breite.

    Der Ursprungspunkt einer Linie ist nicht im

    Wirkungsbereich enthalten, es sei denn, der Wirker beschließt dies.'
  rule book: SRD 5.2.1
- name: Magie (Aktion)
  beschreibung: 'Wenn du eine magische Aktion ausführst, wirkst du einen Zauber mit dem Zeitaufwand von einer

    Aktion oder verwendest ein Merkmal oder einen magischen Gegenstand, bei dem eine magische

    Aktion zum Aktivieren erforderlich ist.

    Wenn du einen Zauber wirkst, dessen Zeitauf- wand mindestens eine Minute beträgt, musst du die magische Aktion in jedem
    Zug während des

    Zeitaufwands ausführen und währenddessen deine Konzentration aufrechterhalten. Wird deine

    Konzentration unterbrochen, so misslingt der

    Siehe auch Zauber. In diesem Fall wird der Zauberplatz nicht verbraucht. „Konzentration“.'
  rule book: SRD 5.2.1
- name: Magischer Effekt
  beschreibung: Ein Effekt ist magisch, wenn er durch einen Zauber, einen magischen Gegenstand oder ein Phänomen erzeugt wird,
    das durch eine Regel als magisch klassifiziert ist.
  rule book: SRD 5.2.1
- name: Monster
  beschreibung: 'Ein Monster ist eine vom SL kontrollierte Kreatur –

    Siehe auch auch dann, wenn die Kreatur wohlwollend ist.

    „Kreatur“ und „NSC“.'
  rule book: SRD 5.2.1
- name: Nachteil
  beschreibung: 'Wenn du bei einer W20-Prüfung im Nachteil bist, würfle mit zwei W20 und verwende das niedrigere

    Ergebnis. Für einen Würfelwurf kann nur jeweils ein Nachteil gelten. Vorteil und Nachteil, die für

    Siehe auch denselben Wurf gelten, heben einander auf.

    „Die Spielregeln“ („W20-Prüfungen“).'
  rule book: SRD 5.2.1
- name: Nahkampfreichweite
  beschreibung: Kreaturen haben eine Reichweite von 1,5 Metern, sofern keine Regel etwas anderes besagt.
  rule book: SRD 5.2.1
- name: Nichtspielercharakter
  beschreibung: 'Ein Nichtspielercharakter (NSC) ist ein Monster,

    Siehe auch das einen Personennamen und eine eigene

    Persönlichkeit hat. „Monster“.'
  rule book: SRD 5.2.1
- name: Passive Wahrnehmung
  beschreibung: 'Passive Wahrnehmung ist ein Wert, der für die allgemeine Aufmerksamkeit einer Kreatur ihrer

    Umgebung gegenüber steht. Der SL verwendet diesen Wert, um zu ermitteln, ob eine Kreatur etwas bemerkt, ohne dazu einen
    Weisheitswurf (Wahrnehmung) auszuführen.

    Die passive Wahrnehmung einer Kreatur entspricht 10 plus ihrem Bonus auf Weisheitswürfe (Wahrnehmung). Wenn die Kreatur
    bei solchen

    Würfen im Vorteil ist, erhöhe den Wert um 5. Wenn die Kreatur bei solchen Würfen im Nachteil ist, verringere den Wert
    um 5. Beispiel: Ein Charakter der 1. Stufe mit einem Weisheitswert von 15 und Übung in Wahrnehmung hat eine passive

    Wahrnehmung von 14 (10+2+2). Wenn dieser

    Charakter bei Weisheitswürfen (Wahrnehmung)

    im Vorteil ist, beträgt der Wert 19.'
  rule book: SRD 5.2.1
- name: Pro Tag
  beschreibung: Wenn eine Regel besagt, dass du etwas eine bestimmte Anzahl von Malen pro Tag anwenden kannst, so bedeutet
    dies, dass du nach Verbrauch dieser Anzahl eine lange Rast beenden musst, um es erneut anwenden zu können.
  rule book: SRD 5.2.1
- name: Reaktion
  beschreibung: 'Eine Reaktion ist eine besondere Aktion, die als Antwort auf einen in der Beschreibung der

    Reaktion definierten Auslöser erfolgt. Du kannst eine Reaktion auch während des Zugs einer anderen

    Kreatur ausführen. Wenn du sie in deinem Zug ausführst, kannst du dies auch dann tun, wenn du bereits eine Aktion, eine
    Bonusaktion oder beides ausgeführt hast. Wenn du eine Reaktion ausgeführt hast, kannst du bis zum Beginn deines nächsten
    Zugs keine weitere Reaktion ausführen.

    Siehe auch Der Gelegenheitsangriff ist eine Reaktion, die allen Kreaturen zur Verfügung steht.

    „Gelegenheitsangriffe“ und „Die Spielregeln“ („Aktionen“).'
  rule book: SRD 5.2.1
- name: Resistenz
  beschreibung: 'Wenn du gegen eine Schadensart resistent bist, ist der Schaden dieser Art gegen dich halbiert

    Siehe auch (abgerundet). Die Resistenz wird pro Instanz des Schadens nur einmal angewendet.

    „Die Spielregeln“ („Schaden und Heilung“).'
  rule book: SRD 5.2.1
- name: Rettungswurf
  beschreibung: 'Ein Rettungswurf (RW) repräsentiert den Versuch,

    Gefahren zu entgehen oder zu widerstehen.

    Normalerweise führst du nur dann einen Rettungs- wurf aus, wenn eine Regel dies erfordert. Du kannst beschließen, den
    Rettungswurf misslingen zu lassen, ohne zu würfeln. Das Ergebnis eines Rettungswurfs ist im Effekt beschrieben, der ihn
    stattfinden lässt.

    Wenn ein Ziel zu einem Rettungswurf gezwungen wird, den entsprechenden Attributswert jedoch

    Siehe auch nicht hat, misslingt der Rettungswurf automatisch.

    „Die Spielregeln“ („W20-Prüfungen“).'
  rule book: SRD 5.2.1
- name: Ritual
  beschreibung: 'Wenn du einen Zauber vorbereitet hast, der als Ritual gekennzeichnet ist, kannst du diesen

    Zauber als Ritual wirken. Es dauert zehn Minuten länger als sonst, die Ritualversion eines Zaubers zu wirken. Außerdem
    wird kein Zauberplatz verbraucht, was bedeutet, dass die Ritualversion

    Siehe auch nicht auf höheren Graden gewirkt werden kann.

    „Zauber“.'
  rule book: SRD 5.2.1
- name: Rückzug (Aktion)
  beschreibung: Wenn du die Rückzug-Aktion ausführst, provoziert deine Bewegung in diesem Zug keine Gelegenheitsangriffe.
  rule book: SRD 5.2.1
- name: Rüstungsklasse
  beschreibung: 'Die Rüstungsklasse (RK) ist der Zielwert eines

    Angriffswurfs. Die RK repräsentiert, wie schwierig es ist, ein Ziel zu treffen.

    Deine Basis-RK berechnet sich aus 10 plus deinem

    Geschicklichkeitsmodifikator. Wenn eine Regel dir eine andere Berechnung der Basis-RK gibt, wählst du aus, welche Berechnung
    du nutzen

    Siehe auch willst. Du kannst nicht mehr als eine verwenden.

    „Angriffswurf“.'
  rule book: SRD 5.2.1
- name: Rüstungsvertrautheit
  beschreibung: 'Rüstungsvertrautheit erlaubt dir, Rüstung einer bestimmten Kategorie zu tragen, ohne die folgenden Nachteile
    zu erleiden: Wenn du leichte, mittelschwere oder schwere Rüstung trägst, mit der du nicht vertraut bist, so bist du bei
    jeder W20-Prüfung im Nachteil, die Stärke oder Geschicklichkeit einbezieht, und du kannst keine Zauber wirken. Wenn du
    einen Schild führst,

    Siehe auch mit dem du nicht vertraut bist, kannst du seinen

    Rüstungsklassenbonus nicht nutzen.

    „Nachteil“ und „Ausrüstung“ („Rüstung“).'
  rule book: SRD 5.2.1
- name: RW
  beschreibung: 'Siehe auch „RW“ ist die Abkürzung von „Rettungswurf“.

    „Rettungswurf“.'
  rule book: SRD 5.2.1
- name: Schaden
  beschreibung: Schaden repräsentiert Wirkungen, die eine Kreatur oder einen Gegenstand Trefferpunkte verlieren lassen.
  rule book: SRD 5.2.1
- name: Schadensarten
  beschreibung: 'Angriffe und andere schädliche Effekte bewirken unterschiedliche Schadensarten. Die Schadensarten weisen
    zwar keine eigenen Regeln auf, doch es gibt andere Regeln wie die für Resistenzen, die auf

    Schadensarten basieren. Die Tabelle „Schadensarten“ bietet Beispiele, um dem SL zu helfen, neuen

    Effekten passende Schadensarten zuzuweisen.

    Schadensarten

    Typ Beispiele

    Blitz Elektrizität

    Energie Reine magische Energie

    Feuer Flammen, unerträgliche Hitze

    Gift Gifte, toxische Gase

    Gleißend Heilige Energie, sengende Strahlung

    Hieb Klauen, schneidende Gegenstände

    Kälte Eisexplosionen, gefrierendes Wasser

    Nekrotisch Lebenszehrende Energie

    Psychisch Bewusstseinsschädigende Energie

    Säure Ätzende Flüssigkeiten, Verdauungssäfte

    Schall Erschütternde Geräusche

    Stich Reißzähne, Stichwaffen

    Wucht Stumpfe Gegenstände, Stürze,

    Umschlingung'
  rule book: SRD 5.2.1
- name: Schadensschwellenwert
  beschreibung: 'Kreaturen und Gegenstände mit Schadens- schwellen wert sind gegen alle Schadensarten immun, es sei denn,
    sie erleiden durch einen einzigen Angriff oder Effekt so viel Schaden, dass der Schadensschwellenwert erreicht oder überschritten
    wird. In diesem Fall erleiden sie den gesamten entsprechenden Schaden.

    Jeglicher Schaden, der den Schadensschwellenwert unterschreitet, gilt als oberflächlich und verringert keine Trefferpunkte.
    Beispiel: Wenn ein Gegenstand einen Schadensschwellenwert von 10 hat, erleidet er keinen Schaden, wenn ihm 9 Schaden zugefügt
    wird, da dieser Schaden den Schwellenwert nicht erreicht. Erleidet dieser Gegenstand 11 Schaden, so erleidet er diesen
    gesamten Schaden.'
  rule book: SRD 5.2.1
- name: Schadenswurf
  beschreibung: 'Ein Schadenswurf ist ein Würfelwurf, der von

    Siehe auch relevanten Modifikatoren beeinflusst wird und einem Ziel Schaden zufügt.

    „Die Spielregeln“ („Schaden und Heilung“).'
  rule book: SRD 5.2.1
- name: Schweben
  beschreibung: 'Manche Kreaturen können schweben, wie in ihren

    Wertekästen vermerkt, und manche Zauber und andere Effekte gewähren die Fähigkeit zu schweben.

    Während des Flugs zu schweben verhindert,

    Siehe auch dass du unter bestimmten Umständen abstürzt.

    „Fliegen“.'
  rule book: SRD 5.2.1
- name: Schwieriges Gelände
  beschreibung: 'Wenn ein Bereich schwieriges Gelände ist, kostet jeder Meter Bewegung in diesem Bereich einen zusätzlichen
    Meter Bewegungsrate. Beispiel:

    Eine Bewegung von 1,5 Metern in schwierigem

    Gelände kostet drei Meter Bewegungsrate.

    Schwieriges Gelände ist nicht kumulativ. Entweder ist ein Bereich schwieriges Gelände, oder er ist es nicht.

    Ein Bereich ist schwieriges Gelände, wenn er einen der folgenden Faktoren oder etwas • Dickicht, Eis, Schutt oder viel
    Schnee

    Ähnliches enthält:

    • Flüssigkeit, die zwischen knöchel und hüfthoch steht • Ein Gefälle von mindestens 20 Grad • Eine Kreatur, die weder
    von winziger Größe noch dein Verbündeter ist • Möbel für Kreaturen von mindestens deiner

    Größenkategorie • Eine schmale Öffnung, durch die Kreaturen passen, die eine Größenkategorie kleiner als du sind'
  rule book: SRD 5.2.1
- name: Schwierigkeitsgrad
  beschreibung: 'Der Schwierigkeitsgrad (SG) ist der Zielwert für

    Siehe auch einen Attributswurf oder einen Rettungswurf.

    „Die Spielregeln“ („W20-Prüfungen“).'
  rule book: SRD 5.2.1
- name: Schwimmbewegungsrate
  beschreibung: 'Eine Schwimmbewegungsrate kann verwendet werden, um zu schwimmen, ohne die zusätzliche

    Siehe auch Bewegung zu benötigen, die dabei normalerweise anfällt. „Bewegungsrate“ und „Schwimmen“.'
  rule book: SRD 5.2.1
- name: Schwimmen
  beschreibung: 'Beim Schwimmen kostet dich jeder Meter, den du zurücklegst, einen zusätzlichen Meter Bewegungsrate (zwei
    zusätzliche Meter in schwierigem Gelände).

    Du kannst diese zusätzlichen Kosten ignorieren, wenn du über eine Schwimmbewegungsrate verfügst und sie beim Schwimmen
    verwendest.

    Nach Ermessen des SL kann jede Strecke in rauem

    Gewässer einen erfolgreichen SG-15-Stärkewurf (Athletik) erfordern.'
  rule book: SRD 5.2.1
- name: Spielercharakter
  beschreibung: 'Siehe auch Ein Spielercharakter ist ein Charakter, der von einem Spieler kontrolliert wird.

    „Charaktererstellung“.'
  rule book: SRD 5.2.1
- name: Springen
  beschreibung: 'Beim Springen kannst du entweder einen

    Siehe auch Hochsprung (vertikal) oder einen Weitsprung (horizontal) ausführen. „Hochsprung“ und „Weitsprung“.'
  rule book: SRD 5.2.1
- name: Spurt (Aktion)
  beschreibung: 'Wenn du die Spurt-Aktion ausführst, erhältst du für diesen Zug zusätzliche Bewegung. Dieser

    Zuwachs entspricht der Höhe deiner Bewegungsrate einschließlich relevanter Modifikatoren. Beispiel:

    Bei einer Bewegungsrate von neun Metern kannst du dich mit einem Spurt insgesamt bis zu 18 Meter weit bewegen. Wird deine
    Bewegungsrate von neun Metern auf 4,5 Meter verringert, so kannst du dich mit einem Spurt bis zu neun Meter weit bewegen.

    Wenn du eine besondere Bewegungsrate wie eine Flugbewegungsrate oder eine Schwimm- bewegungsrate hast, kannst du diese
    statt deiner normalen Bewegungsrate bei der Spurt-Aktion

    Siehe auch verwenden. Du wählst bei jeder Spurt-Aktion aus, welche Bewegungsrate du verwendest.

    „Bewegungsrate“.'
  rule book: SRD 5.2.1
- name: Stabil
  beschreibung: 'Eine Kreatur ist stabil, wenn sie zwar 0 Treffer-

    Siehe auch punkte hat, aber keine Todesrettungswürfe ausführen muss. „Die Spielregeln“ („Schaden und Heilung“).'
  rule book: SRD 5.2.1
- name: Studieren (Aktion)
  beschreibung: 'Wenn du die Studieren-Aktion ausführst, führst du einen Intelligenzwurf aus, um deine Erinnerung, ein

    Buch, einen Hinweis oder eine andere Wissensquelle zu studieren und Erkenntnisse über wichtige

    Informationen zu erzielen.

    Die Tabelle „Wissensgebiete“ enthält Vorschläge, welche Fertigkeiten zu den verschiedenen Wissens-

    Wissensgebiete gebieten passen.

    Fertigkeit Gebiete

    Arkane Zauber, magische Gegenstände,

    Kunde mystische Symbole, magische Traditionen,

    Existenzebenen und bestimmte Kreaturen (Aberrationen, Elementare, Feenwesen,

    Konstrukte und Monstrositäten)

    Geschichte Historische Ereignisse und Völker, vergangene Zivilisationen, Kriege und bestimmte Kreaturen (Riesen und

    Humanoiden).

    Nachfor Fallen, Geheimschriften, Rätsel und schungen Apparaturen

    Naturkunde Gelände, Flora, Wetter und bestimmte

    Kreaturen (Drachen, Pflanzen, Schlicke,

    Tiere)

    Religion Gottheiten, religiöse Hierarchien und Riten, heilige Symbole, Kulte und bestimmte Kreaturen (celestische

    Wesen, Unholde und Untote)'
  rule book: SRD 5.2.1
- name: Sturz (Gefahr)
  beschreibung: 'Am Ende eines Sturzes erleidet eine Kreatur 1W6 Wuchtschaden pro drei Meter, die sie gestürzt ist (höchstens
    20W6). Nach dem Sturz hat sie den

    Zustand Liegend, sofern sie den Schaden durch den Sturz nicht vermeiden konnte.

    Wenn eine Kreatur in Wasser oder eine andere

    Flüssigkeit stürzt, kann sie ihre Reaktion verwenden und einen SG-15-Geschicklichkeitswurf (Akrobatik)

    oder -Stärkewurf (Athletik) ausführen, um mit dem Kopf oder den Füßen voran aufzukommen.

    Bei einem Erfolg wird der Fallschaden halbiert.'
  rule book: SRD 5.2.1
- name: Suchen (Aktion)
  beschreibung: 'Wenn du die Suchen-Aktion ausführst, führst du einen Weisheitswurf aus, um etwas zu finden oder zu erfahren,
    was nicht offenkundig ist. In der Tabelle „Suchen“ findest du Vorschläge, welche Fertigkeiten bei dieser Aktion gelten
    – je nachdem, was du finden

    Suchen willst.

    Fertigkeit Suche nach ...

    Heilkunde Krankheit oder Todesursache einer Kreatur

    Motiv erkennen Geisteszustand einer Kreatur

    Überlebenskunst Spuren oder Nahrung

    Wahrnehmung Verborgene Kreatur/verborgener

    Gegenstand'
  rule book: SRD 5.2.1
- name: Taub (Zustand)
  beschreibung: 'Wenn du den Zustand Taub hast, wirkt folgender

    Nicht hörfähig:

    Effekt auf dich:

    Du kannst nicht hören, und jeder Attributswurf, der Hörvermögen erfordert, misslingt automatisch.'
  rule book: SRD 5.2.1
- name: Telepathie
  beschreibung: 'Telepathie ist eine magische Fähigkeit, die Kreaturen gestattet, auf eine bestimmte Reichweite mental mit
    anderen Kreaturen zu kommunizieren. Sofern keine

    Regel etwas anderes besagt, muss die kontaktierte

    Kreatur keine Sprache mit dem Telepathen teilen, um die Kommunikation zu verstehen. Sie muss jedoch mindestens eine Sprache
    verstehen oder selbst telepathisch sein.

    Der Telepath braucht die kontaktierte Kreatur nicht zu sehen, und er kann den telepathischen

    Kontakt jederzeit herstellen oder beenden (keine

    Aktion erforderlich). Der telepathische Kontakt kann nicht begonnen werden oder bricht sofort ab, wenn der Telepath oder
    die andere Kreatur kampfunfähig wird. Der Kontakt bricht auch dann ab, wenn die kontaktierte Kreatur die Reichweite der
    Telepathie verlässt oder der Telepath eine andere Kreatur in Reichweite kontaktiert.

    Kreaturen ohne Telepathie können telepathische

    Nachrichten empfangen, jedoch selbst kein telepathisches Gespräch beginnen. Wenn ein telepathisches Gespräch beginnt,
    kann der Nicht-

    Telepath mental mit dem Telepathen kommunizieren, bis die telepathische Verbindung endet.'
  rule book: SRD 5.2.1
- name: Teleportation
  beschreibung: 'Teleportation ist eine besondere Art von magischem Transport. Wenn du dich teleportierst, verschwindest du
    und erscheinst unmittelbar irgendwo anders, ohne dich durch den Raum dazwischen bewegt zu haben. Dieser Transport verbraucht
    keine Bewegung, sofern nicht eine Regel etwas anderes besagt. Teleportation provoziert niemals Gelegenheitsangriffe.

    Wenn du dich teleportierst, wird jede Ausrüstung, die du trägst oder hältst, mit dir teleportiert.

    Berührst du während der Teleportation eine andere Kreatur, so wird diese Kreatur nicht mit dir teleportiert, sofern beim
    Teleportationseffekt nicht anders vermerkt.

    Wenn der Zielbereich der Teleportation von einer anderen Kreatur besetzt oder von einem massiven

    Hindernis blockiert ist, erscheinst du stattdessen im nächsten freien Bereich deiner Wahl.

    In der Beschreibung des Teleportationseffekts erfährst du, ob du den Zielort der Teleportation sehen können musst.'
  rule book: SRD 5.2.1
- name: Temporäre Trefferpunkte
  beschreibung: 'Temporäre Trefferpunkte werden durch bestimmte

    Siehe auch Effekte gewährt. Sie fungieren als Puffer, um weniger echte Trefferpunkte zu verlieren.

    „Die Spielregeln“ („Schaden und Heilung“).'
  rule book: SRD 5.2.1
- name: Todesrettungswurf
  beschreibung: 'Wenn Spielercharakter seinen Zug mit 0 Treffer-

    Siehe auch punkten beginnt, muss er einen Todesrettungswurf ausführen. „Die Spielregeln“ („Schaden und Heilung“).'
  rule book: SRD 5.2.1
- name: Tot
  beschreibung: 'Eine tote Kreatur hat keine Trefferpunkte und kann

    Tote erwecken auch keine zurückerhalten, sofern sie nicht zunächst

    Wiederbeleben durch Magie wie die Zauber oder wiederbelebt wird. Wenn ein solcher

    Zauber gewirkt wird, weiß der Geist, wer ihn wirkt, und kann sich weigern. Der Geist einer toten Kreatur hat den Körper
    verlassen und sich auf die Äußeren

    Ebenen begeben. Um die Kreatur wiederzubeleben, muss der Geist zurückgerufen werden.

    Wenn die Kreatur ins Leben zurückkehrt, werden ihre aktuellen Trefferpunkte durch den wiederbelebenden Effekt bestimmt.
    Sofern nicht anders angegeben, wirken alle Zustände, magischen

    Krankheiten und Flüche auf die wiederbelebte

    Kreatur, die auch zum Zeitpunkt ihres Todes auf sie gewirkt haben, sofern die jeweiligen Wirkungsdauern noch nicht abgelaufen
    sind. Wenn die Kreatur mit

    Erschöpfungsstufen gestorben ist, kehrt sie mit einer Erschöpfungsstufe weniger ins Leben zurück.

    War die Kreatur auf mindestens einen magischen

    Gegenstand eingestimmt, so ist sie dies jetzt nicht mehr.'
  rule book: SRD 5.2.1
- name: Traglast
  beschreibung: 'Deine Größe und dein Stärkewert bestimmen das maximale Gewicht in Kilogramm, das du tragen kannst, wie in
    der Tabelle „Traglast“ dargestellt.

    In der Tabelle ist außerdem aufgeführt, welches

    Gewicht du höchstens ziehen, anheben und schieben kannst.

    Wenn du ein Gewicht ziehst, anhebst oder schiebst, das deine Traglast überschreitet, beträgt

    Traglast deine Bewegungsrate höchstens 1,5 Meter.

    Anheben/

    Kreaturengröße Tragen Schieben/Ziehen

    Winzig Stä. × 3,75 kg Stä. × 7,5 kg

    Klein/Mittelgroß Stä. × 7,5 kg Stä. × 15 kg

    Groß Stä. × 15 kg Stä. × 30 kg

    Riesig Stä. × 30 kg Stä. × 60 kg

    Gigantisch Stä. × 60 kg Stä. × 120 kg'
  rule book: SRD 5.2.1
- name: Trefferpunkte
  beschreibung: 'Trefferpunkte (TP) sind ein Maß dafür, wie schwierig es ist, eine Kreatur zu töten oder einen

    Gegenstand zu zerstören. Schaden verringert

    Trefferpunkte, Heilung stellt Trefferpunkte wieder her. Deine Trefferpunkte können dein

    Trefferpunktemaximum nicht überschreiten,

    Siehe auch und du kannst nicht weniger als 0 Trefferpunkte haben. „Gegenstände zerstören“ und „Die Spielregeln“ („Schaden
    und Heilung“).'
  rule book: SRD 5.2.1
- name: Trefferpunktewürfel
  beschreibung: 'Trefferpunktewürfel oder kurz Trefferwürfel helfen, das Trefferpunktemaximum eines Spieler- charakters zu
    ermitteln, wie unter „Charakterer- stellung“ erläutert. Auch die meisten Monster haben Trefferwürfel. Kreaturen können
    während

    Siehe auch einer kurzen Rast Trefferwürfel verbrauchen, um Trefferpunkte zurückzuerhalten.

    „Kurze Rast“.'
  rule book: SRD 5.2.1
- name: Überraschung
  beschreibung: 'Wenn eine Kreatur nicht mit einem Kampf

    Siehe auch gerechnet hat, wird sie überrascht und damit bei ihrem Initiativewurf im Nachteil.

    „Die Spielregeln“ („Kampf“).'
  rule book: SRD 5.2.1
- name: Übung
  beschreibung: 'Wenn du Übung in etwas hast, kannst du jeder

    W20-Prüfung, die du damit ausführst, deinen

    Übungsbonus hinzufügen. Eine Kreatur könnte

    Übung in einer Fertigkeit, einem Rettungswurf

    Siehe auch oder im Umgang mit einer Waffe oder einem

    Werkzeug haben. „Die Spielregeln“ („Übung“).'
  rule book: SRD 5.2.1
- name: Unsichtbar (Zustand)
  beschreibung: 'Wenn du den Zustand Unsichtbar hast, wirken

    Überraschung:

    folgende Effekte auf dich:

    Wenn du beim Auswürfeln der

    Initiative unsichtbar bist, so bist du bei diesem

    Verborgen:

    Wurf im Vorteil.

    Du bist nicht von Effekten betroffen, die erfordern, dass du gesehen wirst, sofern der

    Effektwirker keine Möglichkeiten hat, dich trotz deiner Unsichtbarkeit zu sehen. Ausrüstung,

    Beeinträchtigte Angriffe:

    die du trägst oder hältst, ist ebenfalls verborgen.

    Angriffswürfe gegen dich sind im Nachteil, und du bist bei deinen

    Angriffswürfen im Vorteil. Wenn eine Kreatur

    Möglichkeiten hat, dich trotz deiner Unsichtbarkeit zu sehen, erhältst du diesen Vorzug gegen diese

    Kreatur nicht.'
  rule book: SRD 5.2.1
- name: Unterernährung (Gefahr)
  beschreibung: 'Kreaturen benötigen täglich eine gewisse Menge von Nahrung je nach ihrer Größe, wie in der Tabelle „Täglicher
    Nahrungsbedarf“ dargestellt. Eine Kreatur, die weniger als die Hälfte der täglich erforderlichen

    Nahrungsmenge zu sich nimmt, muss einen SG-10-

    Konstitutionsrettungswurf bestehen, oder sie erhält am Ende des Tages eine Erschöpfungsstufe. Eine

    Kreatur, die fünf Tage lang nichts isst, erhält am Ende des fünften Tages automatisch eine Erschöpfungs stufe sowie am
    Ende jedes weiteren Tages ohne Nahrung eine zusätzliche Erschöpfungsstufe.

    Erschöpfung durch Unterernährung kann nicht entfernt werden, ehe die Kreatur nicht die

    Siehe auch vollständige Tagesmenge an Nahrung zu sich nimmt.

    Täglicher „Erschöpfung“. Nahrungsbedarf

    Größe Nahrung Größe Nahrung

    Winzig 125 Gramm Groß 2 Kilogramm

    Klein 500 Gramm Riesig 8 Kilogramm

    Mittel 500 Gramm Gigantisch 32 Kilogramm'
  rule book: SRD 5.2.1
- name: Verängstigt (Zustand)
  beschreibung: 'Wenn du den Zustand Verängstigt hast, wirken

    Beeinträchtigte Attributs- und Angriffswürfe:

    folgende Effekte auf dich:

    Du bist bei Attributs- und Angriffswürfen im Nachteil, solange du dich in der Sichtlinie der Quelle deiner

    Keine Annäherung möglich:

    Furcht befindest.

    Du kannst dich nicht willentlich auf die Quelle deiner Furcht zubewegen.'
  rule book: SRD 5.2.1
- name: Verbündeter
  beschreibung: Eine Kreatur ist dein Verbündeter, wenn sie Mitglied deiner Abenteurergruppe oder dein Freund ist, im Kampf
    auf deiner Seite steht oder von den Regeln oder vom SL als dein Verbündeter bestimmt wurde.
  rule book: SRD 5.2.1
- name: Vergiftet (Zustand)
  beschreibung: 'Wenn du den Zustand Vergiftet hast, wirkt

    Beeinträchtigte Attributs- und Angriffswürfe:

    folgender Effekt auf dich:

    Du bist bei Angriffs- und Attributswürfen im Nachteil.'
  rule book: SRD 5.2.1
- name: Verstecken (Aktion)
  beschreibung: 'Mit der Verstecken-Aktion versuchst du dich zu verbergen. Dazu musst du einen SG-15-Geschick- lichkeitswurf
    (Heimlichkeit) bestehen, während du entweder komplett verschleiert bist oder dich hinter Dreivierteldeckung oder vollständiger

    Deckung befindest. Außerdem darfst du dich nicht in der Sichtlinie von Gegnern befinden: Kannst du eine Kreatur sehen,
    so kannst du beurteilen, ob sie dich ebenfalls sehen kann.

    Bei einem Erfolg hast du den Zustand

    Unsichtbar, solange du versteckt bist. Notiere das Gesamtergebnis deines Wurfs – es dient als

    SG für Kreaturen, die versuchen, dich mit einem

    Weisheitswurf (Wahrnehmung) aufzuspüren.

    Du hörst sofort auf, versteckt zu sein, wenn eines der folgenden Ereignisse eintritt: Du machst ein

    Geräusch, das lauter als ein Flüstern ist, ein Gegner spürt dich auf, du führst einen Angriffswurf aus, oder du wirkst
    einen Zauber mit Verbalkomponente.'
  rule book: SRD 5.2.1
- name: Versteinert (Zustand)
  beschreibung: 'Wenn du den Zustand Versteinert hast, wirken

    In unbelebte Substanz verwandelt:

    folgende Effekte auf dich:

    Du wirst mit allen nichtmagischen Gegenständen, die du trägst oder hältst, in eine massive unbelebte Substanz (normalerweise
    Stein) verwandelt. Dein Gewicht erhöht sich auf das Zehnfache, und du hörst auf

    Kampfunfähig:

    zu altern.

    Keine Bewegungsrate:

    Du hast den Zustand Kampfunfähig.

    Deine Bewegungsrate

    Beeinträchtigte Angriffe:

    beträgt 0 und kann nicht erhöht werden.

    Angriffswürfe gegen

    Beeinträchtigte Rettungswürfe:

    dich sind im Vorteil.

    Du scheiterst bei Stärke- und Geschicklichkeitsrettungswürfen

    Resistenz gegen Schaden:

    automatisch.

    Du bist gegen alle

    Immunität gegen Gift:

    Schadensarten resistent.

    Du bist gegen den Zustand

    Vergiftet immun.'
  rule book: SRD 5.2.1
- name: Verwenden (Aktion)
  beschreibung: 'Normalerweise interagierst du im Rahmen einer anderen Aktion mit Gegenständen – wenn du beispielsweise im
    Rahmen der Angriffsaktion das

    Schwert ziehst. Wenn eine Aktion erforderlich ist, um einen Gegenstand zu verwenden, führst du die

    Verwenden-Aktion aus.'
  rule book: SRD 5.2.1
- name: Vorbereiten (Aktion)
  beschreibung: 'Du führst die Vorbereiten-Aktion aus, um auf bestimmte Umstände zu warten, ehe du handelst.

    Dazu führst du in deinem Zug diese Aktion aus, die dich dann vor Beginn deines nächstes Zugs handeln lässt, indem du deine
    Reaktion ausführst.

    Zunächst musst du festlegen, welcher wahrnehm- bare Umstand deine Reaktion auslösen soll. Dann legst du fest, welche Handlung
    du vollziehen willst, wenn der Umstand eintritt. Dies kann eine Aktion, aber auch eine Bewegung bis zum vollen Umfang
    deiner Bewegungsrate sein. Beispiel: „Wenn der

    Kultist die Falltür betritt, bediene ich den Hebel, der sie öffnet“. Oder: „Wenn der Zombie sich neben mich stellt, bewege
    ich mich weg.“

    Wenn der Auslöser eintritt, kannst du entweder deine Reaktion unmittelbar danach ausführen oder den Auslöser ignorieren.

    Bereitest du einen Zauberspruch vor, so wirkst du ihn wie gewohnt (und verbrauchst dabei die erforderlichen Ressourcen),
    setzt seinen Effekt aber erst dann mit deiner Reaktion frei, wenn der Auslöser eintritt. Es können nur Zauber mit einem
    Zeitaufwand von einer Aktion vorbereitet werden, und das Aufrechterhalten ihrer Magie erfordert Konzentration, die du
    bis zum Beginn deines nächsten Zugs aufrechterhalten kannst.

    Wenn deine Konzentration unterbrochen wird, misslingt der Zauber.'
  rule book: SRD 5.2.1
- name: Vorteil
  beschreibung: 'Wenn du bei einer W20-Prüfung im Vorteil bist, würfle mit zwei W20 und verwende das höhere

    Ergebnis. Für einen Würfelwurf kann nur jeweils ein Vorteil gelten. Vorteil und Nachteil, die für

    Siehe auch denselben Wurf gelten, heben einander auf.

    „Die Spielregeln“ („W20-Prüfungen“).'
  rule book: SRD 5.2.1
- name: W20-Prüfung
  beschreibung: 'W20-Prüfungen umfassen die drei wichtigsten

    W20-Würfe des Spiels: Attributswürfe, Angriffs- würfe und Rettungswürfe. Wenn etwas im Spiel

    W20-Prüfungen beeinflusst, so gilt dies für alle drei Arten. Der SL bestimmt, ob eine W20-Prüfung

    Siehe auch unter den gegebenen Umständen angebracht ist.

    „Die Spielregeln“ („W20-Prüfungen“).'
  rule book: SRD 5.2.1
- name: Waffe
  beschreibung: 'Eine Waffe ist ein Gegenstand aus einer der

    Siehe auch Kategorien Einfache Waffe und Kriegswaffe.

    „Ausrüstung“ („Waffen“).'
  rule book: SRD 5.2.1
- name: Waffenangriff
  beschreibung: Siehe auch Ein Waffenangriff ist ein Angriffswurf, der mit einer Waffe ausgeführt wird. „Waffe“.
  rule book: SRD 5.2.1
- name: Waffenloser Angriff
  beschreibung: 'Anstatt einer Waffe kannst du als Nahkampfangriff auch einen Fausthieb, einen Tritt, einen Kopfstoß oder
    einen ähnlich kraftvollen Hieb einsetzen.

    Nach den Spielbegriffen ist dies ein waffenloser

    Angriff – ein Nahkampfangriff, bei dem du deinen

    Körper einsetzt, um einem Ziel im Abstand von bis zu 1,5 Metern von dir Schaden zuzufügen, um es zu packen oder zu stoßen.

    Wann immer du deinen waffenlosen Angriff einsetzt, wähle als Effekt eine der folgenden

    Schaden:

    Optionen aus:

    Du führst einen Angriffswurf gegen das Ziel aus. Dein Bonus auf den Wurf entspricht deinem Stärkemodifikator plus deinem

    Übungsbonus. Bei einem Treffer erleidet das

    Ziel Wuchtschaden in Höhe von 1 plus deinem

    Packen:

    Stärkemodifikator.

    Das Ziel muss einen Stärke- oder

    Geschicklichkeitsrettungswurf (nach seiner

    Wahl) bestehen, oder es wird gepackt. Der SG für den Rettungswurf und alle Befreiungsversuche entspricht 8 plus deinem
    Stärkemodifikator plus deinem Übungsbonus. Du kannst ein Ziel nur dann packen, wenn es um höchstens eine Kategorie

    Siehe auch größer als du ist und du eine Hand frei hast, um

    Stoßen:

    damit zuzupacken. „Gepackt halten“.

    Das Ziel muss einen Stärke- oder

    Geschicklichkeitsrettungswurf (nach seiner Wahl)

    bestehen, anderenfalls stößt du es entweder 1,5 Meter von dir weg, oder du stößt es um, sodass es den

    Zustand Liegend hat. Der SG für den Rettungswurf entspricht 8 plus deinem Stärkemodifikator plus deinem Übungsbonus. Ein
    solcher Stoß ist nur dann möglich, wenn das Ziel um höchstens eine Kategorie größer als du ist.'
  rule book: SRD 5.2.1
- name: Wahrer Blick
  beschreibung: 'Wenn du über Wahrer Blick verfügst, ist dein

    Sehvermögen auf eine bestimmte Reichweite verbessert. Auf diese Reichweite durchdringt

    Dunkelheit:

    deine Sicht Folgendes:

    Du kannst in normaler sowie

    Unsichtbarkeit:

    magischer Dunkelheit sehen.

    Du kannst Kreaturen und

    Gegenstände sehen, die den Zustand Unsichtbar

    Visuelle Illusionen:

    haben.

    Visuelle Illusionen erscheinen dir durchsichtig, und Rettungswürfe gegen sie

    Verwandlungen:

    bestehst du automatisch.

    Du erkennst die wahre Gestalt aller Kreaturen und Gegenstände, die du siehst

    Ätherebene:

    und die durch Magie verwandelt wurden.

    Du kannst in die Ätherebene blicken.'
  rule book: SRD 5.2.1
- name: Weitsprung
  beschreibung: 'Bei einem Weitsprung springst du bis zu einer

    Anzahl von Metern, die einem Drittel deines

    Stärkewerts entspricht, sofern du unmittelbar vor dem Sprung mindestens drei Meter zurückgelegt hast. Bei einem Weitsprung
    aus dem Stand kannst du nur halb so weit springen. In beiden Fällen kostet dich jeder gesprungene Meter einen Meter deiner

    Bewegungsrate.

    Wenn du in schwierigem Gelände landest, musst du einen SG-10-Geschicklichkeitswurf (Akrobatik)

    bestehen, um auf den Füßen zu landen. Bei einem

    Misserfolg hast du den Zustand Liegend.

    Diese Weitsprung-Regel geht davon aus, dass die

    Höhe des Sprungs keine Rolle spielt (wie bei einem

    Sprung über einen Fluss oder eine Felsspalte).

    Der SL kann einen erfolgreichen SG-10-Stärkewurf (Athletik) von dir verlangen, wenn du ein niedriges

    Hindernis wie eine Hecke oder eine niedrige Mauer (nicht höher als ein Viertel deiner Sprungdistanz)

    überwinden willst. Misslingt der Wurf, so kollidierst du mit dem Hindernis.'
  rule book: SRD 5.2.1
- name: Wertekasten
  beschreibung: 'Ein Wertekasten enthält die Spielwerte eines

    Monsters. Jeder Wertekasten enthält nach dem

    Größe:

    Namen des Monsters folgende Informationen:

    Die möglichen Größenkategorien lauten

    Siehe auch Winzig, Klein, Mittelgroß, Groß, Riesig und

    Kreaturentyp:

    Gigantisch. „Größe“.

    In diesem Eintrag ist die Kreaturen-

    Siehe auch familie des Monsters angegeben, gegebenenfalls mit beschreibenden Bezeichnungen.

    Gesinnung:

    „Kreaturentyp“.

    Die Gesinnung ist ein Vorschlag für

    Siehe auch das Monster. Der SL bestimmt seine tatsächliche

    RK, Initiative und TP:

    Gesinnung. „Gesinnung“.

    Diese Einträge nennen

    Rüstungsklasse, Initiative und Trefferpunkte des Monsters, jeweils unter „Die Spielregeln“ beschrieben. Hinter den Trefferpunkten
    sind die

    Trefferpunktewürfel des Monsters in Klammern angegeben, außerdem gegebenenfalls der Beitrag seiner Konstitution zu seinen
    Trefferpunkten.

    Nach dem Initiativemodifikator ist ein Initiativewert genannt. Manche Kreaturen, die auf magische Art erzeugt wurden,
    haben weder Trefferwürfel- noch

    Bewegungsrate:

    Initiativeinformationen.

    Hier sind Bewegungsrate

    Siehe auch und vorhandene besondere Bewegungsraten des

    Monsters aufgeführt. „Flugbewegungsrate“, „Grabbewegungsrate“, „Kletterbewegungsrate“

    Attributswerte:

    und „Schwimmbewegungsrate“.

    Die Attributswerte, Modifikatoren und Rettungswurfmodifikatoren eines Monsters, jeweils unter „Die Spielregeln“ beschrieben,
    lassen sich einer Tabelle entnehmen.

    Fertigkeiten:

    Dieser Eintrag führt Fertigkeiten

    Siehe auch und vorhandene Übungen des Monsters auf.

    Resistenzen und Anfälligkeiten:

    „Die Spielregeln“ („Übung“).

    Diese Einträge

    Siehe auch listen die vorhandenen Resistenzen und Anfällig- keiten des Monsters auf. „Resistenz“

    Immunitäten:

    und „Anfälligkeit“.

    In diesem Abschnitt sind die

    Siehe auch Schadens- und Zustandsimmunitäten eines Monsters

    Ausrüstung:

    angegeben, sofern vorhanden. „Immunität“.

    Wenn das Monster über Ausrüstung verfügt, die weggegeben oder genommen werden

    Sinne:

    kann, ist sie in diesem Eintrag aufgeführt.

    Dieser Eintrag nennt die Spezialsinne

    Siehe auch des Monsters, beispielsweise Dunkelsicht, sowie seine passive Wahrnehmung. „Passive

    Sprachen:

    Wahrnehmung“.

    In diesem Eintrag sind alle Sprachen

    HG:

    aufgeführt, die das Monster kennt.

    Der Herausforderungsgrad fasst zusammen, wie groß die Bedrohung durch das Monster ist.

    Unter „Monster“ ist dieser Wert genauer beschrieben.

    Danach sind die Erfahrungspunkte, die Charaktere bei einem Sieg über das Monster erhalten, sowie der Übungsbonus des Monsters
    aufgeführt. Manche

    Siehe auch Kreaturen, die auf magische Art erzeugt wurden, haben keinen HG. „Herausforderungsgrad“

    Merkmale:

    und „Erfahrungspunkte“.

    Hierbei handelt es sich um Merkmale des Monsters, die entweder immer oder in bestimmte

    Aktionen:

    Situationen aktiv sind.

    Das Monster kann die hier aufgeführten

    Siehe auch Aktionen zusätzlich zu den in diesem Glossar beschriebenen ausführen. „Die Spielregeln“

    Bonusaktionen:

    („Aktionen“).

    Wenn dem Monster Bonus- aktionen zur Verfügung stehen, sind diese hier

    Reaktionen:

    aufgeführt.

    Wenn das Monster besondere

    Reaktionen ausführen kann, sind diese hier

    Angriffsnotation:

    aufgeführt.

    Der Eintrag zu einem Monster- angriff beginnt mit der Information, ob es sich um einen Nahkampf- oder einen Fernkampfangriff
    handelt, gefolgt vom Bonus des Angriffswurfs, den Reichweiten und der Wirkung eines Treffers.

    Ein Angriff wird jeweils gegen ein Ziel ausgeführt,

    Rettungswurf-Effektnotation:

    sofern es in seinem Eintrag nicht anders vermerkt ist.

    Wenn ein Effekt einen Rettungswurf erzwingt, werden im Eintrag des Effekts zunächst Art und SG des erforderlichen

    Rettungswurfs genannt, dann wird beschrieben, welche Kreaturen den Rettungswurf ausführen müssen und was geschieht, wenn
    sie den Rettungs- wurf bestehen oder dabei scheitern.

    Schadensnotation:

    Im Wertekasten werden für jede Schadensinstanz üblicherweise sowohl eine fixe Zahl als auch ein Würfelausdruck angegeben.

    Beispiel: Ein Angriff könnte bei einem Treffer 4 (1W4+2) Schaden bewirken. Der SL bestimmt, ob die fixe Zahl oder der
    Würfelausdruck in

    Klammern verwendet werden. Es wird nicht beides verwendet.'
  rule book: SRD 5.2.1
- name: Wirkungsbereich
  beschreibung: 'In den Beschreibungen vieler Zauber und anderer

    Merkmale ist ein Wirkungsbereich angegeben, der üblicherweise eine von sechs Formen annimmt.

    Diese Formen sind ebenfalls in diesem Glossar

    Ausströmung Kugel Würfel definiert:

    Kegel Linie Zylinder

    Jeder Wirkungsbereich hat einen Ursprungspunkt –

    jenen Ort, von dem der Effekt des Zaubers ausgeht.

    Die Regeln der jeweiligen Form legen fest, wo sich der Ursprungspunkt befindet. Wenn alle geraden

    Linien vom Ursprungspunkt zu einem bestimmten

    Ort im Wirkungsbereich blockiert sind, ist dieser

    Ort nicht im Wirkungsbereich enthalten.

    Siehe auch Ein Hindernis muss vollständige Deckung bieten, um eine Linie zu blockieren. „Deckung“.

    Platziert der Wirker eines Wirkungsbereichs diesen an einem Punkt, den er nicht sehen kann, und liegt zwischen ihm und
    diesem Punkt ein

    Hindernis wie eine Mauer, so wird der Ursprungs- punkt des Wirkungsbereichs auf der dem Wirker zugewandten Seite des Hindernisses
    platziert.'
  rule book: SRD 5.2.1
- name: Würfel (Wirkungsbereich)
  beschreibung: 'Ein Würfel ist ein Wirkungsbereich, der in geraden

    Linien von einem Ursprungspunkt an einer beliebigen

    Stelle auf einer der Würfelseiten ausgeht. Der Effekt, der den Würfel erzeugt, definiert dessen Größe in

    Form seiner Kantenlänge.

    Der Ursprungspunkt eines Würfels ist nicht im

    Wirkungsbereich enthalten, es sei denn, der Wirker beschließt dies.'
  rule book: SRD 5.2.1
- name: Zauber
  beschreibung: Ein Zauber ist ein magischer Effekt mit den unter „Zauber“ beschriebenen Eigenschaften.
  rule book: SRD 5.2.1
- name: Zauberangriff
  beschreibung: 'Ein Zauberangriff ist ein Angriffswurf, der im

    Siehe auch Rahmen eines Zaubers oder eines anderen magische

    Effekts ausgeführt wird. „Zauber“ („Zauber wirken“).'
  rule book: SRD 5.2.1
- name: Zauberfokus
  beschreibung: 'Ein Zauberfokus ist ein Gegenstand, den bestimmte

    Kreaturen anstelle der Materialkomponenten eines Zaubers verwenden können, sofern diese

    Materialien vom Zauber nicht verbraucht werden und keine Kosten für sie angegeben sind. Manche

    Klassen erlauben ihren Mitgliedern, bestimmte

    Siehe auch Arten von Zauberfokussen zu verwenden.

    „Zauber“ („Zauber wirken“).'
  rule book: SRD 5.2.1
- name: Zaubertrick
  beschreibung: 'Ein Zaubertrick ist ein Zauber des 0. Grades, der

    Siehe auch gewirkt werden kann, ohne einen Zauberplatz zu verbrauchen. „Zauber“.'
  rule book: SRD 5.2.1
- name: Ziel
  beschreibung: 'Ziel sind Kreaturen oder Gegenstände, gegen die sich ein Angriffswurf richtet, die zu einem

    Rettungswurf gezwungen oder für die Effekte eines

    Zaubers oder sonstigen Phänomens ausgewählt werden.'
  rule book: SRD 5.2.1
- name: Zustand
  beschreibung: 'Ein Zustand ist ein vorübergehender Spielstatus.

    In der Definition des Zustands ist angegeben, wie er auf die betroffene Kreatur wirkt. Verschiedene

    Regeln definieren, wie ein Zustand beendet werden kann. In diesem Glossar werden folgende Zustände

    Betäubt Festgesetzt Taub definiert:

    Bewusstlos Gelähmt Unsichtbar

    Bezaubert Gepackt Verängstigt

    Blind Kampfunfähig Vergiftet

    Erschöpft Liegend Versteinert

    Ein Zustand kann sich nicht auf sich selbst addieren:

    Entweder hat eine Kreatur einen bestimmten Zustand, oder sie hat ihn nicht. Die einzige Ausnahme dieser

    Regel ist der Zustand Erschöpft.'
  rule book: SRD 5.2.1
- name: Zylinder (Wirkungsbereich)
  beschreibung: 'Ein Zylinder ist ein Wirkungsbereich, der in geraden

    Linien von einem Ursprungspunkt in der Mitte einer der kreisförmigen Stirnseiten des Zylinders ausgeht. Der Effekt, der
    den Zylinder erzeugt, definiert den Radius der Zylinderbasis sowie die Höhe des Zylinders.

    Der Ursprungspunkt des Zylinders ist im

    Wirkungsbereich des Zaubers enthalten.'
  rule book: SRD 5.2.1
