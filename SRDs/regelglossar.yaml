- name: Begegnung
  beschreibung: 'Eine Begegnung ist eine Szene in einem Abenteuer, die Teil von mindestens einer der drei Säulen des Siehe
    auch Spiels ist: soziale Interaktion, Erkundung oder Kampf. „Die Spielregeln“ („Soziale'
  Regelbuch: SRD 5.2.1
