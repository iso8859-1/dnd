talente:
- name: Gabe des Dimensionsreisens
  typ: 'Epische-Gabe-Talent (Voraussetzung: min. 19. Stufe)'
  beschreibung: 'Du erhältst folgende Vorzüge: Attributswerterhöhung: Ein Attributswert deiner Wahl wird um 1 Punkt erhöht
    (auf höchstens 30). Flimmerschritte: Sofort, nachdem du die Angriffs aktion oder die magische Aktion ausgeführt hast,
    kannst du dich bis zu neun Meter weit in einen freien Bereich teleportieren, den du sehen kannst.'
  Regelbuch: SRD 5.2.1
- name: Gabe der Kampffertigkeit
  typ: 'Epische-Gabe-Talent (Voraussetzung: min. 19. Stufe)'
  beschreibung: 'Du erhältst folgende Vorzüge: Attributswerterhöhung: Ein Attributswert deiner Wahl wird um 1 Punkt erhöht
    (auf höchstens 30). Unübertroffenes Zielen: Wenn du bei einem Angriffswurf nicht triffst, kannst du den Wurf in einen
    Treffer verwandeln. Wenn du diesen Vorzug angewendet hast, ist dies erst nach Beginn deines nächsten Zugs erneut möglich.'
  Regelbuch: SRD 5.2.1
- name: Gabe des Nachtgeists
  typ: 'Epische-Gabe-Talent (Voraussetzung: min. 19. Stufe)'
  beschreibung: 'Du erhältst folgende Vorzüge: Attributswerterhöhung: Ein Attributswert deiner Wahl wird um 1 Punkt erhöht
    (auf höchstens 30). Schattentarnung: In dämmrigem Licht oder Dunkelheit kannst du dich als Bonusaktion unsichtbar machen.
    Der Zustand endet sofort, nachdem du eine Aktion, eine Bonusaktion oder eine Reaktion ausgeführt hast. Schattige Gestalt:
    In dämmrigem Licht oder Dunkelheit bist du gegen alle Schadensarten außer Gleißend und Psychisch resistent.'
  Regelbuch: SRD 5.2.1
- name: Gabe des Schicksals
  typ: 'Epische-Gabe-Talent (Voraussetzung: min. 19. Stufe)'
  beschreibung: 'Du erhältst folgende Vorzüge: Attributswerterhöhung: Ein Attributswert deiner Wahl wird um 1 Punkt erhöht
    (auf höchstens 30). Schicksal verbessern: Wenn du oder eine andere Kreatur im Abstand von bis zu 18 Metern von dir eine
    W20-Prüfung ausführt, kannst du mit 2W4 würfeln und der W20-Prüfung das Gesamtergebnis als Bonus oder Malus hinzufügen.
    Du kannst diesen Vorzug erst nach einem Initiativewurf oder einer kurzen oder langen Rast erneut verwenden.'
  Regelbuch: SRD 5.2.1
- name: Gabe des Unwiderstehlichen Angriffs
  typ: 'Epische-Gabe-Talent (Voraussetzung: min. 19. Stufe)'
  beschreibung: 'Du erhältst folgende Vorzüge: Attributswerterhöhung: Dein Stärke- oder dein Geschicklichkeitswert wird um
    1 Punkt erhöht (auf höchstens 30). Verteidigung überwinden: Jeder Hieb-, Stichund Wuchtschaden, den du bewirkst, ignoriert
    entsprechende Resistenzen. Überwältigender Schlag: Wenn du bei einem Angriffswurf mit dem W20 eine 20 würfelst, kannst
    du dem Ziel zusätzlichen Schaden in Höhe des durch dieses Talent erhöhten Attributswerts zufügen. Der zusätzliche Schaden
    ist von der gleichen Art wie der Schaden des Angriffs.'
  Regelbuch: SRD 5.2.1
- name: Gabe des Wahren Blicks
  typ: 'Epische-Gabe-Talent (Voraussetzung: min. 19. Stufe)'
  beschreibung: 'Du erhältst folgende Vorzüge: Attributswerterhöhung: Ein Attributswert deiner Wahl wird um 1 Punkt erhöht
    (auf höchstens 30). Wahrer Blick: Du hast Wahrer Blick mit einer Reichweite von 18 Metern.'
  Regelbuch: SRD 5.2.1
- name: Gabe der Zaubererinnerung
  typ: 'Epische-Gabe-Talent (Voraussetzung: min. 19. Stufe, Merkmal Zauberwirken)'
  beschreibung: 'Du erhältst folgende Vorzüge: Attributswerterhöhung: Dein Intelligenz-, dein Weisheits- oder dein Charismawert
    wird um 1 Punkt erhöht (auf maximal 30). Freies Zauberwirken: Wann immer du einen Zauber mit einem Zauberplatz des 1.
    bis 4. Grades wirkst, würfle mit 1W4. Wenn das Würfelergebnis dem Grad des Zauberplatzes entspricht, so wird dieser nicht
    verbraucht.'
  Regelbuch: SRD 5.2.1
