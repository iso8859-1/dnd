    12W6 Blitzschaden. Erfolgreicher Rettungswurf: Halb so viel Schaden. 4Grün: Misslungener Rettungswurf: 12W6 Giftschaden.
    Erfolgreicher Rettungswurf: Halb so viel Schaden. 5Blau: Misslungener Rettungswurf: 12W6 Kälteschaden. Erfolgreicher Rettungswurf:
    Halb so viel Schaden. 6Indigoblau: Misslungener Rettungswurf: Das Ziel ist festgesetzt und führt am Ende jedes seiner
    Züge einen Konstitutionsrettungswurf aus. Bei drei erfolgreichen Rettungswürfen endet der Zustand. Bei drei misslungenen
