zauber:
- name: Ablenkung
  schule: Illusionszauber
  grad: 5. Grades
  klassen:
  - Barde
  - Hexenmeister
  - Magier
  zeitaufwand: Aktion
  reichweite: Selbst
  komponenten: S
  wirkungsdauer: Konzentration, bis zu 1 Stunde
  beschreibung: Du wirst unsichtbar, und gleichzeitig erscheint in deinem Bereich ein illusionärer Doppelgänger von dir. Dieser
    bleibt für die Wirkungsdauer bestehen, doch deine Unsichtbarkeit endet, sobald du einen Angriffswurf ausführst, Schaden
    bewirkst oder einen Zauber wirkst. Als magische Aktion kannst du deinen illusionären Doppelgänger bis zu deiner doppelten
    Bewegungs rate bewegen und ihn gestikulieren, sprechen und auf eine beliebige Art handeln lassen. Er ist immateriell und
    unverwundbar. Du kannst durch seine Augen sehen und durch seine Ohren hören, als befändest du dich am selben Ort.
- name: Alarm
  schule: Bannzauber
  grad: 1. Grades
  klassen:
  - Magier
  - Waldläufer
  zeitaufwand: 1 Minute oder Ritual
  reichweite: 9 Meter
  komponenten: V, G, M (Glocke und Silberdraht)
  wirkungsdauer: 8 Stunden
  beschreibung: 'Du erschaffst einen Alarm gegen Eindringen. Wähle eine Tür, ein Fenster oder einen Bereich in Reichweite
    aus, der nicht größer als ein Würfel mit sechs Metern Kantenlänge sein darf. Für die Wirkungsdauer warnt dich ein Alarm,
    wann immer eine Kreatur den geschützten Bereich berührt oder in ihn eindringt. Wenn du den Zauber wirkst, kannst du Kreaturen
    bestimmen, die den Alarm nicht auslösen. Außerdem wählst du aus, ob der Akustischer Alarm: Alarm akustisch oder mental
    erfolgt: Der Alarm erzeugt im Abstand von bis zu 18 Metern vom geschützten Bereich Mentaler Alarm: zehn Sekunden lang
    das Geräusch einer Handglocke. Du wirst von einem mentalen Ping gewarnt, wenn du dich im Abstand von bis zu 1,6 Kilometern
    vom geschützten Bereich befindest. Dieser Ping weckt dich, wenn du schläfst.'
- name: Ansteckung
  schule: Nekromantiezauber
  grad: 5. Grades
  klassen:
  - Druide
  - Kleriker
  zeitaufwand: Aktion
  reichweite: Berührung
  komponenten: V, G
  wirkungsdauer: 7 Tage
  beschreibung: Deine Berührung verursacht eine magische Krankheit. Das Ziel muss einen Konstitutions‑ rettungswurf bestehen,
    oder es erleidet 11W8 nekrotischen Schaden und ist vergiftet. Wähle außerdem ein Attribut aus, wenn du den Zauber wirkst.
    Das vergiftete Ziel ist bei Rettungswürfen mit dem ausgewählten Attribut im Nachteil. Das Ziel muss den Rettungswurf am
    Ende jedes seiner Züge wiederholen, bis es insgesamt drei Erfolge oder drei Misserfolge hatte. Bei drei Erfolgen endet
    der Zauber bei dem Ziel. Bei drei Misserfolgen wirkt der Zauber sieben Tage lang auf das Ziel. Wann immer das vergiftete
    Ziel einen Effekt erhält, der den Zustand Vergiftet beenden würde, muss es einen Konstitutionsrettungswurf bestehen, oder
    der Zustand Vergiftet endet nicht.
- name: Antimagisches Feld
  schule: Bannzauber
  grad: 8. Grades
  klassen:
  - Kleriker
  - Magier
  zeitaufwand: Aktion
  reichweite: Selbst
  komponenten: V, G, M (Eisenspäne)
  wirkungsdauer: Konzentration, bis zu 1 Stunde
  beschreibung: Du wirst von einer antimagischen Aura in einer Ausströmung von drei Metern umgeben. Im Bereich der Aura kann
    niemand Zauber wirken, magische Aktionen ausführen oder andere magische Effekte erzeugen, und Ziele innerhalb der Aura
    können nicht von Zaubern, magischen Aktionen und Effekten betroffen werden. Magische Eigenschaften von magischen Gegenständen
    funktionieren innerhalb der Aura nicht und haben auf nichts darin eine Wirkung. Wirkungsbereiche von Zaubern oder anderer
    Magie können sich nicht in die Aura erstrecken. Niemand kann sich in die Aura oder aus ihr heraus teleportieren, und auch
    Ebenenreisen sind in der Aura blockiert. Portale schließen sich, solange sie sich innerhalb der Aura befinden. Bereits
    wirksame Zauber werden im Bereich unterdrückt, sofern sie nicht von Artefakten oder Gottheiten gewirkt wurden. Solange
    ein Effekt unterdrückt wird, wirkt er nicht. Die Zeit, in der er unterdrückt ist, wird dennoch von seiner Magie bannen
    Wirkungsdauer abgezogen. Antimagisches-Feld hat innerhalb der Aura keinen Effekt. Auren, die durch mehrere ‑Zauber erzeugt
    wurden, heben einander nicht auf.
- name: Antipathie/Sympathie
  schule: Verzauberungszauber
  grad: 8. Grades
  klassen:
  - Barde
  - Druide
  - Magier
  zeitaufwand: 1 Stunde
  reichweite: 18 Meter
  komponenten: V, G, M (eine Mischung aus Essig und Honig)
  wirkungsdauer: 10 Tage
  beschreibung: 'Wähle beim Wirken des Zaubers aus, ob er Antipathie oder Sympathie erzeugen soll, und ziele auf eine Kreatur
    oder einen Gegenstand von höchstens riesiger Größe. Bestimme dann einen Kreaturentyp (beispielsweise rote Drachen, Goblins
    oder Vampire). Kreaturen der ausgewählten Art führen einen Weisheitsrettungswurf aus, wenn sie sich dem Ziel auf höchstens
    36 Meter nähern. Deine Entscheidung (Antipathie oder Sympathie) bestimmt, was mit einer Kreatur geschieht, wenn der Rettungswurf
    Antipathie: misslingt: Die Kreatur ist verängstigt. Die verängs‑ tigte Kreatur muss in ihren Zügen ihre Bewegung nutzen,
    um sich so weit wie möglich vom Ziel zu Sympathie: entfernen. Dabei nimmt sie die sicherste Route. Die Kreatur ist bezaubert.
    Die bezau‑ berte Kreatur muss in ihren Zügen ihre Bewegung nutzen, um sich dem Ziel so weit wie möglich zu nähern. Dabei
    nimmt sie die sicherste Route. Befindet sich die Kreatur im Abstand von bis zu 1,5 Metern vom Ziel, so kann sie sich nicht
    frei‑ willig entfernen. Wenn das Ziel der bezauberten Kreatur Schaden zufügt, kann diese einen Weis‑ heitsrettungswurf
    ausführen, um den Effekt wie Den Effekt beenden: unten beschrieben zu beenden. Wenn die verängstigte oder bezauberte Kreatur
    ihren Zug weiter als 36 Meter vom Ziel entfernt beendet, führt sie einen Weisheits‑ rettungswurf aus. Bei einem erfolgreichen
    Rettungs‑ wurf endet der Effekt des Ziels auf die Kreatur. Nach einem erfolgreichen Rettungswurf ist eine Kreatur eine
    Minute lang gegen den Effekt immun. Danach kann er erneut auf sie gewirkt werden.'
- name: Arkanes Auge
  schule: Erkenntniszauber
  grad: 4. Grades
  klassen:
  - Magier
  zeitaufwand: Aktion
  reichweite: 9 Meter
  komponenten: V, G, M (ein Stück Fledermausfell)
  wirkungsdauer: Konzentration, bis zu 1 Stunde
  beschreibung: Du erschaffst ein unsichtbares und unverwundbares Auge in Reichweite, das für die Wirkungsdauer in der Luft
    schwebt. Es kann in jede Richtung blicken und übermittelt dir mental seine visuellen Informationen. Außerdem verfügt es
    über Dunkelsicht mit einer Reichweite von neun Metern. Als Bonusaktion kannst du das Auge bis zu neun Meter weit in eine
    beliebige Richtung bewegen. Außerdem kann es nicht durch massive Barrieren gelangen, jedoch Öffnungen mit mindestens 2,5
    Zentimetern Durchmesser passieren.
- name: Arkane Hand
  schule: Hervorrufungszauber
  grad: 5. Grades
  klassen:
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 36 Meter
  komponenten: V, G, M (eine Eierschale und ein Handschuh)
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: 'Du erschaffst eine große Hand aus schimmernder magischer Energie in einem freien Bereich in Reichweite, den
    du sehen kannst. Die Hand bleibt für die Wirkungsdauer bestehen. Sie bewegt sich auf deinen Befehl und imitiert die Bewegungen
    deiner eigenen Hand. Die Hand ist ein Gegenstand und besitzt eine RK von 20. Ihre Trefferpunkte entsprechen deinem Trefferpunktemaximum.
    Wenn ihre Trefferpunkte auf 0 sinken, endet der Zauber. Die Hand besetzt ihren Bereich nicht. Nach dem Wirken des Zaubers
    sowie als Bonus‑ aktion in deinen folgenden Zügen kannst du die Hand bis zu 18 Meter weit bewegen und einen der Blockierende
    Hand: folgenden Effekte bewirken: Die Hand gewährt dir Teildeckung gegen Angriffe und andere Effekte, die von ihrem Bereich
    ausgehen oder ihn durchqueren. Außerdem zählt ihr Bereich Geballte Faust: für deine Gegner als schwieriges Gelände. Die
    Hand schlägt ein Ziel im Abstand von bis zu 1,5 Metern von ihr. Führe einen Nahkampf‑Zauberangriff aus. Bei einem Greifende
    Hand: Treffer erleidet das Ziel 5W8 Energieschaden. Die Hand versucht, eine Kreatur von höchstens riesiger Größe im Abstand
    von bis zu 1,5 Metern von ihr zu packen. Das Ziel muss einen Geschicklichkeitsrettungswurf bestehen, oder es wird gepackt
    (der Flucht‑SG entspricht deinem Zauberrettungswurf‑SG). Solange die Hand das Ziel gepackt hat, kannst du eine Bonusaktion
    ausführen, damit sie es zerquetscht. Dabei fügt sie ihm Wuchtschaden in Höhe von 4W6 plus deinem Zauberwirken‑ Kraftvolle
    Hand: Attributsmodifikator zu. Die Hand versucht, eine Kreatur von höchstens riesiger Größe im Abstand von bis zu 1,5
    Metern von ihr zu stoßen. Das Ziel muss einen Stärkerettungswurf bestehen, oder die Hand schiebt es bis zu 1,5 Meter plus
    1,5‑mal deinen Zauberwirken-Attributsmodifikator (in Metern) weit in eine Richtung deiner Wahl. Die Hand bewegt sich mit
    dem Ziel und bleibt Verwenden von Zauberplätzen höheren Grades: im Abstand von bis zu 1,5 Metern von ihm. Für jeden Zauberplatzgrad
    über dem 5. wird der Schaden der geballten Faust um 2W8 und der Schaden der greifenden Hand um 2W6 erhöht.'
- name: Arkanes Schloss
  schule: Bannzauber
  grad: 2. Grades
  klassen:
  - Magier
  zeitaufwand: Aktion
  reichweite: Berührung
  komponenten: V, G, M (Goldstaub im Wert von mindestens 25 GM, den der Zauber verbraucht)
  wirkungsdauer: Bis der Zauber gebannt wird
  beschreibung: Du berührst eine geschlossene Tür, ein Fenster, ein Tor, einen Behälter oder eine Luke und verschließt diesen
    Gegenstand für die Wirkungsdauer auf magische Art. Dieses Schloss kann mit nichtmagischen Methoden nicht entfernt werden.
    Du und alle Kreaturen, die du beim Wirken des Zaubers bestimmst, könnt den Gegenstand trotz des Schlosses normal öffnen
    und schließen. Du kannst auch ein Kennwort festlegen, das diesen Gegenstand im Abstand von bis zu 1,5 Metern eine Minute
    lang öffnet.
- name: Arkanes Schwert
  schule: Hervorrufungszauber
  grad: 7. Grades
  klassen:
  - Barde
  - Magier
  zeitaufwand: Aktion
  reichweite: 27 Meter
  komponenten: V, G, M (ein Miniaturschwert im Wert von mindestens 250 GM)
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: Du erschaffst ein geisterhaftes Schwert, das in Reichweite schwebt. Die Kugel bleibt für die Wirkungsdauer
    bestehen. Wenn das Schwert erscheint, kannst du einen Nahkampf‑Zauberangriff gegen ein Ziel im Abstand von bis zu 1,5
    Metern vom Schwert ausführen. Bei einem Treffer erleidet das Ziel Energieschaden in Höhe von 4W12 plus deinem Zauberwirken‑
    Attributsmodifikator. In deinen folgenden Zügen kannst du das Schwert mit einer Bonusaktion bis zu neun Meter weit an
    einen Ort bewegen, den du sehen kannst, und den Angriff gegen dasselbe oder ein anderes Ziel wiederholen.
- name: Arkane Spiegelung
  schule: Illusionszauber
  grad: 7. Grades
  klassen:
  - Barde
  - Druide
  - Magier
  zeitaufwand: 10 Minuten
  reichweite: Sicht
  komponenten: V, G
  wirkungsdauer: 10 Tage
  beschreibung: Du lässt Gelände in einem Bereich von 2,6 Quadrat‑ kilometern wie eine andere Art von Gelände aussehen, riechen
    und sich sogar anfühlen. Weite Felder oder eine Straße können somit wie ein Sumpf, ein Hügel, eine Erdspalte oder anderes
    unwegsames oder unpassierbares Gelände erscheinen. Ein Tümpel kann wie eine grüne Wiese wirken, ein Steilhang wie ein
    sanftes Gefälle, ein Graben voller Felsbrocken wie eine breite Straße. Du kannst auch das Erscheinungsbild von Gebäuden
    ändern oder sie dort platzieren, wo es keine gibt. Der Zauber kann keine Kreaturen verändern, verbergen oder hinzufügen.
    Die Illusion umfasst hörbare, visuelle, berührbare und olfaktorische Elemente, sodass sie sicheres Gelände in schwieriges
    verwandeln (und umgekehrt) oder anderweitig die Bewegung durch das Gebiet beeinträchtigen kann. Jeder Teil des illusionären
    Geländes wie ein Fels oder ein Zweig, der aus dem Bereich des Zaubers entfernt wird, verschwindet sofort. Kreaturen mit
    Wahrer Blick können die Illusion durchschauen und sehen das echte Gelände. Alle anderen Elemente der Illusion bleiben
    jedoch bestehen. Selbst wenn sich eine Kreatur der Illusion bewusst ist, kann sie physisch mit ihr interagieren.
- name: Astrale Projektion
  schule: Nekromantiezauber
  grad: 9. Grades
  klassen:
  - Hexenmeister
  - Kleriker
  - Magier
  zeitaufwand: 1 Stunde
  reichweite: 3 Meter
  komponenten: V, G, M (für jedes Ziel des Zaubers einen Hyazinth im Wert von mindestens 1.000 GM und einen Silberbarren im
    Wert von mindestens 100 GM – der Zauber verbraucht jeweils beides)
  wirkungsdauer: Bis der Zauber gebannt wird
  beschreibung: Durch diesen Zauber projizierst du deinen Astralkörper und die Astralkörper von bis zu acht bereitwilligen
    Kreaturen in Reichweite auf die Astralebene (wenn du dich bereits auf dieser Ebene befindest, endet der Zauber sofort).
    Der physische Körper jedes Ziels bleibt in scheintotem Zustand zurück. Er ist bewusstlos, benötigt weder Nahrung noch
    Luft und altert nicht. Die Astralgestalt jedes Ziels gleicht dem physischen Körper in fast jeder Hinsicht. Sie hat dessen
    Spielwerte und Habseligkeiten. Der Hauptunterschied ist eine Silberschnur, die zwischen den Schulterblättern der Astralgestalt
    entspringt. Die Schnur verblasst nach 30 Zentimetern und wird unsichtbar. Wird die Schnur durchtrennt – was nur geschieht,
    wenn ein Effekt dies explizit erwähnt –, so sterben sowohl physischer Körper als auch Astralgestalt des Ziels. Die Astralgestalt
    eines Ziels kann durch die Astralebene reisen. Sobald eine Astralgestalt diese Ebene verlässt, werden physischer Körper
    und Habseligkeiten des Ziels an der Silberschnur entlangtransportiert, sodass das Ziel auf der neuen Ebene wieder in seinen
    Körper gelangt. Schaden und sonstige Effekte, die auf die Astralgestalt des Ziels wirken, haben auf den physischen Körper
    keine Wirkung, sowie umgekehrt. Wenn die Trefferpunkte der Astralgestalt oder des physischen Körpers eines Ziels auf 0
    sinken, endet der Zauber bei diesem Ziel. Der Zauber endet bei allen Zielen, wenn du ihn als magische Aktion verwirfst.
    Wenn der Zauber bei einem Ziel endet, das nicht tot ist, kehrt das Ziel in seinen physischen Körper zurück, und dessen
    scheintoter Zustand endet.
- name: Ätherische Gestalten
  schule: Beschwörungszauber
  grad: 7. Grades
  klassen:
  - Barde
  - Hexenmeister
  - Kleriker
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: Selbst
  komponenten: V, G
  wirkungsdauer: Bis zu 8 Stunden
  beschreibung: 'Du betrittst den Grenzbereich der Ätherebene, an dem sie sich mit deiner aktuellen Ebene über‑ schneidet.
    Für die Wirkungsdauer bleibst du in der Äthergrenze. Währenddessen kannst du dich in eine beliebige Richtung bewegen.
    Wenn du dich nach oben oder unten bewegst, kostet dich jeder Meter Bewegung zwei Meter deiner Bewegungsrate. Du kannst
    die Ebene, die du verlassen hast, in Graustufen wahrnehmen. Deine Sichtweite beträgt dabei 18 Meter. Während du dich auf
    der Ätherebene befindest, kannst du nur Kreaturen, Gegenstände und Effekte beeinflussen oder von ihnen beeinflusst werden,
    die sich ebenfalls dort befinden. Kreaturen, die sich nicht auf der Ätherebene befinden, können dich weder wahrnehmen
    noch mit dir interagieren, es sei denn, ein Merkmal erlaubt es ihnen. Wenn der Zauber endet, kehrst du auf die Ebene zurück,
    die du verlassen hast und erscheinst in dem Bereich, der deinem Bereich in der Äthergrenze entspricht. Erscheinst du in
    einem besetzten Bereich, so wirst du in den nächstliegenden freien Bereich geschoben und erleidest Energieschaden in sechsfacher
    Höhe der Anzahl an Metern, die du bewegt wurdest. Dieser Zauber endet sofort, wenn du dich beim Wirken bereits auf der
    Ätherebene oder einer Ebene befindest, die nicht an sie angrenzt (beispielsweise Verwenden von Zauberplätzen höheren Grades:
    auf den Äußeren Ebenen). Für jeden Zauberplatzgrad über dem 7. kannst du auf bis zu drei bereitwillige Kreaturen (dich
    eingeschlossen) zielen. Die Kreaturen müssen sich im Abstand von bis zu drei Metern von dir befinden, wenn du diesen Zauber
    wirkst.'
- name: Attribut verbessern
  schule: Verwandlungszauber
  grad: 2. Grades
  klassen:
  - Barde
  - Druide
  - Kleriker
  - Magier
  - Waldläufer
  - Zauberer
  zeitaufwand: Aktion
  reichweite: Berührung
  komponenten: V, G, M (etwas Fell oder eine Feder)
  wirkungsdauer: Konzentration, bis zu 1 Stunde
  beschreibung: 'Du berührst eine Kreatur und wählst Charisma, Geschicklichkeit, Intelligenz, Stärke oder Weisheit aus. Für
    die Wirkungsdauer ist das Ziel bei Attributs‑ Verwenden von Zauberplätzen höheren Grades: würfen mit dem ausgewählten
    Attribut im Vorteil. Für jeden Zauberplatzgrad über dem 2. kannst du auf eine weitere Kreatur zielen. Du kannst für jedes
    Ziel ein anders Attribut bestimmen.'
- name: Ätzkugel
  schule: Hervorrufungszauber
  grad: 4. Grades
  klassen:
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 45 Meter
  komponenten: V, G, M (ein Tropfen Galle)
  wirkungsdauer: Unmittelbar
  beschreibung: 'Du deutest auf einen Ort in Reichweite. Dort schlägt ein leuchtender Ball aus Säure mit einem Radius von
    15 Zentimetern auf und explodiert in einer Kugel mit einem Radius von sechs Metern. Jede Kreatur in diesem Bereich führt
    einen Geschicklichkeits‑ rettungswurf aus. Misslingt der Wurf, so erleidet die Kreatur 10W4 Säureschaden sowie weitere
    5W4 Säureschaden am Ende ihres nächsten Zugs. Bei einem erfolgreichen Rettungswurf erleidet die Verwenden von Zauberplätzen
    höheren Grades: Kreatur nur die Hälfte des anfänglichen Schadens. Für jeden Zauberplatzgrad über dem 4. wird der anfängliche
    Schaden um 2W4 erhöht.'
- name: Auferstehung
  schule: Nekromantiezauber
  grad: 7. Grades
  klassen:
  - Barde
  - Kleriker
  zeitaufwand: 1 Stunde
  reichweite: Berührung
  komponenten: V, G, M (ein Diamant im Wert von mindestens 1.000 GM, den der Zauber verbraucht)
  wirkungsdauer: Unmittelbar
  beschreibung: Du erweckst mit einer Berührung eine tote Kreatur zum Leben, die nicht länger als ein Jahrhundert tot war,
    nicht an Altersschwäche gestorben ist und nicht untot war, als sie starb. Die Kreatur kehrt mit all ihren Trefferpunkten
    ins Leben zurück. Dieser Zauber neutralisiert zudem sämtliche Gifte, die zum Zeitpunkt des Todes auf das Ziel gewirkt
    haben. Dieser Zauber schließt alle tödlichen Wunden und stellt sämtliche abgetrennten Gliedmaßen wieder her. Von den Toten
    aufzuerstehen ist eine Tortur. Das Ziel erleidet einen Malus von −4 auf W20- Prüfungen. Nach jeder langen Rast wird der
    Malus um 1 verringert, bis er 0 beträgt. Wirkst du diesen Zauber, um eine Kreatur zum Leben zu erwecken, die seit mindestens
    365 Tagen tot ist, so belastet dich das stark. Du kannst erst nach einer langen Rast wieder Zauber wirken und bist bis
    dahin bei W20‑Prüfungen im Nachteil.
- name: Auflösung
  schule: Verwandlungszauber
  grad: 6. Grades
  klassen:
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V, G, M (ein Magnetstein und Staub)
  wirkungsdauer: Unmittelbar
  beschreibung: 'Du verschießt einen dünnen grünen Strahl auf ein Ziel in Reichweite, das du sehen kannst. Das Ziel kann eine
    Kreatur, ein nichtmagischer Gegenstand Energiewand oder eine Struktur aus magischer Energie sein, beispielsweise die Wand
    des Zaubers . Eine Kreatur, die zum Ziel dieses Zaubers wird, führt einen Geschicklichkeitsrettungswurf aus. Misslingt
    der Wurf, so erleidet das Ziel 10W6+40 Energieschaden. Wenn seine Trefferpunkte durch diesen Schaden auf 0 sinken, zerfällt
    es mitsamt jeder nichtmagischen Ausrüstung, die es trägt Wahre AuferstehungWunsch oder hält, zu grauem Staub. Das Ziel
    kann nur durch die Zauber  und wiederbelebt werden. Nichtmagische Gegenstände von höchstens großer Größe sowie Strukturen
    aus magischer Energie werden von diesem Zauber automatisch aufgelöst. Wenn das Ziel von mindestens riesiger Größe ist,
    löst dieser Zauber einen Würfel mit drei Verwenden von Zauberplätzen höheren Grades: Metern Kantenlänge davon auf. Für
    jeden Zauberplatzgrad über dem 6. wird der Schaden um 3W6 erhöht.'
- name: Aura des Lebens
  schule: Bannzauber
  grad: 4. Grades
  klassen:
  - Kleriker
  - Paladin
  zeitaufwand: Aktion
  reichweite: Selbst
  komponenten: V
  wirkungsdauer: Konzentration, bis zu 10 Minuten
  beschreibung: Für die Wirkungsdauer geht eine Aura in einer Ausströmung von neun Metern von dir aus. In der Aura seid du
    und deine Verbündeten gegen nekrotischen Schaden resistent, und eure Treffer‑ punktemaxima können nicht verringert werden.
    Wenn ein Verbündeter mit 0 Trefferpunkten seinen Zug in der Aura beginnt, erhält er 1 Trefferpunkt zurück.
- name: Ausbessern
  schule: Verwandlung
  grad: Zaubertrick
  klassen:
  - Barde
  - Druide
  - Kleriker
  - Magier
  - Zauberer
  zeitaufwand: 1 Minute
  reichweite: Berührung
  komponenten: V, G, M (zwei Magnetsteine)
  wirkungsdauer: Unmittelbar
  beschreibung: Dieser Zauber repariert einen Gegenstand, den du berührst und der eine Bruchstelle oder einen Riss hat, beispielsweise
    ein kaputtes Kettenglied, einen zerbrochenen Schlüssel, einen zerrissenen Umhang oder einen lecken Weinschlauch. Wenn
    der Riss oder die Bruchstelle in keiner Abmessung größer als 30 Zentimeter ist, wird nicht mehr zu erkennen sein, dass
    der Gegenstand beschädigt war. Dieser Zauber kann magische Gegenstände physisch reparieren, deren Magie jedoch nicht wiederherstellen.
- name: Äußerlichkeiten
  schule: Illusionszauber
  grad: 5. Grades
  klassen:
  - Barde
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 9 Meter
  komponenten: V, G
  wirkungsdauer: 8 Stunden
  beschreibung: Du verleihst jeder Kreatur deiner Wahl in Reichweite, die du sehen kannst, ein illusionäres Erscheinungsbild.
    Ein nicht bereitwilliges Ziel kann einen Charismarettungswurf ausführen. Bei einem Erfolg ist es nicht von diesem Effekt
    betroffen. Du kannst den Zielen dasselbe Erscheinungsbild oder unterschiedliche geben. Der Zauber kann das Erscheinungsbild
    von Körpern sowie Ausrüstung der Ziele verändern. Du kannst jede Kreatur 30 Zentimeter größer oder kleiner sowie schwerer
    oder leichter erscheinen lassen. Das neue Erscheinungsbild eines Ziels muss die gleiche Grundanordnung von Gliedmaßen
    haben. Abgesehen davon sind die Einzelheiten der Illusion dir überlassen. Der Zauber bleibt für die Wirkungsdauer bestehen.
    Einer genauen körperlichen Untersuchung halten die Veränderungen dieser Illusion nicht stand. Nutzt du diesen Zauber beispielsweise,
    um einer Kreatur einen Hut aufzusetzen, so durchdringen Gegenstände diesen einfach. Eine Kreatur, die die Studieren‑Aktion
    ausführt, um ein Ziel zu untersuchen, kann einen Intelligenzwurf (Nachforschungen) gegen deinen Zauberrettungswurf‑SG
    ausführen. Bei einem Erfolg weiß sie, dass das Ziel verkleidet wurde.
- name: Ausspähung
  schule: Erkenntniszauber
  grad: 5. Grades
  klassen:
  - Barde
  - Druide
  - Hexenmeister
  - Kleriker
  - Magier
  zeitaufwand: 10 Minuten
  reichweite: Selbst
  komponenten: V, G, M (ein Fokus im Wert von mindestens 1.000 GM, beispielsweise eine Kristallkugel, ein Spiegel oder ein
    mit Wasser gefülltes Becken)
  wirkungsdauer: Konzentration, bis zu 10 Minuten
  beschreibung: Du kannst eine Kreatur deiner Wahl, die sich auf derselben Existenzebene wie du befindet, hören und sehen.
    Das Ziel führt einen Weisheitsrettungswurf aus, der dadurch modifiziert wird, wie gut du das Ziel kennst und ob du einen
    Gegenstand hast, der dich mit ihm verbindet (siehe Tabellen unten). Das Ziel weiß nicht, wogegen es den Rettungswurf ausführt.
    Es fühlt sich nur vage unwohl. Rettungswurf- Dein Wissen über das Ziel ist ...Modifikator ... aus zweiter Hand (du hast
    von dem +5 Ziel gehört) ... aus erster Hand (du bist dem Ziel +0 begegnet) ... umfassend (du kennst das Ziel gut)−5 Rettungswurf-
    Du hast etwas vom Ziel, und zwar ...Modifikator ... ein Abbild oder Porträt−2 ... ein Kleidungsstück oder anderen −4 Besitz
    ... ein Körperteil, eine Haarlocke oder −10 ein Nagelstück Bei einem erfolgreichen Rettungswurf ist das Ziel nicht betroffen,
    und du kannst diesen Zauber erst nach 24 Stunden erneut auf das Ziel wirken. Misslingt der Wurf, so erschafft der Zauber
    einen unsichtbaren, immateriellen Sensor im Abstand von bis zu drei Metern vom Ziel. Du kannst durch den Sensor hören
    und sehen, als ob du dich in seinem Bereich befändest. Der Sensor bewegt sich mit dem Ziel und bleibt für die Wirkungsdauer
    im Abstand von bis zu drei Metern von ihm. Wer den Sensor sehen kann, sieht ihn als leuchtende, etwa faustgroße Kugel.
    Anstelle einer Kreatur kannst du auf einen Ort zielen, den du schon einmal gesehen hast. In diesem Fall erscheint der
    Sensor an diesem Ort und bewegt sich nicht.
- name: Baumwandeln
  schule: Beschwörungszauber
  grad: 5. Grades
  klassen:
  - Druide
  - Waldläufer
  zeitaufwand: Aktion
  reichweite: Selbst
  komponenten: V, G
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: Du erhältst die Fähigkeit, einen Baum zu betreten und aus einem anderen Baum derselben Art im Abstand von
    bis zu 150 Metern wieder herauszusteigen. Beide Bäume müssen lebendig und mindestens so groß wie du sein. Es kostet 1,5
    Meter Bewegung, den Baum zu betreten. Du erfährst sofort die Position aller anderen Bäume derselben Art im Abstand von
    bis zu 150 Metern. Als Teil der Bewegung, um den Baum zu betreten, kannst du entweder in einen dieser Bäume wechseln und
    oder aus dem Baum heraustreten, in dem du dich befindest. Du erscheinst in einem Bereich deiner Wahl im Abstand von bis
    zu 1,5 Metern vom Zielbaum, was dich weitere 1,5 Meter Bewegung kostet. Hast du keine Bewegungsrate übrig, so erscheinst
    du im Abstand von bis zu 1,5 Metern vom Baum, den du betreten hast. Du kannst diese Transportmöglichkeit nur einmal in
    jedem deiner Züge anwenden. Du musst jeden Zug außerhalb eines Baums beenden.
- name: Befehl
  schule: Verzauberungszauber
  grad: 1. Grades
  klassen:
  - Barde
  - Kleriker
  - Paladin
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V
  wirkungsdauer: Unmittelbar
  beschreibung: 'Du gibst einer Kreatur in Reichweite, die du sehen kannst, einen ein Wort langen Befehl. Das Ziel muss einen
    Weisheitsrettungswurf bestehen oder den Befehl im nächsten Zug ausführen. Wähle den Anhalten: Befehl aus diesen Optionen
    aus: Das Ziel bewegt sich in seinem Zug nicht und führt weder eine Aktion noch eine Fliehen: Bonusaktion aus. Das Ziel
    nutzt seinen Zug, um sich so Herkommen: schnell wie möglich von dir wegzubewegen. Das Ziel bewegt sich auf dem kürzesten
    Weg in deine Richtung und beendet seinen Zug, sobald es sich auf höchstens 1,5 Meter Hinlegen: genähert hat. Das Ziel
    nimmt den Zustand Liegend an Loslassen: und beendet dann seinen Zug. Das Ziel lässt fallen, was es gerade hält, Verwenden
    von Zauberplätzen höheren Grades: und beendet seinen Zug. Für jeden Zauberplatzgrad über dem 1. kannst du eine weitere
    Kreatur beeinflussen.'
- name: Beistand
  schule: Bannzauber
  grad: 2. Grades
  klassen:
  - Barde
  - Druide
  - Kleriker
  - Paladin
  - Waldläufer
  zeitaufwand: Aktion
  reichweite: 9 Meter
  komponenten: V, G, M (ein weißer Stoffstreifen)
  wirkungsdauer: 8 Stunden
  beschreibung: 'Wähle bis zu drei Kreaturen in Reichweite aus. Für die Wirkungsdauer werden Trefferpunktemaximum sowie aktuelle
    Trefferpunkte jedes Ziels um 5 Verwenden von Zauberplätzen höheren Grades: erhöht. Für jeden Zauberplatzgrad über dem
    2. werden die Trefferpunkte jedes Ziels um jeweils 5 erhöht.'
- name: Bewegungsfreiheit
  schule: Bannzauber
  grad: 4. Grades
  klassen:
  - Barde
  - Druide
  - Kleriker
  - Waldläufer
  zeitaufwand: Aktion
  reichweite: Berührung
  komponenten: V, G, M (ein Lederriemen)
  wirkungsdauer: 1 Stunde
  beschreibung: 'Du berührst eine bereitwillige Kreatur. Für die Wirkungsdauer ist die Bewegungsrate des Ziels auf schwierigem
    Gelände nicht eingeschränkt. Zudem können Zauber und andere magische Effekte weder seine Bewegungsrate verringern noch
    das Ziel lähmen oder festsetzen. Das Ziel hat ferner eine Schwimmbewegungsrate in Höhe seiner Bewegungsrate. Es kann außerdem
    1,5 Meter seiner Bewegungs‑ rate verbrauchen, um nichtmagischen Fesseln (beispielsweise Handschellen oder einer Kreatur,
    Verwenden von Zauberplätzen höheren Grades: die es gepackt hält) automatisch zu entkommen. Für jeden Zauberplatzgrad über
    dem 4. kannst du auf eine weitere Kreatur zielen.'
- name: Bindung der Ebenen
  schule: Bannzauber
  grad: 5. Grades
  klassen:
  - Barde
  - Druide
  - Hexenmeister
  - Kleriker
  - Magier
  zeitaufwand: 1 Stunde
  reichweite: 18 Meter
  komponenten: V, G, M (ein Juwel im Wert von mindestens 1.000 GM, das der Zauber verbraucht)
  wirkungsdauer: 24 Stunden
  beschreibung: 'Du versuchst, ein celestisches Wesen, einen Elementar, ein Feenwesen oder einen Unhold in deinen Dienst zu
    verpflichten. Die Kreatur muss sich für die gesamte Wirkungsdauer in Reichweite Schutzkreis befinden. (Normalerweise wird
    die Kreatur zuerst in einen umgekehrten  beschworen, wo sie gefangen bleibt, während du den Zauber wirkst.) Nach Wirken
    des Zaubers muss das Ziel einen Charismarettungswurf bestehen, oder es muss dir für die Wirkungsdauer dienen. Wenn die
    Kreatur durch einen anderen Zauber beschworen oder erschaffen wurde, verlängert sich dessen Wirkungsdauer auf die Wirkungsdauer
    von Bindung der Ebenen. Eine verpflichtete Kreatur muss deine Befehle nach besten Kräften befolgen. Du kannst der Kreatur
    befehlen, dich auf ein Abenteuer zu begleiten, einen Ort zu bewachen oder eine Botschaft zu übermitteln. Ist sie dir jedoch
    feindlich gesinnt, so versucht sie, deine Worte zu verdrehen, um ihre eigenen Ziele zu verfolgen. Wenn die Kreatur deine
    Anweisungen vollständig ausgeführt hat, bevor der Zauber endet, kehrt sie zu dir zurück und meldet Vollzug, sofern du
    dich auf derselben Existenzebene befindest. Falls nicht, kehrt sie an den Ort zurück, an dem du sie verpflichtet hast,
    und verbleibt dort, bis Verwenden von Zauberplätzen höheren Grades: der Zauber endet. Die Wirkungsdauer wird erhöht: bei
    einem Zauberplatzgrad von 6 auf zehn Tage, bei einem Zauberplatzgrad von 7 auf 30 Tage, bei einem Zauberplatzgrad von
    8 auf 180 Tage, bei einem Zauberplatzgrad von 9 auf 366 Tage.'
- name: Blindheit/Taubheit
  schule: Verwandlungszauber
  grad: 2. Grades
  klassen:
  - Barde
  - Kleriker
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 36 Meter
  komponenten: V
  wirkungsdauer: 1 Minute
  beschreibung: 'Eine Kreatur in Reichweite, die du sehen kannst, muss einen Konstitutionsrettungswurf bestehen, oder sie
    ist für die Wirkungsdauer blind oder taub (nach deiner Wahl). Das Ziel wiederholt den Rettungswurf am Ende jedes seiner
    Züge. Bei einem Verwenden von Zauberplätzen höheren Grades: Erfolg endet der Zauber. Für jeden Zauberplatzgrad über dem
    2. kannst du auf eine weitere Kreatur zielen.'
- name: Blitz
  schule: Hervorrufungszauber
  grad: 3. Grades
  klassen:
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: Selbst
  komponenten: V, G, M (ein Stück Fell und ein Kristallstab)
  wirkungsdauer: Unmittelbar
  beschreibung: 'Du schleuderst in einer 30 Meter langen und 1,5 Meter breiten Linie, die von dir ausgeht, einen Blitz in
    eine Richtung deiner Wahl. Jede Kreatur in der Linie führt einen Geschicklichkeitsrettungswurf aus. Misslingt der Wurf,
    so erleidet sie 8W6 Verwenden von Zauberplätzen höheren Grades: Blitzschaden, anderenfalls die Hälfte. Für jeden Zauberplatzgrad
    über dem 3. wird der Schaden um 1W6 erhöht.'
- name: Blitze herbeirufen
  schule: Beschwörungszauber
  grad: 3. Grades
  klassen:
  - Druide
  zeitaufwand: Aktion
  reichweite: 36 Meter
  komponenten: V, G
  wirkungsdauer: Konzentration, bis zu 10 Minuten
  beschreibung: 'An einem Punkt in Reichweite über dir, den du sehen kannst, erscheint eine Sturmwolke. Sie hat die Form eines
    drei Meter hohen Zylinders mit einem Radius von 18 Metern. Wenn du den Zauber wirkst, wähle einen Punkt unter der Wolke
    aus, den du sehen kannst. Ein Blitz schlägt von der Wolke in diesen Punkt ein. Jede Kreatur im Abstand von bis zu 1,5
    Metern um diesem Punkt führt einen Geschicklichkeitsrettungswurf aus. Misslingt der Wurf, so erleidet sie 3W10 Blitzschaden,
    anderenfalls die Hälfte. Für die Wirkungsdauer kannst du eine magische Aktion verwenden, um einen weiteren Blitz dieser
    Art einschlagen zu lassen. Dabei kannst du denselben Punkt oder einen anderen als Ziel auswählen. Wenn du dich beim Wirken
    des Zaubers draußen aufhältst und ein Sturm herrscht, verleiht der Zauber dir Kontrolle über diesen Sturm, anstatt einen
    neuen zu erschaffen. Unter diesen Umständen Verwenden von Zauberplätzen höheren Grades: wird der Schaden des Zaubers um
    1W10 erhöht. Für jeden Zauberplatzgrad über dem 3. wird der Schaden um 1W10 erhöht.'
- name: Böser Blick
  schule: Nekromantiezauber
  grad: 6. Grades
  klassen:
  - Barde
  - Hexenmeister
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: Selbst
  komponenten: V, G
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: 'Für die Wirkungsdauer werden deine Augen zu einer tiefschwarzen Leere. Eine Kreatur deiner Wahl im Abstand
    von bis zu 18 Metern von dir, die du sehen kannst, muss einen Weisheitsrettungswurf bestehen, oder sie erleidet für die
    Wirkungsdauer einen der folgenden Effekte deiner Wahl. Für die Wirkungsdauer kannst du in jedem deiner Züge eine magische
    Aktion ausführen, um eine andere Kreatur als Ziel auszuwählen. Du kannst jedoch keine Kreatur erneut als Ziel auswählen,
    die ihren Krank: Rettungswurf gegen den Zauber bestanden hat. Panik: Das Ziel ist vergiftet. Das Ziel ist verängstigt.
    Es muss in jedem seiner Züge die Spurt‑Aktion ausführen und sich auf dem sichersten und kürzesten Weg von dir entfernen.
    Wenn sich das Ziel in einen Bereich mindestens 18 Meter von dir entfernt bewegt hat, von dem aus es dich nicht sehen kann,
    endet dieser Schlaf: Effekt. Das Ziel ist bewusstlos. Es erwacht, wenn es Schaden erleidet oder eine andere Kreatur eine
    Aktion ausführt, um es wachzurütteln.'
- name: Botschaft
  schule: Verwandlung
  grad: Zaubertrick
  klassen:
  - Barde
  - Druide
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 36 Meter
  komponenten: G, M (ein Stück Kupferdraht)
  wirkungsdauer: 1 Runde
  beschreibung: Du deutest auf eine Kreatur in Reichweite und flüsterst eine Botschaft. Das Ziel (und nur dieses) hört die
    Botschaft und kann mit einem Flüstern antworten, das nur du hörst. Du kannst diesen Zauber durch massive Gegenstände hindurch
    wirken, wenn du mit dem Ziel vertraut bist und weißt, dass es sich hinter der Barriere befindet. Magische Stille, 30 Zentimeter
    Stein, Metall oder Holz sowie dünnes Bleiblech blockieren den Zauber.
- name: Brennende Hände
  schule: Hervorrufungszauber
  grad: 1. Grades
  klassen:
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: Selbst
  komponenten: V, G
  wirkungsdauer: Unmittelbar
  beschreibung: 'Du verschießt ein dünnes Flammenband. Jede Kreatur in einem Kegel von 4,5 Metern führt einen Geschicklichkeitsrettungswurf
    aus. Misslingt der Wurf, so erleidet sie 3W6 Feuerschaden, anderenfalls die Hälfte. Brennbare Gegenstände im Kegel, die
    nicht getragen oder gehalten werden, beginnen zu Verwenden von Zauberplätzen höheren Grades: brennen. Für jeden Zauberplatzgrad
    über dem 1. wird der Schaden um 1W6 erhöht.'
- name: Celestisches Wesen beschwören
  schule: Beschwörungszauber
  grad: 7. Grades
  klassen:
  - Kleriker
  zeitaufwand: Aktion
  reichweite: 27 Meter
  komponenten: V, G
  wirkungsdauer: Konzentration, bis zu 10 Minuten
  beschreibung: 'Du beschwörst einen Geist aus den Oberen Ebenen, der sich als Lichtsäule in einem zwölf Meter hohen Zylinder
    mit einem Radius von drei Metern um einen Punkt in Reichweite manifestiert. Wähle bei jeder Kreatur im Zylinder, die du
    sehen kannst, eine der folgenden Arten von Licht aus, von der sie Heilendes Licht: beschienen wird: Das Ziel erhält Trefferpunkte
    in Höhe von 4W12 plus deinem Zauberwirken‑ Sengendes Licht: Attributsmodifikator zurück. Das Ziel führt einen Geschicklichkeitsrettungswurf
    aus. Misslingt der Wurf, so erleidet es 6W12 gleißenden Schaden, anderenfalls die Hälfte. Für die Wirkungsdauer ist der
    Zylinder von hellem Licht erfüllt. Wenn du dich in deinem Zug bewegst, kannst du auch den Zylinder bis zu neun Meter weit
    bewegen. Wann immer der Zylinder sich in den Bereich einer Kreatur bewegt, die du sehen kannst, und wann immer eine Kreatur,
    die du sehen kannst, den Zylinder betritt oder ihren Zug dort beendet, kannst du sie in einer der Lichtarten baden. Eine
    Kreatur kann von diesem Zauber nur einmal Verwenden von Zauberplätzen höheren Grades: pro Zug betroffen sein. Für jeden
    Zauberplatzgrad über dem 7. werden Heilung und Schaden um 1W12 erhöht.'
- name: Chromatische Kugel
  schule: Hervorrufungszauber
  grad: 1. Grades
  klassen:
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 27 Meter
  komponenten: V, G, M (ein Diamant im Wert von mindestens 50 GM)
  wirkungsdauer: Unmittelbar
  beschreibung: 'Du schleuderst eine Energiekugel auf ein Ziel in Reichweite. Wähle für die Art der Kugel Blitz, Feuer, Gift,
    Kälte, Säure oder Schall aus und führe dann einen Fernkampf‑Zauberangriff gegen das Ziel aus. Bei einem Treffer erleidet
    das Ziel 3W8 Schaden der ausgewählten Art. Wenn du mit mindestens zwei der W8 dasselbe Ergebnis würfelst, springt die
    Kugel zu einem weiteren Ziel deiner Wahl im Abstand von bis zu neun Metern vom Ziel. Führe einen Angriffswurf gegen das
    neue Ziel sowie einen neuen Schadenswurf aus. Die Kugel kann nicht noch einmal springen, sofern du den Zauber nicht mit
    einem Zauberplatz Verwenden von Zauberplätzen höheren Grades: ab dem 2. Grad wirkst. Für jeden Zauberplatzgrad über dem
    1. wird der Schaden um 1W8 erhöht. Die Kugel kann höchstens so oft springen, wie es dem Grad des verbrauchten Zauberplatzes
    entspricht, und jede Kreatur kann nur einmal das Ziel dieses Zaubers sein.'
- name: Dauerhafte Flamme
  schule: Hervorrufungszauber
  grad: 2. Grades
  klassen:
  - Druide
  - Kleriker
  - Magier
  zeitaufwand: Aktion
  reichweite: Berührung
  komponenten: V, G, M (Rubinstaub im Wert von mindestens 50 GM, den der Zauber verbraucht)
  wirkungsdauer: Bis der Zauber gebannt wird
  beschreibung: Eine Flamme bricht aus einem Gegenstand hervor, den du berührst. Der Effekt spendet in einem Radius von sechs
    Metern helles Licht und in einem Radius von weiteren sechs Metern dämmriges Licht. Er wirkt wie eine normale Flamme, erzeugt
    jedoch keine Wärme und verbraucht keinen Brennstoff. Die Flamme kann verdeckt oder verborgen, aber nicht erstickt oder
    gelöscht werden.
- name: Dimensionstür
  schule: Beschwörungszauber
  grad: 4. Grades
  klassen:
  - Barde
  - Hexenmeister
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 150 Meter
  komponenten: V
  wirkungsdauer: Unmittelbar
  beschreibung: Du teleportierst dich an einen Ort in Reichweite. Dabei triffst du genau am gewünschten Punkt ein. Es kann
    sich um einen Zielort handeln, den du sehen oder dir vorstellen kannst oder den du beschreibst, indem du Entfernung und
    Richtung angibst (beispielsweise „60 Meter senkrecht nach unten“ oder „90 Meter nach Nordosten in einem 45‑Grad‑ Winkel
    nach oben“). Du kannst zusätzlich eine bereitwillige Kreatur teleportieren. Diese muss sich im Abstand von bis zu 1,5
    Metern von dir befinden, wenn du dich teleportierst. Sie gelangt in einen Bereich im Abstand von bis zu 1,5 Metern von
    deinem Zielbereich. Wenn mindestens einer von euch in einem Bereich eintreffen würde, der bereits vollständig von Gegenständen
    oder Kreaturen besetzt ist, erleidet ihr jeweils 4W6 Energieschaden, und die Teleportation misslingt.
- name: Dissonantes Flüstern
  schule: Verzauberungszauber
  grad: 1. Grades
  klassen:
  - Barde
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V
  wirkungsdauer: Unmittelbar
  beschreibung: 'Eine Kreatur deiner Wahl in Reichweite, die du sehen kannst, hört im Geiste eine misstönende Melodie. Das
    Ziel führt einen Weisheitsrettungswurf aus. Misslingt der Wurf, so erleidet das Ziel 3W6 psychischen Schaden und muss
    sofort seine Reaktion verwenden, sofern verfügbar, um sich so weit wie möglich von dir zu entfernen. Dabei nimmt es die
    sicherste Route. Bei einem erfolgreichen Rettungswurf erleidet das Verwenden von Zauberplätzen höheren Grades: Ziel nur
    halb so viel Schaden. Für jeden Zauberplatzgrad über dem 1. wird der Schaden um 1W6 erhöht.'
- name: Donnerwoge
  schule: Hervorrufungszauber
  grad: 1. Grades
  klassen:
  - Barde
  - Druide
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: Selbst
  komponenten: V, G
  wirkungsdauer: Unmittelbar
  beschreibung: 'Du entfesselst eine Welle aus donnernder Energie. Alle Kreaturen in einem Würfel mit 4,5 Metern Kantenlänge,
    der von dir ausgeht, führen einen Konstitutionsrettungswurf aus. Misslingt der Wurf, so erleidet eine Kreatur 2W8 Schallschaden
    und wird drei Meter weit von dir weggestoßen. Bei einem erfolgreichen Rettungswurf erleidet die Kreatur nur halb so viel
    Schaden. Außerdem werden Gegenstände, die sich vollständig innerhalb des Würfels befinden und nicht fixiert sind, drei
    Meter weit von dir weggestoßen, und der Donnerschlag ist im Abstand von bis zu 90 Metern Verwenden von Zauberplätzen höheren
    Grades: zu hören. Für jeden Zauberplatzgrad über dem 1. wird der Schaden um 1W8 erhöht.'
- name: Dornenwand
  schule: Beschwörungszauber
  grad: 6. Grades
  klassen:
  - Druide
  zeitaufwand: Aktion
  reichweite: 36 Meter
  komponenten: V, G, M (eine Handvoll Dornen)
  wirkungsdauer: Konzentration, bis zu 10 Minuten
  beschreibung: 'Du erschaffst eine Wand aus verworrenem Gestrüpp mit nadelspitzen Dornen. Die Wand erscheint auf einer festen
    Oberfläche in Reichweite und bleibt für die Wirkungsdauer bestehen. Die Wand kann bis zu 18 Meter lang, drei Meter hoch
    und 1,5 Meter dick sein. Alternativ kannst du eine ringförmige Wand mit einem Radius von drei Metern erschaffen, die bis
    zu sechs Meter hoch und 1,5 Meter dick ist. Die Wand blockiert die Sichtlinie. Wenn die Wand erscheint, führt jede Kreatur
    in ihrem Bereich einen Geschicklichkeitsrettungswurf aus. Misslingt der Wurf, so erleidet die Kreatur 7W8 Stichschaden,
    anderenfalls die Hälfte. Eine Kreatur kann die Dornenwand durchdringen, jedoch nur langsam und unter Schmerzen. Für jeden
    Meter, den sie sich durch die Wand bewegt, muss sie vier Meter ihrer Bewegungsrate verbrauchen. Wenn eine Kreatur außerdem
    in einem Zug die Dornenwand erstmals betritt oder ihren Zug darin beendet, führt sie einen Geschicklichkeitsrettungs‑
    wurf aus. Misslingt der Wurf, so erleidet sie 7W8 Hiebschaden, anderenfalls die Hälfte. Eine Kreatur kann diesen Rettungswurf
    nur einmal pro Zug Verwenden von Zauberplätzen höheren Grades: ausführen. Für jeden Zauberplatzgrad über dem 6. werden
    beide Schadensarten um 1W8 erhöht.'
- name: Dornenwuchs
  schule: Verwandlungszauber
  grad: 2. Grades
  klassen:
  - Druide
  - Waldläufer
  zeitaufwand: Aktion
  reichweite: 45 Meter
  komponenten: V, G, M (sieben Dornen)
  wirkungsdauer: Konzentration, bis zu 10 Minuten
  beschreibung: In einem Radius von sechs Metern um einen Punkt in Reichweite wird der Boden von harten Stacheln und Dornen
    überwuchert. Der Bereich wird für die Wirkungsdauer zu schwierigem Gelände. Bewegt sich eine Kreatur in oder durch den
    Bereich, so erleidet sie pro zurückgelegten 1,5 Metern 2W4 Stichschaden. Die Verwandlung des Bodens ist als natürlich
    getarnt. Jede Kreatur, die den Bereich beim Wirken des Zaubers nicht sehen kann, muss die Suchen‑Aktion ausführen und
    einen Weisheitswurf (Überlebenskunst oder Wahrnehmung) gegen deinen Zauberrettungswurf‑SG ausführen. Bei einem Erfolg
    erkennt sie das Gelände vor dem Betreten als gefährlich.
- name: Drachen herbeirufen
  schule: Beschwörungszauber
  grad: 5. Grades
  klassen:
  - Magier
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V, G, M (ein Gegenstand mit eingraviertem Drachenbildnis im Wert von mindestens 500 GM)
  wirkungsdauer: Konzentration, bis zu 1 Stunde
  beschreibung: 'Du rufst einen Drachengeist herbei. Er erscheint in einem freien Bereich in Reichweite, den du sehen Drakonischen
    Geists kannst, und verwendet den Wertekasten eines . Die Kreatur verschwindet, wenn ihre Trefferpunkte auf 0 sinken oder
    der Zauber endet. Die Kreatur ist mit dir und deinen Verbündeten verbündet. Im Kampf nutzt sie deinen Initiativewert und
    ist direkt nach dir am Zug. Sie gehorcht deinen mündlichen Befehlen (keine Aktion deinerseits erforderlich). Befiehlst
    du ihr nichts, so führt sie die Ausweichaktion aus und nutzt ihre Bewegung, Verwenden von Zauberplätzen höheren Grades:
    um Gefahren zu vermeiden. Verwende den Zauberplatzgrad als Zaubergrad im Wertekasten. MODRWMODRWMODRW S 19+4+4G 14+2+2K
    17+3+3 täeSon I 10+0+0W 14+2+2C 14+2+2 nteIha Merkmale Aktionen'
- name: Drachenodem
  schule: Verwandlungszauber
  grad: 2. Grades
  klassen:
  - Magier
  - Zauberer
  zeitaufwand: Bonusaktion
  reichweite: Berührung
  komponenten: V, G, M (eine scharfe Pfefferschote)
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: 'Du berührst eine bereitwillige Kreatur und wählst Blitz, Feuer, Gift, Kälte oder Säure aus. Bis der Zauber
    endet, kann das Ziel eine magische Aktion ausführen, um einen Kegel von 4,5 Metern auszuatmen. Jede Kreatur in diesem
    Bereich führt einen Geschicklichkeitsrettungswurf aus. Misslingt der Wurf, so erleidet sie 3W6 Schaden Verwenden von Zauberplätzen
    höheren Grades: der ausgewählten Art, anderenfalls die Hälfte. Für jeden Zauberplatzgrad über dem 2. wird der Schaden
    um 1W6 erhöht.'
- name: Druidenkunst
  schule: Verwandlung
  grad: Zaubertrick
  klassen:
  - Druide
  zeitaufwand: Aktion
  reichweite: 9 Meter
  komponenten: V, G
  wirkungsdauer: Unmittelbar
  beschreibung: 'Du flüsterst den Geistern der Natur zu und erzeugst in Reichweite einen der folgenden magischen Wettersensor:
    Effekte. Du erschaffst einen winzigen, harmlosen sensorischen Effekt, der das Wetter an deinem Aufenthaltsort in den nächsten
    24 Stunden vorhersagt. Der Effekt kann sich als goldene Kugel für einen wolkenlosen Himmel, als Wolke für Regen, als Schneeflocken
    für Schnee oder dergleichen manifestieren. Dieser Effekt hält eine Runde Erblühen: lang an. Du bewirkst, dass sofort eine
    Blume erblüht, sich eine Samenkapsel oder eine Sensorischer Effekt: Blattknospe öffnet. Du erzeugst einen harmlosen sensorischen
    Effekt, beispielsweise fallende Blätter, geisterhafte tanzende Feenwesen, eine sanfte Brise, die Geräusche eines Tieres
    oder leichten Stinktiergeruch. Der Effekt muss in einen Feuerspiel: Würfel mit 1,5 Metern Kantenlänge passen. Du entzündest
    oder löschst eine Kerze, eine Fackel oder ein Lagerfeuer.'
- name: Dunkelheit
  schule: Hervorrufungszauber
  grad: 2. Grades
  klassen:
  - Hexenmeister
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V, M (Fledermausfell und ein Kohlenstück)
  wirkungsdauer: Konzentration, bis zu 10 Minuten
  beschreibung: Für die Wirkungsdauer breitet sich magische Dunkelheit von einem Punkt in Reichweite zu einer Kugel mit einem
    Radius von 4,5 Metern aus. Sie kann weder mit Dunkelsicht durchdrungen noch durch nichtmagische Lichtquellen erhellt werden.
    Alternativ kannst du den Zauber auf einen Gegenstand wirken, der nicht getragen oder gehalten wird. In diesem Fall erfüllt
    die Dunkelheit eine Ausströmung von 4,5 Metern, die vom Gegenstand ausgeht. Wird der Gegenstand mit etwas Undurchsichtigem
    wie einer Schüssel oder einem Helm bedeckt, so wird die Dunkelheit blockiert. Wenn sich der Wirkungsbereich dieses Zaubers
    mit einem Bereich hellen oder dämmrigen Lichts überschneidet, das durch einen Zauber des höchstens 2. Grades erzeugt wurde,
    so wird der andere Zauber gebannt.
- name: Dunkelsicht
  schule: Verwandlungszauber
  grad: 2. Grades
  klassen:
  - Druide
  - Magier
  - Waldläufer
  - Zauberer
  zeitaufwand: Aktion
  reichweite: Berührung
  komponenten: V, G, M (eine getrocknete Karotte)
  wirkungsdauer: 8 Stunden
  beschreibung: Für die Wirkungsdauer hat eine bereitwillige Kreatur, die du berührst, Dunkelsicht mit einer Reichweite von
    45 Metern.
- name: Dürre
  schule: Nekromantiezauber
  grad: 4. Grades
  klassen:
  - Druide
  - Hexenmeister
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 9 Meter
  komponenten: V, G
  wirkungsdauer: Unmittelbar
  beschreibung: 'Eine Kreatur in Reichweite, die du sehen kannst, führt einen Konstitutionsrettungswurf aus. Misslingt der
    Wurf, so erleidet sie 8W8 nekrotischen Schaden, anderenfalls die Hälfte. Bei Pflanzenkreaturen misslingt der Rettungswurf
    automatisch. Ziele alternativ auf eine nichtmagische Pflanze, die keine Kreatur ist (beispielsweise Baum oder Strauch).
    Sie führt keinen Rettungswurf aus, sondern verdorrt und stirbt. Verwenden von Zauberplätzen höheren Grades: Für jeden
    Zauberplatzgrad über dem 4. wird der Schaden um 1W8 erhöht.'
- name: Ebenenwechsel
  schule: Beschwörungszauber
  grad: 7. Grades
  klassen:
  - Druide
  - Hexenmeister
  - Kleriker
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: Berührung
  komponenten: V, G, M (eine gegabelte Metallrute im Wert von mindestens 250 GM, die auf eine Existenzebene eingestimmt ist)
  wirkungsdauer: Unmittelbar
  beschreibung: Dieser Zauber transportiert dich und bis zu acht bereitwillige Kreaturen, die sich in einem Kreis an den Händen
    halten, auf eine andere Existenzebene. Du kannst einen allgemeinen Zielort bestimmten, beispielsweise eine bestimmte Stadt
    auf der Elementarebene des Feuers oder einen bestimmten Palast auf der zweiten Ebene der Neun Höllen. Ihr erscheint am
    Ziel oder in dessen Nähe nach Ermessen des SL. Wenn du die Siegelsequenz eines Kreises der Teleportation auf einer anderen
    Existenzebene kennst, kann dich der Zauber zu diesem Kreis bringen. Ist der Kreis der Teleportation zu klein für alle
    transportieren Kreaturen, so erscheinen sie im nächsten freien Bereich neben dem Kreis.
- name: Einfache Illusion
  schule: Illusion
  grad: Zaubertrick
  klassen:
  - Barde
  - Hexenmeister
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 9 Meter
  komponenten: G, M (ein Stück Vlies)
  wirkungsdauer: 1 Minute
  beschreibung: 'Du erschaffst für die Wirkungsdauer ein Geräusch oder das Abbild eines Gegenstands in Reichweite. Die jeweiligen
    Effekte sind unten beschrieben. Die Illusion endet, wenn du diesen Zauber erneut wirkst. Eine Kreatur, die das Geräusch
    oder Abbild mit der Studieren‑Aktion untersucht, kann die Illusion mit einem erfolgreichen Intelligenzwurf (Nachfor‑ schungen)
    gegen deinen Zauberrettungswurf‑SG als solche erkennen. In diesem Fall wird die Illusion Geräusch: für sie weniger deutlich
    wahrnehmbar. Die Lautstärke des Geräuschs kann so leise wie ein Flüstern oder so laut wie ein Schrei sein. Dies kann deine
    Stimme oder die einer anderen Person sein, aber auch Löwengebrüll, Trommeln oder ein anderes beliebiges Geräusch. Für
    die Wirkungsdauer kannst du einen durchgehenden Laut oder unterschiedliche kurze Laute erzeugen. Bild: Das Abbild eines
    Gegenstands – beispiels‑ weise ein Stuhl, schlammige Fußabdrücke oder eine Truhe – darf nicht größer als ein Würfel mit
    1,5 Metern Kantenlänge sein. Es kann weder Geräu‑ sche noch Gerüche, Licht oder andere sensorische Effekte erzeugen. Physische
    Interaktionen mit dem Abbild enttarnen es als Illusion, da Dinge es einfach durchdringen können.'
- name: Einflüsterung
  schule: Verzauberungszauber
  grad: 2. Grades
  klassen:
  - Barde
  - Hexenmeister
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 9 Meter
  komponenten: V, M (ein Tropfen Honig)
  wirkungsdauer: Konzentration, bis zu 8 Stunden
  beschreibung: 'Du schlägst einer Kreatur in Reichweite, die du sehen kannst und die dich hören und verstehen kann, mit höchstens
    25 Worten eine Vorgehensweise vor. Der Vorschlag muss realistisch klingen und darf nichts enthalten, was dem Ziel oder
    seinen Verbündeten Schaden zufügen würde. Du könntest beispielsweise sagen: „Holt den Schlüssel zur Schatzkammer des Kults
    und gebt ihn mir.“ Oder du könntest sagen: „Hört auf zu kämpfen, verlasst diese Bibliothek friedlich und kehrt nicht zurück.“
    Das Ziel muss einen Weisheitsrettungswurf bestehen, oder es ist für die Wirkungsdauer – oder bis du oder deine Verbündeten
    ihm Schaden zufügen – bezaubert. Das bezauberte Ziel führt den Vorschlag nach besten Kräften aus. Die vorge‑ schlagene
    Aktivität kann während der gesamten Wirkungsdauer fortgesetzt werden. Wenn sie jedoch in kürzerer Zeit abgeschlossen werden
    kann, endet der Zauber beim Ziel, sobald es die Aktivität ausgeführt hat.'
- name: Einkerkerung
  schule: Bannzauber
  grad: 9. Grades
  klassen:
  - Hexenmeister
  - Magier
  zeitaufwand: 1 Minute
  reichweite: 9 Meter
  komponenten: V, G, M (eine Statuette in Gestalt des Ziels im Wert von mindestens 5.000 GM)
  wirkungsdauer: Bis der Zauber gebannt wird
  beschreibung: 'Du erschaffst magische Fesseln, um eine Kreatur in Reichweite festzusetzen, die du sehen kannst. Das Ziel
    muss einen Weisheitsrettungswurf ausführen. Bei einem erfolgreichen Rettungswurf ist das Ziel nicht betroffen, und es
    ist in den nächsten 24 Stunden gegen diesen Zauber immun. Misslingt der Wurf, so wird das Ziel eingesperrt. Ein eingesperrtes
    Ziel muss nicht atmen, essen und trinken, und es altert nicht. Erkenntniszauber können das Ziel weder orten noch wahrnehmen,
    und das Ziel kann sich nicht teleportieren. Bis der Zauber endet, ist das Ziel außerdem von einem der folgenden Effekte
    (nach deiner Wahl) Abgesichertes Gefängnis: betroffen: Das Ziel ist in einer Halbebene gefangen, die gegen Teleportation
    und Ebenenreisen geschützt ist. Bei der Halbebene kann es sich um ein Labyrinth, einen Käfig, einen Anketten: Turm oder
    Ähnliches nach deiner Wahl handeln. Fest im Boden verankerte Ketten halten das Ziel fest. Das Ziel ist festgesetzt und
    kann auf Begräbnis: keine Weise bewegt werden. Das Ziel wird unter der Erde in einer hohlen Kugel aus magischer Energie
    begraben, die gerade groß genug für das Ziel ist. Nichts kann Schlummer: die Kugel durchdringen. Das Ziel ist bewusstlos
    und kann nicht Winziges Gefängnis: geweckt werden. Das Ziel nimmt eine Größe von 2,5 Zentimetern an und wird in einem
    unzerstörbaren Edelstein oder einem ähnlichen Gegenstand eingesperrt. Licht kann den Edelstein durchdringen. So kann das
    Ziel nach draußen blicken, und andere Kreaturen können hineinsehen. Ansonsten kann den Edelstein jedoch nichts durchdringen,
    auch nicht Teleportation oder Den Zauber beenden: Ebenenreisen. Wenn du den Zauber wirkst, kannst du einen Auslöser festlegen,
    der ihn beendet. Der Auslöser kann so spezifisch oder komplex sein, wie du möchtest. Der SL muss jedoch bestätigen, dass
    sein Eintreten innerhalb der nächsten zehn Jahre wahrscheinlich ist. Es muss sich um eine beobachtbare Aktion handeln,
    beispielsweise eine bestimmte Opferung im Tempel deiner Gottheit, die Rettung deiner großen Liebe Magie bannen oder der
    Sieg über ein bestimmtes Monster. Der Zauber  kann diesen Zauber nur beenden, wenn er mit einem Zauberplatz des 9. Grades
    entweder auf das Gefängnis oder auf die Komponente gewirkt wird, die beim Wirken dieses Zaubers verwendet wurde.'
- name: Einswerden mit der Natur
  schule: Erkenntniszauber
  grad: 5. Grades
  klassen:
  - Druide
  - Waldläufer
  zeitaufwand: 1 Minute oder Ritual
  reichweite: Selbst
  komponenten: V, G
  wirkungsdauer: Unmittelbar
  beschreibung: 'Du kommunizierst mit Naturgeistern und erlangst Wissen über deine Umgebung. Im Freien gewährt dir der Zauber
    Wissen über den Bereich im Abstand von bis zu 4,8 Kilometern von dir. In Höhlen und anderen natürlichen unterirdischen
    Umgebungen beträgt der Radius 90 Meter. Der Zauber funktioniert nicht in Gebieten, in denen die Natur durch Bauten ersetzt
    wurde, beispielsweise in Burgen und Siedlungen. Wähle drei der folgenden Optionen aus. Du erfährst diese Fakten, sofern
    sie zum Bereich des Zaubers gehören: • Orte von Siedlungen • Orte von Portalen oder anderen Existenzebenen • Ort einer
    Kreatur mit einem Herausforderungsgrad von mindestens 10 (nach Wahl des SL), die ein celestisches Wesen, ein Elementar,
    ein Feenwesen, ein Unhold oder ein Untoter ist • Die häufigste Art von Pflanze, Mineral oder Tier (nach deiner Wahl) •
    Orte von Gewässern Du könntest beispielsweise den Ort eines mächtigen Monsters im Bereich, den Ort von Gewässern sowie
    den Ort von Dörfern erfahren.'
- name: Eismesser
  schule: Beschwörungszauber
  grad: 1. Grades
  klassen:
  - Druide
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: G, M (ein Tropfen Wasser oder ein Stück Eis)
  wirkungsdauer: Unmittelbar
  beschreibung: 'Du erzeugst eine Eisscherbe und schleuderst sie auf eine Kreatur in Reichweite. Führe einen Fernkampf‑ Zauberangriff
    gegen das Ziel aus. Bei einem Treffer erleidet das Ziel 1W10 Stichschaden. Nach dem Wurf explodiert die Scherbe, ob sie
    getroffen hat oder nicht. Das Ziel und jede Kreatur im Abstand von bis zu 1,5 Metern von ihm müssen einen Geschicklichkeitsrettungswurf
    bestehen, oder sie Verwenden von Zauberplätzen höheren Grades: erleiden 2W6 Kälteschaden. Für jeden Zauberplatzgrad über
    dem 1. wird der Kälteschaden um 1W6 erhöht.'
- name: Eissturm
  schule: Hervorrufungszauber
  grad: 4. Grades
  klassen:
  - Druide
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 90 Meter
  komponenten: V, G, M (ein Fausthandschuh)
  wirkungsdauer: Unmittelbar
  beschreibung: 'In einem zwölf Meter hohen Zylinder mit einem Radius von sechs Metern um einen Punkt in Reich‑ weite fällt
    Hagel. Jede Kreatur im Zylinder führt einen Geschicklichkeitsrettungswurf aus. Misslingt der Wurf, so erleidet die Kreatur
    2W10 Wuchtschaden und 4W6 Kälteschaden, anderenfalls die Hälfte. Die Hagelkörner machen den Boden im Zylinder bis zum
    Ende deines nächsten Zugs zu schwierigem Verwenden von Zauberplätzen höheren Grades: Gelände. Für jeden Zauberplatzgrad
    über dem 4. wird der Wuchtschaden um 1W10 erhöht.'
- name: Eiswand
  schule: Hervorrufungszauber
  grad: 6. Grades
  klassen:
  - Magier
  zeitaufwand: Aktion
  reichweite: 36 Meter
  komponenten: V, G, M (ein Stück Quarz)
  wirkungsdauer: Konzentration, bis zu 10 Minuten
  beschreibung: 'Du erschaffst auf einer festen Oberfläche in Reichweite eine Eiswand. Du kannst sie auch zu einer halbkugelförmigen
    Kuppel oder zu einer Kugel mit einem Radius von bis zu drei Metern formen, oder du kannst eine flache Oberfläche aus zehn
    Platten mit je drei Metern Kantenlänge erschaffen. Jede Platte muss an mindestens eine andere angrenzen. Die Wand ist
    in jeder Form 30 Zentimeter dick und bleibt für die Wirkungsdauer bestehen. Erschaffst du die Wand so, dass sie den Bereich
    einer Kreatur durchdringt, so wird die Kreatur auf eine Seite der Wand (nach deiner Wahl) gestoßen und führt einen Geschicklichkeitsrettungswurf
    aus. Misslingt der Wurf, so erleidet sie 10W6 Kälteschaden, anderenfalls die Hälfte. Die Wand ist ein Gegenstand, der
    beschädigt und somit durchbrochen werden kann. Sie besitzt eine RK von 12 und 30 Trefferpunkte pro Abschnitt von drei
    Metern. Sie ist gegen Gift‑, Kälte‑ und psychischen Schaden immun und anfällig für Feuerschaden. Sinken die Trefferpunkte
    eines Abschnitts von drei Metern der Wand auf 0, so wird dieser Abschnitt zerstört und hinterlässt in seinem Bereich eine
    eisige Luftschicht. Eine Kreatur, die sich erstmals in einem Zug durch die kalte Luftschicht bewegt, führt einen Konstitutionsrettungswurf
    aus. Misslingt der Wurf, so erleidet sie 5W6 Kälteschaden, anderenfalls die Verwenden von Zauberplätzen höheren Grades:
    Hälfte. Für jeden Zauberplatzgrad über dem 6. wird der Schaden, den die Wand beim Erscheinen bewirkt, um 2W6 erhöht, und
    der Schaden beim Durchqueren der eisigen Luftschicht wird um 1W6 erhöht.'
- name: Elementalismus
  schule: Verwandlung
  grad: Zaubertrick
  klassen:
  - Druide
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 9 Meter
  komponenten: V, G
  wirkungsdauer: Unmittelbar
  beschreibung: 'Du kontrollierst die Elemente und erzeugst in Element formen: Reichweite einen der folgenden Effekte. Du
    lässt eine Menge von Erde, Sand, Feuer, Rauch, Nebel oder Wasser, die in einen Würfel mit 30 Zentimetern Kantenlänge passt,
    eine Stunde lang eine grobe Gestalt annehmen (beispielsweise die einer Kreatur). Erde anlocken: Du erzeugst eine dünne
    Staub‑ oder Sandschicht, die Oberflächen in einem Bereich von 2,3 Quadratmetern bedeckt, oder du lässt in einem Flecken
    Erde oder Sand ein einzelnes Wort Feuer anlocken: in deiner Handschrift erscheinen. Du erzeugst in einem Würfel mit 1,5
    Metern Kantenlänge eine dünne Wolke aus harmlosen Funken und farbigem duftendem Rauch. Du wählst Farbe und Duft aus. Die
    Funken können Kerzen, Fackeln und Lampen im Bereich entzünden. Der Duft des Rauchs bleibt eine Minute Luft anlocken: lang
    erhalten. Du erzeugst in einem Würfel mit 1,5 Metern Kantenlänge einen Windstoß, der stark genug ist, um Stoff und Laub
    zu bewegen, Staub aufzuwirbeln und offene Türen und Fensterläden zu schließen. Türen und Fensterläden, die von jemandem
    oder etwas festgehalten werden, sind Wasser anlocken: nicht betroffen. Du erzeugst in einem Würfel mit 1,5 Metern Kantenlänge
    kühlen Nebel, der Kreaturen und Gegenstände benetzt. Alternativ erzeugst du eine Tasse sauberen Wassers entweder in einem
    Behälter oder auf einer Oberfläche. Das Wasser ist nach einer Minute verdampft.'
- name: Elementar beschwören
  schule: Beschwörungszauber
  grad: 5. Grades
  klassen:
  - Druide
  - Magier
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V, G
  wirkungsdauer: Konzentration, bis zu 10 Minuten
  beschreibung: 'Du beschwörst einen großen immateriellen Geist von den Elementarebenen, der in einem freien Bereich in Reichweite
    erscheint. Wähle das Element des Geistes aus, durch das seine Schadensart bestimmt wird: Erde (Schall), Feuer (Feuer),
    Luft (Blitz) oder Wasser (Kälte). Der Geist bleibt für die Wirkungsdauer bestehen. Wann immer eine Kreatur, die du sehen
    kannst, den Bereich des Geistes betritt oder ihren Zug im Abstand von bis zu 1,5 Metern vom Geist beginnt, kannst du die
    Kreatur zu einem Geschicklichkeitsrettungswurf zwingen, sofern der Geist keine Kreatur festgesetzt hat. Misslingt der
    Wurf, so erleidet das Ziel 8W8 Schaden je nach Art des Geists und ist festgesetzt, bis der Zauber endet. Das festgesetzte
    Ziel wiederholt den Rettungswurf zu Beginn jedes seiner Züge. Misslingt der Wurf, so erleidet das Ziel 4W8 Schaden je
    nach Art des Geists. Bei einem erfolgreichen Rettungswurf ist das Ziel nicht mehr vom Geist Verwenden von Zauberplätzen
    höheren Grades: festgesetzt. Für jeden Zauberplatzgrad über dem 5. wird der Schaden um 1W8 erhöht.'
- name: Energiekäfig
  schule: Hervorrufungszauber
  grad: 7. Grades
  klassen:
  - Barde
  - Hexenmeister
  - Magier
  zeitaufwand: Aktion
  reichweite: 30 Meter
  komponenten: V, G, M (Rubinstaub im Wert von mindestens 1.500 GM, den der Zauber verbraucht)
  wirkungsdauer: Konzentration, bis zu 1 Stunde
  beschreibung: Um einen Bereich deiner Wahl in Reichweite entsteht ein unbewegliches, unsichtbares würfelförmiges Gefängnis
    aus magischer Energie. Dabei kann es sich um einen Käfig oder um einen soliden Kasten handeln (nach deiner Wahl). In Käfigform
    kann das Gefängnis eine Seitenlänge von bis zu sechs Metern haben. Es besteht aus Stangen und Zwischenräumen von jeweils
    einem Zentimeter Durchmesser. In Kastenform kann das Gefängnis eine Seitenlänge von bis zu drei Metern haben. Es handelt
    sich um eine solide, für Materie undurchdringliche Barriere, die außerdem in den Bereich hinein oder aus ihm heraus gewirkte
    Zauber blockiert. Wenn du den Zauber wirkst, ist jede Kreatur gefangen, die sich vollständig im Bereich des Käfigs befindet.
    Kreaturen, die sich nur zum Teil im Bereich befinden oder zu groß sind, um komplett hineinzupassen, werden von der Mitte
    des Bereichs aus weggestoßen, bis sie sich vollständig außerhalb befinden. Eine Kreatur im Energiekäfig kann diesen nur
    auf magische Art verlassen. Wenn sie versucht, ihn mit Teleportation oder Ebenenreisen zu verlassen, muss sie einen Charismarettungswurf
    ausführen. Bei einem erfolgreichen Rettungswurf gelingt es ihr, den Käfig mit dieser Magie zu verlassen. Misslingt der
    Wurf, so verlässt die Kreatur den Käfig nicht, und der Zauber oder Effekt ist vergeudet. Der Käfig erstreckt sich auch
    auf die Ätherebene und blockiert Magie bannen damit Reisen über diese Ebene. Dieser Zauber kann durch  nicht aufgehoben
    werden.
- name: Energiewand
  schule: Hervorrufungszauber
  grad: 5. Grades
  klassen:
  - Magier
  zeitaufwand: Aktion
  reichweite: 36 Meter
  komponenten: V, G, M (eine Glasscherbe)
  wirkungsdauer: Konzentration, bis zu 10 Minuten
  beschreibung: An einem Punkt deiner Wahl in Reichweite erscheint eine unsichtbare Energiewand. Es kann sich um eine senkrechte,
    waagerechte oder abgewinkelte Barriere in einer Ausrichtung deiner Wahl handeln. Sie kann frei schweben oder auf einer
    festen Oberfläche stehen. Du kannst sie auch zu einer halbkugelförmigen Kuppel oder zu einer Kugel mit einem Radius von
    bis zu drei Metern formen, oder du kannst eine flache Oberfläche aus zehn Platten mit je drei Metern Kantenlänge erschaffen.
    Jede Platte muss an mindestens eine andere angrenzen. Die Wand ist in jeder Form einen halben Zentimeter dick und bleibt
    für die Wirkungsdauer bestehen. Erschaffst du die Wand so, dass sie den Bereich einer Kreatur durchdringt, so wird die
    Kreatur auf eine Seite der Wand (nach deiner Wahl) gestoßen. Nichts kann die Wand physisch durchdringen. Magie bannen
    Sie ist gegen alle Schadensarten immun und kann Auflösung durch  nicht aufgehoben werden. Der Zauber  zerstört die Wand
    jedoch sofort. Die Wand erstreckt sich auch in die Ätherebene und blockiert damit Reisen über diese Ebene.
- name: Erdbeben
  schule: Verwandlungszauber
  grad: 8. Grades
  klassen:
  - Druide
  - Kleriker
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 150 Meter
  komponenten: V, G, M (ein geborstener Stein)
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: 'Wähle einen Punkt in Reichweite auf dem Boden aus, den du sehen kannst. Für die Wirkungsdauer erschüttert
    ein gewaltiges Beben die Erde in einem Radius von 30 Metern um diesen Punkt. Der Boden dort ist schwieriges Gelände. Wenn
    du diesen Zauber wirkst, sowie am Ende jedes deiner Züge während der Wirkungsdauer, führt jede Kreatur auf dem Boden in
    dem Bereich einen Geschicklichkeitsrettungswurf aus. Misslingt der Wurf, so wird die Kreatur umgestoßen und hat den Zustand
    Liegend, und ihre Konzentration ist unterbrochen. Du kannst außerdem die folgenden Effekte Erdspalten: bewirken. Am Ende
    des Zugs, in dem du den Zauber wirkst, öffnen sich insgesamt 1W6 Erdspalten im Wirkungsbereich. Du wählst die Orte der
    Erdspalten aus. Sie können sich nicht unter Gebäuden öffnen. Jede Erdspalte ist 1W10 mal drei Meter tief, drei Meter breit
    und erstreckt sich von einem Rand des Wirkungsbereichs zu einem anderen. Eine Kreatur, die sich im Bereich einer Erdspalte
    befindet, muss einen Geschicklichkeitsrettungswurf bestehen, oder sie fällt hinein. Ist der Rettungswurf erfolgreich,
    so bewegt die Kreatur sich mit dem Rand der Gebäude: Erdspalte, während sich diese öffnet. Wenn du den Zauber wirkst,
    sowie am Ende jedes deiner Züge für die Wirkungsdauer, fügt das Beben allen Gebäuden, die den Boden im Wirkungsbereich
    berühren, 50 Wuchtschaden zu. Wenn die Trefferpunkte eines Gebäudes auf 0 sinken, stürzt das Gebäude ein. Jede Kreatur
    im Abstand von bis zur halben Höhe des Gebäudes führt einen Geschicklichkeits‑ rettungswurf aus. Misslingt der Wurf, so
    erleidet die Kreatur 12W6 Wuchtschaden, wird umgestoßen und ist unter den Trümmern begraben. Sie muss einen SG‑20‑Stärkewurf
    (Athletik) als Aktion bestehen, um sich zu befreien. Bei einem erfolgreichen Rettungswurf erleidet die Kreatur nur halb
    so viel Schaden.'
- name: Erde bewegen
  schule: Verwandlungszauber
  grad: 6. Grades
  klassen:
  - Druide
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 36 Meter
  komponenten: V, G, M (eine Miniaturschaufel)
  wirkungsdauer: Konzentration, bis zu 2 Stunden
  beschreibung: Wähle einen viereckigen Bereich des Geländes in Reichweite mit einer Seitenlänge von höchstens zwölf Metern
    aus. Für die Wirkungsdauer kannst du Erde, Lehm oder Sand in dem Bereich beliebig umformen. Du kannst den Bereich anheben
    oder absenken, einen Graben erschaffen oder zuschütten, eine Mauer errichten oder niederreißen oder eine Säule errichten.
    Das Ausmaß dieser Änderungen darf die Hälfte der größten Abmessung des Bereichs nicht überschreiten. Beeinflusst du beispielsweise
    einen Bereich mit einer Seitenlänge von zwölf Metern, so kannst du eine bis zu sechs Meter hohe Säule erschaffen, den
    Bereich um bis zu sechs Meter anheben oder absenken, einen Graben mit bis zu sechs Metern Tiefe ausheben und so weiter.
    Es dauert zehn Minuten, diese Änderungen zu bewirken. Da die Veränderung des Geländes langsam erfolgt, können Kreaturen
    im Bereich normalerweise nicht durch die Bodenbewegung gefangen oder verletzt werden. Nach jeweils zehn Minuten Konzentration
    auf den Zauber kannst du einen neuen Bereich in Reichweite auswählen und beeinflussen. Dieser Zauber kann weder Naturgestein
    noch Steingebäude beeinflussen. Felsen und Gebäude verschieben sich, um sich dem neuen Gelände anzupassen. Wenn deine
    Veränderung des Geländes ein Gebäude instabil macht, so stürzt es möglicherweise ein. Dieser Zauber hat keinen direkten
    Einfluss auf Pflanzenwachstum. Die bewegte Erde nimmt Pflanzen mit sich.
- name: Erinnerung verändern
  schule: Verzauberungszauber
  grad: 5. Grades
  klassen:
  - Barde
  - Magier
  zeitaufwand: Aktion
  reichweite: 9 Meter
  komponenten: V, G
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: 'Du versuchst, die Erinnerungen einer anderen Kreatur umzuformen. Eine Kreatur in Reichweite, die du sehen
    kannst, führt einen Weisheitsrettungswurf aus. Wenn du gegen die Kreatur kämpfst, ist sie bei ihrem Rettungswurf im Vorteil.
    Misslingt der Wurf, so ist das Ziel für die Wirkungsdauer bezaubert. Ein auf diese Art bezaubertes Ziel ist außerdem kampfunfähig
    und sich seiner Umgebung nicht bewusst, es kann dich jedoch hören. Erleidet es Schaden oder wird es von einem anderen
    Zauber betroffen, so endet dieser Zauber, und die Erinnerungen bleiben unverändert. Während diese Bezauberung anhält,
    kannst du die Erinnerungen des Ziels an ein Ereignis der letzten 24 Stunden verändern, das maximal zehn Minuten gedauert
    hat. Du kannst sämtliche Erinnerungen an das Ereignis dauerhaft entfernen, dem Ziel ermöglichen, sich mit absoluter Klarheit
    an das Ereignis zu erinnern, seine Erinnerungen an die Details des Ereignisses verändern oder eine andere Erinnerung erschaffen.
    Du musst mit dem Ziel sprechen und beschreiben, wie seine Erinnerungen beeinflusst werden. Das Ziel muss deine Sprache
    sprechen, damit die veränderten Erinnerungen Fuß fassen können. Sein Verstand füllt etwaige Lücken in den von dir beschriebenen
    Details. Endet der Zauber, bevor du die veränderten Erinnerungen beschrieben hast, so werden die Erinnerungen der Kreatur
    nicht modifiziert. Anderenfalls setzen sich die neuen Erinnerungen fest, wenn der Zauber endet. Veränderte Erinnerungen
    beeinflussen nicht notwendigerweise das Verhalten der Kreatur – insbesondere dann nicht, wenn sie mit den natürlichen
    Neigungen, der Gesinnung oder dem Glauben der Kreatur im Widerspruch stehen. Eine unlogische veränderte Erinnerung, beispielsweise
    daran, wie gerne die Kreatur in Säure gebadet hat, wird als Albtraum abgetan. Der SL kann eine veränderte Erinnerung als
    zu unsinnig erklären, Fluch brechenVollständige um die Kreatur signifikant zu beeinflussen. Genesung Die Zauber  oder
    stellen die wahren Erinnerungen der Verwenden von Zauberplätzen höheren Grades: Kreatur wieder her. Du kannst die Erinnerung
    des Ziels an ein Ereignis verändern, das in den vergangenen sieben Tagen (6. Zauberplatzgrad), in den vergangenen 30 Tagen
    (7. Zauberplatzgrad), den vergangenen 365 Tagen (8. Zauberplatzgrad) oder zu einem beliebigen Zeitpunkt in der Vergangenheit
    der Kreatur (9. Zauberplatzgrad) stattgefunden hat.'
- name: Erschaffung
  schule: Illusionszauber
  grad: 5. Grades
  klassen:
  - Magier
  - Zauberer
  zeitaufwand: 1 Minute
  reichweite: 9 Meter
  komponenten: V, G, M (ein Farbpinsel)
  wirkungsdauer: Besonders
  beschreibung: 'Du ziehst Fäden aus Schattenmaterial aus dem Schattensaum und erschaffst einen Gegenstand in Reichweite.
    Es kann sich entweder um einen Gegenstand aus pflanzlichem Material (Textilien, Seil, Holz und dergleichen) oder um einen
    Gegenstand aus mineralischem Material (Stein, Kristall, Metall und dergleichen) handeln. Der Gegenstand darf nicht größer
    als ein Würfel mit 1,5 Metern Kantenlänge sein und muss aus einem Material bestehen sowie eine Form besitzen, die du bereits
    gesehen hast. Die Wirkungsdauer des Zaubers hängt vom Material des Gegenstands ab, wie in der Tabelle „Materialien“ dargestellt.
    Besteht der Gegenstand aus mehreren Materialien, so verwende die kürzeste Wirkungsdauer. Wenn ein mit diesem Zauber erschaffener
    Gegenstand als Materialkomponente für einen anderen Zauber verwendet wird, misslingt Mdear taenrdiaerliee Znauber. MaterialDauer
    Pflanzliches Material24 Stunden Stein oder Kristall12 Stunden Edelmetalle1 Stunde Edelsteine10 Minuten Adamant oder Mithral1
    Minute Verwenden von Zauberplätzen höheren Grades: Für jeden Zauberplatzgrad über dem 5. wird der Würfel um 1,5 Meter
    vergrößert.'
- name: Erwecken
  schule: Verwandlungszauber
  grad: 5. Grades
  klassen:
  - Barde
  - Druide
  zeitaufwand: 8 Stunden
  reichweite: Berührung
  komponenten: V, G, M (ein Achat im Wert von mindestens 1.000 GM, den der Zauber verbraucht)
  wirkungsdauer: Unmittelbar
  beschreibung: Du verbringst den Zeitaufwand damit, magische Pfade in einen kostbaren Edelstein zu zeichnen, und berührst
    anschließend ein Ziel. Beim Ziel muss es sich um ein Tier, um eine Pflanzenkreatur mit einem Intelligenzwert von höchstens
    3 oder um eine natürliche Pflanze handeln, die keine Kreatur ist. Das Ziel erhält einen Intelligenzwert von 10 sowie die
    Fähigkeit, eine dir bekannte Sprache zu sprechen. Wenn es sich um eine natürliche Pflanze handelt, wird diese zu einer
    Pflanzenkreatur, die ihre Wurzeln, Triebe, Ranken und Ähnliches bewegen kann und Sinne ähnlich denen eines erwachten Buschs
    Menschen hat. Dein SL wählt geeignete Spielwerte erwachten Baums aus, beispielsweise die des  oder des  im Monsterhandbuch.
    Die erweckte Kreatur ist bezaubert. Die Bezau‑ berung endet nach 30 Tagen, oder wenn du oder deine Verbündeten der Kreatur
    Schaden zufügen. Wenn die Bezauberung endet, wählt die Kreatur ihre Haltung dir gegenüber aus.
- name: Explosion der Zauberei
  schule: Hervorrufung
  grad: Zaubertrick
  klassen:
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 36 Meter
  komponenten: V, G
  wirkungsdauer: Unmittelbar
  beschreibung: 'Du wirkst zauberische Energie auf eine Kreatur oder einen Gegenstand in Reichweite. Führe einen Fernkampf‑Zauberangriff
    gegen das Ziel aus. Bei einem Treffer erleidet das Ziel 1W8 Schaden von einer Art deiner Wahl: Blitz, Feuer, Gift, Kälte,
    Psychisch, Säure oder Schall. Wenn du mit einem W8 eine 8 für diesen Zauber würfelst, kannst du mit einem weiteren W8
    würfeln und das Ergebnis dem Schaden hinzufügen. Wenn du diesen Zauber wirkst, entspricht die maximale Anzahl von W8,
    die du dem Zauberschaden hinzufügen kannst, deinem Zauberwirken‑ Zaubertrick-Aufwertung: Attributsmodifikator. Der Schaden
    wird um jeweils 1W8 erhöht, wenn du die 5. (2W8), die 11. (3W8) und die 17. (4W8) Stufe erreichst.'
- name: Fallen finden
  schule: Erkenntniszauber
  grad: 2. Grades
  klassen:
  - Druide
  - Kleriker
  - Waldläufer
  zeitaufwand: Aktion
  reichweite: 36 Meter
  komponenten: V, G
  wirkungsdauer: Unmittelbar
  beschreibung: Du erspürst alle Fallen, die sich in Reichweite und in deiner Sichtlinie befinden. Für diesen Zauber zählt
    jeder Gegenstand oder Mechanismus als Falle, der geschaffen wurde, um Schaden zu bewirken AlarmGlyphe des Schutzes oder
    eine sonstige Gefahr darzustellen. Dazu zählen Zauber wie  oder  oder mechanische Fallgruben, jedoch keine natürlichen
    Schwachstellen im Boden, keine instabilen Decken oder verborgene Senklöcher. Dieser Zauber enthüllt, dass eine Falle vorhanden
    ist, jedoch nicht, wo sie sich befindet. Du erfährst jedoch die allgemeine Art der Gefahr der Falle.
- name: Falsches Leben
  schule: Nekromantiezauber
  grad: 1. Grades
  klassen:
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: Selbst
  komponenten: V, G, M (ein Tropfen Alkohol)
  wirkungsdauer: Unmittelbar
  beschreibung: 'Verwenden von Zauberplätzen höheren Grades: Du erhältst 2W4+4 temporäre Trefferpunkte. Für jeden Zauberplatzgrad
    über dem 1. erhältst du 5 zusätzliche temporäre Trefferpunkte.'
- name: Federfall
  schule: Verwandlungszauber
  grad: 1. Grades
  klassen:
  - Barde
  - Magier
  - Zauberer
  zeitaufwand: Reaktion, die du ausführst, wenn du oder eine Kreatur im Abstand von bis zu 18 Metern von dir, die du sehen
    kannst, stürzt
  reichweite: 18 Meter
  komponenten: V, M (eine kleine Feder oder Daune)
  wirkungsdauer: 1 Minute
  beschreibung: Wähle bis zu fünf Kreaturen in Reichweite aus, die gerade stürzen. Ihre Fallgeschwindigkeit verlangsamt sich
    für die Wirkungsdauer auf 18 Meter pro Runde. Wenn eine Kreatur während der Wirkungsdauer landet, erleidet sie keinen
    Schaden durch den Sturz, und der Zauber endet bei dieser Kreatur.
- name: Feenfeuer
  schule: Hervorrufungszauber
  grad: 1. Grades
  klassen:
  - Barde
  - Druide
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: Gegenstände innerhalb eines Würfels mit sechs Metern Kantenlänge in Reichweite werden von blauem, grünem oder
    violettem Licht (nach deiner Wahl) umrahmt. Auch Kreaturen im Würfel werden umrahmt, es sei denn, sie bestehen einen Geschick‑
    lichkeitsrettungswurf. Betroffene Gegenstände und Kreaturen spenden für die Wirkungsdauer in einem Radius von drei Metern
    dämmriges Licht und profitieren nicht von Unsichtbarkeit. Angreifer sind bei Angriffswürfen gegen betroffene Kreaturen
    oder Gegenstände im Vorteil, sofern sie ihr Ziel sehen können.
- name: Feenwesen beschwören
  schule: Beschwörungszauber
  grad: 6. Grades
  klassen:
  - Druide
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V, G
  wirkungsdauer: Konzentration, bis zu 10 Minuten
  beschreibung: 'Du beschwörst einen mittelgroßen Geist aus der Feenwildnis in einem freien Bereich in Reichweite, den du
    sehen kannst. Der Geist bleibt für die Wirkungsdauer bestehen und gleicht einem Feenwesen deiner Wahl. Wenn der Geist
    erscheint, kannst du einen Nahkampf‑Zauberangriff gegen eine Kreatur im Abstand von bis zu 1,5 Metern vom Geist ausführen.
    Bei einem Treffer erleidet das Ziel psychischen Schaden in Höhe von 3W12 plus deinem Zauberwirken-Attributsmodifikator.
    Außerdem ist das Ziel bis zum Beginn deines nächsten Zugs verängstigt. Dabei seid sowohl du als auch der Geist die Quelle
    seiner Angst. Als Bonusaktion in deinen folgenden Zügen kannst du den Geist in einen freien Bereich im Abstand von bis
    zu neun Metern von seinem ursprünglichen Bereich teleportieren, den du sehen kannst, und den Angriff gegen eine Kreatur
    im Abstand von bis zu Verwenden von Zauberplätzen höheren Grades: 1,5 Metern vom Geist ausführen. Für jeden Zauberplatzgrad
    über dem 6. wird der Schaden um 1W12 erhöht.'
- name: Fesseln
  schule: Verzauberungszauber
  grad: 2. Grades
  klassen:
  - Barde
  - Hexenmeister
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V, G
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: Du intonierst eine ablenkende Folge von Worten. Kreaturen deiner Wahl in Reichweite, die du sehen kannst,
    führen einen Weisheitsrettungswurf aus. Jede Kreatur, gegen die du oder deine Gefährten kämpfen, besteht diesen Rettungswurf
    automatisch. Misslingt der Wurf, so hat das Ziel einen Malus von −10 auf Weisheitswürfe (Wahrnehmung) sowie auf Passive
    Wahrnehmung, bis der Zauber endet.
- name: Fesselnder Schlag
  schule: Beschwörungszauber
  grad: 1. Grades
  klassen:
  - Waldläufer
  zeitaufwand: Bonusaktion, die du sofort ausführst,
  reichweite: Selbst
  komponenten: V
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: 'wenn du eine Kreatur mit einer Waffe getroffen hast Wenn du das Ziel triffst, erscheinen greifende Ranken
    an ihm, und es führt einen Stärkerettungswurf aus. Kreaturen von mindestens großer Größe sind bei diesem Rettungswurf
    im Vorteil. Misslingt der Wurf, so ist das Ziel festgesetzt, bis der Zauber endet. Bei einem erfolgreichen Rettungswurf
    verwelken die Ranken, und der Zauber endet. Während das Ziel festgesetzt ist, erleidet es zu Beginn jedes seiner Züge
    1W6 Stichschaden. Das Ziel oder eine Kreatur in seiner Reichweite kann mit einer Aktion einen Stärkewurf (Athletik) gegen
    deinen Zauberrettungswurf‑SG ausführen. Verwenden von Zauberplätzen höheren Grades: Bei einem Erfolg endet der Zauber.
    Für jeden Zauberplatzgrad über dem 1. wird der Schaden um 1W6 erhöht.'
- name: Feuerball
  schule: Hervorrufungszauber
  grad: 3. Grades
  klassen:
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 45 Meter
  komponenten: V, G, M (eine Kugel aus Fledermaus Guano und Schwefel)
  wirkungsdauer: Unmittelbar
  beschreibung: 'Du verschießt einen hellen Lichtstrahl auf einen Punkt deiner Wahl in Reichweite, wo er unter dumpfem Grollen
    zu einer Flammenexplosion detoniert. Jede Kreatur in einer Kugel mit einem Radius von sechs Metern um diesen Punkt führt
    einen Geschicklichkeitsrettungswurf aus. Misslingt der Wurf, so erleidet sie 8W6 Feuerschaden, anderenfalls die Hälfte.
    Brennbare Gegenstände im Bereich, die nicht getragen oder gehalten werden, beginnen zu Verwenden von Zauberplätzen höheren
    Grades: brennen. Für jeden Zauberplatzgrad über dem 3. wird der Schaden um 1W6 erhöht.'
- name: Feuerpfeil
  schule: Hervorrufung
  grad: Zaubertrick
  klassen:
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 36 Meter
  komponenten: V, G
  wirkungsdauer: Unmittelbar
  beschreibung: 'Du schleuderst einen Feuerfunken auf eine Kreatur oder einen Gegenstand in Reichweite. Führe einen Fernkampf‑Zauberangriff
    gegen das Ziel aus. Bei einem Treffer erleidet das Ziel 1W10 Feuerschaden. Der Zauber setzt brennbare Gegenstände in Brand,
    die er trifft und die nicht getragen oder gehalten Zaubertrick-Aufwertung: werden. Der Schaden wird um jeweils 1W10 erhöht,
    wenn du die 5. (2W10), die 11. (3W10) und die 17. (4W10) Stufe erreichst.'
- name: Feuerschild
  schule: Hervorrufungszauber
  grad: 4. Grades
  klassen:
  - Druide
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: Selbst
  komponenten: V, G, M (etwas Phosphor oder ein Glühwürmchen)
  wirkungsdauer: 10 Minuten
  beschreibung: Für die Wirkungsdauer umgeben feine Flammen deinen Körper und spenden in einem Radius von drei Metern helles
    Licht und in einem Radius von weiteren drei Metern dämmriges Licht. Die Flammen verleihen dir einen Wärmeschild oder einen
    Kälteschild (nach deiner Wahl). Der Wärmeschild gewährt dir Resistenz gegen Kälteschaden, der Kälteschild Resistenz gegen
    Feuerschaden. Wann immer dich eine Kreatur im Abstand von bis zu 1,5 Metern von dir mit einem Nahkampf‑ angriffswurf trifft,
    geht der Schild außerdem in Flammen auf. Der Angreifer erleidet 2W8 Feuerschaden durch einen Wärmeschild oder 2W8 Kälteschaden
    durch einen Kälteschild.
- name: Feuersturm
  schule: Hervorrufungszauber
  grad: 7. Grades
  klassen:
  - Druide
  - Kleriker
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 45 Meter
  komponenten: V, G
  wirkungsdauer: Unmittelbar
  beschreibung: Ein Feuersturm erscheint in Reichweite. Der Bereich des Sturms besteht aus bis zu zehn Würfeln mit drei Metern
    Kantenlänge, die du beliebig anordnest. Jeder Würfel muss an mindestens einen anderen angrenzen. Jede Kreatur im Bereich
    führt einen Geschicklichkeitsrettungswurf aus. Misslingt der Wurf, so erleidet sie 7W10 Feuerschaden, anderenfalls die
    Hälfte. Brennbare Gegenstände im Bereich, die nicht getragen oder gehalten werden, beginnen zu brennen.
- name: Feuerwand
  schule: Hervorrufungszauber
  grad: 4. Grades
  klassen:
  - Druide
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 36 Meter
  komponenten: V, G, M (ein Stück Kohle)
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: 'Du erschaffst auf einer festen Oberfläche in Reichweite eine Feuerwand. Du kannst eine gerade Wand mit bis
    zu 18 Metern Länge oder eine ringförmige Wand mit einem Radius von bis zu drei Metern erschaffen. In beiden Fällen ist
    die Wand sechs Meter hoch und 30 Zentimeter dick. Die Wand ist undurchsichtig und bleibt für die Wirkungsdauer bestehen.
    Wenn die Wand erscheint, führt jede Kreatur in ihrem Bereich einen Geschicklichkeitsrettungswurf aus. Misslingt der Wurf,
    so erleidet die Kreatur 5W8 Feuerschaden, anderenfalls die Hälfte. Eine Seite der Wand, die du beim Wirken des Zaubers
    bestimmst, fügt jeder Kreatur, die ihren Zug im Abstand von bis zu drei Metern von der Seite oder in der Wand beendet,
    5W8 Feuerschaden zu. Eine Kreatur erleidet den Schaden ebenfalls, wenn sie die Wand in einem Zug erstmals betritt. Verwenden
    von Zauberplätzen höheren Grades: Die andere Seite der Wand bewirkt keinen Schaden. Für jeden Zauberplatzgrad über dem
    4. wird der Schaden um 1W8 erhöht.'
- name: Finger des Todes
  schule: Nekromantiezauber
  grad: 7. Grades
  klassen:
  - Hexenmeister
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V, G
  wirkungsdauer: Unmittelbar
  beschreibung: Du entfesselst negative Energie auf eine Kreatur in Reichweite, die du sehen kannst. Das Ziel führt einen
    Konstitutionsrettungswurf aus. Misslingt der Wurf, so erleidet das Ziel 7W8+30 nekrotischen Schaden, anderenfalls die
    Hälfte. Wenn ein Humanoide durch diesen Zauber getötet Zombie wird, steht er zu Beginn deines nächsten Zugs als (siehe
    „Monster“) wieder auf und folgt deinen verbalen Befehlen.
- name: Flammen erzeugen
  schule: Beschwörung
  grad: Zaubertrick
  klassen:
  - Druide
  zeitaufwand: Bonusaktion
  reichweite: Selbst
  komponenten: V, G
  wirkungsdauer: 10 Minuten
  beschreibung: 'In deiner Hand erscheint für die Wirkungsdauer eine flackernde Flamme. Sie strahlt keine Wärme aus und kann
    nichts entzünden, spendet jedoch in einem Radius von sechs Metern helles Licht und in einem Radius von weiteren sechs
    Metern dämmriges Licht. Der Zauber endet vorzeitig, wenn du ihn erneut wirkst. Bis der Zauber endet, kannst du eine magische
    Aktion ausführen, um Feuer auf eine Kreatur oder einen Gegenstand im Abstand von bis zu 18 Metern von dir zu schleudern.
    Führe einen Fernkampf‑ Zauberangriff aus. Bei einem Treffer erleidet das Zaubertrick-Aufwertung: Ziel 1W8 Feuerschaden.
    Der Schaden wird um jeweils 1W8 erhöht, wenn du die 5. (2W8), die 11. (3W8) und die 17. (4W8) Stufe erreichst.'
- name: Flammende Wolke
  schule: Beschwörungszauber
  grad: 8. Grades
  klassen:
  - Druide
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 45 Meter
  komponenten: V, G
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: Eine wirbelnde Wolke aus Funken und Rauch erfüllt eine Kugel mit einem Radius von sechs Metern um einen Punkt
    in Reichweite. Der Bereich der Wolke ist komplett verschleiert. Die Wolke bleibt für die Windstoß Wirkungsdauer bestehen,
    oder bis starker Wind (wie solcher durch ) sie auflöst. Wenn die Wolke erscheint, führt jede Kreatur darin einen Geschicklichkeitsrettungswurf
    aus. Misslingt der Wurf, so erleidet sie 10W8 Feuerschaden, anderenfalls die Hälfte. Eine Kreatur muss den Konstitutionsrettungswurf
    auch dann ausführen, wenn die Kugel sich in ihren Bereich bewegt, wenn die Kreatur die Kugel betritt oder wenn sie ihren
    Zug darin beendet. Eine Kreatur kann diesen Rettungswurf nur einmal pro Zug ausführen. Zu Beginn jedes deiner Züge bewegt
    sich die Wolke um drei Meter in einer Richtung deiner Wahl von dir weg.
- name: Flammenklinge
  schule: Hervorrufungszauber
  grad: 2. Grades
  klassen:
  - Druide
  - Zauberer
  zeitaufwand: Bonusaktion
  reichweite: Selbst
  komponenten: V, G, M (ein SumachBlatt)
  wirkungsdauer: Konzentration, bis zu 10 Minuten
  beschreibung: 'Du erschaffst eine feurige Klinge in deiner freien Hand. Die Klinge ähnelt einem Krummsäbel und bleibt für
    die Wirkungsdauer bestehen. Wenn du die Klinge loslässt, verschwindet sie. Du kannst sie jedoch als Bonusaktion erneut
    beschwören. Du kannst als magische Aktion einen Nahkampf‑ Zauberangriff mit der Flammenklinge ausführen. Bei einem Treffer
    erleidet das Ziel Feuerschaden in Höhe von 3W6 plus deinem Zauberwirken‑ Attributsmodifikator. Die Flammenklinge spendet
    in einem Radius von drei Metern helles Licht und in einem Radius von Verwenden von Zauberplätzen höheren Grades: weiteren
    drei Metern dämmriges Licht. Für jeden Zauberplatzgrad über dem 2. wird der Schaden um 1W6 erhöht.'
- name: Flammenkugel
  schule: Beschwörungszauber
  grad: 2. Grades
  klassen:
  - Druide
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V, G, M (eine Kugel aus Wachs)
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: 'Du erzeugst in einem freien Bereich in Reichweite auf dem Boden eine flammende Kugel mit einem Radius von
    1,5 Metern. Die Kugel bleibt für die Wirkungsdauer bestehen. Jede Kreatur, die ihren Zug in im Abstand von bis zu 1,5
    Metern um die Kugel beendet, führt einen Geschicklichkeitsrettungswurf aus. Misslingt der Wurf, so erleidet sie 2W6 Feuerschaden,
    anderenfalls die Hälfte. Als Bonusaktion kannst du die Kugel bis zu neun Meter weit über den Boden rollen lassen. Wenn
    du die Kugel in den Bereich einer Kreatur bewegst, muss diese den Rettungswurf gegen die Kugel ausführen, und die Kugel
    beendet ihre Bewegung für diesen Zug. Bewegst du die Kugel, so kannst du sie über bis zu 1,5 Meter hohe Hindernisse dirigieren
    und über bis zu drei Meter breite Gruben springen lassen. Brennbare Gegenstände, die nicht getragen oder gehalten werden,
    beginnen zu brennen, wenn sie von der Kugel berührt werden. Die Kugel spendet in einem Radius von sechs Metern helles
    Licht sowie in einem Radius von weiteren sechs Metern Verwenden von Zauberplätzen höheren Grades: dämmriges Licht. Für
    jeden Zauberplatzgrad über dem 2. wird der Schaden um 1W6 erhöht.'
- name: Flammenschlag
  schule: Hervorrufungszauber
  grad: 5. Grades
  klassen:
  - Kleriker
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V, G, M (eine Prise Schwefel)
  wirkungsdauer: Unmittelbar
  beschreibung: 'Eine vertikale Säule aus strahlendem Feuer fährt von oben herab. Jede Kreatur in einem zwölf Meter hohen
    Zylinder mit einem Radius von drei Metern um einen Punkt in Reichweite führt einen Geschicklichkeitsrettungswurf aus.
    Misslingt der Wurf, so erleidet die Kreatur 5W6 Feuerschaden und 5W6 gleißenden Schaden, anderenfalls die Verwenden von
    Zauberplätzen höheren Grades: Hälfte. Für jeden Zauberplatzgrad über dem 5. werden Feuerschaden und gleißender Schaden
    um 1W6 erhöht.'
- name: Fleisch zu Stein
  schule: Verwandlungszauber
  grad: 6. Grades
  klassen:
  - Druide
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V, G, M (eine SchreckhahnFeder)
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: Du versuchst, eine Kreatur in Reichweite, die du sehen kannst, in Stein zu verwandeln. Das Ziel führt einen
    Konstitutionsrettungswurf aus. Misslingt der Wurf, so ist es für die Wirkungsdauer festgesetzt. Bei einem erfolgreichen
    Rettungswurf beträgt seine Bewegungsrate bis zum Beginn deines nächsten Zugs 0. Konstrukte bestehen den Rettungswurf automatisch.
    Eine festgesetzte Kreatur führt am Ende jedes ihrer Züge einen weiteren Konstitutionsrettungs‑ wurf aus. Bei drei erfolgreichen
    Rettungswürfen endet dieser Zauber. Bei drei Misserfolgen wird sie zu Stein und hat für die Wirkungsdauer den Zustand
    Versteinert. Die Erfolge und Misserfolge müssen nicht aufeinanderfolgen. Notiere einfach beide, bis das Ziel drei von
    einem hat. Wenn du dich für die gesamte Wirkungsdauer auf diesen Zauber konzentrierst, versteinert Vollständige Genesung
    die Kreatur, bis der Effekt durch den Zauber oder ähnliche Magie aufgehoben wird.
- name: Flimmern
  schule: Verwandlungszauber
  grad: 3. Grades
  klassen:
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: Selbst
  komponenten: V, G
  wirkungsdauer: 1 Minute
  beschreibung: Würfle während der Wirkungsdauer am Ende jedes deiner Züge mit 1W6. Bei einem Ergebnis von 4–6 verschwindest
    du von deiner aktuellen Existenzebene und erscheinst auf der Ätherebene (der Zauber endet sofort, wenn du dich bereits
    auf dieser Ebene befindest). Von der Ätherebene aus kannst du die Ebene, die du verlassen hast, wahrnehmen. Du siehst
    sie jedoch nur in Graustufen, und deine Sichtweite beträgt höchstens 18 Meter. Du kannst nur andere Kreaturen auf der
    Ätherebene beeinflussen oder von ihnen beeinflusst werden. Kreaturen auf der anderen Ebene können dich nicht wahrnehmen,
    es sei denn, eine Spezialfähigkeit erlaubt ihnen, Dinge auf der Ätherebene wahrzunehmen. Du kehrst zu Beginn deines nächsten
    Zugs – oder wenn der Zauber endet, während du dich auf der Ätherebene befindest – auf die andere Ebene zurück. Du kehrst
    in einen freien Bereich deiner Wahl, den du sehen kannst, im Abstand von bis zu drei Metern vom Bereich zurück, den du
    verlassen hast. Ist innerhalb dieser Reichweite kein freier Bereich vorhanden, so erscheinst du im nächstgelegenen freien
    Bereich.
- name: Fluch
  schule: Nekromantiezauber
  grad: 3. Grades
  klassen:
  - Barde
  - Kleriker
  - Magier
  zeitaufwand: Aktion
  reichweite: Berührung
  komponenten: V, G
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: 'Du berührst eine Kreatur. Diese muss einen Weisheitsrettungswurf bestehen, oder sie ist für die Wirkungsdauer
    verflucht. Bis der Fluch endet, erleidet das Ziel einen der folgenden Effekte deiner Wahl: • Wähle ein Attribut aus. Das
    Ziel ist bei allen Attributs‑ und Rettungswürfen mit diesem Attribut im Nachteil. • Das Ziel ist bei Angriffswürfen gegen
    dich im Nachteil. • Im Kampf muss das Ziel zu Beginn jedes seiner Züge einen Weisheitsrettungswurf bestehen, oder es ist
    gezwungen, die Ausweichaktion auszuführen. • Wenn du dem Ziel mit einem Angriffswurf oder einem Zauber Schaden zufügst,
    erleidet es zusätzlich 1W8 nekrotischen Schaden. Verwenden von Zauberplätzen höheren Grades: Bei einem Zauberplatz des
    4. Grades kannst du deine Konzentration auf diesen Zauber bis zu zehn Minuten lang aufrechterhalten. Bei einem Zauberplatz
    ab dem 5. Grad erfordert der Zauber keine Konzentration, und die Wirkungsdauer beträgt acht Stunden (Zauberplatzgrad 5–6)
    oder 24 Stunden (Zauberplatzgrad 7–8). Bei einem Zauberplatz des 9. Grades hält der Zauber an, bis er gebannt wird.'
- name: Fluch brechen
  schule: Bannzauber
  grad: 3. Grades
  klassen:
  - Hexenmeister
  - Kleriker
  - Magier
  - Paladin
  zeitaufwand: Aktion
  reichweite: Berührung
  komponenten: V, G
  wirkungsdauer: Unmittelbar
  beschreibung: Auf deine Berührung hin enden alle Flüche, die auf eine Kreatur oder einen Gegenstand wirken. Ist ein verfluchter
    Gegenstand magisch, so bleibt der Fluch zwar bestehen, aber der Zauber bricht die Einstimmung des Besitzers, sodass der
    Gegenstand entfernt oder weggeworfen werden kann.
- name: Flug
  schule: Verwandlungszauber
  grad: 3. Grades
  klassen:
  - Hexenmeister
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: Berührung
  komponenten: V, G, M (eine Feder)
  wirkungsdauer: Konzentration, bis zu 10 Minuten
  beschreibung: 'Du berührst eine bereitwillige Kreatur. Für die Wirkungsdauer erhält das Ziel eine Flugbewegungs‑ rate von
    18 Metern und kann schweben. Wenn der Zauber endet und das Ziel noch fliegt, stürzt es ab, Verwenden von Zauberplätzen
    höheren Grades: sofern es den Sturz nicht verhindern kann. Für jeden Zauberplatzgrad über dem 3. kannst du auf eine weitere
    Kreatur zielen.'
- name: Frostsphäre
  schule: Hervorrufungszauber
  grad: 6. Grades
  klassen:
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 90 Meter
  komponenten: V, G, M (eine MiniaturKristallkugel)
  wirkungsdauer: Unmittelbar
  beschreibung: 'Du verschießt eine eisige Kugel an einen Punkt deiner Wahl in Reichweite, wo sie zu einer Kugel mit einem
    Radius von 18 Metern explodiert. Jede Kreatur in diesem Bereich führt einen Konstitutions‑ rettungswurf aus. Misslingt
    der Wurf, so erleidet sie 10W6 Kälteschaden, anderenfalls die Hälfte. Wenn die Kugel ein Gewässer trifft, so gefriert
    dieses in einem quadratischen Bereich von neun Metern Kantenlänge bis in eine Tiefe von 15 Zentimetern. Das Eis bleibt
    eine Minute lang bestehen. Kreaturen, die an der Oberfläche des gefrorenen Wassers schwimmen, werden im Eis gefangen und
    sind festgesetzt. Eine gefangene Kreatur kann als Aktion einen Stärkewurf (Athletik) gegen deinen Zauberrettungswurf‑SG
    ausführen, um sich zu befreien. Du musst die Kugel nach dem Wirken des Zaubers nicht sofort verschießen. In diesem Fall
    erscheint eine kleine kühle Kugel von der Größe eines Schleudersteins in deiner Hand. Du oder eine Kreatur, der du die
    Kugel gibst, kann sie jederzeit bis zu zwölf Meter weit werfen oder mit einer Schleuder innerhalb ihrer Grundreichweite
    verschießen. Die Kugel zerbirst beim Aufprall und bewirkt den gleichen Effekt wie das normale Wirken des Zaubers. Du kannst
    die Kugel auch ablegen, ohne dass sie zerbirst. Ist sie nach einer Verwenden von Zauberplätzen höheren Grades: Minute
    nicht zerborsten, so explodiert sie. Für jeden Zauberplatzgrad über dem 6. wird der Schaden um 1W6 erhöht.'
- name: Furcht
  schule: Illusionszauber
  grad: 3. Grades
  klassen:
  - Barde
  - Hexenmeister
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: Selbst
  komponenten: V, G, M (eine weiße Feder)
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: Jede Kreatur in einem Kegel von neun Metern muss einen Weisheitsrettungswurf bestehen, oder sie lässt fallen,
    was auch immer sie hält, und ist für die Wirkungsdauer verängstigt. Eine verängstigte Kreatur führt in jedem ihrer Züge
    die Spurt‑Aktion aus und entfernt sich auf dem sichersten Weg von dir, sofern möglich. Beendet eine Kreatur ihren Zug
    in einem Bereich, in dem du nicht in ihrer Sichtlinie bist, führt sie einen Weisheitsrettungswurf aus. Bei einem erfolgreichen
    Rettungswurf endet der Zauber bei der Kreatur.
- name: Fürchterlicher Lachanfall
  schule: Verzauberungszauber
  grad: 1. Grades
  klassen:
  - Barde
  - Hexenmeister
  - Magier
  zeitaufwand: Aktion
  reichweite: 9 Meter
  komponenten: V, G, M (eine Torte und eine Feder)
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: 'Eine Kreatur deiner Wahl in Reichweite, die du sehen kannst, führt einen Weisheitsrettungswurf aus. Misslingt
    der Wurf, so hat sie für die Wirkungsdauer die Zustände Liegend sowie Kampfunfähig. Während dieser Dauer lacht sie unkontrollierbar,
    sofern sie lachen kann, und kann den Zustand Liegend bei sich nicht beenden. Am Ende jedes ihrer Züge und jedes Mal, wenn
    sie Schaden erleidet, führt die Kreatur einen weiteren Weisheitsrettungswurf aus. Dabei ist sie im Vorteil, wenn der Rettungswurf
    durch Schaden ausgelöst wurde. Bei einem erfolgreichen Rettungswurf endet Verwenden von Zauberplätzen höheren Grades:
    der Zauber. Für jeden Zauberplatzgrad über dem 1. kannst du auf eine weitere Kreatur zielen.'
- name: Gasförmige Gestalt
  schule: Verwandlungszauber
  grad: 3. Grades
  klassen:
  - Hexenmeister
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: Berührung
  komponenten: V, G, M (ein Stück Gaze)
  wirkungsdauer: Konzentration, bis zu 1 Stunde
  beschreibung: 'Für die Wirkungsdauer verwandelt sich eine bereitwillige Kreatur, die du berührst, mitsamt ihrer Ausrüstung
    in eine Nebelwolke. Der Zauber endet beim Ziel, wenn seine Trefferpunkte auf 0 sinken oder es den Zauber mithilfe einer
    magischen Aktion selbst beendet. In dieser Gestalt verfügt das Ziel als einzige Bewegungsrate über eine Flugbewegungsrate
    von drei Metern, und es kann schweben. Das Ziel kann den Bereich einer anderen Kreatur betreten und besetzen. Es ist gegen
    Hieb‑, Stich‑ und Wuchtschaden resistent, gegen den Zustand Liegend immun und bei Stärke‑, Geschicklichkeits‑ und Konstitutionsrettungswürfen
    im Vorteil. Es kann kleine Öffnungen passieren, behandelt jedoch Flüssigkeiten wie solide Oberflächen. Das Ziel kann weder
    sprechen noch mit Gegen‑ ständen interagieren. Es kann Gegenstände, die es getragen oder gehalten hat, nicht fallenlassen,
    verwenden oder anderweitig mit ihnen interagieren. Außerdem kann es weder angreifen noch Zauber Verwenden von Zauberplätzen
    höheren Grades: wirken. Für jeden Zauberplatzgrad über dem 3. kannst du auf eine weitere Kreatur zielen.'
- name: Geas
  schule: Verzauberungszauber
  grad: 5. Grades
  klassen:
  - Barde
  - Druide
  - Kleriker
  - Magier
  - Paladin
  zeitaufwand: 1 Minute
  reichweite: 18 Meter
  komponenten: V
  wirkungsdauer: 30 Tage
  beschreibung: 'Du erteilst einer Kreatur in Reichweite, die du sehen kannst, den verbalen Befehl, eine Aufgabe zu erfüllen
    oder eine bestimmte Aktion oder Handlungsrichtung deiner Wahl zu unterlassen. Das Ziel muss einen Weisheitsrettungswurf
    bestehen, oder es ist für die Wirkungsdauer bezaubert. Es besteht den Rettungswurf automatisch, wenn es deinen Befehl
    nicht verstehen kann. Die bezauberte Kreatur erleidet 5W10 psychischen Schaden, wenn sie sich deinem Befehl gegensätzlich
    verhält. Sie kann diesen Schaden höchstens einmal täglich erleiden. Du kannst einen beliebigen Befehl erteilen, jedoch
    keine Handlungen, die zum sicheren Tod führen würden. Erteilst du einen selbstmörderischen Fluch brechenVollständige Befehl,
    so endet der Zauber. GenesungWunsch Auch die Zauber , Verwenden von Zauberplätzen höheren Grades: oder  beenden den Zauber.
    Bei einem Zauberplatz des 7. oder 8. Grades beträgt die Wirkungsdauer 365 Tage. Bei einem Zauberplatz des 9. Grades hält
    der Zauber an, bis er durch einen der oben genannten Zauber gebannt wird.'
- name: Gebet der Heilung
  schule: Bannzauber
  grad: 2. Grades
  klassen:
  - Kleriker
  - Paladin
  zeitaufwand: 10 Minuten
  reichweite: 9 Meter
  komponenten: V
  wirkungsdauer: Unmittelbar
  beschreibung: 'Bis zu fünf Kreaturen deiner Wahl, die während des gesamten Zeitaufwands in Reichweite verbleiben, erhalten
    die Vorzüge einer kurzen Rast. Außerdem erhalten sie jeweils 2W8 Trefferpunkte zurück. Eine Kreatur kann erst nach einer
    langen Rast Verwenden von Zauberplätzen höheren Grades: erneut Ziel dieses Zaubers werden. Für jeden Zauberplatzgrad über
    dem 2. wird die Heilung um 1W8 Trefferpunkte erhöht.'
- name: Gedanken wahrnehmen
  schule: Erkenntniszauber
  grad: 2. Grades
  klassen:
  - Barde
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: Selbst
  komponenten: V, G, M (1 Kupfermünze)
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: 'Du aktivierst einen der nachstehenden Effekte. Bis der Zauber endet, kannst du jeweils einen der Effekte
    als magische Aktion in deinen folgenden Gedanken spüren: Zügen aktivieren. Du spürst Gedanken von Kreaturen im Abstand
    von bis zu neun Metern von dir, die Sprachen oder Telepathie beherrschen. Du kannst die Gedanken zwar nicht lesen, weißt
    aber, dass eine denkende Kreatur anwesend ist. Der Zauber wird von 30 Zentimetern Stein, Erde oder Holz sowie von 2,5
    Zentimetern Metall oder Gedanken lesen: einer dünnen Bleischicht blockiert. Ziele auf eine Kreatur im Abstand von bis
    zu neun Metern von dir, die du sehen kannst oder mit der Option Gedanken spüren entdeckt hast. Du erfährst, was die Kreatur
    im Augenblick am meisten beschäftigt. Wenn das Ziel weder Sprachen noch Telepathie beherrscht, erfährst du nichts. Als
    magische Aktion im nächsten Zug kannst du versuchen, tiefer in den Verstand des Ziels einzudringen. In diesem Fall führt
    das Ziel einen Weisheitsrettungswurf aus. Misslingt der Wurf, so erhältst du Einsicht in seine Beweggründe und Emotionen
    sowie in etwas, das seine Gedanken beherrscht (beispielsweise Sorgen, Liebe oder Hass) Bei einem erfolgreichen Rettungswurf
    endet der Zauber. In jedem Fall merkt das Ziel, dass du in seinen Verstand eindringst. Solange du deine Aufmerksamkeit
    auf seinen Verstand richtest, kann es als Aktion in seinem Zug einen Intelligenzwurf (Arkane Kunde) gegen deinen Zauberrettungswurf‑SG
    ausführen. Bei einem Erfolg endet der Zauber.'
- name: Gedankendorn
  schule: Erkenntniszauber
  grad: 2. Grades
  klassen:
  - Hexenmeister
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 36 Meter
  komponenten: S
  wirkungsdauer: Konzentration, bis zu 1 Stunde
  beschreibung: 'Du treibst einer Kreatur in Reichweite, die du sehen kannst, einen desorientierenden Stachel psionischer
    Energie in den Geist. Das Ziel führt einen Weisheitsrettungswurf aus. Misslingt der Wurf, so erleidet es 3W8 psychischen
    Schaden, anderenfalls die Hälfte. Misslingt der Wurf, so kennst du außerdem stets den Aufenthaltsort des Ziels, bis der
    Zauber endet, sofern ihr euch beide auf derselben Existenzebene befindet. Solange du über dieses Wissen verfügst, kann
    das Ziel sich nicht vor dir verstecken, und wenn es unsichtbar ist, gibt Verwenden von Zauberplätzen höheren Grades: ihm
    dieser Zustand gegen dich keine Vorzüge. Für jeden Zauberplatzgrad über dem 2. wird der Schaden um 1W8 erhöht.'
- name: Gedankenleere
  schule: Bannzauber
  grad: 8. Grades
  klassen:
  - Barde
  - Magier
  zeitaufwand: Aktion
  reichweite: Berührung
  komponenten: V, G
  wirkungsdauer: 24 Stunden
  beschreibung: Eine bereitwillige Kreatur, die du berührst, ist für die Wirkungsdauer gegen psychischen Schaden und den Zustand
    Bezaubert immun. Das Ziel ist außerdem nicht von Effekten zum Erkennen seiner Gefühle und Gedanken, seiner Gesinnung sowie
    zum Wunsch Bestimmen seines Aufenthaltsorts auf magische Art betroffen. Kein Zauber – auch nicht  – kann Informationen
    über das Ziel sammeln, es aus der Ferne beobachten oder seinen Verstand kontrollieren.
- name: Gefühle besänftigen
  schule: Verzauberungszauber
  grad: 2. Grades
  klassen:
  - Barde
  - Kleriker
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V, G
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: 'Jeder Humanoide innerhalb einer Kugel mit einem Radius von sechs Metern um einen Punkt deiner Wahl in Reichweite
    muss einen Charismarettungswurf bestehen, oder einer der folgenden Effekte wirkt auf ihn (wähle für jede Kreatur einen
    Effekt aus): • Die Kreatur ist für die Wirkungsdauer gegen die Zustände Bezaubert und Verängstigt immun. Wenn die Kreatur
    bereits bezaubert oder verängstigt war, werden diese Zustände für die Wirkungsdauer unterdrückt. • Die Kreatur wird Kreaturen
    deiner Wahl gegen‑ über gleichgültig, denen es feindlich gesinnt war. Diese Gleichgültigkeit endet, wenn das Ziel Scha‑
    den erleidet oder sieht, dass seine Verbündeten Schaden erleiden. Wenn der Zauber endet, wird die Haltung der Kreatur
    wieder normal.'
- name: Gegenstand aufspüren
  schule: Erkenntniszauber
  grad: 2. Grades
  klassen:
  - Barde
  - Druide
  - Kleriker
  - Magier
  - Paladin
  - Waldläufer
  zeitaufwand: Aktion
  reichweite: Selbst
  komponenten: V, G, M (ein gegabelter Zweig)
  wirkungsdauer: Konzentration, bis zu 10 Minuten
  beschreibung: Beschreibe oder nenne einen Gegenstand, mit dem du vertraut bist. Sofern der Gegenstand sich im Abstand von
    bis zu 300 Metern von dir befindet, spürst du, in welcher Richtung sein Aufenthaltsort liegt. Wenn sich der Gegenstand
    in Bewegung befindet, weißt du, in welche Richtung er bewegt wird. Der Zauber kann einen bestimmtem dir bekannten Gegenstand
    aufspüren, sofern du diesen mindestens einmal aus der Nähe – aus höchstens neun Metern Entfernung – gesehen hast. Alternativ
    kann der Zauber den nächstgelegenen Gegenstand einer bestimmten Art aufspüren, wie eine bestimmte Art von Kleidung, Möbel,
    Schmuck, Waffe oder Werkzeug. Dieser Zauber kann den Gegenstand nicht aufspüren, wenn Blei den direkten Weg zwischen dir
    und dem Gegenstand blockiert – egal, welche Dicke das Blei hat es hat.
- name: Gegenstände beleben
  schule: Verwandlungszauber
  grad: 5. Grades
  klassen:
  - Barde
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 36 Meter
  komponenten: V, G
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: 'Auf deinen Befehl hin werden Gegenstände belebt. Wähle eine Anzahl nichtmagischer Gegenstände in Reichweite
    aus, die nicht getragen oder gehalten werden, nicht an einer Oberfläche fixiert und kleiner als gigantisch sind. Die maximale
    Anzahl von Gegenständen entspricht deinem Zauberwirken‑ Attributsmodifikator. Dabei zählt ein Ziel von höchstens mittelgroßer
    Größe als ein Gegenstand, ein großes Ziel zählt als zwei Gegenstände, und ein riesiges Ziel zählt als drei Gegenstände.
    Jedes Ziel wird belebt, es erhält Beine und wird belebten Gegenstands zu einem Konstrukt, das den Wertekasten eines verwendet.
    Diese Kreatur steht unter deiner Kontrolle, bis der Zauber endet oder seine Trefferpunkte auf 0 sinken. Jede Kreatur,
    die du mit diesem Zauber erzeugst, ist mit dir und deinen Verbündeten verbündet. Im Kampf teilt sie deinen Initiativewert
    und ist unmittelbar nach dir am Zug. Bis der Zauber endet, kannst du als Bonusaktion jede Kreatur, die du mit diesem Zauber
    erschaffen hast und die sich im Abstand von bis zu 150 Metern von dir befindet, mental befehligen. Handelt es sich um
    mehrere Kreaturen, so kannst du beliebig viele von ihnen gleichzeitig befehligen, wobei jeweils der gleiche Befehl erteilt
    wird. Wenn du keine Befehle erteilst, führt die Kreatur die Ausweichaktion aus und bewegt sich nur, um Schaden zu vermeiden.
    Wenn die Trefferpunkte der Kreatur auf 0 sinken, nimmt sie wieder ihre Gegenstandgestalt an. Über‑ Verwenden von Zauberplätzen
    höheren Grades: schüssiger Schaden wird auf diese Form übertragen. Für jeden Zauberplatzgrad über dem 5. wird der Hiebschaden
    der Kreatur um 1W4 (höchstens mittelgroß), 1W6 (groß) oder 1W12 (riesig) erhöht. MODRWMODRWMODRW S 16+3+3G 10+0+0K 10+0+0
    täeSon I 3−4−4W 3−4−4C 1−5−5 nteIha Aktionen'
- name: Gegenzauber
  schule: Bannzauber
  grad: 3. Grades
  klassen:
  - Hexenmeister
  - Magier
  - Zauberer
  zeitaufwand: Reaktion, die du ausführst, wenn du siehst, wie eine Kreatur im Abstand von bis zu 18 Metern von dir einen
    Zauber mit Gesten, Material oder Verbalkomponenten wirkt
  reichweite: 18 Meter
  komponenten: G
  wirkungsdauer: Unmittelbar
  beschreibung: Du versuchst, eine Kreatur beim Wirken eines Zaubers zu unterbrechen. Die Kreatur führt einen Konstitutionsrettungswurf
    aus. Misslingt der Wurf, so löst der Zauber sich ohne Effekt auf, und die Aktion, Bonusaktion oder Reaktion, mit der er
    gewirkt wurde, ist vergeudet. Wenn der Zauber mit einem Zauberplatz gewirkt wurde, so wird dieser nicht verbraucht.
- name: Gehässiger Spott
  schule: Verzauberung
  grad: Zaubertrick
  klassen:
  - Barde
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V
  wirkungsdauer: Unmittelbar
  beschreibung: 'Du entfesselst eine Reihe von Beleidigungen mit subtilen Verzauberungen auf eine Kreatur in Reichweite, die
    du hören oder sehen kannst. Das Ziel muss einen Weisheitsrettungswurf bestehen, oder es erleidet 1W6 psychischen Schaden
    und ist beim nächsten Angriffswurf vor dem Ende seines Zaubertrick-Aufwertung: nächsten Zugs im Nachteil. Der Schaden
    wird um jeweils 1W6 erhöht, wenn du die 5. (2W6), die 11. (3W6) und die 17. (4W6) Stufe erreichst.'
- name: Geheime Truhe
  schule: Beschwörungszauber
  grad: 4. Grades
  klassen:
  - Magier
  zeitaufwand: Aktion
  reichweite: Berührung
  komponenten: V, G, M (eine Truhe in den Abmessungen 90 mal 60 mal 60 Zentimeter aus seltenen Materialien im Wert von mindestens
    5.000 GM und eine winzige Nachbildung der Truhe aus den gleichen Materialien im Wert von mindestens 50 GM)
  wirkungsdauer: Bis der Zauber gebannt wird
  beschreibung: Du versteckst eine Truhe mit ihrem gesamten Inhalt auf der Ätherebene. Dazu musst du beide Materialkomponenten
    für den Zauber berühren, die Truhe und die winzige Nachbildung. Die Truhe fasst bis zu 324 Liter anorganischen Materials
    (90 mal 60 mal 60 Zentimeter). Solange sich die Truhe auf der Ätherebene befindet, kannst du mit einer magischen Aktion
    die Nachbildung berühren, um die Truhe herbeizurufen. Sie erscheint in einem freien Bereich auf dem Boden im Abstand von
    bis zu 1,5 Metern von dir. Du kannst die Truhe wieder auf die Ätherebene zurückschicken, indem du mit einer magischen
    Aktion die Truhe und ihre Nachbildung gleichzeitig berührst. Nach 60 Tagen besteht am Ende jedes Tages eine kumulative
    Chance von fünf Prozent, dass der Zauber endet. Er endet auch dann, wenn du den Zauber erneut wirkst oder die winzige
    Nachbildung zerstört wird. Wenn der Zauber endet, während sich die große Truhe auf der Ätherebene befindet, bleibt sie
    dort, bis sie von dir oder jemand anderem gefunden wird.
- name: Geisterross
  schule: Illusionszauber
  grad: 3. Grades
  klassen:
  - Magier
  zeitaufwand: 1 Minute oder Ritual
  reichweite: 9 Meter
  komponenten: V, G
  wirkungsdauer: 1 Stunde
  beschreibung: In einem freien Bereich deiner Wahl in Reichweite, den du sehen kannst, erscheint eine große, quasi reale,
    pferdeartige Kreatur. Du bestimmst das Erscheinungsbild der Kreatur. Sie ist stets mit einem Sattel und Zaumzeug ausgerüstet.
    Durch diesen Zauber erschaffene Ausrüstung löst sich in Rauch auf, wenn sie weiter als drei Meter vom Ross entfernt wird.
    Für die Wirkungsdauer kann eine Kreatur deiner Wahl (auch du selbst) auf dem Ross reiten. Reitpferds Die Kreatur verwendet
    den Wertekasten eines (siehe „Monster“), verfügt jedoch über eine Bewegungsrate von 30 Metern und kann in einer Stunde
    20,8 Kilometer zurücklegen. Wenn der Zauber endet, verblasst das Ross allmählich, und der Reiter hat eine Minute zum Absteigen
    Zeit. Wenn das Ross Schaden erleidet, endet der Zauber vorzeitig.
- name: Gestalt verändern
  schule: Verwandlungszauber
  grad: 2. Grades
  klassen:
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: Selbst
  komponenten: V, G
  wirkungsdauer: Konzentration, bis zu 1 Stunde
  beschreibung: 'Du veränderst deine physische Gestalt. Entscheide dich für eine der folgenden Optionen. Die Effekte bleiben
    für die Wirkungsdauer bestehen. Währenddessen kannst du eine magische Aktion ausführen, um die ausgewählte Option durch
    eine Aquatische Anpassung: andere zu ersetzen. Dir wachsen Kiemen und Schwimmhäute. Du kannst unter Wasser atmen und erhältst
    eine Schwimmbewegungsrate in Höhe deiner Bewegungsrate. Erscheinungsbild ändern: Du veränderst dein Erscheinungsbild.
    Du bestimmst, wie du aussiehst: Größe, Gewicht, Gesichtszüge, Stimme, Haarlänge, Haarfarbe und andere besondere Merkmale.
    Du kannst dich auch als Mitglied einer anderen Spezies ausgeben. Deine Spielwerte bleiben jedoch unverändert. Du kannst
    nicht als Kreatur einer anderen Größenkategorie erscheinen. Deine grundlegende Gestalt bleibt ebenfalls gleich, beispielsweise
    kannst du dich mit diesem Zauber nicht von einem Zweibeiner in einen Vierbeiner verwandeln. Für die Wirkungsdauer kannst
    du eine magische Aktion ausführen, um dein Natürliche Waffen: Erscheinungsbild erneut auf diese Art zu ändern. Dir wachsen
    Klauen (Hieb), Fangzähne (Stich), Hörner (Stich) oder Hufe (Wucht). Verwendest du deinen waffenlosen Angriff, um mit diesen
    natürlichen Waffen Schaden zu bewirken, so bewirkt dieser Angriff 1W6 Schaden der in Klammern angegebenen Art statt des
    normalen Schadens deines waffenlosen Angriffs, und du verwendest für die Angriffs‑ und Schadenswürfe deinen Zauberwirken-Attributsmodifikator
    statt Stärke.'
- name: Gestaltwandel
  schule: Verwandlungszauber
  grad: 9. Grades
  klassen:
  - Druide
  - Magier
  zeitaufwand: Aktion
  reichweite: Selbst
  komponenten: V, G, M (ein Jadediadem im Wert von mindestens 1.500 GM)
  wirkungsdauer: Konzentration, bis zu 1 Stunde
  beschreibung: 'Du nimmst die Gestalt einer anderen Kreatur an, bis der Zauber endet oder du eine magische Aktion ausführst,
    um eine andere mögliche Gestalt anzu‑ nehmen. Bei der neuen Gestalt muss es sich um eine Kreatur handeln, deren Herausforderungsgrad
    höchstens deiner Stufe oder deinem Herausfor‑ derungsgrad entspricht. Du musst diese Art von Kreatur mindestens einmal
    gesehen haben, und es darf sich weder um ein Konstrukt noch um einen Untoten handeln. Wenn du den Zauber wirkst, erhältst
    du eine Anzahl von temporären Trefferpunkten, die der Anzahl von Trefferpunkten der ersten Gestalt entspricht, die du
    annimmst. Nach der Wirkungsdauer dieses Zaubers verbleibende temporäre Trefferpunkte gehen verloren. Deine Spielwerte
    werden durch den Wertekasten der ausgewählten Gestalt ersetzt. Du behältst jedoch Folgendes bei: Kreaturentyp, Gesinnung,
    Persönlichkeit, Werte für Intelligenz, Weisheit und Charisma, Trefferpunkte, Trefferpunktewürfel, Übungen sowie die Fähigkeit
    zu kommunizieren. Auch das Merkmal Zauberwirken behältst du bei, sofern du darüber verfügst. Bei der Verwandlung entscheidest
    du, ob deine Ausrüstung zu Boden fällt oder ihre Form und Größe ändert, sodass sie zu deiner neuen Gestalt passt, solange
    du diese beibehältst.'
- name: Gift und Krankheit entdecken
  schule: Erkenntniszauber
  grad: 1. Grades
  klassen:
  - Druide
  - Kleriker
  - Paladin
  - Waldläufer
  zeitaufwand: Aktion oder Ritual
  reichweite: Selbst
  komponenten: V, G, M (ein Eibenblatt)
  wirkungsdauer: Konzentration, bis zu 10 Minuten
  beschreibung: Für die Wirkungsdauer nimmst du die Position von Giften, giftigen Kreaturen und magischen Krankheiten im Abstand
    von bis zu neun Metern von dir wahr. Du erkennst auch die jeweilige Art des Gifts, der giftigen Kreatur oder der Ansteckung.
    Der Zauber wird von 30 Zentimetern Stein, Erde oder Holz sowie von 2,5 Zentimetern Metall oder einer dünnen Bleischicht
    blockiert.
- name: Gift versprühen
  schule: Nekromantie
  grad: Zaubertrick
  klassen:
  - Druide
  - Hexenmeister
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 9 Meter
  komponenten: V, G
  wirkungsdauer: Unmittelbar
  beschreibung: 'Du sprühst giftigen Nebel auf eine Kreatur in Reichweite. Führe einen Fernkampf‑Zauberangriff gegen das Ziel
    aus. Bei einem Treffer erleidet das Zaubertrick-Aufwertung: Ziel 1W12 Giftschaden. Der Schaden wird um jeweils 1W12 erhöht,
    wenn du die 5. (2W12), die 11. (3W12) und die 17. (4W12) Stufe erreichst.'
- name: Glyphe des Schutzes
  schule: Bannzauber
  grad: 3. Grades
  klassen:
  - Barde
  - Kleriker
  - Magier
  zeitaufwand: 1 Stunde
  reichweite: Berührung
  komponenten: V, G, M (Diamantpulver im Wert von mindestens 200 GM, das der Zauber verbraucht)
  wirkungsdauer: Bis der Zauber gebannt oder die
  beschreibung: 'Glyphe ausgelöst wird Du erzeugst eine Glyphe, die später einen magischen Effekt bewirkt. Diese Glyphe zeichnest
    du entweder auf eine Oberfläche (wie einen Tisch oder den Fußboden) oder in einen Gegenstand (wie ein Buch oder eine Truhe),
    der geschlossen werden kann, um die Glyphe zu verbergen. Die Glyphe kann höchstens in einem Radius von 1,5 Metern wirken.
    Wenn die Oberfläche oder der Gegenstand um mehr als drei Meter von der Stelle entfernt wird, an der du den Zauber gewirkt
    hast, wird die Glyphe zerstört, und der Zauber endet, ohne ausgelöst zu werden. Die Glyphe ist kaum wahrnehmbar. Es ist
    ein erfolgreicher Weisheitswurf (Wahrnehmung) gegen deinen Zauberrettungswurf‑SG erforderlich, um sie zu bemerken. Wenn
    du die Glyphe zeichnest, bestimmst du ihren Auslöser und legst fest, ob es sich um eine explosive Rune oder eine Zauberglyphe
    wie unten Auslöser bestimmen: beschrieben handelt. Wenn du den Zauber wirkst, bestimmst du einen Auslöser für die Glyphe.
    Glyphen auf Oberflächen werden meist dadurch ausgelöst, dass jemand sie berührt oder betritt, einen Gegenstand bewegt,
    der die Glyphe verdeckt, oder einen Mindestabstand zur Glyphe unterschreitet. Glyphen in Gegenständen werden meist dadurch
    ausgelöst, dass jemand den Gegenstand öffnet oder die Glyphe sieht. Sobald die Glyphe ausgelöst wurde, endet der Zauber.
    Du kannst den Auslöser verfeinern, sodass die Glyphe nur von bestimmten Kreaturentypen ausgelöst wird (beispielsweise
    könnte die Glyphe nur auf Aberrationen wirken). Du kannst auch Bedingungen festlegen, unter denen die Glyphe nicht ausgelöst
    wird, beispielsweise wenn ein Explosive Rune: bestimmtes Kennwort ausgesprochen wird. Wird die Glyphe ausgelöst, so explodiert
    ihre magische Energie in einer Kugel mit einem Radius von sechs Metern um sie. Jede Kreatur in diesem Bereich führt einen
    Geschicklichkeitsrettungswurf aus. Misslingt der Wurf, so erleidet die Kreatur 5W8 Blitz‑, Feuer‑, Kälte‑, Säure‑ oder
    Schallschaden (nach deiner Wahl beim Schreiben der Glyphe), anderenfalls Zauberglyphe: die Hälfte. Beim Erschaffen der
    Glyphe kannst du einen vorbereiteten Zauber des höchstens 3. Grades wirken und in der Glyphe speichern. Der Zauber muss
    eine einzelne Kreatur oder einen Bereich zum Ziel haben. Wenn er auf diese Weise gewirkt wird, hat der Zauber keinen unmittelbaren
    Effekt. Er wirkt erst, wenn die Glyphe ausgelöst wird. Wenn der Zauber ein Ziel braucht, wird die Kreatur ausgewählt,
    welche die Glyphe auslöst. Wirkt der Zauber auf einen Bereich, so ist dieser auf die Kreatur zentriert. Wenn der Zauber
    feindlich gesinnte Kreaturen beschwört oder schädliche Gegenstände oder Fallen erschafft, erscheinen sie so nahe wie möglich
    beim Eindringling und greifen ihn an. Erfordert der Zauber Konzentration, so hält Verwenden von Zauberplätzen höheren
    Grades: diese bis zum Ende der vollen Wirkungsdauer an. Für jeden Zauberplatzgrad über dem 3. wird der Schaden einer explosiven
    Rune um 1W8 erhöht. In einer Zauberglyphe kannst du Zauber bis zum Glyphe des Schutzes Grad des Zauberplatzes speichern,
    den du zum Wirken der  verwendet hast.'
- name: Göttliche Führung
  schule: Erkenntnis
  grad: Zaubertrick
  klassen:
  - Druide
  - Kleriker
  zeitaufwand: Aktion
  reichweite: Berührung
  komponenten: V, G
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: Du berührst eine bereitwillige Kreatur und wählst eine Fertigkeit aus. Bis der Zauber endet, fügt die Kreatur
    jedem Attributswurf, der die ausgewählte Fertigkeit verwendet, 1W4 hinzu.
- name: Göttliche Gunst
  schule: Verwandlungszauber
  grad: 1. Grades
  klassen:
  - Paladin
  zeitaufwand: Bonusaktion
  reichweite: Selbst
  komponenten: V, G
  wirkungsdauer: 1 Minute
  beschreibung: Für die Wirkungsdauer bewirkst du mit Angriffen, die du mit Waffen ausführst, bei jedem Treffer zusätzlich
    1W4 gleißenden Schaden.
- name: Göttliches Niederstrecken
  schule: Hervorrufungszauber
  grad: 1. Grades
  klassen:
  - Paladin
  zeitaufwand: Bonusaktion, die du sofort ausführst,
  reichweite: Selbst
  komponenten: V
  wirkungsdauer: Unmittelbar
  beschreibung: 'wenn du ein Ziel mit einer Nahkampfwaffe oder einem waffenlosen Angriff getroffen hast Das Ziel erleidet
    zusätzlich 2W8 gleißenden Schaden durch den Angriff. Der zusätzliche Schaden wird um 1W8 erhöht, wenn das Ziel ein Unhold
    oder Verwenden von Zauberplätzen höheren Grades: ein Untoter ist. Für jeden Zauberplatzgrad über dem 1. wird der Schaden
    um 1W8 erhöht.'
- name: Göttliches Wort
  schule: Hervorrufungszauber
  grad: 7. Grades
  klassen:
  - Kleriker
  zeitaufwand: Bonusaktion
  reichweite: 9 Meter
  komponenten: V
  wirkungsdauer: Unmittelbar
  beschreibung: Du sprichst ein Wort, das von der Macht der Oberen Ebenen erfüllt ist. Jede Kreatur deiner Wahl in Reichweite
    führt einen Charismarettungswurf aus. Misslingt der Wurf, so erleidet ein Ziel mit höchstens 50 Trefferpunkten einen Effekt
    gemäß seiner aktuellen Trefferpunkte wie in der Tabelle „Effekte von Göttliches Wort“ gezeigt. Unabhängig von ihren Trefferpunkten
    werden Ziele, die celestische Wesen, Elementare, Feenwesen oder Unholde sind und deren Rettungswurf misslingt, auf ihre
    Heimatebene verbannt, sofern sie sich nicht bereits dort befinden. In den nächsten 24 Stunden Wunsch können sie nur mit
    dem Zauber  auf deine Eakffteuketllee  Evobenn Ge zöutrtülicckhkeesh Wreno.rt Treffer- punkteEffekt 0–20Das Ziel stirbt.
    21–30Das Ziel ist eine Stunde lang betäubt, blind und taub. 31–40Das Ziel ist zehn Minuten lang blind und taub. 41–50Das
    Ziel ist eine Minute lang taub.
- name: Gute Beeren
  schule: Beschwörungszauber
  grad: 1. Grades
  klassen:
  - Druide
  - Waldläufer
  zeitaufwand: Aktion
  reichweite: Selbst
  komponenten: V, G, M (ein Mistelzweig)
  wirkungsdauer: 24 Stunden
  beschreibung: In deiner Hand erscheinen zehn Beeren, die für die Wirkungsdauer von Magie erfüllt sind. Kreaturen können
    eine Bonusaktion ausführen, um eine Beere zu verzehren. Dadurch wird 1 Trefferpunkt wiederhergestellt, und die Beere bietet
    der Kreatur genügend Nahrung für einen Tag. Wenn der Zauber endet, verschwinden Beeren, die nicht verzehrt wurden.
- name: Gutes und Böses bannen
  schule: Bannzauber
  grad: 5. Grades
  klassen:
  - Kleriker
  - Paladin
  zeitaufwand: Aktion
  reichweite: Selbst
  komponenten: V, G, M (Silber und Eisenpulver)
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: 'Für die Wirkungsdauer sind celestische Wesen, Elementare, Feenwesen, Unholde und Untote bei Angriffswürfen
    gegen dich im Nachteil. Du kannst den Zauber vorzeitig beenden, indem du einen der Vertreiben: folgenden besonderen Effekte
    verwendest: Als magische Aktion zielst du auf eine Kreatur im Abstand von bis zu 1,5 Metern von dir, die du sehen kannst
    und die einen der genannten Kreaturentypen hat. Das Ziel muss einen Charismarettungswurf bestehen, oder es wird auf seine
    Heimatebene verbannt, sofern es sich nicht bereits dort befindet. Untote werden in den Schattensaum und Feenwesen in die
    Feenwildnis verbannt, sofern sie sich nicht schon auf ihrer Verzauberungsmagie brechen: Heimatebene befinden. Als magische
    Aktion berührst du eine Kreatur in Reichweite, die von mindestens einer solchen Kreatur bezaubert, verängstigt oder besessen
    ist. Das Ziel ist nun nicht mehr von solchen Kreaturen besessen, bezaubert oder verängstigt.'
- name: Gutes und Böses entdecken
  schule: Erkenntniszauber
  grad: 1. Grades
  klassen:
  - Kleriker
  - Paladin
  zeitaufwand: Aktion
  reichweite: Selbst
  komponenten: V, G
  wirkungsdauer: Konzentration, bis zu 10 Minuten
  beschreibung: Für die Wirkungsdauer spürst du, ob und wo genau sich Aberrationen, celestische Wesen, Elementare, Feenwesen,
    Unholde oder Untote im Abstand von Weihen bis zu neun Metern von dir befinden. Außerdem spürst du, ob und wo genau der
    Zauber  in diesem Bereich aktiv ist. Der Zauber wird von 30 Zentimetern Stein, Erde oder Holz sowie von 2,5 Zentimetern
    Metall oder einer dünnen Bleischicht blockiert.
- name: Halbebene
  schule: Beschwörungszauber
  grad: 8. Grades
  klassen:
  - Hexenmeister
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: S
  wirkungsdauer: 1 Stunde
  beschreibung: 'Du erschaffst auf einer festen Oberfläche in Reichweite, die du sehen kannst, eine mittelgroße schattenhafte
    Tür. Diese Tür kann geöffnet und geschlossen werden. Sie führt zu einer Halbebene: einem leeren Raum mit neun Metern Kantenlänge
    aus Holz oder Stein (nach deiner Wahl). Wenn der Zauber endet, verschwindet die Tür, und alle Gegenstände in der Halbebene
    verbleiben dort. Auch Kreaturen bleiben darin, sofern sie nicht entscheiden, dass sie durch die Tür geschoben werden,
    wenn diese verschwindet. In diesem Fall gelangen sie in freie Bereiche, die dem Bereich der verschwundenen Tür am nächsten
    liegen, und sind liegend. Jedes Mal, wenn du diesen Zauber wirkst, kannst du entweder eine neue Halbebene erschaffen oder
    die schattenhafte Tür mit einer Halbebene verbinden, die du beim vorigen Wirken des Zaubers erschaffen hast. Sind dir
    außerdem Natur und Inhalt einer Halbebene bekannt, die von einer anderen Kreatur mit diesem Zauber erschaffen wurde, so
    kannst du die schattenhafte Tür stattdessen auch mit dieser Halbebene verbinden.'
- name: Hast
  schule: Verwandlungszauber
  grad: 3. Grades
  klassen:
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 9 Meter
  komponenten: V, G, M (ein Span Süßholzwurzel)
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: 'Wähle eine bereitwillige Kreatur in Reichweite aus, die du sehen kannst. Für die Wirkungsdauer iSsyts dteiem
    Breewfeergeunnzgdsorkatuem deens tZ 5ie.l2s. 1verdoppelt. Außerdem erhält das Ziel einen Bonus von +2 auf seine Rüstungsklasse,
    ist bei Geschicklichkeits‑ rettungswürfen im Vorteil und kann in jedem seiner Züge eine zusätzliche Aktion ausführen.
    Diese Aktion kann nur für Folgendes eingesetzt werden: Angriff (nur ein Angriff), Rückzug, Spurt, Verstecken, Verwenden.
    Wenn der Zauber endet, ist das Ziel bis zum Ende seines nächsten Zugs kampfunfähig und hat eine Bewegungsrate von 0, weil
    es von einer Welle der Lethargie ergriffen wird.'
- name: Heilendes Wort
  schule: Bannzauber
  grad: 1. Grades
  klassen:
  - Barde
  - Druide
  - Kleriker
  zeitaufwand: Bonusaktion
  reichweite: 18 Meter
  komponenten: V
  wirkungsdauer: Unmittelbar
  beschreibung: 'Eine Kreatur deiner Wahl in Reichweite, die du sehen kannst, erhält Trefferpunkte in Höhe von 2W4 plus deinem
    Zauberwirken‑Attributs‑ Verwenden von Zauberplätzen höheren Grades: modifikator zurück. Für jeden Zauberplatzgrad über
    dem 1. wird die Heilung um 2W4 Trefferpunkte erhöht.'
- name: Heilige Aura
  schule: Bannzauber
  grad: 8. Grades
  klassen:
  - Kleriker
  zeitaufwand: Aktion
  reichweite: Selbst
  komponenten: V, G, M (eine Reliquie im Wert von mindestens 1.000 GM)
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: Für die Wirkungsdauer geht eine Ausströmung von neun Metern von dir aus. In der Aura sind Kreaturen deiner
    Wahl bei allen Rettungswürfen im Vorteil, und andere Kreaturen sind bei Angriffswürfen gegen sie im Nachteil. Wenn außerdem
    ein Unhold oder ein Untoter eine betroffene Kreatur mit einem Nahkampfangriffswurf trifft, muss der Angreifer einen Konstitutionsrettungswurf
    bestehen, oder er ist bis zum Ende seines nächsten Zugs blind.
- name: Heilige Flamme
  schule: Hervorrufung
  grad: Zaubertrick
  klassen:
  - Kleriker
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V, G
  wirkungsdauer: Unmittelbar
  beschreibung: 'Auf eine Kreatur in Reichweite, die du sehen kannst, schießt ein Strahl aus gleißenden Flammen herab. Das
    Ziel muss einen Geschicklichkeitsrettungswurf bestehen, oder es erleidet 1W8 gleißenden Schaden. Teildeckung sowie Dreivierteldeckung
    bieten ihm bei diesem Rettungswurf keine Vorzüge. Zaubertrick-Aufwertung: Der Schaden wird um jeweils 1W8 erhöht, wenn
    du die 5. (2W8), die 11. (3W8) und die 17. (4W8) Stufe erreichst.'
- name: Heiliges Gespräch
  schule: Erkenntniszauber
  grad: 5. Grades
  klassen:
  - Kleriker
  zeitaufwand: 1 Minute oder Ritual
  reichweite: Selbst
  komponenten: V, G, M (Weihrauch)
  wirkungsdauer: 1 Minute
  beschreibung: Du nimmst mit einer Gottheit oder dem Stellvertreter einer Gottheit Kontakt auf und stellst bis zu drei Fragen,
    die mit Ja oder Nein beantwortet werden können. Du musst deine Fragen stellen, bevor der Zauber endet. Du erhältst auf
    jede Frage eine korrekte Antwort. Göttliche Wesen sind nicht unbedingt allwissend. Bezieht sich die Frage auf Informationen,
    die das Wissen der Gottheit übersteigen, könntest du als Antwort „Unklar“ erhalten. Falls eine Antwort mit nur einem Wort
    irreführend sein oder nicht dem Interesse der Gottheit entsprechen könnte, kann der SL stattdessen einen kurzen Satz als
    Antwort geben. Wenn du den Zauber vor einer langen Rast häufiger als einmal wirkst, erhöht dies das Risiko, keine Antwort
    zu erhalten, mit jedem Wirken nach dem ersten um jeweils 25 Prozent.
- name: Heiligtum
  schule: Bannzauber
  grad: 1. Grades
  klassen:
  - Kleriker
  zeitaufwand: Bonusaktion
  reichweite: 9 Meter
  komponenten: V, G, M (eine Spiegelscherbe)
  wirkungsdauer: 1 Minute
  beschreibung: Du schützt eine Kreatur in Reichweite. Für die Wirkungsdauer muss jede Kreatur, die mit einem Angriffswurf
    oder Schadenszauber auf die geschützte Kreatur zielt, einen Weisheits rettungs wurf bestehen. Misslingt der Wurf, so muss
    sie ein neues Ziel auswählen, oder sie verliert den Angriff oder Zauber. Dieser Zauber schützt das Ziel nicht vor Wirkungsbereichen.
    Der Zauber endet, wenn die geschützte Kreatur einen Angriffswurf ausführt, einen Zauber wirkt oder Schaden bewirkt.
- name: Heilung
  schule: Bannzauber
  grad: 6. Grades
  klassen:
  - Druide
  - Kleriker
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V, G
  wirkungsdauer: Unmittelbar
  beschreibung: 'Wähle eine Kreatur in Reichweite aus, die du sehen kannst. Positive Energie durchströmt das Ziel, das 70
    Trefferpunkte zurückerhält. Außerdem beendet dieser Zauber die Zustände Blind, Taub und Vergiftet beim Ziel. Verwenden
    von Zauberplätzen höheren Grades: Für jeden Zauberplatzgrad über dem 6. wird die Heilung um 10 Trefferpunkte erhöht.'
- name: Heldenmahl
  schule: Beschwörungszauber
  grad: 6. Grades
  klassen:
  - Barde
  - Druide
  - Kleriker
  zeitaufwand: 10 Minuten
  reichweite: Selbst
  komponenten: V, G, M (eine mit Edelsteinen verzierte Schale im Wert von mindestens 1.000 GM, die der Zauber verbraucht)
  wirkungsdauer: Unmittelbar
  beschreibung: 'Du beschwörst ein Festmahl, das auf einer Oberfläche in einem freien Würfel von drei Metern Kantenlänge neben
    dir erscheint. Der Verzehr des Festmahls dauert eine Stunde. Nach dieser Dauer verschwindet das Mahl, und die positiven
    Effekte treten in Kraft. Bis zu zwölf Kreaturen können am Festmahl teilnehmen. Eine Kreatur, die teilnimmt, erhält mehrere
    Vorzüge, die 24 Stunden lang anhalten: Sie ist gegen Giftschaden resistent und gegen die Zustände Verängstigt und Vergiftet
    immun. Zudem wird ihr Trefferpunktemaximum um 2W10 erhöht, und sie erhält die gleiche Anzahl von Trefferpunkten dazu.'
- name: Heldenmut
  schule: Verzauberungszauber
  grad: 1. Grades
  klassen:
  - Barde
  - Paladin
  zeitaufwand: Aktion
  reichweite: Berührung
  komponenten: V, G
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: 'Du berührst eine bereitwillige Kreatur und erfüllst sie mit Tapferkeit. Für die Wirkungsdauer ist die Kreatur
    gegen den Zustand Verängstigt immun und erhält zu Beginn jedes ihrer Züge temporäre Trefferpunkte in Höhe deines Zauberwirken‑
    Verwenden von Zauberplätzen höheren Grades: Attributsmodifikators. Für jeden Zauberplatzgrad über dem 1. kannst du auf
    eine weitere Kreatur zielen.'
- name: Hellsehen
  schule: Erkenntniszauber
  grad: 3. Grades
  klassen:
  - Barde
  - Kleriker
  - Magier
  - Zauberer
  zeitaufwand: 10 Minuten
  reichweite: 1,6 Kilometer
  komponenten: V, G, M (ein Fokus im Wert von mindestens 100 GM – entweder ein juwelenbesetztes Horn zum Hören oder ein Glasauge
    zum Sehen)
  wirkungsdauer: Konzentration, bis zu 10 Minuten
  beschreibung: Du erschaffst an einem dir bekannten Ort (den du bereits gesehen oder besucht hast) oder an einem offensichtlichen
    Ort, der dir unbekannt ist (beispiels‑ weise hinter einer Tür, einer Ecke oder in einem Hain), einen unsichtbaren Sensor
    in Reichweite. Der Sensor ist immateriell und unverwundbar. Er bleibt für die Wirkungsdauer bestehen. Wenn du den Zauber
    wirkst, wähle Hören oder Sehen aus. Du nimmst den ausgewählten Sinn durch den Sensor wahr, als würdest du dich in dessen
    Bereich befinden. Als Bonusaktion kannst du zwischen Hören und Sehen wechseln. Unsichtbares sehen Eine Kreatur, die den
    Sensor sehen kann (beispiels‑ weise mit Wahrer Blick oder ), sieht eine etwa faustgroße leuchtende Kugel.
- name: Herrliches Herrenhaus
  schule: Beschwörungszauber
  grad: 7. Grades
  klassen:
  - Barde
  - Magier
  zeitaufwand: 1 Minute
  reichweite: 90 Meter
  komponenten: V, G, M (eine MiniaturTür im Wert von mindestens 15 GM)
  wirkungsdauer: 24 Stunden
  beschreibung: Du beschwörst in Reichweite eine schimmernde Tür, die für die Wirkungsdauer bestehen bleibt. Sie ist 1,5 Meter
    breit und drei Meter hoch, und sie führt zu einem extradimensionalen Anwesen. Du und jede Kreatur, die du beim Wirken
    des Zaubers bestimmst, könnt das extradimensionale Anwesen betreten, solange die Tür geöffnet ist. Du kannst sie öffnen
    oder schließen (keine Aktion erforderlich), wenn du dich im Abstand von bis zu neun Metern davon befindest. Ist die Tür
    geschlossen, so ist sie nicht wahrnehmbar. Hinter der Tür liegt eine herrliche Eingangshalle mit zahlreichen Zimmern.
    Die Atmosphäre des Anwesens ist sauber, frisch und warm. Du kannst einen beliebigen Grundriss erstellen, der allerdings
    50 zusammenhängende Würfel mit je drei Metern Kantenlänge nicht überschreiten kann. Das Anwesen ist nach deinen Wünschen
    eingerichtet und dekoriert. Es gibt ausreichend Nahrung, um bis zu 100 Personen ein Festmahl mit neun Gängen zu servieren.
    Möbel und andere Gegenstände, die durch diesen Zauber erschaffen wurden, lösen sich in Rauch auf, wenn sie aus dem Anwesen
    entfernt werden. 100 nahezu durchsichtige Diener nehmen sich der Wünsche aller Gäste an. Du bestimmst, wie die Diener
    aussehen und welche Kleidung sie tragen. Sie sind unverwundbar und gehorchen deinen Befehlen. Dabei können sie Aufgaben
    ausführen, die auch Menschen ausführen könnten. Sie können jedoch nicht angreifen oder Aktionen ausführen, die anderen
    Kreaturen direkten Schaden zufügen würden. Die Diener können Gegenstände holen und reinigen, Kleidung zusammenlegen, Feuer
    entfachen, Essen servieren, Wein einschenken und dergleichen. Sie können das Anwesen jedoch nicht verlassen. Wenn der
    Zauber endet, werden alle Kreaturen und Gegenstände aus dem extradimensionalen Bereich in die freien Bereiche ausgestoßen,
    die dem Eingang am nächsten liegen.
- name: Höllischer Tadel
  schule: Hervorrufungszauber
  grad: 1. Grades
  klassen:
  - Hexenmeister
  zeitaufwand: Reaktion, die du ausführst, wenn du Schaden durch eine Kreatur im Abstand von bis zu 18 Metern von dir erlitten
    hast, die du sehen kannst
  reichweite: 18 Meter
  komponenten: V, G
  wirkungsdauer: Unmittelbar
  beschreibung: 'Die Kreatur, die dir Schaden zugefügt hat, ist kurz von grünen Flammen umgeben. Sie führt einen Geschicklichkeitsrettungswurf
    aus. Misslingt der Wurf, so erleidet sie 2W10 Feuerschaden, Verwenden von Zauberplätzen höheren Grades: anderenfalls die
    Hälfte. Für jeden Zauberplatzgrad über dem 1. wird der Schaden um 1W10 erhöht.'
- name: Hüter des Glaubens
  schule: Beschwörungszauber
  grad: 4. Grades
  klassen:
  - Kleriker
  zeitaufwand: Aktion
  reichweite: 9 Meter
  komponenten: V
  wirkungsdauer: 8 Stunden
  beschreibung: In einem freien Bereich in Reichweite, den du sehen kannst, erscheint ein großer geisterhafter Wächter und
    schwebt dort für die Wirkungsdauer. Der Wächter besetzt diesen Bereich und ist unver‑ wundbar. Er erscheint in einer Gestalt,
    die deiner Gottheit oder deinem Pantheon entspricht. Ein Gegner, der sich in einem Zug erstmals in einen Bereich im Abstand
    von bis zu drei Metern vom Wächter bewegt oder den Zug dort beginnt, führt einen Geschicklichkeitsrettungswurf aus. Misslingt
    der Wurf, so erleidet er 20 gleißenden Schaden, anderenfalls die Hälfte. Wenn der Wächter insgesamt 60 Schaden bewirkt
    hat, verschwindet er.
- name: Hypnotisches Muster
  schule: Illusionszauber
  grad: 3. Grades
  klassen:
  - Barde
  - Hexenmeister
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 36 Meter
  komponenten: V, G, M (eine Prise Konfetti)
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: Du erschaffst ein wirbelndes Muster aus Farben in einem Würfel mit neun Metern Kantenlänge in Reich‑ weite.
    Das Muster erscheint für einen Moment und verschwindet dann. Jede Kreatur im Bereich, die das Muster sehen kann, muss
    einen Weisheitsrettungs‑ wurf bestehen, oder sie ist für die Wirkungsdauer bezaubert. Auf diese Art bezauberte Kreaturen
    sind kampfunfähig und haben eine Bewegungsrate von 0. Der Zauber endet bei einer betroffenen Kreatur, wenn sie Schaden
    erleidet oder jemand anders eine Aktion verwendet, um die Kreatur aus ihrer Starre zu rütteln.
- name: Identifizieren
  schule: Erkenntniszauber
  grad: 1. Grades
  klassen:
  - Barde
  - Magier
  zeitaufwand: 1 Minute oder Ritual
  reichweite: Berührung
  komponenten: V, G, M (eine Perle im Wert von mindestens 100 GM)
  wirkungsdauer: Unmittelbar
  beschreibung: Du berührst einen Gegenstand, solange du den Zauber wirkst. Falls es sich um einen magischen Gegenstand handelt,
    erkennst du seine Eigen‑ schaften und ihre Anwendung, und du weißt, ob er Einstimmung erfordert und wie viele Ladungen
    er besitzt, falls zutreffend. Du erfährst, ob aktuell Zauber auf den Gegenstand wirken, und wenn ja, welche. Falls der
    Gegenstand durch einen Zauber erzeugt wurde, erfährst du dessen Namen. Wenn du stattdessen beim Wirken des Zaubers eine
    Kreatur durchgehend berührst, erfährst du, von welchen Zaubern sie derzeit betroffen ist, falls zutreffend.
- name: Illusionsschrift
  schule: Illusionszauber
  grad: 1. Grades
  klassen:
  - Barde
  - Hexenmeister
  - Magier
  zeitaufwand: 1 Minute oder Ritual
  reichweite: Berührung
  komponenten: G, M (Tinte im Wert von mindestens 10 GM, die der Zauber verbraucht)
  wirkungsdauer: 10 Tage
  beschreibung: Du schreibst auf Pergament, Papier oder ein anderes geeignetes Material und erfüllst die Schrift mit einer
    Illusion, die für die Wirkungsdauer bestehen bleibt. Für dich und alle Kreaturen, die du beim Wirken des Zaubers bestimmst,
    erscheint die Schrift ganz normal in deiner Handschrift und gibt den Inhalt wieder, den du niedergeschrieben hast. Für
    alle anderen erscheint eine unbekannte oder magische Schrift, die unverständlich ist. Alternativ kann die Illusion die
    Bedeutung der Nachricht, die Handschrift oder die Sprache verändern, in der die Nachricht verfasst ist. Die Sprache muss
    dir jedoch bekannt sein. Falls der Zauber gebannt wird, verschwinden sowohl die echte Schrift als auch die Illusion. Eine
    Kreatur mit Wahrer Blick kann die versteckte Nachricht lesen.
- name: Insektenplage
  schule: Beschwörungszauber
  grad: 5. Grades
  klassen:
  - Druide
  - Kleriker
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 90 Meter
  komponenten: V, G, M (eine Heuschrecke)
  wirkungsdauer: Konzentration, bis zu 10 Minuten
  beschreibung: 'In einer Kugel mit einem Radius von sechs Metern um einen Punkt deiner Wahl in Reichweite erscheint ein Heuschreckenschwarm.
    Die Kugel bleibt für die Wirkungsdauer bestehen. Ihr Bereich ist leicht verschleiert sowie schwieriges Gelände. Wenn der
    Schwarm erscheint, führt jede Kreatur darin einen Konstitutionsrettungswurf aus. Misslingt der Wurf, so erleidet sie 4W10
    Stichschaden, anderenfalls die Hälfte. Wenn eine Kreatur den Bereich des Zaubers in einem Zug erstmals betritt oder ihren
    Zug darin beendet, führt sie diesen Rettungswurf ebenfalls aus. Eine Kreatur kann diesen Rettungswurf nur Verwenden von
    Zauberplätzen höheren Grades: einmal pro Zug ausführen. Für jeden Zauberplatzgrad über dem 5. wird der Schaden um 1W10
    erhöht.'
- name: Irrgarten
  schule: Beschwörungszauber
  grad: 8. Grades
  klassen:
  - Magier
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V, G
  wirkungsdauer: Konzentration, bis zu 10 Minuten
  beschreibung: Du verbannst eine Kreatur in Reichweite, die du sehen kannst, auf eine labyrinthartige Halbebene. Sie bleibt
    für die Wirkungsdauer dort, oder bis sie dem Irrgarten entkommt. Das Ziel kann die Studieren‑Aktion ausführen, um zu entkommen
    zu versuchen. Dazu führt es einen SG‑20‑Intelligenzwurf (Nachforschungen) aus. Bei einem Erfolg entkommt es, und der Zauber
    endet. Wenn der Zauber endet, erscheint das Ziel in dem Bereich, aus dem es wegteleportiert wurde, oder im nächstgelegenen
    freien Bereich wieder, falls der ursprüngliche inzwischen besetzt ist.
- name: Kalte Hand
  schule: Nekromantie
  grad: Zaubertrick
  klassen:
  - Hexenmeister
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: Berührung
  komponenten: V, G
  wirkungsdauer: Unmittelbar
  beschreibung: 'Du kanalisierst Grabeskälte und führst einen Nahkampf‑Zauberangriff auf ein Ziel in Reichweite aus. Bei einem
    Treffer erleidet das Ziel 1W10 nekrotischen Schaden und kann bis zum Ende deines nächsten Zugs keine Trefferpunkte Zaubertrick-Aufwertung:
    zurückerhalten. Der Schaden wird um jeweils 1W10 erhöht, wenn du die 5. (2W10), die 11. (3W10) und die 17. (4W10) Stufe
    erreichst.'
- name: Kältekegel
  schule: Hervorrufungszauber
  grad: 5. Grades
  klassen:
  - Druide
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: Selbst
  komponenten: V, G, M (ein kleiner Kegel aus Kristall oder Glas)
  wirkungsdauer: Unmittelbar
  beschreibung: 'Du entfesselst einen Stoß eiskalter Luft. Jede Kreatur in einem Kegel von 18 Metern, der von dir ausgeht,
    führt einen Konstitutionsrettungswurf aus. Misslingt der Wurf, so erleidet sie 8W8 Kälteschaden, anderenfalls die Hälfte.
    Wird eine Kreatur durch diesen Zauber getötet, so wird sie zu Verwenden von Zauberplätzen höheren Grades: einer gefrorenen
    Statue, bis sie auftaut. Für jeden Zauberplatzgrad über dem 5. wird der Schaden um 1W8 erhöht.'
- name: Kältestrahl
  schule: Hervorrufung
  grad: Zaubertrick
  klassen:
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V, G
  wirkungsdauer: Unmittelbar
  beschreibung: 'Ein eisiger Strahl blau‑weißen Lichts schießt auf eine Kreatur in Reichweite zu. Führe einen Fernkampf‑Zauberangriff
    gegen das Ziel aus. Bei einem Treffer erleidet es 1W8 Kälteschaden, und seine Bewegungsrate ist bis zum Beginn Zaubertrick-Aufwertung:
    deines nächsten Zugs um drei Meter verringert. Der Schaden wird um jeweils 1W8 erhöht, wenn du die 5. (2W8), die 11. (3W8)
    und die 17. (4W8) Stufe erreichst.'
- name: Kettenblitz
  schule: Hervorrufungszauber
  grad: 6. Grades
  klassen:
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 45 Meter
  komponenten: V, G, M (drei Silbernadeln)
  wirkungsdauer: Unmittelbar
  beschreibung: 'Du schleuderst einen Blitz auf ein Ziel in Reichweite, das du sehen kannst. Dann springen drei Blitze von
    diesem Ziel auf bis zu drei weitere Ziele deiner Wahl über, die sich im Abstand von bis zu neun Metern vom ersten Ziel
    befinden müssen. Beim Ziel kann es sich um eine Kreatur oder einen Gegenstand handeln. Es kann nur von einem der Blitze
    getroffen werden. Jedes Ziel führt einen Geschicklichkeitsrettungs‑ wurf aus. Misslingt der Wurf, so erleidet es 10W8
    Verwenden von Zauberplätzen höheren Grades: Blitzschaden, anderenfalls die Hälfte. Für jeden Zauberplatzgrad über dem
    6. springt ein zusätzlicher Blitz vom ersten Ziel auf ein weiteres über.'
- name: Klingenbarriere
  schule: Hervorrufungszauber
  grad: 6. Grades
  klassen:
  - Kleriker
  zeitaufwand: Aktion
  reichweite: 27 Meter
  komponenten: V, G
  wirkungsdauer: Konzentration, bis zu 10 Minuten
  beschreibung: Du erschaffst eine Wand wirbelnder Klingen aus magischer Energie. Sie erscheint in Reichweite und bleibt für
    die Wirkungsdauer bestehen. Du erschaffst entweder eine gerade Wand, die bis zu 30 Meter lang ist, oder eine ringförmige
    Wand mit einem Radius von bis zu neun Metern. Sie ist in beiden Fällen sechs Meter hoch und 1,5 Meter dick. Die Wand bietet
    Dreivierteldeckung, und ihr Bereich stellt schwieriges Gelände dar. Jede Kreatur im Bereich der Wand führt einen Geschicklichkeitsrettungswurf
    aus. Misslingt der Wurf, so erleidet sie 6W10 Energieschaden, anderenfalls die Hälfte. Auch Kreaturen, die sich in den
    Bereich der Wand begeben oder ihren Zug darin beenden, führen den Rettungswurf aus. Jede Kreatur führt den Rettungswurf
    nur einmal pro Zug aus.
- name: Klon
  schule: Nekromantiezauber
  grad: 8. Grades
  klassen:
  - Magier
  zeitaufwand: 1 Stunde
  reichweite: Berührung
  komponenten: V, G, M (ein Diamant im Wert von mindestens 1.000 GM, den der Zauber verbraucht, und ein verschließbares Gefäß
    im Wert von mindestens 2.000 GM, das groß genug ist, um die zu klonende Kreatur aufzunehmen)
  wirkungsdauer: Unmittelbar
  beschreibung: Du berührst eine Kreatur oder mindestens 16 Kubik‑ zentimeter von ihrem Fleisch. Im Gefäß, das du für den
    Zauber verwendet hast, wächst ein regloses Duplikat der Kreatur. Es ist nach 120 Tagen ausge‑ wachsen. Du bestimmst, ob
    es so alt wie die Kreatur oder jünger ist. Der Klon bleibt reglos und beliebig lange erhalten, sofern das Gefäß nicht
    geöffnet wird. Stirbt die ursprüngliche Kreatur, wenn der Klon ausgewachsen ist, so wird ihre Seele auf den Klon übertragen,
    sofern sie frei und bereitwillig ist. Der Klon ist körperlich mit dem Original identisch und besitzt dessen Persönlichkeit,
    seine Erinnerungen und Fähigkeiten, jedoch nicht seine Ausrüstung. Überreste der ursprünglichen Kreatur werden gegebenenfalls
    reglos und können nicht wiederbelebt werden, da sich die Seele der Kreatur anderswo befindet.
- name: Klopfen
  schule: Verwandlungszauber
  grad: 2. Grades
  klassen:
  - Barde
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V
  wirkungsdauer: Unmittelbar
  beschreibung: Wähle einen Gegenstand in Reichweite aus, den du sehen kannst. Es kann sich um eine Tür, eine Truhe, ein Paar
    Handschellen, ein Vorhängeschloss oder einen anderen Gegenstand handeln, der auf magische oder gewöhnliche Art verschlossen
    ist. Wenn das Ziel mit einem gewöhnlichen Schloss verschlossen, verriegelt oder verklemmt ist, wird es geöffnet, entriegelt
    oder gelöst. Wenn der Gegenstand mehrere Schlösser besitzt, wird nur Arkanes Schloss eines davon geöffnet. Ist das Ziel
    durch den Zauber verriegelt, so wird dieser Zauber zehn Minuten lang unterdrückt. In dieser Zeit kann das Ziel geöffnet
    und geschlossen werden. Wenn du den Zauber wirkst, gibt dein Ziel ein lautes Klopfgeräusch von sich, welches bis zu 90
    Meter weit zu hören ist.
- name: Kontakt zu anderen Ebenen
  schule: Erkenntniszauber
  grad: 5. Grades
  klassen:
  - Hexenmeister
  - Magier
  zeitaufwand: 1 Minute oder Ritual
  reichweite: Selbst
  komponenten: V
  wirkungsdauer: 1 Minute
  beschreibung: Du trittst mental mit einem Halbgott, dem Geist eines lange verstorbenen Weisen oder einem anderen kundigen
    Wesen von einer anderen Ebene in Kontakt. Der Kontakt zu dieser außerweltlichen Intelligenz kann deinen Verstand brechen.
    Wenn du diesen Zauber wirkst, führe einen SG‑15‑Intelligenzrettungswurf aus. Bei einem erfolgreichen Rettungswurf kannst
    du dem Wesen bis zu fünf Fragen stellen. Du musst deine Fragen stellen, bevor der Zauber endet. Der SL beantwortet jede
    Frage mit einem einzelnen Wort wie „Ja“, „Nein“, „Vielleicht“, „Niemals“, „Irrelevant“ oder „Unklar“ (wenn das Wesen die
    Antwort nicht kennt). Falls eine Antwort mit nur einem Wort irreführend wäre, kann der SL stattdessen einen kurzen Satz
    als Antwort geben. Misslingt der Wurf, so erleidest du 6W6 psychischen Vollständige Genesung Schaden und bist kampfunfähig,
    bis du eine lange Rast beendest. Der Zauber beendet diesen Effekt.
- name: Kreatur aufspüren
  schule: Erkenntniszauber
  grad: 4. Grades
  klassen:
  - Barde
  - Druide
  - Kleriker
  - Magier
  - Paladin
  - Waldläufer
  zeitaufwand: Aktion
  reichweite: Selbst
  komponenten: V, G, M (etwas Fell von einem Bluthund)
  wirkungsdauer: Konzentration, bis zu 1 Stunde
  beschreibung: Beschreibe oder nenne eine Kreatur, mit der du vertraut bist. Sofern die Kreatur sich im Abstand von bis zu
    300 Metern von dir befindet, spürst du, in welcher Richtung ihr Aufenthaltsort liegt. Bewegt sich die Kreatur, so weißt
    du, in welche Richtung. Der Zauber kann eine bestimmte dir bekannte Kreatur aufspüren oder die nächste Kreatur einer bestimmten
    Art – wie ein Mensch oder ein Einhorn –, sofern du eine solche Kreatur mindestens einmal aus höchstens neun Metern Entfernung
    gesehen hast. Hat die beschriebene oder genannte Kreatur Fleisch zu SteinVerwandlung eine andere Gestalt angenommen, beispielsweise
    durch die Zauber  oder , so kann dieser Zauber die Kreatur nicht aufspüren. Der Zauber kann die Kreatur auch dann nicht
    aufspüren, wenn Blei den direkten Weg zwischen dir und ihr blockiert – egal, welche Dicke das Blei hat.
- name: Kreis der Teleportation
  schule: Beschwörungszauber
  grad: 5. Grades
  klassen:
  - Barde
  - Hexenmeister
  - Magier
  - Zauberer
  zeitaufwand: 1 Minute
  reichweite: 3 Meter
  komponenten: V, M (seltene Tinten im Wert von mindestens 50 GM, die der Zauber verbraucht)
  wirkungsdauer: 1 Runde
  beschreibung: Wenn du den Zauber wirkst, zeichnest du einen Kreis mit einem Radius von 1,5 Metern auf den Boden. In den
    Kreis arbeitest du Siegel ein, die deine aktuelle Position mit einem anderen dauerhaften Kreis der Teleportation deiner
    Wahl verbinden, dessen Siegel sequenz du kennst und der sich auf derselben Existenzebene befindet. Im Kreis öffnet sich
    ein schimmerndes Portal, das bis zum Ende deines nächsten Zugs geöffnet bleibt. Jede Kreatur, die durch das Portal tritt,
    erscheint sofort in einem freien Bereich im Abstand von bis zu 1,5 Metern um den Zielkreis, falls verfügbar, ansonsten
    im nächsten freien Bereich. Viele größere Tempel, Gildenhallen und weitere wichtige Orte verfügen über dauerhafte Kreise
    der Teleportation. Jeder Kreis besitzt eine einzigartige Siegelsequenz, eine Reihe von Runen, die in einem bestimmten
    Muster angeordnet sind. Wenn du diesen Zauber erlernst, erhältst du die Siegelsequenzen zweier Zielorte auf der materiellen
    Ebene nach Wahl des SL. Im Laufe deiner Abenteuer könntest du weitere Siegelsequenzen erfahren. Um eine neue Siegelsequenz
    zu erlernen, musst du sie eine Minute lang studieren. Wenn du diesen Zauber 365 Tage lang täglich am selben Ort wirkst,
    erschaffst du einen dauerhaften Kreis der Teleportation.
- name: Kugel der Unverwundbarkeit
  schule: Bannzauber
  grad: 6. Grades
  klassen:
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: Selbst
  komponenten: V, G, M (eine Glasperle)
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: 'In einer Ausströmung von drei Metern erscheint für die Wirkungsdauer eine unbewegliche schimmernde Barriere
    um dich herum. Jeder Zauber des höchstens 5. Grades, der von außerhalb der Barriere gewirkt wird, hat keinen Effekt auf
    Kreaturen oder Gegenstände im Innern. Ein solcher Zauber kann Kreaturen und Gegenstände innerhalb der Barriere zum Ziel
    haben, hat jedoch keinen Effekt auf sie. Gleichermaßen ist der Bereich innerhalb der Barriere von Wirkungsbereichen Verwenden
    von Zauberplätzen höheren Grades: solcher Zauber ausgeschlossen. Für jeden Zauberplatzgrad über dem 6. blockiert die Barriere
    einen Grad höhere Zauber.'
- name: Lange Schritte
  schule: Verwandlungszauber
  grad: 1. Grades
  klassen:
  - Barde
  - Druide
  - Magier
  - Waldläufer
  zeitaufwand: Aktion
  reichweite: Berührung
  komponenten: V, G, M (eine Prise Erde)
  wirkungsdauer: 1 Stunde
  beschreibung: 'Du berührst eine Kreatur. Für die Wirkungsdauer ist Verwenden von Zauberplätzen höheren Grades: die Bewegungsrate
    des Ziels um drei Meter erhöht. Für jeden Zauberplatzgrad über dem 1. kannst du auf eine weitere Kreatur zielen.'
- name: Lautloses Trugbild
  schule: Illusionszauber
  grad: 1. Grades
  klassen:
  - Barde
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V, G, M (ein Stück Vlies)
  wirkungsdauer: Konzentration, bis zu 10 Minuten
  beschreibung: 'Du erschaffst das Abbild eines Gegenstands, einer Kreatur oder eines anderen sichtbaren Phänomens, das nicht
    größer als ein Würfel mit 4,5 Metern Kantenlänge sein darf. Das Abbild erscheint an einem Punkt in Reichweite und bleibt
    für die Wirkungsdauer bestehen. Es ist ein rein visueller Eindruck ohne Geräusche, Gerüche oder andere Sinneseffekte.
    Als magische Aktion kannst du das Abbild an jeden beliebigen Punkt in Reichweite bewegen. Dabei kannst du das Abbild so
    verändern, dass seine Bewegung natürlich erscheint. Beispiel: Wenn du das Abbild einer Kreatur erschaffst und bewegst,
    kannst du es so verändern, dass es zu laufen scheint. Physische Interaktionen mit dem Abbild enttarnen es als Illusion,
    da Dinge es einfach durchdringen können. Eine Kreatur, die das Abbild mit der Studieren‑Aktion untersucht, kann mit einem
    erfolgreichen Intelligenzwurf (Nachforschungen) gegen deinen Zauberrettungswurf‑SG erkennen, dass es sich um eine Illusion
    handelt. Erkennt eine Kreatur die Illusion als solche, so wird das Abbild für sie durchscheinend.'
- name: Leicht
  schule: Hervorrufung
  grad: Zaubertrick
  klassen:
  - Barde
  - Kleriker
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: Berührung
  komponenten: V, M (ein Glühwürmchen oder phosphoreszierendes Moos)
  wirkungsdauer: 1 Stunde
  beschreibung: Du berührst einen Gegenstand von höchstens großer Größe, der nicht von jemand anderem getragen oder gehalten
    wird. Für die Wirkungsdauer spendet dieser Gegenstand in einem Radius von sechs Metern helles Licht und in einem Radius
    von weiteren sechs Metern dämmriges Licht. Du kannst die Farbe des Lichts frei wählen. Wird der Gegenstand mit etwas Undurchsichtigem
    abgedeckt, so wird das Licht blockiert. Der Zauber endet vorzeitig, wenn du ihn erneut wirkst.
- name: Leid
  schule: Nekromantiezauber
  grad: 6. Grades
  klassen:
  - Kleriker
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V, G
  wirkungsdauer: Unmittelbar
  beschreibung: Du entfesselst virulente Magie auf eine Kreatur in Reichweite, die du sehen kannst. Das Ziel führt einen Konstitutionsrettungswurf
    aus. Misslingt der Wurf, so erleidet es 14W6 nekrotischen Schaden, und sein Trefferpunktemaximum wird um den Betrag des
    erlittenen nekrotischen Schadens verringert. Bei einem erfolgreichen Rettungswurf erleidet das Ziel nur halb so viel Schaden.
    Dieser Zauber kann das Trefferpunktemaximum des Ziels nicht unter 1 verringern.
- name: Lenkendes Geschoss
  schule: Hervorrufungszauber
  grad: 1. Grades
  klassen:
  - Kleriker
  zeitaufwand: Aktion
  reichweite: 36 Meter
  komponenten: V, G
  wirkungsdauer: 1 Runde
  beschreibung: 'Du schleuderst einen Lichtblitz auf eine Kreatur in Reichweite. Führe einen Fernkampf‑Zauberangriff gegen
    das Ziel aus. Bei einem Treffer erleidet es 4W6 gleißenden Schaden, und der nächste Angriffswurf, der vor dem Ende deines
    nächsten Zugs gegen es Verwenden von Zauberplätzen höheren Grades: ausgeführt wird, ist im Vorteil. Für jeden Zauberplatzgrad
    über dem 1. wird der Schaden um 1W6 erhöht.'
- name: Leuchtfeuer der Hoffnung
  schule: Bannzauber
  grad: 3. Grades
  klassen:
  - Kleriker
  zeitaufwand: Aktion
  reichweite: 9 Meter
  komponenten: V, G
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: Wähle eine beliebige Anzahl von Kreaturen in Reichweite aus. Für die Wirkungsdauer ist jedes Ziel bei Weisheits‑
    und Todesrettungswürfen im Vorteil und erhält bei jeder Heilung die höchstmögliche Anzahl von Trefferpunkten zurück.
- name: Macht der Vorstellungskraft
  schule: Illusionszauber
  grad: 2. Grades
  klassen:
  - Barde
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V, G, M (ein Stück Vlies)
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: 'Du versuchst, im Verstand einer Kreatur in Reichweite, die du sehen kannst, eine Illusion zu erschaffen.
    Das Ziel führt einen Intelligenzrettungs‑ wurf aus. Misslingt der Wurf, so erzeugst du ein geisterhaft sichtbares Phänomen,
    beispielsweise einen Gegenstand oder eine Kreatur. Das Phänomen kann nicht größer sein als ein Würfel mit drei Metern
    Kantenlänge. Es ist nur für die Wirkungsdauer und nur für das Ziel sichtbar. Das Phänomen umfasst auch Geräusche, Temperaturen
    und andere Stimuli. Das Ziel kann die Studieren‑Aktion ausführen, um das Phänomen mit einem Intelligenzwurf (Nachfor‑
    schungen) gegen deinen Zauberrettungswurf‑SG zu untersuchen. Bei einem Erfolg bemerkt das Ziel, dass es sich um eine Illusion
    handelt, und der Zauber endet. Solange das Ziel vom Zauber betroffen ist, behandelt es das Phänomen, als wäre dieses real.
    Unlogische Ergebnisse der Interaktion mit dem Phänomen rationalisiert es. Beispiel: Wenn das Ziel eine geister‑ hafte
    Brücke betreten will und den Absturz überlebt, so glaubt es weiterhin, die Brücke würde existieren, und sucht sich eine
    andere Erklärung für den Sturz. Das betroffene Ziel kann sogar Schaden durch das Phänomen erleiden, wenn dieses eine gefährliche
    Kreatur oder eine anderweitige Gefahr repräsentiert. Das Phänomen kann dem Ziel in jedem deiner Züge 2W8 psychischen Schaden
    zufügen, sofern das Ziel sich im Bereich des Phänomens oder im Abstand von bis zu 1,5 Metern von ihm aufhält. Das Ziel
    erlebt den Schaden als von einer Art, die zur Illusion passt.'
- name: Mächtiges Trugbild
  schule: Illusionszauber
  grad: 3. Grades
  klassen:
  - Barde
  - Hexenmeister
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 36 Meter
  komponenten: V, G, M (ein Stück Vlies)
  wirkungsdauer: Konzentration, bis zu 10 Minuten
  beschreibung: 'Du erschaffst das Abbild eines Gegenstands, einer Kreatur oder eines anderen sichtbaren Phänomens, das nicht
    größer als ein Würfel mit sechs Metern Kantenlänge sein darf. Das Abbild erscheint an einem Punkt in Reichweite und bleibt
    für die Wirkungsdauer bestehen. Es wirkt echt, einschließlich passender Geräusche, Gerüche und Temperaturen, kann jedoch
    weder Schaden noch Zustände bewirken. Wenn du dich in Reichweite der Illusion befindest, kannst du sie mit einer magischen
    Aktion an einen anderen Ort deiner Wahl in Reichweite bewegen. Dabei kannst du das Abbild so verändern, dass seine Bewegung
    natürlich erscheint. Beispiel: Wenn du das Abbild einer Kreatur erschaffst und bewegst, kannst du es so verändern, dass
    es zu laufen scheint. Außerdem kannst du die Illusion verschiedene Geräusche erzeugen oder sogar ein Gespräch führen lassen.
    Physische Interaktionen mit dem Abbild enttarnen es als Illusion, da Dinge es einfach durchdringen können. Eine Kreatur,
    die das Abbild mit der Studieren‑ Aktion untersucht, kann mit einem erfolgreichen Intelligenzwurf (Nachforschungen) gegen
    deinen Zauberrettungswurf‑SG erkennen, dass es sich um eine Illusion handelt. In diesem Fall sieht sie das Abbild als
    durchscheinend und nimmt auch die anderen Verwenden von Zauberplätzen höheren Grades: sensorischen Eigenschaften abgeschwächt
    wahr. Bei einem Zauberplatz ab dem 4. Grad wirkt der Zauber, bis er gebannt wird, ohne dass er Konzentration erfordert.'
- name: Mächtige Unsichtbarkeit
  schule: Illusionszauber
  grad: 4. Grades
  klassen:
  - Barde
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: Berührung
  komponenten: V, G
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: Eine Kreatur, die du berührst, wird unsichtbar, bis der Zauber endet.
- name: Magie bannen
  schule: Bannzauber
  grad: 3. Grades
  klassen:
  - Barde
  - Druide
  - Hexenmeister
  - Kleriker
  - Magier
  - Paladin
  - Waldläufer
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 36 Meter
  komponenten: V, G
  wirkungsdauer: Unmittelbar
  beschreibung: 'Wähle eine Kreatur, einen Gegenstand oder einen magischen Effekt in Reichweite aus. Jeder Zauber des höchstens
    3. Grades, der aktuell auf das Ziel wirkt, wird beendet. Führe für jeden Zauber des mindestens 4. Grades, der auf das
    Ziel wirkt, einen Attributswurf mit deinem Attribut zum Zauberwirken (SG 10 plus Zaubergrad) aus. Bei einem Erfolg endet
    der Zauber. Verwenden von Zauberplätzen höheren Grades: Du beendest automatisch einen Zauber, der auf das Ziel wirkt,
    wenn dessen Grad höchstens dem des Zauberplatzes entspricht, den du verwendest.'
- name: Magie entdecken
  schule: Erkenntniszauber
  grad: 1. Grades
  klassen:
  - Barde
  - Druide
  - Hexenmeister
  - Kleriker
  - Magier
  - Paladin
  - Waldläufer
  - Zauberer
  zeitaufwand: Aktion oder Ritual
  reichweite: Selbst
  komponenten: V, G
  wirkungsdauer: Konzentration, bis zu 10 Minuten
  beschreibung: Während der Wirkungsdauer nimmst du magische Effekte im Abstand von bis zu neun Metern von dir wahr. Wenn
    du magische Effekte wahrnimmst, kannst du die magische Aktion ausführen, um rund um sichtbare Kreaturen und Gegenstände
    im Bereich, auf welche die Magie wirkt, eine schwache Aura zu sehen. Wurde der Effekt durch einen Zauber hervorgerufen,
    so erkennst du dessen Schule der Magie. Der Zauber wird von 30 Zentimetern Stein, Erde oder Holz sowie von 2,5 Zentimetern
    Metall oder einer dünnen Bleischicht blockiert.
- name: Magierhand
  schule: Beschwörung
  grad: Zaubertrick
  klassen:
  - Barde
  - Hexenmeister
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 9 Meter
  komponenten: V, G
  wirkungsdauer: 1 Minute
  beschreibung: An einem Punkt deiner Wahl in Reichweite erscheint eine geisterhafte schwebende Hand. Sie bleibt für die Wirkungsdauer
    bestehen. Die Hand verschwindet, wenn sie weiter als neun Meter von dir entfernt ist oder du den Zauber erneut wirkst.
    Wenn du den Zauber wirkst, kannst du mithilfe der Hand mit Gegenständen interagieren, unverschlossene Türen oder Behälter
    öffnen, Gegenstände in einem Behälter verstauen oder daraus hervorholen oder den Inhalt einer Phiole ausgießen. In deinen
    folgenden Zügen kannst du die Hand als magische Aktion erneut auf diese Art kontrollieren. Als Teil dieser Aktion kannst
    du die Hand bis zu neun Meter weit bewegen. Die Hand kann nicht angreifen, keine magischen Gegenstände aktivieren und
    nicht mehr als fünf Kilogramm Gewicht tragen.
- name: Magierrüstung
  schule: Bannzauber
  grad: 1. Grades
  klassen:
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: Berührung
  komponenten: V, G, M (ein Stück gehärtetes Leder)
  wirkungsdauer: 8 Stunden
  beschreibung: Du berührst eine bereitwillige Kreatur, die keine Rüstung trägt. Für die Wirkungsdauer erhält das Ziel eine
    Basis‑RK von 13 plus ihrem Geschicklichkeitsmodifikator. Der Zauber endet vorzeitig, wenn das Ziel eine Rüstung anlegt.
- name: Magische Aura des Arkanisten
  schule: Illusionszauber
  grad: 2. Grades
  klassen:
  - Magier
  zeitaufwand: Aktion
  reichweite: Berührung
  komponenten: V, G, M (ein kleines Quadrat aus Seide)
  wirkungsdauer: 24 Stunden
  beschreibung: 'Du berührst eine bereitwillige Kreatur oder einen Gegenstand, der nicht getragen oder gehalten wird, und
    platzierst eine Illusion auf dem Ziel. Eine Kreatur erhält den Effekt Maskierung, ein Gegenstand den Effekt Falsche Aura
    (beide Effekte siehe unten). Der Effekt bleibt für die Wirkungsdauer bestehen. Wenn du diesen Zauber 30 Tage lang täglich
    auf dasselbe Ziel wirkst, bleibt die Illusion bestehen, Maskierung (Kreatur): bis sie gebannt wird. Wähle einen Kreaturentyp
    aus, der nicht dem tatsächlichen Typ des Ziels entspricht. Andere Zauber und magische Effekte behandeln das Ziel, als
    wäre es eine Kreatur des Falsche Aura (Gegenstand): ausgewählten Typs. Du veränderst die Magie entdecken Art, wie das
    Ziel für Zauber und magische Effekte wie  erscheint, die magische Auren entdecken. Du kannst einen nichtmagischen Gegenstand
    magisch, einen magischen Gegenstand nichtmagisch erscheinen lassen oder die magische Aura des Gegenstands so manipulieren,
    dass er einer Schule der Magie deiner Wahl anzugehören scheint.'
- name: Magisches Gefäß
  schule: Nekromantiezauber
  grad: 6. Grades
  klassen:
  - Magier
  zeitaufwand: 1 Minute
  reichweite: Selbst
  komponenten: V, G, M (ein Edelstein, ein Kristall oder eine Reliquie im Wert von mindestens 500 GM)
  wirkungsdauer: Bis der Zauber gebannt wird
  beschreibung: Dein Körper verfällt in einen katatonischen Zustand, während deine Seele ihn verlässt und in den Behälter
    eindringt, den du als Materialkomponente des Zaubers verwendest. Während sich deine Seele im Behälter befindet, nimmst
    du deine Umgebung wahr, als würdest du dich im Bereich des Behälters aufhalten. Du kannst dich weder bewegen noch Reaktionen
    ausführen. Als einzige mögliche Aktion kannst du deine Seele bis zu 30 Meter außerhalb des Behälters projizieren und entweder
    in deinen lebendigen Körper zurück kehren – und damit den Zauber beenden – oder versuchen, dich des Körpers eines Humanoiden
    zu bemächtigen. Du kannst versuchen, von einem beliebigen Humanoiden im Abstand von bis zu 30 Metern von dir, den du sehen
    kannst, Besitz zu ergreifen. Schutz vor Gut und BöseSchutzkreis Ausgenommen sind Kreaturen, die unter einem der Zauber  oder
    stehen. Das Ziel führt einen Charismarettungswurf aus. Misslingt der Wurf, so besetzt deine Seele den Körper des Ziels,
    und seine Seele wird im Behälter gefangen. Bei einem erfolgreichen Rettungswurf widersteht das Ziel dir, und du kannst
    24 Stunden lang keinen weiteren Versuch unternehmen. Sobald du vom Körper einer Kreatur Besitz ergriffen hast, kontrollierst
    du ihn. Deine Treffer‑ punkte und Trefferpunktewürfel, deine Werte für Geschicklichkeit, Konstitution und Stärke, deine
    Bewegungsrate sowie deine Sinne werden durch die der Kreatur ersetzt. Deine übrigen Spielwerte behältst du bei. Währenddessen
    kann die Seele der Kreatur die Umgebung um den Behälter mit ihren eigenen Sinnen wahrnehmen. Sie ist jedoch kampfunfähig
    und kann sich nicht bewegen. Während du von einem Körper Besitz ergriffen hast, kannst du als magische Aktion vom Wirtskörper
    zum Behälter zurückkehren, sofern sich dieser im Abstand von bis zu 30 Metern von dir befindet. Dadurch wird die Seele
    der Kreatur in ihren Körper zurückbefördert. Wenn der Wirtskörper stirbt, während du dich darin befindest, stirbt die
    Kreatur, und du führst einen Charismarettungswurf gegen deinen eigenen Zauberrettungswurf‑SG aus. Bei einem Erfolg kehrst
    du in den Behälter zurück, sofern er sich im Abstand von bis zu 30 Metern von dir befindet. Anderenfalls stirbst du. Wenn
    der Behälter zerstört wird oder der Zauber endet, kehrt deine Seele in deinen Körper zurück. Befindet sich dein Körper
    weiter als 30 Meter von dir entfernt oder ist er tot, so stirbst du. Befindet sich die Seele einer anderen Kreatur im
    Behälter, wenn er zerstört wird, so kehrt sie in ihren Körper zurück, sofern er lebendig ist und sich im Abstand von bis
    zu 30 Metern von ihr befindet. Anderenfalls stirbt die Kreatur. Wenn der Zauber endet, wird der Behälter zerstört.
- name: Magisches Geschoss
  schule: Hervorrufungszauber
  grad: 1. Grades
  klassen:
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 36 Meter
  komponenten: V, G
  wirkungsdauer: Unmittelbar
  beschreibung: 'Du erschaffst drei leuchtende Wurfpfeile aus magischer Energie. Jeder Wurfpfeil trifft eine Kreatur deiner
    Wahl in Reichweite, die du sehen kannst. Ein Wurfpfeil fügt seinem Ziel 1W4+1 Energieschaden zu. Die Wurfpfeile treffen
    alle gleichzeitig. Du kannst bestimmen, ob sie dieselbe Verwenden von Zauberplätzen höheren Grades: oder verschiedene
    Kreaturen treffen. Für jeden Zauberplatzgrad über dem 1. erzeugt der Zauber einen weiteren Wurfpfeil.'
- name: Magischer Mund
  schule: Illusionszauber
  grad: 2. Grades
  klassen:
  - Barde
  - Magier
  zeitaufwand: 1 Minute oder Ritual
  reichweite: 9 Meter
  komponenten: V, G, M (Jadestaub im Wert von mindestens 10 GM, den der Zauber verbraucht)
  wirkungsdauer: Bis der Zauber gebannt wird
  beschreibung: Du implantierst eine Botschaft in einen Gegenstand in Reichweite. Diese Botschaft wird bei einer bestimmten
    Auslösebedingung ausgesprochen. Wähle einen Gegenstand aus, den du sehen kannst und der nicht von einer anderen Kreatur
    getragen oder gehalten wird. Sprich dann die Botschaft aus. Sie kann höchstens 25 Worte enthalten, jedoch über einen Zeitraum
    von bis zu zehn Minuten übermittelt werden. Lege zum Schluss den Umstand fest, unter dem der Zauber ausgelöst und deine
    Botschaft übermittelt wird. Wenn dieser Auslöser eintritt, erscheint ein magischer Mund auf dem Gegenstand und spricht
    die Botschaft mit deiner Stimme und deiner Sprach‑ lautstärke. Verfügt der ausgewählte Gegenstand über einen Mund oder
    etwas, das wie ein Mund aussieht, beispielsweise den Mund einer Statue, so erscheint der magische Mund dort, sodass die
    Worte aus dem Mund des Gegenstands zu kommen scheinen. Wenn du diesen Zauber wirkst, kannst du entscheiden, ob er nach
    einmaligem Übermitteln der Botschaft endet oder aber bestehen bleibt und die Botschaft jeweils wiederholt wird, wenn die
    Auslösebedingung erneut erfüllt ist. Der Auslöser kann beliebig allgemein oder detailliert sein. Er muss jedoch auf sichtbaren
    und hörbaren Umständen basieren, die im Abstand von bis zu neun Metern um den Gegenstand auftreten. Beispielweise könntest
    du bestimmen, dass die Botschaft übermittelt wird, sobald eine Kreatur sich dem Gegenstand auf neun Meter nähert oder
    wenn im Abstand von bis zu neun Metern vom Gegenstand eine Silberglocke geläutet wird.
- name: Magische Waffe
  schule: Verwandlungszauber
  grad: 2. Grades
  klassen:
  - Magier
  - Paladin
  - Waldläufer
  - Zauberer
  zeitaufwand: Bonusaktion
  reichweite: Berührung
  komponenten: V, G
  wirkungsdauer: 1 Stunde
  beschreibung: 'Du berührst eine nichtmagische Waffe. Für die Wirkungsdauer ist diese Waffe eine magische Waffe mit einem
    Bonus von +1 auf Angriffs‑ und Schadenswürfe. Der Zauber endet vorzeitig, wenn Verwenden von Zauberplätzen höheren Grades:
    du ihn erneut wirkst. Bei einem Zauberplatz des 3. bis 5. Grades wird der Bonus auf +2 erhöht. Bei einem Zauberplatz ab
    dem 6. Grad wird der Bonus auf +3 erhöht.'
- name: Massen-Einflüsterung
  schule: Verzauberungszauber
  grad: 6. Grades
  klassen:
  - Barde
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V, M (eine Schlangenzunge)
  wirkungsdauer: 24 Stunden
  beschreibung: 'Du schlägst bis zu zwölf Kreaturen in Reichweite, die du sehen kannst und die dich hören und verstehen können,
    mit höchstens 25 Worten eine Vorgehens‑ weise vor. Der Vorschlag muss realistisch klingen und darf nichts enthalten, was
    den Zielen oder ihren Verbündeten Schaden zufügen würde. Du könntest beispielsweise sagen: „Geht ins Dorf an dieser Straße
    und helft den Leuten dort bis zum Sonnenuntergang bei der Ernte.“ Oder du könntest sagen: „Dies ist nicht die Zeit für
    Gewalt. Lasst Eure Waffen fallen und tanzt! Hört in einer Stunde wieder auf damit.“ Jedes Ziel muss einen Weisheitsrettungswurf
    bestehen, oder es ist für die Wirkungsdauer – oder bis du oder deine Verbündeten ihm Schaden zufügen – bezaubert. Jedes
    bezauberte Ziel führt den Vorschlag nach besten Kräften aus. Die vorge‑ schlagene Aktivität kann während der gesamten
    Wirkungsdauer fortgesetzt werden. Wenn sie jedoch in kürzerer Zeit abgeschlossen werden kann, endet der Zauber bei einem
    Ziel, sobald es die Aktivität Verwenden von Zauberplätzen höheren Grades: ausgeführt hat. Die Wirkungsdauer wird erhöht:
    bei einem Zauber‑ platzgrad von 7 auf 10 Tage, bei einem Zauberplatz grad von 8 auf 30 Tage und bei einem Zauberplatzgrad
    von 9 auf 366 Tage.'
- name: Massen-Heilendes Wort
  schule: Bannzauber
  grad: 3. Grades
  klassen:
  - Barde
  - Kleriker
  zeitaufwand: Bonusaktion
  reichweite: 18 Meter
  komponenten: V
  wirkungsdauer: Unmittelbar
  beschreibung: 'Bis zu sechs Kreaturen deiner Wahl in Reichweite, die du sehen kannst, erhalten Trefferpunkte in Höhe von
    2W4 plus deinem Zauberwirken‑Attributs‑ Verwenden von Zauberplätzen höheren Grades: modifikator zurück. Für jeden Zauberplatzgrad
    über dem 3. wird die 160HSyesitluenmgr uemfe r1eWn4zd Torkeuffmerepnutn 5k.t2e. 1erhöht.'
- name: Massen-Heilung
  schule: Bannzauber
  grad: 9. Grades
  klassen:
  - Kleriker
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V, G
  wirkungsdauer: Unmittelbar
  beschreibung: Von dir strömt eine Flut aus heilender Energie zu Kreaturen um dich herum. Du kannst bis zu 700 Trefferpunkte
    wiederherstellen und nach deiner Wahl auf eine beliebige Anzahl von Kreaturen in Reichweite verteilen, die du sehen kannst.
    Von diesem Zauber geheilte Kreaturen werden außerdem von den Zuständen Blind, Taub und Vergiftet befreit.
- name: Massen-Wunden heilen
  schule: Bannzauber
  grad: 5. Grades
  klassen:
  - Barde
  - Druide
  - Kleriker
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V, G
  wirkungsdauer: Unmittelbar
  beschreibung: 'Von einem Punkt deiner Wahl in Reichweite geht eine Woge heilender Energie aus. Wähle bis zu sechs Kreaturen
    innerhalb einer Kugel mit einem Radius von neun Metern um den Zielort aus. Jedes Ziel erhält Trefferpunkte in Höhe von
    5W8 plus deinem Verwenden von Zauberplätzen höheren Grades: Zauberwirken-Attributsmodifikator zurück. Für jeden Zauberplatzgrad
    über dem 5. wird die Heilung um 1W8 Trefferpunkte erhöht.'
- name: Metall erhitzen
  schule: Verwandlungszauber
  grad: 2. Grades
  klassen:
  - Barde
  - Druide
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V, G, M (ein Stück Eisen und eine Flamme)
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: 'Wähle einen verarbeiteten Gegenstand aus Metall in Reichweite aus, den du sehen kannst – beispielsweise eine
    metallene Waffe oder eine schwere oder mittelschwere metallene Rüstung. Du lässt den Gegenstand glühend heiß werden. Wenn
    du den Zauber wirkst, erleiden alle Kreaturen in physischem Kontakt mit dem Gegenstand 2W8 Feuerschaden. Für die Wirkungsdauer
    kannst du in jedem deiner folgenden Züge eine Bonusaktion ausführen, um diesen Schaden erneut zu bewirken, sofern der
    Gegenstand sich in Reichweite befindet. Trägt eine Kreatur den Gegenstand oder hält ihn in der Hand, während sie den Schaden
    erleidet, so muss sie einen Konstitutionsrettungswurf bestehen, um den Gegenstand fallenzulassen, falls möglich. Wenn
    sie den Gegenstand nicht fallen lässt, ist sie bis zum Beginn deines nächsten Zugs bei Verwenden von Zauberplätzen höheren
    Grades: Angriffs‑ und Attributswürfen im Nachteil. Für jeden Zauberplatzgrad über dem 2. wird der Schaden um 1W8 erhöht.'
- name: Meteoritenschwarm
  schule: Hervorrufungszauber
  grad: 9. Grades
  klassen:
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 1,6 Kilometer
  komponenten: V, G
  wirkungsdauer: Unmittelbar
  beschreibung: An vier verschiedenen Punkten in Reichweite, die du sehen kannst, stürzen lodernde Feuerkugeln zu Boden. Alle
    Kreaturen in Kugeln mit einem Radius von zwölf Metern um diese Punkte müssen einen Geschicklichkeitsrettungswurf ausführen.
    Misslingt der Wurf, so erleidet die jeweilige Kreatur 20W6 Feuerschaden und 20W6 Wuchtschaden, anderenfalls die Hälfte.
    Kreaturen im Wirkungsbereich von mehr als einer Feuerkugel sind nur einmal betroffen. Nichtmagische Gegenstände im Bereich,
    die nicht getragen oder gehalten werden, erleiden den gleichen Schaden und fangen Feuer, sofern sie brennbar sind.
- name: Mit Pflanzen sprechen
  schule: Verwandlungszauber
  grad: 3. Grades
  klassen:
  - Barde
  - Druide
  - Waldläufer
  zeitaufwand: Aktion
  reichweite: Selbst
  komponenten: V, G
  wirkungsdauer: 10 Minuten
  beschreibung: In einer unbeweglichen Ausströmung von neun Metern um dich herum erfüllst du Pflanzen mit begrenztem Bewusstsein,
    sodass sie mit dir kommunizieren und einfache Befehle befolgen können. Du kannst die Pflanzen über Ereignisse des letzten
    Tages im Bereich des Zaubers befragen und so Informationen über vorbeiziehende Kreaturen, das Wetter und andere Umstände
    erhalten. Außerdem kannst du schwieriges Gelände aufgrund von Pflanzenwachstum – beispielsweise Dickicht oder Unterholz
    – für die Wirkungsdauer in normales Gelände verwandeln. Umgekehrt kannst du normales Gelände für die Wirkungsdauer zu
    schwierigem Gelände durch Pflanzenwachstum machen. Der Zauber ermöglicht es ihnen zwar nicht, sich zu entwurzeln und umherzulaufen,
    aber sie sind in der Lage, ihre Zweige, Ranken und Stiele für dich zu bewegen. Wenn sich eine Pflanzenkreatur in der Umgebung
    befindet, kannst du mit ihr kommunizieren, als würdet ihr dieselbe Sprache sprechen.
- name: Mit Stein verschmelzen
  schule: Verwandlungszauber
  grad: 3. Grades
  klassen:
  - Druide
  - Kleriker
  - Waldläufer
  zeitaufwand: Aktion oder Ritual
  reichweite: Berührung
  komponenten: V, G
  wirkungsdauer: 8 Stunden
  beschreibung: Du betrittst einen steinernen Gegenstand oder eine Oberfläche von ausreichender Größe, um deinen Körper aufzunehmen,
    und verschmilzt für die Wirkungsdauer mitsamt deiner Ausrüstung mit dem Stein. Dazu musst du den Stein berühren. Deine
    Anwesenheit ist nicht erkennbar und kann nur auf magische Weise wahrgenommen werden. Während du mit dem Stein verschmolzen
    bist, kannst du nicht sehen, was außerhalb vor sich geht. Du bist zudem bei Weisheitswürfen (Wahrnehmung), um Geräusche
    von außen zu hören, im Nachteil. Du bemerkst, wie die Zeit vergeht, und kannst Zauber auf dich selbst wirken. Zudem kannst
    du 1,5 Meter deiner Bewegungsrate verwenden, um den Stein dort zu verlassen, wo du ihn betreten hast. Dadurch endet der
    Zauber. Ansonsten kannst du dich nicht bewegen. Geringer physischer Schaden am Stein verletzt dich nicht. Wenn er teilweise
    zerstört oder seine Form verändert wird, sodass du nicht mehr hineinpasst, wirst du ausgestoßen und erleidest 6W6 Energieschaden.
    Wird der Stein vollständig zerstört oder in eine andere Substanz verwandelt, so wirst du ausgestoßen und erleidest 50
    Energieschaden. Wenn du ausgestoßen wirst, gelangst du in den freien Bereich, der deinem Eintrittspunkt am nächsten liegt,
    und hast den Zustand Liegend.
- name: Mit Tieren sprechen
  schule: Erkenntniszauber
  grad: 1. Grades
  klassen:
  - Barde
  - Druide
  - Hexenmeister
  - Waldläufer
  zeitaufwand: Aktion oder Ritual
  reichweite: Selbst
  komponenten: V, G
  wirkungsdauer: 10 Minuten
  beschreibung: Für die Wirkungsdauer kannst du Tiere verstehen und verbal mit ihnen kommunizieren, und du kannst beliebige
    Fertigkeitsoptionen der Beeinflussen- Aktion auf sie anwenden. Die meisten Tiere haben zu Themen abseits von Überleben
    oder Gefährtenschaft nicht viel zu sagen. Sie sind jedoch zumindest in der Lage, Informationen über nahe Orte und Monster
    sowie über Ereignisse mitzuteilen, die sie innerhalb des letzten Tages erlebt haben.
- name: Mit Toten sprechen
  schule: Nekromantiezauber
  grad: 3. Grades
  klassen:
  - Barde
  - Kleriker
  - Magier
  zeitaufwand: Aktion
  reichweite: 3 Meter
  komponenten: V, G, M (brennender Weihrauch)
  wirkungsdauer: 10 Minuten
  beschreibung: Du erfüllst einem Leichnam deiner Wahl in Reichweite mit einem Hauch von Leben, damit er Fragen beantworten
    kann, die du ihm stellst. Der Leichnam muss einen Mund besitzen. Wenn die Kreatur untot war, als sie starb, misslingt
    dieser Zauber. Er misslingt auch dann, wenn die Leiche innerhalb der letzten zehn Tage bereits Ziel dieses Zaubers war.
    Für die Wirkungsdauer kannst du der Leiche bis zu fünf Fragen stellen. Die Leiche besitzt nur das Wissen, das sie zu Lebzeiten
    hatte, und spricht nur die ihr zu Lebzeiten bekannten Sprachen. Die Antworten sind normalerweise kurz, kryptisch oder
    monoton. Der Leichnam muss dir nicht wahrheitsgemäß antworten, wenn du ihm feindselig gesinnt bist oder er dich als Feind
    erkennt. Dieser Zauber bringt nicht die Seele der Kreatur in ihren Körper zurück, nur ihren belebenden Geist. Daher kann
    die Leiche keine neuen Informationen erhalten, weiß nichts, was nach ihrem Tod geschehen ist, und kann nicht über zukünftige
    Ereignisse mutmaßen.
- name: Mondstrahl
  schule: Hervorrufungszauber
  grad: 2. Grades
  klassen:
  - Druide
  zeitaufwand: Aktion
  reichweite: 36 Meter
  komponenten: V, G, M (Blatt einer Mondsamenpflanze)
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: 'In einem zwölf Meter hohen Zylinder mit einem Radius von bis zu 1,5 Metern um einen Punkt in Reichweite scheint
    ein silbriger Strahl fahlen Lichts herab. Für die Wirkungsdauer ist der Zylinder von dämmrigem Licht erfüllt, und du kannst
    in deinen folgenden Zügen eine magische Aktion ausführen, um den Zylinder bis zu 18 Meter weit zu bewegen. Wenn der Zylinder
    erscheint, führt jede Kreatur darin einen Konstitutionsrettungswurf aus. Misslingt der Wurf, so erleidet eine Kreatur
    2W10 gleißenden Verwandlung Schaden. Wenn ihre Gestalt gewandelt ist (beispiels‑ weise infolge des Zaubers ), nimmt sie
    außerdem ihre wahre Gestalt an und kann sich erst wieder verwandeln, wenn sie den Zylinder verlässt. Bei einem erfolgreichen
    Rettungswurf erleidet die Kreatur nur halb so viel Schaden. Eine Kreatur führt diesen Rettungswurf auch dann aus, wenn
    der Bereich des Zaubers sich in ihren Bereich bewegt, wenn die Kreatur den Bereich des Zaubers betritt oder ihren Zug
    darin beendet. Eine Kreatur kann diesen Verwenden von Zauberplätzen höheren Grades: Rettungswurf nur einmal pro Zug ausführen.
    Für jeden Zauberplatzgrad über dem 2. wird der Schaden um 1W10 erhöht.'
- name: Monster beherrschen
  schule: Verzauberungszauber
  grad: 8. Grades
  klassen:
  - Barde
  - Hexenmeister
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V, G
  wirkungsdauer: Konzentration, bis zu 1 Stunde
  beschreibung: 'Eine Kreatur deiner Wahl in Reichweite, die du sehen kannst, muss einen Weisheitsrettungswurf bestehen, oder
    sie ist für die Wirkungsdauer bezaubert. Wenn du oder deine Verbündeten gegen das Ziel kämpfen, ist es beim Rettungswurf
    im Vorteil. Wann immer das Ziel Schaden erleidet, wiederholt es den Rettungswurf. Bei einem Erfolg endet der Zauber bei
    ihm. Du verfügst über eine telepathische Verbindung mit dem bezauberten Ziel, solange ihr euch auf derselben Existenzebene
    befindet. Diese Verbindung kannst du in deinem Zug nutzen, um dem Ziel Befehle zu erteilen (keine Aktion erforderlich),
    beispielsweise „Greife diese Kreatur an“, „Laufe dorthin“ oder „Hole diesen Gegenstand“. Das Ziel gehorcht in seinem Zug,
    so gut es kann. Wenn es den Befehl ausgeführt hat und keine weiteren Anweisungen von dir erhält, verhält es sich nach
    seinen Wünschen und versucht vor allem, sich zu schützen. Du kannst dem Ziel befehlen, eine Reaktion auszuführen, musst
    dazu allerdings selbst eine Verwenden von Zauberplätzen höheren Grades: Reaktion ausführen. Deine Konzentration kann länger
    andauern: bei einem Zauberplatz des 9. Grades bis zu acht Stunden.'
- name: Monster bezaubern
  schule: Verzauberungszauber
  grad: 4. Grades
  klassen:
  - Barde
  - Druide
  - Hexenmeister
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 9 Meter
  komponenten: V, G
  wirkungsdauer: 1 Stunde
  beschreibung: 'Eine Kreatur in Reichweite, die du sehen kannst, führt einen Weisheitsrettungswurf aus. Dabei ist sie im
    Vorteil, wenn du oder deine Verbündeten gegen sie kämpfen. Misslingt der Wurf, so ist das Ziel bezaubert, bis der Zauber
    endet oder du oder deine Verbündeten ihm Schaden zufügen. Die bezauberte Kreatur ist dir freundlich gesinnt. Nach Ende
    des Zaubers weiß das Ziel, dass es von dir bezaubert Verwenden von Zauberplätzen höheren Grades: wurde. Für jeden Zauberplatzgrad
    über dem 4. kannst du auf eine weitere Kreatur zielen.'
- name: Monster festhalten
  schule: Verzauberungszauber
  grad: 5. Grades
  klassen:
  - Barde
  - Hexenmeister
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 27 Meter
  komponenten: V, G, M (ein gerades Stück Eisen)
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: 'Wähle eine Kreatur in Reichweite aus, die du sehen kannst. Das Ziel muss einen Weisheitsrettungswurf bestehen,
    oder es ist für die Wirkungsdauer gelähmt. Das Ziel wiederholt den Rettungswurf am Ende jedes Verwenden von Zauberplätzen
    höheren Grades: seiner Züge. Bei einem Erfolg endet der Zauber. Für jeden Zauberplatzgrad über dem 5. kannst du auf eine
    weitere Kreatur zielen.'
- name: Nahrung und Wasser erschaffen
  schule: Beschwörungszauber
  grad: 3. Grades
  klassen:
  - Kleriker
  - Paladin
  zeitaufwand: Aktion
  reichweite: 9 Meter
  komponenten: V, G
  wirkungsdauer: Unmittelbar
  beschreibung: Du erschaffst 22,5 Kilogramm Nahrung und 120 Liter Wasser auf dem Boden oder in Behältern in Reichweite –
    nützlich, um den Gefahren von Unterernährung und Dehydrierung vorzubeugen. Die Nahrung sieht aus wie Essen deiner Wahl
    und ist schlicht, aber nahrhaft. Das Wasser ist sauber. Die Nahrung verdirbt innerhalb von 24 Stunden, wenn sie nicht
    gegessen wird.
- name: Nahrung und Wasser reinigen
  schule: Verwandlungszauber
  grad: 1. Grades
  klassen:
  - Druide
  - Kleriker
  - Paladin
  zeitaufwand: Aktion oder Ritual
  reichweite: 3 Meter
  komponenten: V, G
  wirkungsdauer: Unmittelbar
  beschreibung: Du entfernst Gifte und Verderbnis aus nichtmagischen Speisen und Getränken in einer Kugel mit einem Radius
    von 1,5 Metern um einen Punkt deiner Wahl in Reichweite.
- name: Nebelschritt
  schule: Beschwörungszauber
  grad: 2. Grades
  klassen:
  - Hexenmeister
  - Magier
  - Zauberer
  zeitaufwand: Bonusaktion
  reichweite: Selbst
  komponenten: V
  wirkungsdauer: Unmittelbar
  beschreibung: Du bist kurz von einem silbrigen Nebel umgeben und teleportierst dich bis zu neun Meter weit in einen freien
    Bereich, den du sehen kannst.
- name: Nebelwolke
  schule: Beschwörungszauber
  grad: 1. Grades
  klassen:
  - Druide
  - Magier
  - Waldläufer
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 36 Meter
  komponenten: V, G
  wirkungsdauer: Konzentration, bis zu 1 Stunde
  beschreibung: 'Du erschaffst eine Kugel aus Nebel mit einem Radius von sechs Metern um einen Punkt in Reichweite. Der Bereich
    in der Kugel ist komplett verschleiert. Windstoß Die Kugel bleibt für die Wirkungsdauer bestehen, oder bis starker Wind
