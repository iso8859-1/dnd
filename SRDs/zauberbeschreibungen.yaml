  beschreibung: 'Du sicherst einen Bereich in Reichweite auf magische Art. Dabei handelt es sich um einen Würfel mit einer
    Kantenlänge zwischen 1,5 und 30 Metern. Der Zauber bleibt für die Wirkungsdauer bestehen. Wenn du den Zauber wirkst, entscheidest
    du, welche Sicherheit er bietet. Du kannst eine beliebige der folgenden Eigenschaften auswählen: • Geräusche können die
    Barriere am Rand des geschützten Bereichs nicht durchdringen. • Die Barriere des geschützten Bereichs erscheint dunkel
    und neblig und verhindert jegliche Sicht (auch Dunkelsicht). • Sensoren von Erkenntniszaubern können weder im geschützten
    Bereich erscheinen noch den Rand der Barriere durchdringen. • Kreaturen in dem Bereich können nicht zum Ziel von Erkenntniszaubern
    werden. • Nichts kann in den bewachten Bereich hinein‑ oder aus ihm herausteleportiert werden. • Ebenenreisen werden innerhalb
    des geschützten Bereichs blockiert. Wenn du diesen Zauber 365 Tage lang täglich am Verwenden von Zauberplätzen höheren
    Grades: selben Ort wirkst, wird der Effekt dauerhaft. Für jeden Zauberplatzgrad über dem 4. kannst du die Kantenlänge
    des Würfels um 30 Meter vergrößern.'
