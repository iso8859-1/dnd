    von Zauberplätzen höheren Grades: die Hälfte des anfänglichen Schadens zuzufügen. Für jeden Zauberplatzgrad über dem 2.
    werden anfänglicher sowie späterer Schaden jeweils um 1W4 erhöht.'
- name: Säurespritzer
  schule: Hervorrufung
  grad: Zaubertrick
  klassen:
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V, G
  wirkungsdauer: Unmittelbar
  beschreibung: 'Du erzeugst an einem Punkt in Reichweite eine Säureblase, die in einer Kugel mit einem Radius von 1,5 Metern
    explodiert. Jede Kreatur in der Kugel muss einen Geschicklichkeitsrettungswurf Zaubertrick-Aufwertung: bestehen, oder
    sie erleidet 1W6 Säureschaden. Der Schaden wird um jeweils 1W6 erhöht, wenn du die 5. (2W6), die 11. (3W6) und die 17.
    (4W6) Stufe erreichst.'
- name: Schauriger Strahl
  schule: Hervorrufung
  grad: Zaubertrick
  klassen:
  - Hexenmeister
  zeitaufwand: Aktion
  reichweite: 36 Meter
  komponenten: V, G
  wirkungsdauer: Unmittelbar
  beschreibung: 'Du schleuderst einen Strahl aus knisternder Energie. Führe einen Fernkampf‑Zauberangriff gegen eine Kreatur
    oder einen Gegenstand in Reichweite aus. Bei einem Treffer erleidet das Ziel 1W10 Zaubertrick-Aufwertung: Energieschaden.
    Der Zauber erzeugt mehr Strahlen, wenn du die 5. (zwei Strahlen), die 11. (drei Strahlen) und die 17. (vier Strahlen)
    Stufe erreichst. Du kannst die Strahlen alle auf dasselbe Ziel oder auf jeweils unterschiedliche Ziele lenken. Führe für
    jeden Strahl einen eigenen Angriffswurf aus.'
- name: Scheingelände
  schule: Illusionszauber
  grad: 4. Grades
  klassen:
  - Barde
  - Druide
  - Hexenmeister
  - Magier
  zeitaufwand: 10 Minuten
  reichweite: 90 Meter
  komponenten: V, G, M (ein Pilz)
  wirkungsdauer: 24 Stunden
  beschreibung: Du lässt natürliches Gelände innerhalb eines Würfels mit 45 Metern Kantenlänge wie ein anderes natürliches
    Gelände aussehen, klingen und riechen. Weite Felder oder eine Straße können so als Sumpf, Berg, Erdspalte oder anderes
    schwieriges oder unpassierbares Gelände erscheinen. Ein Tümpel kann wie eine grüne Wiese wirken, ein Steilhang wie ein
    sanftes Gefälle, ein Graben voller Felsbrocken wie eine breite Straße. Gebäude, Ausrüstung und Kreaturen im Bereich verändern
    sich nicht. Die ertastbaren Eigenschaften des Geländes bleiben unverändert, sodass Kreaturen, die den Bereich betreten,
    die Illusion wahrscheinlich als solche bemerken. Ist der Unterschied bei Berührung nicht offensichtlich, so kann eine
    Kreatur, welche die Illusion untersucht, die Studieren‑Aktion und einen Intelligenzwurf (Nachforschungen) gegen deinen
    Zauberrettungswurf‑SG ausführen, um sie zu durchschauen. Wenn eine Kreatur die Illusion als solche erkennt, sieht sie
    diese als ein dem eigentlichen Gelände überlagertes vages Bild.
- name: Schild
  schule: Bannzauber
  grad: 1. Grades
  klassen:
  - Magier
  - Zauberer
  zeitaufwand: Reaktion, die du ausführst, wenn du von einem Angriffswurf getroffen oder als Ziel des Zaubers Magisches Geschoss
    ausgewählt wirst
  reichweite: Selbst
  komponenten: V, G
  wirkungsdauer: 1 Runde
  beschreibung: Eine nicht wahrnehmbare Barriere aus magischer Energie schützt dich. Bis zum Beginn deines nächsten Zugs hast
    du einen Bonus von +5 auf deine RK (auch Magisches Geschoss gegen den auslösenden Angriff), und du erleidest keinen Schaden
    durch .
- name: Schild des Glaubens
  schule: Bannzauber
  grad: 1. Grades
  klassen:
  - Kleriker
  - Paladin
  zeitaufwand: Bonusaktion
  reichweite: 18 Meter
  komponenten: V, G, M (eine Gebetsschriftrolle)
  wirkungsdauer: Konzentration, bis zu 10 Minuten
  beschreibung: Ein schimmerndes Feld umgibt eine Kreatur deiner Wahl in Reichweite und gewährt ihr für die Wirkungsdauer
    einen Bonus von +2 auf ihre RK.
- name: Schlaf
  schule: Verzauberungszauber
  grad: 1. Grades
  klassen:
  - Barde
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V, G, M (eine Prise Sand oder Rosenblütenblätter)
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: Jede Kreatur deiner Wahl in einer Kugel mit einem Radius von 1,5 Metern um einen Punkt in Reichweite muss
    einen Weisheitsrettungswurf bestehen, oder es ist bis zum Ende seines nächsten Zugs kampfunfähig und muss den Rettungswurf
    dann wiederholen. Wenn das Ziel auch beim zweiten Rettungswurf scheitert, ist es für die Wirkungsdauer bewusstlos. Der
    Zauber endet bei einem Ziel, wenn es Schaden erleidet oder jemand im Abstand von bis zu 1,5 Metern von ihm eine Aktion
    ausführt, um es zu schütteln. Kreaturen, die wie Elfen nicht schlafen oder die gegen den Zustand Erschöpft immun sind,
    bestehen Rettungswürfe gegen diesen Zauber automatisch.
- name: Schmieren
  schule: Beschwörungszauber
  grad: 1. Grades
  klassen:
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V, G, M (ein Stück Schweineschwarte oder Butter)
  wirkungsdauer: 1 Minute
  beschreibung: In einem quadratischen Bereich mit drei Metern Kantenlänge um einen Punkt in Reichweite bedeckt nichtbrennbares
    Fett den Boden und macht ihn für die Wirkungsdauer zu schwierigem Gelände. Wenn das Schmierfett erscheint, muss jede Kreatur
    in diesem Bereich einen Geschicklichkeits‑ rettungswurf bestehen, oder sie rutscht aus und stürzt hin, sodass sie den
    Zustand Liegend hat. Auch Kreaturen, die den Bereich betreten oder ihren Zug darin beginnen, müssen diesen Rettungswurf
    bestehen, um nicht auszurutschen.
- name: Schneesturm
  schule: Beschwörungszauber
  grad: 3. Grades
  klassen:
  - Druide
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 45 Meter
  komponenten: V, G, M (ein Miniaturregenschirm)
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: Für die Wirkungsdauer fallen in einem zwölf Meter hohen Zylinder mit einem Radius von sechs Metern um einen
    Punkt deiner Wahl in Reichweite Schnee und Graupel. Der Bereich ist komplett verschleiert, und offene Flammen erlöschen
    darin. Der Boden im Zylinder ist schwieriges Gelände. Wenn eine Kreatur den Zylinder in einem Zug erstmals betritt oder
    den Zug darin beginnt, muss sie einen Geschicklichkeitsrettungswurf bestehen, oder sie stürzt hin, sodass sie liegend
    ist, und verliert ihre Konzentration.
- name: Schockgriff
  schule: Hervorrufung
  grad: Zaubertrick
  klassen:
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: Berührung
  komponenten: V, G
  wirkungsdauer: Unmittelbar
  beschreibung: 'Von dir springt ein Blitz auf eine Kreatur über, die du zu berühren versuchst. Führe einen Nahkampf‑ Zauberangriff
    gegen das Ziel aus. Bei einem Treffer erleidet das Ziel 1W8 Blitzschaden und kann bis zum Beginn seines nächsten Zugs
    keine Zaubertrick-Aufwertung: Gelegenheitsangriffe ausführen. Der Schaden wird um jeweils 1W8 erhöht, wenn du die 5. (2W8),
    die 11. (3W8) und die 17. (4W8) Stufe erreichst.'
- name: Schutz vor Energie
  schule: Bannzauber
  grad: 3. Grades
  klassen:
  - Druide
  - Kleriker
  - Magier
  - Waldläufer
  - Zauberer
  zeitaufwand: Aktion
  reichweite: Berührung
  komponenten: V, G
  wirkungsdauer: Konzentration, bis zu 1 Stunde
  beschreibung: 'Für die Wirkungsdauer ist eine bereitwillige Kreatur, die du berührst, gegen eine Schadensart deiner Wahl
    resistent: Blitz, Feuer, Kälte, Säure oder Schall.'
- name: Schutz vor Gift
  schule: Bannzauber
  grad: 2. Grades
  klassen:
  - Druide
  - Kleriker
  - Paladin
  - Waldläufer
  zeitaufwand: Aktion
  reichweite: Berührung
  komponenten: V, G
  wirkungsdauer: 1 Stunde
  beschreibung: Du berührst eine Kreatur und beendest bei ihr den Zustand Vergiftet. Für die Wirkungsdauer ist das Ziel bei
    Rettungswürfen zum Vermeiden oder Beenden des Zustands Vergiftet im Vorteil und gegen Giftschaden resistent.
- name: Schutz vor Gut und Böse
  schule: Bannzauber
  grad: 1. Grades
  klassen:
  - Druide
  - Hexenmeister
  - Kleriker
  - Magier
  - Paladin
  zeitaufwand: Aktion
  reichweite: Berührung
  komponenten: V, G, M (eine Flasche Weihwasser im Wert von mindestens 25 GM, die der Zauber verbraucht)
  wirkungsdauer: Konzentration, bis zu 10 Minuten
  beschreibung: 'Für die Wirkungsdauer ist eine bereitwillige Kreatur, die du berührst, vor bestimmten Kreaturentypen geschützt:
    vor Aberrationen, celestischen Wesen, Elementaren, Feenwesen, Unholden und Untoten. Der Schutz gewährt mehrere Vorzüge:
    Angriffswürfe von Kreaturen dieses Typs sind gegen das Ziel im Nachteil. Außerdem kann das Ziel nicht von Kreaturen dieses
    Typs besessen, bezaubert oder verängstigt werden. Wenn das Ziel bereits von einer solchen Kreatur besessen, bezaubert
    oder verängstigt ist, so ist es bei jedem neuen Rettungswurf gegen den entsprechenden Effekt im Vorteil.'
- name: Schützendes Band
  schule: Bannzauber
  grad: 2. Grades
  klassen:
  - Kleriker
  - Paladin
  zeitaufwand: Aktion
  reichweite: Berührung
  komponenten: V, G, M (ein Paar Platinringe im Wert von jeweils mindestens 50 GM, die du und das Ziel für die Wirkungsdauer
    tragen müsst)
  wirkungsdauer: 1 Stunde
  beschreibung: Du berührst eine bereitwillige Kreatur und erzeugst eine mystische Verbindung zwischen euch, die bestehen
    bleibt, bis der Zauber endet. Solange sich das Ziel im Abstand von bis zu 18 Metern von dir befindet, erhält es einen
    Bonus von +1 auf seine RK sowie auf Rettungswürfe und ist gegen alle Schadensarten resistent. Allerdings erleidest du
    jedes Mal, wenn dem Ziel Schaden zugefügt wird, die gleiche Menge Schaden. Der Zauber endet, falls deine Trefferpunkte
    auf 0 sinken oder ihr euch weiter als 18 Meter voneinander entfernt. Der Zauber endet auch, wenn er auf einen der beiden
    Beteiligten erneut gewirkt wird.
- name: Schutzgeister
  schule: Beschwörungszauber
  grad: 3. Grades
  klassen:
  - Kleriker
  zeitaufwand: Aktion
  reichweite: Selbst
  komponenten: V, G, M (eine Gebetsschriftrolle)
  wirkungsdauer: Konzentration, bis zu 10 Minuten
  beschreibung: 'Beschützende Naturgeister umschwirren dich für die Wirkungsdauer in einer Ausströmung von 4,5 Metern. Wenn
    du guter oder neutraler Gesinnung bist, erscheint ihre Spektralform engel‑ oder feenhaft (nach deiner Wahl). Wenn du böser
    Gesinnung bist, erscheinen sie als Unholde. Wenn du diesen Zauber wirkst, kannst du Kreaturen bestimmen, die vom Zauber
    nicht betroffen sind. Die Bewegungsrate betroffener Kreaturen ist innerhalb der Ausströmung halbiert, und wann immer die
    Ausströmung in den Bereich einer Kreatur gelangt, eine Kreatur die Ausströmung betritt oder ihren Zug darin beendet, muss
    die Kreatur einen Weisheits rettungswurf ausführen. Misslingt der Wurf, so erleidet die Kreatur 3W8 gleißenden Schaden
    (wenn du guter oder neutraler Gesinnung bist) oder 3W8 nekrotischen Schaden (wenn du böser Gesinnung bist). Bei einem
    erfolgreichen Rettungswurf erleidet die Kreatur halb so viel Schaden. Eine Kreatur kann diesen Verwenden von Zauberplätzen
    höheren Grades: Rettungswurf nur einmal pro Zug ausführen. Für jeden Zauberplatzgrad über dem 3. wird der Schaden um 1W8
    erhöht.'
- name: Schutzhülle gegen Lebendes
  schule: Bannzauber
  grad: 5. Grades
  klassen:
  - Druide
  zeitaufwand: Aktion
  reichweite: Selbst
  komponenten: V, G
  wirkungsdauer: Konzentration, bis zu 1 Stunde
  beschreibung: Für die Wirkungsdauer geht eine Aura in einer Ausströmung von drei Metern von dir aus. Die Aura verhindert,
    dass Kreaturen außer Konstrukten und Untoten sich hineinbewegen oder hineingreifen. Sie können jedoch Zauber hineinwirken
    und mit Fernkampfwaffen oder Waffen mit Reichweite durch die Barriere angreifen. Wenn du dich so bewegst, dass eine betroffene
    Kreatur die Barriere passieren muss, endet der Zauber.
- name: Schutzkreis
  schule: Bannzauber
  grad: 3. Grades
  klassen:
  - Hexenmeister
  - Kleriker
  - Magier
  - Paladin
  zeitaufwand: 1 Minute
  reichweite: 3 Meter
  komponenten: V, G, M (Salz und Silberpulver im Wert von mindestens 100 GM, das der Zauber verbraucht)
  wirkungsdauer: 1 Stunde
  beschreibung: 'Du erschaffst einen sechs Meter hohen Zylinder aus magischer Energie mit einem Radius von drei Metern um
    einen Punkt auf dem Boden in Reichweite, den du sehen kannst. Wo der Zylinder den Boden oder eine andere Oberfläche schneidet,
    erscheinen leuchtende Runen. Wähle mindestens einen der folgenden Kreaturen‑ typen aus: celestische Wesen, Elementare,
    Feenwesen, Unholde oder Untote. Der Kreis beeinflusst eine Kreatur des ausgewählten Typs wie folgt: • Die Kreatur kann
    den Zylinder nicht freiwillig auf nichtmagische Weise betreten. Versucht die Kreatur, Teleportation oder Ebenenreisen
    zu verwenden, so muss sie zuerst einen Charismarettungswurf bestehen. • Die Kreatur ist bei Angriffswürfen gegen Ziele
    innerhalb des Zylinders im Nachteil. • Ziele innerhalb des Zylinders können von der Kreatur nicht besessen, bezaubert
    oder verängstigt werden. Jedes Mal, wenn du diesen Zauber wirkst, kannst du seine Wirkung umkehren, sodass Kreaturen des
    ausgewählten Typs den Zylinder nicht verlassen können und Ziele außerhalb des Zylinders Verwenden von Zauberplätzen höheren
    Grades: geschützt sind. Für jeden Zauberplatzgrad über dem 3. wird die Wirkungsdauer um eine Stunde erhöht.'
- name: Schwache Elementare beschwören
  schule: Beschwörungszauber
  grad: 4. Grades
  klassen:
  - Druide
  - Magier
  zeitaufwand: Aktion
  reichweite: Selbst
  komponenten: V, G
  wirkungsdauer: Konzentration, bis zu 10 Minuten
  beschreibung: 'Du beschwörst Geister von den Elementarebenen, die dich für die Wirkungsdauer in einer Ausströmung von 4,5
    Metern umschwirren. Für die Wirkungsdauer bewirken all deine Angriffe zusätzlich 2W8 Schaden, wenn sie eine Kreatur innerhalb
    der Ausströmung treffen. Dieser Schaden ist Blitz‑, Feuer‑, Kälte‑ oder Säureschaden (nach deiner Wahl, wenn du den Angriff
    ausführst). Außerdem ist der Boden innerhalb der Ausströmung Verwenden von Zauberplätzen höheren Grades: schwieriges Gelände
    für deine Gegner. Für jeden Zauberplatzgrad über dem 4. wird der Schaden um 1W8 erhöht.'
- name: Schwache Genesung
  schule: Bannzauber
  grad: 2. Grades
  klassen:
  - Barde
  - Druide
  - Kleriker
  - Paladin
  - Waldläufer
  zeitaufwand: Bonusaktion
  reichweite: Berührung
  komponenten: V, G
  wirkungsdauer: Unmittelbar
  beschreibung: 'Du berührst eine Kreatur und beendest einen Zustand bei ihr: Blind, Gelähmt, Taub oder Vergiftet.'
- name: Schwächestrahl
  schule: Nekromantiezauber
  grad: 2. Grades
  klassen:
  - Hexenmeister
  - Magier
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V, G
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: Du verschießt einen Strahl aus entkräftender Energie auf eine Kreatur in Reichweite. Das Ziel muss einen Konstitutionsrettungswurf
    ausführen. Bei einem erfolgreichen Rettungswurf ist das Ziel bei seinem nächsten Angriffswurf bis zum Beginn deines nächsten
    Zugs im Nachteil. Misslingt der Wurf, so ist das Ziel für die Wirkungsdauer bei W20‑Prüfungen, die auf Stärke basieren,
    im Nachteil. Während dieser Dauer zieht es außerdem 1W8 von all seinen Schadenswürfen ab. Das Ziel wiederholt den Rettungswurf
    am Ende jedes seiner Züge. Bei einem Erfolg endet der Zauber.
- name: Schwarze Tentakel
  schule: Beschwörungszauber
  grad: 4. Grades
  klassen:
  - Magier
  zeitaufwand: Aktion
  reichweite: 27 Meter
  komponenten: V, G, M (ein Tentakel)
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: Ein quadratischer Bodenbereich mit sechs Metern Kantenlänge in Reichweite, den du sehen kannst, wird von tiefschwarzen
    zuckenden Tentakeln erfüllt. Die Tentakel verwandeln diesen Bereich für die Wirkungsdauer in schwieriges Gelände. Jede
    Kreatur in diesem Bereich führt einen Stärkerettungswurf aus. Misslingt der Wurf, so erleidet sie 3W6 Wuchtschaden und
    ist festgesetzt, bis der Zauber endet. Auch Kreaturen, die sich in den Bereich begeben oder ihren Zug darin beenden, führen
    den Rettungswurf aus. Jede Kreatur führt den Rettungswurf nur einmal pro Zug aus. Eine festgesetzte Kreatur kann als Aktion
    einen Stärkewurf (Athletik) gegen deinen Zauberrettungs‑ wurf‑SG ausführen. Bei einem Erfolg endet der Zustand bei ihr.
- name: Schweben
  schule: Verwandlungszauber
  grad: 2. Grades
  klassen:
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V, G, M (eine Metallfeder)
  wirkungsdauer: Konzentration, bis zu 10 Minuten
  beschreibung: Ein Ziel – eine Kreatur oder ein loser Gegenstand – deiner Wahl in Reichweite, das du sehen kannst, steigt
    senkrecht sechs Meter empor und schwebt für die Wirkungsdauer in der Luft. Der Zauber kann Gegenstände mit einem Maximalgewicht
    von 250 Kilogramm anheben. Besteht eine nicht bereit‑ willige Kreatur einen Konstitutionsrettungswurf, so ist sie nicht
    betroffen. Das Ziel kann sich nur bewegen, indem es sich von festen Gegenständen oder Oberflächen wie Wänden oder Decken
    in Reichweite abstößt oder sich daran entlanghangelt. Dabei gilt die Kletterbewegungsrate. Während deines Zuges kannst
    du das Ziel um bis zu sechs Meter anheben oder absenken. Wenn du selbst das Ziel bist, kannst du dich im Rahmen deiner
    Bewegung anheben oder absenken. Anderenfalls kannst du das Ziel mit einer magischen Aktion bewegen. Dabei musst du die
    Reichweite des Zaubers einhalten. Wenn der Zauber endet und das Ziel noch schwebt, sinkt es sanft zu Boden.
- name: Schwebende Scheibe
  schule: Beschwörungszauber
  grad: 1. Grades
  klassen:
  - Magier
  zeitaufwand: Aktion oder Ritual
  reichweite: 9 Meter
  komponenten: V, G, M (ein Tropfen Quecksilber)
  wirkungsdauer: 1 Stunde
  beschreibung: Dieser Zauber erschafft eine waagerechte runde Fläche aus Energie mit einem Durchmesser von 90 Zentimetern
    und einer Dicke von 2,5 Zentimetern. Sie schwebt in einem freien Bereich deiner Wahl in Reichweite, den du sehen kannst,
    90 Zentimeter über dem Boden. Die Scheibe bleibt für die Wirkungsdauer bestehen und kann bis zu 250 Kilogramm tragen.
    Wenn sie mit mehr Gewicht belastet wird, endet der Zauber, und alles auf der Scheibe fällt zu Boden. Die Scheibe ist unbeweglich,
    solange du dich im Abstand von bis zu sechs Metern von ihr befindest. Entfernst du dich mehr als sechs Meter von ihr,
    so folgt dir die Scheibe, sodass sie im Abstand von bis zu sechs Metern von dir bleibt. Sie kann sich über unebenes Gelände,
    Treppen, Abhänge und dergleichen bewegen, jedoch keinen Höhenunterschied von mindestens drei Metern überwinden. Beispielsweise
    kann die Scheibe nicht über eine drei Meter tiefe Grube hinwegschweben oder eine solche Grube verlassen, falls sie darin
    erschaffen wurde. Wenn du dich um mehr als 30 Meter von der Scheibe entfernst (meist, weil sie sich nicht um ein Hindernis
    bewegen kann, um dir zu folgen), endet der Zauber.
- name: Schwerkraft umkehren
  schule: Verwandlungszauber
  grad: 7. Grades
  klassen:
  - Druide
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 30 Meter
  komponenten: V, G, M (ein Magnetstein und Eisenspäne)
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: Dieser Zauber kehrt in einem 30 Meter hohen Zylinder mit einem Radius von 15 Metern um einen Punkt in Reichweite
    die Schwerkraft um. Alle Kreaturen und Gegenstände im Bereich, die nicht mit dem Boden verbunden sind, stürzen nach oben
    bis zur Oberseite des Zylinders. Eine Kreatur kann einen Geschicklichkeitsrettungswurf ausführen, um sich an einem verankerten
    Gegenstand in Reichweite festzuhalten und den Sturz nach oben zu vermeiden. Wenn eine Decke oder ein fixer Gegenstand
    bei dem umgekehrten Sturz im Weg ist, kollidieren fallende Gegenstände und Kreaturen mit ihm wie bei einem normalen Sturz.
    Erreicht eine betroffene Kreatur oder ein Gegenstand die Oberseite des Zylinders, ohne mit etwas zu kollidieren, so verbleibt
    das Ziel für die Wirkungsdauer schwebend dort. Wenn der Zauber endet, fallen betroffene Gegenstände und Kreaturen nach
    unten.
- name: Segnen
  schule: Verzauberungszauber
  grad: 1. Grades
  klassen:
  - Kleriker
  - Paladin
  zeitaufwand: Aktion
  reichweite: 9 Meter
  komponenten: V, G, M (ein heiliges Symbol im Wert von mindestens 5 GM)
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: 'Du segnest bis zu drei Kreaturen in Reichweite. Wann immer ein Ziel während der Wirkungsdauer einen Angriffs‑
    oder Rettungswurf ausführt, fügt Verwenden von Zauberplätzen höheren Grades: es dem Ergebnis 1W4 hinzu. Für jeden Zauberplatzgrad
    über dem 1. kannst du auf eine weitere Kreatur zielen.'
- name: Seiltrick
  schule: Verwandlungszauber
  grad: 2. Grades
  klassen:
  - Magier
  zeitaufwand: Aktion
  reichweite: Berührung
  komponenten: V, G, M (ein Stück Seil)
  wirkungsdauer: 1 Stunde
  beschreibung: Du berührst ein Seil. Ein Seilende erhebt sich in die Luft, bis das gesamte Seil senkrecht zum Boden in der
    Luft hängt oder das Seilende eine Decke erreicht. Am oberen Ende des Seils öffnet sich ein unsichtbares Portal zu einem
    extradimensionalen Raum. Das Portal ist einen Meter mal 1,5 Meter groß und bleibt für die Wirkungsdauer bestehen. Der
    Raum kann über das Seil erreicht werden, das in den Raum hineingezogen werden oder heraushängen kann. Der Raum fasst bis
    zu acht Kreaturen von höchstens mittelgroßer Größe. Angriffe, Zauber und andere Effekte können den extradimensionalen
    Raum weder von innen noch von außen durchdringen. Kreaturen im Raum können jedoch durch das Portal nach draußen blicken.
    Alles, was im Raum enthalten ist, fällt heraus, wenn der Zauber endet.
- name: Selbstverkleidung
  schule: Illusionszauber
  grad: 1. Grades
  klassen:
  - Barde
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: Selbst
  komponenten: V, G
  wirkungsdauer: 1 Stunde
  beschreibung: Du veränderst dein Aussehen einschließlich Kleidung, Rüstung, Waffen und anderer Habseligkeiten, bis der Zauber
    endet oder du ihn mit einer Aktion beendest. Du kannst 30 Zentimeter größer oder kleiner sowie schwerer oder leichter
    erscheinen. Allerdings musst du eine Gestalt mit der gleichen Grundanordnung von Gliedmaßen annehmen. Abgesehen davon
    sind die Einzelheiten der Illusion dir überlassen. Einer genauen körperlichen Untersuchung halten die Veränderungen dieser
    Illusion nicht stand. Wenn du diesen Zauber beispielsweise nutzt, um dir einen Hut aufzusetzen, durchdringen Gegenstände
    diesen einfach. Will jemand den Hut berühren, so fühlt er dort nichts. Um deine Verkleidung als solche zu erkennen, muss
    eine Kreatur die Studieren‑Aktion ausführen, um dein Erscheinungsbild zu untersuchen, und einen Intelligenzwurf (Nachforschungen)
    gegen deinen Zauberrettungswurf‑SG bestehen.
- name: Sengender Strahl
  schule: Hervorrufungszauber
  grad: 2. Grades
  klassen:
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 36 Meter
  komponenten: V, G
  wirkungsdauer: Unmittelbar
  beschreibung: 'Du schleuderst drei feurige Strahlen. Du kannst sie auf ein Ziel oder auf mehrere Ziele in Reichweite schleudern.
    Führe für jeden Strahl einen Fernkampf‑ Zauberangriff aus. Bei einem Treffer erleidet das Verwenden von Zauberplätzen
    höheren Grades: Ziel 2W6 Feuerschaden pro Strahl. Für jeden Zauberplatzgrad über dem 2. kannst du einen zusätzlichen Strahl
    erzeugen.'
- name: Sengendes Niederstrecken
  schule: Hervorrufungszauber
  grad: 1. Grades
  klassen:
  - Paladin
  zeitaufwand: Bonusaktion, die du sofort ausführst,
  reichweite: Selbst
  komponenten: V
  wirkungsdauer: 1 Minute
  beschreibung: 'wenn du ein Ziel mit einer Nahkampfwaffe oder einem waffenlosen Angriff getroffen hast Wenn du das Ziel triffst,
    erleidet es zusätzlich 1W6 Feuerschaden durch den Angriff. Für die Wirkungsdauer erleidet das Ziel zu Beginn jedes seiner
    Züge 1W6 Feuerschaden und führt dann einen Konstitutionsrettungswurf aus. Misslingt der Wurf, so wirkt der Zauber weiter.
    Bei einem Verwenden von Zauberplätzen höheren Grades: erfolgreichen Rettungswurf endet der Zauber. Für jeden Zauberplatzgrad
    über dem 1. wird jeder Schaden um 1W6 erhöht.'
- name: Shillelagh
  schule: Verwandlung
  grad: Zaubertrick
  klassen:
  - Druide
  zeitaufwand: Bonusaktion
  reichweite: Selbst
  komponenten: V, G, M (ein Mistelzweig)
  wirkungsdauer: 1 Minute
  beschreibung: 'Das Holz eines Knüppels oder Kampfstabs, den du in der Hand hältst, wird von der Macht der Natur erfüllt.
    Für die Wirkungsdauer kannst du bei Angriffs‑ und Schadenswürfen von Nahkampfangriffen mit dieser Waffe dein Attribut
    zum Zauberwirken anstatt Stärke verwenden, und der Schadenswürfel der Waffe wird zu einem W8. Wenn der Angriff Schaden
    bewirkt, kann dies Energieschaden oder die normale Schadensart der Waffe sein (nach deiner Wahl). Der Zauber endet vorzeitig,
    wenn du ihn erneut Zaubertrick-Aufwertung: wirkst oder die Waffe loslässt. Der Schadenswürfel ändert sich, wenn du die
    5. (W10), die 11. (W12) und die 17. (2W6) Stufe erreichst.'
- name: Simulakrum
  schule: Illusionszauber
  grad: 7. Grades
  klassen:
  - Magier
  zeitaufwand: 12 Stunden
  reichweite: Berührung
  komponenten: V, G, M (Rubinpulver im Wert von mindestens 1.500 GM, das der Zauber verbraucht)
  wirkungsdauer: Bis der Zauber gebannt wird
  beschreibung: Du erschaffst das Abbild eines Tieres oder eines Humanoiden. Das Original muss sich während des gesamten Zeitaufwands
    im Abstand von bis zu drei Metern von dir befinden. Du schließt das Zauberwirken ab, indem du sowohl die Kreatur als auch
    einen Haufen Eis oder Schnee von gleicher Größe berührst. Der Haufen verwandelt sich in das Simulakrum, welches eine Kreatur
    ist. Es verwendet die Spielwerte der ursprünglichen Kreatur zum Zeitpunkt des Zauberwirkens, ist allerdings ein Konstrukt,
    sein Trefferpunktemaximum beträgt die Hälfte, und es kann diesen Zauber nicht wirken. Das Simulakrum ist dir und allen
    von dir bestimmten Kreaturen freundlich gesinnt. Es gehorcht deinen Befehlen und agiert im Kampf in deinem Zug. Ihm sind
    weder Stufenaufstiege noch kurze oder lange Rasten möglich. Wenn das Simulakrum Schaden erleidet, besteht die einzige
    Möglichkeit, seine Trefferpunkte wiederherzustellen, in einer Reparatur während deiner langen Rast, wobei du Komponenten
    im Wert von 100 GM pro wiederhergestelltem Trefferpunkt verbrauchen musst. Bei der Reparatur muss es im Abstand von bis
    zu 1,5 Metern von dir bleiben. Das Simulakrum bleibt bestehen, bis seine Trefferpunkte auf 0 sinken. Dann wird es wieder
    zu Schnee oder Eis und schmilzt. Wirkst du diesen Zauber erneut, so wird das vorige Simulakrum sofort zerstört.
- name: Sofortige Beschwörung
  schule: Beschwörungszauber
  grad: 6. Grades
  klassen:
  - Magier
  zeitaufwand: 1 Minute oder Ritual
  reichweite: Berührung
  komponenten: V, G, M (ein Saphir im Wert von mindestens 1.000 GM)
  wirkungsdauer: Bis der Zauber gebannt wird
  beschreibung: Du berührst den Saphir, den du zum Wirken verwendest, sowie einen Gegenstand, der höchstens 4,5 Kilogramm
    wiegt und keine größere Abmessung als 1,8 Meter hat. Der Zauber hinterlässt eine unsichtbare Markierung am Gegenstand
    und schreibt den Namen des Gegenstands unsichtbar in den Saphir ein. Jedes Mal, wenn du diesen Zauber wirkst, musst du
    einen anderen Saphir verwenden. Danach kannst du eine magische Aktion ausführen, um den Namen des Gegenstands auszusprechen
    und den Saphir zu zerstören. Der Gegenstand erscheint unabhängig von seiner physischen oder planaren Entfernung sofort
    in deiner Hand, und der Zauber endet. Wenn eine andere Kreatur den Gegenstand hält oder trägt, wird er nicht transportiert,
    wenn der Saphir zerstört wird. Stattdessen erfährst du, wer die Kreatur ist, die ihn bei sich hat, und wo sie sich aktuell
    befindet.
- name: Sonnenfeuer
  schule: Hervorrufungszauber
  grad: 8. Grades
  klassen:
  - Druide
  - Kleriker
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 45 Meter
  komponenten: V, G, M (ein Stück Sonnenstein)
  wirkungsdauer: Unmittelbar
  beschreibung: Eine Kugel mit einem Radius von 18 Metern um einen Punkt deiner Wahl in Reichweite wird von gleißendem Sonnenlicht
    erfüllt. Jede Kreatur in der Linie führt einen Konstitutionsrettungswurf aus. Misslingt der Wurf, so erleidet die Kreatur
    12W6 gleißenden Schaden und ist eine Minute lang blind. Bei einem erfolgreichen Rettungswurf erleidet das Ziel nur halb
    so viel Schaden. Eine von diesem Zauber geblendete Kreatur führt am Ende jedes ihrer Züge einen weiteren Konstitutionsrettungswurf
    aus. Bei einem Erfolg endet der Effekt bei ihr. Dieser Zauber bannt durch beliebige Zauber erschaffene Dunkelheit im Bereich.
- name: Sonnenstrahl
  schule: Hervorrufungszauber
  grad: 6. Grades
  klassen:
  - Druide
  - Kleriker
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: Selbst
  komponenten: V, G, M (eine Lupe)
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: Du verschießt einen Sonnenstrahl in einer 1,5 Meter breiten und 18 Meter langen Linie. Jede Kreatur in der
    Linie führt einen Konstitutionsrettungswurf aus. Misslingt der Wurf, so erleidet die Kreatur 6W8 gleißenden Schaden und
    ist bis zum Beginn deines nächsten Zugs blind. Bei einem erfolgreichen Rettungswurf erleidet das Ziel nur halb so viel
    Schaden. Bis der Zauber endet, kannst du eine magische Aktion ausführen, um eine neue gleißende Linie zu erschaffen. Für
    die Wirkungsdauer erstrahlt ein heller Funke über dir. Er spendet in einem Radius von neun Metern helles Licht und in
    einem Radius von weiteren neun Metern dämmriges Licht. Beim Licht handelt es sich um Sonnenlicht.
- name: Spätzündender Feuerball
  schule: Hervorrufungszauber
  grad: 7. Grades
  klassen:
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 45 Meter
  komponenten: V, G, M (eine Kugel aus Fledermaus Guano und Schwefel)
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: 'Du verschießt einen gelben Lichtstrahl, der sich an einem Punkt deiner Wahl in Reichweite zu einer leuchtenden
    Perle verdichtet und für die Wirkungsdauer dort verweilt. Wenn der Zauber endet, explodiert die Perle, und jede Kreatur
    in einer Kugel mit einem Radius von sechs Metern um diesen Punkt führt einen Geschicklichkeitsrettungswurf aus. Misslingt
    der Wurf, so erleidet die Kreatur Feuerschaden in Höhe des gesamten angesammelten Schadens, anderenfalls die Hälfte. Der
    Grundschaden des Zaubers ist 12W6, und der Schaden wird um 1W6 erhöht, wann immer während der Wirkungsdauer einer deiner
    Züge endet. Wenn eine Kreatur während der Wirkungsdauer die leuchtende Perle berührt, führt die Kreatur einen Geschicklichkeitsrettungswurf
    aus. Misslingt der Wurf, so endet der Zauber, und die Perle explodiert. Bei einem erfolgreichen Rettungswurf kann die
    Kreatur die Perle bis zu zwölf Meter weit werfen. Gelangt die geworfene Perle in den Bereich einer Kreatur oder kollidiert
    sie mit einem festen Gegenstand, so endet der Zauber, und die Perle explodiert. Wenn die Perle explodiert, beginnen brennbare
    Gegenstände im Explosionsbereich, die nicht Verwenden von Zauberplätzen höheren Grades: getragen oder gehalten werden,
    zu brennen. Für jeden Zauberplatzgrad über dem 7. wird der Grundschaden um 1W6 erhöht.'
- name: Spiegelbilder
  schule: Illusionszauber
  grad: 2. Grades
  klassen:
  - Barde
  - Hexenmeister
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: Selbst
  komponenten: V, G
  wirkungsdauer: 1 Minute
  beschreibung: In deinem Bereich erscheinen drei illusionäre Duplikate deiner selbst. Für die Wirkungsdauer bewegen sich
    die Duplikate mit dir und imitieren deine Aktionen sowie deine Position, sodass die reale Version unmöglich zu erkennen
    ist. Wann immer dich eine Kreatur während der Wirkungsdauer des Zaubers mit einem Angriffswurf trifft, würfle für jedes
    verbleibende Duplikat mit einem 1W6. Würfelst du jeweils mindestens eine 3, wird statt dir das entsprechende Duplikat
    getroffen und dabei zerstört. Die Duplikate ignorieren alle anderen Schadensquellen und Effekte. Wenn alle drei Duplikate
    zerstört wurden, endet der Zauber. Eine Kreatur ist von diesem Zauber nicht betroffen, wenn sie den Zustand Blind hat
    oder aber über Blindsicht oder Wahrer Blick verfügt.
- name: Spinnenklettern
  schule: Verwandlungszauber
  grad: 2. Grades
  klassen:
  - Hexenmeister
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: Berührung
  komponenten: V, G, M (etwas Pech und eine Spinne)
  wirkungsdauer: Konzentration, bis zu 1 Stunde
  beschreibung: 'Eine bereitwillige Kreatur, die du berührst, erhält für die Wirkungsdauer die Fähigkeit, sich in alle Richtungen
    und mit freien Händen über senkrechte Oberflächen sowie an Decken zu bewegen. Außerdem erhält das Ziel eine Kletterbewegungsrate
    Verwenden von Zauberplätzen höheren Grades: in Höhe seiner Bewegungsrate. Für jeden Zauberplatzgrad über dem 2. kannst
    du auf eine weitere Kreatur zielen.'
- name: Spinnennetz
  schule: Beschwörungszauber
  grad: 2. Grades
  klassen:
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V, G, M (einige Spinnweben)
  wirkungsdauer: Konzentration, bis zu 1 Stunde
  beschreibung: Du beschwörst an einem Punkt in Reichweite eine Masse aus klebrigen Netzen. Für die Wirkungsdauer füllen die
    Netze dort einen Würfel mit sechs Metern Kantenlänge. Die Netze sind schwieriges Gelände, und ihr Bereich ist leicht verschleiert.
    Wenn sich die Netze nicht zwischen zwei festen Gegenständen wie Mauern oder Bäumen befinden oder über einen Fußboden,
    eine Wand oder unter einer Decke gespannt sind, fallen sie in sich zusammen, und zu Beginn deines nächsten Zugs endet
    der Zauber. Netze, die über eine flache Oberfläche ausgebreitet sind, besitzen eine Dicke von 1,5 Metern. Wenn eine Kreatur
    in einem Zug die Netze erstmals betritt oder ihren Zug darin beginnt, muss sie einen Geschicklichkeitsrettungswurf bestehen,
    oder sie ist festgesetzt, solange sie sich in den Netzen befindet oder bis sie sich befreit. Eine von den Netzen festgesetzte
    Kreatur kann als Aktion einen Stärkewurf (Athletik) gegen deinen Zauberrettungswurf‑SG ausführen. Bei einem Erfolg ist
    sie nicht mehr festgesetzt. Die Netze sind brennbar. Alle Netze innerhalb eines Würfels mit 1,5 Metern Kantenlänge verbrennen
    innerhalb von einer Runde, wenn sie mit Feuer in Kontakt kommen, und fügen dabei allen Kreaturen, die ihren Zug im Feuer
    beginnen, 2W4 Feuerschaden zu.
- name: Sprachen verstehen
  schule: Erkenntniszauber
  grad: 1. Grades
  klassen:
  - Barde
  - Hexenmeister
  - Magier
  - Zauberer
  zeitaufwand: Aktion oder Ritual
  reichweite: Selbst
  komponenten: V, G, M (je eine Prise Ruß und Salz)
  wirkungsdauer: 1 Stunde
  beschreibung: Für die Wirkungsdauer verstehst du die wörtliche Bedeutung jeder Sprache, die du hörst oder liest. Außerdem
    verstehst du jede Schriftsprache, die du liest, sofern du die Oberfläche berührst, auf der die Worte geschrieben stehen.
    Eine Seite Text zu lesen dauert etwa eine Minute. Dieser Zauber entschlüsselt weder Symbole noch Geheimbotschaften.
- name: Sprühende Farben
  schule: Illusionszauber
  grad: 1. Grades
  klassen:
  - Barde
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: Selbst
  komponenten: V, G, M (eine Prise bunter Sand)
  wirkungsdauer: Unmittelbar
  beschreibung: Du entfesselst schillernde bunte Lichter. Jede Kreatur in einem von dir ausgehenden Kegel von 4,5 Metern muss
    einen Konstitutionsrettungswurf bestehen, oder sie ist bis zum Ende deines nächsten Zugs blind.
- name: Sprung
  schule: Verwandlungszauber
  grad: 1. Grades
  klassen:
  - Druide
  - Magier
  - Waldläufer
  - Zauberer
  zeitaufwand: Bonusaktion
  reichweite: Berührung
  komponenten: V, G, M (Hinterbein einer Heuschrecke)
  wirkungsdauer: 1 Minute
  beschreibung: 'Du berührst eine bereitwillige Kreatur. Für die Wirkungsdauer kann diese Kreatur in jedem ihrer Züge bis
    zu neun Meter weit springen, indem sie Verwenden von Zauberplätzen höheren Grades: drei Meter ihrer Bewegungsrate verbraucht.
    Für jeden Zauberplatzgrad über dem 1. kannst du auf eine weitere Kreatur zielen.'
- name: Spurloses Gehen
  schule: Bannzauber
  grad: 2. Grades
  klassen:
  - Druide
  - Waldläufer
  zeitaufwand: Aktion
  reichweite: Selbst
  komponenten: V, G, M (Asche eines Mistelzweigs)
  wirkungsdauer: Konzentration, bis zu 1 Stunde
  beschreibung: Von dir geht für die Wirkungsdauer eine verhüllende Aura in einer Ausströmung von neun Metern aus. Du und
    jede Kreatur deiner Wahl habt in der Aura einen Bonus von +10 auf Geschicklichkeitswürfe (Heimlichkeit), und ihr hinterlasst
    keine Spuren.
- name: Stein formen
  schule: Verwandlungszauber
  grad: 4. Grades
  klassen:
  - Druide
  - Kleriker
  - Magier
  zeitaufwand: Aktion
  reichweite: Berührung
  komponenten: V, G, M (weicher Lehm)
  wirkungsdauer: Unmittelbar
  beschreibung: Du berührst einen steinernen Gegenstand von höchstens mittelgroßer Größe oder einen Abschnitt aus Stein, der
    in keiner Abmessung größer als 1,5 Meter sein darf, und verformst ihn nach deinen Wünschen. Du könntest beispielsweise
    eine Waffe, eine Statue oder eine Truhe aus einem Felsbrocken formen oder einen kleinen Durchgang in einer Mauer schaffen,
    die höchstens 1,5 Meter dick ist. Du könntest auch eine Steintür oder ihren Rahmen teilweise umformen, um sie zu versiegeln.
    Der von dir erschaffene Gegenstand kann bis zu zwei Scharniere und einen Riegel besitzen, feinere mechanische Details
    sind jedoch nicht möglich.
- name: Steinhaut
  schule: Verwandlungszauber
  grad: 4. Grades
  klassen:
  - Druide
  - Magier
  - Waldläufer
  - Zauberer
  zeitaufwand: Aktion
  reichweite: Berührung
  komponenten: V, G, M (Diamantstaub im Wert von mindestens 100 GM, den der Zauber verbraucht)
  wirkungsdauer: Konzentration, bis zu 1 Stunde
  beschreibung: Bis der Zauber endet, ist eine bereitwillige Kreatur, die du berührst, gegen Hieb‑, Stich‑ und Wuchtschaden
    resistent.
- name: Steinwand
  schule: Hervorrufungszauber
  grad: 5. Grades
  klassen:
  - Druide
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 36 Meter
  komponenten: V, G, M (ein Granitwürfel)
  wirkungsdauer: Konzentration, bis zu 10 Minuten
  beschreibung: An einem Punkt deiner Wahl in Reichweite erscheint eine nichtmagische Wand aus massivem Stein. Sie ist 15
    Zentimeter dick und besteht aus zehn quadratischen Platten mit jeweils drei Metern Kantenlänge. Jede Platte muss an mindestens
    eine andere angrenzen. Alternativ kannst du drei Meter mal sechs Meter große Platten erschaffen, die nur 7,5 Zentimeter
    dick sind. Erschaffst du die Wand so, dass sie den Bereich einer Kreatur durchdringt, so wird die Kreatur auf eine Seite
    der Wand (nach deiner Wahl) gestoßen. Wenn eine Kreatur auf allen Seiten von der Wand umschlossen (oder zwischen der Wand
    und einer anderen soliden Oberfläche eingeschlossen) wäre, kann diese Kreatur einen Geschicklich keitsrettungswurf ausführen.
    Bei einem Erfolg kann sie ihre Reaktion verwenden, um sich bis zu ihrer Bewegungsrate zu bewegen, sodass sie nicht mehr
    eingeschlossen ist. Die Wand kann jede gewünschte Form annehmen, jedoch nicht denselben Bereich wie eine Kreatur oder
    ein Gegenstand einnehmen. Sie muss nicht senkrecht sein oder auf festem Untergrund stehen. Allerdings muss sie mit bestehendem
    Stein verschmelzen und von ihm getragen werden. Somit kannst du diesen Zauber verwenden, um eine Schlucht zu überwinden
    oder eine Rampe zu erschaffen. Wenn du eine Brücke von mehr als sechs Metern Länge erschaffen willst, musst du die halbe
    Größe jeder Platte für Stützpfeiler verbrauchen. Du kannst die Steinwand grob formen, um Wehranlagen und dergleichen zu
    erschaffen. Die Wand ist ein Gegenstand aus Stein, der beschädigt und somit durchbrochen werden kann. Jede Platte besitzt
    eine RK von 15, 30 Trefferpunkte pro 2,5 Zentimetern Dicke und ist gegen Gift‑ und psychischen Schaden immun. Wenn die
    Trefferpunkte einer Platte auf 0 sinken, wird sie zerstört, was angrenzende Platten nach Ermessen des SL zum Einsturz
    bringen könnte. Konzentrierst du dich für die gesamte Wirkungs‑ dauer auf diesen Zauber, so wird die Wand dauerhaft und
    kann nicht gebannt werden. Anderenfalls verschwindet sie, wenn der Zauber endet.
- name: Sternenfunke
  schule: Hervorrufung
  grad: Zaubertrick
  klassen:
  - Barde
  - Druide
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V, G
  wirkungsdauer: Unmittelbar
  beschreibung: 'Du schleuderst einen Lichtfunken auf eine Kreatur oder einen Gegenstand in Reichweite. Führe einen Fernkampf‑Zauberangriff
    gegen das Ziel aus. Bei einem Treffer erleidet das Ziel 1W8 gleißenden Schaden, und bis zum Ende deines nächsten Zugs
    spendet es in einem Radius von drei Metern Zaubertrick-Aufwertung: dämmriges Licht und kann nicht unsichtbar werden. Der
    Schaden wird um jeweils 1W8 erhöht, wenn du die 5. (2W8), die 11. (3W8) und die 17. (4W8) Stufe erreichst.'
- name: Stille
  schule: Illusionszauber
  grad: 2. Grades
  klassen:
  - Barde
  - Kleriker
  - Waldläufer
  zeitaufwand: Aktion oder Ritual
  reichweite: 36 Meter
  komponenten: V, G
  wirkungsdauer: Konzentration, bis zu 10 Minuten
  beschreibung: Für die Wirkungsdauer kann in einer Kugel mit einem Radius von sechs Metern kein Geräusch erzeugt werden,
    und kein Geräusch kann in die Kugel dringen. Die Kugel wird an einem Ort deiner Wahl in Reichweite erzeugt. Alle Kreaturen
    und Gegenstände, die sich vollständig in der Kugel befinden, sind taub und gegen Schallschaden immun. In der Kugel können
    keine Zauber mit Verbalkomponente gewirkt werden.
- name: Stinkende Wolke
  schule: Beschwörungszauber
  grad: 3. Grades
  klassen:
  - Barde
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 27 Meter
  komponenten: V, G, M (ein faules Ei)
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: Du erschaffst eine Kugel mit einem Radius von sechs Metern um einen Punkt in Reichweite, die mit gelbem, übelriechendem
    Gas gefüllt ist. Diese Gaswolke ist komplett verschleiert. Sie bleibt Windstoß für die Wirkungsdauer in der Luft, oder
    bis starker Wind (wie solcher durch ) sie auflöst. Jede Kreatur, die ihren Zug in der Kugel beginnt, muss einen Konstitutionsrettungswurf
    bestehen, oder sie ist bis zum Ende des aktuellen Zugs vergiftet. Eine auf diese Art vergiftete Kreatur kann weder eine
    Aktion noch eine Bonusaktion ausführen.
- name: Strahl der Übelkeit
  schule: Nekromantiezauber
  grad: 1. Grades
  klassen:
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V, G
  wirkungsdauer: Unmittelbar
  beschreibung: 'Du verschießt einen grünlichen Strahl auf eine Kreatur in Reichweite. Führe einen Fernkampf‑ Zauberangriff
    gegen das Ziel aus. Bei einem Treffer erleidet das Ziel 2W8 Giftschaden und ist bis zum Verwenden von Zauberplätzen höheren
    Grades: Ende deines nächsten Zugs vergiftet. Für jeden Zauberplatzgrad über dem 1. wird der Schaden um 1W8 erhöht.'
- name: Strahlendes Niederstrecken
  schule: Verwandlungszauber
  grad: 2. Grades
  klassen:
  - Paladin
  zeitaufwand: Bonusaktion, die du sofort ausführst,
  reichweite: Selbst
  komponenten: V
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: 'wenn du eine Kreatur mit einer Nahkampfwaffe oder einem waffenlosen Angriff getroffen hast Das Ziel des Schlags
    erleidet zusätzlich 2W6 gleißenden Schaden. Bis der Zauber endet, spendet das Ziel in einem Radius von 1,5 Metern helles
    Licht, Angriffswürfe gegen es sind im Vorteil, und es kann Verwenden von Zauberplätzen höheren Grades: nicht unsichtbar
    werden. Für jeden Zauberplatzgrad über dem 2. wird der Schaden um 1W6 erhöht.'
- name: Sturm der Vergeltung
  schule: Beschwörungszauber
  grad: 9. Grades
  klassen:
  - Druide
  zeitaufwand: Aktion
  reichweite: 1,6 Kilometer
  komponenten: V, G
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: 'Für die Wirkungsdauer bildet sich um einen Punkt in Reichweite eine brodelnde Sturmwolke, die sich in einem
    Radius von 90 Metern ausbreitet. Jede Kreatur unter der Wolke muss einen Konstitutionsrettungswurf bestehen, oder sie
    erleidet 2W6 Schallschaden und ist für die Wirkungsdauer taub. Zu Beginn jedes deiner folgenden Züge bringt die Sturmwolke
    andere Effekte hervor wie unten Runde 2: ausgeführt. Es fällt Säureregen. Alle Kreaturen und Gegenstände unter der Wolke
    erleiden 4W6 Runde 3: Säureschaden. Du rufst sechs Blitze aus der Wolke hervor, die sechs verschiedene Kreaturen oder
    Gegenstände darunter treffen. Jedes Ziel muss einen Geschicklichkeitsrettungswurf ausführen. Misslingt der Wurf, so erleidet
    es 10W6 Blitzschaden, Runde 4: anderenfalls die Hälfte. Hagelkörner prasseln herab. Jede Kreatur Runden 5–10: unter der
    Wolke erleidet 2W6 Wuchtschaden. Durch den Bereich unter der Wolke peitschen Windstöße und Eisregen. Jede Kreatur im Bereich
    erleidet 1W6 Kälteschaden. Bis der Zauber endet, ist der Bereich schwieriges Gelände sowie komplett verschleiert, Fernkampfangriffe
    mit Waffen sind darin nicht möglich, und es fegen starke Stürme hindurch.'
- name: Symbol
  schule: Bannzauber
  grad: 7. Grades
  klassen:
  - Barde
  - Druide
  - Kleriker
  - Magier
  zeitaufwand: 1 Minute
  reichweite: Berührung
  komponenten: V, G, M (Diamantpulver im Wert von mindestens 1.000 GM, das der Zauber verbraucht)
  wirkungsdauer: Bis der Zauber gebannt oder die
  beschreibung: 'Glyphe ausgelöst wird Du zeichnest eine schädliche Glyphe entweder auf eine Oberfläche (wie den Fußboden
    oder eine Wand) oder in einen Gegenstand (wie ein Buch oder eine Truhe), der geschlossen werden kann. Die Glyphe kann
    höchstens in einem Radius von 1,5 Metern wirken. Wählst du einen Gegenstand aus, so muss dieser an seinem Standort bleiben.
    Wenn er um mehr als drei Meter von der Stelle entfernt wird, an der du den Zauber gewirkt hast, wird die Glyphe zerstört,
    und der Zauber endet, ohne ausgelöst zu werden. Die Glyphe ist kaum wahrnehmbar. Es ist ein erfolgreicher Weisheitswurf
    (Wahrnehmung) gegen deinen Zauberrettungswurf‑SG erforderlich, um sie zu bemerken. Wenn du die Glyphe zeichnest, bestimmst
    du ihren Auslöser und entscheidest, welchen Effekt das Symbol trägt: Betäubung, Furcht, Schlaf, Schmerz, Auslöser bestimmen:
    Tod oder Zwietracht. Die Effekte sind unten erläutert. Wenn du den Zauber wirkst, bestimmst du einen Auslöser für die
    Glyphe. Glyphen auf Oberflächen werden meist dadurch ausgelöst, dass jemand sie berührt oder betritt, einen Gegenstand
    bewegt, der die Glyphe verdeckt, oder einen Mindestabstand zur Glyphe unterschreitet. Glyphen in Gegenständen werden meist
    dadurch ausgelöst, dass jemand den Gegenstand öffnet oder die Glyphe sieht. Du kannst den Auslöser verfeinern, sodass
    die Glyphe nur von bestimmten Kreaturentypen ausgelöst wird (beispielsweise könnte die Glyphe nur auf Aberrationen wirken).
    Du kannst auch Bedingungen festlegen, unter denen die Glyphe nicht ausgelöst wird, beispielsweise wenn ein bestimmtes
    Kennwort ausgesprochen wird. Sobald die Glyphe ausgelöst wurde, beginnt sie zu leuchten und erfüllt eine Kugel mit einem
    Radius von 18 Metern zehn Minuten lang mit dämmrigem Licht. Danach endet der Zauber. Jede Kreatur, die sich beim Aktivieren
    der Glyphe in der Kugel befindet, diese in ihrem Zug erstmals betritt oder ihren Zug darin beendet, wird zum Ziel des
    vorher festgelegten Effekts. Eine Kreatur kann nur einmal Betäubung: pro Zug zum Ziel werden. Jedes Ziel muss einen Weisheits‑
    rettungswurf bestehen, oder es ist eine Minute Furcht: lang betäubt. Jedes Ziel muss einen Weisheitsrettungswurf bestehen,
    oder es ist eine Minute lang verängstigt. Ein verängstigtes Ziel muss sich in jedem seiner Züge um mindestens neun Meter
    von der Glyphe entfernen, sofern dies Schlaf: möglich ist. Jedes Ziel muss einen Weisheitsrettungs‑ wurf bestehen, oder
    es ist zehn Minuten lang bewusstlos. Eine Kreatur erwacht, wenn sie Schaden erleidet oder jemand eine Aktion ausführt,
    um sie Schmerz: wachzurütteln. Jedes Ziel muss einen Konstitutions‑ rettungswurf bestehen, oder es ist eine Minute Tod:
    lang kampfunfähig. Jedes Ziel führt einen Konstitutionsrettungs‑ wurf aus. Misslingt der Wurf, so erleidet das Ziel 10W10
    nekrotischen Schaden, anderenfalls die Zwietracht: Hälfte. Jedes Ziel führt einen Weisheits‑ rettungswurf aus. Misslingt
    der Wurf, so streitet sich das Ziel eine Minute lang mit anderen Kreaturen. Während dieser Zeit ist es nicht zu sinnvollen
    Gesprächen in der Lage und bei Angriffs‑ sowie Attributswürfen im Nachteil.'
- name: Tageslicht
  schule: Hervorrufungszauber
  grad: 3. Grades
  klassen:
  - Druide
  - Kleriker
  - Paladin
  - Waldläufer
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V, G
  wirkungsdauer: 1 Stunde
  beschreibung: Für die Wirkungsdauer breitet sich Sonnenlicht von einem Punkt in Reichweite zu einer Kugel mit einem Radius
    von 18 Metern aus. Beim Bereich des Sonnenlichts handelt es sich um helles Licht. Er spendet im Radius von weiteren 18
    Metern dämmriges Licht. Alternativ kannst du den Zauber auf einen Gegenstand wirken, der nicht getragen oder gehalten
    wird. In diesem Fall erfüllt das Sonnenlicht eine Ausströmung von 18 Metern, die vom Gegenstand ausgeht. Wird der Gegenstand
    mit etwas Undurchsichtigem wie einer Schüssel oder einem Helm bedeckt, so wird das Sonnenlicht blockiert. Wenn sich der
    Wirkungsbereich dieses Zaubers mit einem Bereich von Dunkelheit überschneidet, der durch einen Zauber des höchstens 3.
    Grades erzeugt wurde, so wird der andere Zauber gebannt.
- name: Tanzende Lichter
  schule: Illusion
  grad: Zaubertrick
  klassen:
  - Barde
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 36 Meter
  komponenten: V, G, M (etwas Phosphor)
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: Du kannst bis zu vier Lichter in Fackelgröße in Reichweite erzeugen und als Fackeln, Laternen oder Leuchtkugeln
    erscheinen lassen, die für die Wirkungsdauer in der Luft schweben. Alternativ kannst du die vier Lichter zu einer leuchtenden,
    vage humanoiden Gestalt von mittelgroßer Größe kombinieren. Unabhängig von der Form spendet jedes Licht dämmriges Licht
    in einem Radius von drei Metern. Als Bonusaktion kannst du die Lichter bis zu 18 Meter weit in einen Bereich in Reichweite
    bewegen. Jedes Licht muss sich im Abstand von bis zu sechs Metern von einem anderen durch diesen Zauber erzeugten Licht
    befinden. Wenn ein Licht die Reichweite des Zaubers verlässt, erlischt es.
- name: Taschenspielerei
  schule: Verwandlung
  grad: Zaubertrick
  klassen:
  - Barde
  - Hexenmeister
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 3 Meter
  komponenten: V, G
  wirkungsdauer: Bis zu 1 Stunde
  beschreibung: 'Du erzeugst einen magischen Effekt in Reichweite. Wähle den Effekt aus den Optionen unten aus. Wenn du diesen
    Zauber mehrmals wirkst, können bis zu Sensorischer Effekt: drei der langfristigen Effekte gleichzeitig aktiv sein. Du
    erzeugst einen unmittel‑ baren, harmlosen sensorischen Effekt, beispielsweise einen Funkenregen, einen Windstoß, eine
    leise Feuerspiel: Melodie oder einen merkwürdigen Geruch. Du entzündest oder löschst unmittelbar Sauber oder schmutzig:
    eine Kerze, eine Fackel oder ein kleines Lagerfeuer. Du kannst unmittelbar einen Gegenstand, der nicht größer als ein
    Würfel mit 30 Zentimetern Metern Kantenlänge ist, säubern oder verschmutzen. Einfache Sinneswahrnehmung: Du kannst unbelebtes
    Material, das nicht größer als ein Würfel mit 30 Zentimetern Metern Kantenlänge ist, abkühlen, Magisches Zeichen: erhitzen
    oder würzen. Dies hält eine Stunde lang an. Du lässt eine Stunde lang einen Farbfleck, ein Mal oder ein Symbol auf einem
    Einfache Schöpfung: Gegenstand oder einer Oberfläche erscheinen. Du erzeugst ein nicht‑ magisches Schmuckstück oder ein
    illusionäres Bild, das in deine Hand passt. Es bleibt bis zum Ende deines nächsten Zugs bestehen. Diese Schöpfung kann
    keinen Schaden bewirken und hat keinen Geldwert.'
- name: Telekinese
  schule: Verwandlungszauber
  grad: 5. Grades
  klassen:
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V, G
  wirkungsdauer: Konzentration, bis zu 10 Minuten
  beschreibung: 'Du erhältst die Fähigkeit, Kreaturen oder Gegen‑ stände mit deinen Gedanken zu bewegen oder zu manipulieren.
    Wenn du den Zauber wirkst – und als magische Aktion in deinen folgenden Zügen, ehe der Zauber endet –, kannst du deinen
    Willen auf ein Ziel (Kreatur oder Gegenstand) in Reichweite richten, das du sehen kannst, und den entsprechenden Effekt
    auslösen. Du kannst in jeder Runde dasselbe Ziel beeinflussen oder ein neues auswählen. Wenn du das Ziel wechselst, ist
    das vorige nicht mehr vom Kreatur: Zauber betroffen. Du kannst versuchen, eine Kreatur von höchstens riesiger Größe zu
    bewegen. Das Ziel muss einen Stärkerettungswurf bestehen, oder du bewegst es um bis zu neun Meter in eine beliebige Richtung
    in Reichweite des Zaubers. Die Kreatur ist bis zum Ende deines nächsten Zugs festgesetzt, und wenn du sie in die Luft
    hebst, schwebt sie und verbleibt dort. Am Ende deines nächsten Zugs fällt sie herunter, sofern du diese Option nicht erneut
    Gegenstand: auf sie anwendest und ihr Rettungswurf misslingt. Du kannst versuchen, einen Gegenstand von höchstens riesiger
    Größe zu bewegen. Wird der Gegenstand weder getragen noch gehalten, so bewegst du ihn automatisch um bis zu neun Meter
    in eine beliebige Richtung in Reichweite des Zaubers. Wenn der Gegenstand von einer Kreatur getragen oder gehalten wird,
    muss diese Kreatur einen Stärkerettungswurf bestehen, oder du entwindest ihr den Gegenstand und bewegst ihn um bis zu
    neun Meter in eine beliebige Richtung in Reichweite des Zaubers. Du kannst mit deinem telekinetischen Griff Gegenstände
    präzise steuern, beispielsweise ein einfaches Werkzeug verwenden.'
- name: Telepathische Bindung
  schule: Erkenntniszauber
  grad: 5. Grades
  klassen:
  - Barde
  - Magier
  zeitaufwand: Aktion oder Ritual
  reichweite: 9 Meter
  komponenten: V, G, M (zwei Eier)
  wirkungsdauer: 1 Stunde
  beschreibung: Du erschaffst zwischen bis zu acht bereitwilligen Kreaturen deiner Wahl in Reichweite eine telepathische Verbindung.
    Dadurch sind alle Kreaturen für die Wirkungsdauer psychisch miteinander verbunden. Kreaturen, die in keiner Sprache kommunizieren
    können, sind von diesem Zauber nicht betroffen. Bis der Zauber endet, können die Ziele telepathisch miteinander kommunizieren,
    unabhängig davon, ob sie eine gemeinsame Sprache sprechen. Die Kommunikation ist auf jede Entfernung möglich, reicht allerdings
    nicht bis auf andere Existenzebenen.
- name: Teleportieren
  schule: Beschwörungszauber
  grad: 7. Grades
  klassen:
  - Barde
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 3 Meter
  komponenten: V
  wirkungsdauer: Unmittelbar
  beschreibung: 'Dieser Zauber transportiert dich und bis zu acht bereitwillige Kreaturen (oder aber einen Gegenstand) in
    Reichweite, die du sehen kannst, sofort an einen von dir gewählten Ort. Ein Gegenstand muss von höchstens großer Größe
    sein und darf nicht von einer Kreatur gehalten oder getragen werden, die nicht bereitwillig ist. Der Zielort muss dir
    bekannt sein und sich auf derselben Existenzebene wie du befinden. Deine Vertrautheit mit dem Zielort bestimmt, ob du
    erfolgreich dort eintriffst. Der SL würfelt mit 1W100 und konsultiert die Tabelle „Ergebnis der Teleportation“ sowie die
    entsprechenden EErrlgäeubtenriusn dgeern .Teleportation Ähn-Abseits Miss-liches des  Am VertrautheitgeschickGebietZielortsZielort
    Dauerhafter Kreis−−−1–100 Bezugsgegenstand−−−1–100 Sehr vertraut1–56–1314–2425–100 Mehrfach gesehen1–3334–4344–5354–100
    Einmal gesehen 1–4344–5354–7374–100 oder Beschreibung erhalten Falscher Zielort1–5051–100−− Vertrautheit: Hier werden
    die Bedeutungen der Begriffe in der Spalte „Vertrautheit“ der Tabelle erläutert: • Mit „Dauerhafter Kreis“ ist ein dauerhafter
    Kreis der Teleportation gemeint, dessen Siegelsequenz dir bekannt ist. • „Bezugsgegenstand“ bedeutet, dass du einen Gegenstand
    besitzt, der innerhalb der letzten sechs Monate vom gewünschten Zielort genommen wurde, beispielsweise ein Buch aus der
    Bibliothek eines Magiers. • „Sehr vertraut“ beschreibt einen Ort, den du oft aufgesucht oder genau studiert hast oder
    den du beim Wirken des Zaubers sehen kannst. • „Mehrfach gesehen“ bezeichnet einen Ort, den du mehr als einmal gesehen
    hast, mit dem du jedoch nicht sehr vertraut bist. • „Einmal gesehen oder Beschreibung erhalten“ beschreibt einen Ort,
    den du einmal gesehen hast, wahrscheinlich durch Magie, oder der dir beschrieben wurde, vielleicht anhand einer Karte.
    • „Falscher Zielort“ bedeutet, dass ein Ort nicht existiert. Vielleicht hast du versucht, das Sanktum eines Gegners magisch
    auszuspähen, konntest jedoch nur eine Illusion sehen. Oder du versuchst, dich ein einen Ort zu teleportieren, der nicht
    Missgeschick: mehr existiert. Die unberechenbare Magie des Zaubers führt zu einer unglückseligen Reise. Jede teleportierte
    Kreatur (oder der Zielgegenstand) erleidet 3W10 Energieschaden. Zudem würfelt der SL anhand der Tabelle, um zu bestimmen,
    wo ihr landet. Es kann zu mehreren Missgeschicken Ähnliches Gebiet: kommen, die jeweils Schaden bewirken. Du erscheinst
    mit deiner Gruppe (oder dem Gegenstand) in einem anderen Gebiet, das dem Zielort visuell oder thematisch ähnlich ist.
    Du erscheinst am nächstgelegenen ähnlichen Ort. Wenn du beispielsweise in dein Labor teleportieren wolltest, könntest
    du in das Labor einer anderen Abseits des Zielorts: Person in der gleichen Stadt gelangen. Du erscheinst mit deiner Gruppe
    (oder dem Gegenstand) in 2W12 mal 1,6 Kilometern abseits des Zielorts. Würfle mit 1W8, um die Richtung zu bestimmen: 1:
    Osten, 2: Südosten, 3: Süden, 4: Südwesten, 5: Westen, 6: Nordwesten, Am Zielort: 7: Norden, 8: Nordosten. Du erscheinst
    mit deiner Gruppe (oder dem Gegenstand) dort, wo du hinwolltest.'
- name: Thaumaturgie
  schule: Verwandlung
  grad: Zaubertrick
  klassen:
  - Kleriker
  zeitaufwand: Aktion
  reichweite: 9 Meter
  komponenten: V
  wirkungsdauer: Bis zu 1 Minute
  beschreibung: 'Du manifestierst in Reichweite ein kleines Wunder. Du bewirkst in Reichweite einen der unten beschrie‑ benen
    Effekte. Wenn du diesen Zauber mehrmals wirkst, können bis zu drei seiner einminütigen Effekte gleichzeitig wirken. Du
    kannst einen solchen Beben: Effekt verwerfen (keine Aktion erforderlich). Du bewirkst ein harmloses Erdbeben, Dröhnende
    Stimme: das eine Minute lang andauert. Deine Stimme ertönt eine Minute lang bis zu dreimal so laut wie sonst. Für die
    Wirkungsdauer bist du bei Charismawürfen Feuerspiel: (Einschüchtern) im Vorteil. Du lässt eine Minute lang Flammen auflodern,
    stärker oder schwächer leuchten oder Phantomgeräusch: ihre Farbe ändern. Du erzeugst ein unmittelbares Geräusch, das von
    einem Punkt deiner Wahl in Reichweite ausgeht, beispielsweise Donnergrollen, Unsichtbare Hand: Rabenkrächzen oder bedrohliches
    Flüstern. Du lässt unmittelbar eine unverschlossene Tür oder ein unverschlossenes Veränderte Augen: Fenster auffliegen
    oder zuschlagen. Du veränderst für eine Minute das Aussehen deiner Augen.'
- name: Tier beherrschen
  schule: Verzauberungszauber
  grad: 4. Grades
  klassen:
  - Druide
  - Waldläufer
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V, G
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: 'Ein Tier in Reichweite, das du sehen kannst, muss einen Weisheitsrettungswurf bestehen, oder es ist für die
    Wirkungsdauer bezaubert. Wenn du oder deine Verbündeten gegen das Ziel kämpfen, ist es beim Rettungswurf im Vorteil. Wann
    immer das Ziel Schaden erleidet, wiederholt es den Rettungswurf. Bei einem Erfolg endet der Zauber bei ihm. Du verfügst
    über eine telepathische Verbindung mit dem bezauberten Ziel, solange ihr euch auf derselben Existenzebene befindet. Diese
    Verbindung kannst du in deinem Zug nutzen, um dem Ziel Befehle zu erteilen (keine Aktion erforderlich), beispielsweise
    „Greife diese Kreatur an“, „Laufe dorthin“ oder „Hole diesen Gegenstand“. Das Ziel gehorcht in seinem Zug, so gut es kann.
    Wenn es den Befehl ausgeführt hat und keine weiteren Anweisungen von dir erhält, verhält es sich nach seinen Wünschen
    und versucht vor allem, sich zu schützen. Du kannst dem Ziel befehlen, eine Reaktion auszuführen, musst dazu allerdings
    selbst eine Verwenden von Zauberplätzen höheren Grades: Reaktion ausführen. Deine Konzentration kann länger andauern:
    bei einem Zauberplatz des 5. Grades bis zu zehn Minuten, bei einem Zauberplatz des 6. Grades bis zu einer Stunde und bei
    einem Zauberplatz ab dem 7. Grad bis zu acht Stunden.'
- name: Tierbote
  schule: Verzauberungszauber
  grad: 2. Grades
  klassen:
  - Barde
  - Druide
  - Waldläufer
  zeitaufwand: Aktion oder Ritual
  reichweite: 9 Meter
  komponenten: V, G, M (ein Happen Nahrung)
  wirkungsdauer: 24 Stunden
  beschreibung: 'Ein winziges Tier deiner Wahl in Reichweite, das du sehen kannst, muss einen Charismarettungswurf bestehen.
    Misslingt der Wurf, so muss das Ziel versuchen, in deinem Namen eine Botschaft zu überbringen (dies gelingt dem Ziel automatisch,
    sofern sein Herausforderungsgrad nicht gleich null ist). Bestimme einen Ort, an dem du schon einmal warst, und einen Empfänger,
    der einer allgemeinen Beschreibung wie „eine Person in Stadtwachenuniform“ oder „ein rothaariger Zwerg mit spitzem Hut“
    entspricht. Dann kommunizierst du eine Botschaft mit bis zu 25 Worten. Das Tier reist für die Wirkungsdauer in Richtung
    Zielort, wobei es in 24 Stunden etwa 40 Kilometer zurücklegt – oder 80 Kilometer, wenn es fliegen kann. Am Zielort übermittelt
    das Tier der Kreatur, die du beschrieben hast, deine Botschaft und imitiert dabei deine Art der Kommunikation. Erreicht
    das Tier während der Wirkungsdauer sein Ziel nicht, so geht die Botschaft verloren, und das Tier kehrt an den Ort zurück,
    an dem du den Zauber gewirkt Verwenden von Zauberplätzen höheren Grades: hast. Für jeden Zauberplatzgrad über dem 2. wird
    die Wirkungsdauer des Zaubers um 48 Stunden erhöht.'
- name: Tiere beschwören
  schule: Beschwörungszauber
  grad: 3. Grades
  klassen:
  - Druide
  - Waldläufer
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V, G
  wirkungsdauer: Konzentration, bis zu 10 Minuten
  beschreibung: 'Du beschwörst Naturgeister. Diese nehmen die Form eines großen Rudels geisterhafter, immaterieller Tiere
    in einem freien Bereich in Reichweite an, den du sehen kannst. Das Rudel bleibt für die Wirkungsdauer bestehen. Du wählst
    die Tierform der Geister aus, beispielsweise Wölfe, Schlangen oder Vögel. Du bist bei Stärkerettungswürfen im Vorteil,
    solange du dich im Abstand von bis zu 1,5 Metern vom Rudel befindest. Wenn du dich in deinem Zug bewegst, kannst du auch
    das Rudel um bis zu neun Meter in einen freien Bereich bewegen, den du sehen kannst. Wann immer das Rudel sich einer Kreatur,
    die du sehen kannst, auf höchstens drei Meter nähert, und wann immer eine Kreatur, die du sehen kannst, einen Bereich
    im Abstand von bis zu drei Metern vom Rudel betritt oder ihren Zug dort beendet, kannst du die Kreatur zu einem Geschicklichkeitsrettungswurf
    zwingen. Misslingt der Wurf, so erleidet die Kreatur 3W10 Hiebschaden. Eine Kreatur kann diesen Verwenden von Zauberplätzen
    höheren Grades: Rettungswurf nur einmal pro Zug ausführen. Für jeden Zauberplatzgrad über dem 3. wird der Schaden um 1W10
    erhöht.'
- name: Tiere oder Pflanzen aufspüren
  schule: Erkenntniszauber
  grad: 2. Grades
  klassen:
  - Barde
  - Druide
  - Waldläufer
  zeitaufwand: Aktion oder Ritual
  reichweite: Selbst
  komponenten: V, G, M (etwas Fell von einem Bluthund)
  wirkungsdauer: Unmittelbar
  beschreibung: Beschreibe oder nenne eine bestimmte Art von Tier, Pflanzenkreatur oder nichtmagischer Pflanze. Du erfährst,
    in welcher Entfernung und Richtung im Abstand von bis zu acht Kilometern sich die nächste Kreatur dieser Art befindet,
    sofern vorhanden.
- name: Tierform
  schule: Verwandlungszauber
  grad: 8. Grades
  klassen:
  - Druide
  zeitaufwand: Aktion
  reichweite: 9 Meter
  komponenten: V, G
  wirkungsdauer: 24 Stunden
  beschreibung: Wähle eine beliebige Anzahl bereitwilliger Kreaturen in Reichweite aus, die du sehen kannst. Jedes Ziel verwandelt
    sich in ein Tier deiner Wahl von höchstens großer Größe mit einem Herausforderungs grad von höchstens 4. Du kannst für
    jedes Ziel eine andere Gestalt bestimmen. In deinen folgenden Zügen kannst du eine magische Aktion ausführen, um die Ziele
    erneut zu verwandeln. Die Spielwerte eines Ziels werden durch die Werte des jeweiligen Tieres ersetzt. Das Ziel behält
    jedoch seinen Kreaturentyp, seine Trefferpunkte sowie Trefferpunktewürfel, seine Gesinnung, seine Kommunikationsfähigkeit
    sowie seine Werte für Intelligenz, Weisheit und Charisma bei. Die Aktionen des Ziels sind durch die Anatomie der Tiergestalt
    begrenzt. Das Ziel kann keine Zauber wirken. Seine Ausrüstung verschmilzt mit der neuen Gestalt, und das Ziel kann seine
    Ausrüstung in dieser Gestalt nicht verwenden. Das Ziel erhält eine Anzahl von temporären Treffer‑ punkten, die der Anzahl
    von Trefferpunkten der neuen Gestalt entspricht. Nach der Wirkungsdauer dieses Zaubers verbleibende temporäre Treffer‑
    punkte gehen verloren. Die Verwandlungsmagie hält für die Wirkungsdauer an, oder bis das Ziel sie als Bonusaktion beendet.
- name: Tierfreundschaft
  schule: Verzauberungszauber
  grad: 1. Grades
  klassen:
  - Barde
  - Druide
  - Waldläufer
  zeitaufwand: Aktion
  reichweite: 9 Meter
  komponenten: V, G, M (ein Happen Nahrung)
  wirkungsdauer: 24 Stunden
  beschreibung: 'Ziele auf ein Tier in Reichweite, das du sehen kannst. Das Ziel muss einen Weisheitsrettungswurf bestehen,
    oder es ist für die Wirkungsdauer bezaubert. Wenn du oder einer deiner Verbündeten dem Ziel Schaden Verwenden von Zauberplätzen
    höheren Grades: zufügt, endet der Zauber. Für jeden Zauberplatzgrad über dem 1. kannst du auf ein weiteres Tier zielen.'
- name: Todeskreis
  schule: Nekromantiezauber
  grad: 6. Grades
  klassen:
  - Hexenmeister
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 45 Meter
  komponenten: V, G, M (Pulver einer zerstoßenen schwarzen Perle im Wert von mindestens 500 GM)
  wirkungsdauer: Unmittelbar
  beschreibung: 'Von einem Punkt deiner Wahl in Reichweite breitet sich negative Energie zu einer Kugel mit einem Radius von
    18 Metern aus. Jede Kreatur in diesem Bereich führt einen Konstitutionsrettungswurf aus. Misslingt der Wurf, so erleidet
    sie 8W8 nekrotischen Verwenden von Zauberplätzen höheren Grades: Schaden, anderenfalls die Hälfte. Für jeden Zauberplatzgrad
    über dem 6. wird der Schaden um 2W8 erhöht.'
- name: Todesschutz
  schule: Bannzauber
  grad: 4. Grades
  klassen:
  - Kleriker
  - Paladin
  zeitaufwand: Aktion
  reichweite: Berührung
  komponenten: V, G
  wirkungsdauer: 8 Stunden
  beschreibung: Du berührst eine Kreatur und verleihst ihr einen gewissen Schutz vor dem Tod. Wenn die Trefferpunkte des Ziels
    während der Wirkungsdauer erstmals auf 0 sinken würden, sinken sie stattdessen auf 1 Trefferpunkt, und der Zauber endet.
    Erleidet das Ziel während der Wirkungsdauer einen Effekt, der es sofort töten würde, ohne Schaden zu bewirken, so ist
    das Ziel nicht von diesem Effekt betroffen, und der Zauber endet.
- name: Todeswolke
  schule: Beschwörungszauber
  grad: 5. Grades
  klassen:
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 36 Meter
  komponenten: V, G
  wirkungsdauer: Konzentration, bis zu 10 Minuten
  beschreibung: 'Du erschaffst eine Kugel aus gelbgrünem Nebel mit einem Radius von sechs Metern um einen Punkt in Reichweite.
    Der Nebel bleibt für die Wirkungsdauer Windstoß bestehen, oder bis starker Wind (wie solcher durch ) ihn auflöst, wodurch
    der Zauber endet. Der Bereich der Kugel ist komplett verschleiert. Jede Kreatur in der Kugel führt einen Konstitutions‑
    rettungswurf aus. Misslingt der Wurf, so erleidet sie 5W8 Giftschaden, anderenfalls die Hälfte. Eine Kreatur muss den
    Konstitutionsrettungswurf auch dann ausführen, wenn die Kugel sich in ihren Bereich bewegt, wenn die Kreatur die Kugel
    betritt oder wenn sie ihren Zug darin beendet. Eine Kreatur kann diesen Rettungswurf nur einmal pro Zug ausführen. Zu
    Beginn jedes deiner Züge bewegt sich die Kugel Verwenden von Zauberplätzen höheren Grades: um drei Meter von dir weg.
    Für jeden Zauberplatzgrad über dem 5. wird der Schaden um 1W8 erhöht.'
- name: Tödliches Phantom
  schule: Illusionszauber
  grad: 4. Grades
  klassen:
  - Barde
  - Magier
  zeitaufwand: Aktion
  reichweite: 36 Meter
  komponenten: V, G
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: 'Du zapfst die Alpträume einer Kreatur in Reichweite an, die du sehen kannst, und erschaffst eine Illusion
    ihrer tiefsten Ängste, die nur für diese Kreatur sichtbar ist. Das Ziel führt einen Weisheitsrettungs‑ wurf aus. Misslingt
    der Wurf, so erleidet das Ziel 4W10 psychischen Schaden und ist für die Wirkungsdauer bei Attributs‑ und Angriffswürfen
    im Nachteil. Bei einem erfolgreichen Rettungswurf erleidet das Ziel halb so viel Schaden, und der Zauber endet. Für die
    Wirkungsdauer kann das Ziel am Ende jedes seiner Züge einen Weisheitsrettungswurf ausführen. Misslingt der Wurf, so erleidet
    es den psychischen Schaden erneut. Bei einem erfolgreichen Verwenden von Zauberplätzen höheren Grades: Rettungswurf endet
    der Zauber. Für jeden Zauberplatzgrad über dem 4. wird der Schaden um 1W10 erhöht.'
- name: Tor
  schule: Beschwörungszauber
  grad: 9. Grades
  klassen:
  - Hexenmeister
  - Kleriker
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V, G, M (ein Diamant im Wert von mindestens 5.000 GM)
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: Du beschwörst ein Portal, das einen freien Bereich in Reichweite, den du sehen kannst, mit einem bestimmten
    Ort auf einer anderen Existenzebene verbindet. Bei dem Portal handelt es sich um eine kreisrunde Öffnung mit einem Radius
    von 1,5 bis sechs Metern. Du kannst das Portal in eine beliebige Richtung ausrichten. Es bleibt für die Wirkungsdauer
    bestehen, und der Zielort ist durch das Portal hindurch sichtbar. Das Portal hat auf beiden Ebenen eine Vorder‑ und eine
    Rückseite. Reisen durch das Portal sind nur durch die Vorderseite möglich. Alles, was das Portal passiert, wird sofort
    auf die andere Ebene transportiert und erscheint in einem freien Bereich, der dem Portal am nächsten liegt. Gottheiten
    und andere Herrscher über die Ebenen können verhindern, dass sich Portale dieses Zaubers in ihrer Gegenwart oder in ihren
    Domänen öffnen. Wenn du diesen Zauber wirkst, kannst du den Namen einer bestimmten Kreatur aussprechen (Pseudonyme, Titel
    und Spitznamen funktionieren nicht). Befindet sich die Kreatur auf einer anderen Ebene als du, so öffnet sich das Portal
    neben ihr und transportiert sie in den nächstgelegenen freien Bereich auf deiner Seite des Portals. Du erlangst keine
    besondere Macht über die Kreatur und sie handelt nach Ermessen des SL. Sie kann verschwinden, dich angreifen oder dir
    helfen.
- name: Tote beleben
  schule: Nekromantiezauber
  grad: 3. Grades
  klassen:
  - Kleriker
  - Magier
  zeitaufwand: 1 Minute
  reichweite: 3 Meter
  komponenten: V, G, M (ein Tropfen Blut, ein Stück Fleisch und eine Prise Knochenstaub)
  wirkungsdauer: Unmittelbar
  beschreibung: 'Wähle einen Knochenhaufen oder die Leiche eines kleinen oder mittelgroßen Humanoiden in Reichweite Skelett
    aus. Das Ziel wird zu einer untoten Kreatur: zu einem Zombie , wenn du Knochen ausgewählt hast, oder zu einem , wenn du
    eine Leiche ausgewählt hast (jeweilige Wertekästen siehe „Monster“). Du kannst in jedem deiner Züge eine Bonusaktion ausführen,
    um jede Kreatur, die du mit diesem Zauber erschaffen hast und die sich im Abstand von bis zu 18 Metern von dir befindet,
    mental zu befehligen. Handelt es sich um mehrere Kreaturen, so kannst du beliebig viele von ihnen gleichzeitig befehligen,
    wobei jeweils der gleiche Befehl erteilt wird. Du entscheidest über die Aktion und die Bewegung der Kreatur in ihrem nächsten
    Zug. Alternativ kannst du einen allgemeinen Befehl erteilen, beispielsweise eine bestimmte Kammer oder einen Korridor
    zu bewachen. Wenn du keine Befehle erteilst, führt die Kreatur die Ausweichaktion aus und bewegt sich nur, um Schaden
    zu vermeiden. Sobald die Kreatur einen Befehl erhalten hat, führt sie ihn aus, bis die Aufgabe abgeschlossen ist. Die
    Kreatur steht 24 Stunden lang unter deiner Kontrolle. Danach folgt sie keinem deiner Befehle mehr. Um für weitere 24 Stunden
    die Kontrolle über die Kreatur zu behalten, musst du diesen Zauber erneut auf die Kreatur wirken, ehe die ersten 24 Stunden
    abgelaufen sind. In diesem Fall verlängerst du die Kontrolle über bis zu vier Kreaturen, die du mit diesem Zauber erschaffen
    Verwenden von Zauberplätzen höheren Grades: hast, anstatt eine neue Kreatur zu erschaffen. Für jeden Zauberplatzgrad über
    dem 3. erschaffst du zwei zusätzliche untote Kreaturen oder verlängerst die Kontrolle über zwei zusätzliche untote Kreaturen.
    Du benötigst für jede Kreatur eine separate Leiche oder einen separaten Knochenhaufen.'
- name: Tote erwecken
  schule: Nekromantiezauber
  grad: 5. Grades
  klassen:
  - Barde
  - Kleriker
  - Paladin
  zeitaufwand: 1 Stunde
  reichweite: Berührung
  komponenten: V, G, M (ein Diamant im Wert von mindestens 500 GM, den der Zauber verbraucht)
  wirkungsdauer: Unmittelbar
  beschreibung: Du erweckst eine tote Kreatur durch eine Berührung wieder zum Leben, sofern sie höchstens zehn Tage lang tot
    und nicht untot war, als sie starb. Sie wird mit 1 Trefferpunkt wieder lebendig. Dieser Zauber neutralisiert zudem sämtliche
    Gifte, die zum Zeitpunkt des Todes auf das Ziel gewirkt haben. Der Zauber schließt alle tödlichen Wunden, kann jedoch
    keine abgetrennten Gliedmaßen wieder‑ herstellen. Fehlen der Kreatur lebensnotwendige Körperteile oder Organe, beispielsweise
    ihr Kopf, so misslingt der Zauber automatisch. Von den Toten aufzuerstehen ist eine Tortur. Das Ziel erleidet einen Malus
    von −4 auf W20- Prüfungen. Nach jeder langen Rast wird der Malus um 1 verringert, bis er 0 beträgt.
- name: Traum
  schule: Illusionszauber
  grad: 5. Grades
  klassen:
  - Barde
  - Hexenmeister
  - Magier
  zeitaufwand: 1 Minute
  reichweite: Besonders
  komponenten: V, G, M (eine Handvoll Sand)
  wirkungsdauer: 8 Stunden
  beschreibung: Du zielst auf eine Kreatur, die du kennst und die sich auf derselben Existenzebene befindet wie du. Der Zauber
    versetzt dich selbst oder eine bereitwillige Kreatur, die du berührst, in eine Trance, um als Traumbote zu fungieren.
    In der Trance ist der Bote kampfunfähig und hat eine Bewegungsrate von 0. Wenn das Ziel schläft, erscheint der Bote in
    seinen Träumen und kann für die Wirkungsdauer des Zaubers mit ihm sprechen. Der Bote kann zudem die Umgebung des Traums
    gestalten und Landschaften, Gegenstände oder andere Bilder erschaffen. Der Bote kann die Trance und damit den Zauber jederzeit
    beenden. Das Ziel erinnert sich beim Aufwachen genau an den Traum. Ist das Ziel wach, wenn du den Zauber wirkst, so weiß
    der Bote dies und kann entweder die Trance (und den Zauber) beenden oder warten, bis das Ziel schläft, und dann in dessen
    Träumen erscheinen. Du kannst den Boten für das Ziel furchteinflößend erscheinen lassen. In diesem Fall kann der Bote
    eine Nachricht von höchstens zehn Worten übermitteln. Dann führt das Ziel einen Weisheitsrettungswurf aus. Misslingt der
    Wurf, so gewährt die Rast dem Ziel keine Vorzüge, und es erleidet beim Erwachen 3W6 psychischen Schaden.
- name: Treuer Hund
  schule: Beschwörungszauber
  grad: 4. Grades
  klassen:
  - Magier
  zeitaufwand: Aktion
  reichweite: 9 Meter
  komponenten: V, G, M (eine Silberpfeife)
  wirkungsdauer: 8 Stunden
  beschreibung: Du beschwörst in einem freien Bereich in Reichweite, den du sehen kannst, einen geisterhaften Wachhund. Dieser
    bleibt für die Wirkungsdauer bestehen, oder bis ihr euch weiter als 90 Meter voneinander entfernt. Niemand außer dir kann
    den Hund sehen, und er ist immateriell und unverwundbar. Wenn sich ihm eine Kreatur von mindestens kleiner Größe auf höchstens
    neun Meter nähert, ohne zuvor das Kennwort zu sprechen, das du beim Wirken des Zaubers festgelegt hast, bellt der Hund
    laut. Der Hund hat Wahrer Blick mit einer Reichweite von neun Metern. Zu Beginn jedes deiner Züge versucht der Hund, einen
    Gegner im Abstand von bis zu 1,5 Metern von sich zu beißen. Der Gegner muss einen Geschicklich‑ keitsrettungswurf bestehen,
    oder er erleidet 4W8 Energieschaden. In deinen folgenden Zügen kannst du eine magische Aktion ausführen, um den Hund bis
    zu neun Meter weit zu bewegen.
- name: Trugbild projizieren
  schule: Illusionszauber
  grad: 7. Grades
  klassen:
  - Barde
  - Magier
  zeitaufwand: Aktion
  reichweite: 800 km
  komponenten: V, G, M (eine Statuette von dir im Wert von mindestens 5 GM)
  wirkungsdauer: Konzentration, bis zu 1 Tag
  beschreibung: Du erschaffst ein illusionäres Abbild von dir selbst, das für die Wirkungsdauer bestehen bleibt. Das Abbild
    kann unabhängig von Hindernissen an einem beliebigen Ort in Reichweite erscheinen, den du schon einmal gesehen hast. Die
    Illusion sieht aus und klingt wie du, ist aber immateriell. Erleidet die Illusion Schaden, so verschwindet sie, und der
    Zauber endet. Du kannst durch ihre Augen sehen und durch ihre Ohren hören, als befändest du dich in ihrem Bereich. Als
    magische Aktion kannst du die Illusion bis zu 18 Meter weit bewegen und sie gestikulieren, sprechen und auf eine beliebige
    Art handeln lassen. Sie ahmt dein Verhalten perfekt nach. Physische Interaktionen mit dem Abbild enttarnen es als illusionär,
    da Dinge es einfach durchdringen können. Eine Kreatur, die das Abbild mit der Studieren‑Aktion untersucht, kann mit einem
    erfolgreichen Intelligenzwurf (Nachforschungen) gegen deinen Zauberrettungswurf‑SG erkennen, dass es sich um eine Illusion
    handelt. Erkennt eine Kreatur die Illusion als solche, so wird das Abbild für sie durchscheinend, und sämtliche Geräusche
    klingen für sie hohl.
- name: Tsunami
  schule: Beschwörungszauber
  grad: 8. Grades
  klassen:
  - Druide
  zeitaufwand: 1 Minute
  reichweite: 1,6 Kilometer
  komponenten: V, G
  wirkungsdauer: Konzentration, bis zu 6 Runden
  beschreibung: An einem Punkt deiner Wahl in Reichweite erscheint eine Wasserwand. Du kannst sie bis zu 90 Meter lang, 90
    Meter hoch und 15 Meter dick sein lassen. Die Wand bleibt für die Wirkungsdauer bestehen. Wenn die Wand erscheint, führt
    jede Kreatur in ihrem Bereich einen Stärkerettungswurf aus. Misslingt der Wurf, so erleidet die Kreatur 6W10 Wuchtschaden,
    anderenfalls die Hälfte. Zu Beginn jedes deiner Züge nach Erscheinen der Wand bewegt diese sich und alle Kreaturen darin
    um 15 Meter von dir weg. Alle Kreaturen von höchstens riesiger Größe, die sich in der Wand befinden oder in deren Bereiche
    die Wand sich bewegt, müssen einen Stärkerettungswurf bestehen, oder sie erleiden 5W10 Wuchtschaden. Eine Kreatur kann
    diesen Schaden nur einmal pro Runde erleiden. Am Ende des Zugs ist die Höhe der Wand um 15 Meter verringert, und der Schaden,
    den die Wand in späteren Runden bewirkt, ist um 1W10 verringert. Wenn die Höhe der Wand auf 0 sinkt, endet der Zauber.
    Eine Kreatur in der Wand kann sich schwimmend bewegen. Aufgrund der Wucht der Welle muss die Kreatur jedoch einen Stärkewurf
    (Athletik) gegen deinen Zauberrettungswurf‑SG bestehen, um sich überhaupt bewegen zu können. Misslingt der Wurf, so kann
    die Kreatur sich nicht bewegen. Wenn eine Kreatur die Wand verlässt, fällt sie zu Boden.
- name: Unauffindbarkeit
  schule: Bannzauber
  grad: 3. Grades
  klassen:
  - Barde
  - Magier
  - Waldläufer
  zeitaufwand: Aktion
  reichweite: Berührung
  komponenten: V, G, M (eine Prise Diamantstaub im Wert von mindestens 25 GM, den der Zauber verbraucht)
  wirkungsdauer: 8 Stunden
  beschreibung: Du berührst ein Ziel, um es für die Wirkungsdauer vor Erkenntniszaubern zu verstecken. Das Ziel kann eine
    bereitwillige Kreatur, ein Ort oder ein Gegenstand sein. Es darf in keiner Abmessung größer als drei Meter sein. Es kann
    weder durch Erkenntniszauber noch durch magische Ausspähungssensoren wahrgenommen werden.
- name: Unheimliches Schicksal
  schule: Illusionszauber
  grad: 9. Grades
  klassen:
  - Hexenmeister
  - Magier
  zeitaufwand: Aktion
  reichweite: 36 Meter
  komponenten: V, G
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: Du versuchst, illusionäre Schrecken im Geiste anderer zu erzeugen. Jede Kreatur deiner Wahl in einer Kugel
    mit einem Radius von neun Metern um einen Punkt in Reichweite führt einen Weisheitsrettungswurf aus. Misslingt der Wurf,
    so erleidet die Kreatur 10W10 psychischen Schaden und ist für die Wirkungsdauer verängstigt. Bei einem erfolgreichen Rettungswurf
    erleidet die Kreatur nur halb so viel Schaden. Ein verängstigtes Ziel führt am Ende jedes seiner Züge einen Weisheitsrettungswurf
    aus. Misslingt der Wurf, so erleidet es 5W10 psychischen Schaden. Bei einem erfolgreichen Rettungswurf endet der Zauber
    bei diesem Ziel.
- name: Unsichtbarer Diener
  schule: Beschwörungszauber
  grad: 1. Grades
  klassen:
  - Barde
  - Hexenmeister
  - Magier
  zeitaufwand: Aktion oder Ritual
  reichweite: 18 Meter
  komponenten: V, G, M (ein Stück Schnur und etwas Holz)
  wirkungsdauer: 1 Stunde
  beschreibung: 'Dieser Zauber erschafft eine mittelgroße unsichtbare, geist‑ und formlose Kraft, die auf deinen Befehl einfache
    Aufgaben erfüllt, bis der Zauber endet. Der Diener erscheint in Reichweite in einem freien Bereich auf dem Boden. Er besitzt
    eine RK von 10, einen Stärkewert von 2, 1 Trefferpunkt und kann nicht angreifen. Wenn seine Trefferpunkte auf 0 sinken,
    endet der Zauber. Als Bonusaktion kannst du in jedem deiner Züge dem Diener mental befehlen, sich um bis zu 4,5 Meter
    zu bewegen und mit einem Gegenstand zu interagieren. Der Diener kann einfache Aufgaben übernehmen, die auch ein Mensch
    ausführen könnte: Dinge holen, reinigen und reparieren, Kleidung zusammenlegen, Feuer entfachen, Speisen servieren und
    Getränke einschenken. Sobald du einen Befehl erteilst, erfüllt der Diener diesen nach Kräften, bis die Aufgabe erledigt
    ist. Dann wartet er auf deinen nächsten Befehl. Wenn du dem Diener befiehlst, sich für eine Aufgabe mehr als 18 Meter
    weit von dir zu entfernen, endet der Zauber.'
- name: Unsichtbares sehen
  schule: Erkenntniszauber
  grad: 2. Grades
  klassen:
  - Barde
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: Selbst
  komponenten: V, G, M (eine Prise Talk)
  wirkungsdauer: 1 Stunde
  beschreibung: Für die Wirkungsdauer siehst du unsichtbare Kreaturen und Gegenstände, als wären sie sichtbar. Du kannst zudem
    in die Ätherebene blicken. Kreaturen und Gegenstände dort erscheinen geisterhaft.
- name: Unsichtbarkeit
  schule: Illusionszauber
  grad: 2. Grades
  klassen:
  - Barde
  - Hexenmeister
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: Berührung
  komponenten: V, G, M (eine Wimper in Gummiarabikum)
  wirkungsdauer: Konzentration, bis zu 1 Stunde
  beschreibung: 'Eine Kreatur, die du berührst, wird unsichtbar, bis der Zauber endet. Der Zauber endet vorzeitig, sobald
    das Ziel einen Angriffswurf ausgeführt, Schaden bewirkt oder selbst einen Zauber Verwenden von Zauberplätzen höheren Grades:
    gewirkt hat. Für jeden Zauberplatzgrad über dem 2. kannst du auf eine weitere Kreatur zielen.'
- name: Untote erschaffen
  schule: Nekromantiezauber
  grad: 6. Grades
  klassen:
  - Hexenmeister
  - Kleriker
  - Magier
  zeitaufwand: 1 Minute
  reichweite: 3 Meter
  komponenten: V, G, M (je ein schwarzer Onyx im Wert von mindestens 150 GM für jeden Leichnam)
  wirkungsdauer: Unmittelbar
  beschreibung: 'Du kannst diesen Zauber nur nachts wirken. Wähle bis zu drei Leichen von Humanoiden kleiner Ghul oder mittelgroßer
    Größe in Reichweite aus. Jede Leiche wird zu einem  unter deiner Kontrolle (den Wertekasten findest du unter „Monster“).
    Als Bonusaktion in jedem deiner Züge kannst du jede untote Kreatur, die du mit diesem Zauber erschaffen hast und die sich
    im Abstand von bis zu 36 Metern von dir befindet, mental befehligen. Handelt es sich um mehrere Kreaturen, so kannst du
    beliebig viele von ihnen gleichzeitig befehligen, wobei jeweils der gleiche Befehl erteilt wird. Du entscheidest über
    die Aktion und die Bewegung der Kreatur in ihrem nächsten Zug. Alternativ kannst du einen allgemeinen Befehl erteilen,
    beispielsweise einen bestimmten Ort zu bewachen. Wenn du keine Befehle erteilst, führt die Kreatur die Ausweichaktion
    aus und bewegt sich nur, um Schaden zu vermeiden. Sobald die Kreatur einen Befehl erhalten hat, führt sie ihn aus, bis
    die Aufgabe abgeschlossen ist. Die Kreatur steht 24 Stunden lang unter deiner Kontrolle. Danach folgt sie keinem deiner
    Befehle mehr. Um die Kontrolle über die Kreatur für weitere 24 Stunden zu behalten, musst du diesen Zauber erneut auf
    die Kreatur wirken, ehe die ersten 24 Stunden abgelaufen sind. In diesem Fall verlängerst du die Kontrolle über bis zu
    drei Kreaturen, die du mit diesem Zauber erschaffen Verwenden von Zauberplätzen höheren Grades: hast, anstatt eine neue
    Kreatur zu erschaffen. Ghule Bei einem Zauberplatz des 7. Grades kannst du vier erschaffen oder wieder unter deine Kontrolle
    GhuleGrule bringen. Bei einem Zauberplatz des 8. Grades Gruftschrecken kannst du fünf  oder zwei  oder zwei erschaffen
    oder wieder unter GhuleGrule deine Kontrolle bringen. Bei einem Zauberplatz des GruftschreckenMumien 9. Grades kannst
    du sechs  oder drei oder drei  oder zwei erschaffen oder wieder unter deine Kontrolle bringen. Die jeweiligen Wertekästen
    findest du unter „Monster“.'
- name: Unverwüstliche Sphäre
  schule: Bannzauber
  grad: 4. Grades
  klassen:
  - Magier
  zeitaufwand: Aktion
  reichweite: 9 Meter
  komponenten: V, G, M (eine Glaskugel)
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: Eine schimmernde Kugel umschließt eine Kreatur oder einen Gegenstand von jeweils höchstens großer Größe in
    Reichweite. Eine nicht bereitwillige Kreatur muss einen Geschicklichkeitsrettungswurf bestehen, oder sie wird für die
    Wirkungsdauer eingeschlossen. Physische Gegenstände, Energien und Zaubereffekte können die Barriere weder von außen noch
    von innen durchdringen. Eine Kreatur in der Kugel kann jedoch atmen. Die Kugel ist gegen alle Schadensarten immun, und
    eine Kreatur oder ein Gegenstand darin kann weder durch Angriffe noch Effekte von außerhalb Schaden erleiden. Gleichermaßen
    kann eine Kreatur in der Kugel keinen Schaden außerhalb der Kugel bewirken. Die Kugel ist schwerelos und gerade groß genug
    für die Kreatur oder den Gegenstand darin. Eine gefangene Kreatur kann sich als Aktion gegen die Wand der Kugel lehnen
    und die Kugel so bis zur halben Bewegungsrate der Kreatur bewegen. Ebenso kann die Kugel von anderen Kreaturen Auflösung
    aufgehoben und bewegt werden. Wird der Zauber  auf die Kugel gewirkt, so wird die Kugel zerstört, ohne dass etwas im Inneren
    Schaden erleidet.
- name: Unwiderstehlicher Tanz
  schule: Verzauberungszauber
  grad: 6. Grades
  klassen:
  - Barde
  - Magier
  zeitaufwand: Aktion
  reichweite: 9 Meter
  komponenten: V
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: Eine Kreatur in Reichweite, die du sehen kannst, muss einen Weisheitsrettungswurf ausführen. Bei einem erfolgreichen
    Rettungswurf tanzt das Ziel bis zum Ende seines nächsten Zugs albern an einer Stelle und verbraucht dafür seine gesamte
    Bewegungsrate. Misslingt der Wurf, so ist das Ziel für die Wirkungsdauer bezaubert. Solange es bezaubert ist, tanzt das
    Ziel albern an einer Stelle und benötigt dafür seine gesamte Bewegungsrate. Es ist bei Geschicklichkeitsrettungswürfen
    sowie bei Angriffswürfen im Nachteil, und andere Kreaturen sind bei Angriffswürfen gegen das Ziel im Vorteil. Das Ziel
    kann in jedem seiner Züge eine Aktion ausführen, um sich zu sammeln und den Rettungswurf zu wiederholen. Bei einem Erfolg
    endet der Zauber.
- name: Vampirgriff
  schule: Nekromantiezauber
  grad: 3. Grades
  klassen:
  - Hexenmeister
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: Selbst
  komponenten: V, G
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: 'Die Berührung deiner in Schatten gehüllten Hand kann anderen Kreaturen Lebenskraft entziehen, um dich zu
    heilen. Führe einen Nahkampf‑Zauberangriff gegen eine Kreatur in Reichweite aus. Bei einem Treffer erleidet das Ziel 3W6
    nekrotischen Schaden, und du erhältst Trefferpunkte in Höhe der Hälfte des nekrotischen Schadens zurück. Für die Wirkungsdauer
    kannst du in jedem deiner Züge den Angriff als magische Aktion wiederholen und dabei auf dieselbe oder auf eine andere
    Kreatur Verwenden von Zauberplätzen höheren Grades: zielen. Für jeden Zauberplatzgrad über dem 3. wird der Schaden um
    1W6 erhöht.'
- name: Verarbeitung
  schule: Verwandlungszauber
  grad: 4. Grades
  klassen:
  - Magier
  zeitaufwand: 10 Minuten
  reichweite: 36 Meter
  komponenten: V, G
  wirkungsdauer: Unmittelbar
  beschreibung: Du wandelst Rohmaterial in Erzeugnisse aus dem gleichen Material um. Du kannst beispielsweise aus einem Stück
    Baum eine Holzbrücke erschaffen, aus etwas Hanf ein Seil, aus Flachs oder Wolle Kleidung. Wähle Rohmaterial in Reichweite
    aus, das du sehen kannst. Du kannst einen Gegenstand von höchstens großer Größe herstellen, der in einen Würfel mit drei
    Metern Kantenlänge oder in acht verbundene Würfel mit jeweils 1,5 Metern Kantenlänge passt, sofern du über genügend Material
    verfügst. Wenn du mit Metall, Stein oder einem anderen Mineral arbeitest, kann der hergestellte Gegenstand von höchstens
    mittelgroßer Größe sein. Er muss in einen Würfel mit 1,5 Metern Kantenlänge passen. Die Qualität der mit dem Zauber erschaffenen
    Gegenstände hängt von der Qualität des Rohmaterials ab. Mit diesem Zauber können weder Kreaturen noch magische Gegenstände
    erschaffen werden. Du kannst zudem keine Gegenstände wie Schmuck, Waffen, Glas oder Rüstung erschaffen, die ein hohes
    Maß an Können erfordern, es sei denn, du hast Übung im Umgang mit dem passenden Handwerkszeug.
- name: Verbannung
  schule: Bannzauber
  grad: 4. Grades
  klassen:
  - Hexenmeister
  - Kleriker
  - Magier
  - Paladin
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 9 Meter
  komponenten: V, G, M (ein Pentakel)
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: 'Eine Kreatur in Reichweite, die du sehen kannst, muss einen Charismarettungswurf bestehen, oder sie wird
    für die Wirkungsdauer auf eine harmlose Halbebene transportiert. Solange das Ziel sich dort befindet, ist es kampfunfähig.
    Wenn der Zauber endet, erscheint das Ziel in dem Bereich, aus dem es wegteleportiert wurde, oder im nächstgelegenen freien
    Bereich wieder, falls der ursprüngliche inzwischen besetzt ist. Falls das Ziel eine Aberration, ein celestisches Wesen,
    ein Elementar, ein Feenwesen oder ein Unhold ist, kehrt es nicht zurück, sofern der Zauber eine Minute lang wirkt. Stattdessen
    gelangt es an einen zufälligen Ort auf einer Ebene (nach Wahl Verwenden von Zauberplätzen höheren Grades: des SL), die
    mit seinem Kreaturentyp assoziiert ist. Für jeden Zauberplatzgrad über dem 4. kannst du auf eine weitere Kreatur zielen.'
- name: Verbergen
  schule: Verwandlungszauber
  grad: 7. Grades
  klassen:
  - Magier
  zeitaufwand: Aktion
  reichweite: Berührung
  komponenten: V, G, M (Edelsteinpulver im Wert von mindestens 5.000 GM, das der Zauber verbraucht)
  wirkungsdauer: Bis der Zauber gebannt wird
  beschreibung: 'Du verbirgst einen Gegenstand oder eine bereitwillige Kreatur auf magische Art, indem du das Ziel berührst.
    Für die Wirkungsdauer ist das Ziel unsichtbar und kann nicht Ziel von Erkenntniszaubern werden, von Magie aufgespürt oder
    magisch aus der Ferne betrachtet werden. Wenn das Ziel eine Kreatur ist, fällt es in einen scheintoten Zustand: Es ist
    bewusstlos, altert nicht und benötigt weder Nahrung noch Wasser noch Luft. Du kannst eine Bedingung festlegen, durch die
    der Zauber vorzeitig endet. Dabei hast du freie Wahl, solange die Bedingung im Abstand von bis zu 1,6 Kilometern um das
    Ziel eintritt oder sichtbar ist. Beispiele dafür wären „Nach 1.000 Jahren“ oder „Wenn die Tarraske erwacht“. Dieser Zauber
    endet auch dann, wenn das Ziel Schaden erleidet.'
- name: Verbündeter aus den Ebenen
  schule: Beschwörungszauber
  grad: 6. Grades
  klassen:
  - Kleriker
  zeitaufwand: 10 Minuten
  reichweite: 18 Meter
  komponenten: V, G
  wirkungsdauer: Unmittelbar
  beschreibung: Du erflehst den Beistand eines außerweltlichen Wesens. Dieses Wesen muss dir bekannt sein – eine Gottheit,
    ein Dämonenprinz oder ein anderes Wesen von kosmischer Macht. Es schickt ein ihm treu ergebenes celestisches Wesen, einen
    Elementar oder einen Unhold, um dir zu helfen. Diese Kreatur erscheint in einem freien Bereich in Reichweite. Kennst du
    den Namen einer bestimmten Kreatur, so kannst du ihn aussprechen, wenn du diesen Zauber wirkst, um diese Kreatur zu erbitten.
    Du könntest jedoch nach Wahl des SL trotzdem eine andere Kreatur erhalten. Wenn die Kreatur erscheint, ist sie nicht gezwungen,
    sich auf eine bestimmte Weise zu verhalten. Du kannst sie bitten, einen Dienst gegen Bezahlung auszuführen. Sie ist dazu
    jedoch nicht verpflichtet. Die Aufgabe kann einfach oder komplex sein, von „Fliege uns über den Abgrund!“ oder „Hilf uns
    im Kampf!“ bis zu „Spioniere unsere Feinde aus!“ oder „Beschütze uns, während wir in das Gewölbe vordringen!“. Du musst
    mit der Kreatur kommunizieren können, damit du um ihre Dienste feilschen kannst. Die Bezahlung kann auf verschiedene Arten
    erfolgen. Ein celestisches Wesen verlangt möglicherweise eine beträchtliche Spende von Gold oder magischen Gegenständen
    an einen verbündeten Tempel, während ein Unhold ein lebendiges Opfer oder einen Schatz erwartet. Manche Kreaturen erwarten
    für ihre Dienste, dass du im Gegenzug eine Mission für sie erfüllst. Eine Aufgabe, die in Minuten gemessen wird, erfordert
    eine Bezahlung von 100 GM pro Minute. Eine Aufgabe, die in Stunden gemessen wird, kostet 1.000 GM pro Stunde. Eine Aufgabe,
    die in Tagen gemessen wird (höchstens zehn Tage), erfordert 10.000 GM pro Tag. Der SL kann diese Bezahlung an die Umstände
    anpassen, unter denen du den Zauber wirkst. Steht die Aufgabe im Einklang mit dem Ethos der Kreatur, so kann die Bezahlung
    halbiert werden oder sogar entfallen. Ungefährliche Aufgaben erfordern meist nur die Hälfte der genannten Bezahlung, während
    besonders gefährliche Aufgaben eine größere Spende benötigen. Kreaturen nehmen selten Aufgaben an, die selbstmörderisch
    erscheinen. Wenn die Kreatur den Auftrag abgeschlossen hat oder die vereinbarte Dauer des Dienstes endet, erstattet die
    Kreatur dir Bericht, sofern möglich, und kehrt dann auf ihre Heimatebene zurück. Wenn du dich mit der Kreatur nicht auf
    einen Preis für ihren Dienst einigen kannst, kehrt sie sofort auf ihre Heimatebene zurück.
- name: Verderben
  schule: Verzauberungszauber
  grad: 1. Grades
  klassen:
  - Barde
  - Hexenmeister
  - Kleriker
  zeitaufwand: Aktion
  reichweite: 9 Meter
  komponenten: V, G, M (ein Tropfen Blut)
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: 'Bis zu drei Kreaturen deiner Wahl in Reichweite, die du sehen kannst, führen jeweils einen Charismarettungswurf
    aus. Wenn ein Ziel, dessen Rettungswurf misslingt, während der Wirkungsdauer einen Angriffs‑ oder Rettungswurf ausführt,
    muss es 1W4 von seinem Angriffs‑ oder Verwenden von Zauberplätzen höheren Grades: Rettungswurf abziehen. Für jeden Zauberplatzgrad
    über dem 1. kannst du auf eine weitere Kreatur zielen.'
- name: Vergrößern/Verkleinern
  schule: Verwandlungszauber
  grad: 2. Grades
  klassen:
  - Barde
  - Druide
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 9 Meter
  komponenten: V, G, M (eine Prise Eisenpulver)
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: 'Für die Wirkungsdauer vergrößert oder verkleinert der Zauber ein Ziel (Kreatur oder Gegenstand) in Reichweite,
    das du sehen kannst (ausgewählter Effekt siehe unten). Ein Gegenstand als Ziel darf nicht getragen oder gehalten werden.
    Wenn das Ziel eine nicht bereitwillige Kreatur ist, kann es einen Konstitutionsrettungswurf ausführen. Bei einem erfolgreichen
    Rettungswurf hat der Zauber keine Wirkung. Alles, was eine Zielkreatur trägt oder hält, verändert mit ihr die Größe. Lässt
    sie einen Gegenstand fallen, so nimmt dieser sofort seine normale Größe an. Wurfwaffen und Geschosse nehmen ihre normale
    Größe an, sobald sie ein Ziel Vergrößern: getroffen oder verfehlt haben. Die Größe des Ziels steigt um eine Kategorie,
    beispielsweise von Mittelgroß auf Groß. Das Ziel ist außerdem bei Stärkewürfen und Stärkerettungswürfen im Vorteil. Die
    Angriffe des Ziels mit seinen vergrößerten Waffen sowie seine waffenlosen Angriffe bewirken bei einem Treffer Verkleinern:
    zusätzlich 1W4 Schaden. Die Größe des Ziels sinkt um eine Kategorie, beispielsweise von Mittelgroß auf Klein. Das Ziel
    ist außerdem bei Stärkewürfen und Stärkerettungswürfen im Nachteil. Die Angriffe des Ziels mit seinen verkleinerten Waffen
    sowie seine waffenlosen Angriffe bewirken bei einem Treffer 1W4 Schaden weniger (der Schaden kann jedoch nicht unter 1
    verringert werden).'
- name: Verlangsamen
  schule: Verwandlungszauber
  grad: 3. Grades
  klassen:
  - Barde
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 36 Meter
  komponenten: V, G, M (ein Tropfen Melasse)
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: Du verlangsamst die Zeit um bis zu sechs Kreaturen deiner Wahl in einem Würfel mit zwölf Metern Kantenlänge
    in Reichweite. Jedes Ziel muss einen Weisheitsrettungswurf bestehen, oder es ist für die Wirkungsdauer von diesem Zauber
    betroffen. Die Bewegungsrate eines betroffenen Ziels wird halbiert, es erleidet einen Malus von −2 auf seine RK und auf
    Geschicklichkeitsrettungswürfe. Außerdem kann es keine Reaktionen ausführen. Es kann in seinem Zug eine Aktion oder eine
    Bonusaktion verwenden, jedoch nicht beides. Wenn es die Angriffsaktion ausführt, kann es nur einen Angriff ausführen.
    Wenn es einen Zauber mit Gestenkomponente wirkt, besteht eine Chance von 25 Prozent, dass der Zauber misslingt, weil das
    Ziel die Gesten zu langsam ausführt. Ein betroffenes Ziel wiederholt den Rettungswurf am Ende jedes seiner Züge. Bei einem
    Erfolg endet der Effekt.
- name: Verschonung der Sterbenden
  schule: Nekromantie
  grad: Zaubertrick
  klassen:
  - Druide
  - Kleriker
  zeitaufwand: Aktion
  reichweite: 4,5 Meter
  komponenten: V, G
  wirkungsdauer: Unmittelbar
  beschreibung: 'Wähle eine Kreatur in Reichweite aus, deren Trefferpunkte auf 0 gesunken sind, die jedoch noch Zaubertrick-Aufwertung:
    nicht tot ist. Die Kreatur wird stabil. Die Reichweite wird jeweils verdoppelt, wenn du die 5. (neun Meter), die 11. (18
    Meter) und die 17. (36 Meter) Stufe erreichst.'
- name: Verschwimmen
  schule: Illusionszauber
  grad: 2. Grades
  klassen:
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: Selbst
  komponenten: V
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: Dein Körper wird unscharf. Für die Wirkungsdauer sind Kreaturen bei Angriffswürfen gegen dich im Nachteil.
    Angreifer, die dich mit Blindsicht oder Wahrer Blick wahrnehmen, sind gegen diesen Effekt immun.
- name: Verständigung
  schule: Erkenntniszauber
  grad: 3. Grades
  klassen:
  - Barde
  - Kleriker
  - Magier
  zeitaufwand: Aktion
  reichweite: Unbegrenzt
  komponenten: V, G, M (ein Stück Kupferdraht)
  wirkungsdauer: Unmittelbar
  beschreibung: Du sendest eine kurze Botschaft von höchstens 25 Worten an eine Kreatur, der du begegnet bist oder die dir
    von jemandem beschrieben wurde, der ihr begegnet ist. Das Ziel hört die Botschaft in seinem Kopf, erkennt dich als Absender,
    sofern es dich kennt, und kann auf gleiche Weise sofort antworten. Der Zauber ermöglicht dem Ziel, die Bedeutung deiner
    Botschaft zu verstehen. Du kannst die Botschaft über beliebige Entfernungen und sogar auf andere Existenzebenen senden.
    Wenn sich das Ziel jedoch auf einer anderen Ebene befindet als du, besteht ein Risiko von fünf Prozent, dass die Botschaft
    nicht ankommt. Ist dies der Fall, so weißt du, dass sie nicht angekommen ist. Wenn eine Kreatur deine Botschaft erhalten
    hat, kann sie für die nächsten acht Stunden verhindern, dass du sie erneut mit diesem Zauber erreichst. Versuchst du in
    diesem Fall, ihr eine weitere Botschaft zu senden, so erfährst du, dass du blockiert wurdest, und der Zauber misslingt.
- name: Verstricken
  schule: Beschwörungszauber
  grad: 1. Grades
  klassen:
  - Druide
  - Waldläufer
  zeitaufwand: Aktion
  reichweite: 27 Meter
  komponenten: V, G
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: In einem quadratischen Bereich mit sechs Metern Kantenlänge in Reichweite wachsen greifende Pflanzen aus dem
    Boden. Diese Pflanzen verwandeln den Boden im Bereich für die Wirkungsdauer in schwieriges Gelände. Wenn der Zauber endet,
    verschwinden sie. Jede Kreatur außer dir, die sich in dem Bereich befindet, wenn du den Zauber wirkst, muss einen Stärkerettungswurf
    bestehen, oder sie ist festgesetzt, bis der Zauber endet. Eine festgesetzte Kreatur kann als Aktion einen Stärkewurf (Athletik)
    gegen deinen Zauberrettungswurf‑SG ausführen. Bei einem Erfolg befreit sie sich von den greifenden Pflanzen und ist nicht
    mehr von ihnen festgesetzt.
- name: Vertrauten finden
  schule: Beschwörungszauber
  grad: 1. Grades
  klassen:
  - Magier
  zeitaufwand: 1 Stunde oder Ritual
  reichweite: 3 Meter
  komponenten: V, G, M (brennender Weihrauch im Wert von mindestens 10 GM, den der Zauber verbraucht)
  wirkungsdauer: Unmittelbar
  beschreibung: 'Du erhältst die Dienste eines Vertrauten – eines EidechseEuleFalkeFledermausFroschKatze Geistes, der eine
    Tiergestalt deiner Wahl annimmt: OktopusRabeRatteSpinneWiesel , , , , , , , , , ,  oder ein anderes Tier mit einem Herausforderungsgrad
    von 0. Der Vertraute erscheint in einem freien Bereich in Reichweite. Er hat die Spielwerte der gewählten Gestalt (siehe
    „Monster“), ist jedoch tatsächlich ein celestisches Wesen, ein Feenwesen oder ein Unhold (nach deiner Wahl) und kein Tier.
    Dein Vertrauter Telepathische Verbindung: agiert unabhängig von dir, befolgt aber deine Befehle. Solange sich dein Vertrauter
    im Abstand von bis zu 30 Metern von dir befindet, kannst du telepathisch mit ihm kommunizieren. Zudem kannst du als Bonusaktion
    bis zum Beginn deines nächsten Zugs durch die Sinne des Vertrauten hören und sehen. Dabei kannst du auch etwaige Spezialsinne
    des Vertrauten nutzen. Wenn du einen Zauber mit Berührungsreichweite wirkst, kann dein Vertrauter die Berührung ausführen.
    Dazu muss er sich im Abstand von bis zu 30 Metern von dir befinden und die Berührung als Kampf: Reaktion ausführen, wenn
    du den Zauber wirkst. Der Vertraute ist mit dir und deinen Verbündeten verbündet. Er würfelt seine eigene Initiative aus
    und handelt in seinem eigenen Zug. Ein Vertrauter kann nicht angreifen, jedoch andere Aktionen normal ausführen. Verschwinden
    des Vertrauten: Sinken die Treffer‑ punkte des Vertrauten auf 0, so verschwindet er. Er erscheint wieder, wenn du den
    Zauber erneut wirkst. Als magische Aktion kannst du den Vertrauten vorübergehend verwerfen und in eine Taschendimension
    schicken. Alternativ kannst du ihn für immer verwerfen. Wenn du deinen Vertrauten vorübergehend verworfen hast, kannst
    du ihn als magische Aktion in einem freien Bereich im Abstand von bis zu neun Metern von dir wieder erscheinen lassen.
    Wann immer die Trefferpunkte des Vertrauten auf 0 sinken oder der Vertraute in einer Taschendimension verschwindet, bleibt
    alles, was er getragen oder gehalten hat, in seinem Nur ein Vertrauter: Bereich liegen. Du kannst nur jeweils einen Vertrauten
    haben. Wirkst du diesen Zauber, während du einen Vertrauten hast, so lässt du diesen stattdessen eine neue verfügbare
    Gestalt annehmen.'
- name: Verwandlung
  schule: Verwandlungszauber
  grad: 4. Grades
  klassen:
  - Barde
  - Druide
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V, G, M (Kokon einer Raupe)
  wirkungsdauer: Konzentration, bis zu 1 Stunde
  beschreibung: Du versuchst, eine Kreatur in Reichweite, die du sehen kannst, in ein Tier zu verwandeln. Das Ziel muss einen
    Weisheitsrettungswurf bestehen, oder es nimmt für die Wirkungsdauer eine Tiergestalt an. Dabei kann es sich um ein beliebiges
    Tier deiner Wahl handeln, dessen Herausforderungsgrad nicht höher als der des Ziels ist (wenn das Ziel keinen Herausforderungsgrad
    hat, verwende seine Stufe). Die Spielwerte des Ziels werden vom Wertekasten des Tieres ersetzt. Das Ziel behält jedoch
    Gesinnung, Persönlichkeit, Kreaturentyp, Trefferpunkte sowie Trefferpunktewürfel bei. Beispiele für Wertekästen von Tieren
    findest du im Abschnitt „Tiere“ unter „Monster“. Das Ziel erhält eine Anzahl von temporären Trefferpunkten, die der Anzahl
    von Trefferpunkten der Tiergestalt entspricht. Nach der Wirkungsdauer dieses Zaubers verbleibende temporäre Treffer‑ punkte
    gehen verloren. Der Zauber endet beim Ziel vorzeitig, wenn es keine temporären Trefferpunkte übrig hat. Das Ziel kann
    nur Aktionen ausführen, die in seiner neuen Gestalt anatomisch möglich sind. Es kann weder sprechen noch Zauber wirken.
    Die Ausrüstung des Ziels verschmilzt mit seiner neuen Gestalt. Die Kreatur kann die Ausrüstung nicht verwenden oder anderweitig
    nutzen.
- name: Verwirrung
  schule: Verzauberungszauber
  grad: 4. Grades
  klassen:
  - Barde
  - Druide
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 27 Meter
  komponenten: V, G, M (drei Nussschalen)
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: 'Jede Kreatur in einer Kugel mit einem Radius von drei Metern um einen Punkt deiner Wahl in Reichweite muss
    einen Weisheitsrettungswurf bestehen, oder sie kann weder Bonusaktionen noch Reaktionen ausführen und muss zu Beginn jedes
    ihrer Züge mit 1W10 würfeln, um anhand der nachstehenden Tabelle ihr Verhalten in diesem Zug 1W10Verhalten im Zug zu ermitteln.
    1Das Ziel führt keine Aktion aus und verwendet seine gesamte Bewegungsrate, um sich zu bewegen. Würfle die Richtung mit
    1W4 aus: 1: Norden, 2: Osten, 3: Süden, 4: Westen. 2–6Das Ziel bewegt sich nicht und führt keine Aktionen aus. 7–8Das
    Ziel bewegt sich nicht. Es führt die Angriffsaktion aus, um einen Nahkampfangriff gegen eine zufällige Kreatur in Reichweite
    auszuführen. Wenn sich keine Kreaturen in Reichweite befinden, führt das Ziel keine Aktionen aus. 9–10Das Ziel wählt sein
    Verhalten selbst aus. Ein betroffenes Ziel wiederholt den Rettungswurf am Ende jedes seiner Züge. Bei einem Erfolg endet
    Verwenden von Zauberplätzen höheren Grades: der Zauber bei diesem Ziel. Für jeden Zauberplatzgrad über dem 4. wird der
    Radius der Kugel um 1,5 Meter erhöht.'
- name: Verwünschung
  schule: Verzauberungszauber
  grad: 1. Grades
  klassen:
  - Hexenmeister
  zeitaufwand: Bonusaktion
  reichweite: 27 Meter
  komponenten: V, G, M (versteinertes Auge eines Molchs)
  wirkungsdauer: Konzentration, bis zu 1 Stunde
  beschreibung: 'Du verfluchst eine Kreatur in Reichweite, die du sehen kannst. Für die Wirkungsdauer fügst du dem Ziel, wann
    immer du es mit einem Angriffswurf triffst, zusätzlich 1W6 nekrotischen Schaden zu. Wähle außerdem ein Attribut aus, wenn
    du den Zauber wirkst. Das Ziel ist bei allen entsprechenden Attributswürfen im Nachteil. Wenn die Trefferpunkte des Ziels
    auf 0 sinken, bevor der Zauber endet, kannst du in deinen folgenden Zügen eine Bonusaktion ausführen, um eine andere Kreatur
    zu verfluchen. Verwenden von Zauberplätzen höheren Grades: Deine Konzentration kann länger andauern: bei einem Zauberplatz
    des 2. Grades bis zu vier Stunden, bei einem Zauberplatz des 3. und 4. Grades bis zu acht Stunden und bei einem Zauberplatz
    ab dem 5. Grad bis zu 24 Stunden.'
- name: Vollständige Genesung
  schule: Bannzauber
  grad: 5. Grades
  klassen:
  - Barde
  - Druide
  - Kleriker
  - Paladin
  - Waldläufer
  zeitaufwand: Aktion
  reichweite: Berührung
  komponenten: V, G, M (Diamantstaub im Wert von mindestens 100 GM, den der Zauber verbraucht)
  wirkungsdauer: Unmittelbar
  beschreibung: 'Du berührst eine Kreatur und hebst auf magische Art einen der folgenden Effekte bei ihr auf: • 1 Erschöpfungsstufe
    • Einen der Zustände Bezaubert oder Versteinert • Einen Fluch oder die Einstimmung des Ziels auf einen verfluchten magischen
    Gegenstand • Jegliche Verringerung eines der Attributswerte des Ziels • Jegliche Verringerung des Trefferpunkte‑ maximums
    des Ziels'
- name: Vorahnung
  schule: Erkenntniszauber
  grad: 2. Grades
  klassen:
  - Druide
  - Kleriker
  - Magier
  zeitaufwand: 1 Minute oder Ritual
  reichweite: Selbst
  komponenten: V, G, M (besonders markierte Stöcke, Knochen, Karten oder andere Weissagungsgegenstände im Wert von mindestens
    25 GM)
  wirkungsdauer: Unmittelbar
  beschreibung: Du erhältst ein Omen von einem außerweltlichen Wesen zum Ergebnis eines Vorhabens, das innerhalb der nächsten
    30 Minuten geplant ist. Der SL wählt Odams Oemnen aus der Tabelle „Omen“ aus. OmenErgebnis des Vorhabens WohlGut WeheSchlecht
    Wohl und WeheGut und schlecht GleichgültigWeder gut noch schlecht Der Zauber berücksichtigt keinerlei Umstände wie andere
    Zauber, die das Ergebnis ändern könnten. Wenn du den Zauber vor einer langen Rast häufiger als einmal wirkst, erhöht dies
    das Risiko, keine Antwort zu erhalten, mit jedem Wirken nach dem ersten um jeweils 25 Prozent.
- name: Voraussicht
  schule: Erkenntniszauber
  grad: 9. Grades
  klassen:
  - Barde
  - Druide
  - Hexenmeister
  - Magier
  zeitaufwand: 1 Minute
  reichweite: Berührung
  komponenten: V, G, M (eine Kolibrifeder)
  wirkungsdauer: 8 Stunden
  beschreibung: Du berührst eine bereitwillige Kreatur und verleihst ihr die eingeschränkte Fähigkeit, in die unmittelbare
    Zukunft zu blicken. Für die Wirkungsdauer ist das Ziel bei W20‑Prüfungen im Vorteil, und andere Kreaturen sind bei Angriffswürfen
    gegen das Ziel im Nachteil. Der Zauber endet vorzeitig, wenn du ihn erneut wirkst.
- name: Vorbestimmtes Trugbild
  schule: Illusionszauber
  grad: 6. Grades
  klassen:
  - Barde
  - Magier
  zeitaufwand: Aktion
  reichweite: 36 Meter
  komponenten: V, G, M (Jadestaub im Wert von mindestens 25 GM)
  wirkungsdauer: Bis der Zauber gebannt wird
  beschreibung: Du erschaffst die Illusion eines Gegenstands, einer Kreatur oder eines anderen sichtbaren Phänomens in Reichweite,
    die von einem bestimmten Auslöser aktiviert wird. Bis dahin ist die Illusion nicht wahrnehmbar. Sie darf nicht größer
    als ein Würfel mit neun Metern Kantenlänge sein. Beim Wirken des Zaubers bestimmst du, wie sich die Illusion verhält und
    welche Geräusche sie macht. Diese vorbestimmte Darbietung kann bis zu fünf Minuten andauern. Tritt der festgelegte Auslöser
    auf, so entsteht die Illusion und verhält sich auf die von dir beschriebene Weise. Sobald die Illusion ihre Darbietung
    beendet hat, verschwindet sie und ist zehn Minuten lang inaktiv. Danach kann sie erneut aktiviert werden. Der Auslöser
    kann beliebig allgemein oder detailliert sein. Er muss jedoch auf sichtbaren und hörbaren Phänomenen basieren, die im
    Abstand von bis zu neun Metern um den Bereich auftreten. Beispielsweise könntest du eine Illusion deiner selbst erschaffen,
    die andere davor warnt, eine Tür mit einer Falle zu öffnen. Physische Interaktionen mit dem Abbild enttarnen es als illusionär,
    da Dinge es einfach durchdringen können. Eine Kreatur, die das Abbild mit der Studieren‑Aktion untersucht, kann mit einem
    erfolgreichen Intelligenzwurf (Nachforschungen) gegen deinen Zauberrettungswurf‑SG erkennen, dass es sich um eine Illusion
    handelt. Erkennt eine Kreatur die Illusion als solche, so wird das Abbild für sie durchscheinend, und sämtliche Geräusche
    klingen für sie hohl.
- name: Wächter und Hüter
  schule: Bannzauber
  grad: 6. Grades
  klassen:
  - Barde
  - Magier
  zeitaufwand: 1 Stunde
  reichweite: Berührung
  komponenten: V, G, M (ein Silberstab im Wert von mindestens 10 GM)
  wirkungsdauer: 24 Stunden
  beschreibung: 'Du erschaffst einen Schutz, der einen Bereich von bis zu 225 Quadratmetern auf dem Boden abdeckt. Der geschützte
    Bereich kann bis zu sechs Meter hoch sein. Du kannst ihn als Quadrat mit 15 Metern Kantenlänge, als hundert aneinandergrenzende
    Quadrate mit 1,5 Metern Kantenlänge oder als 25 aneinandergrenzende Quadrate mit drei Metern Kantenlänge formen. Wenn
    du diesen Zauber wirkst, kannst du Individuen bestimmen, die von seinen Effekten nicht betroffen sind. Du kannst auch
    ein Kennwort festlegen, das den Sprecher gegen die Effekte immunisiert, wenn es im Abstand von bis zu 1,5 Metern vom geschützten
    Bereich ausgesprochen wird. Magie bannen Der Zauber erzeugt im geschützten Bereich die Wächter und Hüter unten genannten
    Effekte.  hat keinen Effekt auf  selbst, aber jeder der Wächter und folgenden Effekte kann gebannt werden. Werden Hüter
    alle vier Effekte gebannt, so endet . Wenn du den Zauber 365 Tage lang täglich auf denselben Bereich wirkst, bleibt er
    wirksam, Korridore: bis seine Effekte aufgelöst werden. Alle geschützten Korridore sind mit Nebel erfüllt und dadurch
    komplett verschleiert. Außerdem besteht an jeder Kreuzung oder Abzweigung eine Chance von 50 Prozent, dass eine Kreatur
    (außer dir selbst) glaubt, in die Treppen: entgegengesetzte Richtung zu gehen. Alle Treppen im geschützten Bereich Netz
    werden von der Decke bis zum Boden von Spinnen‑ netzen blockiert, so wie beim Zauber . Wenn Wächter und Hüter die Fäden
    zerstört werden, wachsen sie für die Wirkungsdauer von  innerhalb Türen: von zehn Minuten nach. Alle Türen im geschützten
    Bereich sind auf Arkanes Schloss magische Art verschlossen, wie durch den Zauber . Außerdem kannst du bis zu zehn Türen
    mit einer Illusion verbergen, sodass sie als Andere Zaubereffekte: normale Wand erscheinen. Platziere einen der Tanzende
    Lichter folgenden magischen Effekte im geschützten Bereich: • in vier Korridoren mit Wächter und Hüter einem einfachen
    Muster, das die Lichter für die Wirkungsdauer von Magischer Mund wiederholen Stinkende Wolke  Wächter • an zwei Orten
    und Hüter • an zwei Orten (solange wirkt, kehren die Dämpfe nach zehn Minuten zurück, wenn sie aufgelöst werden) Windstoß
    • in einem Korridor oder Raum (der Wind weht für die Wirkungsdauer Einflüsterung kontinuierlich) • in einem Würfel mit
    1,5 Metern Kantenlänge. Jede Kreatur, die den Würfel betritt, erhält die Einflüsterung mental'
- name: Waffe des Glaubens
  schule: Hervorrufungszauber
  grad: 2. Grades
  klassen:
  - Kleriker
  zeitaufwand: Bonusaktion
  reichweite: 18 Meter
  komponenten: V, G
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: 'Du erzeugst eine schwebende geisterhafte Kraft, die wie eine Waffe deiner Wahl aussieht und für die Wirkungsdauer
    bestehen bleibt. Die Kraft erscheint in einem Bereich deiner Wahl in Reichweite, und du kannst sofort einen Nahkampf‑Zauberangriff
    gegen eine Kreatur im Abstand von bis zu 1,5 Metern von der Kraft ausführen. Bei einem Treffer erleidet das Ziel Energieschaden
    in Höhe von 1W8 plus deinem Zauberwirken-Attributsmodifikator. In deinen folgenden Zügen kannst du die Waffe als Bonusaktion
    um bis zu sechs Meter bewegen und einen weiteren Angriff gegen eine Kreatur im Verwenden von Zauberplätzen höheren Grades:
    Abstand von bis zu 1,5 Metern von ihr ausführen. Für jeden Zauberplatzgrad über dem 2. wird der Schaden um 1W8 erhöht.'
- name: Wahre Auferstehung
  schule: Nekromantiezauber
  grad: 9. Grades
  klassen:
  - Druide
  - Kleriker
  zeitaufwand: 1 Stunde
  reichweite: Berührung
  komponenten: V, G, M (Diamanten im Wert von 25.000 GM, die der Zauber verbraucht)
  wirkungsdauer: Unmittelbar
  beschreibung: Du berührst eine tote Kreatur. Ihr Tod darf höchstens 200 Jahre zurückliegen, und sie darf nicht an Altersschwäche
    gestorben sein. Die Kreatur wird mit allen Trefferpunkten wiederbelebt. Dieser Zauber schließt alle Wunden, neutralisiert
    jedes Gift, heilt alle magischen Krankheiten und bannt sämtliche Flüche, unter denen die Kreatur zum Zeitpunkt ihres Todes
    gelitten hat. Beschädigte oder fehlende Organe und Gliedmaßen werden ersetzt. Wenn die Kreatur untot war, wird ihre nicht‑untote
    Gestalt wiederhergestellt. Der Zauber kann einen neuen Körper erschaffen, wenn der ursprüngliche Körper nicht mehr existiert.
    In diesem Fall musst du den Namen der Kreatur aussprechen. Die Kreatur erscheint dann in einem freien Bereich deiner Wahl
    im Abstand von bis zu drei Metern von dir.
- name: Wahrer Blick
  schule: Erkenntniszauber
  grad: 6. Grades
  klassen:
  - Barde
  - Hexenmeister
  - Kleriker
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: Berührung
  komponenten: V, G, M (Pilzpulver im Wert von mindestens 25 GM, das der Zauber verbraucht)
  wirkungsdauer: 1 Stunde
  beschreibung: Für die Wirkungsdauer hat eine bereitwillige Kreatur, die du berührst, Wahrer Blick mit einer Reichweite von
    36 Metern.
- name: Wahre Verwandlung
  schule: Verwandlungszauber
  grad: 9. Grades
  klassen:
  - Barde
  - Hexenmeister
  - Magier
  zeitaufwand: Aktion
  reichweite: 9 Meter
  komponenten: V, G, M (ein Tropfen Quecksilber, ein Stück Gummiarabikum und eine Rauchschwade)
  wirkungsdauer: Konzentration, bis zu 1 Stunde
  beschreibung: 'Wähle ein Ziel – eine Kreatur oder einen nichtmagi‑ schen Gegenstand – in Reichweite aus, das du sehen kannst.
    Eine Kreatur verwandelt sich in eine andere Kreatur oder einen nichtmagischen Gegenstand. Ein Gegenstand, der weder getragen
    noch gehalten werden darf, verwandelt sich in eine Kreatur. Die Verwandlung bleibt für die Wirkungsdauer bestehen, sofern
    das Ziel nicht stirbt oder zerstört wird. Wenn du allerdings deine Konzentration auf diesen Zauber für die gesamte Wirkungsdauer
    aufrechter‑ hältst, wirkt der Zauber, bis er gebannt wird. Eine nicht bereitwillige Kreatur kann einen Weisheitsrettungswurf
    ausführen. Bei einem Erfolg Kreatur in Kreatur: ist sie nicht von diesem Zauber betroffen. Verwandelst du eine Kreatur
    in eine andere Kreatur, so kannst du eine beliebige Gestalt wählen, deren Herausforderungsgrad nicht höher ist als der
    Herausforderungsgrad oder die Stufe des Ziels. Die Spielwerte des Ziels werden durch den Wertekasten der neuen Gestalt
    ersetzt. Das Ziel behält jedoch Trefferpunkte, Trefferpunktewürfel, Gesinnung und Persönlichkeit bei. Das Ziel erhält
    eine Anzahl von temporären Trefferpunkten, die der Anzahl von Trefferpunkten der neuen Gestalt entspricht. Nach der Wirkungsdauer
    dieses Zaubers verbleibende temporäre Trefferpunkte gehen verloren. Das Ziel kann nur Aktionen ausführen, die in seiner
    neuen Gestalt anatomisch möglich sind. Es kann weder sprechen noch Zauber wirken. Die Ausrüstung des Ziels verschmilzt
    mit seiner neuen Gestalt. Die Kreatur kann die Ausrüstung Gegenstand in Kreatur: nicht verwenden oder anderweitig nutzen.
    Du kannst einen Gegenstand in eine beliebige Kreatur verwandeln, sofern die Kreatur nicht größer als der Gegenstand ist
    und ihr Herausforderungsgrad höchstens 9 beträgt. Die Kreatur ist dir und deinen Verbündeten freundlich gesinnt. Im Kampf
    ist sie unmittelbar nach dir am Zug, und sie gehorcht deinen Befehlen. Wenn der Zauber länger als eine Stunde andauert,
    kannst du die Kreatur nicht mehr kontrollieren. Sie kann dir freundlich gesinnt bleiben, je nachdem, Kreatur in Gegenstand:
    wie du sie behandelt hast. Verwandelst du eine Kreatur in einen Gegenstand, so verwandelt sie sich mit allem, was sie
    trägt und in der Hand hält. Der Gegenstand darf nicht größer sein als die Kreatur. Die Spielwerte der Kreatur werden zu
    denen des Gegenstands. Wenn der Zauber endet und das Ziel wieder seine ursprüngliche Gestalt annimmt, besitzt es keine
    Erinnerungen an die Zeit, die es als Gegenstand verbracht hat.'
- name: Wände passieren
  schule: Verwandlungszauber
  grad: 5. Grades
  klassen:
  - Magier
  zeitaufwand: Aktion
  reichweite: 9 Meter
  komponenten: V, G, M (eine Prise Sesamkörner)
  wirkungsdauer: 1 Stunde
  beschreibung: 'An einem Punkt in Reichweite auf einer Oberfläche aus Holz, Gips oder Stein (beispielsweise eine Mauer, eine
    Decke oder ein Fußboden), den du sehen kannst, erscheint ein Durchgang, der für die Wirkungsdauer bestehen bleibt. Du
    bestimmst die Ausmaße des Durchgangs: höchstens 1,5 Meter breit, 2,4 Meter hoch und sechs Meter tief. Der Durchgang macht
    das umgebende Gebäude nicht instabil. Wenn der Durchgang verschwindet, gelangen sämtliche Kreaturen und Gegenstände, die
    sich noch darin befinden, in den freien Bereich, der der Oberfläche, auf die der Zauber gewirkt wurde, am nächsten liegt.'
- name: Wasser atmen
  schule: Verwandlungszauber
  grad: 3. Grades
  klassen:
  - Druide
  - Magier
  - Waldläufer
  - Zauberer
  zeitaufwand: Aktion oder Ritual
  reichweite: 9 Meter
  komponenten: V, G, M (ein kurzes Schilfrohr)
  wirkungsdauer: 24 Stunden
  beschreibung: Bis zu zehn bereitwillige Kreaturen deiner Wahl in Reichweite können für die Wirkungsdauer unter Wasser atmen.
    Betroffene Kreaturen verfügen weiterhin über ihre normale Atmung.
- name: Wasser erschaffen oder zerstören
  schule: Verwandlungszauber
  grad: 1. Grades
  klassen:
  - Druide
  - Kleriker
  zeitaufwand: Aktion
  reichweite: 9 Meter
  komponenten: V, G, M (eine Mischung aus Wasser und Sand)
  wirkungsdauer: Unmittelbar
  beschreibung: 'Wasser erschaffen: Du führst eine der folgenden Handlungen aus: Du erschaffst bis zu 40 Liter sauberes Wasser
    in einem offenen Behälter in Reichweite. Alternativ geht das Wasser als Regen in einem Würfel mit neun Metern Kantenlänge
    in Reichweite nieder und löscht dort offene Wasser zerstören: Flammen. Du zerstörst bis zu 40 Liter Wasser in einem offenen
    Behälter in Reichweite. Alternativ zerstörst du Nebel in einem Würfel mit Verwenden von Zauberplätzen höheren Grades:
    neun Metern Kantenlänge in Reichweite. Für jeden Zauberplatzgrad über dem 1. kannst du zusätzliche 40 Liter Wasser erschaffen
    oder zerstören oder die Kantenlänge des Würfels um 1,5 Meter erhöhen.'
- name: Wasser kontrollieren
  schule: Verwandlungszauber
  grad: 4. Grades
  klassen:
  - Druide
  - Kleriker
  - Magier
  zeitaufwand: Aktion
  reichweite: 90 Meter
  komponenten: V, G, M (eine Mischung aus Wasser und Staub)
  wirkungsdauer: Konzentration, bis zu 10 Minuten
  beschreibung: 'Für die Wirkungsdauer kontrollierst du jedes Gewässer in einem Bereich deiner Wahl, der einem Würfel mit
    bis zu 30 Metern Kantenlänge entspricht, und nutzt dabei einen der folgenden Effekte. Als magische Aktion in deinen folgenden
    Zügen kannst du den gleichen Effekt wiederholen oder einen anderen auswählen. Der Wasserspiegel bleibt erhöht, bis der
    Zauber endet oder du einen anderen Effekt auswählst. Wenn dieser Effekt eine Welle erzeugt, wiederholt sich diese zu Beginn
    deines nächsten Zugs, solange Fluss umlenken: der Flut‑Effekt anhält. Du bewirkst, dass sich fließendes Wasser im Bereich
    in eine Richtung deiner Wahl bewegt, selbst wenn es dafür über Hindernisse, an Wänden empor oder in andere unwahrscheinliche
    Richtungen strömen muss. Das Wasser im Bereich bewegt sich nach deinen Vorgaben. Sobald es jedoch den Bereich des Zaubers
    verlässt, fließt es wieder je nach Gelände. Das Wasser strömt in die Richtung deiner Wahl, bis der Zauber endet oder du
    einen anderen Effekt Flut: auswählst. Du lässt den Wasserspiegel aller stehenden Gewässer im Bereich um bis zu sechs Meter
    ansteigen. Wenn du einen Bereich in einem größeren Gewässer auswählst, erschaffst du stattdessen eine sechs Meter hohe
    Welle, die sich von einer Seite des Bereichs zum anderen bewegt und dann bricht. Alle Fahrzeuge von höchstens riesiger
    Größe im Weg der Welle werden mit ihr zur anderen Seite bewegt. Wenn ein solches Fahrzeug von der Welle getroffen wird,
    besteht eine Chance Wasser teilen: von 25 Prozent, dass es kentert. Du teilst das Wasser im Bereich und erschaffst einen
    Graben, der sich durch den Wirkungsbereich zieht. Das Wasser ragt auf beiden Seiten wie eine Mauer auf. Der Graben bleibt
    bestehen, bis der Zauber endet oder du einen anderen Effekt auswählst. Anschließend füllt das Wasser im Verlauf der nächsten
    Runde langsam den Graben, bis der normale Wasserspiegel Wasserstrudel: wiederhergestellt ist. Du erschaffst einen Wasserstrudel
    in der Mitte eines Bereichs von mindestens 15 mal 15 Metern und einer Tiefe von 7,5 Metern. Der Strudel bleibt bestehen,
    bis du einen anderen Effekt auswählst oder der Zauber endet. Er ist 7,5 Meter hoch, an der Basis 1,5 Meter breit und an
    der Spitze bis zu 15 Meter breit. Alle Kreaturen, die sich im Wasser im Abstand von bis zu 7,5 Metern um den Strudel befinden,
    werden drei Meter weit in seine Richtung gezogen. Wenn eine Kreatur in einem Zug erstmals in den Bereich des Strudels
    gelangt oder ihren Zug dort beendet, führt sie einen Stärkerettungswurf aus. Misslingt der Wurf, so erleidet die Kreatur
    2W8 Wuchtschaden. Bei einem erfolgreichen Rettungswurf erleidet die Kreatur halb so viel Schaden. Eine Kreatur kann nur
    dann vom Strudel wegschwimmen, wenn sie zunächst eine Aktion ausführt, um sich zu entfernen, und einen Stärkewurf (Athletik)
    gegen deinen Zauberrettungswurf‑SG besteht.'
- name: Wasserwandeln
  schule: Verwandlungszauber
  grad: 3. Grades
  klassen:
  - Druide
  - Kleriker
  - Waldläufer
  - Zauberer
  zeitaufwand: Aktion oder Ritual
  reichweite: 9 Meter
  komponenten: V, G, M (ein Stück Kork)
  wirkungsdauer: 1 Stunde
  beschreibung: Dieser Zauber verleiht die Fähigkeit, sich über flüssige Oberflächen zu bewegen, darunter Wasser, Säure, Schlamm,
    Schnee, Treibsand oder Lava, als handele es sich um ungefährlichen, festen Boden (Kreaturen, die sich über geschmolzene
    Lava bewegen, können jedoch trotzdem Hitzeschaden erleiden). Bis zu zehn bereitwillige Kreaturen deiner Wahl in Reichweite
    erhalten für die Wirkungsdauer diese Fähigkeit. Ein betroffenes Ziel muss eine Bonusaktion ausführen, um von der Oberfläche
    der Flüssigkeit in die Flüssigkeit zu gelangen und umgekehrt. Wenn das Ziel jedoch in den Bereich fällt, gelangt es automatisch
    durch die Oberfläche in die Flüssigkeit darunter.
- name: Weg finden
  schule: Erkenntniszauber
  grad: 6. Grades
  klassen:
  - Barde
  - Druide
  - Kleriker
  zeitaufwand: 1 Minute
  reichweite: Selbst
  komponenten: V, G, M (ein Satz Weissagungsgegenstände wie Karten oder Runen im Wert von mindestens 100 GM)
  wirkungsdauer: Konzentration, bis zu 1 Tag
  beschreibung: Du spürst auf magische Art den direktesten physischen Weg zu einem Ort, den du nennst. Der Ort muss dir bekannt
    sein. Der Zauber misslingt, wenn du ein Ziel auf einer anderen Existenzebene, ein bewegtes Ziel (beispielsweise eine mobile
    Festung) oder ein unspezifisches Ziel (beispiels- weise „Hort eines grünen Drachen“) nennst. Während der Wirkungsdauer
    weißt du, wie weit der Zielort entfernt ist und in welcher Richtung er liegt, sofern du dich auf derselben Existenzebene
    befindest. Wann immer du unterwegs eine Wahl zwischen verschiedenen Wegen hast, weißt du, welcher Weg der direkteste ist.
- name: Weihen
  schule: Bannzauber
  grad: 5. Grades
  klassen:
  - Kleriker
  zeitaufwand: 24 Stunden
  reichweite: Berührung
  komponenten: V, G, M (Weihrauch im Wert von mindestens 1.000 GM, den der Zauber verbraucht)
  wirkungsdauer: Bis der Zauber gebannt wird
  beschreibung: 'Du berührst einen Punkt und erfüllst den Bereich um ihn herum mit heiliger oder unheiliger Macht. Der Bereich
    kann einen Radius von bis zu 18 Metern Weihen haben. Wenn dazu ein Bereich gehört, der bereits unter dem Effekt von  steht,
    misslingt der Zauber. Geheiligter Schutz: Im betroffenen Bereich wirken folgende Effekte. Wähle beliebige der folgenden
    Kreaturentypen aus: Aberration, celestisches Wesen, Elementar, Feenwesen, Unhold oder Untoter. Kreaturen des ausgewählten
    Typs können den Bereich nicht willentlich betreten, und Kreaturen innerhalb des Bereichs, die von solchen Wesen besessen,
    bezaubert oder verängstigt sind, sind innerhalb des Bereichs nicht von ihnen besessen, Zusätzlicher Effekt: bezaubert
    oder verängstigt. Du bindest einen zusätzlichen Anfälligkeit: Effekt aus der folgenden Liste an den Bereich: Kreaturen
    der von dir ausgewählten Typen sind anfällig für eine Schadensart deiner Dunkelheit: Wahl, solange sie sich im Bereich
    aufhalten. Dunkelheit erfüllt den Bereich. Weder natürliches noch magisches Licht durch Zauber eines niedrigeren Grades
    als dem dieses Zaubers Extradimensionale Interferenz: kann den Bereich erhellen. Kreaturen der von dir ausgewählten Typen
    können nicht mittels Teleportation oder auf extradimensionale oder interplanare Art in den Bereich oder aus ihm Friedliche
    Ruhe: heraus gelangen. Leichen innerhalb des Bereichs Furcht: können nicht in Untote verwandelt werden. Kreaturen der
    von dir ausgewählten Typen sind verängstigt, solange sie sich im Bereich Mut: aufhalten. Kreaturen der von dir ausgewählten
    Typen können nicht verängstigt werden, solange sie sich Resistenz: im Bereich aufhalten. Kreaturen der von dir ausgewählten
    Typen sind resistent gegen eine Schadensart Stille: deiner Wahl, solange sie sich im Bereich aufhalten. Geräusche können
    weder in den Bereich Tageslicht: hinein‑ noch aus ihm herausdringen. Helles Licht erfüllt den Bereich. Magische Dunkelheit
    durch Zauber eines niedrigeren Grades als dem dieses Zaubers kann den Bereich Zungen: nicht verdunkeln. Kreaturen der
    von dir ausgewählten Typen können mit allen anderen Kreaturen im Bereich kommunizieren, auch wenn sie keine gemeinsame
    Sprache sprechen.'
- name: Weissagung
  schule: Erkenntniszauber
  grad: 4. Grades
  klassen:
  - Druide
  - Kleriker
  - Magier
  zeitaufwand: Aktion oder Ritual
  reichweite: Selbst
  komponenten: V, G, M (Weihrauch im Wert von mindestens 25 GM, den der Zauber verbraucht)
  wirkungsdauer: Unmittelbar
  beschreibung: Dieser Zauber bringt dich mit einem Gott oder dem Diener eines Gottes in Kontakt. Du stellst eine Frage zu
    einem bestimmten Ziel, einem Ereignis oder einer Aktivität der kommenden sieben Tage. Der SL antwortet wahrheitsgemäß
    in Form eines kurzen Satzes oder eines kryptischen Reims. Der Zauber berücksichtigt keinerlei Umstände, die das Ergebnis
    ändern könnten, beispielsweise das Wirken anderer Zauber. Wenn du den Zauber vor einer langen Rast häufiger als einmal
    wirkst, erhöht dies das Risiko, keine Antwort zu erhalten, mit jedem Wirken nach dem ersten um jeweils 25 Prozent.
- name: Wesen des Waldes beschwören
  schule: Beschwörungszauber
  grad: 4. Grades
  klassen:
  - Druide
  - Waldläufer
  zeitaufwand: Aktion
  reichweite: Selbst
  komponenten: V, G
  wirkungsdauer: Konzentration, bis zu 10 Minuten
  beschreibung: 'Du beschwörst Naturgeister, die dich für die Wirkungsdauer in einer Ausströmung von drei Metern umschwirren.
    Wann immer die Ausströmung in den Bereich einer Kreatur gelangt, die du sehen kannst, und wann immer eine Kreatur, die
    du sehen kannst, die Ausströmung betritt oder ihren Zug dort beendet, kannst du die Kreatur zu einem Weisheitsrettungswurf
    zwingen. Misslingt der Wurf, so erleidet die Kreatur 5W8 Energieschaden, anderenfalls die Hälfte. Eine Kreatur kann diesen
    Rettungswurf nur einmal pro Zug ausführen. Außerdem kannst du für die Wirkungsdauer des Zaubers die Rückzug‑Aktion als
    Bonusaktion Verwenden von Zauberplätzen höheren Grades: ausführen. Für jeden Zauberplatzgrad über dem 4. wird der Schaden
    um 1W8 erhöht.'
- name: Wetterkontrolle
  schule: Verwandlungszauber
  grad: 8. Grades
  klassen:
  - Druide
  - Kleriker
  - Magier
  zeitaufwand: 10 Minuten
  reichweite: Selbst
  komponenten: V, G, M (brennender Weihrauch)
  wirkungsdauer: Konzentration, bis zu 8 Stunden
  beschreibung: Für die Wirkungsdauer kontrollierst du das Wetter im Abstand von bis zu acht Kilometern. Du musst dich im
    Freien befinden, wenn du diesen Zauber wirkst. Der Zauber endet vorzeitig, wenn du nach drinnen gehst. Wenn du den Zauber
    wirkst, änderst du die aktuellen Wetterbedingungen, die vom SL bestimmt werden. Du kannst Niederschlag, Temperatur und
    Wind beeinflussen. Es dauert 1W4 mal zehn Minuten, bis die neuen Bedingungen in Kraft treten. Danach kannst du die Bedingungen
    erneut ändern. Wenn der Zauber endet, normalisiert sich das Wetter allmählich. Finde zum Ändern des Wetters eine aktuelle
    Wetter‑ bedingung in der folgenden Tabelle und ändere sie eine Stufe nach oben oder unten. Wenn du den Wind Nänideedresrt,s
    kcahnlangst du auch seine Richtung ändern. StufeBedingung 1Wolkenlos 2Leicht bewölkt 3Bewölkt oder Bodennebel 4Regen,
    Hagel oder Schnee 5Starkregen, Hagelsturm oder Schneesturm TemperaturWind StufeBedingungStufeBedingung 1Extrem heiß1Flaute
    2Heiß2Mäßiger Wind 3Warm3Starker Wind 4Kühl4Starke Böen 5Kalt5Sturm 6Eisig
- name: Widerstand
  schule: Banns
  grad: Zaubertrick
  klassen:
  - Druide
  - Kleriker
  zeitaufwand: Aktion
  reichweite: Berührung
  komponenten: V, G
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: 'Du berührst eine bereitwillige Kreatur und wählst eine Schadensart aus: Blitz, Feuer, Gift, Gleißend, Hieb,
    Kälte, Nekrotisch, Säure, Schall, Stich oder Wucht. Wenn die Kreatur während der Wirkungsdauer Schaden des ausgewählten
    Typs erleidet, verringert sie den erlittenen Gesamtschaden um 1W4. Eine Kreatur kann von diesem Zauber nur einmal pro
    Zug profitieren.'
- name: Wiederbeleben
  schule: Nekromantiezauber
  grad: 3. Grades
  klassen:
  - Druide
  - Kleriker
  - Paladin
  - Waldläufer
  zeitaufwand: Aktion
  reichweite: Berührung
  komponenten: V, G, M (ein Diamant im Wert von mindestens 300 GM, den der Zauber verbraucht)
  wirkungsdauer: Unmittelbar
  beschreibung: Du berührst eine Kreatur, die innerhalb der letzten Minute gestorben ist. Diese Kreatur wird mit 1 Trefferpunkt
    wiederbelebt. Dieser Zauber kann keine Kreaturen wiederbeleben, die an Altersschwäche gestorben sind, und stellt auch
    keine fehlenden Körperteile wieder her.
- name: Wiedergeburt
  schule: Nekromantiezauber
  grad: 5. Grades
  klassen:
  - Druide
  zeitaufwand: 1 Stunde
  reichweite: Berührung
  komponenten: V, G, M (seltene Öle im Wert von mindestens 1.000 GM, die der Zauber verbraucht)
  wirkungsdauer: Unmittelbar
  beschreibung: Du berührst einen toten Humanoiden oder seine Überreste. Sofern die Kreatur höchstens zehn Tage lang tot war,
    erschafft der Zauber einen neuen Körper für sie und ruft die Seele in diesen Körper. Würfle mit 1W10 und ermittle die
    Spezies des Körpers anhand der Tabelle unten, oder der SL w1äWh1lt0 einSep eazniedsere spielbare S1pWez1i0es Saupes.zies
    1Drachenblütiger6Halblingisch 2Elf7Mensch 3Erneut würfeln8Orkisch 4Gnom9Tiefling 5Goliath10Zwerg Die reinkarnierte Kreatur
    trifft alle Entscheidungen, welche die Beschreibung ihrer Spezies bietet, und erinnert sich an ihr voriges Leben. Sie
    behält die Fähigkeiten bei, die sie in der ursprünglichen Gestalt hatte, verliert jedoch die Merkmale der bisherigen Spezies
    und erhält die Merkmale der neuen.
- name: Windstoß
  schule: Hervorrufungszauber
  grad: 2. Grades
  klassen:
  - Druide
  - Magier
  - Waldläufer
  - Zauberer
  zeitaufwand: Aktion
  reichweite: Selbst
  komponenten: V, G, M (ein Hülsenfruchtsamen)
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: Für die Wirkungsdauer weht von dir ausgehend ein starker Wind in einer Linie mit 18 Metern Länge und drei
    Metern Breite in eine Richtung deiner Wahl. Jede Kreatur innerhalb der Linie muss einen Stärkerettungswurf bestehen, oder
    sie wird entlang der Linie 4,5 Meter weit von dir weggestoßen. Eine Kreatur, die ihren Zug innerhalb der Linie beendet,
    muss den Rettungswurf ebenfalls ausführen. Jede Kreatur innerhalb der Linie muss für jeden Meter, den sie sich auf dich
    zubewegt, zwei Meter ihrer Bewegungsrate verbrauchen. Der Windstoß zerstreut Gas und Dampf und löscht Kerzen und ähnliche
    ungeschützte Flammen in seinem Bereich. Geschützte Flammen wie die von Laternen flackern wild. Es besteht eine Chance
    von 50 Prozent, dass sie gelöscht werden. Für die Wirkungsdauer kannst du als Bonusaktion in deinen folgenden Zügen die
    Richtung ändern, in die der Wind weht.
- name: Windwall
  schule: Hervorrufungszauber
  grad: 3. Grades
  klassen:
  - Druide
  - Waldläufer
  zeitaufwand: Aktion
  reichweite: 36 Meter
  komponenten: V, G, M (ein Fächer und eine Feder)
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: An einem Punkt deiner Wahl in Reichweite erscheint eine Wand aus starkem Wind. Die Wand kann bis zu 15 Meter
    lang, 4,5 Meter hoch und 30 Zentimeter dick sein. Du kannst sie beliebig formen, solange sie einem ununterbrochenen Pfad
    auf dem Boden folgt. Die Wand bleibt für die Wirkungsdauer bestehen. Wenn die Wand erscheint, führt jede Kreatur in ihrem
    Bereich einen Stärkerettungswurf aus. Misslingt der Wurf, so erleidet die Kreatur 4W8 Wuchtschaden, anderenfalls die Hälfte.
    Der starke Wind hält Nebel, Rauch und andere Gase auf Abstand. Fliegende Kreaturen und Gegenstände von höchstens kleiner
    Größe können die Wand nicht durchdringen. Lose, leichte Materialien, die in die Wand gebracht werden, fliegen nach oben.
    Pfeile, Bolzen und andere gewöhnliche Geschosse, die auf Ziele hinter der Wand geschossen werden, werden nach oben abgelenkt
    und verfehlen ihr Ziel automatisch. Felsbrocken, die von Riesen oder Belagerungsmaschinen geschleudert werden, und ähnliche
    Geschosse sind hiervon nicht betroffen. Kreaturen in gasförmiger Gestalt können die Wand nicht passieren.
- name: Windwandeln
  schule: Verwandlungszauber
  grad: 6. Grades
  klassen:
  - Druide
  zeitaufwand: 1 Minute
  reichweite: 9 Meter
  komponenten: V, G, M (eine Kerze)
  wirkungsdauer: 8 Stunden
  beschreibung: Dieser Zauber verwandelt dich und bis zu zehn bereitwillige Kreaturen deiner Wahl in Reichweite für die Wirkungsdauer
    in gasförmige Gestalten, die als Wolkenschwaden erscheinen. In Wolkengestalt verfügt ein Ziel über eine Flugbewegungsrate
    von 90 Metern und kann schweben. Es ist gegen den Zustand Liegend immun und gegen Hieb‑, Stich‑ und Wuchtschaden resistent.
    Die einzigen Aktionen, die ein Ziel in dieser Gestalt ausführen kann, sind die Spurt‑Aktion oder eine magische Aktion,
    um die Rückverwandlung in seine normale Gestalt zu beginnen. Die Rückverwandlung dauert eine Minute, in der das Ziel betäubt
    ist. Bis der Zauber endet, kann das Ziel zur Wolkengestalt zurückkehren. Auch dies erfordert eine magische Aktion, gefolgt
    von einer einminütigen Verwandlung. Befindet sich ein Ziel in Wolkengestalt in der Luft, wenn der Zauber endet, so sinkt
    es eine Minute lang 18 Meter pro Runde hinab, bis es sicher landet. Wenn es nach einer Minute nicht landen kann, stürzt
    es die verbleibende Entfernung nach unten.
- name: Winzige Hütte
  schule: Hervorrufungszauber
  grad: 3. Grades
  klassen:
  - Barde
  - Magier
  zeitaufwand: 1 Minute oder Ritual
  reichweite: Selbst
  komponenten: V, G, M (eine Kristallperle)
  wirkungsdauer: 8 Stunden
  beschreibung: Um dich herum entsteht eine Ausströmung von drei Metern und bleibt für die Wirkungsdauer ortsfest. Der Zauber
    misslingt beim Wirken, wenn die Ausströmung nicht groß genug ist, um alle Kreaturen in ihrem Bereich vollständig aufzunehmen.
    Kreaturen und Gegenstände, die sich beim Wirken des Zaubers innerhalb der Ausströmung befinden, können sich frei darin
    bewegen oder bewegt werden. Andere Kreaturen und Gegenstände können sie nicht passieren. Zauber des höchstens 3. Grades
    können nicht durch die Aura hindurch gewirkt werden, und ihre Effekte können sich nicht bis in die Aura erstrecken. Die
    Atmosphäre innerhalb der Ausströmung ist unabhängig vom Wetter außerhalb angenehm und trocken. Für die Wirkungsdauer kannst
    du befehlen, dass innerhalb der Aura dämmriges Licht oder Dunkelheit herrschen soll (keine Aktion erforderlich). Die Ausströmung
    ist von außen undurchsichtig und erscheint in einer Farbe deiner Wahl. Von innen ist sie durchsichtig. Der Zauber endet
    vorzeitig, wenn du die Ausströmung verlässt oder den Zauber erneut wirkst.
- name: Wirrnis
  schule: Verzauberungszauber
  grad: 8. Grades
  klassen:
  - Barde
  - Druide
  - Hexenmeister
  - Magier
  zeitaufwand: Aktion
  reichweite: 45 Meter
  komponenten: V, G, M (ein Schlüsselring ohne Schlüssel)
  wirkungsdauer: Unmittelbar
  beschreibung: Du attackierst den Verstand einer Kreatur in Reichweite, die du sehen kannst. Das Ziel führt einen Intelligenzrettungswurf
    aus. Misslingt der Wurf, so erleidet das Ziel 10W12 psychischen Schaden und kann weder Zauber wirken noch die magische
    Aktion ausführen. Nach jeweils 30 Tagen wiederholt das Ziel den Rettungswurf. Bei HeilungVollständige Genesung einem Erfolg
    endet der Effekt. Der Effekt kann auch Wunsch durch die Zauber , oder  beendet werden. Bei einem erfolgreichen Rettungswurf
    erleidet das Ziel nur halb so viel Schaden.
- name: 'Wort der Macht: Betäubung'
  schule: Verzauberungszauber
  grad: 8. Grades
  klassen:
  - Barde
  - Hexenmeister
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V
  wirkungsdauer: Unmittelbar
  beschreibung: Du überwältigst den Verstand einer Kreatur in Reichweite, die du sehen kannst. Wenn das Ziel höchstens 150
    Trefferpunkte hat, wird es betäubt. Anderenfalls beträgt seine Bewegungsrate bis zum Beginn deines nächsten Zugs 0. Das
    betäubte Ziel führt am Ende jedes seiner Züge einen Konstitutionsrettungswurf aus. Bei einem Erfolg endet der Zustand
    bei ihm.
- name: 'Wort der Macht: Heilung'
  schule: Verzauberungszauber
  grad: 9. Grades
  klassen:
  - Barde
  - Kleriker
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V
  wirkungsdauer: Unmittelbar
  beschreibung: Du sprichst ein Wort der Macht, um eine Kreatur in Reichweite, die du sehen kannst, mit einer Welle heilender
    Energie zu umhüllen. Das Ziel erhält sämtliche Trefferpunkte zurück. Wenn die Kreatur betäubt, bezaubert, gelähmt, verängstigt
    oder vergiftet ist, endet dieser Zustand. Wenn die Kreatur den Zustand Liegend hat, kann sie ihre Reaktion verwenden,
    um aufzustehen.
- name: 'Wort der Macht: Tod'
  schule: Verzauberungszauber
  grad: 9. Grades
  klassen:
  - Barde
  - Hexenmeister
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V
  wirkungsdauer: Unmittelbar
  beschreibung: Du nötigst eine Kreatur in Reichweite, die du sehen kannst, zum Sterben. Wenn das Ziel maximal 100 Trefferpunkte
    hat, stirbt es. Anderenfalls erleidet es 12W12 psychischen Schaden.
- name: Wort des Rückrufs
  schule: Beschwörungszauber
  grad: 6. Grades
  klassen:
  - Kleriker
  zeitaufwand: Aktion
  reichweite: 1,5 Meter
  komponenten: V
  wirkungsdauer: Unmittelbar
  beschreibung: Dieser Zauber teleportiert dich und bis zu fünf bereitwillige Kreaturen im Abstand von bis zu 1,5 Metern von
    dir sofort zu einer zuvor festgelegten Zuflucht. Du und alle Kreaturen, die mit dir teleportiert werden, erscheint in
    einem freien Bereich, der dem von dir als Zuflucht bestimmten Ort am nächsten liegt (siehe unten). Wenn du diesen Zauber
    wirkst, ohne eine Zuflucht festgelegt zu haben, hat er keinen Effekt. Du musst einen Ort, beispielsweise einen Tempel,
    als Zuflucht benennen, um diesen Zauber dort zu wirken.
- name: Wunden heilen
  schule: Bannzauber
  grad: 1. Grades
  klassen:
  - Barde
  - Druide
  - Kleriker
  - Paladin
  - Waldläufer
  zeitaufwand: Aktion
  reichweite: Berührung
  komponenten: V, G
  wirkungsdauer: Unmittelbar
  beschreibung: 'Eine Kreatur, die du berührst, erhält eine Anzahl von Trefferpunkten in Höhe von 2W8 plus deinem Verwenden
    von Zauberplätzen höheren Grades: Zauberwirken-Attributsmodifikator zurück. Für jeden Zauberplatzgrad über dem 1. wird
    die Heilung um 2W8 Trefferpunkte erhöht.'
- name: Wunden verursachen
  schule: Nekromantiezauber
  grad: 1. Grades
  klassen:
  - Kleriker
  zeitaufwand: Aktion
  reichweite: Berührung
  komponenten: V, G
  wirkungsdauer: Unmittelbar
  beschreibung: 'Eine Kreatur, die du berührst, führt einen Konstitutionsrettungswurf aus. Misslingt der Wurf, so erleidet
    sie 2W10 nekrotischen Schaden, Verwenden von Zauberplätzen höheren Grades: anderenfalls die Hälfte. Für jeden Zauberplatzgrad
    über dem 1. wird der Schaden um 1W10 erhöht.'
- name: Wunsch
  schule: Beschwörungszauber
  grad: 9. Grades
  klassen:
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: Selbst
  komponenten: V
  wirkungsdauer: Unmittelbar
  beschreibung: 'Wunsch ist der mächtigste Zauber, den ein Sterblicher wirken kann. Durch einfaches Aussprechen kann die Realität
    selbst verändert werden. Die grundlegende Verwendung dieses Zaubers besteht darin, einen beliebigen anderen Zauber des
    höchstens 8. Grades zu kopieren. Auf diese Art musst du weder die Voraussetzungen erfüllen, um den Zauber zu wirken, noch
    teure Materialkomponenten bezahlen. Der Zauber tritt einfach in Kraft. Alternativ kannst du einen der folgenden Effekte
    Gegenstand erschaffen: (nach deiner Wahl) erzeugen: Du erschaffst einen nichtmagischen Gegenstand im Wert von bis zu 25.000
    GM. Dieser darf in keiner Abmessung größer als 90 Meter sein. Er erscheint in einem freien Sofortige Gesundheit: Bereich
    auf dem Boden, den du sehen kannst. Du selbst und bis zu zwanzig Kreaturen, die du sehen kannst, erhaltet all eure Trefferpunkte
    zurück. Du beendest zudem Vollständige Genesung alle auf euch wirkenden Effekte, wie unter dem Resistenz: Zauber  beschrieben.
    Du gewährst bis zu zehn Kreaturen, die du sehen kannst, Resistenz gegen eine Schadensart Immunität gegen Zauber: deiner
    Wahl. Diese Resistenz ist dauerhaft. Du verleihst bis zu zehn Kreaturen, die du sehen kannst, acht Stunden lang Immunität
    gegen einen einzelnen Zauber oder Sofortiges Lernen: magischen Effekt. Du ersetzt eines deiner Talente durch ein anderes
    Talent, das für dich in Frage kommt. Du verlierst alle Vorzüge des bisherigen Talents und erhältst die Vorzüge des neuen.
    Talente, die Voraussetzungen für andere Talente Würfelwurf wiederholen: oder Merkmale sind, kannst du nicht ersetzen.
    Du machst ein kurz zurückliegendes Ereignis ungeschehen, indem du eine Wiederholung eines beliebigen Würfelwurfs in der
    letzten Runde erzwingst (einschließlich deines letzten Zugs). Die Realität passt sich Wunsch an das neue Ergebnis an.
    Beispiel: Der Zauber könnte den misslungenen Rettungswurf eines Verbündeten oder den kritischen Treffer eines Gegners
    ungeschehen machen. Du kannst erzwingen, dass der neue Wurf im Vorteil oder im Nachteil ist. Zudem hast du die Wahl, ob
    das Realität umformen: ursprüngliche oder das neue Ergebnis gilt. Du könntest etwas wünschen, das nicht in den anderen
    Effekten enthalten ist. Beschreibe dazu dem SL deinen Wunsch so genau wie möglich. Der SL hat einigen Spielraum bei der
    Entscheidung, was in einem solchen Fall geschieht. Je größer der Wunsch, desto größer auch das Risiko, dass etwas schiefgeht.
    Der Zauber könnte schlicht misslingen, der gewünschte Effekt nur zum Teil erfüllt werden, oder du selbst könntest je nach
    Formulierung des Wunsches unvorhergesehene Nebenwirkungen erleiden. Wenn du dir beispiels‑ weise einen Bösewicht tot wünschst,
    könntest du in eine Zukunft katapultiert werden, in der er nicht mehr lebt – wodurch du praktisch aus dem Spiel entfernt
    wirst. Wünschst du dir einen legendären magischen Gegenstand oder ein Artefakt, so könntest du zum aktuellen Besitzer
    des Gegenstands teleportiert werden. Wenn dein Wunsch gewährt wird und Konsequenzen für eine ganze Gemeinschaft, Region
    oder Welt hat, ziehst du wahrscheinlich mächtige Gegner an. Wenn dein Wunsch Auswirkungen auf einen Gott hätte, könnten
    dessen Diener sofort eingreifen, um den Wunsch zu verhindern, oder sie könnten dich ermuntern, ihn auf eine bestimmte
    Art zu wirken. Wenn dein Wunsch das Multiversum zerstören Wunsch würde, misslingt er. Wirkst du , um einen anderen Effekt
    zu erzielen, als einen Zauber zu kopieren, so belastet dich das sehr. Jedes Mal, wenn du nach dieser Belastung einen Zauber
    wirkst, erleidest du 1W10 nekrotischen Schaden pro Zaubergrad. Dieser Effekt verschwindet nach einer langen Rast. Der
    Schaden kann weder verringert noch verhindert werden. Außerdem hast du 2W4 Tage lang einen Stärkewert von 3. In dieser
    Zeit verringerst du mit jedem Tag, an dem du dich ausruhst oder nur leichten Tätigkeiten nachgehst, die verbleibende Erholungszeit
    um zwei Tage. Nicht zuletzt besteht Wunsch ein Risiko von 33 Prozent, dass du den Zauber aufgrund dieser Belastung nie
    wieder wirken kannst.'
- name: Zeichen des Jägers
  schule: Erkenntniszauber
  grad: 1. Grades
  klassen:
  - Waldläufer
  zeitaufwand: Bonusaktion
  reichweite: 27 Meter
  komponenten: V
  wirkungsdauer: Konzentration, bis zu 1 Stunde
  beschreibung: 'Du markierst eine Kreatur in Reichweite, die du sehen kannst, auf magische Art als deine Beute. Für die Wirkungsdauer
    fügst du dem Ziel, wann immer du es mit einem Angriffswurf triffst, zusätzlich 1W6 Energieschaden zu. Außerdem bist du
    bei allen Weisheitswürfen (Überlebenskunst oder Wahrnehmung) im Vorteil, die du ausführst, um das Ziel zu finden. Wenn
    die Trefferpunkte des Ziels auf 0 sinken, bevor dieser Zauber endet, kannst du eine Bonusaktion ausführen, um das Zeichen
    auf eine andere Kreatur in Reichweite, die du sehen kannst, Verwenden von Zauberplätzen höheren Grades: zu übertragen.
    Deine Konzentration kann länger andauern: bei einem Zauberplatz des 3. und 4. Grades bis zu acht Stunden und bei einem
    Zauberplatz ab dem 5. Grad bis zu 24 Stunden.'
- name: Zeitstopp
  schule: Verwandlungszauber
  grad: 9. Grades
  klassen:
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: Selbst
  komponenten: V
  wirkungsdauer: Unmittelbar
  beschreibung: Du stoppst kurzzeitig für alle außer dir selbst den Fluss der Zeit. Für andere Kreaturen vergeht keine Zeit,
    während du 1W4+1 Züge hintereinander bekommst, in denen du wie gewohnt Aktionen ausführen und dich bewegen kannst. Dieser
    Zauber endet, wenn eine deiner Aktionen oder ein von dir erschaffener Effekt während dieser Zeitspanne eine Kreatur außer
    dir selbst oder einen Gegenstand beeinflusst, den jemand anders trägt oder hält. Zudem endet der Zauber, wenn du dich
    um mehr als 300 Meter von dem Ort entfernst, an dem du ihn gewirkt hast.
- name: Zerbersten
  schule: Hervorrufungszauber
  grad: 2. Grades
  klassen:
  - Barde
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V, G, M (ein Glimmersplitter)
  wirkungsdauer: Unmittelbar
  beschreibung: 'Von einem Punkt deiner Wahl in Reichweite geht ein lautes Geräusch aus. Jede Kreatur in einer Kugel mit einem
    Radius von drei Metern um den Punkt führt einen Konstitutionsrettungswurf aus. Misslingt der Wurf, so erleidet sie 3W8
    Schallschaden, anderenfalls die Hälfte. Konstrukte sind beim Rettungswurf im Nachteil. Nichtmagische Gegenstände im Bereich,
    die nicht getragen oder gehalten werden, erleiden Verwenden von Zauberplätzen höheren Grades: den gleichen Schaden. Für
    jeden Zauberplatzgrad über dem 2. wird der Schaden um 1W8 erhöht.'
- name: Zielsicherer Schlag
  schule: Erkenntnis
  grad: Zaubertrick
  klassen:
  - Barde
  - Hexenmeister
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: Selbst
  komponenten: G, M (eine Waffe, mit der du Übung hast, im Wert von mindestens 1 KM)
  wirkungsdauer: Unmittelbar
  beschreibung: 'Von einem Blitz magischer Einsicht geleitet, führst du einen Angriff mit der Waffe aus, die du zum Wirken
    des Zaubers verwendet hast. Der Zauber nutzt dein Attribut zum Zauberwirken für den Angriff und Schadenswürfe (statt Stärke
    oder Geschicklichkeit). Wenn der Angriff Schaden bewirkt, kann dies gleißender Schaden oder die normale Schadensart Zaubertrick-Aufwertung:
    der Waffe sein (nach deiner Wahl). Unabhängig davon, ob du gleißenden Schaden oder die normale Schadensart der Waffe bewirkst,
    bewirkt der Angriff zusätzlich gleißenden Schaden, wenn du die 5. (1W6), die 11. (2W6) und die 17. (3W6) Stufe erreichst.'
- name: Zone der Wahrheit
  schule: Verzauberungszauber
  grad: 2. Grades
  klassen:
  - Barde
  - Kleriker
  - Paladin
  zeitaufwand: Aktion
  reichweite: 18 Meter
  komponenten: V, G
  wirkungsdauer: 10 Minuten
  beschreibung: Du erschaffst in einer Kugel mit einem Radius von 4,5 Metern um einen Punkt in Reichweite eine magische Zone,
    die vor Täuschung schützt. Für die Wirkungsdauer führt jede Kreatur, die den Bereich des Zaubers in einem Zug erstmals
    betritt oder den Zug darin beginnt, einen Charismarettungswurf aus. Misslingt der Wurf, so kann die Kreatur innerhalb
    des Radius nicht lügen. Du weißt, ob eine Kreatur diesen Rettungswurf bestanden hat. Eine betroffene Kreatur ist sich
    des Zaubers bewusst und kann Antworten auf Fragen vermeiden, auf die sie sonst mit einer Lüge antworten würde. In diesem
    Fall kann sie ausweichend antworten, muss aber bei der Wahrheit bleiben.
- name: Zungen
  schule: Erkenntniszauber
  grad: 3. Grades
  klassen:
  - Barde
  - Hexenmeister
  - Kleriker
  - Magier
  - Zauberer
  zeitaufwand: Aktion
  reichweite: Berührung
  komponenten: V, M (eine MiniaturZikkurat)
  wirkungsdauer: 1 Stunde
  beschreibung: Dieser Zauber gewährt einer von dir berührten Kreatur die Fähigkeit, jede gesprochene Sprache oder Gebärdensprache
    zu verstehen, die sie hört oder sieht. Wenn das Ziel außerdem durch Sprache oder Gebärden kommuniziert, wird es von jeder
    Kreatur verstanden, die mindestens eine Sprache versteht und das Ziel hören oder sehen kann.
- name: Zutritt verwehren
  schule: Bannzauber
  grad: 6. Grades
  klassen:
  - Kleriker
  zeitaufwand: 10 Minuten oder Ritual
  reichweite: Berührung
  komponenten: V, G, M (Rubinstaub im Wert von mindestens 1.000 GM)
  wirkungsdauer: 1 Tag
  beschreibung: 'Du erschaffst einen Schutz gegen magische Reisen, der einen Bereich von bis zu 3.700 Quadratmetern mit einer
    Höhe von bis zu neun Metern über dem Boden abdeckt. Für die Wirkungsdauer können Tor sich Kreaturen weder in den Bereich
    teleportieren noch Portale wie durch den Zauber  verwenden, um in den Bereich zu gelangen. Der Zauber schützt den Bereich
    gegen Ebenenreisen und verhindert damit, dass Kreaturen aus der Astralebene, der Ebenenwechsel Ätherebene, der Feenwildnis,
    dem Schattensaum oder mit dem Zauber  in den Bereich gelangen. Außerdem fügt der Zauber Kreaturentypen, die du beim Wirken
    bestimmst, Schaden zu. Wähle mindestens einen der folgenden Kreaturentypen aus: Aberrationen, celestische Wesen, Feenwesen,
    Unholde und Untote. Wenn eine Kreatur eines ausgewählten Typs den Bereich des Zaubers in einem Zug erstmals betritt oder
    ihren Zug darin beendet, erleidet sie 5W10 gleißenden oder nekrotischen Schaden (nach deiner Wahl beim Wirken des Zaubers).
    Du kannst ein Kennwort festlegen, wenn du den Zauber wirkst. Spricht eine Kreatur das Kennwort aus, wenn sie den Bereich
    betritt, so erleidet sie durch den Zauber keinen Schaden. Zutritt verwehren Der Bereich des Zaubers kann sich nicht mit
    dem Zutritt verwehren Bereich eines anderen Zaubers überschneiden. Wenn du  30 Tage lang am selben Ort wirkst, bleibt
    der Effekt bestehen, bis er gebannt wird. Die Materialkomponenten werden beim letzten Wirken verbraucht.'
- name: Zwang
  schule: Verzauberungszauber
  grad: 4. Grades
  klassen:
  - Barde
  zeitaufwand: Aktion
  reichweite: 9 Meter
  komponenten: V, G
  wirkungsdauer: Konzentration, bis zu 1 Minute
  beschreibung: Jede Kreatur deiner Wahl in Reichweite, die du sehen kannst, muss einen Weisheitsrettungswurf bestehen, oder
    sie ist bezaubert, bis der Zauber endet. Für die Wirkungsdauer kannst du eine Bonusaktion ausführen, um eine Richtung
    zu bestimmen, die horizontal von dir verläuft. Jedes bezauberte Ziel muss in seinem nächsten Zug so viel seiner Bewegungsrate
    wie möglich verwenden, um sich in diese Richtung zu bewegen. Dabei nimmt es die sicherste Route. Nachdem das Ziel sich
    auf diese Art bewegt hat, wiederholt es seinen Rettungswurf. Bei einem Erfolg endet der Zauber bei ihm.
