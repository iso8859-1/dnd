id: schurke-raffinierter-schlag
type: class_feature
class: Schurke
lang: de
level: 5
name: Raffinierter Schlag
description: 'Du hast raffinierte Methoden entwickelt, deinen Hinterhältigen Angriff einzusetzen. Wenn du mit diesem Schaden
  bewirkst, kannst du einen der folgenden Effekte von Raffinierter Schlag hinzufügen. Jeder Effekt hat Würfelkosten in Form
  der Schadenswürfel für Hinterhältiger Angriff, auf die du verzichten musst, um den Effekt hinzuzufügen. Du musst diese Würfel
  vor dem Wurf entfernen, und der Effekt tritt auf, sobald der Schaden des Angriffs bewirkt wurde. Beispiel: Wenn du den Gift‑Effekt
  hinzufügst, entfernst du 1W6 von den Schadenswürfeln des Hinterhältigen Angriffs, bevor du würfelst. Wenn ein Effekt von
  Raffinierter Schlag einen Rettungswurf erfordert, entspricht der SG 8 plus deinem Geschicklichkeitsmodifikator plus deinem
  Fällen (Kosten: 1W6): Übungsbonus. Wenn das Ziel von höchstens großer Größe ist, muss es einen Geschicklichkeitsrettungswurf
  bestehen, oder es Gift (Kosten: 1W6): wird umgestoßen. Du fügst deinem Schlag ein Toxin hinzu, welches das Ziel zu einem
  Konstitutionsrettungswurf zwingt. Misslingt der Wurf, so ist die Kreatur eine Minute lang vergiftet. Das vergiftete Ziel
  wiederholt den Rettungswurf am Ende jedes seiner Züge. Bei einem Erfolg endet der Effekt. Du musst eine Giftmischerausrüstung
  bei dir Zurückziehen (Kosten: 1W6): haben, um diesen Effekt zu bewirken. Sofort nach dem Angriff nutzt du bis zur Hälfte
  deiner Bewegungsrate, ohne Gelegenheitsangriffe zu provozieren.'
source_book: SRD 5.2.1
