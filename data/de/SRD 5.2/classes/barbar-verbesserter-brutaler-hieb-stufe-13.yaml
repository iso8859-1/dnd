type: class_feature
class: Barbar
lang: de
level: 13
name: Verbesserter Brutaler Hieb
description: 'Du hast neue wilde Angriffsmethoden verfeinert. Nun stehen folgende Effekte des Brutalen Hiebs Wankendmachender
  Hieb: zur Auswahl: Das Ziel ist bei seinem nächsten Rettungswurf im Nachteil und kann bis zum Beginn deines nächsten Zugs
  keine Gelegenheitsangriffe ausführen. Entzweiender Hieb: Vor Beginn deines nächsten Zugs erhält der nächste Angriffswurf,
  den eine andere Kreatur gegen das Ziel ausführt, einen Bonus von +5. Ein Angriffswurf kann nur jeweils einen Bonus durch
  Entzweiender Hieb erhalten.'
source_book: SRD 5.2.1
