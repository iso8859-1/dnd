id: zauberer-intuitive-zauberei
type: class_feature
class: Zauberer
lang: de
level: 1
name: Intuitive Zauberei (Zauberer)
description: 'Ein Ereignis in deiner Vergangenheit hat sein unauslöschliches Zeichen hinterlassen und dich mit schwelender
  Magie erfüllt. Als Bonusaktion kannst du diese Magie eine Minute lang entfesseln. Während dieser Dauer erhältst du die folgenden
  Vorzüge: • Der Zauberrettungswurf-SG deiner Zaubererzauber wird um 1 erhöht. • Bei den Angriffswürfen der Zaubererzauber,
  die du wirkst, bist du im Vorteil. Du kannst dieses Merkmal zweimal anwenden und erhältst alle verbrauchten Anwendungen
  nach einer langen Rast zurück.'
source_book: SRD 5.2.1
