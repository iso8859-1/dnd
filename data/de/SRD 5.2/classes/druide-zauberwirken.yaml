id: druide-zauberwirken
type: class_feature
class: Druide
lang: de
level: 1
name: Zauberwirken (Druide)
description: 'Du hast gelernt, Zauber zu wirken, indem du die mystischen Kräfte der Natur studiert hast. Die Regeln zum Zauberwirken
  findest du unter „Zauber“. Folgende Informationen erklären, wie du diese Regeln mit den Druidenzaubern verwendest, die in
  der Zauberliste des Druiden weiter hinten Zaubertricks: in dieser Klassenbeschreibung aufgeführt sind. Druiden- Du beherrschst
  zwei Zaubertricks kunst Flammen erzeugen deiner Wahl aus der Zauberliste des Druiden. und werden empfohlen. Wann immer du
  eine Druidenstufe erhältst, kannst du einen deiner Zaubertricks mit einem anderen Zaubertrick deiner Wahl aus der Zauberliste
  des Druiden ersetzen. Wenn du die 4. und 10. Druidenstufe erreichst, erlernst du einen weiteren Zaubertrick deiner Wahl
  aus der Zauberliste des Druiden, wie in der Spalte „Zaubertricks“ der Tabelle „Druidenmerkmale“ Zauberplätze: dargestellt.
  Die Tabelle „Druidenmerkmale“ zeigt, wie viele Zauberplätze dir zum Wirken deiner Zauber ab dem 1. Grad zur Verfügung stehen.
  Du erhältst alle verbrauchten Zauberplätze nach einer langen Rast zurück. Vorbereitete Zauber ab dem 1. Grad: Du bereitest
  die Liste der Zauber ab dem 1. Grad vor, die dir mit diesem Merkmal zur Verfügung Donnerwoge stehen. Wähle zu Beginn vier
  Zauber des 1. Grades Feenfeuer Tierfreundschaft Wunden heilen aus der Zauberliste des Druiden aus. , , und werden empfohlen.
  Die Anzahl der Zauber auf deiner Liste erhöht sich, wenn du weitere Druidenstufen erhältst, wie in der Spalte „Vorbereitete
  Zauber“ der Tabelle „Druidenmerkmale“ dargestellt. Wann immer sich diese Anzahl erhöht, wählst du zusätzliche Zauber aus
  der Zauberliste des Druiden aus, bis die Anzahl von Zaubern auf deiner Liste der Anzahl entspricht, die in der Tabelle aufgeführt
  ist. Der Grad der ausgewählten Zauber muss dem der verfügbaren Zauberplätze entsprechen. Beispiel: Wenn du ein Druide der
  3. Stufe bist, kann deine Liste vorbereiteter Zauber sechs Zauber des 1. und 2. Grades in beliebiger Kombination enthalten.
  Wenn ein anderes Druidenmerkmal dir Zauber gibt, die du stets vorbereitet hast, zählen diese Zauber nicht bei der Anzahl
  von Zaubern, die du mit diesem Merkmal vorbereiten kannst. Ansonsten zählen diese Zauber jedoch als Druidenzauber für dich.
  Deine vorbereiteten Zauber ändern: Wann immer du eine lange Rast beendest, kannst du deine Liste vorbereiteter Zauber ändern
  und beliebige Zauber von der Liste mit anderen Druidenzaubern Attribut zum Zauberwirken: ersetzen, für die du Zauberplätze
  hast. Dein Attribut zum Zauberfokus: Wirken der Druidenzauber ist Weisheit. Du kannst einen Druidischen Fokus als Zauberfokus
  für deine Druidenzauber verwenden.'
source_book: SRD 5.2.1
