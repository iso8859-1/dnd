id: paladin-zauberwirken
type: class_feature
class: Paladin
lang: de
level: 1
name: Zauberwirken (Paladin)
description: 'Du hast gelernt, durch Gebete und Meditation Zauber zu wirken. Die Regeln zum Zauberwirken findest du unter
  „Zauber“. Folgende Informationen erklären, wie du diese Regeln mit den Paladin- zaubern verwendest, die in der Zauberliste
  des Paladins weiter hinten in dieser Klassenbeschrei- Zauberplätze: bung aufgeführt sind. Die Tabelle „Paladinmerkmale“
  zeigt, wie viele Zauberplätze dir zum Wirken deiner Zauber ab dem 1. Grad zur Verfügung stehen. Du erhältst alle verbrauchten
  Zauberplätze nach einer langen Rast zurück. Vorbereitete Zauber ab dem 1. Grad: Du bereitest die Liste der Zauber ab dem
  1. Grad vor, die dir mit diesem Merkmal zur Verfügung stehen. Wähle zu Heldenmut Sengendes Niederstrecken Beginn zwei Paladinzauber
  des 1. Grades aus. und werden empfohlen. Die Anzahl der Zauber auf deiner Liste erhöht sich, wenn du weitere Paladinstufen
  erhältst, wie in der Spalte „Vorbereitete Zauber“ der Tabelle „Paladinmerkmale“ dargestellt. Wann immer sich diese Anzahl
  erhöht, wählst du zusätzliche Paladin- zauber aus, bis die Anzahl von Zaubern auf deiner Liste der Anzahl in der Tabelle
  „Paladinmerkmale“ entspricht. Der Grad der ausgewählten Zauber muss dem der verfügbaren Zauberplätze entsprechen. Beispiel:
  Wenn du ein Paladin der 5. Stufe bist, kann deine Liste vorbereiteter Zauber sechs Paladinzauber des 1. und 2. Grades in
  beliebiger Kombination enthalten. Wenn ein anderes Paladinmerkmal dir Zauber gibt, die du stets vorbereitet hast, zählen
  diese Zauber nicht bei der Anzahl von Zaubern, die du mit diesem Merkmal vorbereiten kannst. Ansonsten zählen Deine vorbereiteten
  Zauber ändern: diese Zauber jedoch als Paladinzauber für dich. Wann immer du eine lange Rast beendest, kannst du einen der
  Zauber auf deiner Liste durch einen anderen Paladinzauber ersetzen, für den du Zauberplätze Attribut zum Zauberwirken: hast.
  Dein Attribut zum Zauberfokus: Wirken der Paladinzauber ist Charisma. Du kannst ein heiliges Symbol als Zauberfokus für
  deine Paladinzauber verwenden.'
source_book: SRD 5.2.1
