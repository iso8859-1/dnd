id: waldlaufer-zauberwirken
type: class_feature
class: Waldläufer
lang: de
level: 1
name: Zauberwirken (Waldläufer)
description: 'Du hast gelernt, die magische Essenz der Natur zu kanalisieren, um Zauber zu wirken. Die Regeln zum Zauberwirken
  findest du unter „Zauber“. Folgende Informationen erklären, wie du diese Regeln mit den Waldläuferzaubern verwendest, die
  in der Zauberliste des Waldläufers weiter hinten in dieser Zauberplätze: Klassenbeschreibung aufgeführt sind. Die Tabelle
  „Waldläufermerkmale“ zeigt, wie viele Zauberplätze dir zum Wirken deiner Zauber ab dem 1. Grad zur Verfügung stehen. Du
  erhältst alle verbrauchten Zauberplätze nach Vorbereitete Zauber ab dem 1. Grad: einer langen Rast zurück. Du bereitest
  die Liste der Zauber ab dem 1. Grad vor, die dir mit diesem Merkmal zur Verfügung stehen. Wähle zu Fesselnder Schlag Wunden
  heilen Beginn zwei Waldläuferzauber des 1. Grades aus. und werden empfohlen. Die Anzahl der Zauber auf deiner Liste erhöht
  sich, wenn du weitere Waldläuferstufen erhältst, wie in der Spalte „Vorbereitete Zauber“ der Tabelle „Waldläufermerkmale“
  dargestellt. Wann immer sich diese Anzahl erhöht, wählst du zusätzliche Waldläuferzauber aus, bis die Anzahl von Zaubern
  auf deiner Liste der Anzahl in der Tabelle „Waldläufer‑ merkmale“ entspricht. Der Grad der ausgewählten Zauber muss dem
  der verfügbaren Zauberplätze entsprechen. Beispiel: Wenn du ein Waldläufer der 5. Stufe bist, kann deine Liste vorbereiteter
  Zauber sechs Waldläuferzauber des 1. und 2. Grades in beliebiger Kombination enthalten. Wenn ein anderes Waldläufermerkmal
  dir Zauber gibt, die du stets vorbereitet hast, zählen diese Zauber nicht bei der Anzahl von Zaubern, die du mit diesem
  Merkmal vorbereiten kannst. Ansonsten zählen Deine vorbereiteten Zauber ändern: diese Zauber jedoch als Waldläuferzauber
  für dich. Wann immer du eine lange Rast beendest, kannst du einen der Zauber auf deiner Liste durch einen anderen Waldläuferzauber
  ersetzen, für den du Zauber‑ Attribut zum Zauberwirken: plätze hast. Dein Attribut zum Zauberfokus: Wirken der Waldläuferzauber
  ist Weisheit. Du kannst einen Druidischen Fokus als Zauberfokus für deine Waldläuferzauber verwenden.'
source_book: SRD 5.2.1
