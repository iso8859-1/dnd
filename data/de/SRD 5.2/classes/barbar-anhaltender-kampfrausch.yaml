id: barbar-anhaltender-kampfrausch
type: class_feature
class: Barbar
lang: de
level: 15
name: Anhaltender Kampfrausch
description: Wenn du die Initiative auswürfelst, kannst du alle verbrauchten Anwendungen von Kampfrausch zurückerhalten. Gelingt
  dies, so ist es erst nach einer langen Rast erneut möglich. Außerdem ist dein Kampfrausch so wild, dass er nun zehn Minuten
  lang erhalten bleibt, ohne dass du ihn zwischen den Runden verlängern musst. Deine Kampfrausch endet vorzeitig, wenn du
  bewusstlos (nicht nur kampfunfähig) wirst oder schwere Rüstung anlegst.
source_book: SRD 5.2.1
