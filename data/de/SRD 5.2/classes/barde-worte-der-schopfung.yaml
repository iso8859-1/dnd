description: 'Du hast zwei der Worte der Schöpfung gemeistert: Wort der Macht: Heilung Wort der Macht: die Worte von Leben
  und Tod. Daher hast du die Tod Zauber und stets vorbereitet. Wenn du einen der Zauber wirkst, kannst du damit auf eine zweite
  Kreatur zielen, wenn diese sich im Abstand von bis zu Autoritätspersonen lustig machen.'
