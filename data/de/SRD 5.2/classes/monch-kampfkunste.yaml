id: monch-kampfkunste
type: class_feature
class: Mönch
lang: de
level: 1
name: Kampfkünste
description: 'Deine Vertrautheit mit Kampfkünsten lässt dich folgende Kampfstile mit waffenlosen Angriffen sowie mit Mönchswaffen
  beherrschen: • Einfache Nahkampfwaffen • Nahkampf‑Kriegswaffen mit der Eigenschaft Leicht Du erhältst folgende Vorzüge,
  wenn du unbewaffnet bist oder nur Mönchswaffen verwendest und weder Waffenloser Bonusangriff: Rüstung noch Schild trägst:
  Du kannst als Kampfkünste-Würfel: Bonusaktion einen waffenlosen Angriff ausführen. Bei waffenlosen Angriffen oder im Kampf
  mit Mönchswaffen kannst du mit 1W6 statt mit dem normalen Schadenswürfel würfeln. Dieser Würfel verändert sich auf höheren
  Mönchsstufen, wie in der Spalte „Kampfkünste“ Geschickte Angriffe: der Tabelle „Mönchsmerkmale“ aufgeführt. Du kannst für
  deine Angriffs‑ und Schadenswürfe mit waffenlosen Angriffen oder Mönchswaffen deinen Geschicklichkeitsmodifikator statt
  des Stärkemodifikators verwenden. Außerdem kannst du, wenn du die Packen‑ oder die Stoßen‑Option deines waffenlosen Angriffs
  verwendest, deinen Geschicklichkeitsmodifikator statt des Stärkemodifikators verwenden, um den Rettungswurf‑SG zu bestimmen.'
source_book: SRD 5.2.1
