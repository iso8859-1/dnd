id: druide-druiden-unterklasse
type: class_feature
class: Druide
lang: de
level: 3
name: Druiden-Unterklasse (Druide)
description: Du erhältst eine Druiden-Unterklasse deiner Wahl. Die Unterklasse Zirkel des Landes wird nach der Beschreibung
  dieser Klasse erläutert. Unterklassen sind Spezialisierungen, die dir auf bestimmten Druidenstufen Merkmale gewähren. Du
  erhältst für den Rest deiner Laufbahn alle Merkmale deiner Unterklasse, die zu deiner aktuellen Druidenstufe oder den niedrigeren
  Stufen gehören.
source_book: SRD 5.2.1
