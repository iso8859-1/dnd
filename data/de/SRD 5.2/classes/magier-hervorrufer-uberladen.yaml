id: magier-hervorrufer-uberladen
type: class_feature
class: Magier
lang: de
level: 14
name: Überladen (Hervorrufer)
description: Du kannst die Macht deiner Zauber erhöhen. Wenn du einen Magierzauber mit einem Zauberplatz des 1. bis 5. Grades
  wirkst und der Zauber Schaden bewirkt, kannst du mit diesem Zauber in dem Zug, in dem du ihn wirkst, maximalen Schaden bewirken.
  Beim ersten Mal hat dies keine nachteiligen Effekte für dich. Wenn du dieses Merkmal jedoch vor Ende einer langen Rast erneut
  einsetzt, erleidest du sofort danach 2W12 nekrotischen Schaden pro Zauberplatzgrad. Dieser Schaden ignoriert Resistenzen
  und Immunitäten. Wann immer du dieses Merkmal vor Ende einer langen Rast erneut verwendest, erhöht sich der nekrotische
  Schaden um weitere 1W12 pro Zaubergrad. aufgeführt.
source_book: SRD 5.2.1
subclass: Hervorrufer
