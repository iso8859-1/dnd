id: waldlaufer-kampfstil
type: class_feature
class: Waldläufer
lang: de
level: 2
name: Kampfstil
description: 'Du erhältst ein Kampfstil‑Talent deiner Wahl (siehe „Talente“). Anstatt eins dieser Talente auszuwählen, Druidischer
  Krieger: kannst du dich auch für die Option unten entscheiden. Du erlernst zwei Druidenzaubertricks deiner Wahl (siehe Liste
  der Göttliche Führung Sternenfunke Druidenzauber im Abschnitt zur Druidenklasse). und werden empfohlen. Die ausgewählten
  Zaubertricks zählen für dich als Waldläuferzauber, und dein Attribut zum Wirken dieser Zauber ist Weisheit. Wann immer du
  eine Waldläuferstufe erhältst, kannst du einen dieser Zaubertricks durch einen anderen Waldläuferzaubertrick ersetzen.'
source_book: SRD 5.2.1
