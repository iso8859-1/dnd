class: Barde
lang: de
level: 3
name: Barden-Unterklasse
description: Du erhältst eine Barden‑Unterklasse deiner Wahl. Die Unterklasse Schule des Wissens wird nach der Beschreibung
  dieser Klasse erläutert. Unterklassen sind Spezialisierungen, die dir auf bestimmten Bardenstufen Merkmale gewähren. Du
  erhältst für den Rest deiner Laufbahn alle Merkmale deiner Unterklasse, die zu deiner aktuellen Bardenstufe oder den niedrigeren
  Stufen gehören.
source_book: SRD 5.2.1
