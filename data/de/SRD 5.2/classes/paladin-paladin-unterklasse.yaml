id: paladin-paladin-unterklasse
type: class_feature
class: Paladin
lang: de
level: 3
name: Paladin-Unterklasse (Paladin)
description: Du erhältst eine Paladin‑Unterklasse deiner Wahl. Die Unterklasse Schwur der Hingabe wird nach der Beschreibung
  dieser Klasse erläutert. Unterklassen sind Spezialisierungen, die dir auf bestimmten Paladinstufen Merkmale gewähren. Du
  erhältst für den Rest deiner Laufbahn alle Merkmale deiner Unterklasse, die zu deiner aktuellen Paladinstufe oder den niedrigeren
  Stufen gehören.
source_book: SRD 5.2.1
