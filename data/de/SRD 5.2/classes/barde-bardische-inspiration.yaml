id: barde-bardische-inspiration
type: class_feature
class: Barde
lang: de
level: 1
name: Bardische Inspiration (Barde)
description: 'Du kannst andere durch Worte, Musik oder Tänze übernatürlich stark inspirieren. Diese Inspiration wird durch
  einen Bardische-Inspiration-Würfel (W6) Bardische Inspiration verwenden: repräsentiert. Du kannst als Bonusaktion eine andere
  Kreatur im Abstand von bis zu 18 Metern von dir inspirieren, die dich hören oder sehen kann. Diese Kreatur erhält einen
  deiner Bardische-Inspiration-Würfel. Eine Kreatur darf immer nur über einen Bardische-Inspiration-Würfel verfügen. Einmal
  innerhalb der nächsten Stunde gilt: Wenn die Kreatur bei einer W20-Prüfung scheitert, kann sie mit dem Bardische-Inspiration-Würfel
  würfeln, das Ergebnis der Prüfung hinzufügen und so aus dem Misserfolg möglicherweise einen Erfolg machen. Ein Bardische-Inspiration-Würfel
  wird Anzahl der Anwendungen: verbraucht, wenn mit ihm gewürfelt wird. Die Anzahl der möglichen Anwendungen deines Bardische-
  Inspiration-Würfels entspricht deinem Charisma- modifikator (mindestens einmal). Du erhältst alle verbrauchten Anwendungen
  nach einer langen Auf höheren Stufen: Rast zurück. Dein Bardische-Inspiration- Würfel verändert sich, wenn du bestimmte
  Barden- stufen erreichst, wie in der Spalte „Bardenwürfel“ der Tabelle „Bardenmerkmale“ dargestellt. Der Würfel wird auf
  der 5. Stufe zu W8, auf der 10. Stufe zu W10 und auf der 15. Stufe zu W12.'
source_book: SRD 5.2.1
