id: kampfer-unbeugsamkeit
type: class_feature
class: Kämpfer
lang: de
level: 9
name: Unbeugsamkeit (Kämpfer)
description: Wenn du bei einem Rettungswurf scheiterst, kannst du ihn mit einem Bonus in Höhe deiner Kämpferstufe erneut ausführen.
  In diesem Fall musst du das neue Ergebnis verwenden und kannst das Merkmal erst nach einer langen Rast erneut verwenden.
  Du kannst dieses Merkmal ab der 13. Stufe zweimal vor einer langen Rast und ab der 17. Stufe dreimal vor einer langen Rast
  anwenden.
source_book: SRD 5.2.1
