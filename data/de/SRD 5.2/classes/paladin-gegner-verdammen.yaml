id: paladin-gegner-verdammen
type: class_feature
class: Paladin
lang: de
level: 9
name: Gegner verdammen
description: 'Als magische Aktion kannst du eine Anwendung von Göttliche Macht fokussieren dieser Klasse verbrauchen, um Gegnern
  gehörige Ehrfurcht einzuflößen. Wenn du dein heiliges Symbol oder deine heilige Waffe präsentierst, kannst du auf eine Anzahl
  von Kreaturen in Höhe deines Charisma modifikators (mindestens eine Kreatur) im Abstand von bis zu 18 Metern von dir zielen,
  die du sehen kannst. Jedes Ziel muss einen Weisheitsrettungswurf bestehen, oder es ist eine Minute lang – oder bis es Schaden
  erleidet – verängstigt. Solange es auf diese Art verängstigt ist, kann es in seinen Zügen nur eine der folgenden Handlungen
  ausführen: sich bewegen, eine Aktion ausführen, eine Bonusaktion ausführen.'
source_book: SRD 5.2.1
