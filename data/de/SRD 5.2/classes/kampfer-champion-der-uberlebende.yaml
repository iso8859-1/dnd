id: kampfer-champion-der-uberlebende
type: class_feature
class: Kämpfer
lang: de
level: 18
name: Der Überlebende (Champion)
description: 'Du erreichst den Gipfel der Zähigkeit im Kampf und Dem Tode trotzen: erhältst folgende Vorzüge: Du bist bei
  Todesrettungs‑ würfen im Vorteil. Außerdem erhältst du, wenn du bei einem Todesrettungswurf ein Ergebnis von 18–20 würfelst,
  den Vorzug wie bei einem Ergebnis Heldischer Schlachtruf: von 20. Zu Beginn jedes deiner Züge erhältst du Trefferpunkte
  in Höhe von 5 plus deinem Konstitutionsmodifikator zurück, wenn du blutig bist und mindestens 1 Trefferpunkt hast.'
source_book: SRD 5.2.1
subclass: Champion
