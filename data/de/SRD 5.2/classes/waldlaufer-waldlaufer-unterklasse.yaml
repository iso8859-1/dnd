class: Waldläufer
lang: de
level: 3
name: Waldläufer-Unterklasse
description: Du erhältst eine Waldläufer‑Unterklasse deiner Wahl. Die Unterklasse Jäger wird nach der Beschreibung dieser
  Klasse erläutert. Unterklassen sind Spezialisierungen, die dir auf bestimmten Waldläuferstufen Merkmale gewähren. Du erhältst
  für den Rest deiner Laufbahn alle Merkmale deiner Unterklasse, die zu deiner aktuellen Waldläuferstufe oder den niedrigeren
  Stufen gehören.
source_book: SRD 5.2.1
