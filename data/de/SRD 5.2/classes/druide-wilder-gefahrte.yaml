id: druide-wilder-gefahrte
type: class_feature
class: Druide
lang: de
level: 2
name: Wilder Gefährte (Druide)
description: Du kannst einen Naturgeist herbeirufen, der eine Tiergestalt annimmt und dich unterstützt. Als magische Aktion
  kannst du einen Zauberplatz Vertrauten finden oder eine Anwendung von Tiergestalt verbrauchen, um den Zauber ohne Material-
  komponenten zu wirken. Wenn du den Zauber auf diese Art wirkst, ist der Vertraute ein Feenwesen und verschwindet nach einer
  langen Rast.
source_book: SRD 5.2.1
