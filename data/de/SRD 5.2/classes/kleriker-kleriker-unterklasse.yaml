id: kleriker-kleriker-unterklasse
type: class_feature
class: Kleriker
lang: de
level: 3
name: Kleriker-Unterklasse (Kleriker)
description: Du erhältst eine Kleriker‑Unterklasse deiner Wahl. Die Unterklasse Domäne des Lebens wird nach der Beschreibung
  dieser Klasse erläutert. Unterklassen sind Spezialisierungen, die dir auf bestimmten Klerikerstufen Merkmale gewähren. Du
  erhältst für den Rest deiner Laufbahn alle Merkmale deiner Unterklasse, die zu deiner aktuellen Klerikerstufe oder den niedrigeren
  Stufen gehören.
source_book: SRD 5.2.1
