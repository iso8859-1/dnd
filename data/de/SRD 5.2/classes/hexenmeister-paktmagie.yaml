id: hexenmeister-paktmagie
type: class_feature
class: Hexenmeister
lang: de
level: 1
name: Paktmagie (Hexenmeister)
description: 'In einer okkulten Zeremonie hast du einen Pakt mit einer mysteriösen Wesenheit geschlossen, um magische Kräfte
  zu erhalten. Diese Wesenheit ist eine Stimme in den Schatten, ihre Identität ist unklar – doch ihre Gabe für dich ist konkret:
  die Fähigkeit, Zauber zu wirken. Die Regeln zum Zauberwirken findest du unter „Zauber“. Folgende Informationen erklären,
  wie du diese Regeln mit den Hexenmeisterzaubern verwendest, die in der Zauberliste des Hexenmeisters weiter hinten in Zaubertricks:
  dieser Klassenbeschreibung aufgeführt sind. Schauriger Strahl Du kennst zwei Hexenmeister- Taschenspielerei zaubertricks
  deiner Wahl. und werden empfohlen. Wann immer du eine Hexenmeisterstufe erhältst, kannst du einen deiner Zaubertricks dieses
  Merkmals durch einen anderen Hexenmeisterzaubertrick deiner Wahl ersetzen. Auf der 4. und 10. Hexenmeisterstufe erlernst
  du jeweils einen weiteren Hexenmeisterzaubertrick deiner Wahl, wie in der Spalte „Zaubertricks“ der Zauberplätze: Tabelle
  „Hexenmeistermerkmale“ dargestellt. Die Tabelle „Hexenmeister- merkmale“ zeigt, wie viele Zauberplätze dir zum Wirken deiner
  Hexenmeisterzauber des 1. bis 5. Grades zur Verfügung stehen. Sie zeigt außerdem die Grade der Zauberplätze. Du erhältst
  alle verbrauchten Paktmagie-Zauberplätze nach einer kurzen oder langen Rast zurück. Beispiel: Wenn du ein Hexenmeister der
  5. Stufe Person bezaubern bist, hast du zwei Zauberplätze des 3. Grades. Um den Zauber des 1. Grades zu wirken, musst du
  einen dieser Zauberplätze verbrauchen, und du wirkst den Zauber als Zauber Vorbereitete Zauber ab dem 1. Grad: des 3. Grades.
  Du bereitest die Liste der Zauber ab dem 1. Grad vor, die dir mit diesem Merkmal zur Verfügung stehen. Wähle zu Person bezaubern
  Verwünschen Beginn zwei Hexenmeisterzauber des 1. Grades aus. und werden empfohlen. Die Anzahl der Zauber auf deiner Liste
  erhöht sich, wenn du weitere Hexenmeisterstufen erhältst, wie in der Spalte „Vorbereitete Zauber“ der Tabelle „Hexenmeistermerkmale“
  dargestellt. Wann immer sich diese Anzahl erhöht, wählst du zusätzliche Hexenmeisterzauber aus, bis die Anzahl von Zaubern
  auf deiner Liste der Anzahl in der Tabelle entspricht. Der Grad der ausgewählten Zauber darf dabei den in der Tabelle angegebenen
  Grad für deine Stufe nicht überschreiten. Wenn du beispielsweise die 6. Stufe erreichst, erlernst du einen neuen Hexenmeister-
  zauber, der den 1. bis 3. Grad haben kann. Wenn ein anderes Hexenmeistermerkmal dir Zauber gibt, die du stets vorbereitet
  hast, zählen diese Zauber nicht bei der Anzahl von Zaubern, die du mit diesem Merkmal vorbereiten kannst. Ansonsten zählen
  diese Zauber jedoch als Deine vorbereiteten Zauber ändern: Hexenmeisterzauber für dich. Wann immer du eine Hexenmeisterstufe
  erhältst, kannst du einen Zauber auf deiner Liste durch einen anderen Hexenmeisterzauber ersetzen, der einen Attribut zum
  Zauberwirken: passenden Grad aufweist. Dein Attribut zum Zauberfokus: Wirken der Hexenmeisterzauber ist Charisma. Du kannst
  einen arkanen Fokus als Zauberfokus für deine Hexenmeisterzauber verwenden.'
source_book: SRD 5.2.1
