id: druide-druidisch
type: class_feature
class: Druide
lang: de
level: 1
name: Druidisch (Druide)
description: Du beherrschst Druidisch, die Geheimsprache der Druiden. Beim Erlernen dieser uralten Sprache hast du auch die
  Magie erlangt, mit Tieren zu Mit Tieren sprechen kommunizieren. Daher hast du den Zauber stets vorbereitet. Du kannst Druidisch
  verwenden, um verborgene Botschaften zu hinterlassen. Jeder, der dieser Sprache mächtig ist, findet eine solche Botschaft
  automatisch. Andere erkennen sie nur, wenn sie einen SG-15-Intelligenzwurf (Nachforschungen) bestehen, und können den Inhalt
  nicht ohne magische Hilfe entschlüsseln.
source_book: SRD 5.2.1
