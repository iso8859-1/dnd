id: paladin-erquickende-beruhrung
type: class_feature
class: Paladin
lang: de
level: 14
name: Erquickende Berührung (Paladin)
description: 'Wenn du Handauflegen auf eine Kreatur wirkst, kannst du zusätzlich mindestens einen der folgenden Zustände von
  der Kreatur entfernen: Betäubt, Bezaubert, Blind, Gelähmt, Taub oder Verängstigt. Du musst für jeden dieser Zustände, den
  du entfernen willst, 5 Trefferpunkte aus dem Vorrat an Heilkraft von Handauflegen verbrauchen. Diese Punkte werden nicht
  als Trefferpunkte der Kreatur wiederhergestellt.'
source_book: SRD 5.2.1
