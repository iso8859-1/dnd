id: barbar-waffenbeherrschung
type: class_feature
class: Barbar
lang: de
level: 1
name: Waffenbeherrschung (Barbar)
description: Deine Vertrautheit mit Waffen gestattet dir, die Meisterschaftseigenschaften zweier Arten von einfachen Nahkampfwaffen
  oder Nahkampf- Kriegswaffen deiner Wahl wie Zweihandäxten und Beilen zu verwenden. Wann immer du eine lange Rast beendest,
  kannst du Waffenübungen ausführen und eine dieser Waffenentscheidungen ändern. Wenn du bestimmte Barbarenstufen erreichst,
  erhältst du das Attribut zum Verwenden der Meisterschaftseigenschaften von mehr Waffenarten, wie in der Spalte „Waffenbeherrschung“
  der Tabelle „Barbarenmerkmale“ dargestellt.
source_book: SRD 5.2.1
