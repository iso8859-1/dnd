name: Zauberei-Inkarnat
description: Wenn keine Anwendungen von Intuitive Zauberei mehr übrig sind, kannst du diese dennoch einsetzen. Dazu musst
  du 2 Zaubereipunkte verbrauchen und zum Aktivieren die Bonusaktion ausführen. Außerdem kannst du, wenn dein Merkmal Intuitive
  Zauberei aktiv ist, bei jedem Zauber, den du wirkst, bis zu zwei deiner Metamagie‑Optionen verwenden.
source_book: SRD 5.2.1
