id: kleriker-verbesserte-gesegnete-schlage
type: class_feature
class: Kleriker
lang: de
level: 14
name: Verbesserte Gesegnete Schläge (Kleriker)
description: 'Die Option, die du für Gesegnete Schläge ausgewählt Göttlicher Schlag: hast, wird mächtiger. Der zusätzliche
  Schaden deines Verstärkte Zaubertricks: Göttlichen Schlags ist auf 2W8 erhöht. Wenn du einen Klerikerzaubertrick wirkst
  und einer Kreatur damit Schaden zufügst, kannst du dir selbst oder einer anderen Kreatur im Abstand von bis zu 18 Metern
  von dir Lebenskraft geben, die eine Anzahl von temporären Trefferpunkten in doppelter Höhe deines Weisheitsmodifikators
  gewährt.'
source_book: SRD 5.2.1
