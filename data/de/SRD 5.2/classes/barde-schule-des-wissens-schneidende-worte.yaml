id: barde-schule-des-wissens-schneidende-worte
type: class_feature
class: Barde
lang: de
level: 3
name: Schneidende Worte (Schule des Wissens)
description: Du lernst, mit Verstand und Schlagfertigkeit für übernatürliche Ablenkung und Verwirrung zu sorgen oder auf anderen
  Wegen Einfluss und Selbstsicherheit anderer zu schwächen. Wenn eine Kreatur im Abstand von bis zu 18 Metern von dir, die
  du sehen kannst, einen Schadenswurf ausführt oder einen Attributs‑ oder Angriffswurf besteht, kannst du eine Reaktion ausführen,
  um eine Anwendung deiner Bardischen Inspiration zu verbrauchen. Würfle mit deinem Bardische- Inspiration‑Würfel und ziehe
  das Ergebnis von dem der Kreatur ab, um Schaden zu verringern oder den Erfolg möglicherweise in einen Misserfolg zu verwandeln.
source_book: SRD 5.2.1
subclass: Schule des Wissens
