id: waldlaufer-unermudlichkeit
type: class_feature
class: Waldläufer
lang: de
level: 10
name: Unermüdlichkeit (Waldläufer)
description: 'Nun helfen dir Urkräfte bei deinen Reisen und Temporäre Trefferpunkte: gewähren dir folgende Vorzüge: Als magische
  Aktion kannst du dir eine Anzahl von temporären Trefferpunkten in Höhe von 1W8 plus deinem Weisheitsmodifikator verleihen
  (mindestens 1). Die Anzahl der möglichen Anwendungen dieser Aktion entspricht deinem Weisheitsmodifikator (mindestens einmal).
  Du erhältst alle verbrauchten Erschöpfung verringern: Anwendungen nach einer langen Rast zurück. Wann immer du eine kurze
  Rast beendest, wird deine Erschöpfungsstufe (sofern vorhanden) um 1 verringert.'
source_book: SRD 5.2.1
