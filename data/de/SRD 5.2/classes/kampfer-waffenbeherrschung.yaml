id: kampfer-waffenbeherrschung
type: class_feature
class: Kämpfer
lang: de
level: 1
name: Waffenbeherrschung
description: Deine Vertrautheit mit Waffen gestattet dir, die Meisterschaftseigenschaften dreier Arten von einfachen Waffen
  oder Kriegswaffen deiner Wahl zu verwenden. Wann immer du eine lange Rast beendest, kannst du Waffenübungen ausführen und
  eine dieser Waffenentscheidungen ändern. Wenn du bestimmte Kämpferstufen erreichst, erhältst du das Attribut zum Verwenden
  der Meisterschaftseigenschaften von mehr Waffenarten, wie in der Spalte „Waffenbeherrschung“ der Tabelle „Kämpfermerkmale“
  dargestellt.
source_book: SRD 5.2.1
