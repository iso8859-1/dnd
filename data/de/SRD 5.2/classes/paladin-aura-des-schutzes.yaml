id: paladin-aura-des-schutzes
type: class_feature
class: Paladin
lang: de
level: 6
name: Aura des Schutzes
description: Du hast eine nicht sichtbare beschützende Aura in einer Ausströmung von drei Metern, die von dir ausgeht. Die
  Aura ist inaktiv, solange du kampfunfähig bist. Du und deine Verbündeten in der Aura erhaltet einen Bonus in Höhe deines
  Charismamodifikators (mindestens +1) auf Rettungswürfe. Wenn ein anderer Paladin anwesend ist, kann eine Kreatur nur von
  jeweils einer Aura des Schutzes (nach ihrer Wahl) profitieren.
source_book: SRD 5.2.1
