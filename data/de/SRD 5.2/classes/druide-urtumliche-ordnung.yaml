id: druide-urtumliche-ordnung
type: class_feature
class: Druide
lang: de
level: 1
name: Urtümliche Ordnung
description: 'Du hast dich nach deiner Wahl einer der folgenden Magier: heiligen Rollen verschrieben. Du kennst einen zusätzlichen
  Zaubertrick aus der Zauberliste des Druiden. Außerdem gibt dir deine mystische Verbindung mit der Natur einen Bonus auf
  deine Intelligenzwürfe (Arkane Kunde oder Naturkunde). Dieser Bonus entspricht deinem Wächter: Weisheitsmodifikator (mindestens
  +1). Du wurdest für den Kampf ausgebildet, daher hast du Übung im Umgang mit Kriegswaffen und Vertrautheit mit mittelschwerer
  Rüstung.'
source_book: SRD 5.2.1
