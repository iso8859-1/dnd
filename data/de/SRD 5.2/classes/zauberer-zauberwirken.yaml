id: zauberer-zauberwirken
type: class_feature
class: Zauberer
lang: de
level: 1
name: Zauberwirken (Zauberer)
description: 'Mithilfe deiner intuitiven Magie kannst du Zauber wirken. Die Regeln zum Zauberwirken findest du unter „Zauber“.
  Folgende Informationen erklären, wie du diese Regeln mit den Zaubererzaubern verwendest, die in der Zauberliste des Zauberers
  weiter hinten in dieser Klassenbeschreibung Zaubertricks: aufgeführt sind. Explosion der Zauberei Licht Schockgriff Du kennst
  vier Zaubererzaubertricks Taschenspielerei deiner Wahl. , , und werden empfohlen. Wann immer du eine Zaubererstufe erhältst,
  kannst du einen deiner Zaubertricks dieses Merkmals durch einen anderen Zaubererzaubertrick deiner Wahl ersetzen. Auf der
  4. und 10. Zaubererstufe erlernst du jeweils einen weiteren Zaubererzaubertrick deiner Wahl, wie in der Spalte „Zaubertricks“
  der Tabelle Zauberplätze: „Zauberermerkmale“ dargestellt. Die Tabelle „Zauberermerkmale“ zeigt, wie viele Zauberplätze dir
  zum Wirken deiner Zauber ab dem 1. Grad zur Verfügung stehen. Du erhältst alle verbrauchten Zauberplätze nach Vorbereitete
  Zauber ab dem 1. Grad: einer langen Rast zurück. Du bereitest die Liste der Zauber ab dem 1. Grad vor, die dir mit diesem
  Merkmal zur Verfügung stehen. Wähle zu Brennende Hände Magie entdecken Beginn zwei Zaubererzauber des 1. Grades aus. und
  werden empfohlen. Die Anzahl der Zauber auf deiner Liste erhöht sich, wenn du weitere Zaubererstufen erhältst, wie in der
  Spalte „Vorbereitete Zauber“ der Tabelle „Zauberermerkmale“ dargestellt. Wann immer sich diese Anzahl erhöht, wählst du
  zusätzliche Zauber- erzauber aus, bis die Anzahl von Zaubern auf deiner Liste der Anzahl in der Tabelle „Zauberermerkmale“
  entspricht. Der Grad der ausgewählten Zauber muss dem der verfügbaren Zauberplätze entsprechen. Beispiel: Wenn du ein Zauberer
  der 3. Stufe bist, kann deine Liste vorbereiteter Zauber sechs Zaubererzauber des 1. und 2. Grades in beliebiger Kombination
  enthalten. Wenn ein anderes Zauberermerkmal dir Zauber gibt, die du stets vorbereitet hast, zählen diese Zauber nicht bei
  der Anzahl von Zaubern, die du mit diesem Merkmal vorbereiten kannst. Ansonsten zählen Deine vorbereiteten Zauber ändern:
  diese Zauber jedoch als Zaubererzauber für dich. Wann immer du eine Zaubererstufe erhältst, kannst du einen der Zauber auf
  deiner Liste durch einen anderen Zaubererzauber ersetzen, für den du Attribut zum Zauberwirken: Zauberplätze hast. Dein
  Attribut zum Zauberfokus: Wirken der Zaubererzauber ist Charisma. Du kannst einen arkanen Fokus als Zauberfokus für deine
  Zaubererzauber verwenden.'
source_book: SRD 5.2.1
