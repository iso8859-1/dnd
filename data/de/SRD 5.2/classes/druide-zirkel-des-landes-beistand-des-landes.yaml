id: druide-zirkel-des-landes-beistand-des-landes
type: class_feature
class: Druide
lang: de
level: 3
name: Beistand des Landes (Zirkel des Landes)
description: Als magische Aktion kannst du eine Anwendung von Tiergestalt verbrauchen und einen Punkt im Abstand von bis zu
  18 Metern von dir auswählen. Um diesen Punkt erscheinen in einer Kugel mit einem Radius von drei Metern für kurze Zeit Blumen,
  die Lebenskraft spenden, sowie Dornen, die Lebenskraft entziehen. Jede Kreatur deiner Wahl in der Kugel muss einen Konstitutions‑
  rettungswurf gegen deinen Zauberrettungswurf‑SG ausführen. Misslingt der Wurf, so erleidet die Kreatur 2W6 nekrotischen
  Schaden, anderenfalls die Hälfte. Eine Kreatur deiner Wahl in diesem Bereich erhält 2W6 Trefferpunkte zurück. Schaden und
  Heilung werden um jeweils 1W6 erhöht, wenn du die 10. (3W6) und die 14. (4W6) Druidenstufe erreichst.
source_book: SRD 5.2.1
subclass: Zirkel des Landes
