id: barbar-rucksichtsloser-angriff
type: class_feature
class: Barbar
lang: de
level: 2
name: Rücksichtsloser Angriff (Barbar)
description: Du kannst deine Verteidigung völlig außer Acht lassen und mit noch mehr Wildheit angreifen. Bei deinem ersten
  Angriffswurf in deinem Zug kannst du beschließen, einen Rücksichtslosen Angriff auszuführen. Damit sind deine Angriffswürfe,
  die Stärke erfordern, bis zum Beginn deines nächsten Zugs im Vorteil, doch Angriffswürfe gegen dich sind in dieser Zeit
  ebenfalls im Vorteil.
source_book: SRD 5.2.1
