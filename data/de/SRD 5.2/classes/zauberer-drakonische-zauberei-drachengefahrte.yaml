id: zauberer-drakonische-zauberei-drachengefahrte
type: class_feature
class: Zauberer
lang: de
level: 18
name: Drachengefährte (Drakonische Zauberei)
description: Drachen herbeirufen Du kannst ohne Material- komponente wirken. Du kannst den Zauber auch einmal wirken, ohne
  einen Zauberplatz zu verbrauchen. Diese Fähigkeit erhältst du nach einer langen Rast zurück. Wann immer du beginnst, diesen
  Zauber zu wirken, kannst du ihn so verändern, dass er keine Konzentration erfordert. In diesem Fall beträgt die Wirkungsdauer
  des Zaubers eine Minute.
source_book: SRD 5.2.1
subclass: Drakonische Zauberei
