id: monch-monchsfokus
type: class_feature
class: Mönch
lang: de
level: 2
name: Mönchsfokus (Mönch)
description: 'Dein Fokus und deine Vertrautheit mit Kampfkünsten gestatten dir, eine Quelle außergewöhnlicher Energie in dir
  selbst zu nutzen. Diese Energie wird durch Fokuspunkte repräsentiert. Deine Mönchsstufe bestimmt die Anzahl deiner Punkte,
  die in der Spalte „Fokuspunkte“ der Tabelle „Mönchsmerkmale“ aufgeführt sind. Du kannst diese Punkte verbrauchen, um bestimmte
  Mönchsmerkmale einzusetzen oder zu verstärken. Zu Beginn kennst du drei solche Merkmale: Geduldige Verteidigung, Schlaghagel
  und Windschritt (jeweils unten beschrieben). Wenn du einen Fokuspunkt verbrauchst, ist er nicht mehr verfügbar. Du erhältst
  verbrauchte Fokuspunkte nach einer kurzen oder langen Rast zurück. Manche Merkmale, die Fokuspunkte verwenden, erfordern,
  dass das Ziel einen Rettungswurf ausführt. Der Rettungswurf-SG entspricht 8 plus deinem Schlaghagel: Weisheitsmodifikator
  plus deinem Übungsbonus. Du kannst 1 Fokuspunkt verbrauchen, um zwei waffenlose Angriffe als Bonusaktion Geduldige Verteidigung:
  auszuführen. Du kannst die Rückzug- Aktion als Bonusaktion ausführen. Alternativ kannst du 1 Fokuspunkt verbrauchen, um
  sowohl die Rückzug- als auch die Ausweichaktion als Windschritt: Bonusaktion auszuführen. Du kannst die Spurt-Aktion als
  Bonusaktion ausführen. Alternativ kannst du 1 Fokuspunkt verbrauchen, um sowohl die Rückzug- als auch die Spurt-Aktion als
  Bonusaktion auszuführen, und deine Sprungdistanz ist in diesem Zug verdoppelt.'
source_book: SRD 5.2.1
