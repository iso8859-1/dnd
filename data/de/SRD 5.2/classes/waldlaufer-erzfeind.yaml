name: Erzfeind (Waldläufer)
description: Zeichen des Jägers Du hast den Zauber stets vorbereitet. Du kannst ihn zweimal wirken, ohne einen Zauberplatz
  zu verbrauchen. Du erhältst alle verbrauchten Anwendungen dieser Fähigkeit nach einer langen Rast zurück. Die Anzahl möglicher
  Anwendungen ohne Zauber‑ platz erhöht sich, wenn du bestimmte Waldläufer‑ stufen erreichst, wie in der Spalte „Erzfeind“
  der Tabelle „Waldläufermerkmale“ dargestellt.
source_book: SRD 5.2.1
