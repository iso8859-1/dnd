id: paladin-gottliche-macht-fokussieren
type: class_feature
class: Paladin
lang: de
level: 3
name: Göttliche Macht fokussieren (Paladin)
description: 'Du kannst göttliche Energie direkt von den Äußeren Ebenen kanalisieren, um magische Effekte zu wirken. Du beginnst
  mit einem solchen Effekt: Göttliches Gespür (unten beschrieben). Andere Paladinmerkmale verleihen dir zusätzliche Effektoptionen
  bei Göttliche Macht fokussieren. Wann immer du Göttliche Macht fokussieren dieser Klasse einsetzt, wählst du aus, welchen
  Effekt dieser Klasse du bewirkst. Du kannst Göttliche Macht fokussieren dieser Klasse zweimal anwenden. Wenn du eine kurze
  Rast beendest, erhältst du eine verbrauchte Anwendung zurück. Du erhältst alle verbrauchten Anwendungen nach einer langen
  Rast zurück. Du erhältst eine zusätzliche Anwendung, wenn du die 11. Paladinstufe erreichst. Wenn ein Effekt von Göttliche
  Macht fokussieren einen Rettungswurf erfordert, entspricht der SG dem Zauberrettungswurf‑SG des Merkmals Göttliches Gespür:
  Zauberwirken dieser Klasse. Als Bonusaktion kannst du dein Bewusstsein öffnen, um celestische Wesen, Unholde und Untote
  zu erkennen. In den nächsten zehn Minuten – oder bis du kampfunfähig wirst – kennst du den Ort von jeder Kreatur dieser
  Typen im Abstand von bis zu 18 Metern von dir, und du erkennst den jeweiligen Kreaturentyp. Innerhalb der gleichen Reichweite
  erkennst du auch Orte und Weihen Gegenstände, die geweiht oder entweiht wurden, als würdest du den Zauber wirken.'
source_book: SRD 5.2.1
