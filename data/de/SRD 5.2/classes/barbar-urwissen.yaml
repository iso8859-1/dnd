id: barbar-urwissen
type: class_feature
class: Barbar
lang: de
level: 3
name: Urwissen
description: 'Du erhältst Übung in einer weiteren Fertigkeit deiner Wahl aus der Liste von Fertigkeiten, die für Barbaren
  auf der 1. Stufe verfügbar sind. Außerdem kannst du während deines Kampfrauschs Urmacht kanalisieren, wenn du bestimmte
  Aufgaben auszuführen versuchst. Wann immer du einen Attributswurf unter Verwendung einer der folgenden Fertigkeiten ausführst,
  kannst du ihn auch dann als Stärkewurf ausführen, wenn er sonst ein anderes Attribut erfordert: Akrobatik, Einschüchtern,
  Heimlichkeit, Überlebenskunst oder Wahrnehmung. Wenn du dieses Attribut verwendest, repräsentiert deine Stärke die Urmacht,
  die in dir kreist, um deine Beweglichkeit, deine Haltung und deine Sinne zu optimieren.'
source_book: SRD 5.2.1
