id: hexenmeister-unhold-schutzherr-schlund-des-wahnsinns
type: class_feature
class: Hexenmeister
lang: de
level: 14
name: Schlund des Wahnsinns (Unhold-Schutzherr)
description: Einmal pro Zug kannst du, wenn du eine Kreatur mit einem Angriffswurf triffst, versuchen, das Ziel sofort in
  die Unteren Ebenen zu schleudern. Das Ziel muss einen Charismarettungswurf gegen deinen Zauberrettungswurf-SG bestehen,
  oder es verschwindet und trudelt durch eine Albtraumlandschaft. Es erleidet 8W10 psychischen Schaden, sofern es kein Unhold
  ist, und ist bis zum Ende deines nächsten Zugs kampfunfähig. Dann kehrt es in den Bereich zurück, aus dem es verschwunden
  ist, oder gelangt in den nächstliegenden freien Bereich. Du kannst dieses Merkmal erst nach einer langen Rast erneut verwenden,
  es sei denn, du verbrauchst einen Paktmagie-Zauberplatz (keine Aktion erforderlich), um die Anwendung wiederherzustellen.
source_book: SRD 5.2.1
subclass: Unhold-Schutzherr
