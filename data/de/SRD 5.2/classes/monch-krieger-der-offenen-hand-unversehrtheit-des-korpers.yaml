id: monch-krieger-der-offenen-hand-unversehrtheit-des-korpers
type: class_feature
class: Mönch
lang: de
level: 6
name: Unversehrtheit des Körpers
description: Du erhältst die Fähigkeit, dich selbst zu heilen. Als Bonusaktion kannst du mit deinem Kampf‑ künste‑Würfel würfeln.
  Du erhältst eine Anzahl von Trefferpunkten in Höhe des Ergebnisses plus deines Weisheitsmodifikators zurück (mindestens
  1 Trefferpunkt). Die Anzahl der möglichen Anwendungen dieses Merkmals entspricht deinem Weisheitsmodifikator (mindestens
  einmal). Du erhältst alle verbrauchten Anwendungen nach einer langen Rast zurück.
source_book: SRD 5.2.1
subclass: Krieger der Offenen Hand
