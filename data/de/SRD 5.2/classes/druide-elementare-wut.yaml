id: druide-elementare-wut
type: class_feature
class: Druide
lang: de
level: 7
name: Elementare Wut
description: 'Die Macht der Elemente durchfließt dich. Du erhältst Verstärkte Zaubertricks: eine der folgenden Optionen nach
  deiner Wahl. Füge dem Schaden, den du mit Druidenzaubertricks bewirkst, deinen Urschlag: Weisheitsmodifikator hinzu. Einmal
  in jedem deiner Züge kannst du, wenn du eine Kreatur mit einem Angriffswurf triffst, den du mit einer Waffe oder in Tiergestalt
  mit dem Angriff des Tieres ausführst, dem Ziel zusätzlich 1W8 Blitz‑, Feuer‑, Kälte‑ oder Schallschaden (nach deiner Wahl)
  zufügen.'
source_book: SRD 5.2.1
