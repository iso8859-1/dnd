id: schutzgeister
type: spell
template: spell
name: Schutzgeister
lang: de
level: 3
school: Beschwörungszauber
casting_time: Aktion
range: Selbst
components: V, G, M (eine Gebetsschriftrolle)
duration: Konzentration, bis zu 10 Minuten
description: 'Beschützende Naturgeister umschwirren dich für die Wirkungsdauer in einer Ausströmung von 4,5 Metern. Wenn du
  guter oder neutraler Gesinnung bist, erscheint ihre Spektralform engel- oder feenhaft (nach deiner Wahl). Wenn du böser
  Gesinnung bist, erscheinen sie als Unholde. Wenn du diesen Zauber wirkst, kannst du Kreaturen bestimmen, die vom Zauber
  nicht betroffen sind. Die Bewegungsrate betroffener Kreaturen ist innerhalb der Ausströmung halbiert, und wann immer die
  Ausströmung in den Bereich einer Kreatur gelangt, eine Kreatur die Ausströmung betritt oder ihren Zug darin beendet, muss
  die Kreatur einen Weisheits rettungswurf ausführen. Misslingt der Wurf, so erleidet die Kreatur 3W8 gleißenden Schaden (wenn
  du guter oder neutraler Gesinnung bist) oder 3W8 nekrotischen Schaden (wenn du böser Gesinnung bist). Bei einem erfolgreichen
  Rettungswurf erleidet die Kreatur halb so viel Schaden. Eine Kreatur kann diesen Verwenden von Zauberplätzen höheren Grades:
  Rettungswurf nur einmal pro Zug ausführen. Für jeden Zauberplatzgrad über dem 3. wird der Schaden um 1W8 erhöht.'
source_book: SRD 5.2 DE
