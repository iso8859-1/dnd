id: windstoss
type: spell
template: spell
name: Windstoß
lang: de
level: 2
school: Hervorrufungszauber
casting_time: Aktion
range: Selbst
components: V, G, M (ein Hülsenfruchtsamen)
duration: Konzentration, bis zu 1 Minute
description: Für die Wirkungsdauer weht von dir ausgehend ein starker Wind in einer Linie mit 18 Metern Länge und drei Metern
  Breite in eine Richtung deiner Wahl. Jede Kreatur innerhalb der Linie muss einen Stärkerettungswurf bestehen, oder sie wird
  entlang der Linie 4,5 Meter weit von dir weggestoßen. Eine Kreatur, die ihren Zug innerhalb der Linie beendet, muss den
  Rettungswurf ebenfalls ausführen. Jede Kreatur innerhalb der Linie muss für jeden Meter, den sie sich auf dich zubewegt,
  zwei Meter ihrer Bewegungsrate verbrauchen. Der Windstoß zerstreut Gas und Dampf und löscht Kerzen und ähnliche ungeschützte
  Flammen in seinem Bereich. Geschützte Flammen wie die von Laternen flackern wild. Es besteht eine Chance von 50 Prozent,
  dass sie gelöscht werden. Für die Wirkungsdauer kannst du als Bonusaktion in deinen folgenden Zügen die Richtung ändern,
  in die der Wind weht.
source_book: SRD 5.2 DE
