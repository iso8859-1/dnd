id: arkanes-schloss
type: spell
template: spell
name: Arkanes Schloss
lang: de
level: 2
school: Bannzauber
casting_time: Aktion
range: Berührung
components: V, G, M (Goldstaub im Wert von mindestens 25 GM, den der Zauber verbraucht)
duration: Bis der Zauber gebannt wird
description: Du berührst eine geschlossene Tür, ein Fenster, ein Tor, einen Behälter oder eine Luke und verschließt diesen
  Gegenstand für die Wirkungsdauer auf magische Art. Dieses Schloss kann mit nichtmagischen Methoden nicht entfernt werden.
  Du und alle Kreaturen, die du beim Wirken des Zaubers bestimmst, könnt den Gegenstand trotz des Schlosses normal öffnen
  und schließen. Du kannst auch ein Kennwort festlegen, das diesen Gegenstand im Abstand von bis zu 1,5 Metern eine Minute
  lang öffnet.
source_book: SRD 5.2 DE
