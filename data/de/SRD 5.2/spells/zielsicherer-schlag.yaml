name: Zielsicherer Schlag
lang: de
level: 0
school: Erkenntnis
casting_time: Aktion
range: Selbst
components: G, M (eine Waffe, mit der du Übung hast, im Wert von mindestens 1 KM)
duration: Unmittelbar
description: 'Von einem Blitz magischer Einsicht geleitet, führst du einen Angriff mit der Waffe aus, die du zum Wirken des
  Zaubers verwendet hast. Der Zauber nutzt dein Attribut zum Zauberwirken für den Angriff und Schadenswürfe (statt Stärke
  oder Geschicklichkeit). Wenn der Angriff Schaden bewirkt, kann dies gleißender Schaden oder die normale Schadensart Zaubertrick-Aufwertung:
  der Waffe sein (nach deiner Wahl). Unabhängig davon, ob du gleißenden Schaden oder die normale Schadensart der Waffe bewirkst,
  bewirkt der Angriff zusätzlich gleißenden Schaden, wenn du die 5. (1W6), die 11. (2W6) und die 17. (3W6) Stufe erreichst.'
source_book: SRD 5.2 DE
