id: machtiges-trugbild
type: spell
template: spell
name: Mächtiges Trugbild
lang: de
level: 3
school: Illusionszauber
casting_time: Aktion
range: 36 Meter
components: V, G, M (ein Stück Vlies)
duration: Konzentration, bis zu 10 Minuten
description: 'Du erschaffst das Abbild eines Gegenstands, einer Kreatur oder eines anderen sichtbaren Phänomens, das nicht
  größer als ein Würfel mit sechs Metern Kantenlänge sein darf. Das Abbild erscheint an einem Punkt in Reichweite und bleibt
  für die Wirkungsdauer bestehen. Es wirkt echt, einschließlich passender Geräusche, Gerüche und Temperaturen, kann jedoch
  weder Schaden noch Zustände bewirken. Wenn du dich in Reichweite der Illusion befindest, kannst du sie mit einer magischen
  Aktion an einen anderen Ort deiner Wahl in Reichweite bewegen. Dabei kannst du das Abbild so verändern, dass seine Bewegung
  natürlich erscheint. Beispiel: Wenn du das Abbild einer Kreatur erschaffst und bewegst, kannst du es so verändern, dass
  es zu laufen scheint. Außerdem kannst du die Illusion verschiedene Geräusche erzeugen oder sogar ein Gespräch führen lassen.
  Physische Interaktionen mit dem Abbild enttarnen es als Illusion, da Dinge es einfach durchdringen können. Eine Kreatur,
  die das Abbild mit der Studieren‑ Aktion untersucht, kann mit einem erfolgreichen Intelligenzwurf (Nachforschungen) gegen
  deinen Zauberrettungswurf‑SG erkennen, dass es sich um eine Illusion handelt. In diesem Fall sieht sie das Abbild als durchscheinend
  und nimmt auch die anderen Verwenden von Zauberplätzen höheren Grades: sensorischen Eigenschaften abgeschwächt wahr. Bei
  einem Zauberplatz ab dem 4. Grad wirkt der Zauber, bis er gebannt wird, ohne dass er Konzentration erfordert.'
source_book: SRD 5.2 DE
