name: Dimensionstür
lang: de
level: 4
school: Beschwörungszauber
casting_time: Aktion
range: 150 Meter
components: V
duration: Unmittelbar
description: Du teleportierst dich an einen Ort in Reichweite. Dabei triffst du genau am gewünschten Punkt ein. Es kann sich
  um einen Zielort handeln, den du sehen oder dir vorstellen kannst oder den du beschreibst, indem du Entfernung und Richtung
  angibst (beispielsweise „60 Meter senkrecht nach unten“ oder „90 Meter nach Nordosten in einem 45‑Grad‑ Winkel nach oben“).
  Du kannst zusätzlich eine bereitwillige Kreatur teleportieren. Diese muss sich im Abstand von bis zu 1,5 Metern von dir
  befinden, wenn du dich teleportierst. Sie gelangt in einen Bereich im Abstand von bis zu 1,5 Metern von deinem Zielbereich.
  Wenn mindestens einer von euch in einem Bereich eintreffen würde, der bereits vollständig von Gegenständen oder Kreaturen
  besetzt ist, erleidet ihr jeweils 4W6 Energieschaden, und die Teleportation misslingt.
source_book: SRD 5.2 DE
