id: zeichen-des-jagers
type: spell
template: spell
name: Zeichen des Jägers
lang: de
level: 1
school: Erkenntniszauber
casting_time: Bonusaktion
range: 27 Meter
components: V
duration: Konzentration, bis zu 1 Stunde
description: 'Du markierst eine Kreatur in Reichweite, die du sehen kannst, auf magische Art als deine Beute. Für die Wirkungsdauer
  fügst du dem Ziel, wann immer du es mit einem Angriffswurf triffst, zusätzlich 1W6 Energieschaden zu. Außerdem bist du bei
  allen Weisheitswürfen (Überlebenskunst oder Wahrnehmung) im Vorteil, die du ausführst, um das Ziel zu finden. Wenn die Trefferpunkte
  des Ziels auf 0 sinken, bevor dieser Zauber endet, kannst du eine Bonusaktion ausführen, um das Zeichen auf eine andere
  Kreatur in Reichweite, die du sehen kannst, Verwenden von Zauberplätzen höheren Grades: zu übertragen. Deine Konzentration
  kann länger andauern: bei einem Zauberplatz des 3. und 4. Grades bis zu acht Stunden und bei einem Zauberplatz ab dem 5.
  Grad bis zu 24 Stunden.'
source_book: SRD 5.2 DE
