duration: 10 Minuten
description: 'In deiner Hand erscheint für die Wirkungsdauer eine flackernde Flamme. Sie strahlt keine Wärme aus und kann
  nichts entzünden, spendet jedoch in einem Radius von sechs Metern helles Licht und in einem Radius von weiteren sechs Metern
  dämmriges Licht. Der Zauber endet vorzeitig, wenn du ihn erneut wirkst. Bis der Zauber endet, kannst du eine magische Aktion
  ausführen, um Feuer auf eine Kreatur oder einen Gegenstand im Abstand von bis zu 18 Metern von dir zu schleudern. Führe
  einen Fernkampf‑ Zauberangriff aus. Bei einem Treffer erleidet das Zaubertrick-Aufwertung: Ziel 1W8 Feuerschaden. Der Schaden
  wird um jeweils 1W8 erhöht, wenn du die 5. (2W8), die 11. (3W8) und die 17. (4W8) Stufe erreichst.'
source_book: SRD 5.2 DE
