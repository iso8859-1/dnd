id: todliches-phantom
type: spell
template: spell
name: Tödliches Phantom
lang: de
level: 4
school: Illusionszauber
casting_time: Aktion
range: 36 Meter
components: V, G
duration: Konzentration, bis zu 1 Minute
description: 'Du zapfst die Alpträume einer Kreatur in Reichweite an, die du sehen kannst, und erschaffst eine Illusion ihrer
  tiefsten Ängste, die nur für diese Kreatur sichtbar ist. Das Ziel führt einen Weisheitsrettungs‑ wurf aus. Misslingt der
  Wurf, so erleidet das Ziel 4W10 psychischen Schaden und ist für die Wirkungsdauer bei Attributs‑ und Angriffswürfen im Nachteil.
  Bei einem erfolgreichen Rettungswurf erleidet das Ziel halb so viel Schaden, und der Zauber endet. Für die Wirkungsdauer
  kann das Ziel am Ende jedes seiner Züge einen Weisheitsrettungswurf ausführen. Misslingt der Wurf, so erleidet es den psychischen
  Schaden erneut. Bei einem erfolgreichen Verwenden von Zauberplätzen höheren Grades: Rettungswurf endet der Zauber. Für jeden
  Zauberplatzgrad über dem 4. wird der Schaden um 1W10 erhöht.'
source_book: SRD 5.2 DE
