id: flammenkugel
type: spell
template: spell
name: Flammenkugel
lang: de
level: 2
school: Beschwörungszauber
casting_time: Aktion
range: 18 Meter
components: V, G, M (eine Kugel aus Wachs)
duration: Konzentration, bis zu 1 Minute
description: 'Du erzeugst in einem freien Bereich in Reichweite auf dem Boden eine flammende Kugel mit einem Radius von 1,5
  Metern. Die Kugel bleibt für die Wirkungsdauer bestehen. Jede Kreatur, die ihren Zug in im Abstand von bis zu 1,5 Metern
  um die Kugel beendet, führt einen Geschicklichkeitsrettungswurf aus. Misslingt der Wurf, so erleidet sie 2W6 Feuerschaden,
  anderenfalls die Hälfte. Als Bonusaktion kannst du die Kugel bis zu neun Meter weit über den Boden rollen lassen. Wenn du
  die Kugel in den Bereich einer Kreatur bewegst, muss diese den Rettungswurf gegen die Kugel ausführen, und die Kugel beendet
  ihre Bewegung für diesen Zug. Bewegst du die Kugel, so kannst du sie über bis zu 1,5 Meter hohe Hindernisse dirigieren und
  über bis zu drei Meter breite Gruben springen lassen. Brennbare Gegenstände, die nicht getragen oder gehalten werden, beginnen
  zu brennen, wenn sie von der Kugel berührt werden. Die Kugel spendet in einem Radius von sechs Metern helles Licht sowie
  in einem Radius von weiteren sechs Metern Verwenden von Zauberplätzen höheren Grades: dämmriges Licht. Für jeden Zauberplatzgrad
  über dem 2. wird der Schaden um 1W6 erhöht.'
source_book: SRD 5.2 DE
