description: 'Wähle eine bereitwillige Kreatur in Reichweite aus, die du sehen kannst. Für die Wirkungsdauer iSsyts dteiem
  Breewfeergeunnzgdsorkatuem deens tZ 5ie.l2s. 1verdoppelt. Außerdem erhält das Ziel einen Bonus von +2 auf seine Rüstungsklasse,
  ist bei Geschicklichkeits- rettungswürfen im Vorteil und kann in jedem seiner Züge eine zusätzliche Aktion ausführen. Diese
  Aktion kann nur für Folgendes eingesetzt werden: Angriff (nur ein Angriff), Rückzug, Spurt, Verstecken, Verwenden. Wenn
  der Zauber endet, ist das Ziel bis zum Ende seines nächsten Zugs kampfunfähig und hat eine Bewegungsrate von 0, weil es
  von einer Welle der Lethargie ergriffen wird.'
