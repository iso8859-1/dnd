id: halbebene
type: spell
template: spell
name: Halbebene
lang: de
level: 8
school: Beschwörungszauber
casting_time: Aktion
range: 18 Meter
components: S
duration: 1 Stunde
description: 'Du erschaffst auf einer festen Oberfläche in Reichweite, die du sehen kannst, eine mittelgroße schattenhafte
  Tür. Diese Tür kann geöffnet und geschlossen werden. Sie führt zu einer Halbebene: einem leeren Raum mit neun Metern Kantenlänge
  aus Holz oder Stein (nach deiner Wahl). Wenn der Zauber endet, verschwindet die Tür, und alle Gegenstände in der Halbebene
  verbleiben dort. Auch Kreaturen bleiben darin, sofern sie nicht entscheiden, dass sie durch die Tür geschoben werden, wenn
  diese verschwindet. In diesem Fall gelangen sie in freie Bereiche, die dem Bereich der verschwundenen Tür am nächsten liegen,
  und sind liegend. Jedes Mal, wenn du diesen Zauber wirkst, kannst du entweder eine neue Halbebene erschaffen oder die schattenhafte
  Tür mit einer Halbebene verbinden, die du beim vorigen Wirken des Zaubers erschaffen hast. Sind dir außerdem Natur und Inhalt
  einer Halbebene bekannt, die von einer anderen Kreatur mit diesem Zauber erschaffen wurde, so kannst du die schattenhafte
  Tür stattdessen auch mit dieser Halbebene verbinden.'
source_book: SRD 5.2 DE
