id: ebenenwechsel
type: spell
template: spell
name: Ebenenwechsel
lang: de
level: 7
school: Beschwörungszauber
casting_time: Aktion
range: Berührung
components: V, G, M (eine gegabelte Metallrute im Wert von mindestens 250 GM, die auf eine Existenzebene eingestimmt ist)
duration: Unmittelbar
description: Dieser Zauber transportiert dich und bis zu acht bereitwillige Kreaturen, die sich in einem Kreis an den Händen
  halten, auf eine andere Existenzebene. Du kannst einen allgemeinen Zielort bestimmten, beispielsweise eine bestimmte Stadt
  auf der Elementarebene des Feuers oder einen bestimmten Palast auf der zweiten Ebene der Neun Höllen. Ihr erscheint am Ziel
  oder in dessen Nähe nach Ermessen des SL. Wenn du die Siegelsequenz eines Kreises der Teleportation auf einer anderen Existenzebene
  kennst, kann dich der Zauber zu diesem Kreis bringen. Ist der Kreis der Teleportation zu klein für alle transportieren Kreaturen,
  so erscheinen sie im nächsten freien Bereich neben dem Kreis.
source_book: SRD 5.2 DE
