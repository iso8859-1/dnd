id: eiswand
type: spell
template: spell
name: Eiswand
lang: de
level: 6
school: Hervorrufungszauber
casting_time: Aktion
range: 36 Meter
components: V, G, M (ein Stück Quarz)
duration: Konzentration, bis zu 10 Minuten
description: 'Du erschaffst auf einer festen Oberfläche in Reichweite eine Eiswand. Du kannst sie auch zu einer halbkugelförmigen
  Kuppel oder zu einer Kugel mit einem Radius von bis zu drei Metern formen, oder du kannst eine flache Oberfläche aus zehn
  Platten mit je drei Metern Kantenlänge erschaffen. Jede Platte muss an mindestens eine andere angrenzen. Die Wand ist in
  jeder Form 30 Zentimeter dick und bleibt für die Wirkungsdauer bestehen. Erschaffst du die Wand so, dass sie den Bereich
  einer Kreatur durchdringt, so wird die Kreatur auf eine Seite der Wand (nach deiner Wahl) gestoßen und führt einen Geschicklichkeitsrettungswurf
  aus. Misslingt der Wurf, so erleidet sie 10W6 Kälteschaden, anderenfalls die Hälfte. Die Wand ist ein Gegenstand, der beschädigt
  und somit durchbrochen werden kann. Sie besitzt eine RK von 12 und 30 Trefferpunkte pro Abschnitt von drei Metern. Sie ist
  gegen Gift-, Kälte- und psychischen Schaden immun und anfällig für Feuerschaden. Sinken die Trefferpunkte eines Abschnitts
  von drei Metern der Wand auf 0, so wird dieser Abschnitt zerstört und hinterlässt in seinem Bereich eine eisige Luftschicht.
  Eine Kreatur, die sich erstmals in einem Zug durch die kalte Luftschicht bewegt, führt einen Konstitutionsrettungswurf aus.
  Misslingt der Wurf, so erleidet sie 5W6 Kälteschaden, anderenfalls die Verwenden von Zauberplätzen höheren Grades: Hälfte.
  Für jeden Zauberplatzgrad über dem 6. wird der Schaden, den die Wand beim Erscheinen bewirkt, um 2W6 erhöht, und der Schaden
  beim Durchqueren der eisigen Luftschicht wird um 1W6 erhöht.'
source_book: SRD 5.2 DE
