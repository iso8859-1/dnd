id: glyphe-des-schutzes
type: spell
template: spell
name: Glyphe des Schutzes
lang: de
level: 3
school: Bannzauber
casting_time: 1 Stunde
range: Berührung
components: V, G, M (Diamantpulver im Wert von mindestens 200 GM, das der Zauber verbraucht)
duration: Bis der Zauber gebannt oder die
description: 'Glyphe ausgelöst wird Du erzeugst eine Glyphe, die später einen magischen Effekt bewirkt. Diese Glyphe zeichnest
  du entweder auf eine Oberfläche (wie einen Tisch oder den Fußboden) oder in einen Gegenstand (wie ein Buch oder eine Truhe),
  der geschlossen werden kann, um die Glyphe zu verbergen. Die Glyphe kann höchstens in einem Radius von 1,5 Metern wirken.
  Wenn die Oberfläche oder der Gegenstand um mehr als drei Meter von der Stelle entfernt wird, an der du den Zauber gewirkt
  hast, wird die Glyphe zerstört, und der Zauber endet, ohne ausgelöst zu werden. Die Glyphe ist kaum wahrnehmbar. Es ist
  ein erfolgreicher Weisheitswurf (Wahrnehmung) gegen deinen Zauberrettungswurf‑SG erforderlich, um sie zu bemerken. Wenn
  du die Glyphe zeichnest, bestimmst du ihren Auslöser und legst fest, ob es sich um eine explosive Rune oder eine Zauberglyphe
  wie unten Auslöser bestimmen: beschrieben handelt. Wenn du den Zauber wirkst, bestimmst du einen Auslöser für die Glyphe.
  Glyphen auf Oberflächen werden meist dadurch ausgelöst, dass jemand sie berührt oder betritt, einen Gegenstand bewegt, der
  die Glyphe verdeckt, oder einen Mindestabstand zur Glyphe unterschreitet. Glyphen in Gegenständen werden meist dadurch ausgelöst,
  dass jemand den Gegenstand öffnet oder die Glyphe sieht. Sobald die Glyphe ausgelöst wurde, endet der Zauber. Du kannst
  den Auslöser verfeinern, sodass die Glyphe nur von bestimmten Kreaturentypen ausgelöst wird (beispielsweise könnte die Glyphe
  nur auf Aberrationen wirken). Du kannst auch Bedingungen festlegen, unter denen die Glyphe nicht ausgelöst wird, beispielsweise
  wenn ein Explosive Rune: bestimmtes Kennwort ausgesprochen wird. Wird die Glyphe ausgelöst, so explodiert ihre magische
  Energie in einer Kugel mit einem Radius von sechs Metern um sie. Jede Kreatur in diesem Bereich führt einen Geschicklichkeitsrettungswurf
  aus. Misslingt der Wurf, so erleidet die Kreatur 5W8 Blitz‑, Feuer‑, Kälte‑, Säure‑ oder Schallschaden (nach deiner Wahl
  beim Schreiben der Glyphe), anderenfalls Zauberglyphe: die Hälfte. Beim Erschaffen der Glyphe kannst du einen vorbereiteten
  Zauber des höchstens 3. Grades wirken und in der Glyphe speichern. Der Zauber muss eine einzelne Kreatur oder einen Bereich
  zum Ziel haben. Wenn er auf diese Weise gewirkt wird, hat der Zauber keinen unmittelbaren Effekt. Er wirkt erst, wenn die
  Glyphe ausgelöst wird. Wenn der Zauber ein Ziel braucht, wird die Kreatur ausgewählt, welche die Glyphe auslöst. Wirkt der
  Zauber auf einen Bereich, so ist dieser auf die Kreatur zentriert. Wenn der Zauber feindlich gesinnte Kreaturen beschwört
  oder schädliche Gegenstände oder Fallen erschafft, erscheinen sie so nahe wie möglich beim Eindringling und greifen ihn
  an. Erfordert der Zauber Konzentration, so hält Verwenden von Zauberplätzen höheren Grades: diese bis zum Ende der vollen
  Wirkungsdauer an. Für jeden Zauberplatzgrad über dem 3. wird der Schaden einer explosiven Rune um 1W8 erhöht. In einer Zauberglyphe
  kannst du Zauber bis zum Glyphe des Schutzes Grad des Zauberplatzes speichern, den du zum Wirken der  verwendet hast.'
source_book: SRD 5.2 DE
