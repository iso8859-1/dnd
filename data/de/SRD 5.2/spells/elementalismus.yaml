id: elementalismus
type: spell
template: spell
name: Elementalismus
lang: de
level: 0
school: Verwandlung
casting_time: Aktion
range: 9 Meter
components: V, G
duration: Unmittelbar
description: 'Du kontrollierst die Elemente und erzeugst in Element formen: Reichweite einen der folgenden Effekte. Du lässt
  eine Menge von Erde, Sand, Feuer, Rauch, Nebel oder Wasser, die in einen Würfel mit 30 Zentimetern Kantenlänge passt, eine
  Stunde lang eine grobe Gestalt annehmen (beispielsweise die einer Kreatur). Erde anlocken: Du erzeugst eine dünne Staub‑
  oder Sandschicht, die Oberflächen in einem Bereich von 2,3 Quadratmetern bedeckt, oder du lässt in einem Flecken Erde oder
  Sand ein einzelnes Wort Feuer anlocken: in deiner Handschrift erscheinen. Du erzeugst in einem Würfel mit 1,5 Metern Kantenlänge
  eine dünne Wolke aus harmlosen Funken und farbigem duftendem Rauch. Du wählst Farbe und Duft aus. Die Funken können Kerzen,
  Fackeln und Lampen im Bereich entzünden. Der Duft des Rauchs bleibt eine Minute Luft anlocken: lang erhalten. Du erzeugst
  in einem Würfel mit 1,5 Metern Kantenlänge einen Windstoß, der stark genug ist, um Stoff und Laub zu bewegen, Staub aufzuwirbeln
  und offene Türen und Fensterläden zu schließen. Türen und Fensterläden, die von jemandem oder etwas festgehalten werden,
  sind Wasser anlocken: nicht betroffen. Du erzeugst in einem Würfel mit 1,5 Metern Kantenlänge kühlen Nebel, der Kreaturen
  und Gegenstände benetzt. Alternativ erzeugst du eine Tasse sauberen Wassers entweder in einem Behälter oder auf einer Oberfläche.
  Das Wasser ist nach einer Minute verdampft.'
source_book: SRD 5.2 DE
