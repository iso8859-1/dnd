id: dornenwand
type: spell
template: spell
name: Dornenwand
lang: de
level: 6
school: Beschwörungszauber
casting_time: Aktion
range: 36 Meter
components: V, G, M (eine Handvoll Dornen)
duration: Konzentration, bis zu 10 Minuten
description: 'Du erschaffst eine Wand aus verworrenem Gestrüpp mit nadelspitzen Dornen. Die Wand erscheint auf einer festen
  Oberfläche in Reichweite und bleibt für die Wirkungsdauer bestehen. Die Wand kann bis zu 18 Meter lang, drei Meter hoch
  und 1,5 Meter dick sein. Alternativ kannst du eine ringförmige Wand mit einem Radius von drei Metern erschaffen, die bis
  zu sechs Meter hoch und 1,5 Meter dick ist. Die Wand blockiert die Sichtlinie. Wenn die Wand erscheint, führt jede Kreatur
  in ihrem Bereich einen Geschicklichkeitsrettungswurf aus. Misslingt der Wurf, so erleidet die Kreatur 7W8 Stichschaden,
  anderenfalls die Hälfte. Eine Kreatur kann die Dornenwand durchdringen, jedoch nur langsam und unter Schmerzen. Für jeden
  Meter, den sie sich durch die Wand bewegt, muss sie vier Meter ihrer Bewegungsrate verbrauchen. Wenn eine Kreatur außerdem
  in einem Zug die Dornenwand erstmals betritt oder ihren Zug darin beendet, führt sie einen Geschicklichkeitsrettungs‑ wurf
  aus. Misslingt der Wurf, so erleidet sie 7W8 Hiebschaden, anderenfalls die Hälfte. Eine Kreatur kann diesen Rettungswurf
  nur einmal pro Zug Verwenden von Zauberplätzen höheren Grades: ausführen. Für jeden Zauberplatzgrad über dem 6. werden beide
  Schadensarten um 1W8 erhöht.'
source_book: SRD 5.2 DE
