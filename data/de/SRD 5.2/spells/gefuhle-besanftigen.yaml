id: gefuhle-besanftigen
type: spell
template: spell
name: Gefühle besänftigen
lang: de
level: 2
school: Verzauberungszauber
casting_time: Aktion
range: 18 Meter
components: V, G
duration: Konzentration, bis zu 1 Minute
description: 'Jeder Humanoide innerhalb einer Kugel mit einem Radius von sechs Metern um einen Punkt deiner Wahl in Reichweite
  muss einen Charismarettungswurf bestehen, oder einer der folgenden Effekte wirkt auf ihn (wähle für jede Kreatur einen Effekt
  aus): • Die Kreatur ist für die Wirkungsdauer gegen die Zustände Bezaubert und Verängstigt immun. Wenn die Kreatur bereits
  bezaubert oder verängstigt war, werden diese Zustände für die Wirkungsdauer unterdrückt. • Die Kreatur wird Kreaturen deiner
  Wahl gegen‑ über gleichgültig, denen es feindlich gesinnt war. Diese Gleichgültigkeit endet, wenn das Ziel Scha‑ den erleidet
  oder sieht, dass seine Verbündeten Schaden erleiden. Wenn der Zauber endet, wird die Haltung der Kreatur wieder normal.'
source_book: SRD 5.2 DE
