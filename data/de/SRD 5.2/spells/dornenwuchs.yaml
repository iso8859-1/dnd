id: dornenwuchs
type: spell
template: spell
name: Dornenwuchs
lang: de
level: 2
school: Verwandlungszauber
casting_time: Aktion
range: 45 Meter
components: V, G, M (sieben Dornen)
duration: Konzentration, bis zu 10 Minuten
description: In einem Radius von sechs Metern um einen Punkt in Reichweite wird der Boden von harten Stacheln und Dornen überwuchert.
  Der Bereich wird für die Wirkungsdauer zu schwierigem Gelände. Bewegt sich eine Kreatur in oder durch den Bereich, so erleidet
  sie pro zurückgelegten 1,5 Metern 2W4 Stichschaden. Die Verwandlung des Bodens ist als natürlich getarnt. Jede Kreatur,
  die den Bereich beim Wirken des Zaubers nicht sehen kann, muss die Suchen‑Aktion ausführen und einen Weisheitswurf (Überlebenskunst
  oder Wahrnehmung) gegen deinen Zauberrettungswurf‑SG ausführen. Bei einem Erfolg erkennt sie das Gelände vor dem Betreten
  als gefährlich.
source_book: SRD 5.2 DE
