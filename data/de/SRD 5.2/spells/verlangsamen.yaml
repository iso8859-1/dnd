id: verlangsamen
type: spell
template: spell
name: Verlangsamen
lang: de
level: 3
school: Verwandlungszauber
casting_time: Aktion
range: 36 Meter
components: V, G, M (ein Tropfen Melasse)
duration: Konzentration, bis zu 1 Minute
description: Du verlangsamst die Zeit um bis zu sechs Kreaturen deiner Wahl in einem Würfel mit zwölf Metern Kantenlänge in
  Reichweite. Jedes Ziel muss einen Weisheitsrettungswurf bestehen, oder es ist für die Wirkungsdauer von diesem Zauber betroffen.
  Die Bewegungsrate eines betroffenen Ziels wird halbiert, es erleidet einen Malus von −2 auf seine RK und auf Geschicklichkeitsrettungswürfe.
  Außerdem kann es keine Reaktionen ausführen. Es kann in seinem Zug eine Aktion oder eine Bonusaktion verwenden, jedoch nicht
  beides. Wenn es die Angriffsaktion ausführt, kann es nur einen Angriff ausführen. Wenn es einen Zauber mit Gestenkomponente
  wirkt, besteht eine Chance von 25 Prozent, dass der Zauber misslingt, weil das Ziel die Gesten zu langsam ausführt. Ein
  betroffenes Ziel wiederholt den Rettungswurf am Ende jedes seiner Züge. Bei einem Erfolg endet der Effekt.
source_book: SRD 5.2 DE
