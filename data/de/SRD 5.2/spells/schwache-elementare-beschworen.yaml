id: schwache-elementare-beschworen
type: spell
template: spell
name: Schwache Elementare beschwören
lang: de
level: 4
school: Beschwörungszauber
casting_time: Aktion
range: Selbst
components: V, G
duration: Konzentration, bis zu 10 Minuten
description: 'Du beschwörst Geister von den Elementarebenen, die dich für die Wirkungsdauer in einer Ausströmung von 4,5 Metern
  umschwirren. Für die Wirkungsdauer bewirken all deine Angriffe zusätzlich 2W8 Schaden, wenn sie eine Kreatur innerhalb der
  Ausströmung treffen. Dieser Schaden ist Blitz‑, Feuer‑, Kälte‑ oder Säureschaden (nach deiner Wahl, wenn du den Angriff
  ausführst). Außerdem ist der Boden innerhalb der Ausströmung Verwenden von Zauberplätzen höheren Grades: schwieriges Gelände
  für deine Gegner. Für jeden Zauberplatzgrad über dem 4. wird der Schaden um 1W8 erhöht.'
source_book: SRD 5.2 DE
