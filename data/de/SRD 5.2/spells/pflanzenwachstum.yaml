description: '8 Stunden (Mehr Ertrag) Dieser Zauber kanalisiert Vitalität in Pflanzen. Der Zeitaufwand, den du verwendest,
  bestimmt, ob der Zauber den Effekt Mehr Wachstum oder den Effekt Mehr Ertrag (beide unten beschrieben) Mehr Wachstum: bewirkt.
  Wähle einen Punkt in Reichweite aus. Alle normalen Pflanzen in einem Radius von 30 Metern um diesen Punkt gedeihen und wuchern.
  Jede Kreatur in diesem Bereich muss für jeden Meter, den sie sich bewegt, vier Meter ihrer Bewegungsrate verbrauchen. Du
  kannst mindestens einen Bereich beliebiger Größe im Wirkungsbereich vom Effekt Mehr Ertrag: ausschließen. Alle Pflanzen
  in einem Radius von 0,8 Kilometern um einen Punkt in Reichweite werden 365 Tage lang ertragreich. Bei der Ernte spenden
  sie Pflanzenwachstum doppelt so viel Nahrung wie gewöhnlich. Sie können nur von einem ‑Zauber pro Jahr profitieren.'
source_book: SRD 5.2 DE
