id: unsichtbarer-diener
type: spell
template: spell
name: Unsichtbarer Diener
lang: de
level: 1
school: Beschwörungszauber
casting_time: Aktion oder Ritual
range: 18 Meter
components: V, G, M (ein Stück Schnur und etwas Holz)
duration: 1 Stunde
description: 'Dieser Zauber erschafft eine mittelgroße unsichtbare, geist‑ und formlose Kraft, die auf deinen Befehl einfache
  Aufgaben erfüllt, bis der Zauber endet. Der Diener erscheint in Reichweite in einem freien Bereich auf dem Boden. Er besitzt
  eine RK von 10, einen Stärkewert von 2, 1 Trefferpunkt und kann nicht angreifen. Wenn seine Trefferpunkte auf 0 sinken,
  endet der Zauber. Als Bonusaktion kannst du in jedem deiner Züge dem Diener mental befehlen, sich um bis zu 4,5 Meter zu
  bewegen und mit einem Gegenstand zu interagieren. Der Diener kann einfache Aufgaben übernehmen, die auch ein Mensch ausführen
  könnte: Dinge holen, reinigen und reparieren, Kleidung zusammenlegen, Feuer entfachen, Speisen servieren und Getränke einschenken.
  Sobald du einen Befehl erteilst, erfüllt der Diener diesen nach Kräften, bis die Aufgabe erledigt ist. Dann wartet er auf
  deinen nächsten Befehl. Wenn du dem Diener befiehlst, sich für eine Aufgabe mehr als 18 Meter weit von dir zu entfernen,
  endet der Zauber.'
source_book: SRD 5.2 DE
