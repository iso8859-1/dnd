id: mit-pflanzen-sprechen
type: spell
template: spell
name: Mit Pflanzen sprechen
lang: de
level: 3
school: Verwandlungszauber
casting_time: Aktion
range: Selbst
components: V, G
duration: 10 Minuten
description: In einer unbeweglichen Ausströmung von neun Metern um dich herum erfüllst du Pflanzen mit begrenztem Bewusstsein,
  sodass sie mit dir kommunizieren und einfache Befehle befolgen können. Du kannst die Pflanzen über Ereignisse des letzten
  Tages im Bereich des Zaubers befragen und so Informationen über vorbeiziehende Kreaturen, das Wetter und andere Umstände
  erhalten. Außerdem kannst du schwieriges Gelände aufgrund von Pflanzenwachstum – beispielsweise Dickicht oder Unterholz
  – für die Wirkungsdauer in normales Gelände verwandeln. Umgekehrt kannst du normales Gelände für die Wirkungsdauer zu schwierigem
  Gelände durch Pflanzenwachstum machen. Der Zauber ermöglicht es ihnen zwar nicht, sich zu entwurzeln und umherzulaufen,
  aber sie sind in der Lage, ihre Zweige, Ranken und Stiele für dich zu bewegen. Wenn sich eine Pflanzenkreatur in der Umgebung
  befindet, kannst du mit ihr kommunizieren, als würdet ihr dieselbe Sprache sprechen.
source_book: SRD 5.2 DE
