id: illusionsschrift
type: spell
template: spell
name: Illusionsschrift
lang: de
level: 1
school: Illusionszauber
casting_time: 1 Minute oder Ritual
range: Berührung
components: G, M (Tinte im Wert von mindestens 10 GM, die der Zauber verbraucht)
duration: 10 Tage
description: Du schreibst auf Pergament, Papier oder ein anderes geeignetes Material und erfüllst die Schrift mit einer Illusion,
  die für die Wirkungsdauer bestehen bleibt. Für dich und alle Kreaturen, die du beim Wirken des Zaubers bestimmst, erscheint
  die Schrift ganz normal in deiner Handschrift und gibt den Inhalt wieder, den du niedergeschrieben hast. Für alle anderen
  erscheint eine unbekannte oder magische Schrift, die unverständlich ist. Alternativ kann die Illusion die Bedeutung der
  Nachricht, die Handschrift oder die Sprache verändern, in der die Nachricht verfasst ist. Die Sprache muss dir jedoch bekannt
  sein. Falls der Zauber gebannt wird, verschwinden sowohl die echte Schrift als auch die Illusion. Eine Kreatur mit Wahrer
  Blick kann die versteckte Nachricht lesen.
source_book: SRD 5.2 DE
