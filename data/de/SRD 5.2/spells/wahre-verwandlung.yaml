id: wahre-verwandlung
type: spell
template: spell
name: Wahre Verwandlung
lang: de
level: 9
school: Verwandlungszauber
casting_time: Aktion
range: 9 Meter
components: V, G, M (ein Tropfen Quecksilber, ein Stück Gummiarabikum und eine Rauchschwade)
duration: Konzentration, bis zu 1 Stunde
description: 'Wähle ein Ziel – eine Kreatur oder einen nichtmagi‑ schen Gegenstand – in Reichweite aus, das du sehen kannst.
  Eine Kreatur verwandelt sich in eine andere Kreatur oder einen nichtmagischen Gegenstand. Ein Gegenstand, der weder getragen
  noch gehalten werden darf, verwandelt sich in eine Kreatur. Die Verwandlung bleibt für die Wirkungsdauer bestehen, sofern
  das Ziel nicht stirbt oder zerstört wird. Wenn du allerdings deine Konzentration auf diesen Zauber für die gesamte Wirkungsdauer
  aufrechter‑ hältst, wirkt der Zauber, bis er gebannt wird. Eine nicht bereitwillige Kreatur kann einen Weisheitsrettungswurf
  ausführen. Bei einem Erfolg Kreatur in Kreatur: ist sie nicht von diesem Zauber betroffen. Verwandelst du eine Kreatur in
  eine andere Kreatur, so kannst du eine beliebige Gestalt wählen, deren Herausforderungsgrad nicht höher ist als der Herausforderungsgrad
  oder die Stufe des Ziels. Die Spielwerte des Ziels werden durch den Wertekasten der neuen Gestalt ersetzt. Das Ziel behält
  jedoch Trefferpunkte, Trefferpunktewürfel, Gesinnung und Persönlichkeit bei. Das Ziel erhält eine Anzahl von temporären
  Trefferpunkten, die der Anzahl von Trefferpunkten der neuen Gestalt entspricht. Nach der Wirkungsdauer dieses Zaubers verbleibende
  temporäre Trefferpunkte gehen verloren. Das Ziel kann nur Aktionen ausführen, die in seiner neuen Gestalt anatomisch möglich
  sind. Es kann weder sprechen noch Zauber wirken. Die Ausrüstung des Ziels verschmilzt mit seiner neuen Gestalt. Die Kreatur
  kann die Ausrüstung Gegenstand in Kreatur: nicht verwenden oder anderweitig nutzen. Du kannst einen Gegenstand in eine beliebige
  Kreatur verwandeln, sofern die Kreatur nicht größer als der Gegenstand ist und ihr Herausforderungsgrad höchstens 9 beträgt.
  Die Kreatur ist dir und deinen Verbündeten freundlich gesinnt. Im Kampf ist sie unmittelbar nach dir am Zug, und sie gehorcht
  deinen Befehlen. Wenn der Zauber länger als eine Stunde andauert, kannst du die Kreatur nicht mehr kontrollieren. Sie kann
  dir freundlich gesinnt bleiben, je nachdem, Kreatur in Gegenstand: wie du sie behandelt hast. Verwandelst du eine Kreatur
  in einen Gegenstand, so verwandelt sie sich mit allem, was sie trägt und in der Hand hält. Der Gegenstand darf nicht größer
  sein als die Kreatur. Die Spielwerte der Kreatur werden zu denen des Gegenstands. Wenn der Zauber endet und das Ziel wieder
  seine ursprüngliche Gestalt annimmt, besitzt es keine Erinnerungen an die Zeit, die es als Gegenstand verbracht hat.'
source_book: SRD 5.2 DE
