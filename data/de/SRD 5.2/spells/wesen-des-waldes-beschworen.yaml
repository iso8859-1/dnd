id: wesen-des-waldes-beschworen
type: spell
template: spell
name: Wesen des Waldes beschwören
lang: de
level: 4
school: Beschwörungszauber
casting_time: Aktion
range: Selbst
components: V, G
duration: Konzentration, bis zu 10 Minuten
description: 'Du beschwörst Naturgeister, die dich für die Wirkungsdauer in einer Ausströmung von drei Metern umschwirren.
  Wann immer die Ausströmung in den Bereich einer Kreatur gelangt, die du sehen kannst, und wann immer eine Kreatur, die du
  sehen kannst, die Ausströmung betritt oder ihren Zug dort beendet, kannst du die Kreatur zu einem Weisheitsrettungswurf
  zwingen. Misslingt der Wurf, so erleidet die Kreatur 5W8 Energieschaden, anderenfalls die Hälfte. Eine Kreatur kann diesen
  Rettungswurf nur einmal pro Zug ausführen. Außerdem kannst du für die Wirkungsdauer des Zaubers die Rückzug‑Aktion als Bonusaktion
  Verwenden von Zauberplätzen höheren Grades: ausführen. Für jeden Zauberplatzgrad über dem 4. wird der Schaden um 1W8 erhöht.'
source_book: SRD 5.2 DE
