id: fesselnder-schlag
type: spell
template: spell
name: Fesselnder Schlag
lang: de
level: 1
school: Beschwörungszauber
casting_time: Bonusaktion, die du sofort ausführst,
range: Selbst
components: V
duration: Konzentration, bis zu 1 Minute
description: 'wenn du eine Kreatur mit einer Waffe getroffen hast Wenn du das Ziel triffst, erscheinen greifende Ranken an
  ihm, und es führt einen Stärkerettungswurf aus. Kreaturen von mindestens großer Größe sind bei diesem Rettungswurf im Vorteil.
  Misslingt der Wurf, so ist das Ziel festgesetzt, bis der Zauber endet. Bei einem erfolgreichen Rettungswurf verwelken die
  Ranken, und der Zauber endet. Während das Ziel festgesetzt ist, erleidet es zu Beginn jedes seiner Züge 1W6 Stichschaden.
  Das Ziel oder eine Kreatur in seiner Reichweite kann mit einer Aktion einen Stärkewurf (Athletik) gegen deinen Zauberrettungswurf-SG
  ausführen. Verwenden von Zauberplätzen höheren Grades: Bei einem Erfolg endet der Zauber. Für jeden Zauberplatzgrad über
  dem 1. wird der Schaden um 1W6 erhöht.'
source_book: SRD 5.2 DE
