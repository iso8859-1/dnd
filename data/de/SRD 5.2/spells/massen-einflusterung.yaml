name: Massen-Einflüsterung
lang: de
level: 6
school: Verzauberungszauber
casting_time: Aktion
range: 18 Meter
components: V, M (eine Schlangenzunge)
duration: 24 Stunden
description: 'Du schlägst bis zu zwölf Kreaturen in Reichweite, die du sehen kannst und die dich hören und verstehen können,
  mit höchstens 25 Worten eine Vorgehens- weise vor. Der Vorschlag muss realistisch klingen und darf nichts enthalten, was
  den Zielen oder ihren Verbündeten Schaden zufügen würde. Du könntest beispielsweise sagen: „Geht ins Dorf an dieser Straße
  und helft den Leuten dort bis zum Sonnenuntergang bei der Ernte.“ Oder du könntest sagen: „Dies ist nicht die Zeit für Gewalt.
  Lasst Eure Waffen fallen und tanzt! Hört in einer Stunde wieder auf damit.“ Jedes Ziel muss einen Weisheitsrettungswurf
  bestehen, oder es ist für die Wirkungsdauer - oder bis du oder deine Verbündeten ihm Schaden zufügen - bezaubert. Jedes
  bezauberte Ziel führt den Vorschlag nach besten Kräften aus. Die vorge- schlagene Aktivität kann während der gesamten Wirkungsdauer
  fortgesetzt werden. Wenn sie jedoch in kürzerer Zeit abgeschlossen werden kann, endet der Zauber bei einem Ziel, sobald
  es die Aktivität Verwenden von Zauberplätzen höheren Grades: ausgeführt hat. Die Wirkungsdauer wird erhöht: bei einem Zauber-
  platzgrad von 7 auf 10 Tage, bei einem Zauberplatz grad von 8 auf 30 Tage und bei einem Zauberplatzgrad von 9 auf 366 Tage.'
source_book: SRD 5.2 DE
