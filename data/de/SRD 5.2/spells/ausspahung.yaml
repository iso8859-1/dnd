id: ausspahung
type: spell
template: spell
name: Ausspähung
lang: de
level: 5
school: Erkenntniszauber
casting_time: 10 Minuten
range: Selbst
components: V, G, M (ein Fokus im Wert von mindestens 1.000 GM, beispielsweise eine Kristallkugel, ein Spiegel oder ein mit
  Wasser gefülltes Becken)
duration: Konzentration, bis zu 10 Minuten
description: Du kannst eine Kreatur deiner Wahl, die sich auf derselben Existenzebene wie du befindet, hören und sehen. Das
  Ziel führt einen Weisheitsrettungswurf aus, der dadurch modifiziert wird, wie gut du das Ziel kennst und ob du einen Gegenstand
  hast, der dich mit ihm verbindet (siehe Tabellen unten). Das Ziel weiß nicht, wogegen es den Rettungswurf ausführt. Es fühlt
  sich nur vage unwohl. Rettungswurf- Dein Wissen über das Ziel ist ...Modifikator ... aus zweiter Hand (du hast von dem +5
  Ziel gehört) ... aus erster Hand (du bist dem Ziel +0 begegnet) ... umfassend (du kennst das Ziel gut)−5 Rettungswurf- Du
  hast etwas vom Ziel, und zwar ...Modifikator ... ein Abbild oder Porträt−2 ... ein Kleidungsstück oder anderen −4 Besitz
  ... ein Körperteil, eine Haarlocke oder −10 ein Nagelstück Bei einem erfolgreichen Rettungswurf ist das Ziel nicht betroffen,
  und du kannst diesen Zauber erst nach 24 Stunden erneut auf das Ziel wirken. Misslingt der Wurf, so erschafft der Zauber
  einen unsichtbaren, immateriellen Sensor im Abstand von bis zu drei Metern vom Ziel. Du kannst durch den Sensor hören und
  sehen, als ob du dich in seinem Bereich befändest. Der Sensor bewegt sich mit dem Ziel und bleibt für die Wirkungsdauer
  im Abstand von bis zu drei Metern von ihm. Wer den Sensor sehen kann, sieht ihn als leuchtende, etwa faustgroße Kugel. Anstelle
  einer Kreatur kannst du auf einen Ort zielen, den du schon einmal gesehen hast. In diesem Fall erscheint der Sensor an diesem
  Ort und bewegt sich nicht.
source_book: SRD 5.2 DE
