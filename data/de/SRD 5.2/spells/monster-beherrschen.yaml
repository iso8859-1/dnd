id: monster-beherrschen
type: spell
template: spell
name: Monster beherrschen
lang: de
level: 8
school: Verzauberungszauber
casting_time: Aktion
range: 18 Meter
components: V, G
duration: Konzentration, bis zu 1 Stunde
description: 'Eine Kreatur deiner Wahl in Reichweite, die du sehen kannst, muss einen Weisheitsrettungswurf bestehen, oder
  sie ist für die Wirkungsdauer bezaubert. Wenn du oder deine Verbündeten gegen das Ziel kämpfen, ist es beim Rettungswurf
  im Vorteil. Wann immer das Ziel Schaden erleidet, wiederholt es den Rettungswurf. Bei einem Erfolg endet der Zauber bei
  ihm. Du verfügst über eine telepathische Verbindung mit dem bezauberten Ziel, solange ihr euch auf derselben Existenzebene
  befindet. Diese Verbindung kannst du in deinem Zug nutzen, um dem Ziel Befehle zu erteilen (keine Aktion erforderlich),
  beispielsweise „Greife diese Kreatur an“, „Laufe dorthin“ oder „Hole diesen Gegenstand“. Das Ziel gehorcht in seinem Zug,
  so gut es kann. Wenn es den Befehl ausgeführt hat und keine weiteren Anweisungen von dir erhält, verhält es sich nach seinen
  Wünschen und versucht vor allem, sich zu schützen. Du kannst dem Ziel befehlen, eine Reaktion auszuführen, musst dazu allerdings
  selbst eine Verwenden von Zauberplätzen höheren Grades: Reaktion ausführen. Deine Konzentration kann länger andauern: bei
  einem Zauberplatz des 9. Grades bis zu acht Stunden.'
source_book: SRD 5.2 DE
