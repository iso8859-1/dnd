id: tote-beleben
type: spell
template: spell
name: Tote beleben
lang: de
level: 3
school: Nekromantiezauber
casting_time: 1 Minute
range: 3 Meter
components: V, G, M (ein Tropfen Blut, ein Stück Fleisch und eine Prise Knochenstaub)
duration: Unmittelbar
description: 'Wähle einen Knochenhaufen oder die Leiche eines kleinen oder mittelgroßen Humanoiden in Reichweite Skelett aus.
  Das Ziel wird zu einer untoten Kreatur: zu einem Zombie , wenn du Knochen ausgewählt hast, oder zu einem , wenn du eine
  Leiche ausgewählt hast (jeweilige Wertekästen siehe „Monster“). Du kannst in jedem deiner Züge eine Bonusaktion ausführen,
  um jede Kreatur, die du mit diesem Zauber erschaffen hast und die sich im Abstand von bis zu 18 Metern von dir befindet,
  mental zu befehligen. Handelt es sich um mehrere Kreaturen, so kannst du beliebig viele von ihnen gleichzeitig befehligen,
  wobei jeweils der gleiche Befehl erteilt wird. Du entscheidest über die Aktion und die Bewegung der Kreatur in ihrem nächsten
  Zug. Alternativ kannst du einen allgemeinen Befehl erteilen, beispielsweise eine bestimmte Kammer oder einen Korridor zu
  bewachen. Wenn du keine Befehle erteilst, führt die Kreatur die Ausweichaktion aus und bewegt sich nur, um Schaden zu vermeiden.
  Sobald die Kreatur einen Befehl erhalten hat, führt sie ihn aus, bis die Aufgabe abgeschlossen ist. Die Kreatur steht 24
  Stunden lang unter deiner Kontrolle. Danach folgt sie keinem deiner Befehle mehr. Um für weitere 24 Stunden die Kontrolle
  über die Kreatur zu behalten, musst du diesen Zauber erneut auf die Kreatur wirken, ehe die ersten 24 Stunden abgelaufen
  sind. In diesem Fall verlängerst du die Kontrolle über bis zu vier Kreaturen, die du mit diesem Zauber erschaffen Verwenden
  von Zauberplätzen höheren Grades: hast, anstatt eine neue Kreatur zu erschaffen. Für jeden Zauberplatzgrad über dem 3. erschaffst
  du zwei zusätzliche untote Kreaturen oder verlängerst die Kontrolle über zwei zusätzliche untote Kreaturen. Du benötigst
  für jede Kreatur eine separate Leiche oder einen separaten Knochenhaufen.'
source_book: SRD 5.2 DE
