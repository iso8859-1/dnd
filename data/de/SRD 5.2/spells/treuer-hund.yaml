id: treuer-hund
type: spell
template: spell
name: Treuer Hund
lang: de
level: 4
school: Beschwörungszauber
casting_time: Aktion
range: 9 Meter
components: V, G, M (eine Silberpfeife)
duration: 8 Stunden
description: Du beschwörst in einem freien Bereich in Reichweite, den du sehen kannst, einen geisterhaften Wachhund. Dieser
  bleibt für die Wirkungsdauer bestehen, oder bis ihr euch weiter als 90 Meter voneinander entfernt. Niemand außer dir kann
  den Hund sehen, und er ist immateriell und unverwundbar. Wenn sich ihm eine Kreatur von mindestens kleiner Größe auf höchstens
  neun Meter nähert, ohne zuvor das Kennwort zu sprechen, das du beim Wirken des Zaubers festgelegt hast, bellt der Hund laut.
  Der Hund hat Wahrer Blick mit einer Reichweite von neun Metern. Zu Beginn jedes deiner Züge versucht der Hund, einen Gegner
  im Abstand von bis zu 1,5 Metern von sich zu beißen. Der Gegner muss einen Geschicklich‑ keitsrettungswurf bestehen, oder
  er erleidet 4W8 Energieschaden. In deinen folgenden Zügen kannst du eine magische Aktion ausführen, um den Hund bis zu neun
  Meter weit zu bewegen.
source_book: SRD 5.2 DE
