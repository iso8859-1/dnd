id: einflusterung
type: spell
template: spell
name: Einflüsterung
lang: de
level: 2
school: Verzauberungszauber
casting_time: Aktion
range: 9 Meter
components: V, M (ein Tropfen Honig)
duration: Konzentration, bis zu 8 Stunden
description: 'Du schlägst einer Kreatur in Reichweite, die du sehen kannst und die dich hören und verstehen kann, mit höchstens
  25 Worten eine Vorgehensweise vor. Der Vorschlag muss realistisch klingen und darf nichts enthalten, was dem Ziel oder seinen
  Verbündeten Schaden zufügen würde. Du könntest beispielsweise sagen: „Holt den Schlüssel zur Schatzkammer des Kults und
  gebt ihn mir.“ Oder du könntest sagen: „Hört auf zu kämpfen, verlasst diese Bibliothek friedlich und kehrt nicht zurück.“
  Das Ziel muss einen Weisheitsrettungswurf bestehen, oder es ist für die Wirkungsdauer – oder bis du oder deine Verbündeten
  ihm Schaden zufügen – bezaubert. Das bezauberte Ziel führt den Vorschlag nach besten Kräften aus. Die vorge- schlagene Aktivität
  kann während der gesamten Wirkungsdauer fortgesetzt werden. Wenn sie jedoch in kürzerer Zeit abgeschlossen werden kann,
  endet der Zauber beim Ziel, sobald es die Aktivität ausgeführt hat.'
source_book: SRD 5.2 DE
