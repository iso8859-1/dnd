id: lautloses-trugbild
type: spell
template: spell
name: Lautloses Trugbild
lang: de
level: 1
school: Illusionszauber
casting_time: Aktion
range: 18 Meter
components: V, G, M (ein Stück Vlies)
duration: Konzentration, bis zu 10 Minuten
description: 'Du erschaffst das Abbild eines Gegenstands, einer Kreatur oder eines anderen sichtbaren Phänomens, das nicht
  größer als ein Würfel mit 4,5 Metern Kantenlänge sein darf. Das Abbild erscheint an einem Punkt in Reichweite und bleibt
  für die Wirkungsdauer bestehen. Es ist ein rein visueller Eindruck ohne Geräusche, Gerüche oder andere Sinneseffekte. Als
  magische Aktion kannst du das Abbild an jeden beliebigen Punkt in Reichweite bewegen. Dabei kannst du das Abbild so verändern,
  dass seine Bewegung natürlich erscheint. Beispiel: Wenn du das Abbild einer Kreatur erschaffst und bewegst, kannst du es
  so verändern, dass es zu laufen scheint. Physische Interaktionen mit dem Abbild enttarnen es als Illusion, da Dinge es einfach
  durchdringen können. Eine Kreatur, die das Abbild mit der Studieren-Aktion untersucht, kann mit einem erfolgreichen Intelligenzwurf
  (Nachforschungen) gegen deinen Zauberrettungswurf-SG erkennen, dass es sich um eine Illusion handelt. Erkennt eine Kreatur
  die Illusion als solche, so wird das Abbild für sie durchscheinend.'
source_book: SRD 5.2 DE
