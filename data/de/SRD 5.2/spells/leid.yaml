id: leid
type: spell
template: spell
name: Leid
lang: de
level: 6
school: Nekromantiezauber
casting_time: Aktion
range: 18 Meter
components: V, G
duration: Unmittelbar
description: Du entfesselst virulente Magie auf eine Kreatur in Reichweite, die du sehen kannst. Das Ziel führt einen Konstitutionsrettungswurf
  aus. Misslingt der Wurf, so erleidet es 14W6 nekrotischen Schaden, und sein Trefferpunktemaximum wird um den Betrag des
  erlittenen nekrotischen Schadens verringert. Bei einem erfolgreichen Rettungswurf erleidet das Ziel nur halb so viel Schaden.
  Dieser Zauber kann das Trefferpunktemaximum des Ziels nicht unter 1 verringern.
source_book: SRD 5.2 DE
