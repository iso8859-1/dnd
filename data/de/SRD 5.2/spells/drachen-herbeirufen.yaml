description: 'Du rufst einen Drachengeist herbei. Er erscheint in einem freien Bereich in Reichweite, den du sehen Drakonischen
  Geists kannst, und verwendet den Wertekasten eines . Die Kreatur verschwindet, wenn ihre Trefferpunkte auf 0 sinken oder
  der Zauber endet. Die Kreatur ist mit dir und deinen Verbündeten verbündet. Im Kampf nutzt sie deinen Initiativewert und
  ist direkt nach dir am Zug. Sie gehorcht deinen mündlichen Befehlen (keine Aktion deinerseits erforderlich). Befiehlst du
  ihr nichts, so führt sie die Ausweichaktion aus und nutzt ihre Bewegung, Verwenden von Zauberplätzen höheren Grades: um
  Gefahren zu vermeiden. Verwende den Zauberplatzgrad als Zaubergrad im Wertekasten. MODRWMODRWMODRW S 19+4+4G 14+2+2K 17+3+3
