description: 'Dieser Zauber transportiert dich und bis zu acht bereitwillige Kreaturen (oder aber einen Gegenstand) in Reichweite,
  die du sehen kannst, sofort an einen von dir gewählten Ort. Ein Gegenstand muss von höchstens großer Größe sein und darf
  nicht von einer Kreatur gehalten oder getragen werden, die nicht bereitwillig ist. Der Zielort muss dir bekannt sein und
  sich auf derselben Existenzebene wie du befinden. Deine Vertrautheit mit dem Zielort bestimmt, ob du erfolgreich dort eintriffst.
  Der SL würfelt mit 1W100 und konsultiert die Tabelle „Ergebnis der Teleportation“ sowie die entsprechenden EErrlgäeubtenriusn
  dgeern .Teleportation Ähn-Abseits Miss-liches des  Am VertrautheitgeschickGebietZielortsZielort Dauerhafter Kreis−−−1–100
  Bezugsgegenstand−−−1–100 Sehr vertraut1–56–1314–2425–100 Mehrfach gesehen1–3334–4344–5354–100 Einmal gesehen 1–4344–5354–7374–100
  oder Beschreibung erhalten Falscher Zielort1–5051–100−− Vertrautheit: Hier werden die Bedeutungen der Begriffe in der Spalte
  „Vertrautheit“ der Tabelle erläutert: • Mit „Dauerhafter Kreis“ ist ein dauerhafter Kreis der Teleportation gemeint, dessen
  Siegelsequenz dir bekannt ist. • „Bezugsgegenstand“ bedeutet, dass du einen Gegenstand besitzt, der innerhalb der letzten
  sechs Monate vom gewünschten Zielort genommen wurde, beispielsweise ein Buch aus der Bibliothek eines Magiers. • „Sehr vertraut“
  beschreibt einen Ort, den du oft aufgesucht oder genau studiert hast oder den du beim Wirken des Zaubers sehen kannst. •
  „Mehrfach gesehen“ bezeichnet einen Ort, den du mehr als einmal gesehen hast, mit dem du jedoch nicht sehr vertraut bist.
  • „Einmal gesehen oder Beschreibung erhalten“ beschreibt einen Ort, den du einmal gesehen hast, wahrscheinlich durch Magie,
  oder der dir beschrieben wurde, vielleicht anhand einer Karte. • „Falscher Zielort“ bedeutet, dass ein Ort nicht existiert.
  Vielleicht hast du versucht, das Sanktum eines Gegners magisch auszuspähen, konntest jedoch nur eine Illusion sehen. Oder
  du versuchst, dich ein einen Ort zu teleportieren, der nicht Missgeschick: mehr existiert. Die unberechenbare Magie des
  Zaubers führt zu einer unglückseligen Reise. Jede teleportierte Kreatur (oder der Zielgegenstand) erleidet 3W10 Energieschaden.
  Zudem würfelt der SL anhand der Tabelle, um zu bestimmen, wo ihr landet. Es kann zu mehreren Missgeschicken Ähnliches Gebiet:
  kommen, die jeweils Schaden bewirken. Du erscheinst mit deiner Gruppe (oder dem Gegenstand) in einem anderen Gebiet, das
  dem Zielort visuell oder thematisch ähnlich ist. Du erscheinst am nächstgelegenen ähnlichen Ort. Wenn du beispielsweise
  in dein Labor teleportieren wolltest, könntest du in das Labor einer anderen Abseits des Zielorts: Person in der gleichen
  Stadt gelangen. Du erscheinst mit deiner Gruppe (oder dem Gegenstand) in 2W12 mal 1,6 Kilometern abseits des Zielorts. Würfle
  mit 1W8, um die Richtung zu bestimmen: 1: Osten, 2: Südosten, 3: Süden, 4: Südwesten, 5: Westen, 6: Nordwesten, Am Zielort:
  7: Norden, 8: Nordosten. Du erscheinst mit deiner Gruppe (oder dem Gegenstand) dort, wo du hinwolltest.'
source_book: SRD 5.2 DE
