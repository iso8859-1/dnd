id: feenfeuer
type: spell
template: spell
name: Feenfeuer
lang: de
level: 1
school: Hervorrufungszauber
casting_time: Aktion
range: 18 Meter
components: V
duration: Konzentration, bis zu 1 Minute
description: Gegenstände innerhalb eines Würfels mit sechs Metern Kantenlänge in Reichweite werden von blauem, grünem oder
  violettem Licht (nach deiner Wahl) umrahmt. Auch Kreaturen im Würfel werden umrahmt, es sei denn, sie bestehen einen Geschick‑
  lichkeitsrettungswurf. Betroffene Gegenstände und Kreaturen spenden für die Wirkungsdauer in einem Radius von drei Metern
  dämmriges Licht und profitieren nicht von Unsichtbarkeit. Angreifer sind bei Angriffswürfen gegen betroffene Kreaturen oder
  Gegenstände im Vorteil, sofern sie ihr Ziel sehen können.
source_book: SRD 5.2 DE
