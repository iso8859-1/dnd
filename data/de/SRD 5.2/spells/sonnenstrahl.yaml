id: sonnenstrahl
type: spell
template: spell
name: Sonnenstrahl
lang: de
level: 6
school: Hervorrufungszauber
casting_time: Aktion
range: Selbst
components: V, G, M (eine Lupe)
duration: Konzentration, bis zu 1 Minute
description: Du verschießt einen Sonnenstrahl in einer 1,5 Meter breiten und 18 Meter langen Linie. Jede Kreatur in der Linie
  führt einen Konstitutionsrettungswurf aus. Misslingt der Wurf, so erleidet die Kreatur 6W8 gleißenden Schaden und ist bis
  zum Beginn deines nächsten Zugs blind. Bei einem erfolgreichen Rettungswurf erleidet das Ziel nur halb so viel Schaden.
  Bis der Zauber endet, kannst du eine magische Aktion ausführen, um eine neue gleißende Linie zu erschaffen. Für die Wirkungsdauer
  erstrahlt ein heller Funke über dir. Er spendet in einem Radius von neun Metern helles Licht und in einem Radius von weiteren
  neun Metern dämmriges Licht. Beim Licht handelt es sich um Sonnenlicht.
source_book: SRD 5.2 DE
