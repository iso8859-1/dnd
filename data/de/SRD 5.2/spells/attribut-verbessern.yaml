description: 'Du berührst eine Kreatur und wählst Charisma, Geschicklichkeit, Intelligenz, Stärke oder Weisheit aus. Für die
  Wirkungsdauer ist das Ziel bei Attributs‑ Verwenden von Zauberplätzen höheren Grades: würfen mit dem ausgewählten Attribut
