id: gedanken-wahrnehmen
type: spell
template: spell
name: Gedanken wahrnehmen
lang: de
level: 2
school: Erkenntniszauber
casting_time: Aktion
range: Selbst
components: V, G, M (1 Kupfermünze)
duration: Konzentration, bis zu 1 Minute
description: 'Du aktivierst einen der nachstehenden Effekte. Bis der Zauber endet, kannst du jeweils einen der Effekte als
  magische Aktion in deinen folgenden Gedanken spüren: Zügen aktivieren. Du spürst Gedanken von Kreaturen im Abstand von bis
  zu neun Metern von dir, die Sprachen oder Telepathie beherrschen. Du kannst die Gedanken zwar nicht lesen, weißt aber, dass
  eine denkende Kreatur anwesend ist. Der Zauber wird von 30 Zentimetern Stein, Erde oder Holz sowie von 2,5 Zentimetern Metall
  oder Gedanken lesen: einer dünnen Bleischicht blockiert. Ziele auf eine Kreatur im Abstand von bis zu neun Metern von dir,
  die du sehen kannst oder mit der Option Gedanken spüren entdeckt hast. Du erfährst, was die Kreatur im Augenblick am meisten
  beschäftigt. Wenn das Ziel weder Sprachen noch Telepathie beherrscht, erfährst du nichts. Als magische Aktion im nächsten
  Zug kannst du versuchen, tiefer in den Verstand des Ziels einzudringen. In diesem Fall führt das Ziel einen Weisheitsrettungswurf
  aus. Misslingt der Wurf, so erhältst du Einsicht in seine Beweggründe und Emotionen sowie in etwas, das seine Gedanken beherrscht
  (beispielsweise Sorgen, Liebe oder Hass) Bei einem erfolgreichen Rettungswurf endet der Zauber. In jedem Fall merkt das
  Ziel, dass du in seinen Verstand eindringst. Solange du deine Aufmerksamkeit auf seinen Verstand richtest, kann es als Aktion
  in seinem Zug einen Intelligenzwurf (Arkane Kunde) gegen deinen Zauberrettungswurf‑SG ausführen. Bei einem Erfolg endet
  der Zauber.'
source_book: SRD 5.2 DE
