id: tageslicht
type: spell
template: spell
name: Tageslicht
lang: de
level: 3
school: Hervorrufungszauber
casting_time: Aktion
range: 18 Meter
components: V, G
duration: 1 Stunde
description: Für die Wirkungsdauer breitet sich Sonnenlicht von einem Punkt in Reichweite zu einer Kugel mit einem Radius
  von 18 Metern aus. Beim Bereich des Sonnenlichts handelt es sich um helles Licht. Er spendet im Radius von weiteren 18 Metern
  dämmriges Licht. Alternativ kannst du den Zauber auf einen Gegenstand wirken, der nicht getragen oder gehalten wird. In
  diesem Fall erfüllt das Sonnenlicht eine Ausströmung von 18 Metern, die vom Gegenstand ausgeht. Wird der Gegenstand mit
  etwas Undurchsichtigem wie einer Schüssel oder einem Helm bedeckt, so wird das Sonnenlicht blockiert. Wenn sich der Wirkungsbereich
  dieses Zaubers mit einem Bereich von Dunkelheit überschneidet, der durch einen Zauber des höchstens 3. Grades erzeugt wurde,
  so wird der andere Zauber gebannt.
source_book: SRD 5.2 DE
