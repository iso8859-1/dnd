id: gutes-und-boses-entdecken
type: spell
template: spell
name: Gutes und Böses entdecken
lang: de
level: 1
school: Erkenntniszauber
casting_time: Aktion
range: Selbst
components: V, G
duration: Konzentration, bis zu 10 Minuten
description: Für die Wirkungsdauer spürst du, ob und wo genau sich Aberrationen, celestische Wesen, Elementare, Feenwesen,
  Unholde oder Untote im Abstand von Weihen bis zu neun Metern von dir befinden. Außerdem spürst du, ob und wo genau der Zauber  in
  diesem Bereich aktiv ist. Der Zauber wird von 30 Zentimetern Stein, Erde oder Holz sowie von 2,5 Zentimetern Metall oder
  einer dünnen Bleischicht blockiert.
source_book: SRD 5.2 DE
