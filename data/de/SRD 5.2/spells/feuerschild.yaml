id: feuerschild
type: spell
template: spell
name: Feuerschild
lang: de
level: 4
school: Hervorrufungszauber
casting_time: Aktion
range: Selbst
components: V, G, M (etwas Phosphor oder ein Glühwürmchen)
duration: 10 Minuten
description: Für die Wirkungsdauer umgeben feine Flammen deinen Körper und spenden in einem Radius von drei Metern helles
  Licht und in einem Radius von weiteren drei Metern dämmriges Licht. Die Flammen verleihen dir einen Wärmeschild oder einen
  Kälteschild (nach deiner Wahl). Der Wärmeschild gewährt dir Resistenz gegen Kälteschaden, der Kälteschild Resistenz gegen
  Feuerschaden. Wann immer dich eine Kreatur im Abstand von bis zu 1,5 Metern von dir mit einem Nahkampf‑ angriffswurf trifft,
  geht der Schild außerdem in Flammen auf. Der Angreifer erleidet 2W8 Feuerschaden durch einen Wärmeschild oder 2W8 Kälteschaden
  durch einen Kälteschild.
source_book: SRD 5.2 DE
