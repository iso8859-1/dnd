id: magisches-gefass
type: spell
template: spell
name: Magisches Gefäß
lang: de
level: 6
school: Nekromantiezauber
casting_time: 1 Minute
range: Selbst
components: V, G, M (ein Edelstein, ein Kristall oder eine Reliquie im Wert von mindestens 500 GM)
duration: Bis der Zauber gebannt wird
description: Dein Körper verfällt in einen katatonischen Zustand, während deine Seele ihn verlässt und in den Behälter eindringt,
  den du als Materialkomponente des Zaubers verwendest. Während sich deine Seele im Behälter befindet, nimmst du deine Umgebung
  wahr, als würdest du dich im Bereich des Behälters aufhalten. Du kannst dich weder bewegen noch Reaktionen ausführen. Als
  einzige mögliche Aktion kannst du deine Seele bis zu 30 Meter außerhalb des Behälters projizieren und entweder in deinen
  lebendigen Körper zurück kehren – und damit den Zauber beenden – oder versuchen, dich des Körpers eines Humanoiden zu bemächtigen.
  Du kannst versuchen, von einem beliebigen Humanoiden im Abstand von bis zu 30 Metern von dir, den du sehen kannst, Besitz
  zu ergreifen. Schutz vor Gut und BöseSchutzkreis Ausgenommen sind Kreaturen, die unter einem der Zauber  oder stehen. Das
  Ziel führt einen Charismarettungswurf aus. Misslingt der Wurf, so besetzt deine Seele den Körper des Ziels, und seine Seele
  wird im Behälter gefangen. Bei einem erfolgreichen Rettungswurf widersteht das Ziel dir, und du kannst 24 Stunden lang keinen
  weiteren Versuch unternehmen. Sobald du vom Körper einer Kreatur Besitz ergriffen hast, kontrollierst du ihn. Deine Treffer‑
  punkte und Trefferpunktewürfel, deine Werte für Geschicklichkeit, Konstitution und Stärke, deine Bewegungsrate sowie deine
  Sinne werden durch die der Kreatur ersetzt. Deine übrigen Spielwerte behältst du bei. Währenddessen kann die Seele der Kreatur
  die Umgebung um den Behälter mit ihren eigenen Sinnen wahrnehmen. Sie ist jedoch kampfunfähig und kann sich nicht bewegen.
  Während du von einem Körper Besitz ergriffen hast, kannst du als magische Aktion vom Wirtskörper zum Behälter zurückkehren,
  sofern sich dieser im Abstand von bis zu 30 Metern von dir befindet. Dadurch wird die Seele der Kreatur in ihren Körper
  zurückbefördert. Wenn der Wirtskörper stirbt, während du dich darin befindest, stirbt die Kreatur, und du führst einen Charismarettungswurf
  gegen deinen eigenen Zauberrettungswurf‑SG aus. Bei einem Erfolg kehrst du in den Behälter zurück, sofern er sich im Abstand
  von bis zu 30 Metern von dir befindet. Anderenfalls stirbst du. Wenn der Behälter zerstört wird oder der Zauber endet, kehrt
  deine Seele in deinen Körper zurück. Befindet sich dein Körper weiter als 30 Meter von dir entfernt oder ist er tot, so
  stirbst du. Befindet sich die Seele einer anderen Kreatur im Behälter, wenn er zerstört wird, so kehrt sie in ihren Körper
  zurück, sofern er lebendig ist und sich im Abstand von bis zu 30 Metern von ihr befindet. Anderenfalls stirbt die Kreatur.
  Wenn der Zauber endet, wird der Behälter zerstört.
source_book: SRD 5.2 DE
