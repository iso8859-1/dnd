id: energiewand
type: spell
template: spell
name: Energiewand
lang: de
level: 5
school: Hervorrufungszauber
casting_time: Aktion
range: 36 Meter
components: V, G, M (eine Glasscherbe)
duration: Konzentration, bis zu 10 Minuten
description: An einem Punkt deiner Wahl in Reichweite erscheint eine unsichtbare Energiewand. Es kann sich um eine senkrechte,
  waagerechte oder abgewinkelte Barriere in einer Ausrichtung deiner Wahl handeln. Sie kann frei schweben oder auf einer festen
  Oberfläche stehen. Du kannst sie auch zu einer halbkugelförmigen Kuppel oder zu einer Kugel mit einem Radius von bis zu
  drei Metern formen, oder du kannst eine flache Oberfläche aus zehn Platten mit je drei Metern Kantenlänge erschaffen. Jede
  Platte muss an mindestens eine andere angrenzen. Die Wand ist in jeder Form einen halben Zentimeter dick und bleibt für
  die Wirkungsdauer bestehen. Erschaffst du die Wand so, dass sie den Bereich einer Kreatur durchdringt, so wird die Kreatur
  auf eine Seite der Wand (nach deiner Wahl) gestoßen. Nichts kann die Wand physisch durchdringen. Magie bannen Sie ist gegen
  alle Schadensarten immun und kann Auflösung durch  nicht aufgehoben werden. Der Zauber  zerstört die Wand jedoch sofort.
  Die Wand erstreckt sich auch in die Ätherebene und blockiert damit Reisen über diese Ebene.
source_book: SRD 5.2 DE
