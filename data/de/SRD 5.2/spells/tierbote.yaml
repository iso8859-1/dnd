id: tierbote
type: spell
template: spell
name: Tierbote
lang: de
level: 2
school: Verzauberungszauber
casting_time: Aktion oder Ritual
range: 9 Meter
components: V, G, M (ein Happen Nahrung)
duration: 24 Stunden
description: 'Ein winziges Tier deiner Wahl in Reichweite, das du sehen kannst, muss einen Charismarettungswurf bestehen.
  Misslingt der Wurf, so muss das Ziel versuchen, in deinem Namen eine Botschaft zu überbringen (dies gelingt dem Ziel automatisch,
  sofern sein Herausforderungsgrad nicht gleich null ist). Bestimme einen Ort, an dem du schon einmal warst, und einen Empfänger,
  der einer allgemeinen Beschreibung wie „eine Person in Stadtwachenuniform“ oder „ein rothaariger Zwerg mit spitzem Hut“
  entspricht. Dann kommunizierst du eine Botschaft mit bis zu 25 Worten. Das Tier reist für die Wirkungsdauer in Richtung
  Zielort, wobei es in 24 Stunden etwa 40 Kilometer zurücklegt – oder 80 Kilometer, wenn es fliegen kann. Am Zielort übermittelt
  das Tier der Kreatur, die du beschrieben hast, deine Botschaft und imitiert dabei deine Art der Kommunikation. Erreicht
  das Tier während der Wirkungsdauer sein Ziel nicht, so geht die Botschaft verloren, und das Tier kehrt an den Ort zurück,
  an dem du den Zauber gewirkt Verwenden von Zauberplätzen höheren Grades: hast. Für jeden Zauberplatzgrad über dem 2. wird
  die Wirkungsdauer des Zaubers um 48 Stunden erhöht.'
source_book: SRD 5.2 DE
