id: saurepfeil
type: spell
template: spell
name: Säurepfeil
lang: de
level: 2
school: Hervorrufungszauber
casting_time: Aktion
range: 27 Meter
components: V, G, M (ein zerstoßenes Rhabarberblatt)
duration: Unmittelbar
description: 'Auf ein Ziel in Reichweite schießt ein schimmernder grüner Pfeil, der in einem Sprühregen aus Säure explodiert.
  Führe einen Fernkampf‑Zauberangriff gegen das Ziel aus. Bei einem Treffer erleidet das Ziel 4W4 Säureschaden sowie 2W4 Säureschaden
  am Ende seines nächsten Zugs. Bei einem Misserfolg spritzt dennoch genügend Säure auf das Ziel, um ihm Verwenden von Zauberplätzen
  höheren Grades: die Hälfte des anfänglichen Schadens zuzufügen. Für jeden Zauberplatzgrad über dem 2. werden anfänglicher
  sowie späterer Schaden jeweils um 1W4 erhöht.'
source_book: SRD 5.2 DE
