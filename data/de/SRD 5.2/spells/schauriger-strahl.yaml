id: schauriger-strahl
type: spell
template: spell
name: Schauriger Strahl
lang: de
level: 0
school: Hervorrufung
casting_time: Aktion
range: 36 Meter
components: V, G
duration: Unmittelbar
description: 'Du schleuderst einen Strahl aus knisternder Energie. Führe einen Fernkampf-Zauberangriff gegen eine Kreatur
  oder einen Gegenstand in Reichweite aus. Bei einem Treffer erleidet das Ziel 1W10 Zaubertrick-Aufwertung: Energieschaden.
  Der Zauber erzeugt mehr Strahlen, wenn du die 5. (zwei Strahlen), die 11. (drei Strahlen) und die 17. (vier Strahlen) Stufe
  erreichst. Du kannst die Strahlen alle auf dasselbe Ziel oder auf jeweils unterschiedliche Ziele lenken. Führe für jeden
  Strahl einen eigenen Angriffswurf aus.'
source_book: SRD 5.2 DE
