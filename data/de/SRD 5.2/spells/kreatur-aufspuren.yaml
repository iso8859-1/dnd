id: kreatur-aufspuren
type: spell
template: spell
name: Kreatur aufspüren
lang: de
level: 4
school: Erkenntniszauber
casting_time: Aktion
range: Selbst
components: V, G, M (etwas Fell von einem Bluthund)
duration: Konzentration, bis zu 1 Stunde
description: Beschreibe oder nenne eine Kreatur, mit der du vertraut bist. Sofern die Kreatur sich im Abstand von bis zu 300
  Metern von dir befindet, spürst du, in welcher Richtung ihr Aufenthaltsort liegt. Bewegt sich die Kreatur, so weißt du,
  in welche Richtung. Der Zauber kann eine bestimmte dir bekannte Kreatur aufspüren oder die nächste Kreatur einer bestimmten
  Art - wie ein Mensch oder ein Einhorn -, sofern du eine solche Kreatur mindestens einmal aus höchstens neun Metern Entfernung
  gesehen hast. Hat die beschriebene oder genannte Kreatur Fleisch zu SteinVerwandlung eine andere Gestalt angenommen, beispielsweise
  durch die Zauber  oder , so kann dieser Zauber die Kreatur nicht aufspüren. Der Zauber kann die Kreatur auch dann nicht
  aufspüren, wenn Blei den direkten Weg zwischen dir und ihr blockiert - egal, welche Dicke das Blei hat.
source_book: SRD 5.2 DE
