id: sagenkunde
type: spell
template: spell
name: Sagenkunde
lang: de
level: 5
school: Erkenntniszauber
casting_time: 10 Minuten
range: Selbst
components: V, G, M (Weihrauch im Wert von mindestens 250 GM, den der Zauber verbraucht, und vier Stücke Elfenbein im Wert
  von jeweils mindestens 50 GM)
duration: Unmittelbar
description: Nenne oder beschreibe eine berühmte Person, einen berühmten Ort oder einen berühmten Gegenstand. Der Zauber übermittelt
  dir mental eine Zusammenfassung der wichtigen Legenden über das Genannte wie vom SL beschrieben. Dabei kann es sich um wichtige
  Details, amüsante Enthüllungen oder sogar geheimes Wissen handeln. Je mehr Informationen du bereits kennst, desto präzisere
  und detailliertere Informationen erhältst du durch den Zauber. Die erhaltenen Informationen sind korrekt, können aber nach
  Ermessen des SL in bildlicher Sprache oder in Versform übermittelt werden. Wenn das Objekt deines Interesses eigentlich
  nicht berühmt ist, hörst du einige traurige Posaunentöne, und der Zauber misslingt.
source_book: SRD 5.2 DE
