id: vorbestimmtes-trugbild
type: spell
template: spell
name: Vorbestimmtes Trugbild
lang: de
level: 6
school: Illusionszauber
casting_time: Aktion
range: 36 Meter
components: V, G, M (Jadestaub im Wert von mindestens 25 GM)
duration: Bis der Zauber gebannt wird
description: Du erschaffst die Illusion eines Gegenstands, einer Kreatur oder eines anderen sichtbaren Phänomens in Reichweite,
  die von einem bestimmten Auslöser aktiviert wird. Bis dahin ist die Illusion nicht wahrnehmbar. Sie darf nicht größer als
  ein Würfel mit neun Metern Kantenlänge sein. Beim Wirken des Zaubers bestimmst du, wie sich die Illusion verhält und welche
  Geräusche sie macht. Diese vorbestimmte Darbietung kann bis zu fünf Minuten andauern. Tritt der festgelegte Auslöser auf,
  so entsteht die Illusion und verhält sich auf die von dir beschriebene Weise. Sobald die Illusion ihre Darbietung beendet
  hat, verschwindet sie und ist zehn Minuten lang inaktiv. Danach kann sie erneut aktiviert werden. Der Auslöser kann beliebig
  allgemein oder detailliert sein. Er muss jedoch auf sichtbaren und hörbaren Phänomenen basieren, die im Abstand von bis
  zu neun Metern um den Bereich auftreten. Beispielsweise könntest du eine Illusion deiner selbst erschaffen, die andere davor
  warnt, eine Tür mit einer Falle zu öffnen. Physische Interaktionen mit dem Abbild enttarnen es als illusionär, da Dinge
  es einfach durchdringen können. Eine Kreatur, die das Abbild mit der Studieren‑Aktion untersucht, kann mit einem erfolgreichen
  Intelligenzwurf (Nachforschungen) gegen deinen Zauberrettungswurf‑SG erkennen, dass es sich um eine Illusion handelt. Erkennt
  eine Kreatur die Illusion als solche, so wird das Abbild für sie durchscheinend, und sämtliche Geräusche klingen für sie
  hohl.
source_book: SRD 5.2 DE
