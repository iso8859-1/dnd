id: tierform
type: spell
template: spell
name: Tierform
lang: de
level: 8
school: Verwandlungszauber
casting_time: Aktion
range: 9 Meter
components: V, G
duration: 24 Stunden
description: Wähle eine beliebige Anzahl bereitwilliger Kreaturen in Reichweite aus, die du sehen kannst. Jedes Ziel verwandelt
  sich in ein Tier deiner Wahl von höchstens großer Größe mit einem Herausforderungs grad von höchstens 4. Du kannst für jedes
  Ziel eine andere Gestalt bestimmen. In deinen folgenden Zügen kannst du eine magische Aktion ausführen, um die Ziele erneut
  zu verwandeln. Die Spielwerte eines Ziels werden durch die Werte des jeweiligen Tieres ersetzt. Das Ziel behält jedoch seinen
  Kreaturentyp, seine Trefferpunkte sowie Trefferpunktewürfel, seine Gesinnung, seine Kommunikationsfähigkeit sowie seine
  Werte für Intelligenz, Weisheit und Charisma bei. Die Aktionen des Ziels sind durch die Anatomie der Tiergestalt begrenzt.
  Das Ziel kann keine Zauber wirken. Seine Ausrüstung verschmilzt mit der neuen Gestalt, und das Ziel kann seine Ausrüstung
  in dieser Gestalt nicht verwenden. Das Ziel erhält eine Anzahl von temporären Treffer- punkten, die der Anzahl von Trefferpunkten
  der neuen Gestalt entspricht. Nach der Wirkungsdauer dieses Zaubers verbleibende temporäre Treffer- punkte gehen verloren.
  Die Verwandlungsmagie hält für die Wirkungsdauer an, oder bis das Ziel sie als Bonusaktion beendet.
source_book: SRD 5.2 DE
