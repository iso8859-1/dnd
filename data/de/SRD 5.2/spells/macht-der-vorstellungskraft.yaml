id: macht-der-vorstellungskraft
type: spell
template: spell
name: Macht der Vorstellungskraft
lang: de
level: 2
school: Illusionszauber
casting_time: Aktion
range: 18 Meter
components: V, G, M (ein Stück Vlies)
duration: Konzentration, bis zu 1 Minute
description: 'Du versuchst, im Verstand einer Kreatur in Reichweite, die du sehen kannst, eine Illusion zu erschaffen. Das
  Ziel führt einen Intelligenzrettungs- wurf aus. Misslingt der Wurf, so erzeugst du ein geisterhaft sichtbares Phänomen,
  beispielsweise einen Gegenstand oder eine Kreatur. Das Phänomen kann nicht größer sein als ein Würfel mit drei Metern Kantenlänge.
  Es ist nur für die Wirkungsdauer und nur für das Ziel sichtbar. Das Phänomen umfasst auch Geräusche, Temperaturen und andere
  Stimuli. Das Ziel kann die Studieren-Aktion ausführen, um das Phänomen mit einem Intelligenzwurf (Nachfor- schungen) gegen
  deinen Zauberrettungswurf-SG zu untersuchen. Bei einem Erfolg bemerkt das Ziel, dass es sich um eine Illusion handelt, und
  der Zauber endet. Solange das Ziel vom Zauber betroffen ist, behandelt es das Phänomen, als wäre dieses real. Unlogische
  Ergebnisse der Interaktion mit dem Phänomen rationalisiert es. Beispiel: Wenn das Ziel eine geister- hafte Brücke betreten
  will und den Absturz überlebt, so glaubt es weiterhin, die Brücke würde existieren, und sucht sich eine andere Erklärung
  für den Sturz. Das betroffene Ziel kann sogar Schaden durch das Phänomen erleiden, wenn dieses eine gefährliche Kreatur
  oder eine anderweitige Gefahr repräsentiert. Das Phänomen kann dem Ziel in jedem deiner Züge 2W8 psychischen Schaden zufügen,
  sofern das Ziel sich im Bereich des Phänomens oder im Abstand von bis zu 1,5 Metern von ihm aufhält. Das Ziel erlebt den
  Schaden als von einer Art, die zur Illusion passt.'
source_book: SRD 5.2 DE
