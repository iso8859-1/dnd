id: vertrauten-finden
type: spell
template: spell
name: Vertrauten finden
lang: de
level: 1
school: Beschwörungszauber
casting_time: 1 Stunde oder Ritual
range: 3 Meter
components: V, G, M (brennender Weihrauch im Wert von mindestens 10 GM, den der Zauber verbraucht)
duration: Unmittelbar
description: 'Du erhältst die Dienste eines Vertrauten – eines EidechseEuleFalkeFledermausFroschKatze Geistes, der eine Tiergestalt
  deiner Wahl annimmt: OktopusRabeRatteSpinneWiesel , , , , , , , , , ,  oder ein anderes Tier mit einem Herausforderungsgrad
  von 0. Der Vertraute erscheint in einem freien Bereich in Reichweite. Er hat die Spielwerte der gewählten Gestalt (siehe
  „Monster“), ist jedoch tatsächlich ein celestisches Wesen, ein Feenwesen oder ein Unhold (nach deiner Wahl) und kein Tier.
  Dein Vertrauter Telepathische Verbindung: agiert unabhängig von dir, befolgt aber deine Befehle. Solange sich dein Vertrauter
  im Abstand von bis zu 30 Metern von dir befindet, kannst du telepathisch mit ihm kommunizieren. Zudem kannst du als Bonusaktion
  bis zum Beginn deines nächsten Zugs durch die Sinne des Vertrauten hören und sehen. Dabei kannst du auch etwaige Spezialsinne
  des Vertrauten nutzen. Wenn du einen Zauber mit Berührungsreichweite wirkst, kann dein Vertrauter die Berührung ausführen.
  Dazu muss er sich im Abstand von bis zu 30 Metern von dir befinden und die Berührung als Kampf: Reaktion ausführen, wenn
  du den Zauber wirkst. Der Vertraute ist mit dir und deinen Verbündeten verbündet. Er würfelt seine eigene Initiative aus
  und handelt in seinem eigenen Zug. Ein Vertrauter kann nicht angreifen, jedoch andere Aktionen normal ausführen. Verschwinden
  des Vertrauten: Sinken die Treffer‑ punkte des Vertrauten auf 0, so verschwindet er. Er erscheint wieder, wenn du den Zauber
  erneut wirkst. Als magische Aktion kannst du den Vertrauten vorübergehend verwerfen und in eine Taschendimension schicken.
  Alternativ kannst du ihn für immer verwerfen. Wenn du deinen Vertrauten vorübergehend verworfen hast, kannst du ihn als
  magische Aktion in einem freien Bereich im Abstand von bis zu neun Metern von dir wieder erscheinen lassen. Wann immer die
  Trefferpunkte des Vertrauten auf 0 sinken oder der Vertraute in einer Taschendimension verschwindet, bleibt alles, was er
  getragen oder gehalten hat, in seinem Nur ein Vertrauter: Bereich liegen. Du kannst nur jeweils einen Vertrauten haben.
  Wirkst du diesen Zauber, während du einen Vertrauten hast, so lässt du diesen stattdessen eine neue verfügbare Gestalt annehmen.'
source_book: SRD 5.2 DE
