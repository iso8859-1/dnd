duration: Konzentration, bis zu 8 Stunden
description: Für die Wirkungsdauer kontrollierst du das Wetter im Abstand von bis zu acht Kilometern. Du musst dich im Freien
  befinden, wenn du diesen Zauber wirkst. Der Zauber endet vorzeitig, wenn du nach drinnen gehst. Wenn du den Zauber wirkst,
  änderst du die aktuellen Wetterbedingungen, die vom SL bestimmt werden. Du kannst Niederschlag, Temperatur und Wind beeinflussen.
  Es dauert 1W4 mal zehn Minuten, bis die neuen Bedingungen in Kraft treten. Danach kannst du die Bedingungen erneut ändern.
  Wenn der Zauber endet, normalisiert sich das Wetter allmählich. Finde zum Ändern des Wetters eine aktuelle Wetter‑ bedingung
  in der folgenden Tabelle und ändere sie eine Stufe nach oben oder unten. Wenn du den Wind Nänideedresrt,s kcahnlangst du
  auch seine Richtung ändern. StufeBedingung 1Wolkenlos 2Leicht bewölkt 3Bewölkt oder Bodennebel 4Regen, Hagel oder Schnee
  5Starkregen, Hagelsturm oder Schneesturm TemperaturWind StufeBedingungStufeBedingung 1Extrem heiß1Flaute 2Heiß2Mäßiger Wind
  3Warm3Starker Wind 4Kühl4Starke Böen 5Kalt5Sturm 6Eisig
source_book: SRD 5.2 DE
