id: arkanes-schwert
type: spell
template: spell
name: Arkanes Schwert
lang: de
level: 7
school: Hervorrufungszauber
casting_time: Aktion
range: 27 Meter
components: V, G, M (ein Miniaturschwert im Wert von mindestens 250 GM)
duration: Konzentration, bis zu 1 Minute
description: Du erschaffst ein geisterhaftes Schwert, das in Reichweite schwebt. Die Kugel bleibt für die Wirkungsdauer bestehen.
  Wenn das Schwert erscheint, kannst du einen Nahkampf-Zauberangriff gegen ein Ziel im Abstand von bis zu 1,5 Metern vom Schwert
  ausführen. Bei einem Treffer erleidet das Ziel Energieschaden in Höhe von 4W12 plus deinem Zauberwirken- Attributsmodifikator.
  In deinen folgenden Zügen kannst du das Schwert mit einer Bonusaktion bis zu neun Meter weit an einen Ort bewegen, den du
  sehen kannst, und den Angriff gegen dasselbe oder ein anderes Ziel wiederholen.
source_book: SRD 5.2 DE
