name: Fluch
lang: de
level: 3
school: Nekromantiezauber
casting_time: Aktion
range: Berührung
components: V, G
duration: Konzentration, bis zu 1 Minute
description: 'Du berührst eine Kreatur. Diese muss einen Weisheitsrettungswurf bestehen, oder sie ist für die Wirkungsdauer
  verflucht. Bis der Fluch endet, erleidet das Ziel einen der folgenden Effekte deiner Wahl: • Wähle ein Attribut aus. Das
  Ziel ist bei allen Attributs- und Rettungswürfen mit diesem Attribut im Nachteil. • Das Ziel ist bei Angriffswürfen gegen
  dich im Nachteil. • Im Kampf muss das Ziel zu Beginn jedes seiner Züge einen Weisheitsrettungswurf bestehen, oder es ist
  gezwungen, die Ausweichaktion auszuführen. • Wenn du dem Ziel mit einem Angriffswurf oder einem Zauber Schaden zufügst,
  erleidet es zusätzlich 1W8 nekrotischen Schaden. Verwenden von Zauberplätzen höheren Grades: Bei einem Zauberplatz des 4.
  Grades kannst du deine Konzentration auf diesen Zauber bis zu zehn Minuten lang aufrechterhalten. Bei einem Zauberplatz
  ab dem 5. Grad erfordert der Zauber keine Konzentration, und die Wirkungsdauer beträgt acht Stunden (Zauberplatzgrad 5–6)
  oder 24 Stunden (Zauberplatzgrad 7–8). Bei einem Zauberplatz des 9. Grades hält der Zauber an, bis er gebannt wird.'
source_book: SRD 5.2 DE
