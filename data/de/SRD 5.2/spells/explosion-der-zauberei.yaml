description: 'Du wirkst zauberische Energie auf eine Kreatur oder einen Gegenstand in Reichweite. Führe einen Fernkampf‑Zauberangriff
  gegen das Ziel aus. Bei einem Treffer erleidet das Ziel 1W8 Schaden von einer Art deiner Wahl: Blitz, Feuer, Gift, Kälte,
  Psychisch, Säure oder Schall. Wenn du mit einem W8 eine 8 für diesen Zauber würfelst, kannst du mit einem weiteren W8 würfeln
  und das Ergebnis dem Schaden hinzufügen. Wenn du diesen Zauber wirkst, entspricht die maximale Anzahl von W8, die du dem
  Zauberschaden hinzufügen kannst, deinem Zauberwirken‑ Zaubertrick-Aufwertung: Attributsmodifikator. Der Schaden wird um
  jeweils 1W8 erhöht, wenn du die 5. (2W8), die 11. (3W8) und die 17. (4W8) Stufe erreichst.'
source_book: SRD 5.2 DE
