id: verstandigung
type: spell
template: spell
name: Verständigung
lang: de
level: 3
school: Erkenntniszauber
casting_time: Aktion
range: Unbegrenzt
components: V, G, M (ein Stück Kupferdraht)
duration: Unmittelbar
description: Du sendest eine kurze Botschaft von höchstens 25 Worten an eine Kreatur, der du begegnet bist oder die dir von
  jemandem beschrieben wurde, der ihr begegnet ist. Das Ziel hört die Botschaft in seinem Kopf, erkennt dich als Absender,
  sofern es dich kennt, und kann auf gleiche Weise sofort antworten. Der Zauber ermöglicht dem Ziel, die Bedeutung deiner
  Botschaft zu verstehen. Du kannst die Botschaft über beliebige Entfernungen und sogar auf andere Existenzebenen senden.
  Wenn sich das Ziel jedoch auf einer anderen Ebene befindet als du, besteht ein Risiko von fünf Prozent, dass die Botschaft
  nicht ankommt. Ist dies der Fall, so weißt du, dass sie nicht angekommen ist. Wenn eine Kreatur deine Botschaft erhalten
  hat, kann sie für die nächsten acht Stunden verhindern, dass du sie erneut mit diesem Zauber erreichst. Versuchst du in
  diesem Fall, ihr eine weitere Botschaft zu senden, so erfährst du, dass du blockiert wurdest, und der Zauber misslingt.
source_book: SRD 5.2 DE
