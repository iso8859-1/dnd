id: flammenklinge
type: spell
template: spell
name: Flammenklinge
lang: de
level: 2
school: Hervorrufungszauber
casting_time: Bonusaktion
range: Selbst
components: V, G, M (ein SumachBlatt)
duration: Konzentration, bis zu 10 Minuten
description: 'Du erschaffst eine feurige Klinge in deiner freien Hand. Die Klinge ähnelt einem Krummsäbel und bleibt für die
  Wirkungsdauer bestehen. Wenn du die Klinge loslässt, verschwindet sie. Du kannst sie jedoch als Bonusaktion erneut beschwören.
  Du kannst als magische Aktion einen Nahkampf- Zauberangriff mit der Flammenklinge ausführen. Bei einem Treffer erleidet
  das Ziel Feuerschaden in Höhe von 3W6 plus deinem Zauberwirken- Attributsmodifikator. Die Flammenklinge spendet in einem
  Radius von drei Metern helles Licht und in einem Radius von Verwenden von Zauberplätzen höheren Grades: weiteren drei Metern
  dämmriges Licht. Für jeden Zauberplatzgrad über dem 2. wird der Schaden um 1W6 erhöht.'
source_book: SRD 5.2 DE
