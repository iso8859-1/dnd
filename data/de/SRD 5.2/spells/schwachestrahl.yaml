id: schwachestrahl
type: spell
template: spell
name: Schwächestrahl
lang: de
level: 2
school: Nekromantiezauber
casting_time: Aktion
range: 18 Meter
components: V, G
duration: Konzentration, bis zu 1 Minute
description: Du verschießt einen Strahl aus entkräftender Energie auf eine Kreatur in Reichweite. Das Ziel muss einen Konstitutionsrettungswurf
  ausführen. Bei einem erfolgreichen Rettungswurf ist das Ziel bei seinem nächsten Angriffswurf bis zum Beginn deines nächsten
  Zugs im Nachteil. Misslingt der Wurf, so ist das Ziel für die Wirkungsdauer bei W20-Prüfungen, die auf Stärke basieren,
  im Nachteil. Während dieser Dauer zieht es außerdem 1W8 von all seinen Schadenswürfen ab. Das Ziel wiederholt den Rettungswurf
  am Ende jedes seiner Züge. Bei einem Erfolg endet der Zauber.
source_book: SRD 5.2 DE
