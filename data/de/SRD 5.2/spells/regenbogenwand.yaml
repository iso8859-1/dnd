id: regenbogenwand
type: spell
template: spell
name: Regenbogenwand
lang: de
level: 9
school: Bannzauber
casting_time: Aktion
range: 18 Meter
components: V, G
duration: 10 Minuten
description: 'Um einen Punkt in Reichweite entsteht eine undurchsichtige vertikale Wand aus bunt schimmerndem Licht. Die Wand
  ist bis zu 27 Meter lang, neun Meter hoch und 2,5 Zentimeter dick. Alternativ formst du eine Kugel mit einem Radius von
  bis zu 4,5 Metern um einen Punkt in Reichweite. Wand oder Kugel bleibt für die Wirkungsdauer bestehen. Platzierst du die
  Wand in einem Bereich, der von einer Kreatur besetzt ist, so endet der Zauber sofort ohne Effekt. Die Wand spendet in einem
  Radius von 30 Metern helles Licht und in einem Radius von weiteren 30 Metern dämmriges Licht. Du und Kreaturen, die du beim
  Wirken des Zaubers bestimmst, könnt die Wand durchqueren und sich in ihrer Nähe aufhalten, ohne Schaden zu erleiden. Wenn
  eine andere Kreatur, welche die Wand sehen kann, sich ihr auf höchstens sechs Meter nähert oder ihren Zug in diesem Bereich
  beginnt, muss sie einen Konstitutionsrettungswurf bestehen, oder sie ist eine Minute lang blind. Die Wand besteht aus sieben
  Schichten, jede in einer anderen Farbe. Wenn eine Kreatur durch die Wand greift oder geht, geschieht dies Schicht für Schicht
  durch alle sieben Schichten der Wand. Jede Schicht zwingt die Kreatur zu einem Geschicklichkeits‑ rettungswurf. Misslingt
  der Wurf, so ist die Kreatur von den Eigenschaften der Schicht betroffen, wie in der Tabelle „Regenbogenschichten“ beschrieben.
  Die Wand besitzt eine RK von 10. Sie kann auch Schicht für Schicht von Rot nach Violett auf jeweils spezifische Weise zerstört
  werden. Eine Antimagisches Feld zerstörte Schicht bleibt für die Wirkungsdauer Magie verschwunden. Der Zauber  hat bannen
  keine Wirkung auf die Mauer, und der Zauber Regenb koagnenn nsucrh aicuhf tdeien violette Schicht wirken. Reihen- folgeEffekte
  1Rot: Misslungener Rettungswurf: 12W6 Feuerschaden. Erfolgreicher Rettungswurf: Halb so viel Schaden. Zusätzliche Effekte:
  Nichtmagische Fernkampfangriffe können diese Schicht nicht durchdringen. Die Schicht wird zerstört, wenn sie mindestens
  25 Kälteschaden erleidet. 2Orange: Misslungener Rettungswurf: 12W6 Säureschaden. Erfolgreicher Rettungswurf: Halb so viel
  Schaden. Zusätzliche Effekte: Magische Fernkampfangriffe können diese Schicht nicht durchdringen. Die Schicht wird durch
  einen starken Wind (wie solchen durch Windstoß) zerstört. 3Gelb: Misslungener Rettungswurf: 12W6 Blitzschaden. Erfolgreicher
  Rettungswurf: Halb so viel Schaden. Zusätzliche Effekte: Die Schicht wird zerstört, wenn sie mindestens 60 Energieschaden
  erleidet. Reihen- folgeEffekte 4Grün: Misslungener Rettungswurf: 12W6 Giftschaden. Erfolgreicher Rettungswurf: Halb so viel
  Schaden. Zusätzliche Effekte: Die Schicht wird durch den Zauber Wände passieren oder einen Zauber des mindestens gleichen
  Grades zerstört, der auf einer festen Oberfläche ein Portal öffnet. 5Blau: Misslungener Rettungswurf: 12W6 Kälteschaden.
  Erfolgreicher Rettungswurf: Halb so viel Schaden. Zusätzliche Effekte: Die Schicht wird zerstört, wenn sie mindestens 25
  Feuerschaden erleidet. 6Indigoblau: Misslungener Rettungswurf: Das Ziel ist festgesetzt und führt am Ende jedes seiner Züge
  einen Konstitutionsrettungswurf aus. Bei drei erfolgreichen Rettungswürfen endet der Zustand. Bei drei misslungenen Rettungswürfen
  wird das Ziel versteinert, bis es durch einen Effekt wie den des Zaubers Vollständige Genesung befreit wird. Die Erfolge
  und Misserfolge müssen nicht aufeinanderfolgen. Notiere einfach beide, bis das Ziel drei von einem hat. Zusätzliche Effekte:
  Zauber können diese Schicht nicht durchdringen. Die Schicht wird von hellem Licht des Zaubers Tageslicht zerstört. 7Violett:
  Misslungener Rettungswurf: Das Ziel ist blind und führt zu Beginn deines nächsten Zugs einen Weisheitsrettungswurf aus.
  Bei einem erfolgreichen Rettungswurf endet der Zustand. Misslingt der Wurf, so endet der Zustand, und die Kreatur wird auf
  eine andere Existenzebene (nach Wahl des SL) teleportiert. Zusätzliche Effekte: Diese Schicht wird durch den Zauber Magie
  bannen zerstört.'
source_book: SRD 5.2 DE
