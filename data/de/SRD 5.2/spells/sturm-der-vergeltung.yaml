id: sturm-der-vergeltung
type: spell
template: spell
name: Sturm der Vergeltung
lang: de
level: 9
school: Beschwörungszauber
casting_time: Aktion
range: 1,6 Kilometer
components: V, G
duration: Konzentration, bis zu 1 Minute
description: 'Für die Wirkungsdauer bildet sich um einen Punkt in Reichweite eine brodelnde Sturmwolke, die sich in einem
  Radius von 90 Metern ausbreitet. Jede Kreatur unter der Wolke muss einen Konstitutionsrettungswurf bestehen, oder sie erleidet
  2W6 Schallschaden und ist für die Wirkungsdauer taub. Zu Beginn jedes deiner folgenden Züge bringt die Sturmwolke andere
  Effekte hervor wie unten Runde 2: ausgeführt. Es fällt Säureregen. Alle Kreaturen und Gegenstände unter der Wolke erleiden
  4W6 Runde 3: Säureschaden. Du rufst sechs Blitze aus der Wolke hervor, die sechs verschiedene Kreaturen oder Gegenstände
  darunter treffen. Jedes Ziel muss einen Geschicklichkeitsrettungswurf ausführen. Misslingt der Wurf, so erleidet es 10W6
  Blitzschaden, Runde 4: anderenfalls die Hälfte. Hagelkörner prasseln herab. Jede Kreatur Runden 5–10: unter der Wolke erleidet
  2W6 Wuchtschaden. Durch den Bereich unter der Wolke peitschen Windstöße und Eisregen. Jede Kreatur im Bereich erleidet 1W6
  Kälteschaden. Bis der Zauber endet, ist der Bereich schwieriges Gelände sowie komplett verschleiert, Fernkampfangriffe mit
  Waffen sind darin nicht möglich, und es fegen starke Stürme hindurch.'
source_book: SRD 5.2 DE
