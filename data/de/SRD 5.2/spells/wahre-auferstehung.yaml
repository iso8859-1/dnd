id: wahre-auferstehung
type: spell
template: spell
name: Wahre Auferstehung
lang: de
level: 9
school: Nekromantiezauber
casting_time: 1 Stunde
range: Berührung
components: V, G, M (Diamanten im Wert von 25.000 GM, die der Zauber verbraucht)
duration: Unmittelbar
description: Du berührst eine tote Kreatur. Ihr Tod darf höchstens 200 Jahre zurückliegen, und sie darf nicht an Altersschwäche
  gestorben sein. Die Kreatur wird mit allen Trefferpunkten wiederbelebt. Dieser Zauber schließt alle Wunden, neutralisiert
  jedes Gift, heilt alle magischen Krankheiten und bannt sämtliche Flüche, unter denen die Kreatur zum Zeitpunkt ihres Todes
  gelitten hat. Beschädigte oder fehlende Organe und Gliedmaßen werden ersetzt. Wenn die Kreatur untot war, wird ihre nicht-untote
  Gestalt wiederhergestellt. Der Zauber kann einen neuen Körper erschaffen, wenn der ursprüngliche Körper nicht mehr existiert.
  In diesem Fall musst du den Namen der Kreatur aussprechen. Die Kreatur erscheint dann in einem freien Bereich deiner Wahl
  im Abstand von bis zu drei Metern von dir.
source_book: SRD 5.2 DE
