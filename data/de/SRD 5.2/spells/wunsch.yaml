name: Wunsch
lang: de
level: 9
school: Beschwörungszauber
casting_time: Aktion
range: Selbst
components: V
duration: Unmittelbar
description: 'Wunsch ist der mächtigste Zauber, den ein Sterblicher wirken kann. Durch einfaches Aussprechen kann die Realität
  selbst verändert werden. Die grundlegende Verwendung dieses Zaubers besteht darin, einen beliebigen anderen Zauber des höchstens
  8. Grades zu kopieren. Auf diese Art musst du weder die Voraussetzungen erfüllen, um den Zauber zu wirken, noch teure Materialkomponenten
  bezahlen. Der Zauber tritt einfach in Kraft. Alternativ kannst du einen der folgenden Effekte Gegenstand erschaffen: (nach
  deiner Wahl) erzeugen: Du erschaffst einen nichtmagischen Gegenstand im Wert von bis zu 25.000 GM. Dieser darf in keiner
  Abmessung größer als 90 Meter sein. Er erscheint in einem freien Sofortige Gesundheit: Bereich auf dem Boden, den du sehen
  kannst. Du selbst und bis zu zwanzig Kreaturen, die du sehen kannst, erhaltet all eure Trefferpunkte zurück. Du beendest
  zudem Vollständige Genesung alle auf euch wirkenden Effekte, wie unter dem Resistenz: Zauber  beschrieben. Du gewährst bis
  zu zehn Kreaturen, die du sehen kannst, Resistenz gegen eine Schadensart Immunität gegen Zauber: deiner Wahl. Diese Resistenz
  ist dauerhaft. Du verleihst bis zu zehn Kreaturen, die du sehen kannst, acht Stunden lang Immunität gegen einen einzelnen
  Zauber oder Sofortiges Lernen: magischen Effekt. Du ersetzt eines deiner Talente durch ein anderes Talent, das für dich
  in Frage kommt. Du verlierst alle Vorzüge des bisherigen Talents und erhältst die Vorzüge des neuen. Talente, die Voraussetzungen
  für andere Talente Würfelwurf wiederholen: oder Merkmale sind, kannst du nicht ersetzen. Du machst ein kurz zurückliegendes
  Ereignis ungeschehen, indem du eine Wiederholung eines beliebigen Würfelwurfs in der letzten Runde erzwingst (einschließlich
  deines letzten Zugs). Die Realität passt sich Wunsch an das neue Ergebnis an. Beispiel: Der Zauber könnte den misslungenen
  Rettungswurf eines Verbündeten oder den kritischen Treffer eines Gegners ungeschehen machen. Du kannst erzwingen, dass der
  neue Wurf im Vorteil oder im Nachteil ist. Zudem hast du die Wahl, ob das Realität umformen: ursprüngliche oder das neue
  Ergebnis gilt. Du könntest etwas wünschen, das nicht in den anderen Effekten enthalten ist. Beschreibe dazu dem SL deinen
  Wunsch so genau wie möglich. Der SL hat einigen Spielraum bei der Entscheidung, was in einem solchen Fall geschieht. Je
  größer der Wunsch, desto größer auch das Risiko, dass etwas schiefgeht. Der Zauber könnte schlicht misslingen, der gewünschte
  Effekt nur zum Teil erfüllt werden, oder du selbst könntest je nach Formulierung des Wunsches unvorhergesehene Nebenwirkungen
  erleiden. Wenn du dir beispiels- weise einen Bösewicht tot wünschst, könntest du in eine Zukunft katapultiert werden, in
  der er nicht mehr lebt – wodurch du praktisch aus dem Spiel entfernt wirst. Wünschst du dir einen legendären magischen Gegenstand
  oder ein Artefakt, so könntest du zum aktuellen Besitzer des Gegenstands teleportiert werden. Wenn dein Wunsch gewährt wird
  und Konsequenzen für eine ganze Gemeinschaft, Region oder Welt hat, ziehst du wahrscheinlich mächtige Gegner an. Wenn dein
  Wunsch Auswirkungen auf einen Gott hätte, könnten dessen Diener sofort eingreifen, um den Wunsch zu verhindern, oder sie
  könnten dich ermuntern, ihn auf eine bestimmte Art zu wirken. Wenn dein Wunsch das Multiversum zerstören Wunsch würde, misslingt
  er. Wirkst du , um einen anderen Effekt zu erzielen, als einen Zauber zu kopieren, so belastet dich das sehr. Jedes Mal,
  wenn du nach dieser Belastung einen Zauber wirkst, erleidest du 1W10 nekrotischen Schaden pro Zaubergrad. Dieser Effekt
  verschwindet nach einer langen Rast. Der Schaden kann weder verringert noch verhindert werden. Außerdem hast du 2W4 Tage
  lang einen Stärkewert von 3. In dieser Zeit verringerst du mit jedem Tag, an dem du dich ausruhst oder nur leichten Tätigkeiten
  nachgehst, die verbleibende Erholungszeit um zwei Tage. Nicht zuletzt besteht Wunsch ein Risiko von 33 Prozent, dass du
  den Zauber aufgrund dieser Belastung nie wieder wirken kannst.'
source_book: SRD 5.2 DE
