name: Telekinese
lang: de
level: 5
school: Verwandlungszauber
casting_time: Aktion
range: 18 Meter
components: V, G
duration: Konzentration, bis zu 10 Minuten
description: 'Du erhältst die Fähigkeit, Kreaturen oder Gegen- stände mit deinen Gedanken zu bewegen oder zu manipulieren.
  Wenn du den Zauber wirkst – und als magische Aktion in deinen folgenden Zügen, ehe der Zauber endet –, kannst du deinen
  Willen auf ein Ziel (Kreatur oder Gegenstand) in Reichweite richten, das du sehen kannst, und den entsprechenden Effekt
  auslösen. Du kannst in jeder Runde dasselbe Ziel beeinflussen oder ein neues auswählen. Wenn du das Ziel wechselst, ist
  das vorige nicht mehr vom Kreatur: Zauber betroffen. Du kannst versuchen, eine Kreatur von höchstens riesiger Größe zu bewegen.
  Das Ziel muss einen Stärkerettungswurf bestehen, oder du bewegst es um bis zu neun Meter in eine beliebige Richtung in Reichweite
  des Zaubers. Die Kreatur ist bis zum Ende deines nächsten Zugs festgesetzt, und wenn du sie in die Luft hebst, schwebt sie
  und verbleibt dort. Am Ende deines nächsten Zugs fällt sie herunter, sofern du diese Option nicht erneut Gegenstand: auf
  sie anwendest und ihr Rettungswurf misslingt. Du kannst versuchen, einen Gegenstand von höchstens riesiger Größe zu bewegen.
  Wird der Gegenstand weder getragen noch gehalten, so bewegst du ihn automatisch um bis zu neun Meter in eine beliebige Richtung
  in Reichweite des Zaubers. Wenn der Gegenstand von einer Kreatur getragen oder gehalten wird, muss diese Kreatur einen Stärkerettungswurf
  bestehen, oder du entwindest ihr den Gegenstand und bewegst ihn um bis zu neun Meter in eine beliebige Richtung in Reichweite
  des Zaubers. Du kannst mit deinem telekinetischen Griff Gegenstände präzise steuern, beispielsweise ein einfaches Werkzeug
  verwenden.'
source_book: SRD 5.2 DE
