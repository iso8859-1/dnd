id: boser-blick
type: spell
template: spell
name: Böser Blick
lang: de
level: 6
school: Nekromantiezauber
casting_time: Aktion
range: Selbst
components: V, G
duration: Konzentration, bis zu 1 Minute
description: 'Für die Wirkungsdauer werden deine Augen zu einer tiefschwarzen Leere. Eine Kreatur deiner Wahl im Abstand von
  bis zu 18 Metern von dir, die du sehen kannst, muss einen Weisheitsrettungswurf bestehen, oder sie erleidet für die Wirkungsdauer
  einen der folgenden Effekte deiner Wahl. Für die Wirkungsdauer kannst du in jedem deiner Züge eine magische Aktion ausführen,
  um eine andere Kreatur als Ziel auszuwählen. Du kannst jedoch keine Kreatur erneut als Ziel auswählen, die ihren Krank:
  Rettungswurf gegen den Zauber bestanden hat. Panik: Das Ziel ist vergiftet. Das Ziel ist verängstigt. Es muss in jedem seiner
  Züge die Spurt‑Aktion ausführen und sich auf dem sichersten und kürzesten Weg von dir entfernen. Wenn sich das Ziel in einen
  Bereich mindestens 18 Meter von dir entfernt bewegt hat, von dem aus es dich nicht sehen kann, endet dieser Schlaf: Effekt.
  Das Ziel ist bewusstlos. Es erwacht, wenn es Schaden erleidet oder eine andere Kreatur eine Aktion ausführt, um es wachzurütteln.'
source_book: SRD 5.2 DE
