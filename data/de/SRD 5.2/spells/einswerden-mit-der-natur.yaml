id: einswerden-mit-der-natur
type: spell
template: spell
name: Einswerden mit der Natur
lang: de
level: 5
school: Erkenntniszauber
casting_time: 1 Minute oder Ritual
range: Selbst
components: V, G
duration: Unmittelbar
description: 'Du kommunizierst mit Naturgeistern und erlangst Wissen über deine Umgebung. Im Freien gewährt dir der Zauber
  Wissen über den Bereich im Abstand von bis zu 4,8 Kilometern von dir. In Höhlen und anderen natürlichen unterirdischen Umgebungen
  beträgt der Radius 90 Meter. Der Zauber funktioniert nicht in Gebieten, in denen die Natur durch Bauten ersetzt wurde, beispielsweise
  in Burgen und Siedlungen. Wähle drei der folgenden Optionen aus. Du erfährst diese Fakten, sofern sie zum Bereich des Zaubers
  gehören: • Orte von Siedlungen • Orte von Portalen oder anderen Existenzebenen • Ort einer Kreatur mit einem Herausforderungsgrad
  von mindestens 10 (nach Wahl des SL), die ein celestisches Wesen, ein Elementar, ein Feenwesen, ein Unhold oder ein Untoter
  ist • Die häufigste Art von Pflanze, Mineral oder Tier (nach deiner Wahl) • Orte von Gewässern Du könntest beispielsweise
  den Ort eines mächtigen Monsters im Bereich, den Ort von Gewässern sowie den Ort von Dörfern erfahren.'
source_book: SRD 5.2 DE
