description: Du sprichst ein Wort, das von der Macht der Oberen Ebenen erfüllt ist. Jede Kreatur deiner Wahl in Reichweite
  führt einen Charismarettungswurf aus. Misslingt der Wurf, so erleidet ein Ziel mit höchstens 50 Trefferpunkten einen Effekt
  gemäß seiner aktuellen Trefferpunkte wie in der Tabelle „Effekte von Göttliches Wort“ gezeigt. Unabhängig von ihren Trefferpunkten
  werden Ziele, die celestische Wesen, Elementare, Feenwesen oder Unholde sind und deren Rettungswurf misslingt, auf ihre
  Heimatebene verbannt, sofern sie sich nicht bereits dort befinden. In den nächsten 24 Stunden Wunsch können sie nur mit
  dem Zauber  auf deine Eakffteuketllee  Evobenn Ge zöutrtülicckhkeesh Wreno.rt Treffer- punkteEffekt 0-20Das Ziel stirbt.
  21-30Das Ziel ist eine Stunde lang betäubt, blind und taub. 31-40Das Ziel ist zehn Minuten lang blind und taub. 41-50Das
  Ziel ist eine Minute lang taub.
