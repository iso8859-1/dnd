id: verwirrung
type: spell
template: spell
name: Verwirrung
lang: de
level: 4
school: Verzauberungszauber
casting_time: Aktion
range: 27 Meter
components: V, G, M (drei Nussschalen)
duration: Konzentration, bis zu 1 Minute
description: 'Jede Kreatur in einer Kugel mit einem Radius von drei Metern um einen Punkt deiner Wahl in Reichweite muss einen
  Weisheitsrettungswurf bestehen, oder sie kann weder Bonusaktionen noch Reaktionen ausführen und muss zu Beginn jedes ihrer
  Züge mit 1W10 würfeln, um anhand der nachstehenden Tabelle ihr Verhalten in diesem Zug 1W10Verhalten im Zug zu ermitteln.
  1Das Ziel führt keine Aktion aus und verwendet seine gesamte Bewegungsrate, um sich zu bewegen. Würfle die Richtung mit
  1W4 aus: 1: Norden, 2: Osten, 3: Süden, 4: Westen. 2–6Das Ziel bewegt sich nicht und führt keine Aktionen aus. 7–8Das Ziel
  bewegt sich nicht. Es führt die Angriffsaktion aus, um einen Nahkampfangriff gegen eine zufällige Kreatur in Reichweite
  auszuführen. Wenn sich keine Kreaturen in Reichweite befinden, führt das Ziel keine Aktionen aus. 9–10Das Ziel wählt sein
  Verhalten selbst aus. Ein betroffenes Ziel wiederholt den Rettungswurf am Ende jedes seiner Züge. Bei einem Erfolg endet
  Verwenden von Zauberplätzen höheren Grades: der Zauber bei diesem Ziel. Für jeden Zauberplatzgrad über dem 4. wird der Radius
  der Kugel um 1,5 Meter erhöht.'
source_book: SRD 5.2 DE
