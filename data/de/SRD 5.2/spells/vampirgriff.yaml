id: vampirgriff
type: spell
template: spell
name: Vampirgriff
lang: de
level: 3
school: Nekromantiezauber
casting_time: Aktion
range: Selbst
components: V, G
duration: Konzentration, bis zu 1 Minute
description: 'Die Berührung deiner in Schatten gehüllten Hand kann anderen Kreaturen Lebenskraft entziehen, um dich zu heilen.
  Führe einen Nahkampf-Zauberangriff gegen eine Kreatur in Reichweite aus. Bei einem Treffer erleidet das Ziel 3W6 nekrotischen
  Schaden, und du erhältst Trefferpunkte in Höhe der Hälfte des nekrotischen Schadens zurück. Für die Wirkungsdauer kannst
  du in jedem deiner Züge den Angriff als magische Aktion wiederholen und dabei auf dieselbe oder auf eine andere Kreatur
  Verwenden von Zauberplätzen höheren Grades: zielen. Für jeden Zauberplatzgrad über dem 3. wird der Schaden um 1W6 erhöht.'
source_book: SRD 5.2 DE
