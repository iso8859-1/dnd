id: schwarze-tentakel
type: spell
template: spell
name: Schwarze Tentakel
lang: de
level: 4
school: Beschwörungszauber
casting_time: Aktion
range: 27 Meter
components: V, G, M (ein Tentakel)
duration: Konzentration, bis zu 1 Minute
description: Ein quadratischer Bodenbereich mit sechs Metern Kantenlänge in Reichweite, den du sehen kannst, wird von tiefschwarzen
  zuckenden Tentakeln erfüllt. Die Tentakel verwandeln diesen Bereich für die Wirkungsdauer in schwieriges Gelände. Jede Kreatur
  in diesem Bereich führt einen Stärkerettungswurf aus. Misslingt der Wurf, so erleidet sie 3W6 Wuchtschaden und ist festgesetzt,
  bis der Zauber endet. Auch Kreaturen, die sich in den Bereich begeben oder ihren Zug darin beenden, führen den Rettungswurf
  aus. Jede Kreatur führt den Rettungswurf nur einmal pro Zug aus. Eine festgesetzte Kreatur kann als Aktion einen Stärkewurf
  (Athletik) gegen deinen Zauberrettungs- wurf-SG ausführen. Bei einem Erfolg endet der Zustand bei ihr.
source_book: SRD 5.2 DE
