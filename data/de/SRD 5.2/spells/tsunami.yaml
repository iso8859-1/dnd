name: Tsunami
lang: de
level: 8
school: Beschwörungszauber
casting_time: 1 Minute
range: 1,6 Kilometer
components: V, G
duration: Konzentration, bis zu 6 Runden
description: An einem Punkt deiner Wahl in Reichweite erscheint eine Wasserwand. Du kannst sie bis zu 90 Meter lang, 90 Meter
  hoch und 15 Meter dick sein lassen. Die Wand bleibt für die Wirkungsdauer bestehen. Wenn die Wand erscheint, führt jede
  Kreatur in ihrem Bereich einen Stärkerettungswurf aus. Misslingt der Wurf, so erleidet die Kreatur 6W10 Wuchtschaden, anderenfalls
  die Hälfte. Zu Beginn jedes deiner Züge nach Erscheinen der Wand bewegt diese sich und alle Kreaturen darin um 15 Meter
  von dir weg. Alle Kreaturen von höchstens riesiger Größe, die sich in der Wand befinden oder in deren Bereiche die Wand
  sich bewegt, müssen einen Stärkerettungswurf bestehen, oder sie erleiden 5W10 Wuchtschaden. Eine Kreatur kann diesen Schaden
  nur einmal pro Runde erleiden. Am Ende des Zugs ist die Höhe der Wand um 15 Meter verringert, und der Schaden, den die Wand
  in späteren Runden bewirkt, ist um 1W10 verringert. Wenn die Höhe der Wand auf 0 sinkt, endet der Zauber. Eine Kreatur in
  der Wand kann sich schwimmend bewegen. Aufgrund der Wucht der Welle muss die Kreatur jedoch einen Stärkewurf (Athletik)
  gegen deinen Zauberrettungswurf-SG bestehen, um sich überhaupt bewegen zu können. Misslingt der Wurf, so kann die Kreatur
  sich nicht bewegen. Wenn eine Kreatur die Wand verlässt, fällt sie zu Boden.
source_book: SRD 5.2 DE
