name: Shillelagh
lang: de
level: 0
school: Verwandlung
casting_time: Bonusaktion
range: Selbst
components: V, G, M (ein Mistelzweig)
duration: 1 Minute
description: 'Das Holz eines Knüppels oder Kampfstabs, den du in der Hand hältst, wird von der Macht der Natur erfüllt. Für
  die Wirkungsdauer kannst du bei Angriffs- und Schadenswürfen von Nahkampfangriffen mit dieser Waffe dein Attribut zum Zauberwirken
  anstatt Stärke verwenden, und der Schadenswürfel der Waffe wird zu einem W8. Wenn der Angriff Schaden bewirkt, kann dies
  Energieschaden oder die normale Schadensart der Waffe sein (nach deiner Wahl). Der Zauber endet vorzeitig, wenn du ihn erneut
  Zaubertrick-Aufwertung: wirkst oder die Waffe loslässt. Der Schadenswürfel ändert sich, wenn du die 5. (W10), die 11. (W12)
  und die 17. (2W6) Stufe erreichst.'
source_book: SRD 5.2 DE
