id: kreis-der-teleportation
type: spell
template: spell
name: Kreis der Teleportation
lang: de
level: 5
school: Beschwörungszauber
casting_time: 1 Minute
range: 3 Meter
components: V, M (seltene Tinten im Wert von mindestens 50 GM, die der Zauber verbraucht)
duration: 1 Runde
description: Wenn du den Zauber wirkst, zeichnest du einen Kreis mit einem Radius von 1,5 Metern auf den Boden. In den Kreis
  arbeitest du Siegel ein, die deine aktuelle Position mit einem anderen dauerhaften Kreis der Teleportation deiner Wahl verbinden,
  dessen Siegel sequenz du kennst und der sich auf derselben Existenzebene befindet. Im Kreis öffnet sich ein schimmerndes
  Portal, das bis zum Ende deines nächsten Zugs geöffnet bleibt. Jede Kreatur, die durch das Portal tritt, erscheint sofort
  in einem freien Bereich im Abstand von bis zu 1,5 Metern um den Zielkreis, falls verfügbar, ansonsten im nächsten freien
  Bereich. Viele größere Tempel, Gildenhallen und weitere wichtige Orte verfügen über dauerhafte Kreise der Teleportation.
  Jeder Kreis besitzt eine einzigartige Siegelsequenz, eine Reihe von Runen, die in einem bestimmten Muster angeordnet sind.
  Wenn du diesen Zauber erlernst, erhältst du die Siegelsequenzen zweier Zielorte auf der materiellen Ebene nach Wahl des
  SL. Im Laufe deiner Abenteuer könntest du weitere Siegelsequenzen erfahren. Um eine neue Siegelsequenz zu erlernen, musst
  du sie eine Minute lang studieren. Wenn du diesen Zauber 365 Tage lang täglich am selben Ort wirkst, erschaffst du einen
  dauerhaften Kreis der Teleportation.
source_book: SRD 5.2 DE
