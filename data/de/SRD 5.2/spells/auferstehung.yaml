id: auferstehung
type: spell
template: spell
name: Auferstehung
lang: de
level: 7
school: Nekromantiezauber
casting_time: 1 Stunde
range: Berührung
components: V, G, M (ein Diamant im Wert von mindestens 1.000 GM, den der Zauber verbraucht)
duration: Unmittelbar
description: Du erweckst mit einer Berührung eine tote Kreatur zum Leben, die nicht länger als ein Jahrhundert tot war, nicht
  an Altersschwäche gestorben ist und nicht untot war, als sie starb. Die Kreatur kehrt mit all ihren Trefferpunkten ins Leben
  zurück. Dieser Zauber neutralisiert zudem sämtliche Gifte, die zum Zeitpunkt des Todes auf das Ziel gewirkt haben. Dieser
  Zauber schließt alle tödlichen Wunden und stellt sämtliche abgetrennten Gliedmaßen wieder her. Von den Toten aufzuerstehen
  ist eine Tortur. Das Ziel erleidet einen Malus von −4 auf W20- Prüfungen. Nach jeder langen Rast wird der Malus um 1 verringert,
  bis er 0 beträgt. Wirkst du diesen Zauber, um eine Kreatur zum Leben zu erwecken, die seit mindestens 365 Tagen tot ist,
  so belastet dich das stark. Du kannst erst nach einer langen Rast wieder Zauber wirken und bist bis dahin bei W20‑Prüfungen
  im Nachteil.
source_book: SRD 5.2 DE
