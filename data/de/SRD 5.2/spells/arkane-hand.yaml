id: arkane-hand
type: spell
template: spell
name: Arkane Hand
lang: de
level: 5
school: Hervorrufungszauber
casting_time: Aktion
range: 36 Meter
components: V, G, M (eine Eierschale und ein Handschuh)
duration: Konzentration, bis zu 1 Minute
description: 'Du erschaffst eine große Hand aus schimmernder magischer Energie in einem freien Bereich in Reichweite, den
  du sehen kannst. Die Hand bleibt für die Wirkungsdauer bestehen. Sie bewegt sich auf deinen Befehl und imitiert die Bewegungen
  deiner eigenen Hand. Die Hand ist ein Gegenstand und besitzt eine RK von 20. Ihre Trefferpunkte entsprechen deinem Trefferpunktemaximum.
  Wenn ihre Trefferpunkte auf 0 sinken, endet der Zauber. Die Hand besetzt ihren Bereich nicht. Nach dem Wirken des Zaubers
  sowie als Bonus- aktion in deinen folgenden Zügen kannst du die Hand bis zu 18 Meter weit bewegen und einen der Blockierende
  Hand: folgenden Effekte bewirken: Die Hand gewährt dir Teildeckung gegen Angriffe und andere Effekte, die von ihrem Bereich
  ausgehen oder ihn durchqueren. Außerdem zählt ihr Bereich Geballte Faust: für deine Gegner als schwieriges Gelände. Die
  Hand schlägt ein Ziel im Abstand von bis zu 1,5 Metern von ihr. Führe einen Nahkampf-Zauberangriff aus. Bei einem Greifende
  Hand: Treffer erleidet das Ziel 5W8 Energieschaden. Die Hand versucht, eine Kreatur von höchstens riesiger Größe im Abstand
  von bis zu 1,5 Metern von ihr zu packen. Das Ziel muss einen Geschicklichkeitsrettungswurf bestehen, oder es wird gepackt
  (der Flucht-SG entspricht deinem Zauberrettungswurf-SG). Solange die Hand das Ziel gepackt hat, kannst du eine Bonusaktion
  ausführen, damit sie es zerquetscht. Dabei fügt sie ihm Wuchtschaden in Höhe von 4W6 plus deinem Zauberwirken- Kraftvolle
  Hand: Attributsmodifikator zu. Die Hand versucht, eine Kreatur von höchstens riesiger Größe im Abstand von bis zu 1,5 Metern
  von ihr zu stoßen. Das Ziel muss einen Stärkerettungswurf bestehen, oder die Hand schiebt es bis zu 1,5 Meter plus 1,5-mal
  deinen Zauberwirken-Attributsmodifikator (in Metern) weit in eine Richtung deiner Wahl. Die Hand bewegt sich mit dem Ziel
  und bleibt Verwenden von Zauberplätzen höheren Grades: im Abstand von bis zu 1,5 Metern von ihm. Für jeden Zauberplatzgrad
  über dem 5. wird der Schaden der geballten Faust um 2W8 und der Schaden der greifenden Hand um 2W6 erhöht.'
source_book: SRD 5.2 DE
