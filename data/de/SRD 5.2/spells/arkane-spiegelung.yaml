id: arkane-spiegelung
type: spell
template: spell
name: Arkane Spiegelung
lang: de
level: 7
school: Illusionszauber
casting_time: 10 Minuten
range: Sicht
components: V, G
duration: 10 Tage
description: Du lässt Gelände in einem Bereich von 2,6 Quadrat‑ kilometern wie eine andere Art von Gelände aussehen, riechen
  und sich sogar anfühlen. Weite Felder oder eine Straße können somit wie ein Sumpf, ein Hügel, eine Erdspalte oder anderes
  unwegsames oder unpassierbares Gelände erscheinen. Ein Tümpel kann wie eine grüne Wiese wirken, ein Steilhang wie ein sanftes
  Gefälle, ein Graben voller Felsbrocken wie eine breite Straße. Du kannst auch das Erscheinungsbild von Gebäuden ändern oder
  sie dort platzieren, wo es keine gibt. Der Zauber kann keine Kreaturen verändern, verbergen oder hinzufügen. Die Illusion
  umfasst hörbare, visuelle, berührbare und olfaktorische Elemente, sodass sie sicheres Gelände in schwieriges verwandeln
  (und umgekehrt) oder anderweitig die Bewegung durch das Gebiet beeinträchtigen kann. Jeder Teil des illusionären Geländes
  wie ein Fels oder ein Zweig, der aus dem Bereich des Zaubers entfernt wird, verschwindet sofort. Kreaturen mit Wahrer Blick
  können die Illusion durchschauen und sehen das echte Gelände. Alle anderen Elemente der Illusion bleiben jedoch bestehen.
  Selbst wenn sich eine Kreatur der Illusion bewusst ist, kann sie physisch mit ihr interagieren.
source_book: SRD 5.2 DE
