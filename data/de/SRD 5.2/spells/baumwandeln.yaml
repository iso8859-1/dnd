name: Baumwandeln
lang: de
level: 5
school: Beschwörungszauber
casting_time: Aktion
range: Selbst
components: V, G
duration: Konzentration, bis zu 1 Minute
description: Du erhältst die Fähigkeit, einen Baum zu betreten und aus einem anderen Baum derselben Art im Abstand von bis
  zu 150 Metern wieder herauszusteigen. Beide Bäume müssen lebendig und mindestens so groß wie du sein. Es kostet 1,5 Meter
  Bewegung, den Baum zu betreten. Du erfährst sofort die Position aller anderen Bäume derselben Art im Abstand von bis zu
  150 Metern. Als Teil der Bewegung, um den Baum zu betreten, kannst du entweder in einen dieser Bäume wechseln und oder aus
  dem Baum heraustreten, in dem du dich befindest. Du erscheinst in einem Bereich deiner Wahl im Abstand von bis zu 1,5 Metern
  vom Zielbaum, was dich weitere 1,5 Meter Bewegung kostet. Hast du keine Bewegungsrate übrig, so erscheinst du im Abstand
  von bis zu 1,5 Metern vom Baum, den du betreten hast. Du kannst diese Transportmöglichkeit nur einmal in jedem deiner Züge
  anwenden. Du musst jeden Zug außerhalb eines Baums beenden.
source_book: SRD 5.2 DE
