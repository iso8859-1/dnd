id: monster-festhalten
type: spell
template: spell
name: Monster festhalten
lang: de
level: 5
school: Verzauberungszauber
casting_time: Aktion
range: 27 Meter
components: V, G, M (ein gerades Stück Eisen)
duration: Konzentration, bis zu 1 Minute
description: 'Wähle eine Kreatur in Reichweite aus, die du sehen kannst. Das Ziel muss einen Weisheitsrettungswurf bestehen,
  oder es ist für die Wirkungsdauer gelähmt. Das Ziel wiederholt den Rettungswurf am Ende jedes Verwenden von Zauberplätzen
  höheren Grades: seiner Züge. Bei einem Erfolg endet der Zauber. Für jeden Zauberplatzgrad über dem 5. kannst du auf eine
  weitere Kreatur zielen.'
source_book: SRD 5.2 DE
