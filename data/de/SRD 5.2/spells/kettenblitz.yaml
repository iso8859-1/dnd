id: kettenblitz
type: spell
template: spell
name: Kettenblitz
lang: de
level: 6
school: Hervorrufungszauber
casting_time: Aktion
range: 45 Meter
components: V, G, M (drei Silbernadeln)
duration: Unmittelbar
description: 'Du schleuderst einen Blitz auf ein Ziel in Reichweite, das du sehen kannst. Dann springen drei Blitze von diesem
  Ziel auf bis zu drei weitere Ziele deiner Wahl über, die sich im Abstand von bis zu neun Metern vom ersten Ziel befinden
  müssen. Beim Ziel kann es sich um eine Kreatur oder einen Gegenstand handeln. Es kann nur von einem der Blitze getroffen
  werden. Jedes Ziel führt einen Geschicklichkeitsrettungs- wurf aus. Misslingt der Wurf, so erleidet es 10W8 Verwenden von
  Zauberplätzen höheren Grades: Blitzschaden, anderenfalls die Hälfte. Für jeden Zauberplatzgrad über dem 6. springt ein zusätzlicher
  Blitz vom ersten Ziel auf ein weiteres über.'
source_book: SRD 5.2 DE
