id: hellsehen
type: spell
template: spell
name: Hellsehen
lang: de
level: 3
school: Erkenntniszauber
casting_time: 10 Minuten
range: 1,6 Kilometer
components: V, G, M (ein Fokus im Wert von mindestens 100 GM - entweder ein juwelenbesetztes Horn zum Hören oder ein Glasauge
  zum Sehen)
duration: Konzentration, bis zu 10 Minuten
description: Du erschaffst an einem dir bekannten Ort (den du bereits gesehen oder besucht hast) oder an einem offensichtlichen
  Ort, der dir unbekannt ist (beispiels‑ weise hinter einer Tür, einer Ecke oder in einem Hain), einen unsichtbaren Sensor
  in Reichweite. Der Sensor ist immateriell und unverwundbar. Er bleibt für die Wirkungsdauer bestehen. Wenn du den Zauber
  wirkst, wähle Hören oder Sehen aus. Du nimmst den ausgewählten Sinn durch den Sensor wahr, als würdest du dich in dessen
  Bereich befinden. Als Bonusaktion kannst du zwischen Hören und Sehen wechseln. Unsichtbares sehen Eine Kreatur, die den
  Sensor sehen kann (beispiels‑ weise mit Wahrer Blick oder ), sieht eine etwa faustgroße leuchtende Kugel.
source_book: SRD 5.2 DE
