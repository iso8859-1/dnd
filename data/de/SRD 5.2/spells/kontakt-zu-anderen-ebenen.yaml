id: kontakt-zu-anderen-ebenen
type: spell
template: spell
name: Kontakt zu anderen Ebenen
lang: de
level: 5
school: Erkenntniszauber
casting_time: 1 Minute oder Ritual
range: Selbst
components: V
duration: 1 Minute
description: Du trittst mental mit einem Halbgott, dem Geist eines lange verstorbenen Weisen oder einem anderen kundigen Wesen
  von einer anderen Ebene in Kontakt. Der Kontakt zu dieser außerweltlichen Intelligenz kann deinen Verstand brechen. Wenn
  du diesen Zauber wirkst, führe einen SG‑15‑Intelligenzrettungswurf aus. Bei einem erfolgreichen Rettungswurf kannst du dem
  Wesen bis zu fünf Fragen stellen. Du musst deine Fragen stellen, bevor der Zauber endet. Der SL beantwortet jede Frage mit
  einem einzelnen Wort wie „Ja“, „Nein“, „Vielleicht“, „Niemals“, „Irrelevant“ oder „Unklar“ (wenn das Wesen die Antwort nicht
  kennt). Falls eine Antwort mit nur einem Wort irreführend wäre, kann der SL stattdessen einen kurzen Satz als Antwort geben.
  Misslingt der Wurf, so erleidest du 6W6 psychischen Vollständige Genesung Schaden und bist kampfunfähig, bis du eine lange
  Rast beendest. Der Zauber beendet diesen Effekt.
source_book: SRD 5.2 DE
