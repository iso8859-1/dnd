id: zeitstopp
type: spell
template: spell
name: Zeitstopp
lang: de
level: 9
school: Verwandlungszauber
casting_time: Aktion
range: Selbst
components: V
duration: Unmittelbar
description: Du stoppst kurzzeitig für alle außer dir selbst den Fluss der Zeit. Für andere Kreaturen vergeht keine Zeit,
  während du 1W4+1 Züge hintereinander bekommst, in denen du wie gewohnt Aktionen ausführen und dich bewegen kannst. Dieser
  Zauber endet, wenn eine deiner Aktionen oder ein von dir erschaffener Effekt während dieser Zeitspanne eine Kreatur außer
  dir selbst oder einen Gegenstand beeinflusst, den jemand anders trägt oder hält. Zudem endet der Zauber, wenn du dich um
  mehr als 300 Meter von dem Ort entfernst, an dem du ihn gewirkt hast.
source_book: SRD 5.2 DE
