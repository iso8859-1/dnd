id: nahrung-und-wasser-erschaffen
type: spell
template: spell
name: Nahrung und Wasser erschaffen
lang: de
level: 3
school: Beschwörungszauber
casting_time: Aktion
range: 9 Meter
components: V, G
duration: Unmittelbar
description: Du erschaffst 22,5 Kilogramm Nahrung und 120 Liter Wasser auf dem Boden oder in Behältern in Reichweite – nützlich,
  um den Gefahren von Unterernährung und Dehydrierung vorzubeugen. Die Nahrung sieht aus wie Essen deiner Wahl und ist schlicht,
  aber nahrhaft. Das Wasser ist sauber. Die Nahrung verdirbt innerhalb von 24 Stunden, wenn sie nicht gegessen wird.
source_book: SRD 5.2 DE
