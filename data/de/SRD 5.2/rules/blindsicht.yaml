id: blindsicht
type: rule
template: rule-v1
name: Blindsicht
lang: de
description: Blindsicht erlaubt dir, auf eine bestimmte Reichweite zu sehen, ohne physische Sicht zu benötigen. Auf diese
  Reichweite kannst du auch bei Dunkelheit oder im Zustand Blind alles sehen, was sich nicht in vollständiger Deckung befindet.
  Du kannst sogar Kreaturen und Gegenstände mit dem Zustand Unsichtbar sehen.
source_book: SRD 5.2.1
