name: Erstickung (Gefahr)
lang: de
description: Eine Kreatur kann für eine Zeitspanne die Luft anhalten, die ihrem Konstitutionsmodifikator
  plus 1 in Minuten entspricht (mindestens 30 Sekunden). Danach setzt die Erstickung
  ein. Solange eine Kreatur keine Luft bekommt oder erstickt, erhält sie am Ende jedes
  ihrer Züge eine Erschöpfungsstufe. Sobald sie wieder atmen kann, werden alle Erschöpfungsstufen
source_book: SRD 5.2.1
