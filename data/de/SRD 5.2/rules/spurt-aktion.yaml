id: spurt-aktion
type: rule
template: rule-v1
name: Spurt (Aktion)
lang: de
description: 'Wenn du die Spurt-Aktion ausführst, erhältst du für diesen Zug zusätzliche Bewegung. Dieser Zuwachs entspricht
  der Höhe deiner Bewegungsrate einschließlich relevanter Modifikatoren. Beispiel: Bei einer Bewegungsrate von neun Metern
  kannst du dich mit einem Spurt insgesamt bis zu 18 Meter weit bewegen. Wird deine Bewegungsrate von neun Metern auf 4,5
  Meter verringert, so kannst du dich mit einem Spurt bis zu neun Meter weit bewegen. Wenn du eine besondere Bewegungsrate
  wie eine Flugbewegungsrate oder eine Schwimm- bewegungsrate hast, kannst du diese statt deiner normalen Bewegungsrate bei
  der Spurt-Aktion Siehe auch verwenden. Du wählst bei jeder Spurt-Aktion aus, welche Bewegungsrate du verwendest. „Bewegungsrate“.'
source_book: SRD 5.2.1
