id: angriff-aktion
type: rule
template: rule-v1
name: Angriff (Aktion)
lang: de
description: 'Wenn du die Angriffsaktion ausführst, kannst du einen Angriffswurf mit einer Waffe oder einem Waffen an- und
  ablegen: waffenlosen Angriff ausführen. Wenn du einen Angriff ausführst, kannst du als Teil dieser Aktion eine Waffe an-
  oder ablegen. Tu dies entweder vor oder nach dem Angriff. Wenn du eine Waffe vor dem Angriff anlegst, musst du sie bei diesem
  Angriff nicht zwangsläufig verwenden. Zum Anlegen einer Waffe gehört es, sie aus einer Scheide zu ziehen oder sie aufzuheben.
  Zum Ablegen einer Waffe gehört es, sie in eine Scheide zu stecken, sie zu verstauen oder Bewegung zwischen Angriffen: fallenzulassen.
  Wenn du dich in deinem Zug bewegst und ein Merkmal wie Zusätzlicher Angriff hast, das dir mehr als einen Angriff als Teil
  der Angriffsaktion gewährt, kannst du die Bewegung teilweise oder ganz nutzen, um dich zwischen deinen Angriffen zu bewegen.'
source_book: SRD 5.2.1
