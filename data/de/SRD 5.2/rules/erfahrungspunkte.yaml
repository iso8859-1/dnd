description: Charaktere verdienen Erfahrungspunkte (EP), wenn sie Herausforderungen meistern und Aben- teuer abschließen.
  Die EP werden vom Spielleiter verliehen. Wenn die EP eines Charakters bestimmte Siehe auch Schwellenwerte erreichen, wird
  die Stufe des Charakters erhöht. „Stufenaufstiege“.
