id: herausforderungsgrad
type: rule
template: rule-v1
name: Herausforderungsgrad
lang: de
description: „Die Spielregeln“ („Erkundung“). Der Herausforderungsgrad (HG) fasst
  zusammen, wie gefährlich ein Monster für eine Gruppe von vier Spielercharakteren
  ist. Vergleiche den HG des Monsters mit der Stufe der Charaktere. Ist der HG höher,
  so ist das Monster wahrscheinlich eine Bedrohung. Ist der HG niedriger, so ist das
  Monster wahrscheinlich keine große Bedrohung. Die Umstände und die Anzahl der Spielercharaktere
  haben erheblichen Einfluss darauf, wie gefährlich ein Monster im Spiel tatsächlich
  ist. Der Abschnitt „Werkzeugkasten fürs Spiel“ („Kampfbegegnungen“) enthält Ratschläge
  für den SL, wie der HG beim Planen Siehe auch möglicher Kampfbegegnungen zu verwenden
  ist.
source_book: SRD 5.2.1
