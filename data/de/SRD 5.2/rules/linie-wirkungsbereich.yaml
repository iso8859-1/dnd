name: Linie (Wirkungsbereich)
lang: de
description: Eine Linie ist ein Wirkungsbereich, der in gerader Linie von einem Ursprungspunkt
  ausgeht. Länge und Breite dieses Wirkungsbereichs sind in der Beschreibung definiert.
  Der Effekt, der die Linie erzeugt, definiert ihre Länge und Breite. Der Ursprungspunkt
  einer Linie ist nicht im Wirkungsbereich enthalten, es sei denn, der Wirker
source_book: SRD 5.2.1
