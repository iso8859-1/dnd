name: Schweben
lang: de
description: „Die Spielregeln“ („Schaden und Heilung“). Manche Kreaturen können schweben,
  wie in ihren Wertekästen vermerkt, und manche Zauber und andere Effekte gewähren
  die Fähigkeit zu schweben. Während des Flugs zu schweben verhindert, Siehe auch
  dass du unter bestimmten Umständen abstürzt.
source_book: SRD 5.2.1
