name: Wirkungsbereich
lang: de
description: 'beides verwendet. In den Beschreibungen vieler Zauber und anderer Merkmale
  ist ein Wirkungsbereich angegeben, der üblicherweise eine von sechs Formen annimmt.
  Diese Formen sind ebenfalls in diesem Glossar AusströmungKugelWürfel definiert:
  KegelLinieZylinder Jeder Wirkungsbereich hat einen Ursprungspunkt – jenen Ort, von
  dem der Effekt des Zaubers ausgeht. Die Regeln der jeweiligen Form legen fest, wo
  sich der Ursprungspunkt befindet. Wenn alle geraden Linien vom Ursprungspunkt zu
  einem bestimmten Ort im Wirkungsbereich blockiert sind, ist dieser Ort nicht im
  Wirkungsbereich enthalten. Siehe auch Ein Hindernis muss vollständige Deckung bieten,
  um eine Linie zu blockieren. „Deckung“. Platziert der Wirker eines Wirkungsbereichs
  diesen an einem Punkt, den er nicht sehen kann, und liegt zwischen ihm und diesem
  Punkt ein Hindernis wie eine Mauer, so wird der Ursprungs- punkt des Wirkungsbereichs
  auf der dem Wirker'
source_book: SRD 5.2.1
