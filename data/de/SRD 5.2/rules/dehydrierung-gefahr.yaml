name: Dehydrierung (Gefahr)
lang: de
description: „Die Spielregeln“ („Kampf“). Kreaturen benötigen täglich eine gewisse
  Menge von Wasser je nach ihrer Größe, wie in der Tabelle „Täglicher Wasserbedarf“
  dargestellt. Eine Kreatur, die weniger als die Hälfte der täglich erforderlichen
  Wassermenge trinkt, erhält am Ende des Tages eine Erschöpfungsstufe. Erschöpfung
  durch Dehydrierung kann nicht entfernt werden, ehe Siehe auch die Kreatur nicht
  die vollständige Tagesmenge Tanä gWliacshseerr tWrinaksts.e rbedarf „Erschöpfung“.
