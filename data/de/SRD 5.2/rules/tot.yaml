name: Tot
lang: de
description: Eine tote Kreatur hat keine Trefferpunkte und kann Tote erwecken auch keine zurückerhalten, sofern sie nicht
  zunächst Wiederbeleben durch Magie wie die Zauber oder wiederbelebt wird. Wenn ein solcher Zauber gewirkt wird, weiß der
  Geist, wer ihn wirkt, und kann sich weigern. Der Geist einer toten Kreatur hat den Körper verlassen und sich auf die Äußeren
  Ebenen begeben. Um die Kreatur wiederzubeleben, muss der Geist zurückgerufen werden. Wenn die Kreatur ins Leben zurückkehrt,
  werden ihre aktuellen Trefferpunkte durch den wiederbelebenden Effekt bestimmt. Sofern nicht anders angegeben, wirken alle
  Zustände, magischen Krankheiten und Flüche auf die wiederbelebte Kreatur, die auch zum Zeitpunkt ihres Todes auf sie gewirkt
  haben, sofern die jeweiligen Wirkungsdauern noch nicht abgelaufen sind. Wenn die Kreatur mit Erschöpfungsstufen gestorben
  ist, kehrt sie mit einer Erschöpfungsstufe weniger ins Leben zurück. War die Kreatur auf mindestens einen magischen Gegenstand
  eingestimmt, so ist sie dies jetzt nicht mehr.
source_book: SRD 5.2.1
