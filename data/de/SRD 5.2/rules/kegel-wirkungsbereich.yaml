id: kegel-wirkungsbereich
type: rule
template: rule-v1
name: Kegel (Wirkungsbereich)
lang: de
description: 'Ein Kegel ist ein Wirkungsbereich, der von einem Ursprungspunkt in geraden Linien in einer Richtung nach Wahl
  des Wirkers ausgeht. Die Breite eines Kegels an einem beliebigen Punkt auf seiner Länge entspricht dem Abstand dieses Punkts
  vom Ursprungspunkt. Beispiel: Ein Kegel ist an einem Punkt auf seiner Länge, der 4,5 Meter vom Ursprungspunkt entfernt liegt,
  4,5 Meter breit. Der Effekt, der den Kegel erzeugt, definiert dessen maximale Länge. Der Ursprungspunkt eines Kegels ist
  nicht im Wirkungsbereich enthalten, es sei denn, der Wirker beschließt dies.'
source_book: SRD 5.2.1
