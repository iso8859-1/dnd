name: Gepackt halten
lang: de
description: 'Eine Kreatur kann eine andere Kreatur packen und festhalten. Charaktere tun dies üblicherweise im Rahmen eines
  waffenlosen Angriffs. Viele Monster haben besondere Angriffe, die ihnen gestatten, ihre Siehe auch Beute rasch zu packen.
  Wird eine Kreatur gepackt, so gelten die nachstehenden Regeln. Zustand Gepackt: „Gepackt“ und „Waffenloser Angriff“. Wird
  eine Kreatur erfolgreich Eine gepackte Kreatur pro Hand: gepackt, so hat sie den Zustand Gepackt. Eine Kreatur muss eine
  freie Hand haben, um eine andere Kreatur packen zu können. Manche Wertekästen und Spieleffekte gestatten einer Kreatur,
  ein Ziel mithilfe eines Tentakels, eines Mauls oder eines anderen Körperteils zu packen. Welchen Körperteil auch immer eine
  Kreatur einsetzt, sie kann damit nur jeweils eine Kreatur gepackt halten, und sie kann diesen Körperteil nicht verwenden,
  um auf eine andere Kreatur zu zielen, es sei denn, sie Den Zustand Gepackt beenden: beendet zuvor den Haltegriff. Eine gepackte
  Kreatur kann ihre Aktion verwenden, um einen Stärkewurf (Athletik) oder Geschicklichkeitswurf (Akrobatik) gegen den Flucht-SG
  des Haltegriffs auszuführen. Bei einem Erfolg endet der Zustand Gepackt. Der Zustand endet ebenfalls, wenn die Kreatur,
  die eine andere gepackt hält, kampfunfähig wird oder ihr Abstand zum gepackten Ziel die Reichweite des Haltegriffs überschreitet.
  Außerdem kann die Kreatur, die eine andere gepackt hält, das Ziel jederzeit loslassen (keine Aktion erforderlich).'
source_book: SRD 5.2.1
