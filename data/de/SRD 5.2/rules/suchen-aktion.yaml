description: Bei einem Erfolg wird der Fallschaden halbiert. Wenn du die Suchen-Aktion
  ausführst, führst du einen Weisheitswurf aus, um etwas zu finden oder zu erfahren,
  was nicht offenkundig ist. In der Tabelle „Suchen“ findest du Vorschläge, welche
  Fertigkeiten bei dieser Aktion gelten – je nachdem, was du finden Swuilclshte.n
  FertigkeitSuche nach ... HeilkundeKrankheit oder Todesursache einer Kreatur Motiv
