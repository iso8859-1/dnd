name: Attributswert und -modifikator
lang: de
description: '„Die Spielregeln“ („W20-Prüfungen“). Eine Kreatur hat sechs Attributswerte
  mit entspre- chenden Modifikatoren: Stärke, Geschick lichkeit, Konstitution, Intelligenz,
  Weisheit und Charisma. Füge den Modifikator hinzu, wenn du eine W20-Prüfung mit
  dem jeweiligen Attribut ausführst oder von Siehe auch einer Regel aufgefordert wirst,
  ihn hinzuzufügen.'
source_book: SRD 5.2.1
