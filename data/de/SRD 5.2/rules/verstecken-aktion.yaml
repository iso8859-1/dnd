id: verstecken-aktion
type: rule
template: rule-v1
name: Verstecken (Aktion)
lang: de
description: 'Mit der Verstecken-Aktion versuchst du dich zu verbergen. Dazu musst du einen SG-15-Geschick- lichkeitswurf
  (Heimlichkeit) bestehen, während du entweder komplett verschleiert bist oder dich hinter Dreivierteldeckung oder vollständiger
  Deckung befindest. Außerdem darfst du dich nicht in der Sichtlinie von Gegnern befinden: Kannst du eine Kreatur sehen, so
  kannst du beurteilen, ob sie dich ebenfalls sehen kann. Bei einem Erfolg hast du den Zustand Unsichtbar, solange du versteckt
  bist. Notiere das Gesamtergebnis deines Wurfs – es dient als SG für Kreaturen, die versuchen, dich mit einem Weisheitswurf
  (Wahrnehmung) aufzuspüren. Du hörst sofort auf, versteckt zu sein, wenn eines der folgenden Ereignisse eintritt: Du machst
  ein Geräusch, das lauter als ein Flüstern ist, ein Gegner spürt dich auf, du führst einen Angriffswurf aus, oder du wirkst
  einen Zauber mit Verbalkomponente.'
source_book: SRD 5.2.1
