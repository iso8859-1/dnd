id: schwimmen
type: rule
template: rule-v1
name: Schwimmen
lang: de
description: Beim Schwimmen kostet dich jeder Meter, den du zurücklegst, einen zusätzlichen Meter Bewegungsrate (zwei zusätzliche
  Meter in schwierigem Gelände). Du kannst diese zusätzlichen Kosten ignorieren, wenn du über eine Schwimmbewegungsrate verfügst
  und sie beim Schwimmen verwendest. Nach Ermessen des SL kann jede Strecke in rauem Gewässer einen erfolgreichen SG-15-Stärkewurf
  (Athletik) erfordern.
source_book: SRD 5.2.1
