id: zylinder-wirkungsbereich
type: rule
template: rule-v1
name: Zylinder (Wirkungsbereich)
lang: de
description: Regel ist der Zustand Erschöpft. Ein Zylinder ist ein Wirkungsbereich,
  der in geraden Linien von einem Ursprungspunkt in der Mitte einer der kreisförmigen
  Stirnseiten des Zylinders ausgeht. Der Effekt, der den Zylinder erzeugt, definiert
  den Radius der Zylinderbasis sowie die Höhe des Zylinders. Der Ursprungspunkt des
  Zylinders ist im Wirkungsbereich des Zaubers enthalten.
source_book: SRD 5.2.1
