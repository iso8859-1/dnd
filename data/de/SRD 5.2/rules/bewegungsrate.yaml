id: bewegungsrate
type: rule
template: rule-v1
name: Bewegungsrate
lang: de
description: 'dich sind im Vorteil. Eine Kreatur hat eine Bewegungsrate. Diese ist
  die Strecke in Metern, die die Kreatur höchstens Siehe auch zurücklegen kann, wenn
  sie sich in ihrem Zug bewegt. „Fliegen“, „Klettern“, „Kriechen“, „Schwimmen“, „Springen“
  und „Die Spielregeln“ Besondere Bewegungsraten: („Kampf“). Manche Kreaturen haben
  besondere Bewegungsraten wie eine Flug-, Grab-, Kletter- oder Schwimmbewegungsrate,
  wie jeweils in diesem Glossar definiert. Wenn du mehrere Bewegungsraten hast, wähle
  eine aus, wenn du dich bewegst. Du kannst in deinem Zug zwischen deinen Bewegungsraten
  wechseln. Ziehe bei jedem Wechsel die Entfernung, die du bereits zurückgelegt hast,
  von der neuen Bewegungsrate ab. Das Ergebnis bestimmt, wie weit du dich noch bewegen
  kannst. Ist das Ergebnis 0 oder negativ, so kannst du dich im aktuellen Zug nicht
  mehr bewegen. Beispiel: Falls du über eine Bewegungsrate von neun Metern und eine
  Flugbewegungsrate von zwölf Metern verfügst, könntest du drei Meter weit fliegen,
  drei Meter weit gehen und dich dann wieder in die Luft erheben, um sechs Meter weit
  Änderungen deiner Bewegungsraten: zu fliegen. Wenn ein Effekt deine Bewegungsrate
  vorübergehend erhöht oder verringert, werden besondere Bewegungsraten für die gleiche
  Dauer um den gleichen Betrag erhöht oder verringert. Beispiel: Wenn deine Bewegungs-
  rate auf 0 verringert ist und du eine Kletterbewe- gungsrate hast, wird diese ebenfalls
  auf 0 verringert. Wenn deine Bewegungsrate halbiert wird und du über eine Flugbewegungsrate
  verfügst, wird diese'
source_book: SRD 5.2.1
