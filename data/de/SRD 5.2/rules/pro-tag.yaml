name: Pro Tag
lang: de
description: Wenn eine Regel besagt, dass du etwas eine bestimmte Anzahl von Malen pro Tag anwenden kannst, so bedeutet dies,
  dass du nach Verbrauch dieser Anzahl eine lange Rast beenden musst, um es erneut anwenden zu können.
source_book: SRD 5.2.1
