id: beeinflussen-aktion
type: rule
template: rule-v1
name: Beeinflussen (Aktion)
lang: de
description: 'Mit der Beeinflussen-Aktion kannst du ein Monster zu etwas drängen. Beschreibe oder stelle rollenspie- lerisch
  dar, wie du mit dem Monster kommunizierst. Versuchst du, es zu täuschen, einzuschüchtern, zu amüsieren oder zu überreden?
  Der SL bestimmt dann, ob das Monster bereitwillig, nicht bereitwillig oder zögerlich auf deine Interaktion reagiert. Daraus
  ergibt sich, ob ein Attributswurf erforderlich ist, Bereitwillig: wie unten erläutert. Wenn deine Beeinflussung mit den
  Interessen des Monsters übereinstimmt, ist kein Attributswurf erforderlich: Das Monster kommt deinen Wünschen auf seine
  Art nach. Nicht bereitwillig: Wenn deine Beeinflussung mit den Interessen oder der Gesinnung des Monsters in Konflikt steht,
  ist kein Attributswurf erforderlich: Zögerlich: Das Monster kommt deinen Wünschen nicht nach. Wenn du das Monster zu etwas
  bewegen willst, was es nicht unbedingt tun will, musst du einen Attributswurf ausführen, der von der Haltung des Monsters
  betroffen ist: Gleichgültig, freundlich gesinnt oder feindlich gesinnt, wie jeweils in diesem Glossar definiert. In der
  Tabelle „Attributswürfe zum Beeinflussen“ findest du Vorschläge, welcher Attributswurf je nach deiner Interaktion mit dem
  Monster auszuführen ist. Der SL wählt den Attributswurf aus. Dieser hat einen Standard-SG in Höhe von 15 oder dem Intelligenzwert
  des Monsters, je nachdem, welcher Wert höher ist. Bei einem Erfolg tut das Monster, was du willst. Misslingt der Wurf, so
  musst du 24 Stunden (oder eine Dauer nach Vorgabe des SL) abwarten, ehe du erneut versuchen kannst, Attributswürfe es auf
  diese Art zu zum beeinflussen. Beeinflussen Attributswurf Interaktion Charismawurf Ein Monster amüsieren (Auftreten) Charismawurf
  Ein Monster einschüchtern (Einschüchtern) Charismawurf Ein Monster täuschen, (Täuschen) das dich versteht Charismawurf Ein
  Monster überzeugen, (Überzeugen) das dich versteht Weisheitswurf Ein Tier oder eine Monstrosität (Mit Tieren umgehen) sanft
  überreden'
source_book: SRD 5.2.1
