id: konzentration
type: rule
template: rule-v1
name: Konzentration
lang: de
description: 'Manche Zauber und andere Effekte erfordern Konzentration, um aktiv zu bleiben. Dies ist in ihrer Beschreibung
  angegeben. Wenn der Wirker des Effekts seine Konzentration verliert, endet der Effekt. Hat der Effekt eine maximale Wirkungsdauer,
  so ist in der Beschreibung des Effekts angegeben, wie lange der Wirker sich auf ihn konzentrieren kann: „Bis zu 1 Minute“,
  „1 Stunde“ oder eine andere Dauer. Der Wirker kann seine Konzentration jederzeit beenden – dazu ist keine Aktion erforderlich.
  Folgende Faktoren stören Weiterer Effekt, der Konzentration erfordert: oder beenden die Konzentration: Du verlierst die
  Konzentration auf einen Effekt, sobald du einen Zauber oder einen sonstigen Effekt wirkst, der ebenfalls Konzentration erfordert.
  Schaden: Wenn du Schaden erleidest, musst du einen Konstitutionsrettungswurf bestehen, um die Konzentration aufrechtzuerhalten.
  Der SG beträgt 10 oder die Hälfte des erlittenen Schadens (abgerundet), je nachdem, welcher Wert höher ist. Kampfunfähig
  oder tot: Er kann höchstens 30 betragen. Deine Konzentration endet, wenn du kampfunfähig wirst oder stirbst.'
source_book: SRD 5.2.1
