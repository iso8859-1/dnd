id: verwenden-aktion
type: rule
template: rule-v1
name: Verwenden (Aktion)
lang: de
description: Normalerweise interagierst du im Rahmen einer anderen Aktion mit Gegenständen – wenn du beispielsweise im Rahmen
  der Angriffsaktion das Schwert ziehst. Wenn eine Aktion erforderlich ist, um einen Gegenstand zu verwenden, führst du die
  Verwenden-Aktion aus.
source_book: SRD 5.2.1
