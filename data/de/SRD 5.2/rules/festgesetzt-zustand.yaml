description: 'hinzufügen. „Die Spielregeln“ („Übung“). Wenn du den Zustand Festgesetzt
  hast, wirken Keine Bewegungsrate: folgende Effekte auf dich: Deine Bewegungsrate
  Beeinträchtigte Angriffe: beträgt 0 und kann nicht erhöht werden. Angriffswürfe
  gegen dich sind im Vorteil, und deine Angriffswürfe sind Beeinträchtigte Rettungswürfe:
  im Nachteil. Du bist bei'
source_book: SRD 5.2.1
