description: Du kannst eine Kletterbewegungsrate anstatt der normalen Bewegungsrate verwenden, um dich an vertikalen Oberflächen
  zu bewegen, ohne die zusätzliche Bewegung zu benötigen, Siehe auch die beim Klettern normalerweise anfällt. „Bewegungsrate“
  und „Klettern“.
