id: kreaturen-in-den-zustand-bewusstlos-versetzen
type: rule
template: rule-v1
name: Kreaturen in den Zustand Bewusstlos versetzen
lang: de
description: Wenn du die Trefferpunkte einer Kreatur mit einem Nahkampfangriff auf 0 senken würdest, kannst du sie stattdessen
  auf 1 Trefferpunkt senken. In diesem Fall hat die Kreatur den Zustand Bewusstlos und beginnt eine kurze Rast. Die Kreatur
  bleibt bewusstlos, bis sie Treffer- punkte zurückerhält, oder bis ihr jemand mit einer Aktion und einem erfolgreichen SG-10-Weisheitswurf
  (Heilkunde) Erste Hilfe leistet.
source_book: SRD 5.2.1
