name: Einstimmung
lang: de
description: 'Manche magischen Gegenstände erfordern, dass eine bestimmte Bindung an sie hergestellt wird, ehe ihre magischen
  Eigenschaften genutzt werden können: Dies ist die sogenannte Einstimmung. Siehe auch Eine Kreatur kann auf höchstens drei
  magische Gegenstände zugleich eingestimmt sein. „Ausrüstung“ („Magische Gegenstände“).'
source_book: SRD 5.2.1
