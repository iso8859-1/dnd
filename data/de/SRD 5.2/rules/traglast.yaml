description: Deine Größe und dein Stärkewert bestimmen das maximale Gewicht in Kilogramm,
  das du tragen kannst, wie in der Tabelle „Traglast“ dargestellt. In der Tabelle
  ist außerdem aufgeführt, welches Gewicht du höchstens ziehen, anheben und schieben
  kannst. Wenn du ein Gewicht ziehst, anhebst oder schiebst, das deine Traglast überschreitet,
  beträgt Tderiangel aBsetwegungsrate höchstens 1,5 Meter. Anheben/ KreaturengrößeTragenSchieben/Ziehen
