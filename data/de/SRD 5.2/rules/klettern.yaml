name: Klettern
lang: de
description: Beim Klettern kostet dich jeder Meter, den du zurücklegst, einen zusätzlichen Meter Bewegungsrate (zwei zusätzliche
  Meter in schwierigem Gelände). Du kannst diese zusätzlichen Kosten ignorieren, wenn du über eine Kletterbewegungsrate verfügst
  und sie beim Klettern verwendest. Nach Ermessen des SL kann das Klettern an rutschigen Oberflächen oder solchen mit wenigen
  Griffmöglichkeiten einen erfolgreichen SG-15- Stärkewurf (Athletik) erfordern.
source_book: SRD 5.2.1
