name: Verbündeter
lang: de
description: willentlich auf die Quelle deiner Furcht zubewegen. Eine Kreatur ist
  dein Verbündeter, wenn sie Mitglied deiner Abenteurergruppe oder dein Freund ist,
  im Kampf auf deiner Seite steht oder von den Regeln oder vom SL als dein Verbündeter
  bestimmt wurde.
