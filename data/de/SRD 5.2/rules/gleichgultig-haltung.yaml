name: Gleichgültig (Haltung)
lang: de
description: Wenn eine Kreatur dir gegenüber gleichgültig ist, hat sie kein Interesse daran, dir zu helfen Siehe auch oder
  dich zu beeinträchtigen. Gleichgültig ist die Standardhaltung von Monstern. „Beeinflussen“.
source_book: SRD 5.2.1
