name: Zustand
lang: de
description: 'Ein Zustand ist ein vorübergehender Spielstatus. In der Definition des Zustands ist angegeben, wie er auf die
  betroffene Kreatur wirkt. Verschiedene Regeln definieren, wie ein Zustand beendet werden kann. In diesem Glossar werden
  folgende Zustände Betäubt Festgesetzt Taub definiert: Bewusstlos Gelähmt Unsichtbar Bezaubert Gepackt Verängstigt Blind
  Kampfunfähig Vergiftet Erschöpft Liegend Versteinert Ein Zustand kann sich nicht auf sich selbst addieren: Entweder hat
  eine Kreatur einen bestimmten Zustand, oder sie hat ihn nicht. Die einzige Ausnahme dieser Regel ist der Zustand Erschöpft.'
source_book: SRD 5.2.1
