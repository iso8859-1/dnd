id: lange-rast
type: rule
template: rule-v1
name: Lange Rast
lang: de
description: 'Eine lange Rast ist eine ausgedehnte Ruhepause von mindestens acht Stunden, die jeder Kreatur zur Verfügung
  steht. Während einer langen Rast schläfst du mindestens sechs Stunden lang und führst höchstens zwei Stunden lang leichte
  Aktivitäten wie Lesen, Reden, Essen oder Wache halten aus. Während du schläfst, hast du den Zustand Bewusstlos. Hast du
  eine lange Rast beendest, so musst du mindestens 16 Stunden warten, ehe du die nächste beginnst. Vorzüge der Rast: Du musst
  mindestens einen Trefferpunkt haben, um eine lange Rast zu beginnen. Wenn du die Rast beendest, erhältst Alle TP zurückerhalten:
  du die folgenden Vorzüge: Du erhältst alle verlorenen Trefferpunkte und alle verbrauchten Trefferpunktewürfel zurück. Wenn
  dein Treffer- punktemaximum verringert wurde, ist es jetzt Attributswerte wiederhergestellt: wieder normal. Wenn deine Attributswerte
  verringert waren, sind sie jetzt Erschöpfung verringert: wieder normal. Wenn du Erschöpfungs- stufen hattest, werden diese
  um eine Stufe Besonderes Merkmal: verringert. Manche Merkmale werden durch eine lange Rast aufgeladen. Wenn du ein solches
  Merkmal hast, wird es wie in seiner Die Rast unterbrechen: Beschreibung angegeben aufgeladen. Eine lange Rast kann auf folgende
  Arten unterbrochen werden: • Initiative auswürfeln • Einen Zauber wirken, der kein Zaubertrick ist • Schaden erleiden •
  Eine Stunde lang gehen oder andere körperliche Anstrengungen unternehmen Wenn du vor der Unterbrechung mindestens eine Siehe
  auch Stunde lang gerastet hast, erhältst du die Vorzüge einer kurzen Rast. „Kurze Rast“. Du kannst die lange Rast unmittelbar
  nach der Unterbrechung fortsetzen. In diesem Fall ist pro Unterbrechung eine zusätzliche Stunde Rast erforderlich, um diese
  zu beenden.'
source_book: SRD 5.2.1
