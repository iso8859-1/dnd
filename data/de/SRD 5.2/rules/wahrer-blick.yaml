name: Wahrer Blick
lang: de
description: 'Wenn du über Wahrer Blick verfügst, ist dein Sehvermögen auf eine bestimmte Reichweite verbessert. Auf diese
  Reichweite durchdringt Dunkelheit: deine Sicht Folgendes: Du kannst in normaler sowie Unsichtbarkeit: magischer Dunkelheit
  sehen. Du kannst Kreaturen und Gegenstände sehen, die den Zustand Unsichtbar Visuelle Illusionen: haben. Visuelle Illusionen
  erscheinen dir durchsichtig, und Rettungswürfe gegen sie Verwandlungen: bestehst du automatisch. Du erkennst die wahre Gestalt
  aller Kreaturen und Gegenstände, die du siehst Ätherebene: und die durch Magie verwandelt wurden. Du kannst in die Ätherebene
  blicken.'
source_book: SRD 5.2.1
