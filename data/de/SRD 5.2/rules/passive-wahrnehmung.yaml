id: passive-wahrnehmung
type: rule
template: rule-v1
name: Passive Wahrnehmung
lang: de
description: 'Passive Wahrnehmung ist ein Wert, der für die allgemeine Aufmerksamkeit einer Kreatur ihrer Umgebung gegenüber
  steht. Der SL verwendet diesen Wert, um zu ermitteln, ob eine Kreatur etwas bemerkt, ohne dazu einen Weisheitswurf (Wahrnehmung)
  auszuführen. Die passive Wahrnehmung einer Kreatur entspricht 10 plus ihrem Bonus auf Weisheitswürfe (Wahrnehmung). Wenn
  die Kreatur bei solchen Würfen im Vorteil ist, erhöhe den Wert um 5. Wenn die Kreatur bei solchen Würfen im Nachteil ist,
  verringere den Wert um 5. Beispiel: Ein Charakter der 1. Stufe mit einem Weisheitswert von 15 und Übung in Wahrnehmung hat
  eine passive Wahrnehmung von 14 (10+2+2). Wenn dieser Charakter bei Weisheitswürfen (Wahrnehmung) im Vorteil ist, beträgt
  der Wert 19.'
source_book: SRD 5.2.1
