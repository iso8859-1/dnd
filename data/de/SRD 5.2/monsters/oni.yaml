merkmale:
- name: 'Regeneration:'
  beschreibung: Der Oni erhält zu Beginn jedes seiner Züge 10 Trefferpunkte zurück, wenn er noch mindestens 1 Trefferpunkt
    hat.
aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Oni führt zwei Klauen- oder Albtraumstrahl-Angriffe aus. Er kann einen Angriff durch einen Einsatz von
    Zauberwirken ersetzen.
- name: 'Klauen:'
  beschreibung: 'Nahkampfangriffswurf: +7, Reichweite 3 m. Treffer: 10 (1W12+4) Hiebschaden plus 9 (2W8) nekrotischer Schaden.'
- name: 'Albtraumstrahl:'
  beschreibung: 'Fernkampfangriffswurf: +5, Reichweite 18 m. Treffer: 9 (2W6+2) psychischer Schaden, und das Ziel ist bis
    zum Beginn des nächsten Zugs des Onis verängstigt.'
- name: 'Gestaltwandeln:'
  beschreibung: Der Oni nimmt die Gestalt eines Humanoiden von höchstens mittelgroßer Größe, die Gestalt eines großen Riesen
    oder wieder seine wahre Gestalt an. Seine Spielwerte sind abgesehen von der Größe in allen Gestalten gleich. Ausrüstung,
    die er trägt oder hält, wird nicht verwandelt.
- name: 'Zauberwirken:'
  beschreibung: 'Der Oni wirkt einen der folgenden Zauber mit Charisma als Attribut zum Zauberwirken, ohne Materialkomponenten
    zu benötigen (Zauber- rettungswurf-SG 13): Je 1-mal täglich: Dunkelheit , Gasförmige Gestalt , Person bezaubern (Version
    des 2. Grades), Schlaf'
bonusaktionen:
- name: 'Unsichtbarkeit:'
  beschreibung: Der Oni wirkt den Zauber Unsichtbar keit auf sich selbst, ohne Zauberkomponenten zu benötigen. Sein Attribut
    zum Zauberwirken ist dasselbe wie beim Ausführen der Zauberwirken-Aktion.
