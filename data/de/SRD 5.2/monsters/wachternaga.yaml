merkmale:
- name: 'Celestische Genesung:'
  beschreibung: Wenn der Naga stirbt, wird er nach 1W6 Tagen wieder lebendig und erhält all seine Trefferpunkte zurück, sofern
    nicht der Zauber Gutes und Böses bannen auf seine Überreste gewirkt wird.
aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Naga führt zwei Bissangriffe aus. Er kann beliebige Angriffe durch einen Einsatz von Giftiger Speichel
    ersetzen.
- name: 'Biss:'
  beschreibung: 'Nahkampfangriffswurf: +8, Reichweite 1,5 m. Treffer: 17 (2W12+4) Stichschaden plus 22 (4W10) Giftschaden.'
- name: 'Giftiger Speichel:'
  beschreibung: 'Konstitutionsrettungswurf: SG 16; eine Kreatur im Abstand von bis zu 18 Metern vom Naga, die er sehen kann.
    Misserfolg: 31 (7W8) Giftschaden, und das Ziel ist bis zum Beginn des nächsten Zugs des Nagas blind. Erfolg: Nur halber
    Schaden.'
- name: 'Zauberwirken:'
  beschreibung: 'Der Naga wirkt einen der folgenden Zauber mit Weisheit als Attribut zum Zauberwirken, ohne Gesten- oder Materialkomponenten
    zu benötigen (Zauberrettungswurf-SG 16): Beliebig oft: Thaumaturgie Je 1-mal täglich: Flammenschlag (Version des 6. Grades),
    Geas , Hellsehen , Wahrer Blick , Wunden heilen (Version des 6. Grades)'
