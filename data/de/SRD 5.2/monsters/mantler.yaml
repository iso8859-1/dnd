merkmale:
- name: 'Lichtempfindlich:'
  beschreibung: Der Mantler ist in hellem Licht bei Angriffswürfen im Nachteil.
aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Mantler führt einen Anheften- Angriff und zwei Schwanzangriffe aus.
- name: 'Anheften:'
  beschreibung: 'Nahkampfangriffswurf: +6, Reichweite 1,5 m. Treffer: 13 (3W6+3) Stichschaden. Wenn das Ziel eine Kreatur
    von höchstens großer Größe ist, heftet der Mantler sich an es an. Wenn der Mantler angeheftet ist, ist das Ziel blind,
    und der Mantler kann keine Anheften- Angriffe gegen andere Ziele ausführen. Außerdem halbiert der Mantler jeden Schaden,
    den er erleidet (abgerundet), und das Ziel erleidet die gleiche Menge an Schaden.'
- name: 'Schwanz:'
  beschreibung: 'Nahkampfangriffswurf: +6, Reichweite 3 m. Treffer: 8 (1W10+3) Hiebschaden.'
aktionen_intro: Der Mantler kann sich lösen, indem er 1,5 Meter Bewegung verbraucht. Das Ziel oder eine Kreatur im Abstand
  von bis zu 1,5 Metern von ihm kann eine Aktion ausführen und versuchen, den Mantler zu lösen. Dies gelingt mit einem erfolgreichen
  SG-14-Stärkewurf (Athletik).
bonusaktionen:
- name: 'Phantome (Aufladung nach einer kurzen oder langen Rast):'
  beschreibung: Der Mantler wirkt den Zauber Spiegelbilder mit Weisheit als Attribut zum Zauberwirken, ohne Zauberkomponenten
    zu benötigen. Der Zauber endet vorzeitig, wenn der Mantler seinen Zug in hellem Licht beginnt oder beendet.
- name: 'Stöhnen:'
  beschreibung: 'Weisheitsrettungswurf: SG 13; jede Kreatur in einer Ausströmung von 18 Metern, die vom Mantler ausgeht. Misserfolg:
    Das Ziel ist bis zum Ende des nächsten Zugs des Mantlers verängstigt. Erfolg: Das Ziel ist 24 Stunden lang gegen das Stöhnen
    dieses Mantlers immun.'
