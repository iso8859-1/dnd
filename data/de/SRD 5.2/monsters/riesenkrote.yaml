merkmale:
- name: 'Amphibisch:'
  beschreibung: Die Kröte kann Luft und Wasser atmen.
- name: 'Stehender Sprung:'
  beschreibung: Die Kröte kann mit oder ohne Anlauf bis zu sechs Meter weit und bis zu drei Meter hoch springen.
aktionen:
- name: 'Biss:'
  beschreibung: 'Nahkampfangriffswurf: +4, Reichweite 1,5 m. Treffer: 5 (1W6+2) Stichschaden plus 5 (2W4) Giftschaden. Wenn
    das Ziel eine Kreatur von höchstens mittelgroßer Größe ist, wird es gepackt (Flucht-SG 12).'
- name: 'Verschlucken:'
  beschreibung: Die Kröte verschluckt ein Ziel von höchstens mittelgroßer Größe, das sie gepackt hält. Das verschluckte Ziel
    ist nicht mehr gepackt, jedoch blind und festgesetzt. Es hat vollständige Deckung gegen Angriffe und andere Effekte von
    außerhalb der Kröte. Außerdem erleidet das Ziel am Ende jedes Zugs der Kröte 10 (3W6) Säureschaden. Die Kröte kann jeweils
    nur ein Ziel verschlucken und keine Bissangriffe ausführen, solange sie ein Ziel verschluckt hat. Wenn die Kröte stirbt,
    ist die verschluckte Kreatur nicht mehr festgesetzt und kann aus dem Kadaver entkommen. Sie verbraucht dabei 1,5 Meter
    Bewegung und hat danach den Zustand Liegend.
