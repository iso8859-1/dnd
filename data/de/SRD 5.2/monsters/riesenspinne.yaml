merkmale:
- name: 'Netzwandler:'
  beschreibung: Die Spinne ignoriert Bewegungsein- schränkungen durch Netze und weiß genau, wo sich andere Kreaturen aufhalten,
    die in Kontakt mit demselben Netz sind.
- name: 'Spinnenklettern:'
  beschreibung: Die Spinne kann ohne Attributswürfe schwierige Oberflächen erklimmen und sich an Decken entlang bewegen.
aktionen:
- name: 'Biss:'
  beschreibung: 'Nahkampfangriffswurf: +5, Reichweite 1,5 m. Treffer: 7 (1W8+3) Stichschaden plus 7 (2W6) Giftschaden.'
- name: 'Spinnennetz (Aufladung 5–6):'
  beschreibung: 'Geschicklichkeits rettungs wurf: SG 13; eine Kreatur im Abstand von bis zu 18 Metern von der Spinne, die
    von der Spinne gesehen werden kann. Misserfolg: Das Ziel ist festgesetzt, bis das Netz zerstört wird (RK 10, 5 TP, anfällig
    für Feuerschaden, gegen Gift- und psychischen Schaden immun).'
