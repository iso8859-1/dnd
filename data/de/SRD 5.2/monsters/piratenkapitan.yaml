bonusaktionen:
- name: 'Charme des Kapitäns:'
  beschreibung: 'Weisheitsrettungswurf: SG 14; eine Kreatur im Abstand von bis zu neun Metern vom Piraten, die er sehen kann.
    Misserfolg: Das Ziel ist bis zum Beginn des nächsten Zugs des Piraten bezaubert.'
reaktionen:
- name: 'Riposte:'
  beschreibung: 'Auslöser: Der Pirat wird von einem Nahkampf- angriffswurf getroffen, während er eine Waffe hält. Antwort:
    Der Pirat fügt seiner RK gegen diesen Angriff 3 hinzu, sodass der Angriff möglicherweise misslingt. Bei einem Misserfolg
    führt der Pirat einen Rapier-Angriff gegen die auslösende Kreatur aus, sofern diese sich in Reichweite befindet.'
