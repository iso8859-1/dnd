  beschreibung: Der Pirat führt drei Angriffe mit dem Rapier oder der Pistole in beliebiger Kombination aus.
- name: 'Rapier:'
  beschreibung: 'Nahkampfangriffswurf: +7, Reichweite 1,5 m. Treffer: 13 (2W8+4) Stichschaden, und der Pirat ist bei seinem
