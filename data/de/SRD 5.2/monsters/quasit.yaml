merkmale:
- name: 'Magieresistenz:'
  beschreibung: Der Quasit ist bei Rettungswürfen gegen Zauber und andere magische Effekte im Vorteil.
aktionen:
- name: 'Zerfetzen:'
  beschreibung: 'Nahkampfangriffswurf: +5, Reichweite 1,5 m. Treffer: 5 (1W4+3) Hiebschaden, und das Ziel ist bis zum Beginn
    des nächsten Zugs des Quasiten vergiftet.'
- name: 'Gestaltwandeln:'
  beschreibung: Der Quasit nimmt die Gestalt einer Fledermaus (Bewegungsrate 3 m, Fliegen 12 m), einer Kröte (12 m, Schwimmen
    12 m), eines Tausendfüßlers (12 m, Klettern 12 m) oder wieder seine wahre Gestalt an. Seine Spielwerte sind bis auf die
    Bewegungsrate in allen Formen gleich. Ausrüstung, die er trägt oder hält, wird nicht verwandelt.
- name: 'Unsichtbarkeit:'
  beschreibung: Der Quasit wirkt den Zauber Unsichtbarkeit auf sich selbst mit Charisma als Attribut zum Zauberwirken, ohne
    Zauberkomponenten zu benötigen.
- name: 'Verängstigen (1-mal täglich):'
  beschreibung: 'Weisheitsrettungswurf: SG 10; eine Kreatur im Abstand von bis zu sechs Metern. Misserfolg: Das Ziel ist verängstigt.
    Das Ziel wiederholt den Rettungswurf am Ende jedes seiner Züge. Bei einem Erfolg endet der Effekt. Nach einer Minute besteht
    es den Rettungswurf automatisch.'
