aktionen:
- name: 'Biss:'
  beschreibung: 'Nahkampfangriffswurf: +11, Reichweite 3 m. Treffer: 18 (2W10+7) Stichschaden plus 14 (4W6) Feuerschaden.
    Wenn das Ziel eine Kreatur von höchstens großer Größe ist, wird es gepackt (Flucht-SG 17). Solange es gepackt bleibt,
    ist es außerdem festgesetzt.'
bonusaktionen:
- name: 'Verschlucken:'
  beschreibung: 'Stärkerettungswurf: SG 19; eine Kreatur von höchstens großer Größe, die vom Remorhaz gepackt wurde (der Remorhaz
    kann bis zu zwei Kreaturen verschlucken). Misserfolg: Das Ziel wird vom Remorhaz verschluckt und ist dann nicht mehr gepackt.
    Eine verschluckte Kreatur ist blind und festgesetzt, hat vollständige Deckung gegen Angriffe und andere Effekte von außerhalb
    des Remorhaz und erleidet zu Beginn jedes Zugs des Remorhaz 10 (3W6) Säureschaden plus 10 (3W6) Feuerschaden. Erleidet
    der Remorhaz durch eine verschluckte Kreatur in einem einzigen Zug mindestens 30 Schaden, so muss er am Ende des Zugs
    einen SG-15-Konstitutions- rettungswurf bestehen, oder er würgt alle verschluckten Kreaturen wieder aus. Diese fallen
    in Bereiche im Abstand von bis zu 1,5 Metern vom Remorhaz und haben den Zustand Liegend. Wenn der Remorhaz stirbt, sind
    die verschluckten Kreaturen nicht mehr festgesetzt und können aus dem Kadaver entkommen. Sie verbrauchen dabei 4,5 Meter
    Bewegung und haben danach den Zustand Liegend.'
