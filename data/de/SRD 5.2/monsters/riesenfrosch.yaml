merkmale:
- name: 'Amphibisch:'
  beschreibung: Der Frosch kann Luft und Wasser atmen.
- name: 'Stehender Sprung:'
  beschreibung: Der Frosch kann mit oder ohne Anlauf bis zu sechs Meter weit und bis zu drei Meter hoch springen.
aktionen:
- name: 'Biss:'
  beschreibung: 'Nahkampfangriffswurf: +3, Reichweite 1,5 m. Treffer: 5 (1W6+2) Stichschaden. Wenn das Ziel eine Kreatur von
    höchstens mittelgroßer Größe ist, wird es gepackt (Flucht-SG 11).'
- name: 'Verschlucken:'
  beschreibung: Der Frosch verschluckt ein Ziel von höchstens kleiner Größe, das er gepackt hält. Das verschluckte Ziel ist
    nicht mehr gepackt, jedoch blind und festgesetzt. Es hat vollständige Deckung gegen Angriffe und andere Effekte von außerhalb
    des Froschs. Während der Frosch das Ziel verschluckt, kann er keine Bissangriffe ausführen. Wenn der Frosch stirbt, ist
    die verschluckte Kreatur nicht mehr festgesetzt und kann aus dem Kadaver entkommen. Sie verbraucht dabei 1,5 Meter Bewegung
    und hat danach den Zustand Liegend. Am Ende des nächsten Zugs des Froschs erleidet das verschluckte Ziel 5 (2W4) Säureschaden.
    Wenn dieser Schaden es nicht tötet, speit der Frosch es aus. Danach hat es den Zustand Liegend.
