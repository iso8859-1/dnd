aktionen:
- name: 'Zermalmen:'
  beschreibung: 'Nahkampfangriffswurf: +5, Reichweite 1,5 m. Treffer: 6 (1W6+3) Wuchtschaden, und der Düstermantel heftet
    sich an das Ziel an. Wenn das Ziel eine Kreatur von höchstens mittelgroßer Größe ist und der Düstermantel beim Angriffswurf
    im Vorteil war, bedeckt der Düstermantel das Ziel. Dieses ist dann blind und beginnt zu ersticken. Während der Düstermantel
    an das Ziel angeheftet ist, kann er nur das Ziel angreifen, ist bei seinen Angriffs- würfen jedoch im Vorteil. Seine Bewegungsrate
    wird zu 0, und Boni auf seine Bewegungsrate bringen ihm keinen Vorzug. Der Düstermantel bewegt sich mit dem Ziel. Die
    Kreatur kann eine Aktion ausführen und versuchen, den Düstermantel von sich zu lösen. Dies gelingt mit einem erfolgreichen
    SG-13-Stärkewurf (Athletik). In seinem Zug kann der Düstermantel sich lösen, indem er 1,5 Meter Bewegung verbraucht.'
- name: 'Aura der Dunkelheit (1-mal täglich):'
  beschreibung: Magische Dunkelheit füllt eine Ausströmung von 4,5 Metern, die vom Düstermantel ausgeht. Dieser Effekt bleibt
    bis zu zehn Minuten lang bestehen, sofern der Düstermantel sich konzentriert. Dunkelsicht kann diesen Bereich nicht durchdringen,
    und kein Licht kann ihn erhellen.
