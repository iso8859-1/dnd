merkmale:
- name: 'Legendäre Resistenz (3-mal täglich, im Hort 4-mal täglich):'
  beschreibung: Wenn der Drache bei einem Rettungswurf scheitert, kann er beschließen, ihn stattdessen zu bestehen.
aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Drache führt drei Zerfetzen- Angriffe aus. Er kann einen Angriff durch einen Einsatz von Zauberwirken
    ersetzen, um den Zauber Sengender Strahl zu wirken.
- name: 'Zerfetzen:'
  beschreibung: 'Nahkampfangriffswurf: +14, Reichweite 3 m. Treffer: 13 (1W10+8) Hiebschaden plus 5 (2W4) Feuerschaden.'
- name: 'Feuerodem (Aufladung 5–6):'
  beschreibung: 'Geschicklichkeits rettungswurf: SG 21; jede Kreatur in einem Kegel von 18 Metern. Misserfolg: 59 (17W6) Feuerschaden.
    Erfolg: Halber Schaden.'
- name: 'Zauberwirken:'
  beschreibung: 'Der Drache wirkt einen der folgenden Zauber mit Charisma als Attribut zum Zauberwirken, ohne Materialkomponenten
    zu benötigen (Zauber- rettungswurf-SG 20, +12 auf Treffer mit Zauberangriffen): Beliebig oft: Befehl (Version des 2. Grades),
    Magie entdecken , Sengender Strahl Je 1-mal täglich: Feuerball'
legendaere_aktionen:
- name: 'Anspringen:'
  beschreibung: Der Drache legt bis zur Hälfte seiner Bewegungsrate zurück und führt einen Zerfetzen- Angriff aus.
- name: 'Feurige Strahlen:'
  beschreibung: Der Drache setzt Zauberwirken ein, um den Zauber Sengender Strahl zu wirken. Der Drache kann diese Aktion
    erst nach Beginn seines nächsten Zugs erneut ausführen.
- name: 'Gebieterische Erscheinung:'
  beschreibung: Der Drache setzt Zauberwirken ein, um den Zauber Befehl (Version des 2. Grades) zu wirken. Der Drache kann
    diese Aktion erst nach Beginn seines nächsten Zugs erneut ausführen.
