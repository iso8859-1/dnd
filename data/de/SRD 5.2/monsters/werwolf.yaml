merkmale:
- name: 'Rudeltaktik:'
  beschreibung: Der Werwolf ist beim Angriffswurf gegen eine Kreatur im Vorteil, wenn sich mindestens einer seiner Verbündeten,
    der nicht kampfunfähig ist, im Abstand von bis zu 1,5 Metern von der Kreatur befindet.
aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Werwolf führt zwei Angriffe mit Kratzen oder Langbogen in beliebiger Kombination aus. Er kann einen Angriff
    durch einen Bissangriff ersetzen.
- name: 'Biss (nur Wolfs- oder hybride Gestalt):'
  beschreibung: 'Nahkampf angriffswurf: +5, Reichweite 1,5 m. Treffer: 12 (2W8+3) Stichschaden. Wenn das Ziel ein Humanoide
    ist, erleidet es den folgenden Effekt: Konstitutionsrettungswurf: SG 12. Misserfolg: Das Ziel wird verflucht. Wenn die
    Trefferpunkte des verfluchten Ziels auf 0 sinken, wird es stattdessen zu einem Werwolf unter der Kontrolle des SL und
    hat 10 Trefferpunkte. Erfolg: Das Ziel ist 24 Stunden lang gegen den Fluch dieses Werwolfs immun.'
- name: 'Kratzen:'
  beschreibung: 'Nahkampfangriffswurf: +5, Reichweite 1,5 m. Treffer: 10 (2W6+3) Hiebschaden.'
- name: 'Langbogen (nur humanoide oder hybride Gestalt):'
  beschreibung: 'Fernkampfangriffswurf: +4, Reichweite 45/180 m. Treffer: 11 (2W8+2) Stichschaden.'
bonusaktionen:
- name: 'Gestaltwandeln:'
  beschreibung: Der Werwolf nimmt die Gestalt eines großen Wolf-Humanoiden-Hybriden, eines mittelgroßen Wolfs oder wieder
    seine wahre humanoide Gestalt an. Seine Spielwerte sind abgesehen von der Größe in jeder Gestalt gleich. Ausrüstung, die
    er trägt oder hält, wird nicht verwandelt.
