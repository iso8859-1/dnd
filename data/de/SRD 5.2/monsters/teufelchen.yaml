aktionen:
- name: 'Stachel:'
  beschreibung: 'Nahkampfangriffswurf: +5, Reichweite 1,5 m. Treffer: 6 (1W6+3) Stichschaden plus 7 (2W6) Giftschaden.'
- name: 'Gestaltwandeln:'
  beschreibung: Das Teufelchen nimmt die Gestalt eines Raben (6 m, Fliegen 18 m), einer Ratte (Bewegungsrate 6 m), einer Spinne
    (6 m, Klettern 6 m) oder wieder seine wahre Gestalt an. Seine Spielwerte sind bis auf die Bewegungsrate in allen Formen
    gleich. Ausrüstung, die er trägt oder hält, wird nicht verwandelt.
- name: 'Unsichtbarkeit:'
  beschreibung: Das Teufelchen wirkt den Zauber Unsichtbarkeit auf sich selbst mit Charisma als Attribut zum Zauberwirken,
    ohne Zauberkomponenten zu benötigen.
