merkmale:
- name: 'Empfindlich gegenüber Sonnenlicht:'
  beschreibung: Im Sonnenlicht ist der Gruftschrecken bei Angriffs- und Attributswürfen im Nachteil.
aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Gruftschrecken führt zwei Angriffe mit Nekrotisches Schwert oder Nekrotischer Bogen in beliebiger Kombination
    aus. Er kann einen Angriff durch einen Einsatz von Lebensentzug ersetzen.
- name: 'Nekrotisches Schwert:'
  beschreibung: 'Nahkampfangriffswurf: +4, Reichweite 1,5 m. Treffer: 6 (1W8+2) Hiebschaden plus 4 (1W8) nekrotischer Schaden.'
- name: 'Nekrotischer Bogen:'
  beschreibung: 'Fernkampfangriffswurf: +4, Reichweite 45/180 m. Treffer: 6 (1W8+2) Stichschaden plus 4 (1W8) nekrotischer
    Schaden.'
- name: 'Lebensentzug:'
  beschreibung: 'Konstitutionsrettungswurf: SG 13; eine Kreatur im Abstand von bis zu 1,5 Metern. Misserfolg: 6 (1W8+2) nekrotischer
    Schaden, und das Trefferpunktemaximum des Ziels wird um eine Anzahl in Höhe des erlittenen Schadens verringert. Humanoide,
    die durch diesen Angriff getötet werden, erheben sich 24 Stunden später als Zombies unter Kontrolle des Gruftschrecken,
    sofern sie nicht zuvor wiederbelebt oder ihre Leichen zerstört werden. Der Gruftschrecken kann höchstens zwölf Zombies
    zugleich unter seiner Kontrolle haben.'
