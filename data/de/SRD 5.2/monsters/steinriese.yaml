    dadurch auf 0 verringert wird, kann der Riese einen Teil der Angriffsenergie umleiten. Geschicklichkeitsrettungswurf:
    SG 17; eine Kreatur im Abstand von bis zu 18 Metern vom Riesen, die er sehen kann. Misserfolg: 11 (1W10+6) Energieschaden.'
