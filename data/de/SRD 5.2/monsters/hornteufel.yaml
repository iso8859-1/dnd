merkmale:
- name: 'Diabolische Genesung:'
  beschreibung: Wenn der Teufel außerhalb der Neun Höllen stirbt, löst sein Körper sich in Schwefeldampf auf. Der Teufel erhält
    sofort einen neuen Körper, der mit allen Trefferpunkten irgendwo in den Neun Höllen aufersteht.
- name: 'Magieresistenz:'
  beschreibung: Der Teufel ist bei Rettungswürfen gegen Zauber und andere magische Effekte im Vorteil.
aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Teufel führt drei Angriffe mit Sengende Forke oder Flamme schleudern in beliebiger Kombination aus. Er
    kann einen Angriff durch einen Einsatz von Infernalischer Schwanz ersetzen.
- name: 'Sengende Forke:'
  beschreibung: 'Nahkampfangriffswurf: +10, Reichweite 3 m. Treffer: 15 (2W8+6) Stichschaden plus 9 (2W8) Feuerschaden.'
- name: 'Flamme schleudern:'
  beschreibung: 'Fernkampfangriffswurf: +8, Reichweite 45 m. Treffer: 26 (5W8+4) Feuerschaden. Wenn das Ziel ein brennbarer
    Gegenstand ist, der nicht getragen oder gehalten wird, fängt es Feuer.'
- name: 'Infernalischer Schwanz:'
  beschreibung: 'Geschicklichkeitsrettungswurf: SG 17; eine Kreatur im Abstand von bis zu drei Metern'
aktionen_intro: 'vom Teufel, die er sehen kann. Misserfolg: 10 (1W8+6) nekrotischer Schaden, und das Ziel erhält eine infernalische
  Wunde, sofern es noch keine hat. Solange das Ziel eine solche Wunde hat, verliert es zu Beginn jedes seiner Züge 10 (3W6)
  Trefferpunkte. Die Wunde schließt sich, wenn eine Minute vergangen ist, ein Zauber Trefferpunkte beim Ziel wiederherstellt
  oder wenn das Ziel oder eine Kreatur im Abstand von bis zu 1,5 Metern von ihm eine Aktion ausführt, um die Wunde abzubinden
  (dies gelingt, wenn die Kreatur einen SG-17-Weisheitswurf (Heilkunde) besteht).'
