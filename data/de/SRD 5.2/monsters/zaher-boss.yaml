aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Zähe führt zwei Angriffe mit Kriegshammer oder schwerer Armbrust in beliebiger Kombination aus.
- name: 'Kriegshammer:'
  beschreibung: 'Nahkampfangriffswurf: +5, Reichweite 1,5 m. Treffer: 12 (2W8+3) Wuchtschaden. Wenn das Ziel eine Kreatur
    von höchstens großer Größe ist, stößt der Zähe es bis zu drei Meter weit in gerader Linie von sich weg.'
- name: 'Schwere Armbrust:'
  beschreibung: 'Fernkampfangriffswurf: +4, Reichweite 30/120 m. Treffer: 13 (2W10+2) Stichschaden.'
