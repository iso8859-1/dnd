merkmale:
- name: 'Amphibisch:'
  beschreibung: Der Drache kann Luft und Wasser atmen.
- name: 'Legendäre Resistenz (3-mal täglich, im Hort 4-mal täglich):'
  beschreibung: Wenn der Drache bei einem Rettungswurf scheitert, kann er beschließen, ihn stattdessen zu bestehen.
aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Drache führt drei Zerfetzen- Angriffe aus. Er kann einen Angriff durch einen Einsatz von Zauberwirken
    ersetzen, um den Zauber Säurepfeil (Version des 3. Grades) zu wirken.
- name: 'Zerfetzen:'
  beschreibung: 'Nahkampfangriffswurf: +11, Reichweite 3 m. Treffer: 13 (2W6+6) Hiebschaden plus 4 (1W8) Säureschaden.'
- name: 'Säureodem (Aufladung 5–6):'
  beschreibung: 'Geschicklichkeits rettungswurf: SG 18; jede Kreatur in einer 18 Meter langen, 1,5 Meter breiten Linie. Misserfolg:
    54 (12W8) Säureschaden. Erfolg: Halber Schaden.'
- name: 'Zauberwirken:'
  beschreibung: 'Der Drache wirkt einen der folgenden Zauber mit Charisma als Attribut zum Zauberwirken, ohne Materialkomponenten
    zu benötigen (Zauberr ettungswurf-SG 17, +9 auf Treffer mit Zauberangriffen): Beliebig oft: Furcht , Magie entdecken ,
    Säurepfeil (Version des 3. Grades) Je 1-mal täglich: Ätzkugel , Mit Toten sprechen'
legendaere_aktionen:
- name: 'Anspringen:'
  beschreibung: Der Drache legt bis zur Hälfte seiner Bewegungsrate zurück und führt einen Zerfetzen- Angriff aus.
- name: 'Furchterregende Präsenz:'
  beschreibung: Der Drache setzt Zauberwirken ein, um den Zauber Furcht zu wirken. Der Drache kann diese Aktion erst nach
    Beginn seines nächsten Zugs erneut ausführen.
- name: 'Insektenwolke:'
  beschreibung: 'Geschicklichkeitsrettungswurf: SG 17; eine Kreatur im Abstand von bis zu 36 Metern vom Drachen, die er sehen
    kann. Misserfolg: 22 (4W10) Giftschaden, und das Ziel ist bis zum Ende seines nächsten Zugs bei Rettungswürfen zum Aufrechterhalten
    der Konzentration im Nachteil. Erfolg oder Misserfolg: Der Drache kann diese Aktion erst nach Beginn seines nächsten Zugs
    erneut ausführen.'
