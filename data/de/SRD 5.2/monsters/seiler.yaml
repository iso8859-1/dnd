merkmale:
- name: 'Spinnenklettern:'
  beschreibung: Der Seiler kann ohne Attributswürfe schwierige Oberflächen erklimmen und sich an Decken entlang bewegen.
aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Seiler führt zwei Tentakelangriffe aus, setzt Einholen ein und führt zwei Bissangriffe aus.
- name: 'Biss:'
  beschreibung: 'Nahkampfangriffswurf: +7, Reichweite 1,5 m. Treffer: 17 (3W8+4) Stichschaden.'
- name: 'Tentakel:'
  beschreibung: 'Nahkampfangriffswurf: +7, Reichweite 18 m. Treffer: Das Ziel wird von einem der sechs Tentakel gepackt (Flucht-SG
    14). Solange es gepackt bleibt, ist es außerdem vergiftet. Das Tentakel kann beschädigt werden (er besitzt eine RK von
    20, 10 TP und ist gegen Gift- und psychischen Schaden immun). Wird das Tentakel zerstört, so muss er eine gepackte Kreatur
    loslassen. Wird das Tentakel beschädigt, so erleidet der Seiler dadurch keinen Schaden. Ein zerstörtes Tentakel wächst
    zu Beginn des nächsten Zugs des Seilers nach.'
- name: 'Einholen:'
  beschreibung: Der Seiler zieht jede Kreatur, die er gepackt hält, bis zu neun Meter weit in gerader Linie auf sich zu.
