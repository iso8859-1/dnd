bonusaktionen:
- name: 'Versteinernder Blick (Aufladung 5–6):'
  beschreibung: 'Konstitutions rettungswurf: SG 13; jede Kreatur in einem Kegel von neun Metern. Wenn die Medusa im Kegel
    ihre Reflexion sieht, muss sie selbst den Rettungswurf ausführen. Erster Misserfolg: Das Ziel ist festgesetzt und wiederholt
    den Rettungswurf am Ende seines nächsten Zugs, sofern es auch dann noch festgesetzt ist. Bei einem Erfolg endet der Effekt
    bei ihm. Zweiter Misserfolg: Das Ziel ist nicht mehr festgesetzt, sondern versteinert.'
