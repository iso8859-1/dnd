merkmale:
- name: 'Eisschritt:'
  beschreibung: Der Drache kann sich über vereiste Flächen bewegen und sie erklimmen, ohne einen Attributswurf ausführen zu
    müssen. Außerdem kostet ihn schwieriges Gelände, das aus Eis oder Schnee besteht, keine zusätzliche Bewegung.
- name: 'Legendäre Resistenz (3-mal täglich, im Hort 4-mal täglich):'
  beschreibung: Wenn der Drache bei einem Rettungswurf scheitert, kann er beschließen, ihn stattdessen zu bestehen.
aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Drache führt drei Zerfetzen- Angriffe aus.
- name: 'Zerfetzen:'
  beschreibung: 'Nahkampfangriffswurf: +11, Reichweite 3 m. Treffer: 13 (2W6+6) Hiebschaden plus 4 (1W8) Kälteschaden.'
- name: 'Kälteodem (Aufladung 5–6):'
  beschreibung: 'Konstitutionsrettungswurf: SG 19; jede Kreatur in einem Kegel von 18 Metern. Misserfolg: 54 (12W8) Kälteschaden.
    Erfolg: Halber Schaden.'
legendaere_aktionen:
- name: 'Anspringen:'
  beschreibung: Der Drache legt bis zur Hälfte seiner Bewegungsrate zurück und führt einen Zerfetzen- Angriff aus.
- name: 'Eisige Explosion:'
  beschreibung: 'Konstitutionsrettungswurf: SG 14; jede Kreatur in einer Kugel mit einem Radius von neun Metern um einen Punkt
    im Abstand von bis zu 36 Metern vom Drachen, den er sehen kann. Misserfolg: 7 (2W6) Kälteschaden, und die Bewegungsrate
    des Ziels beträgt bis zum Ende seines nächsten Zugs 0. Erfolg oder Misserfolg: Der Drache kann diese Aktion erst nach
    Beginn seines nächsten Zugs erneut ausführen.'
- name: 'Furchterregende Präsenz:'
  beschreibung: Der Drache wirkt den Zauber Furcht mit Charisma als Attribut zum Zauber- wirken, ohne Materialkomponenten
    zu benötigen (Zauberrettungswurf-SG 14). Der Drache kann diese Aktion erst nach Beginn seines nächsten Zugs erneut ausführen.
