aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Halbdrache führt zwei Klauenangriffe aus.
- name: 'Klauen:'
  beschreibung: 'Nahkampfangriffswurf: +7, Reichweite 3 m. Treffer: 6 (1W4+4) Hiebschaden plus 7 (2W6) Schaden der Art, die
    für das Merkmal Drakonischer Ursprung ausgewählt wurde.'
- name: 'Drachenodem (Aufladung 5–6):'
  beschreibung: 'Geschicklichkeits rettungswurf: SG 14; jede Kreatur in einem Kegel von neun Metern. Misserfolg: 28 (8W6)
    Schaden der Art, die für das Merkmal Drakonischer Ursprung ausgewählt wurde. Erfolg: Halber Schaden.'
bonusaktionen:
- name: 'Sprung:'
  beschreibung: Der Halbdrache springt bis zu neun Meter weit und verbraucht dabei nur drei Meter Bewegung.
