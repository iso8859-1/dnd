aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Behir führt einen Bissangriff aus und setzt Umschlingen ein.
- name: 'Biss:'
  beschreibung: 'Nahkampfangriffswurf: +10, Reichweite 3 m. Treffer: 19 (2W12+6) Stichschaden plus 11 (2W10) Blitzschaden.'
- name: 'Blitzodem (Aufladung 5–6):'
  beschreibung: 'Geschicklichkeitsrettungs wurf: SG 16; jede Kreatur in einer 27 Meter langen, 1,5 Meter breiten Linie. Misserfolg:
    66 (12W10) Blitzschaden. Erfolg: Halber Schaden.'
- name: 'Umschlingen:'
  beschreibung: 'Stärkerettungswurf: SG 18; eine Kreatur von höchstens großer Größe im Abstand von bis zu 1,5 Metern vom Behir,
    die er sehen kann. Misserfolg: 28 (5W8+6) Wuchtschaden. Das Ziel wird gepackt (Flucht-SG 16). Solange es gepackt bleibt,
    ist es außerdem festgesetzt.'
bonusaktionen:
- name: 'Verschlucken:'
  beschreibung: 'Geschicklichkeitsrettungswurf: SG 18; eine Kreatur von höchstens großer Größe, die vom Behir gepackt wurde
    (der Behir kann nur jeweils eine Kreatur verschlucken). Misserfolg: Der Behir verschluckt das Ziel, das daraufhin nicht
    mehr gepackt ist. Eine verschluckte Kreatur ist blind und festgesetzt, hat vollständige Deckung gegen Angriffe und andere
    Effekte von außerhalb des Behirs und erleidet zu Beginn jedes Zugs des Behirs 21 (6W6) Säureschaden. Erleidet der Behir
    durch die verschluckte Kreatur in einem einzigen Zug mindestens 30 Schaden, so muss er am Ende des Zugs einen SG-14-Konstitutions
    rettungswurf bestehen, oder er würgt die verschluckte Kreatur wieder aus. Diese fällt in einen Bereich im Abstand von
    bis zu drei Metern vom Behir und hat den Zustand Liegend. Wenn der Behir stirbt, ist die verschluckte Kreatur nicht mehr
    festgesetzt und kann aus dem Kadaver entkommen. Sie verbraucht dabei 4,5 Meter Bewegung und hat danach den Zustand Liegend.'
