merkmale:
- name: 'Diabolische Genesung:'
  beschreibung: Wenn der Teufel außerhalb der Neun Höllen stirbt, löst sein Körper sich in Schwefeldampf auf. Der Teufel erhält
    sofort einen neuen Körper, der mit allen Trefferpunkten irgendwo in den Neun Höllen aufersteht.
- name: 'Magieresistenz:'
  beschreibung: Der Teufel ist bei Rettungswürfen gegen Zauber und andere magische Effekte im Vorteil.
aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Teufel führt drei Eisspeer-Angriffe aus. Er kann einen Angriff durch einen Schwanzangriff ersetzen.
- name: 'Eisspeer:'
  beschreibung: 'Nah oder Fernkampfangriffswurf: +10, Reichweite 1,5 m oder Reichweite 9/36 m. Treffer: 14 (2W8+5) Stichschaden
    plus 10 (3W6) Kälteschaden. Das Ziel kann bis zum Ende seines nächsten Zugs weder Bonusaktionen noch Reaktionen ausführen,
    und seine Bewegungsrate ist um drei Meter verringert. Außerdem kann es sich in seinem Zug entweder bewegen oder eine Aktion
    ausführen, aber nicht beides. Treffer oder Fehlschlag: Unmittelbar nach einem Fernkampfangriff kehrt der Speer auf magische
    Art in die Hand des Teufels zurück.'
- name: 'Schwanz:'
  beschreibung: 'Nahkampfangriffswurf: +10, Reichweite 3 m. Treffer: 15 (3W6+5) Wuchtschaden plus 18 (4W8) Kälteschaden.'
- name: 'Eiswand (Aufladung 6):'
  beschreibung: Der Teufel wirkt den Zauber Eiswand (Version des 8. Grades) mit Intelligenz als Attribut zum Zauberwirken,
    ohne Zauberkomponenten zu benötigen (Zauberrettungswurf-SG 17).
