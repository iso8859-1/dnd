merkmale:
- name: 'Amorph:'
  beschreibung: Der Schlick kann sich durch enge Bereiche von nur 2,5 Zentimetern Durchmesser bewegen, ohne zusätzliche Bewegung
    aufzuwenden.
- name: 'Korrosive Form:'
  beschreibung: Nichtmagische Geschosse werden zerstört, sobald sie den Schlick getroffen und Schaden bewirkt haben. Jede
    nichtmagische Waffe erleidet einen kumulativen Malus von -1 auf Angriffswürfe, sobald sie dem Schlick Schaden zugefügt
    hat und in Kontakt mit ihm gekommen ist. Wenn der Malus -5 erreicht, wird die Waffe zerstört. Der Malus kann aufgehoben
    werden, indem der Zauber Ausbessern auf die Waffe gewirkt wird. Der Schlick kann sich in einer Runde durch fünf Zentimeter
    starkes nichtmagisches Holz oder Metall fressen.
aktionen:
- name: 'Scheinfuß:'
  beschreibung: 'Nahkampfangriffswurf: +3, Reichweite 1,5 m. Treffer: 10 (2W8+1) Säureschaden. Nichtmagische Rüstung, die
    vom Ziel getragen wird, erhält einen Malus von -1 auf die RK, die sie bietet. Die Rüstung wird zerstört, wenn der Malus
    ihre RK auf 10 verringert. Der Malus kann aufgehoben werden, indem der Zauber Ausbessern auf die Rüstung gewirkt wird.'
