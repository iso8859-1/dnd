aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Vertraute führt zwei Schattendolch-Angriffe aus.
- name: 'Schattendolch:'
  beschreibung: 'Nah oder Fernkampfangriffswurf: +5, Reichweite 1,5 m oder Reichweite 6/18 m. Treffer: 5 (1W4+3) Stichschaden
    plus 7 (3W4) nekrotischer Schaden. Wenn die Trefferpunkte des Ziels durch diesen Angriff auf 0 sinken, bleibt das Ziel
    stabil, ist jedoch eine Stunde lang vergiftet. Solange es vergiftet ist, ist das Ziel außerdem gelähmt.'
bonusaktionen:
- name: 'Untote Wendigkeit:'
  beschreibung: Der Vertraute führt die Spurt- oder die Rückzug-Aktion aus.
