merkmale:
- name: 'Dämonische Genesung:'
  beschreibung: Wenn der Glabrezu außerhalb des Abyss stirbt, löst sein Körper sich zu einer widerlichen Flüssigkeit auf.
    Der Glabrezu erhält sofort einen neuen Körper, der mit allen Trefferpunkten irgendwo im Abyss aufersteht.
- name: 'Magieresistenz:'
  beschreibung: Der Glabrezu ist bei Rettungswürfen gegen Zauber und andere magische Effekte im Vorteil.
aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Glabrezu führt zwei Zangen- angriffe aus und setzt Prügeln oder Zauberwirken ein.
- name: 'Zange:'
  beschreibung: 'Nahkampfangriffswurf: +9, Reichweite 3 m. Treffer: 16 (2W10+5) Hiebschaden. Wenn das Ziel eine Kreatur von
    höchstens mittelgroßer Größe ist, wird es von einem der zwei Zangen gepackt (Flucht-SG 15).'
- name: 'Prügeln:'
  beschreibung: 'Geschicklichkeitsrettungswurf: SG 17; eine Kreatur, die vom Glabrezu gepackt wurde. Misserfolg: 15 (3W6+5)
    Wuchtschaden. Erfolg: Halber Schaden.'
- name: 'Zauberwirken:'
  beschreibung: 'Der Glabrezu wirkt einen der folgenden Zauber mit Intelligenz als Attribut zum Zauberwirken, ohne Materialkomponenten
    zu benötigen (Zauber- rettungswurf-SG 16): Beliebig oft: Dunkelheit , Magie bannen , Magie entdecken Je 1-mal täglich:
    Fliegen , Verwirrung , Wort der Macht: Betäubung'
