aktionen:
- name: 'Ersticken:'
  beschreibung: 'Nahkampfangriffswurf: +5, Reichweite 1,5 m. Treffer: 10 (2W6+3) Wuchtschaden. Wenn das Ziel eine Kreatur
    von höchstens mittelgroßer Größe ist, kann der Teppich es packen (Flucht-SG 13), statt ihm Schaden zuzufügen. Das gepackte
    Ziel ist blind und festgesetzt. Es beginnt zu ersticken und erleidet zu Beginn jedes seiner Züge 10 (2W6+3) Wuchtschaden.
    Der Teppich kann nur jeweils eine Kreatur ersticken. Solange der Teppich ein Ziel gepackt hält, kann er diese Aktion nicht
    erneut ausführen, halbiert jedoch jeden Schaden, den er erleidet (abgerundet), und das Ziel erleidet die gleiche Menge
    an Schaden.'
