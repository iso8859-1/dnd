merkmale:
- name: 'Diabolische Genesung:'
  beschreibung: Wenn der Teufel außerhalb der Neun Höllen stirbt, löst sein Körper sich in Schwefeldampf auf. Der Teufel erhält
    sofort einen neuen Körper, der mit allen Trefferpunkten irgendwo in den Neun Höllen aufersteht.
- name: 'Magieresistenz:'
  beschreibung: Der Teufel ist bei Rettungswürfen gegen Zauber und andere magische Effekte im Vorteil.
aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Teufel führt einen Infernalischer- Stachel-Angriff und zwei Klauenangriffe aus.
- name: 'Infernalischer Stachel:'
  beschreibung: 'Nahkampfangriffswurf: +8, Reichweite 3 m. Treffer: 15 (2W10+4) Stichschaden plus 18 (4W8) Giftschaden, und
    das Ziel ist bis zum Beginn des nächsten Zugs des Teufels vergiftet. Solange das Ziel vergiftet ist, kann es keine Trefferpunkte
    zurückerhalten.'
- name: 'Klauen:'
  beschreibung: 'Nahkampfangriffswurf: +8, Reichweite 3 m. Treffer: 13 (2W8+4) Hiebschaden.'
