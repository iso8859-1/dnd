reaktionen:
- name: 'Angriff umlenken:'
  beschreibung: 'Auslöser: Eine Kreatur, die der Goblin sehen kann, führt einen Angriffswurf gegen ihn aus. Antwort: Der Goblin
    wählt einen Verbündeten von höchstens mittelgroßer Größe im Abstand von bis zu 1,5 Metern von sich aus. Mit diesem tauscht
    er die Plätze, und der Verbündete wird statt seiner zum Ziel des Angriffs.'
