merkmale:
- name: 'Einfrieren:'
  beschreibung: Wenn der Elementar Kälteschaden erleidet, so ist seine Bewegungsrate bis zum Ende seines nächsten Zugs um
    sechs Meter verringert.
- name: 'Wassergestalt:'
  beschreibung: Der Elementar kann in den Bereich eines Gegners eindringen und dort stoppen. Er kann sich durch enge Bereiche
    von nur 2,5 Zentimetern Durchmesser bewegen, ohne zusätzliche Bewegung aufzuwenden.
aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Elementar führt zwei Hiebangriffe aus.
- name: 'Hieb:'
  beschreibung: 'Nahkampfangriffswurf: +7, Reichweite 1,5 m. Treffer: 13 (2W8+4) Wuchtschaden. Wenn das Ziel eine Kreatur
    von höchstens mittelgroßer Größe ist, wird es umgestoßen und hat den Zustand Liegend.'
- name: 'Überschutt (Aufladung 4–6):'
  beschreibung: 'Stärkerettungswurf: SG 15; jede Kreatur im Bereich des Elementars. Misserfolg: 22 (4W8+4) Wuchtschaden. Wenn
    das Ziel eine Kreatur von höchstens großer Größe ist, wird es gepackt (Flucht-SG 14). Das gepackte Ziel ist festgesetzt.
    Es beginnt zu ersticken, es sei denn, es kann Wasser atmen, und erleidet zu Beginn jedes Zugs des Elementars 9 (2W8) Wuchtschaden.
    Der Elementar kann eine große Kreatur oder bis zu zwei höchstens mittelgroße Kreaturen zugleich mit Überschutt gepackt
    halten. Eine Kreatur im Abstand von bis zu 1,5 Metern vom Elementar kann als Aktion eine Kreatur oder herausziehen, sofern
    sie einen SG-14-Stärkewurf (Athletik) besteht. Erfolg: Nur halber Schaden.'
