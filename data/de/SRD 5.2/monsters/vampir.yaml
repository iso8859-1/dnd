merkmale:
- name: 'Legendäre Resistenz (3-mal täglich, im Hort 4-mal täglich):'
  beschreibung: Wenn der Vampir bei einem Rettungswurf scheitert, kann er beschließen, ihn stattdessen zu bestehen.
- name: 'Neblige Flucht:'
  beschreibung: Wenn die Trefferpunkte des Vampirs außerhalb seines Ruheplatzes auf 0 sinken, nutzt der Vampir Gestaltwandeln,
    um zu Nebel zu werden (keine Aktion erforderlich). Wenn er sich nicht verwandeln kann, wird er zerstört. Mit 0 Trefferpunkten
    in Nebelgestalt kann er sich nicht in seine Vampirgestalt zurückverwandeln und muss innerhalb der nächsten zwei Stunden
    seinen Ruheplatz erreichen, oder er wird zerstört. Nach der Rückkehr an seinen Ruheplatz verwandelt er sich in seine Vampirgestalt
    und ist gelähmt, bis er Trefferpunkte zurückerhält, und nachdem er eine Stunde dort verbracht hat, erhält er 1 Trefferpunkt
    zurück.
- name: 'Spinnenklettern:'
  beschreibung: Der Vampir kann ohne Attributswürfe schwierige Oberflächen erklimmen und sich an Decken entlang bewegen.
- name: 'Vampirschwächen:'
  beschreibung: 'Der Vampir hat folgende Schwächen: Zutritt verwehren: Der Vampir kann keine Behausung betreten, ohne von
    einem der Bewohner eingeladen worden zu sein. Fließendes Wasser: Der Vampir erleidet 20 Säureschaden, wenn er seinen Zug
    in fließendem Wasser beendet. Holzpflock ins Herz: Wird dem Vampir eine Waffe ins Herz getrieben, die Stichschaden bewirkt,
    während er kampfunfähig ist und sich an seinem Ruheplatz aufhält, ist er gelähmt, bis die Waffe entfernt wird. Sonnenlicht:
    Der Vampir erleidet 20 gleißenden Schaden, wenn er seinen Zug im Sonnenlicht beginnt. Im Sonnenlicht ist er bei Angriffs-
    und Attributswürfen im Nachteil.'
aktionen:
- name: 'Mehrfachangriff (nur Vampirgestalt):'
  beschreibung: Der Vampir führt zwei Grabesschlag-Angriffe aus und setzt Biss ein.
- name: 'Grabesschlag (nur Vampirgestalt):'
  beschreibung: 'Nahkampf angriffswurf: +9, Reichweite 1,5 m. Treffer: 8 (1W8+4) Wuchtschaden plus 7 (2W6) nekrotischer Schaden.
    Wenn das Ziel eine Kreatur von höchstens großer Größe ist, wird es von einer der beiden Hände gepackt (Flucht-SG 14).'
- name: 'Biss (nur Fledermaus- oder Vampirgestalt):'
  beschreibung: 'Konstitutionsr ettungswurf: SG 17; eine Kreatur im Abstand von bis zu 1,5 Metern, die bereitwillig, festgesetzt,
    gepackt oder kampfunfähig ist. Misserfolg: 6 (1W4+4) Stichschaden plus 13 (3W8) nekrotischer Schaden. Das Trefferpunktemaximum
    des Ziels wird um eine Anzahl in Höhe des erlittenen nekrotischen Schadens verringert, und der Vampir erhält Trefferpunkte
    in Höhe dieses Betrags zurück. Ein Humanoide, dessen Trefferpunkte durch diesen Schaden auf 0 sinken und der dann begraben
    wird, erhebt sich beim nächsten Sonnenaufgang als Vampirbrut und untersteht der Kontrolle des Vampirs.'
bonusaktionen:
- name: 'Bezaubern (Aufladung 5–6):'
  beschreibung: Der Vampir wirkt den Zauber Person bezaubern mit Charisma als Attribut zum Zauberwirken, ohne Zauberkomponenten
    zu benötigen (Zauberrettungswurf-SG 17). Der Zauber wirkt 24 Stunden lang. Das bezauberte Ziel lässt sich bereitwillig
    vom Vampir beißen, der Schaden beendet denn Zauber nicht. Nach Ende des Zaubers weiß das Ziel, dass es vom Vampir bezaubert
    wurde.
- name: 'Gestaltwandeln:'
  beschreibung: Wenn der Vampir sich nicht im Sonnenlicht oder in fließendem Wasser befindet, kann er sich in eine winzige
    Fledermaus (Bewegungsrate 1,5 m, Flugbewegungsrate 9 m) oder eine mittelgroße Nebelwolke (Bewegungsrate 1,5 m, Flugbewegungsrate
    6 m (Schweben)) verwandeln oder seine Vampirgestalt annehmen. Alles, was er trägt, verwandelt sich mit ihm. In Fledermausgestalt
    kann der Vampir nicht sprechen. Seine Spielwerte sind abgesehen von Größe und Bewegungsrate unverändert. In Nebelgestalt
    kann der Vampir keine Aktionen ausführen, nicht sprechen und nicht mit Gegenständen interagieren. Er hat kein Gewicht
    und kann den Bereich eines Feindes betreten und dort stoppen. Sofern Luft durch einen Bereich strömen kann, kann der Nebel
    diesen Bereich ebenfalls passieren, jedoch keine Flüssigkeiten durchdringen. Er ist gegen alle Schadensarten resistent,
    abgesehen von durch Sonnenlicht erlittenen Schaden.
legendaere_aktionen:
- name: 'Betören:'
  beschreibung: Der Vampir wirkt den Zauber Befehl mit Charisma als Attribut zum Zauberwirken, ohne Zauber- komponenten zu
    benötigen (Zauberr ettungswurf-SG 17). Der Vampir kann diese Aktion erst nach Beginn seines nächsten Zugs erneut ausführen.
- name: 'Untoter Schlag:'
  beschreibung: Der Vampir legt bis zur Hälfte seiner Bewegungsrate zurück und führt einen Grabesschlag- Angriff aus.
