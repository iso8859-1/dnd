merkmale:
- name: 'Legendäre Resistenz (3-mal täglich, im Hort 4-mal täglich):'
  beschreibung: Wenn der Drache bei einem Rettungswurf scheitert, kann er beschließen, ihn stattdessen zu bestehen.
aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Drache führt drei Zerfetzen- Angriffe aus. Er kann einen Angriff durch einen Einsatz von Zauberwirken
    ersetzen, um den Zauber Zerbersten zu wirken.
- name: 'Zerfetzen:'
  beschreibung: 'Nahkampfangriffswurf: +12, Reichweite 3 m. Treffer: 16 (2W8+7) Hiebschaden plus 5 (1W10) Blitzschaden.'
- name: 'Blitzodem (Aufladung 5–6):'
  beschreibung: 'Geschicklichkeitsrettungs wurf: SG 19; jede Kreatur in einer 27 Meter langen, 1,5 Meter breiten Linie. Misserfolg:
    60 (11W10) Blitzschaden. Erfolg: Halber Schaden.'
- name: 'Zauberwirken:'
  beschreibung: 'Der Drache wirkt einen der folgenden Zauber mit Charisma als Attribut zum Zauberwirken, ohne Materialkomponenten
    zu benötigen (Zauber- rettungswurf-SG 18): Beliebig oft: Magie entdecken , Magierhand , Unsichtbarkeit , Zerbersten Je
    1-mal täglich: Ausspähung , Verständigung'
legendaere_aktionen:
- name: 'Getarnter Flug:'
  beschreibung: Der Drache setzt Zauberwirken ein, um den Zauber Unsichtbarkeit auf sich selbst zu wirken, und er kann bis
    zur Hälfte seiner Flugbewegungsrate verwenden. Der Drache kann diese Aktion erst nach Beginn seines nächsten Zugs erneut
    ausführen.
- name: 'Schallknall:'
  beschreibung: Der Drache setzt Zauberwirken ein, um den Zauber Zerbersten zu wirken. Der Drache kann diese Aktion erst nach
    Beginn seines nächsten Zugs erneut ausführen.
- name: 'Schwanzstreich:'
  beschreibung: Der Drache führt einen Zerfetzen- Angriff aus.
