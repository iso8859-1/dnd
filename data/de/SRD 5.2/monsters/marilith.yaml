merkmale:
- name: 'Dämonische Genesung:'
  beschreibung: Wenn der Marilith außerhalb des Abyss stirbt, löst sein Körper sich zu einer widerlichen Flüssigkeit auf.
    Der Marilith erhält sofort einen neuen Körper, der mit allen Trefferpunkten irgendwo im Abyss aufersteht.
- name: 'Magieresistenz:'
  beschreibung: Der Marilith ist bei Rettungswürfen gegen Zauber und andere magische Effekte im Vorteil.
- name: 'Reaktiv:'
  beschreibung: Der Marilith kann im Kampf in jedem Zug eine Reaktion ausführen.
aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Marilith führt sechs Paktklinge- Angriffe aus und setzt Umschlingen ein.
- name: 'Paktklinge:'
  beschreibung: 'Nahkampfangriffswurf: +10, Reichweite 1,5 m. Treffer: 10 (1W10+5) Hiebschaden plus 7 (2W6) nekrotischer Schaden.'
- name: 'Umschlingen:'
  beschreibung: 'Stärkerettungswurf: SG 17; eine Kreatur von höchstens mittelgroßer Größe im Abstand von bis zu 1,5 Metern
    vom Marilithen, die er sehen kann. Misserfolg: 15 (2W10+4) Wuchtschaden. Das Ziel wird gepackt (Flucht-SG 14). Solange
    es gepackt bleibt, ist es außerdem festgesetzt.'
bonusaktionen:
- name: 'Teleportieren (Aufladung 5–6):'
  beschreibung: Der Marilith teleportiert sich bis zu 36 Meter weit in einen freien Bereich, den er sehen kann.
reaktionen:
- name: 'Parieren:'
  beschreibung: 'Auslöser: Der Marilith wird von einem Nahkampfangriffswurf getroffen, während er eine Waffe hält. Antwort:
    Der Marilith fügt seiner RK gegen diesen Angriff 5 hinzu, sodass der Angriff möglicherweise misslingt.'
