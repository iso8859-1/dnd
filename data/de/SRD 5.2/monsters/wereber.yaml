aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Wereber führt zwei Angriffe mit Hauer und Wurfspeer in beliebiger Kombination aus. Er kann einen Angriff
    durch einen Zerfleischen-Angriff ersetzen.
- name: 'Hauer (nur Eber- oder hybride Gestalt):'
  beschreibung: 'Nahkampf angriffswurf: +5, Reichweite 1,5 m. Treffer: 10 (2W6+3) Stichschaden. Wenn das Ziel eine Kreatur
    von'
- name: 'Wurfspeer (nur humanoide oder hybride Gestalt):'
  beschreibung: 'Nah oder Fernkampfangriffswurf: +5, Reichweite 1,5 m oder Reichweite 9/36 m. Treffer: 13 (3W6+3) Stichschaden.'
- name: 'Zerfleischen (nur Eber- oder hybride Gestalt):'
  beschreibung: 'Nahkampfangriffswurf: +5, Reichweite 1,5 m. Treffer: 12 (2W8+3) Stichschaden. Wenn das Ziel ein Humanoide
    ist, erleidet es den folgenden Effekt: Konstitutionsrettungswurf: SG 12. Misserfolg: Das Ziel wird verflucht. Wenn die
    Trefferpunkte des verfluchten Ziels auf 0 sinken, wird es stattdessen zu einem Wereber unter der Kontrolle des SL und
    hat 10 Trefferpunkte. Erfolg: Das Ziel ist 24 Stunden lang gegen den Fluch dieses Werebers immun.'
aktionen_intro: höchstens mittelgroßer Größe ist und der Wereber sich unmittelbar vor dem Treffer mindestens sechs Meter weit
  in gerader Linie auf das Ziel zubewegt hat, erleidet das Ziel zusätzlich 7 (2W6) Stichschaden, wird umgestoßen und hat den
  Zustand Liegend.
bonusaktionen:
- name: 'Gestaltwandeln:'
  beschreibung: Der Wereber nimmt die Gestalt eines mittelgroßen Eber-Humanoiden-Hybriden, eines kleinen Ebers oder wieder
    seine wahre humanoide Gestalt an. Seine Spielwerte sind abgesehen von der Größe in jeder Gestalt gleich. Ausrüstung, die
    er trägt oder hält, wird nicht verwandelt.
