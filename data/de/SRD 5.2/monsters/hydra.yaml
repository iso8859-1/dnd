merkmale:
- name: 'Atem anhalten:'
  beschreibung: Die Hydra kann eine Stunde lang den Atem anhalten.
- name: 'Mehrere Köpfe:'
  beschreibung: 'Die Hydra hat fünf Köpfe. Wann immer die Hydra mindestens 25 Schaden in einem einzigen Zug erleidet, stirbt
    einer ihrer Köpfe. Sind alle Köpfe tot, so stirbt die Hydra. Bis dahin gilt: Am Ende jedes ihrer Züge wachsen der Hydra
    für jeden Kopf, der seit ihrem letzten Zug zerstört wurde, jeweils zwei Köpfe nach, sofern die Hydra seitdem keinen Feuerschaden
    erlitten hat. Die Hydra erhält zwölf Trefferpunkte zurück, wann immer ihr ein neuer Kopf wächst.'
- name: 'Reaktive Köpfe:'
  beschreibung: Für jeden Kopf über einen hinaus bekommt die Hydra eine zusätzliche Reaktion, die sie nur zu Gelegenheitsangriffen
    einsetzen kann.
aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Die Hydra führt so viele Bissangriffe aus, wie sie Köpfe hat.
- name: 'Biss:'
  beschreibung: 'Nahkampfangriffswurf: +8, Reichweite 3 m. Treffer: 10 (1W10+5) Stichschaden.'
