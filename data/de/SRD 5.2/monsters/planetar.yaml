merkmale:
- name: 'Erhabene Genesung:'
  beschreibung: Wenn der Planetar außerhalb des Bergs Celestia stirbt, verschwindet sein Körper. Der Planetar erhält sofort
    einen neuen Körper, der mit allen Trefferpunkten irgendwo am Berg Celestia aufersteht.
- name: 'Göttliches Bewusstsein:'
  beschreibung: Der Planetar erkennt, wenn er eine Lüge hört.
- name: 'Magieresistenz:'
  beschreibung: Der Planetar ist bei Rettungswürfen gegen Zauber und andere magische Effekte im Vorteil.
aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Planetar führt drei Gleißendes- Schwert-Angriffe aus oder setzt zweimal Heilige Explosion ein.
- name: 'Gleißendes Schwert:'
  beschreibung: 'Nahkampfangriffswurf: +12, Reichweite 3 m. Treffer: 14 (2W6+7) Hiebschaden plus 18 (4W8) gleißender Schaden.'
- name: 'Heilige Explosion:'
  beschreibung: 'Geschicklichkeitsrettungswurf: SG 20; jeder Gegner in einer Kugel mit einem Radius von sechs Metern um einen
    Punkt im Abstand von bis zu 36 Metern vom Planetar, den er sehen kann. Misserfolg: 24 (7W6) gleißender Schaden. Erfolg:
    Halber Schaden.'
- name: 'Zauberwirken:'
  beschreibung: 'Der Planetar wirkt einen der folgenden Zauber mit Charisma als Attribut zum Zauberwirken, ohne Materialkomponenten
    zu benötigen (Zauber- rettungswurf-SG 20): Beliebig oft: Gutes und Böses entdecken Je 1-mal täglich: Gutes und Böses bannen
    , Heiliges Gespräch , Tote erwecken , Wetterkontrolle'
bonusaktionen:
- name: 'Göttlicher Beistand (2-mal täglich):'
  beschreibung: Der Planetar wirkt einen der Zauber Fluch brechen , Schwache Genesung , Unsichtbarkeit oder Wunden heilen
    . Sein Attribut zum Zauberwirken ist dasselbe wie beim Ausführen der Zauberwirken-Aktion.
