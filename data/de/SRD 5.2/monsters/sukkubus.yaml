merkmale:
- name: 'Inkubus-Gestalt:'
  beschreibung: Wenn der Sukkubus eine lange Rast beendet, kann er sich in einen Inkubus verwandeln und verwendet dann dessen
    Wertekasten statt diesen.
aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Sukkubus führt einen Unholdische-Berührung-Angriff aus und setzt Bezaubern oder Schwächender Kuss ein.
- name: 'Unholdische Berührung:'
  beschreibung: 'Nahkampfangriffswurf: +7, Reichweite 1,5 m. Treffer: 16 (2W10+5) psychischer Schaden.'
- name: 'Bezaubern:'
  beschreibung: Der Sukkubus wirkt den Zauber Person beherrschen (Version des 8. Grades) mit Charisma als Attribut zum Zauberwirken,
    ohne Zauberkomponenten zu benötigen (Zauberrettungswurf-SG 15).
- name: 'Schwächender Kuss:'
  beschreibung: 'Konstitutionsrettungswurf: SG 15; eine vom Sukkubus bezauberte Kreatur im Abstand von bis zu 1,5 Metern vom
    Sukkubus. Misserfolg: 13 (3W8) psychischer Schaden. Erfolg: Halber Schaden. Erfolg oder Misserfolg: Das Trefferpunktemaximum
    des Ziels wird um eine Anzahl in Höhe des erlittenen Schadens verringert.'
bonusaktionen:
- name: 'Gestaltwandeln:'
  beschreibung: Der Sukkubus nimmt die Gestalt eines Humanoiden von höchstens mittelgroßer Größe oder wieder seine wahre Gestalt
    an. Seine Spielwerte sind in allen Formen gleich, allerdings hat er die Flugbewegungsrate nur in seiner wahren Gestalt.
    Ausrüstung, die er trägt oder hält, wird nicht verwandelt.
