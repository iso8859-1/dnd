merkmale:
- name: 'Abneigung gegen Feuer:'
  beschreibung: Wenn der Golem Feuer- schaden erleidet, ist er bis zum Ende seines nächsten Zugs bei Angriffs- und Attributswürfen
    im Nachteil.
- name: 'Berserker:'
  beschreibung: Wann immer der Golem seinen Zug blutig beginnt, würfle mit 1W6. Bei einer 6 gerät der Golem in Kampfrausch.
    Im Kampfrausch greift der Golem die Kreatur an, die ihm am nächsten ist und die er sehen kann. Wenn sich keine Kreatur
    in Angriffsreichweite befindet, greift der Golem einen Gegenstand an. Der Kampfrausch hält an, bis der Golem zerstört
    wird oder nicht mehr blutig ist. Der Schöpfer des Golems kann versuchen, ihn zu besänftigen, sofern er sich im Abstand
    von bis zu 18 Metern von ihm befindet. Dazu muss der Schöpfer eine Aktion und einen SG-15-Charismawurf (Überzeugen) ausführen,
    und der Golem muss seinen Schöpfer hören können. Bei einem Erfolg ist der Golem bis zum Beginn seines nächsten Zugs nicht
    mehr im Kampfrausch. Wenn er dann noch blutig ist, würfelt er sein Berserker-Merkmal erneut aus.
- name: 'Blitzabsorption:'
  beschreibung: Der Golem erleidet keinen Schaden durch Blitze, sondern erhält Trefferpunkte in Höhe des Blitzschadens zurück.
- name: 'Magieresistenz:'
  beschreibung: Der Golem ist bei Rettungswürfen gegen Zauber und andere magische Effekte im Vorteil.
- name: 'Unveränderliche Gestalt:'
  beschreibung: Der Golem kann keine andere Gestalt annehmen.
aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Golem führt zwei Hiebangriffe aus.
- name: 'Hieb:'
  beschreibung: 'Nahkampfangriffswurf: +7, Reichweite 1,5 m. Treffer: 13 (2W8+4) Wuchtschaden plus 4 (1W8) Blitzschaden.'
