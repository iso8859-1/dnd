merkmale:
- name: 'Blitzabsorption:'
  beschreibung: Der modernde Schlurfer erleidet durch Blitze keinen Schaden, sondern erhält Trefferpunkte in Höhe des Blitzschadens
    zurück.
aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der modernde Schlurfer führt drei Geladenes-Tentakel-Angriffe aus. Er kann einen Angriff durch einen Einsatz
    von Einhüllen ersetzen.
- name: 'Geladenes Tentakel:'
  beschreibung: 'Nahkampfangriffswurf: +7, Reichweite 3 m. Treffer: 7 (1W6+4) Wuchtschaden plus 5 (2W4) Blitzschaden. Wenn
    das Ziel eine Kreatur von höchstens mittelgroßer Größe ist, zieht der modernde Schlurfer es 1,5 Meter weit in gerader
    Linie auf sich zu.'
- name: 'Einhüllen:'
  beschreibung: 'Stärkerettungswurf: SG 15; eine Kreatur von höchstens mittelgroßer Größe im Abstand von bis zu 1,5 Metern.
    Misserfolg: Das Ziel wird in den Bereich des modernden Schlurfers gezogen und gepackt (Flucht-SG 14). Das gepackte Ziel
    ist blind und festgesetzt und erleidet zu Beginn jedes seiner Züge 10 (3W6) Blitzschaden. Bewegt sich der modernde Schlurfer,
    so bewegt sich das gepackte Ziel mit ihm. Dies verbraucht keine zusätzliche Bewegung. Der modernde Schlurfer kann mit
    dieser Aktion nur jeweils eine Kreatur gepackt halten.'
