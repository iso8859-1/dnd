merkmale:
- name: 'Legendäre Resistenz (4-mal täglich, im Hort 5-mal täglich):'
  beschreibung: Wenn der Drache bei einem Rettungswurf scheitert, kann er beschließen, ihn stattdessen zu bestehen.
aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Drache führt drei Zerfetzen- Angriffe aus. Er kann einen Angriff durch einen Einsatz von Zauberwirken
    ersetzen, um den Zauber Zerbersten (Version des 3. Grades) zu wirken.
- name: 'Zerfetzen:'
  beschreibung: 'Nahkampfangriffswurf: +16, Reichweite 4,5 m. Treffer: 18 (2W8+9) Hiebschaden plus 11 (2W10) Blitzschaden.'
- name: 'Blitzodem (Aufladung 5–6):'
  beschreibung: 'Geschicklichkeitsrettungs wurf: SG 23; jede Kreatur in einer 36 Meter langen, drei Meter breiten Linie. Misserfolg:
    88 (16W10) Blitzschaden. Erfolg: Halber Schaden.'
- name: 'Zauberwirken:'
  beschreibung: 'Der Drache wirkt einen der folgenden Zauber mit Charisma als Attribut zum Zauberwirken, ohne Materialkomponenten
    zu benötigen (Zauber- rettungswurf-SG 22): Beliebig oft: Magie entdecken , Magierhand , Unsichtbarkeit , Zerbersten (Version
    des 3. Grades) Je 1-mal täglich: Ausspähung , Verständigung'
legendaere_aktionen:
- name: 'Getarnter Flug:'
  beschreibung: Der Drache setzt Zauberwirken ein, um den Zauber Unsichtbarkeit auf sich selbst zu wirken, und er kann bis
    zur Hälfte seiner Flugbewegungsrate
- name: 'Schallknall:'
  beschreibung: Der Drache setzt Zauberwirken ein, um den Zauber Zerbersten (Version des 3. Grades) zu wirken. Der Drache
    kann diese Aktion erst nach Beginn seines nächsten Zugs erneut ausführen.
- name: 'Schwanzstreich:'
  beschreibung: Der Drache führt einen Zerfetzen- Angriff aus.
legendaere_aktionen_intro: verwenden. Der Drache kann diese Aktion erst nach Beginn seines nächsten Zugs erneut ausführen.
