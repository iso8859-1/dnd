merkmale:
- name: 'Amphibisch:'
  beschreibung: Der Aboleth kann Luft und Wasser atmen.
- name: 'Legendäre Resistenz (3-mal täglich, im Hort 4-mal täglich):'
  beschreibung: Wenn der Aboleth bei einem Rettungswurf scheitert, kann er beschließen, ihn stattdessen zu bestehen.
- name: 'Schauerliche Genesung:'
  beschreibung: Wenn der Aboleth zerstört wird, erhält er nach 5W10 Tagen einen neuen Körper, der mit allen Trefferpunkten
    im Fernen Reich oder an einem anderen Ort nach Wahl des SL aufersteht.
- name: 'Schleimwolke:'
  beschreibung: 'Unter Wasser ist der Aboleth von Schleim umgeben. Konstitutionsrettungswurf: SG 14; jede Kreatur in einer
    Ausströmung von 1,5 Metern, die am Ende seines Zugs vom Abolethen ausgeht. Misserfolg: Das Ziel wird verflucht. Bis der
    Fluch endet, ist die Haut des Ziels schleimig, das Ziel kann Luft und Wasser atmen und nur unter Wasser Trefferpunkte
    zurückerhalten. Wenn die verfluchte Kreatur sich nicht im Wasser befindet, erleidet sie nach jeweils zehn Minuten 6 (1W12)
    Säureschaden, sofern ihre Haut nicht befeuchtet wird, bevor zehn Minuten vergangen sind.'
- name: 'Sondierende Telepathie:'
  beschreibung: Wenn eine Kreatur, die der Aboleth sehen kann, telepathisch mit dem Abolethen kommuniziert, erfährt er die
    tiefsten Wünsche der Kreatur.
aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Aboleth führt zwei Tentakel- angriffe aus und setzt entweder Erinnerungen verzehren oder Gedanken beherrschen
    ein, sofern verfügbar.
- name: 'Tentakel:'
  beschreibung: 'Nahkampfangriffswurf: +9, Reichweite 4,5 m. Treffer: 12 (2W6+5) Wuchtschaden. Wenn das Ziel eine Kreatur
    von höchstens großer Größe ist, wird es von einem der vier Tentakel gepackt (Flucht-SG 14).'
- name: 'Erinnerungen verzehren:'
  beschreibung: 'Intelligenzrettungswurf: SG 16; eine Kreatur im Abstand von bis zu neun Metern, die vom Abolethen bezaubert
    ist oder gepackt wurde. Misserfolg: 10 (3W6) psychischer Schaden. Erfolg: Halber Schaden. Erfolg oder Misserfolg: Wenn
    das Ziel ein Humanoide ist und seine Trefferpunkte durch diese Aktion auf 0 sinken, erhält der Aboleth die Erinnerungen
    des Ziels.'
- name: 'Gedanken beherrschen (2-mal täglich):'
  beschreibung: 'Weisheits rettungswurf: SG 16; eine Kreatur im Abstand von bis zu neun Metern vom Abolethen, die er sehen
    kann. Misserfolg: Das Ziel ist bezaubert, bis der Aboleth stirbt oder sich auf eine andere Existenzebene als das Ziel
    begibt. Das bezauberte Ziel handelt als Verbündeter des Abolethen und steht unter seiner Kontrolle, sofern es sich im
    Abstand von bis zu 18 Metern von ihm befindet. Außerdem können der Aboleth und das Ziel auf beliebige Distanz telepathisch
    miteinander kommunizieren. Das Ziel wiederholt den Rettungswurf, wann immer es Schaden erleidet, außerdem nach jeweils
    24 Stunden, die es mindestens 1,6 Kilometer weit vom Abolethen entfernt verbracht hat. Bei einem Erfolg endet der Effekt
    bei ihm.'
legendaere_aktionen:
- name: 'Peitschenhieb:'
  beschreibung: Der Aboleth führt einen Tentakelangriff aus.
- name: 'Psychische Absaugung:'
  beschreibung: Wenn der Aboleth mindestens eine Kreatur bezaubert hat oder gepackt hält, setzt er Erinnerungen verzehren
    ein und erhält 5 (1W10) Trefferpunkte zurück.
