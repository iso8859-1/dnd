merkmale:
- name: 'Ätherische Sicht:'
  beschreibung: Die Spinne kann 18 Meter weit in die Ätherebene blicken, wenn sie sich auf der materiellen Ebene befindet,
    sowie umgekehrt.
- name: 'Netzwandler:'
  beschreibung: Die Spinne ignoriert Bewegungsein- schränkungen durch Netze und weiß genau, wo sich andere Kreaturen aufhalten,
    die in Kontakt mit demsel- ben Netz sind.
- name: 'Spinnenklettern:'
  beschreibung: Die Spinne kann ohne Attributswürfe schwierige Oberflächen erklimmen und sich an Decken entlang bewegen.
aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Die Spinne führt zwei Bissangriffe aus.
- name: 'Biss:'
  beschreibung: 'Nahkampfangriffswurf: +5, Reichweite 1,5 m. Treffer: 8 (1W10+3) Stichschaden plus 9 (2W8) Giftschaden. Wenn
    die Trefferpunkte des Ziels durch diesen Schaden auf 0 sinken, wird das Ziel stabil und ist eine Stunde lang vergiftet.
    Solange das Ziel vergiftet ist, ist es außerdem gelähmt.'
bonusaktionen:
- name: 'Ätherische Bewegung:'
  beschreibung: Die Spinne teleportiert sich von der materiellen Ebene aus auf die Ätherebene oder umgekehrt.
