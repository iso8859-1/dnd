merkmale:
- name: 'Amphibisch:'
  beschreibung: Der Drache kann Luft und Wasser atmen.
- name: 'Legendäre Resistenz (4-mal täglich, im Hort 5-mal täglich):'
  beschreibung: Wenn der Drache bei einem Rettungswurf scheitert, kann er beschließen, ihn stattdessen zu bestehen.
aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Drache führt drei Zerfetzen- Angriffe aus. Er kann einen Angriff durch einen Einsatz von Zauberwirken
    ersetzen, um den Zauber Säurepfeil (Version des 4. Grades) zu wirken.
- name: 'Zerfetzen:'
  beschreibung: 'Nahkampfangriffswurf: +15, Reichweite 4,5 m. Treffer: 17 (2W8+8) Hiebschaden plus 9 (2W8) Säureschaden.'
- name: 'Säureodem (Aufladung 5–6):'
  beschreibung: 'Geschicklichkeits rettungswurf: SG 22; jede Kreatur in einer 27 Meter langen, drei Meter breiten Linie. Misserfolg:
    67 (15W8) Säureschaden. Erfolg: Halber Schaden.'
- name: 'Zauberwirken:'
  beschreibung: 'Der Drache wirkt einen der folgenden Zauber mit Charisma als Attribut zum Zauberwirken, ohne Materialkomponenten
    zu benötigen (Zauber rettungswurf-SG 21, +13 auf Treffer mit Zauberangriffen): Beliebig oft: Furcht , Magie entdecken
    , Säurepfeil (Version des 4. Grades) Je 1-mal täglich: Ätzkugel (Version des 5. Grades), Mit Toten sprechen , Untote erschaffen'
legendaere_aktionen:
- name: 'Anspringen:'
  beschreibung: Der Drache legt bis zur Hälfte seiner Bewegungsrate zurück und führt einen Zerfetzen- Angriff aus.
- name: 'Furchterregende Präsenz:'
  beschreibung: Der Drache setzt Zauberwirken ein, um den Zauber Furcht zu wirken. Der Drache kann diese Aktion erst nach
    Beginn seines nächsten Zugs erneut ausführen.
- name: 'Insektenwolke:'
  beschreibung: 'Geschicklichkeitsrettungswurf: SG 21; eine Kreatur im Abstand von bis zu 36 Metern, die der Drache sehen
    kann. Misserfolg: 33 (6W10) Giftschaden, und das Ziel ist bis zum Ende seines nächsten Zugs bei Rettungswürfen zum Aufrechterhalten
    der Konzentration im Nachteil. Erfolg oder Misserfolg: Der Drache kann diese Aktion erst nach Beginn seines nächsten Zugs
    erneut ausführen.'
