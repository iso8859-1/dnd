- name: 'Bäume beleben (1-mal täglich):'
  beschreibung: Der Baumhirte belebt auf magische Art bis zu zwei Bäume im Abstand von bis zu 18 Metern von sich, die er sehen
    kann. Jeder Baum verwendet den Wertekasten des Baumhirten , hat allerdings einen Intelligenz- und einen Charismawert von
    1, kann nicht sprechen, und diese Aktion steht ihm nicht zur Verfügung. Der Baum ist unmittelbar nach dem Baumhirten beim
    selben Initiativewert am Zug und gehorcht dem Baumhirten. Ein Baum bleibt belebt, bis ein Tag vergangen ist, bis er stirbt,
    bis er weiter als 36 Meter vom Baumhirten entfernt ist oder bis der Baumhirte stirbt. In diesem Fall versucht er, sich
    wieder zu verwurzeln.
