- name: 'Verlockender Gesang:'
  beschreibung: 'Die Harpyie singt eine magische Melodie, die erhalten bleibt, bis die Konzentration der Harpyie darauf endet.
    Weisheitsrettungswurf: SG 11; alle Humanoiden und Riesen in einer Ausströmung von 90 Metern, die von der Harpyie ausgeht,
    wenn der Gesang beginnt. Misserfolg: Das Ziel ist bezaubert, bis der Gesang endet, und wiederholt den Rettungswurf am
    Ende jedes seiner Züge. Das bezauberte Ziel ist kampfunfähig und ignoriert den Verlockenden Gesang anderer Harpyien. Wenn
    das Ziel weiter als 1,5 Meter von der Harpyie entfernt ist, bewegt es sich in seinem Zug auf dem direktesten Weg auf die
    Harpyie zu, um sich im Abstand von bis zu 1,5 Metern von ihr aufzuhalten. Es vermeidet dabei keine Gelegenheitsangriffe.
    Bevor das Ziel sich jedoch auf schädigendes Gelände (wie in Lava oder eine Grube) bewegt und wann immer es Schaden durch
    eine Quelle außer der Harpyie erleidet, kann es den Rettungswurf wiederholen. Erfolg: Das Ziel ist 24 Stunden lang gegen
    den Verlockenden Gesang dieser Harpyie immun.'
