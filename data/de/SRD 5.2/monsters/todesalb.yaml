merkmale:
- name: 'Empfindlich gegenüber Sonnenlicht:'
  beschreibung: Im Sonnenlicht ist der Todesalb bei Angriffs- und Attributswürfen im Nachteil.
- name: 'Körperlose Bewegung:'
  beschreibung: Der Todesalb kann sich durch andere Kreaturen und Gegenstände bewegen, als wären sie schwieriges Gelände.
    Er erleidet 5 (1W10) Energieschaden, wenn er den Zug in einem Gegenstand beendet.
aktionen:
- name: 'Lebensentzug:'
  beschreibung: 'Nahkampfangriffswurf: +6, Reichweite 1,5 m. Treffer: 21 (4W8+3) nekrotischer Schaden. Wenn das Ziel eine
    Kreatur ist, wird sein Trefferpunktemaximum um einen Betrag in Höhe des erlittenen Schadens verringert.'
- name: 'Schreckgespenst erschaffen:'
  beschreibung: Der Todesalb zielt auf einen Humanoiden im Abstand von bis zu drei Metern von ihm, der seit höchstens einer
    Minute tot ist. Der Geist des Ziels erhebt sich im Bereich seiner Leiche oder im nächsten freien Bereich als Schreckgespenst
    , Das Schreckgespenst steht unter der Kontrolle des Todesalbs. Der Todesalb kann höchstens sieben Schreckgespenster zugleich
    unter seiner Kontrolle haben.
