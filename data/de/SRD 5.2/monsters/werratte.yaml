aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Die Werratte führt zwei Kratzen- oder Handarmbrust-Angriffe in beliebiger Kombination aus. Sie kann einen
    Angriff durch einen Bissangriff ersetzen.
- name: 'Biss (nur Ratten- oder hybride Gestalt):'
  beschreibung: 'Nahkampf angriffswurf: +5, Reichweite 1,5 m. Treffer: 8 (2W4+3) Stichschaden. Wenn das Ziel ein Humanoide
    ist, erleidet es den folgenden Effekt: Konstitutionsrettungswurf: SG 11. Misserfolg: Das Ziel wird verflucht. Wenn die
    Treffer- punkte des verfluchten Ziels auf 0 sinken, wird es stattdessen zu einer Werratte unter der Kontrolle des SL und
    hat 10 Trefferpunkte. Erfolg: Das Ziel ist 24 Stunden lang gegen den Fluch dieser Werratte immun.'
- name: 'Kratzen:'
  beschreibung: 'Nahkampfangriffswurf: +5, Reichweite 1,5 m. Treffer: 6 (1W6+3) Hiebschaden.'
- name: 'Handarmbrust (nur humanoide oder hybride Gestalt):'
  beschreibung: 'Fernkampfangriffswurf: +5, Reichweite 9/36 m. Treffer: 6 (1W6+3) Stichschaden.'
bonusaktionen:
- name: 'Gestaltwandeln:'
  beschreibung: Die Werratte nimmt die Gestalt eines mittelgroßen Ratte-Humanoiden-Hybriden, einer kleinen Ratte oder wieder
    ihre wahre humanoide Gestalt an. Ihre Spielwerte sind abgesehen von der Größe in jeder Gestalt gleich. Ausrüstung, die
    sie trägt oder hält, wird nicht verwandelt.
