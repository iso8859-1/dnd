merkmale:
- name: 'Legendäre Resistenz (4-mal täglich, im Hort 5-mal täglich):'
  beschreibung: Wenn der Lich bei einem Rettungswurf scheitert, kann er beschließen, ihn stattdessen zu bestehen.
- name: 'Seelengefäß:'
  beschreibung: Wenn der Lich zerstört wird, ersteht er nach 1W10 Tagen mit allen Trefferpunkten wieder auf, sofern er ein
    Seelengefäß hat. Der neue Körper erscheint in einem freien Bereich im Hort des Lichs.
aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Lich führt drei Angriffe mit Lähmende Berührung oder Mystische Explosion in beliebiger Kombination aus.
- name: 'Lähmende Berührung:'
  beschreibung: 'Nahkampfangriffswurf: +12, Reichweite 1,5 m. Treffer: 15 (3W6+5) Kälteschaden, und das Ziel ist bis zum Beginn
    des nächsten Zugs des Lichs gelähmt.'
- name: 'Mystische Explosion:'
  beschreibung: 'Nah oder Fernkampfangriffswurf: +12, Reichweite 1,5 m oder Reichweite 36 m. Treffer: 31 (4W12+5) Energieschaden.'
- name: 'Zauberwirken:'
  beschreibung: 'Der Lich wirkt einen der folgenden Zauber mit Intelligenz als Attribut zum Zauberwirken (Zauberrettungswurf-SG
    20): Beliebig oft: Blitz (Version des 5. Grades), Feuerball (Version des 5. Grades), Gedanken wahrnehmen , Magie bannen
    , Magie entdecken , Magierhand , Taschenspielerei , Unsichtbarkeit Je 2-mal täglich: Dimensionstür , Ebenenwechsel , Tote
    beleben Je 1-mal täglich: Ausspähung , Finger des Todes , Kettenblitz , Wort der Macht: Tod'
reaktionen:
- name: 'Schutzmagie:'
  beschreibung: Der Lich wirkt den Zauber Gegenzauber oder Schild als Antwort auf den Auslöser des Zaubers. Sein Attribut
    zum Zauberwirken ist dasselbe wie beim Ausführen der Zauberwirken-Aktion.
legendaere_aktionen:
- name: 'Furchteinflößender Blick:'
  beschreibung: Der Lich wirkt den Zauber Furcht . Sein Attribut zum Zauberwirken ist dasselbe wie beim Ausführen der Zauberwirken-Aktion.
    Der Lich kann diese Aktion erst nach Beginn seines nächsten Zugs erneut ausführen.
- name: 'Lebensunterbrechung:'
  beschreibung: 'Konstitutionsrettungswurf: SG 20; jede Kreatur, die kein Untoter ist und die sich in einer Ausströmung von
    sechs Metern befindet, die vom Lich ausgeht. Misserfolg: 31 (9W6) nekrotischer Schaden. Erfolg: Halber Schaden. Erfolg
    oder Misserfolg: Der Lich kann diese Aktion erst nach Beginn seines nächsten Zugs erneut ausführen.'
- name: 'Tödliches Teleportieren:'
  beschreibung: Der Lich teleportiert sich bis zu 18 Meter weit in einen freien Bereich, den er sehen kann, und jede Kreatur
    im Abstand von bis zu drei Metern vom Bereich, den er verlassen hat, erleidet 11 (2W10) nekrotischen Schaden.
