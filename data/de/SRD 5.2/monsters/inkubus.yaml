merkmale:
- name: 'Sukkubus-Gestalt:'
  beschreibung: Wenn der Inkubus eine lange Rast beendet, kann er sich in einen Sukkubus verwandeln und verwendet dann dessen
    Wertekasten statt diesen. Ausrüstung, die er trägt oder hält, wird nicht verwandelt.
aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Inkubus führt zwei Angriffe mit Berührung der Rastlosigkeit aus.
- name: 'Berührung der Rastlosigkeit:'
  beschreibung: 'Nahkampfangriffswurf: +7, Reichweite 1,5 m. Treffer: 15 (3W6+5) psychischer Schaden, und das Ziel ist verflucht,
    bis 24 Stunden vergangen sind oder der Inkubus stirbt. Das verfluchte Ziel erhält durch kurze Rasten keinen Vorzug.'
- name: 'Zauberwirken:'
  beschreibung: 'Der Inkubus wirkt einen der folgenden Zauber mit Charisma als Attribut zum Zauberwirken, ohne Materialkomponenten
    zu benötigen (Zauber- rettungswurf-SG 15): Beliebig oft: Körperlosigkeit , Selbstverkleidung Je 1-mal täglich: Hypnotisches
    Muster , Traum'
bonusaktionen:
- name: 'Albtraum (Aufladung 6):'
  beschreibung: 'Weisheitsrettungswurf: SG 15; eine Kreatur im Abstand von bis zu 18 Metern vom Inkubus, die er sehen kann.
    Misserfolg: Wenn das Ziel höchstens 20 Trefferpunkte hat, ist es bewusstlos, bis eine Stunde vergangen ist, bis es Schaden
    erleidet oder bis eine Kreatur im Abstand von bis zu 1,5 Metern von ihm eine Aktion ausführt, um es zu wecken. Anderenfalls
    erleidet das Ziel 18 (4W8) psychischen Schaden.'
