aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Chuul führt zwei Zangenangriffe aus und setzt Lähmende Tentakel ein.
- name: 'Zange:'
  beschreibung: 'Nahkampfangriffswurf: +6, Reichweite 3 m. Treffer: 9 (1W10+4) Wuchtschaden. Wenn das Ziel eine Kreatur von
    höchstens großer Größe ist, wird es von einer der zwei Zangen gepackt (Flucht-SG 14).'
- name: 'Lähmende Tentakel:'
  beschreibung: 'Konstitutionsrettungswurf: SG 13; eine Kreatur, die vom Chuul gepackt wurde. Misserfolg: Das Ziel ist vergiftet
    und wiederholt den Rettungswurf am Ende jedes seiner Züge. Bei einem Erfolg endet der Effekt bei ihm. Nach einer Minute
    besteht es den Rettungswurf automatisch. Solange das Ziel vergiftet ist, ist es außerdem gelähmt.'
