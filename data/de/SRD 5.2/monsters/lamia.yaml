aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Lamia führt zwei Klauenangriffe aus. Er kann einen Angriff durch einen Einsatz von Verderbende Berührung
    ersetzen.
- name: 'Klauen:'
  beschreibung: 'Nahkampfangriffswurf: +5, Reichweite 1,5 m. Treffer: 7 (1W8+3) Hiebschaden plus 7 (2W6) psychischer Schaden.'
- name: 'Verderbende Berührung:'
  beschreibung: 'Weisheitsrettungswurf: SG 13; eine Kreatur im Abstand von bis zu 1,5 Metern vom Lamia, die von dem Lamia
    gesehen werden kann. Misserfolg: 13 (3W8) psychischer Schaden, und das Ziel ist eine Stunde lang verflucht. Bis der Fluch
    endet, ist das Ziel bezaubert und vergiftet.'
- name: 'Zauberwirken:'
  beschreibung: 'Der Lamia wirkt einen der folgenden Zauber mit Charisma als Attribut zum Zauberwirken, ohne Materialkomponenten
    zu benötigen (Zauber- rettungswurf-SG 13): Beliebig oft: Einfache Illusion , Selbstverkleidung (kann als mittelgroßer
    oder großer Zweibeiner erscheinen) Je 1-mal täglich: Ausspähung , Geas , Mächtiges Trugbild'
bonusaktionen:
- name: 'Sprung:'
  beschreibung: Der Lamia springt bis zu neun Meter weit und verbraucht dabei nur drei Meter Bewegung.
