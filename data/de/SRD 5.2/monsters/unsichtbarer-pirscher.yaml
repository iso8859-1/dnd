merkmale:
- name: 'Luftgestalt:'
  beschreibung: Der Pirscher kann in den Bereich eines Gegners eindringen und dort stoppen. Er kann sich durch enge Bereiche
    von nur 2,5 Zentimetern Durchmesser bewegen, ohne zusätzliche Bewegung aufzuwenden.
- name: 'Unsichtbarkeit:'
  beschreibung: Der Pirscher ist unsichtbar.
aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Pirscher führt drei Windstreich- Angriffe aus. Er kann einen Angriff durch einen Einsatz von Wirbel ersetzen.
- name: 'Windstreich:'
  beschreibung: 'Nahkampfangriffswurf: +7, Reichweite 1,5 m. Treffer: 11 (2W6+4) Energieschaden.'
- name: 'Wirbel:'
  beschreibung: 'Konstitutionsrettungswurf: SG 14; eine Kreatur von höchstens großer Größe im Bereich des Pirschers. Misserfolg:
    7 (1W8+3) Schallschaden, und das Ziel wird gepackt (Flucht-SG 13). Das gepackte Ziel kann keine Zauber mit Verbalkomponente
    wirken und erleidet zu Beginn jedes Zugs des Pirschers 7 (2W6) Schallschaden.'
