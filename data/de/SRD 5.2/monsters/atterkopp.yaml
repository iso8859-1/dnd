merkmale:
- name: 'Netzwandler:'
  beschreibung: Der Atterkopp ignoriert Bewegungs- einschränkungen durch Netze und weiß genau, wo sich andere Kreaturen aufhalten,
    die in Kontakt mit demselben Netz sind.
- name: 'Spinnenklettern:'
  beschreibung: Der Atterkopp kann ohne Attributs- würfe schwierige Oberflächen erklimmen und sich an Decken entlang bewegen.
aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Atterkopp führt einen Bissangriff und einen Klauenangriff aus.
- name: 'Biss:'
  beschreibung: 'Nahkampfangriffswurf: +4, Reichweite 1,5 m. Treffer: 5 (1W6+2) Stichschaden plus 2 (1W4) Giftschaden, und
    das Ziel ist bis zum Beginn des nächsten Zugs des Atterkopps vergiftet.'
- name: 'Klauen:'
  beschreibung: 'Nahkampfangriffswurf: +4, Reichweite 1,5 m. Treffer: 7 (2W4+2) Hiebschaden.'
- name: 'Netzfaden (Aufladung 5–6):'
  beschreibung: 'Geschicklichkeitsrettungs wurf: SG 12; eine Kreatur von höchstens großer Größe im Abstand von bis zu neun
    Metern vom Atterkopp, die er sehen kann. Misserfolg: Das Ziel ist festgesetzt, bis das Netz zerstört wird (RK 10, 5 TP,
    anfällig für Feuerschaden, gegen Gift-, psychischen und Wuchtschaden immun).'
bonusaktionen:
- name: 'Einholen:'
  beschreibung: Der Atterkopp zieht eine Kreatur im Abstand von bis zu neun Metern von sich, die von seinem Netzfaden festgesetzt
    ist, bis zu 7,5 Meter weit in gerader Linie auf sich zu.
