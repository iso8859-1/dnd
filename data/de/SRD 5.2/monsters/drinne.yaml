merkmale:
- name: 'Empfindlich gegenüber Sonnenlicht:'
  beschreibung: Im Sonnenlicht ist der Drinne bei Angriffs- und Attributswürfen im Nachteil.
- name: 'Netzwandler:'
  beschreibung: Der Drinne ignoriert Bewegungs- einschränkungen durch Netze und weiß genau, wo sich andere Kreaturen aufhalten,
    die in Kontakt mit demselben Netz sind.
- name: 'Spinnenklettern:'
  beschreibung: Der Drinne kann ohne Attributswürfe schwierige Oberflächen erklimmen und sich an Decken entlang bewegen.
aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Drinne führt drei Angriffe mit Vorderbein oder Giftexplosion in beliebiger Kombination aus.
- name: 'Vorderbein:'
  beschreibung: 'Nahkampfangriffswurf: +7, Reichweite 3 m. Treffer: 13 (2W8+4) Stichschaden.'
- name: 'Giftexplosion:'
  beschreibung: 'Fernkampfangriffswurf: +6, Reichweite 36 m. Treffer: 13 (3W6+3) Giftschaden.'
bonusaktionen:
- name: 'Magie der Spinnenkönigin (Aufladung 5–6):'
  beschreibung: Der Drinne wirkt einen der Zauber Dunkelheit , Feenfeuer oder Spinnennetz mit Weisheit als Attribut zum Zauberwirken,
    ohne Materialkomponenten zu benötigen (Zauber rettungswurf-SG 14).
