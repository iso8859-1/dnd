- name: 'Zerfetzen:'
  beschreibung: 'Nahkampfangriffswurf: +10, Reichweite 3 m. Treffer: 17 (2W10+6) Hiebschaden.'
- name: 'Feuerodem (Aufladung 5–6):'
  beschreibung: 'Geschicklichkeits rettungswurf: SG 17; jede Kreatur in einem Kegel von neun Metern. Misserfolg: 55 (10W10)
    Feuerschaden. Erfolg: Halber Schaden.'
- name: 'Schwächender Odem:'
  beschreibung: 'Stärkerettungswurf: SG 17; jede Kreatur in einem Kegel von neun Metern, die derzeit nicht von diesem Odem
    betroffen ist. Misserfolg: Das Ziel ist bei W20-Prüfungen, die auf Stärke basieren, im Nachteil, und es zieht 3 (1W6)
    von seinen Schadenswürfen ab. Es wiederholt den Rettungswurf am Ende jedes seiner Züge. Bei einem Erfolg endet der Effekt
    bei ihm. Nach einer Minute besteht es den Rettungswurf automatisch.'
