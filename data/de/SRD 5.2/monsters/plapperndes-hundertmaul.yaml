merkmale:
- name: 'Aberranter Boden:'
  beschreibung: Der Boden ist in einer Ausströmung von drei Metern, die vom Hundertmaul ausgeht, schwieriges Gelände.
- name: 'Plappern:'
  beschreibung: 'Das Hundertmaul plappert unzusammen- hängend, solange es nicht kampfunfähig ist. Weisheits rettungswurf:
    SG 10; jede Kreatur, die ihren Zug im Abstand von bis zu sechs Metern vom Hundertmaul beginnt, während es plappert. Misserfolg:
    Das Ziel ermittelt mit 1W8, was es im aktuellen Zug tut: 1–4: Das Ziel tut nichts. 5–6: Das Ziel führt weder eine Aktion
    noch eine Bonusaktion aus und verwendet seine gesamte Bewegungsrate, um sich in eine zufällige Richtung zu bewegen. 7–8:
    Das Ziel führt einen Nahkampfangriff gegen eine zufällig ermittelte Kreatur in Reichweite aus. Ist ein solcher Angriff
    nicht möglich, so tut das Ziel nichts.'
aktionen:
- name: 'Biss:'
  beschreibung: 'Nahkampfangriffswurf: +2, Reichweite 1,5 m. Treffer: 7 (2W6) Stichschaden. Wenn das Ziel eine Kreatur von
    höchstens mittelgroßer Größe ist, wird es umgestoßen und hat den Zustand Liegend. Wenn die Trefferpunkte des Ziels durch
    diesen Angriff auf 0 sinken, stirbt das Ziel. Seine Leiche wird vom Hundertmaul absorbiert, und nur die Ausrüstung bleibt
    zurück.'
- name: 'Blendender Speichel (Aufladung 5–6):'
  beschreibung: 'Geschicklich keits rettungswurf: SG 10; jede Kreatur in einer Kugel mit einem Radius von drei Metern um einen
    Punkt im Abstand von bis zu neun Metern. Misserfolg: 7 (2W6) gleißender Schaden, und das Ziel ist bis zum Beginn des nächsten
    Zugs des Hundertmauls blind.'
