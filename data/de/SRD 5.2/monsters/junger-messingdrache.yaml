aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Drache führt drei Zerfetzen- Angriffe aus. Er kann zwei Angriffe durch einen Einsatz von Schlafodem ersetzen.
- name: 'Zerfetzen:'
  beschreibung: 'Nahkampfangriffswurf: +7, Reichweite 3 m. Treffer: 15 (2W10+4) Hiebschaden.'
- name: 'Feuerodem (Aufladung 5–6):'
  beschreibung: 'Geschicklichkeits rettungswurf: SG 14; jede Kreatur in einer 12 Meter langen, 1,5 Meter breiten Linie. Misserfolg:
    38 (11W6) Feuerschaden. Erfolg: Halber Schaden.'
- name: 'Schlafodem:'
  beschreibung: 'Konstitutionsrettungswurf: SG 14; jede Kreatur in einem Kegel von neun Metern. Misserfolg: Das Ziel ist bis
    zum Ende seines nächsten Zugs kampfunfähig. Dann wiederholt es den Rettungswurf. Zweiter Misserfolg: Das Ziel ist eine
    Minute lang bewusstlos. Dieser Effekt endet beim Ziel, wenn es Schaden erleidet oder eine Kreatur im Abstand von bis zu
    1,5 Metern von ihm eine Aktion ausführt, um es zu wecken.'
