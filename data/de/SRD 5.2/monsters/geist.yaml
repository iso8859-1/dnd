merkmale:
- name: 'Ätherische Sicht:'
  beschreibung: Der Geist kann 18 Meter weit in die Ätherebene blicken, wenn er sich auf der materiellen Ebene befindet.
- name: 'Körperlose Bewegung:'
  beschreibung: Der Geist kann sich durch andere Kreaturen und Gegenstände bewegen, als wären sie schwieriges Gelände. Er
    erleidet 5 (1W10) Energieschaden, wenn er den Zug in einem Gegenstand beendet.
aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Geist führt zwei Vernichtende- Berührung-Angriffe aus.
- name: 'Vernichtende Berührung:'
  beschreibung: 'Nahkampfangriffswurf: +5, Reichweite 1,5 m. Treffer: 19 (3W10+3) nekrotischer Schaden.'
- name: 'Ätherische Gestalten:'
  beschreibung: Der Geist wirkt den Zauber Körperlosigkeit mit Charisma als Attribut zum Zauber- wirken, ohne Zauberkomponenten
    zu benötigen. Er ist auf der materiellen Ebene sichtbar, solange er sich an der Äthergrenze befindet, sowie umgekehrt,
    aber er kann weder etwas auf der anderen Ebene beeinflussen noch von etwas auf der anderen Ebene beeinflusst werden.
- name: 'Grauenhaftes Antlitz:'
  beschreibung: 'Weisheitsrettungswurf: SG 13; jede Kreatur in einem Kegel von 18 Metern, die den Geist sehen kann und kein
    Untoter ist. Misserfolg: 10 (2W6+3) psychischer Schaden, und das Ziel ist bis zum Beginn des nächsten Zugs des Geists
    verängstigt. Erfolg: Das Ziel ist 24 Stunden lang gegen den Zauber Grauenhaftes Antlitz dieses Geists immun.'
- name: 'Inbesitznahme (Aufladung 6):'
  beschreibung: 'Charismarettungswurf: SG 13; ein Humanoide im Abstand von bis zu 1,5 Metern vom Geist, die er sehen kann.
    Misserfolg: Der Geist verschwindet und ergreift Besitz vom Ziel. Das Ziel ist kampfunfähig und verliert die Kontrolle
    über seinen Körper. Dieser wird nun vom Geist kontrolliert. Das Ziel behält jedoch sein Bewusstsein. Der Geist kann nicht
    zum Ziel von Angriffen, Zaubern oder anderen Effekten werden – außer solchen, die ausdrücklich auf Untote zielen. Die
    Spielwerte des Geists bleiben unverändert mit folgenden Ausnahmen: Der Geist verwendet die Bewegungsrate sowie die Modifikatoren
    für Stärke, Geschicklichkeit und Konstitution des Ziels. Die Besessenheit bleibt bestehen, bis die Trefferpunkte des besessenen
    Körpers auf 0 sinken oder der Geist ihn als Bonusaktion verlässt. Wenn die Besessenheit endet, erscheint der Geist in
    einem freien Bereich im Abstand von bis zu 1,5 Metern vom Ziel, und das Ziel ist 24 Stunden lang gegen den Zauber Inbesitznahme
    dieses Geists immun. Erfolg: Das Ziel ist 24 Stunden lang gegen den Zauber Inbesitznahme dieses Geists immun.'
