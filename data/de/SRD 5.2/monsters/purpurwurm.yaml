merkmale:
- name: 'Tunnelbauer:'
  beschreibung: Der Wurm kann sich mit halber Grabbewegungsrate durch massiven Fels graben. Dabei hinterlässt er einen Tunnel
    mit drei Metern Durchmesser.
aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Wurm führt einen Bissangriff und einen Schwanzstachelangriff aus.
- name: 'Biss:'
  beschreibung: 'Nahkampfangriffswurf: +14, Reichweite 3 m. Treffer: 22 (3W8+9) Stichschaden. Wenn das Ziel eine Kreatur von
    höchstens großer Größe ist, wird es gepackt (Flucht-SG 19). Solange es gepackt bleibt, ist es außerdem festgesetzt.'
- name: 'Schwanzstachel:'
  beschreibung: 'Nahkampfangriffswurf: +14, Reichweite 3 m. Treffer: 16 (2W6+9) Stichschaden plus 35 (10W6) Giftschaden.'
bonusaktionen:
- name: 'Verschlucken:'
  beschreibung: 'Stärkerettungswurf: SG 19; eine Kreatur von höchstens großer Größe, die vom Wurm gepackt wurde (der Wurm
    kann bis zu drei Kreaturen verschlucken). Misserfolg: Das Ziel wird vom Wurm verschluckt und ist dann nicht mehr gepackt.
    Eine verschluckte Kreatur ist blind und festgesetzt, hat vollständige Deckung gegen Angriffe und andere Effekte von außerhalb
    des Wurms und erleidet zu Beginn jedes Zugs des Wurms 17 (5W6) Säureschaden. Erleidet der Wurm durch eine verschluckte
    Kreatur in einem einzigen Zug mindestens 30 Schaden, so muss er am Ende des Zugs einen SG-21-Konstitutionsrettungswurf
    bestehen, oder er würgt alle verschluckten Kreaturen wieder aus. Diese fallen in Bereiche im Abstand von bis zu 1,5 Metern
    vom Wurm und haben den Zustand Liegend. Wenn der Wurm stirbt, sind die verschluckten Kreaturen nicht mehr festgesetzt
    und können aus dem Kadaver entkommen. Sie verbrauchen dabei sechs Meter Bewegung und haben danach den Zustand Liegend.'
