merkmale:
- name: 'Grässliche Gliedmaßen (4-mal täglich):'
  beschreibung: Wenn der Troll einen Zug blutig beendet und in diesem Zug mindestens 15 Hiebschaden erlitten hat, wird eine
    seiner Gliedmaßen abgetrennt, fällt in seinen Bereich und wird zu einer Trollgliedmaße . Die Gliedmaße handelt unmittelbar
    nach dem Zug des Trolls. Der Troll erhält für jede fehlende Gliedmaße eine Erschöpfungsstufe, und ihm wachsen Ersatzgliedmaßen,
    wenn er das nächste Mal Trefferpunkte zurückerhält.
- name: 'Regeneration:'
  beschreibung: Der Troll erhält zu Beginn jedes seiner Züge 15 Trefferpunkte zurück. Wenn der Troll Feuer- oder Säureschaden
    erleidet, wirkt dieses Merkmal in seinem nächsten Zug nicht. Der Troll stirbt nur, wenn er seinen Zug mit 0 Trefferpunkten
    beginnt und sich nicht regeneriert.
aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Troll führt drei Zerfetzen-Angriffe aus.
- name: 'Zerfetzen:'
  beschreibung: 'Nahkampfangriffswurf: +7, Reichweite 3 m. Treffer: 11 (2W6+4) Hiebschaden.'
bonusaktionen:
- name: 'Sturmangriff:'
  beschreibung: Der Troll legt bis zur Hälfte seiner Bewegungsrate zurück und bewegt sich in gerader Linie auf einen Gegner
    zu, den er sehen kann.
