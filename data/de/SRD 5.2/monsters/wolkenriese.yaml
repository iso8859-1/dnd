aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Riese führt zwei Angriffe mit Donnernder Streitkolben oder Gewitterwolke in beliebiger Kombination aus.
    Er kann einen Angriff durch einen Einsatz von Zauberwirken ersetzen, um den Zauber Nebelwolke zu wirken.
- name: 'Donnernder Streitkolben:'
  beschreibung: 'Nahkampfangriffswurf: +12, Reichweite 3 m. Treffer: 21 (3W8+8) Wuchtschaden plus 7 (2W6) Schallschaden.'
- name: 'Gewitterwolke:'
  beschreibung: 'Fernkampfangriffswurf: +12, Reichweite 72 m. Treffer: 18 (3W6+8) Schallschaden, und das Ziel ist bis zum
    Ende seines nächsten Zugs kampfunfähig.'
- name: 'Zauberwirken:'
  beschreibung: 'Der Riese wirkt einen der folgenden Zauber mit Charisma als Attribut zum Zauberwirken, ohne Materialkomponenten
    zu benötigen (Zauber- rettungswurf-SG 15): Beliebig oft: Licht , Magie entdecken , Nebelwolke Je 1-mal täglich: Gasförmige
    Gestalt , Telekinese , Wetterkontrolle'
bonusaktionen:
- name: 'Nebelschritt:'
  beschreibung: Der Riese wirkt den Zauber Nebelschritt . Sein Attribut zum Zauberwirken ist dasselbe wie beim Ausführen der
    Zauberwirken-Aktion.
