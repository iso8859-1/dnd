merkmale:
- name: 'Dämonische Genesung:'
  beschreibung: Wenn der Vrock außerhalb des Abyss stirbt, löst sein Körper sich zu einer widerlichen Flüssigkeit auf. Der
    Vrock erhält sofort einen neuen Körper, der mit allen Trefferpunkten irgendwo im Abyss aufersteht.
- name: 'Magieresistenz:'
  beschreibung: Der Vrock ist bei Rettungswürfen gegen Zauber und andere magische Effekte im Vorteil.
aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Vrock führt zwei Zerfetzen- Angriffe aus.
- name: 'Zerfetzen:'
  beschreibung: 'Nahkampfangriffswurf: +6, Reichweite 1,5 m. Treffer: 10 (2W6+3) Stichschaden plus 10 (3W6) Giftschaden.'
- name: 'Betäubendes Kreischen (1-mal täglich):'
  beschreibung: 'Konstitutions rettungswurf: SG 15; jede Kreatur in einer Ausströmung von sechs Metern, die vom Vrock ausgeht
    (Dämonen bestehen automatisch). Misserfolg: 10 (3W6) Schallschaden, und das Ziel ist bis zum Ende des nächsten Zugs des
    Vrocks betäubt.'
- name: 'Sporen (Aufladung 6):'
  beschreibung: 'Konstitutionsrettungswurf: SG 15; jede Kreatur in einer Ausströmung von sechs Metern, die vom Vrock ausgeht.
    Misserfolg: Das Ziel ist vergiftet und wiederholt den Rettungswurf am Ende jedes seiner Züge. Bei einem Erfolg endet der
    Effekt bei ihm. Während das Ziel vergiftet ist, erleidet es zu Beginn jedes seiner Züge 5 (1W10) Giftschaden. Der Effekt
    wird frühzeitig durch den Konsum einer Flasche mit Weihwasser beendet.'
