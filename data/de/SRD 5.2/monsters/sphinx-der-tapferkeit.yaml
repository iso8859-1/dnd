merkmale:
- name: 'Legendäre Resistenz (3-mal täglich, im Hort 4-mal täglich):'
  beschreibung: Wenn die Sphinx bei einem Rettungswurf scheitert, kann sie beschließen, ihn stattdessen zu bestehen.
- name: 'Undurchschaubar:'
  beschreibung: Ohne ihre Erlaubnis kann keine Magie die Sphinx aus der Ferne beobachten oder ihre Gedanken erkennen. Weisheitswürfe
    (Motiv erkennen) zum Ermitteln ihrer Absichten oder ihrer Aufrichtigkeit sind im Nachteil.
aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Die Sphinx führt zwei Klauenangriffe aus und setzt Brüllen ein.
- name: 'Klauen:'
  beschreibung: 'Nahkampfangriffswurf: +12, Reichweite 1,5 m. Treffer: 20 (4W6+6) Hiebschaden.'
- name: 'Brüllen (3-mal täglich):'
  beschreibung: 'Die Sphinx stößt ein magisches Brüllen aus. Wann immer sie brüllt, hat das Brüllen einen anderen Effekt,
    wie unten beschrieben (die Sequenz wird nach einer langen Rast zurückgesetzt): Erstes Brüllen: Weisheitsrettungswurf:
    SG 20; jeder Gegner in einer Ausströmung von 150 Metern, die von der Sphinx ausgeht. Misserfolg: Das Ziel ist eine Minute
    lang verängstigt. Zweites Brüllen: Weisheitsrettungswurf: SG 20; jeder Gegner in einer Ausströmung von 150 Metern, die
    von der Sphinx ausgeht. Misserfolg: Das Ziel ist gelähmt und wiederholt den Rettungswurf am Ende jedes seiner Züge. Bei
    einem Erfolg endet der Effekt bei ihm. Nach einer Minute besteht es den Rettungswurf automatisch. Drittes Brüllen: Konstitutionsrettungswurf:
    SG 20; jeder Gegner in einer Ausströmung von 150 Metern, die von der Sphinx ausgeht. Misserfolg: 44 (8W10) Schallschaden,
    und das Ziel wird umgestoßen und hat den Zustand Liegend. Erfolg: Nur halber Schaden.'
- name: 'Zauberwirken:'
  beschreibung: 'Die Sphinx wirkt einen der folgenden Zauber mit Weisheit als Attribut zum Zauberwirken, ohne Materialkomponenten
    zu benötigen (Zauber- rettungswurf-SG 20): Beliebig oft: Gutes und Böses entdecken , Thaumaturgie Je 1-mal täglich: Heldenmahl
    , Magie bannen , Magie entdecken , Vollständige Genesung , Zone der Wahrheit'
legendaere_aktionen:
- name: 'Arkanes Umherstreifen:'
  beschreibung: Die Sphinx kann sich bis zu neun Meter weit in einen freien Bereich teleportieren, den sie sehen kann, und
    dort einen Klauenangriff ausführen.
- name: 'Gewicht der Jahre:'
  beschreibung: 'Konstitutionsrettungswurf: SG 16; eine Kreatur im Abstand von bis zu 36 Metern von der Sphinx, die von der
    Sphinx gesehen werden kann. Misserfolg: Das Ziel erhält eine Erschöpfungsstufe. Solange das Ziel Erschöpfungsstufen hat,
    erscheint es 3W10 Jahre älter. Erfolg oder Misserfolg: Die Sphinx kann diese Aktion erst nach Beginn ihres nächsten Zugs
    erneut ausführen.'
