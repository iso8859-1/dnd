merkmale:
- name: 'Begrenzt amphibisch:'
  beschreibung: Der Sahuagin kann Luft und Wasser atmen, doch er muss sich mindestens einmal alle vier Stunden ganz im Wasser
    befinden, um nicht zu ersticken.
- name: 'Blutrausch:'
  beschreibung: Der Sahuagin ist bei Angriffswürfen gegen jede Kreatur im Vorteil, die nicht alle Trefferpunkte hat.
- name: 'Haifischtelepathie:'
  beschreibung: Der Sahuagin kann auf magische Art Haie im Abstand von bis zu 36 Metern von sich kontrollieren, wozu er spezielle
    Form von Telepathie nutzt.
aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Sahuagin führt zwei Klauen- angriffe aus.
- name: 'Klauen:'
  beschreibung: 'Nahkampfangriffswurf: +3, Reichweite 1,5 m. Treffer: 4 (1W6+1) Hiebschaden.'
bonusaktionen:
- name: 'Aquatischer Sturmangriff:'
  beschreibung: Der Sahuagin nutzt seine Schwimmbewegungsrate und bewegt sich in gerader Linie auf einen Gegner zu, den er
    sehen kann.
