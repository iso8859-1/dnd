- name: 'Mehrfachangriff:'
  beschreibung: Die Chimäre führt einen Bissangriff, einen Klauenangriff und einen Rammen-Angriff aus. Sie kann den Klauenangriff
    durch einen Einsatz von Feuerodem ersetzen, sofern verfügbar.
- name: 'Biss:'
  beschreibung: 'Nahkampfangriffswurf: +7, Reichweite 1,5 m. Treffer: 11 (2W6+4) Stichschaden oder 18 (4W6+4) Stichschaden,
    wenn die Chimäre beim Angriffswurf im Vorteil war.'
- name: 'Klauen:'
  beschreibung: 'Nahkampfangriffswurf: +7, Reichweite 1,5 m. Treffer: 7 (1W6+4) Hiebschaden.'
- name: 'Rammen:'
  beschreibung: 'Nahkampfangriffswurf: +7, Reichweite 1,5 m. Treffer: 10 (1W12+4) Wuchtschaden. Wenn das Ziel eine Kreatur
    von höchstens mittelgroßer Größe ist, wird es umgestoßen und hat den Zustand Liegend.'
- name: 'Feuerodem (Aufladung 5–6):'
  beschreibung: 'Geschicklichkeitsrettungs wurf: SG 15; jede Kreatur in einem Kegel von 4,5 Metern. Misserfolg: 31 (7W8) Feuerschaden.
    Erfolg: Halber Schaden.'
