- name: 'Wasser atmen:'
  beschreibung: Der Oktopus kann nur unter Wasser atmen. Er kann außerhalb des Wassers eine Stunde lang den Atem anhalten.
aktionen:
- name: 'Tentakel:'
  beschreibung: 'Nahkampfangriffswurf: +5, Reichweite 3 m. Treffer: 10 (2W6+3) Wuchtschaden. Wenn das Ziel eine Kreatur von
    höchstens mittelgroßer Größe ist, wird es von allen acht Tentakeln gepackt (Flucht-SG 13): Das gepackte Ziel ist außerdem
    festgesetzt.'
reaktionen:
- name: 'Tintenwolke (1-mal täglich):'
  beschreibung: 'Auslöser: Der Oktopus befindet sich unter Wasser und erleidet Schaden. Antwort: Der Oktopus stößt Tinte in
    einem Würfel von drei Metern Kantenlänge um sich selbst aus und legt dann eine Strecke von bis zu seiner Schwimmbewegungsrate
    zurück. Der Würfel ist ein komplett verschleierter Bereich, bis eine Minute vergangen ist oder bis eine starke Strömung
    oder ein ähnlicher Effekt die Tinte verwirbelt.'
