merkmale:
- name: 'Magieresistenz:'
  beschreibung: Die Dryade ist bei Rettungswürfen gegen Zauber und andere magische Effekte im Vorteil.
- name: 'Mit Tieren und Pflanzen sprechen:'
  beschreibung: Die Dryade kann sich mit Tieren und Pflanzen verständigen, als sprächen sie ihre Sprache.
aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Die Dryade führt einen Rankenhieb- oder einen Dornenexplosion-Angriff aus und kann Zauberwirken einsetzen,
    um den Zauber Monster bezaubern zu wirken.
- name: 'Rankenhieb:'
  beschreibung: 'Nahkampfangriffswurf: +6, Reichweite 3 m. Treffer: 8 (1W8+4) Hiebschaden.'
- name: 'Dornenexplosion:'
  beschreibung: 'Fernkampfangriffswurf: +6, Reichweite 18 m. Treffer: 7 (1W6+4) Stichschaden.'
- name: 'Zauberwirken:'
  beschreibung: 'Die Dryade wirkt einen der folgenden Zauber mit Charisma als Attribut zum Zauberwirken, ohne Materialkomponenten
    zu benötigen (Zauber- rettungswurf-SG 14): Beliebig oft: Druidenkunst , Monster bezaubern (wirkt 24 Stunden lang; endet
    vorzeitig, wenn die Dryade den Zauber erneut wirkt), Tierfreundschaft Je 1-mal täglich: Spurloses Gehen , Verstricken'
bonusaktionen:
- name: 'Baumwandeln:'
  beschreibung: Wenn die Dryade sich im Abstand von bis zu 1,5 Metern von einem Baum von mindestens großer Größe befindet,
    teleportiert sie sich in einen freien Bereich im Abstand von bis zu 1,5 Metern eines zweiten Baums von mindestens großer
    Größe, der sich im Abstand von bis zu 18 Metern vom ersten Baum befindet.
