merkmale:
- name: 'Beleuchtung:'
  beschreibung: Das Irrlicht spendet in einem Radius von sechs Metern helles Licht und in einem Radius von weiteren sechs
    Metern dämmriges Licht.
- name: 'Flüchtig:'
  beschreibung: Das Irrlicht kann nichts tragen oder in der Hand halten.
- name: 'Körperlose Bewegung:'
  beschreibung: Das Irrlicht kann sich durch andere Kreaturen und Gegenstände bewegen, als wären sie schwieriges Gelände.
    Es erleidet 5 (1W10) Energieschaden, wenn es den Zug in einem Gegenstand beendet.
aktionen:
- name: 'Schock:'
  beschreibung: 'Nahkampfangriffswurf: +4, Reichweite 1,5 m. Treffer: 11 (2W8+2) Blitzschaden.'
bonusaktionen:
- name: 'Leben verzehren:'
  beschreibung: 'Konstitutionsrettungswurf: SG 10; eine lebendige Kreatur im Abstand von bis zu 1,5 Metern vom Irrlicht, die
    0 Trefferpunkte hat und die vom Irrlicht gesehen werden kann. Misserfolg: Das Ziel stirbt, und das Irrlicht erhält 10
    (3W6) Trefferpunkte zurück.'
- name: 'Verschwinden:'
  beschreibung: Das Irrlicht und sein Licht haben den Zustand Unsichtbar, bis die Konzentration des Irrlichts auf diesen Effekt
    endet. Sie endet unmittelbar, wenn das Irrlicht einen Angriffswurf oder Leben verzehren ausführt.
