merkmale:
- name: 'Dämonische Genesung:'
  beschreibung: Wenn der Hezrou außerhalb des Abyss stirbt, löst sein Körper sich zu einer widerlichen Flüssigkeit auf. Der
    Hezrou erhält sofort einen neuen Körper, der mit allen Trefferpunkten irgendwo im Abyss aufersteht.
- name: 'Gestank:'
  beschreibung: 'Konstitutionsrettungswurf: SG 16; jede Kreatur, die ihren Zug in einer Ausströmung von drei Metern beginnt,
    die vom Hezrou ausgeht. Misserfolg: Das Ziel ist bis zum Beginn seines nächsten Zugs vergiftet.'
- name: 'Magieresistenz:'
  beschreibung: Der Hezrou ist bei Rettungswürfen gegen Zauber und andere magische Effekte im Vorteil.
aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Hezrou führt drei Zerfetzen- Angriffe aus.
- name: 'Zerfetzen:'
  beschreibung: 'Nahkampfangriffswurf: +7, Reichweite 1,5 m. Treffer: 6 (1W4+4) Hiebschaden plus 9 (2W8) Giftschaden.'
bonusaktionen:
- name: 'Sprung:'
  beschreibung: Der Hezrou springt bis zu neun Meter weit und verbraucht dabei nur drei Meter Bewegung.
