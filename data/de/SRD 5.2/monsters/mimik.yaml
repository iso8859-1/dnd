merkmale:
- name: 'Haftend (nur in Gegenstandgestalt):'
  beschreibung: Der Mimik bleibt an allem haften, was ihn berührt. Bleibt er an einer Kreatur von höchstens riesiger Größe
    haften, so wird die Kreatur gepackt (Flucht-SG 13). Attributswürfe zum Entkommen aus diesem Haltegriff sind im Nachteil.
aktionen:
- name: 'Biss:'
  beschreibung: 'Nahkampfangriffswurf: +5 (im Vorteil, wenn das Ziel vom Mimik gepackt wurde), Reichweite 1,5 m. Treffer:
    7 (1W8+3) Stichschaden – oder 12 (2W8+3) Stichschaden, wenn das Ziel vom Mimik gepackt wurde – plus 4 (1W8) Säureschaden.'
- name: 'Scheinfuß:'
  beschreibung: 'Nahkampfangriffswurf: +5, Reichweite 1,5 m. Treffer: 7 (1W8+3) Wuchtschaden plus 4 (1W8) Säure- schaden.
    Wenn das Ziel eine Kreatur von höchstens großer Größe ist, wird es gepackt (Flucht-SG 13). Attributswürfe zum Entkommen
    aus diesem Haltegriff sind im Nachteil.'
bonusaktionen:
- name: 'Gestaltwandeln:'
  beschreibung: Der Mimik nimmt die Gestalt eines Gegenstands von kleiner oder mittelgroßer Größe an, wobei er seine Spielwerte
    beibehält, oder er nimmt wieder seine wahre Gestalt an. Ausrüstung, die er trägt oder hält, wird nicht verwandelt.
