merkmale:
- name: 'Diabolische Genesung:'
  beschreibung: Wenn der Teufel außerhalb der Neun Höllen stirbt, löst sein Körper sich in Schwefeldampf auf. Der Teufel erhält
    sofort einen neuen Körper, der mit allen Trefferpunkten irgendwo in den Neun Höllen aufersteht.
- name: 'Klingenhaut:'
  beschreibung: Der Teufel fügt zu Beginn jedes seiner Züge jeder Kreatur, die er gepackt hält oder die ihn gepackt hält,
    5 (1W10) Stichschaden zu.
- name: 'Magieresistenz:'
  beschreibung: Der Teufel ist bei Rettungswürfen gegen Zauber und andere magische Effekte im Vorteil.
aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Teufel führt einen Klauenangriff und einen Schwanzangriff aus, oder er führt zwei Flamme-schleudern-Angriffe
    aus.
- name: 'Klauen:'
  beschreibung: 'Nahkampfangriffswurf: +6, Reichweite 1,5 m. Treffer: 10 (2W6+3) Stichschaden. Wenn das Ziel eine Kreatur
    von höchstens großer Größe ist, wird es von beiden Klauen gepackt (Flucht-SG 13).'
- name: 'Schwanz:'
  beschreibung: 'Nahkampfangriffswurf: +6, Reichweite 3 m. Treffer: 14 (2W10+3) Hiebschaden.'
- name: 'Flamme schleudern:'
  beschreibung: 'Fernkampfangriffswurf: +5, Reichweite 45 m. Treffer: 17 (5W6) Feuerschaden. Wenn das Ziel ein brennbarer
    Gegenstand ist, der nicht getragen oder gehalten wird, fängt es Feuer.'
