aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Die Mumie führt zwei Fäulnisfaust- Angriffe aus und setzt Fürchterliches Starren ein.
- name: 'Fäulnisfaust:'
  beschreibung: 'Nahkampfangriffswurf: +5, Reichweite 1,5 m. Treffer: 8 (1W10+3) Wuchtschaden plus 10 (3W6) nekrotischer Schaden.
    Wenn das Ziel eine Kreatur ist, wird es verflucht. Das verfluchte Ziel kann keine Trefferpunkte zurückerhalten. Sein Trefferpunktemaximum
    normalisiert sich nicht nach einer langen Rast und wird alle 24 Stunden um 10 (3W6) verringert. Wenn die Trefferpunkte
    einer Kreatur durch diesen Angriff auf 0 sinken, stirbt die Kreatur und zerfällt zu Staub.'
- name: 'Fürchterliches Starren:'
  beschreibung: 'Weisheitsrettungswurf: SG 11; eine Kreatur im Abstand von bis zu 18 Metern von der Mumie, die von der Mumie
    gesehen werden kann. Misserfolg: Das Ziel ist bis zum Ende des nächsten Zugs der Mumie verängstigt. Erfolg: Das Ziel ist
    24 Stunden lang gegen das Fürchterliche Starren dieser Mumie immun.'
