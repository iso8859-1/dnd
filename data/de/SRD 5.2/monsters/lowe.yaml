merkmale:
- name: 'Rudeltaktik:'
  beschreibung: Der Löwe ist beim Angriffswurf gegen eine Kreatur im Vorteil, wenn sich mindestens einer seiner Verbündeten,
    der nicht kampfunfähig ist, im Abstand von bis zu 1,5 Metern von der Kreatur befindet.
- name: 'Sprung aus dem Lauf:'
  beschreibung: Nach drei Metern Anlauf kann der Löwe bis zu 7,5 Meter weit springen.
aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Löwe führt zwei Zerfetzen- Angriffe aus. Er kann einen Angriff durch einen Einsatz von Brüllen ersetzen.
- name: 'Zerfetzen:'
  beschreibung: 'Nahkampfangriffswurf: +5, Reichweite 1,5 m. Treffer: 7 (1W8+3) Hiebschaden.'
- name: 'Brüllen:'
  beschreibung: 'Weisheitsrettungswurf: SG 11; eine Kreatur im Abstand von bis zu 4,5 Metern. Misserfolg: Das Ziel ist bis
    zum Beginn des nächsten Zugs des Löwen verängstigt.'
