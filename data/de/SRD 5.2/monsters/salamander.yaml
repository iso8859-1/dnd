merkmale:
- name: 'Feueraura:'
  beschreibung: Am Ende jedes Zugs des Salamanders erleidet jede Kreatur seiner Wahl in einer Ausströmung von 1,5 Metern,
    die vom Salamander ausgeht, 7 (2W6) Feuerschaden.
aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Salamander führt zwei Flammenspeer-Angriffe aus. Er kann einen Angriff durch einen Einsatz von Umschlingen
    ersetzen.
- name: 'Flammenspeer:'
  beschreibung: 'Nah oder Fernkampfangriffswurf: +7, Reichweite 1,5 m oder Reichweite 6/18 m. Treffer: 13 (2W8+4) Stichschaden
    plus 7 (2W6) Feuerschaden. Treffer oder Fehlschlag: Unmittelbar nach einem Fernkampfangriff kehrt der Speer auf magische
    Art in die Hand des Salamanders zurück.'
- name: 'Umschlingen:'
  beschreibung: 'Stärkerettungswurf: SG 15; eine Kreatur von höchstens großer Größe im Abstand von bis zu drei Metern vom
    Salamander, die er sehen kann. Misserfolg: 11 (2W6+4) Wuchtschaden plus 7 (2W6) Feuerschaden. Das Ziel wird gepackt (Flucht-SG
    14). Solange es gepackt bleibt, ist es außerdem festgesetzt.'
