merkmale:
- name: 'Entrinnen:'
  beschreibung: Wenn ein Effekt auf den Assassinen wirkt, der ihm einen Geschicklichkeitsrettungswurf ermöglicht, damit er
    nur den halben Schaden erleidet, so erleidet er stattdessen bei einem Erfolg gar keinen Schaden und bei Misserfolg nur
    den halben Schaden. Sie kann dieses Merkmal nicht verwenden, wenn sie kampfunfähig ist.
aktionen:
- name: 'Mehrfachangriff:'
  beschreibung: Der Assassine führt drei Angriffe mit dem Kurzschwert oder der leichten Armbrust in beliebiger Kombination
    aus.
- name: 'Kurzschwert:'
  beschreibung: 'Nahkampfangriffswurf: +7, Reichweite 1,5 m. Treffer: 7 (1W6+4) Stichschaden plus 17 (5W6) Giftschaden, und
    das Ziel ist bis zum Beginn des nächsten Zugs des Assassinen vergiftet.'
- name: 'Leichte Armbrust:'
  beschreibung: 'Fernkampfangriffswurf: +7, Reichweite 24/96 m. Treffer: 8 (1W8+4) Stichschaden plus 21 (6W6) Giftschaden.'
bonusaktionen:
- name: 'Raffinierte Aktion:'
  beschreibung: Der Assassine führt die Rückzug-, die Spurt- oder die Verstecken-Aktion aus.
