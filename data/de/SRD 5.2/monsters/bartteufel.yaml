- name: 'Mehrfachangriff:'
  beschreibung: Der Teufel führt einen Bartangriff und einen Infernalische-Glefe-Angriff aus.
- name: 'Bart:'
  beschreibung: 'Nahkampfangriffswurf: +5, Reichweite 1,5 m. Treffer: 7 (1W8+3) Stichschaden, und das Ziel ist bis zum Beginn
    des nächsten Zugs des Teufels vergiftet. Solange das Ziel vergiftet ist, kann es keine Trefferpunkte zurückerhalten.'
- name: 'Infernalische Glefe:'
  beschreibung: 'Nahkampfangriffswurf: +5, Reichweite 3 m. Treffer: 8 (1W10+3) Hiebschaden. Wenn das Ziel eine Kreatur ist
    und noch keine infernalische Wunde hat, wirkt bei ihm der folgende Effekt: Konstitutionsrettungswurf: SG 12. Misserfolg:
    Das Ziel erhält eine infernalische Wunde. Solange das Ziel eine solche Wunde hat, verliert es zu Beginn jedes seiner Züge
    5 (1W10) Trefferpunkte. Die Wunde schließt sich, wenn eine Minute vergangen ist, ein Zauber Trefferpunkte beim Ziel wiederherstellt
    oder wenn das Ziel oder eine Kreatur im Abstand von bis zu 1,5 Metern von ihm eine Aktion ausführt, um die Wunde abzubinden
    (dies gelingt, wenn die Kreatur einen SG-12-Weisheitswurf (Heilkunde) besteht).'
