name: Gabe des Schicksals
lang: de
description: 'Du erhältst folgende Vorzüge: Attributswerterhöhung: Ein Attributswert
  deiner Wahl wird um 1 Punkt erhöht (auf höchstens 30). Schicksal verbessern: Wenn
  du oder eine andere Kreatur im Abstand von bis zu 18 Metern von dir eine W20-Prüfung
  ausführt, kannst du mit 2W4 würfeln und der W20-Prüfung das Gesamtergebnis als Bonus
  oder Malus hinzufügen. Du kannst diesen Vorzug erst nach einem Initiativewurf oder
  einer kurzen oder langen Rast erneut verwenden.'
