  Große Fahrzeuge In der Tabelle „Luft- und Wasserfahrzeuge“ findest du Spielwerte für verschiedene Arten von großen Fahrzeugen.
  Es gelten folgende Anmerkungen:

  Bewegungsrate

  Ein Schiff, das gegen starken Wind ansegelt, hat nur seine halbe Bewegungsrate. Bei Flaute können Segelschiffe sich nicht
  unter Segel fortbewegen und müssen gerudert werden. Auf Seen und Flüssen werden Kiel- und Ruderboote verwendet. Wenn du
  stromabwärts fährst, fügst du der Bewegungsrate des Fahrzeugs die Strömungsgeschwindigkeit (üblicherweise 4,8 Kilometer
  pro Stunde) hinzu. Mit Kiel- und Ruderbooten kannst du nicht gegen starke Strömungen anrudern, aber sie können von Zugtieren
  am Ufer stromaufwärts gezogen werden. Ein Ruderboot kann getragen werden und wiegt 50 Kilogramm.

  Besatzung

  Schiffe, die größer als Kiel- und Ruderboote sind, benötigen eine Besatzung aus fachkundigen Mietlingen (siehe „Mietlinge“
  weiter hinten unter „Ausrüstung“), um verwendet werden zu können. Deren jeweils erforderliche Mindestanzahl hängt von der
  Art des Schiffs ab, wie in der Tabelle dargestellt.

  Passagiere

  In der Tabelle ist die Anzahl von kleinen und mittelgroßen Passagieren aufgeführt, die mithilfe von Hängematten auf einem
  Schiff unterkommen können. Schiffe mit Privatkabinen können nur ein Fünftel der Passagiere befördern. Ein Passagier zahlt
  normalerweise 5 SM pro Tag für eine Hängematte. Die Preise variieren jedoch von Schiff zu Schiff. Eine kleine Privatkabine
  kostet normalerweise 2 GM pro Tag.

  Kosten

  30.000 GM

  Schadensschwellenwert Wenn ein Fahrzeug einen Schadensschwellenwert (siehe „Regelglossar“) hat, ist dieser in der Tabelle
  angegeben.

  Schiffsreparatur

  Ein beschädigtes Schiff kann repariert werden, wenn es in einem Hafen liegt. Jeder zu reparierende Trefferpunkt erfordert
  einen Tag und kostet 20 GM für Material und Arbeitskraft. Wenn die Reparatur an einem Ort ausgeführt wird, an dem es reichlich
  Material und fachkundige Arbeiter gibt, beispielsweise in einer städtischen Werft, sind Reparaturdauer und -kosten halbiert.

  Lebenshaltungskosten

  Lebenshaltungskosten sind die Kosten, die für das Dasein in einer Fantasy-Welt anfallen. Sie umfassen Unterbringung, Nahrung,
  Ausrüstungspflege und andere alltägliche Erfordernisse. Zu Beginn jeder Woche oder jedes Monats (nach Wahl des SL) wählst
  du einen der Lebensstile unten aus – Jämmerlich, Ärmlich, Schlecht, Einfach, Komfortabel, Wohlhabend oder Edel – und zahlst
  den entsprechenden Preis. Ein Lebensstil hat an sich keine Konsequenzen, doch der SL kann ihn berücksichtigen, wenn er Risiken
  oder den Eindruck deines Charakters auf andere bestimmt.

  Jämmerlich (gratis)

  Du überlebst durch Zufall und Mildtätigkeit. Oft bist du Naturgefahren ausgesetzt, weil du draußen schläfst.

  Ärmlich (1 SM pro Tag)

  Du gibst das Minimum für deine grundlegendsten Bedürfnisse aus. Dabei könntest du ungesunden Bedingungen und Gelegenheitsverbrechern
  ausgesetzt sein.

  Schlecht (2 SM pro Tag) Du kümmerst dich sparsam um deine Bedürfnisse.

  Einfach (1 GM pro Tag)

  Du leistest dir einen durchschnittlichen Lebensstil.

