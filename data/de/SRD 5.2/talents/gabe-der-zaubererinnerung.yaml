  Verzauberungsmagie Beeinflusst Gedanken

  Wenn sich ein Zauber auf der Zauberliste einer Klasse befindet, ist der Name der Klasse in Klammern hinter der Schule der
  Magie des betreffenden Zaubers aufgeführt. Manche Merkmale fügen einen Zauber sogar dann der Zauberliste eines Charakters
  hinzu, wenn der Charakter nicht Mitglied der in Klammern genannten Klasse ist.

  Zeitaufwand

  Für die meisten Zauber ist nur die magische Aktion erforderlich. Manche Zauber erfordern jedoch eine Bonusaktion, eine Reaktion
  oder einen Zeitaufwand von mindestens einer Minute. Der Zeitaufwand gibt an, was davon zum Wirken des Zaubers erforderlich
  ist.

  Ein Zauber mit Zauberplatz pro Zug

  Reaktion und Bonusaktion: Auslöser

  Zauber mit dem Zeitaufwand einer Reaktion werden als Antwort auf einen Auslöser gewirkt, der im Eintrag Zeitaufwand des
  Zaubers definiert ist. Manche Zauber haben den Zeitaufwand einer Bonusaktion. Auch sie werden als Antwort auf einen Auslöser
  gewirkt, der beim Zauber definiert ist.

  Bestimmte Zauber – beispielsweise solche, die als Ritual gewirkt werden – haben einen höheren Zeitaufwand: Das Wirken dauert
  mehrere Minuten oder sogar Stunden. Wenn du einen Zauber mit einem Zeitaufwand von mindestens einer Minute wirkst, musst
  du die magische Aktion in jedem deiner Züge ausführen und dabei deine Konzentration (siehe „Regelglossar“) aufrechterhalten.
  Wird deine Konzentration unterbrochen, so misslingt der Zauber. In diesem Fall wird der Zauberplatz nicht verbraucht. Um
  erneut zu versuchen, den Zauber zu wirken, musst du von vorne anfangen.

  Fernkampfreichweite

  Die Reichweite eines Zaubers gibt an, wie weit vom Zauberwirker entfernt der Effekt des Zauberspruchs entstehen kann. Die
  Beschreibung des Zauberspruchs erläutert näher, welcher Teil des Effekts durch die Reichweite begrenzt ist.

  Die Reichweite hat üblicherweise eine der folgenden Formen:

  Entfernung: Die Reichweite ist in Metern angegeben. Berührung: Die Wirkung des Zaubers entsteht bei etwas, was der Zauberwirker
  innerhalb seiner Reichweite berühren muss, wie im Zauber beschrieben. Selbst: Der Zauber wird auf den Zauberwirker gewirkt
  oder geht von diesem aus, wie beim Zauber angegeben. Wenn ein Zauber bewegliche Effekte hat, werden diese nicht von seiner
  Reichweite eingeschränkt, sofern in der Zauberbeschreibung nicht anders angegeben.

  Komponenten

  Die Komponenten eines Zaubers sind die physischen Voraussetzungen, die der Zauberwirker erfüllen muss, um ihn zu wirken.
  In der Zauberbeschreibung ist jeweils angegeben, ob ein Zauber Verbal komponenten (V), Gestenkomponenten (G) oder Materialkomponenten
  (M) hat. Wenn mindestens eine Zauberkomponente nicht verfügbar ist, kann der Zauber nicht gewirkt werden.

  Verbalkomponente (V)

  Eine Verbalkomponente ist der Vortrag geheimer Worte, deren Sinn sich Uneingeweihten nicht erschließt. Die Worte müssen
  mit normaler Sprechstimme vorgetragen werden. Sie selbst sind nicht die Quelle der Macht eines Zaubers. Vielmehr bringt
  die Kombination aus Lauten, Betonung und Resonanz die Fäden der Magie zum Schwingen. Eine Kreatur, die geknebelt ist oder
  sich im Bereich einer magischen Stille befindet, kann keine Zauber mit Verbalkomponenten wirken.

  Gestenkomponente (G)

  Eine Gestenkomponente ist eine schwungvolle Geste oder eine komplexe Abfolge von Gesten. Der Zauberwirker muss mindestens
  eine Hand einsetzen, um diese Bewegungen auszuführen.

  Materialkomponente (M)

  Eine Materialkomponente ist ein bestimmtes Material, das zum Wirken eines Zaubers erforderlich ist, wie beim Eintrag „Komponenten“
  in Klammern angegeben. Die Materialien werden dabei nicht verbraucht, sofern in der Beschreibung des Zaubers nicht anders
  angegeben. Der Zauberwirker benötigt mindestens eine freie Hand, um die Materialien zu verwenden. Dies kann jedoch dieselbe
  Hand sein, mit der er Gesten ausführt.

  Wenn ein Zauber sein Material nicht verbraucht und keine Kosten für dieses angegeben sind, kann ein Zauberwirker einen Materialkomponentenbeutel
  (siehe „Ausrüstung“) verwenden, statt das angegebene Material bereitzustellen, oder er kann einen Zauberfokus ersetzen,
  sofern er über ein Merkmal verfügt, das dies gestattet. Um einen Materialkomponentenbeutel zu verwenden, musst du mindestens
  eine Hand frei haben, um hineinzugreifen. Zum Verwenden eines Zauberfokus musst du diesen in der Hand halten, sofern in
  seiner Beschreibung nicht anders angegeben (Beschreibungen siehe „Ausrüstung“).

  Dauer

  Die Wirkungsdauer eines Zaubers gibt an, wie lange dessen Effekt nach dem Wirken anhält. Sie hat üblicherweise eine der
  folgenden Formen:

  Konzentration: Eine Wirkungsdauer, die Konzen- tration erfordert, folgt den Konzentrationsregeln (siehe „Regelglossar“).
  Unmittelbar: Eine unmittelbare Wirkungsdauer bedeutet, dass die Magie des Zaubers für einen Moment auftritt und dann verschwindet.
  Zeitspanne: Eine Wirkungsdauer in Form einer Zeitspanne gibt an, wie lange der Zauber in Runden, Minuten, Stunden oder ähnlich
  anhält. Beispielsweise könnte der Eintrag für die Wirkungsdauer „1 Minute“ lauten. In diesem Fall endet der Zauber, sobald
  eine Minute vergangen ist. Während ein Zauber mit Zeitspanne andauert, nachdem du ihn gewirkt hast, kannst du ihn verwerfen
  (keine Aktion erforderlich), sofern du nicht kampfunfähig bist.

  Effekte

  Die Effekte eines Zaubers sind nach seiner Wirkungsdauer aufgeführt. Es ist genau angegeben, was der Zauber tut. Reale Gesetze
  der Physik werden ignoriert. Alle Ergebnisse über diese Effekte hinaus liegen im Ermessen des SL. Die Effekte haben üblicherweise
  mit Zielen, Rettungswürfen, Angriffswürfen oder allen drei Elementen zu tun, wie jeweils unten beschrieben.

  Ziele

  Bei vielen Zaubern muss der Zauberwirker mindestens ein Ziel auswählen, auf das die Magie des Zaubers wirkt. In der Beschreibung
  eines Zaubers ist angegeben, ob der Zauber auf Kreaturen, Gegenstände oder etwas anderes zielt. Freie Sicht auf das Ziel:
  Ein Zauberwirker muss sein Ziel sehen können – es darf sich also nicht hinter vollständiger Deckung befinden.

  Der Zauberwirker als Ziel: Wenn das Ziel eines Zaubers eine Kreatur nach Wahl des Zauberwirkers ist, kann er sich auch selbst
  als Ziel bestimmen, es sei denn, es muss sich um eine feindlich gesinnte oder ausdrücklich um eine andere Kreatur handeln.
  Wirkungsbereiche: Manche Zauber, beispiels weise Donnerwoge, haben einen sogenannten Wirkungsbereich, wie unter „Regelglossar“
  definiert. Der Bereich bestimmt, worauf der Zauber zielt. In der Beschreibung eines Zaubers ist angegeben, ob er einen Wirkungsbereich
  hat, der üblicherweise eine der folgenden Formen hat: Ausströmung, Kegel, Kugel, Linie, Würfel oder Zylinder. Bewusstsein
  dafür, Ziel zu sein: Hat ein Zauber keine wahrnehmbare Wirkung, so weiß eine Kreatur möglicherweise nicht, dass sie sein
  Ziel war. Effekte wie Blitze sind offensichtlich, doch subtilere Effekte wie der Versuch, Gedanken zu lesen, bleiben üblicherweise
  unbemerkt, sofern in der Beschreibung nicht anders angegeben. Ungültige Ziele: Wenn du einen Zauber auf ein Ziel wirkst,
  das von ihm nicht betroffen sein kann, geschieht nichts. Wurde zum Wirken ein Zauberplatz verbraucht, so ist dieser trotzdem
  verbraucht. Wenn der Zauber normalerweise keinen Effekt auf ein Ziel hat, das einen Rettungswurf besteht, wirkt ein ungültiges
  Ziel, als hätte es seinen Rettungswurf bestanden, auch wenn es keinen Rettungswurf ausgeführt hat (es ist also nicht zu
  erkennen, dass die Kreatur ein ungültiges Ziel ist). Anderenfalls bemerkt der Zauberwirker, dass sein Zauber beim Ziel nichts
  ausgerichtet hat.

  Rettungswürfe

  In der Beschreibung vieler Zauber ist angegeben, dass das Ziel einen Rettungswurf ausführt, um den Effekt ganz oder teilweise
  zu verhindern. Die Beschreibung gibt außerdem an, welches Attribut vom Ziel für den Rettungswurf verwendet wird und was
  bei einem Erfolg oder Misserfolg geschieht. Der SG deiner Zauber errechnet sich wie folgt: Zauberrettungswurf-SG = 8 + dein
  Übungsbonus + dein ZauberwirkenAttributsmodifikator

  Angriffswürfe Bei manchen Zaubersprüchen muss der Wirker einen Angriffswurf ausführen, um festzustellen, ob der Zauber das
  Ziel trifft. Der Angriffsmodifikator deiner Zauber errechnet sich wie folgt: Zauberangriff-Modifikator = dein Übungsbonus
  + dein ZauberwirkenAttributsmodifikator

  Einen wirkenden Z auber identifizieren Du kannst versuchen, einen nicht unmittelbar wirkenden Zauber während seiner Wirkungsdauer
  anhand seiner beobachtbaren Effekte zu identifizieren. Dazu musst du die Studieren-Aktion ausführen und einen SG-15-Intelligenzwurf
  (Arkane Kunde) bestehen.

  Zaubereffekte kombinieren Die Effekte verschiedener Zauber addieren sich, wenn sich die Wirkungsdauern der Zauber über-
  schneiden. Die Effekte des gleichen Zaubers, der mehrmals gewirkt wird, addieren sich hingegen nicht. Stattdessen wird der
  stärkste Effekt – beispielsweise der höchste Bonus – der Zauber angewendet, solange sich deren Wirkungsdauern überschneiden.
  Oder es gilt der neueste Effekt, falls die Effekte gleich stark sind und sich die Wirkungs- dauern überschneiden. Wirken
  beispielsweise zwei Kleriker Segnen auf dasselbe Ziel, so erhält dieses den Vorzug des Zaubers nur einmal. Es erhält keine
  zwei Bonuswürfel. Der Effekt bleibt jedoch bestehen, bis die Wirkungsdauer des zweiten Zaubers Segnen endet.'
