description: 'Du erhältst folgende Vorzüge: Attributswerterhöhung: Dein Intelligenz-, dein Weisheits- oder dein Charismawert
  wird um 1 Punkt erhöht (auf maximal 30). Freies Zauberwirken: Wann immer du einen Zauber mit einem Zauberplatz des 1. bis
  4. Grades wirkst, würfle mit 1W4. Wenn das Würfelergebnis dem Grad des Zauberplatzes entspricht, so wird dieser nicht verbraucht.

  Münzen Charaktere finden bei ihren Abenteuern oft Münzen, die sie in Läden, Gasthäusern und anderen Geschäften ausgeben
  können. Münzen gibt es in unterschiedlichen Nennwerten, die auf dem Wert ihres Materials beruhen. In der Tabelle „Münzwerte“
  sind die Münzen und ihr jeweiliger Wert im Verhältnis zur Goldmünze aufgeführt, der wichtigsten Münze des Spiels. Beispiel:
  100 Kupfer- münzen haben den Wert von 1 Goldmünze. Eine Münze wiegt acht bis zehn Gramm. Fünfzig Münzen wiegen daher etwa
  ein halbes Kilo.

