  Zunderkästchen (5 SM)

  Ein Zunderkästchen ist ein kleiner Behälter mit Feuerstahl, Feuerstein und Zunder (meist ein ölgetränktes Stoffstück), um
  ein Feuer zu entfachen. Soll damit eine Fackel, eine Kerze, eine Lampe, eine Laterne oder ein anderer Gegenstand mit freiliegendem
  Brennstoff entzündet werden, so ist dafür eine Bonusaktion erforderlich. Das Entfachen jedes anderen Feuers dauert eine
  Minute.

  Reittiere und Fahrzeuge

  Mit einem Reittier kannst du schneller durch die Wildnis gelangen. Sein Hauptzweck besteht allerdings darin, Ausrüstung
  zu tragen, die dich sonst verlangsamen würde. In der Tabelle „Reittiere und andere Tiere“ sind Bewegungsraten und Traglast-Grundwerte
  der Tiere aufgeführt. Die Wertekästen der Tiere findest du unter „Monster“.

