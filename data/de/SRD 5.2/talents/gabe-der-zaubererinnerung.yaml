  Gewölbeforscherausrüstung (12 GM) Eine Gewölbeforscherausrüstung enthält folgende Gegenstände: Brechstange, zehn Fackeln,
  Krähen- füße, zwei Flaschen Öl, Rucksack, Seil, zehn Tages- rationen, Trinkschlauch und Zunderkästchen.

  Gift, einfach (100 GM)

  Als Bonusaktion kannst du mit einer Phiole ein fachen Gifts eine Waffe oder bis zu drei Geschosse behandeln. Eine Kreatur,
  die durch die vergiftete Waffe oder ein vergiftetes Geschoss Hieb- oder Stichschaden erleidet, erleidet zusätzlich 1W4 Giftschaden.
  Wenn das Gift aufgetragen wurde,

  bleibt es wirksam, bis eine Minute vergangen ist oder sein Schaden bewirkt wurde, je nachdem, was zuerst eintritt.

  Glocke (1 GM)

  Wenn eine Glocke mit der Verwenden-Aktion geläutet wird, ist ihr Läuten bis zu 18 Meter weit zu hören.

  Handschellen (2 GM)

  Als Verwenden-Aktion kannst du mit Handschellen eine nicht bereitwillige, kleine oder mittelgroße Kreatur im Abstand von
  bis zu 1,5 Metern von dir fesseln, die gepackt, kampfunfähig oder festgesetzt ist, sofern du einen SG-13-Geschicklichkeitswurf
  (Fingerfertigkeit) bestehst. Eine auf diese Art gefesselte Kreatur ist bei Angriffswürfen im Nachteil. Außerdem ist sie
  festgesetzt, sofern die Handschellen an einem fixierten Gegenstand wie einer Kette oder einem Haken befestigt sind. Aus
  den Handschellen zu entkommen erfordert einen erfolgreichen SG-20-Geschicklichkeitswurf (Fingerfertigkeit) als Aktion. Die
  Handschellen zu sprengen erfordert einen erfolgreichen SG-25Stärkewurf (Athletik) als Aktion. Zu jedem Paar Handschellen
  gehört ein Schlüssel. Ohne den Schlüssel kann eine Kreatur versuchen, das Schloss der Handschellen mit Diebeswerkzeug und
  einem erfolgreichen SG-15-Geschicklichkeits- wurf (Fingerfertigkeit) zu knacken.

  Heilerausrüstung (5 GM)

  Eine Heilerausrüstung reicht für zehn Anwen dungen. Als Verwenden-Aktion kannst du eine der Anwendungen verbrauchen, um
  eine bewusstlose Kreatur mit 0 Trefferpunkten zu stabilisieren, ohne dass du dazu einen Weisheitswurf (Heilkunde) ausführen
  musst.

  Heiliges Symbol (Preis variiert)

  Ein heiliges Symbol hat eine der Formen, die in der Tabelle „Heilige Symbole“ aufgeführt sind. Es ist mit Juwelen besetzt
  oder mit Malereien versehen, um göttliche Magie zu kanalisieren. Kleriker und Paladine können ein heiliges Symbol als Zauberfokus
  verwenden. In der Tabelle ist angegeben, ob ein heiliges Symbol gehalten oder getragen werden oder sich auf Stoff (wie ein
  Wappenrock oder Banner) oder einem Schild befinden muss.

