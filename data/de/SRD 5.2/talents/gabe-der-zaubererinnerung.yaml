  Behälter, Armbrustbolzen (1 GM) Ein Behälter für Armbrustbolzen fasst bis zu 20 Bolzen.

  Behälter, Karten oder Schriftrollen (1 GM) Ein Karten- oder Schriftrollenbehälter fasst bis zu zehn Papierbögen oder fünf
  Pergamentbögen.

  Beutel (5 SM)

  Ein Beutel fasst bis zu drei Kilogramm in einem Volumen von 5,6 Litern.

  Blendlaterne (10 GM)

  Eine Blendlaterne spendet in einem Kegel von 18 Metern helles Licht und in weiteren 18 Metern dämmriges Licht.

  Brechstange (2 GM)

  Wenn du eine Brechstange verwendest, bist du bei Stärkewürfen im Vorteil, bei denen sich die Hebelwirkung der Brechstange
  anwenden lässt.

  Buch (25 GM)

  Ein Buch enthält Belletristik oder Sachtexte. Wenn du ein korrektes Sachbuch zu einem Thema liest, erhältst du einen Bonus
  von +5 auf Intelligenzwürfe (Arkane Kunde, Geschichte, Naturkunde oder Religion) zu diesem Thema.

  Decke (5 SM)

  In eine Decke gewickelt bist du bei Rettungswürfen gegen extreme Kälte (siehe „Werkzeugkasten fürs Spiel“) im Vorteil.

  Diplomatenausrüstung (39 GM)

  Eine Diplomatenausrüstung enthält folgende Gegen- stände: zwei Karten- oder Schriftrollenbehälter, feine Kleidung, Lampe,
  vier Flaschen Öl, fünf Bögen Papier, Parfüm, fünf Bögen Pergament, Tinte, fünf Tintenfüller, Truhe und Zunderkästchen.

