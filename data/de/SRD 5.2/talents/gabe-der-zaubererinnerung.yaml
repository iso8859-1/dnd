  Einer

  Die meisten zauberwirkenden Monster ändern ihre Liste vorbereiteter Zauber nicht. Es steht dem SL allerdings frei, die Liste
  zu ändern.

  Stets vorbereitete Zauber

  Bestimmte Merkmale geben dir möglicherweise einen Zauber, den du stets vorbereitet hast. Wenn du außerdem eine Liste vorbereiteter
  Zauber hast, die du ändern kannst, wird ein Zauber, den du stets vorbereitet hast, bei der Anzahl von Zaubern auf dieser
  Liste nicht berücksichtigt.

  Z aubern in Rüstung

  Du benötigst Vertrautheit mit der Rüstung, die du trägst, wenn du einen Zauber wirkst. Anderenfalls schränkt die Rüstung
  dich zum Zauberwirken zu sehr ein.

  Jede Zauberbeschreibung hat mehrere Einträge mit den Details, die zum Wirken des Zaubers erforderlich sind. Die Einträge
  stehen jeweils hinter dem Namen des Zaubers. Sie werden in den folgenden Abschnitten einzeln erklärt.

  Zaubergrad

  Jeder Zauber hat einen Grad von 0 bis 9, der in der Zauberbeschreibung verzeichnet ist. Dieser Grad ist ein Hinweis darauf,
  wie mächtig der Zauber ist. Zaubertricks, also einfache Zauber, die Charaktere mehr oder minder aus dem Ärmel schütteln,
  haben den 0. Grad. Die Regeln jeder zauberwirkenden Klasse geben an, wann die Mitglieder der Klasse auf Zauber bestimmter
  Stufen zugreifen können.

  Zauberplätze

  Zauberei ist anstrengend, weshalb ein Zauberwirker nur eine bestimmte Anzahl von Zaubern ab dem 1. Grad wirken kann, bevor
  er rasten muss. Das magische Potenzial eines Zauberwirkers wird durch seine Zauberplätze repräsentiert. Jede zauberwirkende
  Klasse hat eine begrenzte Anzahl von Zauberplätzen mit bestimmten Zaubergraden. Beispiel: Ein Magier der 3. Stufe hat vier
  Zauberplätze des 1. Grades und zwei Zauberplätze des 2. Grades. Wenn du einen Zauber wirkst, verbrauchst du einen Zauberplatz,
  dessen Grad mindestens dem des Zaubers entspricht. Du „füllst“ den Platz sozusagen mit dem Zauber. Stell dir einen Zauberplatz
  als einen Aktenordner einer bestimmten Dicke vor – Zauber des 1. Grades brauchen nicht so einen dicken Aktenordner wie Zauber
  höherer Grade. Dabei passen Zauber des 1. Grades natürlich auch in einen dickeren Ordner. Zauber des 2. Grades passen hingegen
  nur in Aktenordner ab dem 2. Grad. Wenn ein Magier der 3. Stufe also Magisches Geschoss wirkt – einen Zauber des 1. Grades
  –, dann verbraucht er einen seiner vier Zauberplätze des 1. Grades, sodass ihm noch drei verbleiben. Verbrauchte Zauberplätze
  werden nach einer langen Rast wiederhergestellt.

  Zauber wirken, ohne Zauberplätze zu verbrauchen

  Es gibt mehrere Möglichkeiten, einen Zauber zu wirken, ohne einen Zauberplatz zu verbrauchen:

  Zaubertricks: Ein Zaubertrick wird gewirkt, ohne einen Zauberplatz zu verbrauchen. Rituale: Bestimmte Zauber sind beim Eintrag
  Zeitaufwand als Rituale gekennzeichnet. Diese Zauber können entweder nach den üblichen Regeln zum Zauberwirken oder als
  Rituale gewirkt werden. Das Wirken der Ritualversion eines Zaubers dauert zwar zehn Minuten länger

  als üblich, verbraucht aber keinen Zauberplatz. Um einen Zauber als Ritual zu wirken, muss der Zauberwirker ihn vorbereitet
  haben. Spezialfähigkeiten: Manche Charaktere und Monster haben Spezialfähigkeiten, die es ihnen erlauben, bestimmte Zauber
  zu wirken, ohne Zauberplätze verbrauchen zu müssen. Dieses Zauberwirken wird stattdessen anderweitig eingeschränkt, weil
  du den Zauber zum Beispiel nur begrenzt oft am Tag wirken kannst. Magische Gegenstände: Zauberschriftrollen und einige andere
  magische Gegenstände enthalten Zauber, die du wirken kannst, ohne einen Zauberplatz zu verbrauchen. In der Beschreibung
  solcher Gegenstände ist angegeben, wie oft ein Zauber aus ihnen gewirkt werden kann.

  Zauberlisten der Klassen

  Wird ein Zauber mit einem Zauberplatz eines höheren Grades als nötig gewirkt, so nimmt der Zauber den höheren Grad an. Beispiel:
  Verbraucht ein Magier für Magisches Geschoss einen Zauberplatz des 2. Grades, so hat dieses Magische Geschoss den 2. Grad.
  Der Zauber nimmt sozusagen den gesamten verfügbaren Zauberplatz ein. Manche Zauber, beispielsweise Magisches Geschoss und
  Wunden heilen, haben mächtigere Effekte, wenn sie auf einem höheren Grad gewirkt werden. Die Effekte sind in der Beschreibung
  des Zaubers aufgeführt.

  Du kannst in einem Zug nur einen Zauberplatz verbrauchen, um einen Zauber zu wirken. Diese Regel bedeutet beispielsweise,
  dass es nicht möglich ist, im selben Zug mit der magischen Aktion einen Zauber mit Zauberplatz und mit einer Bonusaktion
  einen zweiten Zauber mit Zauberplatz zu wirken.

  Jeder Zauber gehört zu einer Schule der Magie. Diese Schulen sind in der gleichnamigen Tabelle aufgeführt. Sie helfen dabei,
  Zauber zu beschreiben, und haben keine eigenen Regeln. Andere Regeln können sich allerdings auf sie beziehen.

  Höherer Zeitaufwand

  Verwenden von Zauberplätzen höheren Grades

