  Waffen In der Tabelle „Waffen“ in diesem Abschnitt sind die wichtigsten Waffen des Spiels aufgeführt. Außerdem sind Kosten
  und Gewicht der Waffen sowie folgende Details angegeben:

  Kategorie: Jede Waffe gehört zu einer von zwei Kategorien: Einfache Waffe oder Kriegswaffe. Übung im Umgang mit Waffen ist
  üblicherweise mit einer dieser Kategorien verknüpft. So kannst du beispielsweise Übung im Umgang mit einfachen Waffen haben.
  Nahkampf oder Fernkampf: Eine Waffe wird entweder als Nahkampf- oder Fernkampfwaffe eingestuft. Mit Nahkampfwaffen werden
  Gegner im Abstand von bis zu 1,5 Metern angegriffen. Fernkampfwaffen dienen zum Angreifen von weiter entfernten Zielen.
  Schaden: In der Tabelle wird die Schadensmenge, die eine Waffe bei einem Treffer bewirkt, sowie die Schadensart genannt.
  Eigenschaften: Alle Eigenschaften einer Waffe sind in der Spalte „Eigenschaften“ aufgeführt.

  werden. Handelsgüter und Wertgegenstände wie Edelsteine und Kunstgegenstände können auf Markt plätzen hingegen für ihren
  vollen Wert verkauft werden. Unter „Magische Gegenstände“ findest du Preise für magische Gegenstände.

  Die Eigenschaften werden im Abschnitt „Eigenschaften“ beschrieben. Beherrschung: Jede Waffe hat eine Meister schaftseigenschaft,
  die im Abschnitt „Meister schaftseigenschaft“ beschrieben ist. Um diese Eigenschaft zu verwenden, musst du über ein Merkmal
  verfügen, das die Verwendung zulässt.

  Übung im Umgang mit Waffen

  Jeder kann eine Waffe führen, doch du musst Übung im Umgang mit ihr haben, um Angriffswürfen mit dieser Waffe deinen Übungsbonus
  hinzufügen zu können. Die Merkmale eines Spielercharakters können Übung im Umgang mit Waffen umfassen. Monster haben Übung
  im Umgang mit allen Waffen, die in ihrem Wertekasten aufgeführt sind.

  Eigenschaften

  Im Folgenden werden die Eigenschaften in der Spalte „Eigenschaften“ der Tabelle „Waffen“ erklärt:

  Fernkampfreichweite

  Die Reichweite von Fernkampfwaffen ist nach den Eigenschaften Geschosse oder Wurfwaffe aufgeführt. Sie umfasst zwei Werte:
  Der erste ist die Grundreichweite der Waffe in Metern, der zweite die Maximalreichweite. Wenn du ein Ziel außerhalb der
  Grundreichweite angreifst, bist du beim Angriffswurf im Nachteil. Du kannst keine Ziele außerhalb der Maximalreichweite
  angreifen.

  Finesse

  Wenn du mit Finesse-Waffen angreifst, hast du bei Angriffs- und Schadenswürfen die Wahl zwischen deinem Stärke- und deinem
  Geschicklichkeits modifikator. Du musst allerdings bei beiden Würfen denselben Modifikator verwenden.

  Geschosse

  Du kannst Waffen mit der Eigenschaft Geschosse nur für Fernkampfangriffe verwenden, wenn du über entsprechende Geschosse
  verfügst. Die Art der erforderlichen Geschosse ist jeweils bei der Reichweite der Waffe angegeben. Jeder Angriff verbraucht
  ein Geschoss. Es ist Teil des Angriffs, die Waffe mit Geschossen zu laden (bei Einhandwaffen muss dazu eine Hand frei sein).
  Nach einem Kampf kannst du eine Minute damit verbringen, die Hälfte der Geschosse (abgerundet) zu bergen, die du im Kampf
  verbraucht hast. Der Rest geht verloren.

  Improvisierte Waffen

  Wenn du einen Gegenstand – ein Tischbein, eine Bratpfanne, eine Flasche – als provisorische Waffe verwendest, lies den Abschnitt
  „Improvisierte Waffen“ unter „Regelglossar“. Sieh dir diese Regeln auch an, wenn du eine Waffe auf ungewöhnliche Art verwendest,
  beispielsweise einen Nahkampfangriff mit einer Fernkampfwaffe ausführst.

