  Laden Du kannst mit einer Aktion, Bonusaktion oder Reaktion immer nur ein Geschoss aus einer Waffe mit der Eigenschaft Laden
  abfeuern, egal, wie viele Angriffe dir zur Verfügung stehen.

  Leicht

  Wenn du in deinem Zug die Angriffsaktion ausführst und mit einer leichten Waffe angreifst, kannst du später im selben Zug
  als Bonusaktion einen zusätz- lichen Angriff ausführen. Dieser zusätzliche Angriff muss mit einer anderen leichten Waffe
  ausgeführt werden, und du kannst dem Schaden des zusätz- lichen Angriffs nicht deinen Attributsmodifikator hinzufügen, sofern
  dieser Modifikator nicht negativ ist. Beispiel: Du kannst mit einem Kurzschwert in der einen Hand und einem Dolch in der
  anderen angreifen, indem du die Angriffsaktion und eine Bonusaktion ausführst. Du fügst dem Schadenswurf der Bonusaktion
  jedoch nicht deinen Stärke- oder Geschicklichkeitsmodifikator hinzu, sofern dieser Modifikator nicht negativ ist.

  Nahkampfreichweite

  Bei Waffen mit der Eigenschaft Weitreichend ist die normale Angriffsreichweite um 1,5 Meter erhöht. Dies gilt auch bei Gelegenheitsangriffen.

  Schwer

  Du bist bei Angriffswürfen mit schweren Waffen im Nachteil, wenn du bei Nahkampfwaffen einen Stärkewert von weniger als
  13 und bei Fernkampf- waffen einen Geschicklichkeitswert von weniger als 13 hast.

  Vielseitig

  Waffen mit der Eigenschaft Vielseitig können mit einer Hand oder mit zwei Händen geführt werden. Mit der Eigenschaft wird
  ein Schadenswert in Klammern genannt. Diesen Schaden bewirkt die Waffe, wenn sie mit zwei Händen geführt wird, um einen
  Nahkampfangriff auszuführen.

  Wurfwaffe

  Waffen mit der Eigenschaft Wurfwaffe können geworfen werden, um Fernkampfangriffe auszu- führen, und sie können als Teil
  des Angriffs gezogen werden. Wenn es sich um eine Nahkampfwaffe han- delt, die du wirfst, verwendest du bei Angriffs- und
  Schadenswürfen den gleichen Attributsmodifikator wie bei Nahkampfangriffen mit der Waffe.

  Zweihändig

  Waffen mit der Eigenschaft Zweihändig müssen mit zwei Händen geführt werden.

  Meisterschaftseigenschaft Jede Waffe hat eine Meisterschaftseigenschaft. Diese ist nur für Charaktere mit einem Merkmal
  wie Waffenbeherrschung verfügbar, das den Zugriff auf die Meisterschaftseigenschaft erlaubt. Die Meister- schaftseigenschaften
  sind nachfolgend beschrieben.

  Auslaugen

  Wenn du eine Kreatur mit dieser Waffe triffst, ist diese Kreatur bei ihrem nächsten Angriffswurf vor Beginn deines nächsten
  Zugs im Nachteil.

  Einkerben

  Wenn du den zusätzlichen Angriff der Eigenschaft Leicht ausführst, kannst du dies als Teil der Angriffs aktion statt als
  Bonusaktion tun. Du kannst diesen zusätzlichen Angriff nur einmal pro Zug ausführen.

  Plagen

  Wenn du eine Kreatur mit dieser Waffe triffst und ihr Schaden zufügst, bist du beim nächsten Angriffswurf gegen diese Kreatur
  vor Ende deines nächsten Zugs im Vorteil.

  Spalten

  Wenn du eine Kreatur mit einem Nahkampfangriffs wurf triffst, den du mit dieser Waffe ausführst, kannst du mit der Waffe
  einen weiteren Nahkampf angriff auf eine zweite Kreatur im Abstand von bis zu 1,5 Metern von der ersten ausführen, sofern
  die zweite sich ebenfalls in Reichweite befindet. Bei einem Treffer erleidet die Kreatur den Waffenschaden. Du fügst dem
  Schaden jedoch nicht deinen Attributsmodifikator hinzu, sofern dieser Modifikator nicht negativ ist. Du kannst diesen zusätzlichen
  Angriff nur einmal pro Zug ausführen.

  Stoßen

  Wenn du eine Kreatur mit dieser Waffe triffst, kannst du sie bis zu drei Meter weit in gerader Linie von dir wegstoßen,
  sofern sie von höchstens großer Größe ist.

  Streifen

  Wenn dein Angriffswurf mit dieser Waffe eine Kreatur verfehlt, kannst du der Kreatur Schaden in Höhe des Attributsmodifikators
  zufügen, den du für den Angriffswurf verwendet hast. Die Schadensart entspricht der Waffe. Der Schaden kann nur durch Erhöhen
  des Attributsmodifikators erhöht werden.

  Umstoßen

  Wenn du eine Kreatur mit dieser Waffe triffst, kannst du sie zu einem Konstitutionsrettungswurf (SG 8 plus Attributsmodifikator
  für den Angriffswurf plus dein Übungsbonus) zwingen. Misslingt der Wurf, so wird die Kreatur umgestoßen und hat den Zustand
  Liegend.

  Verlangsamen Wenn du eine Kreatur mit dieser Waffe triffst und ihr Schaden zufügst, kannst du ihre Bewegungsrate bis zum
  Beginn deines nächsten Zugs um drei Meter verringern. Wird die Kreatur mehrfach von Waffen mit dieser Eigenschaft getroffen,
  so wird ihre Bewe- gungsrate dennoch nur um drei Meter verringert.

  Rüstung

  In der Tabelle „Rüstung“ sind die wichtigsten Rüstungen des Spiels aufgeführt. Dazu sind Kosten und Gewicht der Rüstungen
  sowie folgende Details enthalten:

  Kategorie: Jede Rüstung gehört zu einer von drei Kategorien: Leicht, Mittelschwer oder Schwer. Die Kategorie bestimmt, wie
  lange es dauert, die Rüstung an- oder abzulegen (wie in der Tabelle gezeigt). Rüstungsklasse (RK): Die Spalte „Rüstungsklasse“
  der Tabelle verrät dir deine Basis-RK, wenn du einen bestimmten Rüstungstyp trägst. Trägst du beispielsweise eine Lederrüstung,
  so entspricht deine Basis-RK 11 plus deinem Geschicklichkeitsmodifikator. Trägst du hingegen einen Kettenpanzer, so ist
  deine Basis-RK 16. Stärke: Wenn in der Tabelle in der Spalte „Stärke“ ein Stärkewert für eine Rüstung angegeben ist, verringert
  die Rüstung die Bewegungsrate des Trägers um drei Meter, es sei denn, der Stärkewert des Trägers entspricht mindestens dem
  aufgeführten.

  Heimlichkeit: Wenn in der Tabelle in der Spalte „Heimlichkeit“ der Begriff „Nachteil“ aufgeführt ist, so ist der Träger
  bei Geschicklichkeitswürfen (Heimlichkeit) im Nachteil.

  Rüstungsvertrautheit

  Jeder kann eine Rüstung tragen oder einen Schild halten. Es bedarf jedoch Vertrautheit, um diese

  Dies ist unten erläutert. Die Klasse und andere Merkmale eines Charakters bestimmen seine Rüstungsvertrautheit. Monster
  sind mit allen Rüstungen vertraut, die in ihrem Wertekasten aufgeführt sind.

  Leichte, mittelschwere und schwere Rüstung

  Wenn du leichte, mittelschwere oder schwere Rüstung trägst, mit der du nicht vertraut bist, so bist du bei jeder W20-Prüfung
  im Nachteil, die Stärke oder Geschicklichkeit einbezieht, und du kannst keine Zauber wirken.

  Schild

  Du erhältst den Vorzug Rüstungsklasse eines Schildes nur dann, wenn du mit dem Schild vertraut bist.

  Jeweils nur eine Rüstung

  Eine Kreatur kann jeweils nur eine Rüstung und nur einen Schild tragen.

