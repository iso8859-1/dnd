  Zauber

  Zauber wirken

  Zauber erhalten Ehe du einen Zauber wirken kannst, musst du ihn geistig vorbereitet haben, oder du brauchst über einen magischen
  Gegenstand wie eine Zauberschriftrolle Zugriff auf den Zauber. Deine Merkmale und Talente geben an, auf welche Zauber du
  gegebenenfalls zugreifen kannst, ob du bestimmte Zauber stets vorbereitet hast und ob du die Liste deiner vorbereiteten
  Zauber ändern kannst.

  Zauber vorbereiten

  Wenn du eine Liste von vorbereiteten Zaubern ab dem 1. Grad hast, gibt dein Merkmal Zauberwirken an, wann du die Liste ändern
  kannst – und wie viele Zauber du ändern kannst. Dies ist in der Tabelle „Vorbereiten von Zaubern nach Klasse“ zusammengefasst.

