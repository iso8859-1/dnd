  Einbrecherausrüstung (16 GM) Eine Einbrecherausrüstung enthält folgende Gegen- stände: Abdeckbare Laterne, Brechstange,
  Glocke, zehn Kerzen, Metallkügelchen, sieben Flaschen Öl, Rucksack, Seil, fünf Tagesrationen, Trinkschlauch und Zunderkästchen.

  Entdeckerausrüstung (10 GM)

  Eine Entdeckerausrüstung enthält folgende Gegen- stände: zehn Fackeln, zwei Flaschen Öl, Rucksack, Schlafsack, Seil, zehn
  Tagesrationen, Trinkschlauch und Zunderkästchen.

  Enterhaken (2 GM)

  Als Verwenden-Aktion kannst du den Enterhaken nach einer Reling, einem Sims oder einem anderen geeigneten Gegenstand im
  Abstand von bis zu 15 Metern von dir werfen. Er greift, wenn du einen SG-13-Geschicklichkeitswurf (Akrobatik) bestehst.
  Wenn du ein Seil am Haken befestigt hast, kannst du daran hochklettern.

  Fackel (1 KM)

  Eine Fackel brennt eine Stunde lang. Sie spendet in einem Radius von sechs Metern helles Licht und in einem Radius von weiteren
  sechs Metern dämmriges Licht. Mithilfe der Angriffsaktion kannst du mit der Fackel angreifen, wobei du sie als einfache
  Nahkampfwaffe verwendest. Bei einem Treffer erleidet das Ziel 1 Feuerschaden.

  Fass (2 GM)

  Ein Fass bietet ein Volumen von 112 Litern und kann Flüssigkeiten oder trockene Güter fassen.

  Fernrohr (1.000 GM)

  Durch ein Fernrohr erscheint alles doppelt so groß.

  Flasche (2 KM)

  Eine Flasche fasst bis zu 0,5 Liter.

  Flasche, Glas (2 GM) Eine Glasflasche fasst bis zu 0,75 Liter.

  Flaschenzug (1 GM)

  Mit einem Flaschenzug kannst du das Vierfache des Gewichts anheben, das du auf normale Weise heben könntest.

  Gegengift (50 GM)

  Als Bonusaktion kannst du eine Phiole mit Gegen- gift zu dir nehmen, damit deine Rettungswürfe zum Vermeiden oder Beenden
  des Zustands Vergiftet eine Stunde lang im Vorteil sind.

  Gelehrtenausrüstung (40 GM)

  Eine Gelehrtenausrüstung enthält folgende Gegen- stände: Buch, Lampe, zehn Flaschen Öl, zehn Bögen Pergament, Rucksack,
  Tinte, Tintenfüller und Zunderkästchen.

  Geschosse (Preis variiert)

  Geschosse werden für Waffen mit der Eigenschaft Geschosse benötigt. Die jeweils erforderliche Art der Geschosse ist in der
  Waffenbeschreibung angegeben. In der Tabelle „Geschosse“ sind die verschiedenen Arten sowie die Mengen aufgeführt, die du
  beim Kauf erhältst. Außerdem ist der Gegenstand genannt, der üblicherweise zur Aufbewahrung der Geschosse verwendet wird
  (er muss separat erworben werden).

