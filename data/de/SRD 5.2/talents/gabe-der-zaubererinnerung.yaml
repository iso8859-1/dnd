  Heiltrank (50 GM)

  Kleidung, Reise (2 GM)

  Dieser Trank ist ein magischer Gegenstand. Als Bonusaktion kannst du ihn zu dir nehmen oder einer anderen Kreatur im Abstand
  von bis zu 1,5 Metern von dir verabreichen. Eine Kreatur, die die magische rote Flüssigkeit in dieser Phiole trinkt, erhält
  2W4+2 Trefferpunkte zurück.

  Reisekleidung besteht aus belastbarem Material und eignet sich zum Reisen durch verschiedene Umgebungen.

  Jagdfalle (5 GM)

  Als Verwenden-Aktion kannst du eine Jagdfalle stellen – einen gezahnten Stahlring, der zuschnappt, wenn eine Kreatur auf
  die Druckplatte in der Mitte tritt. Die Falle ist mit einer schweren Kette an einem Fixpunkt wie einem Baum oder einem in
  den Boden gerammten Pfahl befestigt. Eine Kreatur, die auf die Platte tritt, muss einen SG-13-Geschick- lichkeitsrettungswurf
  bestehen, oder sie erleidet 1W4 Stichschaden, und ihre Bewegungsrate ist bis zum Beginn ihres nächsten Zugs auf 0 verringert.
  Anschließend ist die Bewegung der Kreatur durch die Länge der Kette (üblicherweise ein Meter) begrenzt, bis die Kreatur
  sich aus der Falle befreien kann. Eine Kreatur kann ihre Aktion verwenden, um einen SG-13-Stärkewurf (Athletik) auszuführen.
  Bei einem Erfolg befreit es sich selbst oder eine andere Kreatur in Reichweite aus der Falle. Jeder misslungene Wurf fügt
  der Kreatur in der Falle 1 Stichschaden zu.

  Karte (1 GM)

  Wenn du eine korrekte Karte konsultierst, hast du einen Bonus von +5 auf Weisheitswürfe (Über lebenskunst), die du ausführst,
  um dich im auf der Karte dargestellten Gebiet zurechtzufinden.

  Kerze (1 KM)

  Eine brennende Kerze spendet eine Stunde lang in einem Radius von 1,5 Metern helles Licht und in einem Radius von weiteren
  1,5 Metern dämmriges Licht.

  Kette (5 GM)

  Als Verwenden-Aktion kannst du eine Kette um eine nicht bereitwillige Kreatur im Abstand von bis zu 1,5 Metern von dir schlingen,
  die gepackt, kampfunfähig oder festgesetzt ist, sofern du einen SG-13-Stärkewurf (Athletik) bestehst. Werden die Beine der
  Kreatur gefesselt, so ist die Kreatur festgesetzt, bis sie entkommt. Um die Kette abzustreifen, muss die Kreatur als Aktion
  einen SG-18-Geschicklichkeitswurf (Akrobatik) bestehen. Die Kette zu sprengen erfordert einen erfolgreichen SG-20-Stärkewurf
  (Athletik) als Aktion.

  Kleidung, fein (15 GM)

  Feine Kleidung besteht aus teuren Stoffen und ist mit kunstvollen Details verziert. Manche Veranstaltungen und Orte können
  nur in feiner Kleidung besucht werden.

  Kletterausrüstung (25 GM)

  Zur Kletterausrüstung gehören Gurtzeug, Hand schuhe, Kletterhaken und Steigeisen. Als VerwendenAktion kannst du dich mit
  der Kletterausrüstung durch Verankern sichern, um vom Ankerpunkt nicht tiefer als 7,5 Meter stürzen zu können. In diesem
  Fall kannst du dich höchstens 7,5 Meter weit bewegen, ohne den Anker als Bonusaktion zu lösen.

  Köcher (1 GM)

  Ein Köcher fasst bis zu 20 Pfeile.

  Korb (4 SM)

  Ein Korb fasst bis zu 20 Kilogramm in einem Volumen von 56 Litern.

  Kostüm (5 GM)

  Wenn du ein Kostüm trägst, bist du bei allen Attributswürfen im Vorteil, die du ausführst, um dich als die entsprechende
  Person oder Art von Person zu tarnen.

  Krähenfüße (1 GM)

  Als Verwenden-Aktion kannst du Krähenfüße aus ihrem Beutel nehmen und in einem Bereich von 2,3 Quadratmetern im Abstand
  von bis zu 1,5 Metern von dir auslegen. Eine Kreatur, die diesen Bereich erstmals in einem Zug betritt, muss einen SG-15-Geschicklichkeitsrettungswurf
  bestehen, oder sie erleidet 1 Stichschaden, und ihre Bewegungsrate ist bis zum Beginn ihres nächsten Zugs auf 0 verringert.
  Es dauert zehn Minuten, die Krähenfüße wieder einzusammeln.

  Krug (2 KM)

  Ein Krug fasst bis zu 4 Liter.

  Lampe (5 SM)

  Eine Lampe brennt mit Öl und spendet in einem Radius von 4,5 Metern helles Licht und in einem Radius von weiteren neun Metern
  dämmriges Licht.

  Laterne, abdeckbar (5 GM)

  Eine abdeckbare Laterne spendet in einem Radius von neun Metern helles Licht und in einem Radius von weiteren neun Metern
  dämmriges Licht. Als Bonusaktion kannst du die Haube entweder absenken und so das Licht auf dämmriges Licht in einem Radius
  von 1,5 Metern verringern, oder du kannst die Haube wieder anheben.

  Leiter (1 SM)

  Eine Leiter ist drei Meter lang. Du musst klettern, um dich an ihr hinauf- oder hinabzubewegen.

  Lupe (100 GM) Mit einer Lupe bist du bei allen Attributswürfen zum Einschätzen oder Untersuchen kleiner oder detailreicher
  Gegenstände im Vorteil. Wenn du mit einer Lupe ein Feuer entfachen willst, benötigst du Sonnenlicht oder vergleichbar helles
  Licht zum Bündeln, Zunder zum Anzünden und etwa fünf Minuten Zeit.

  Materialkomponentenbeutel (25 GM)

  Ein Materialkomponentenbeutel ist wasserdicht und so unterteilt, dass er alle kostenlosen Material komponenten deiner Zauber
  aufnehmen kann.

  Metallkügelchen (1 GM)

  Als Verwenden-Aktion kannst du Metallkügelchen aus ihrem Beutel schütten. Sie verteilen sich und bedecken einen 1 Quadratmeter
  großen ebenen Bereich im Abstand von bis zu drei Metern von dir. Eine Kreatur, die diesen Bereich erstmals in einem Zug
  betritt, muss einen SG-10-Geschicklich- keitsrettungswurf bestehen, oder sie stürzt und hat den Zustand Liegend. Es dauert
  zehn Minuten, die Metallkügelchen wieder einzusammeln.

  Netz (1 GM)

  Wenn du die Angriffsaktion ausführst, kannst du einen deiner Angriffe dadurch ersetzen, dass du ein Netz wirfst. Ziele auf
  eine Kreatur im Abstand von bis zu 4,5 Metern von dir, die du sehen kannst. Das Ziel muss einen Geschicklichkeitsrettungswurf
  (SG 8 plus dein Geschicklichkeitsmodifikator plus dein Übungsbonus) bestehen, oder es ist festgesetzt, bis es entkommt.
  Es besteht den Rettungswurf automatisch, wenn es von mindestens riesiger Größe ist. Zum Entkommen muss das Ziel eine Aktion
  ausführen und einen SG-10-Stärkewurf (Athletik) bestehen. Alternativ kann eine andere Kreatur im Abstand von bis zu 1,5
  Metern vom Ziel auf die gleiche Weise versuchen, das festgesetzte Ziel zu befreien. Durch Zerstören des Netzes (RK 10, 5
  TP, Immunität gegen Gift-, psychischen und Wuchtschaden) wird das Ziel ebenfalls befreit, und der Effekt endet.

  Öl (1 SM)

  Du kannst eine Kreatur, einen Gegenstand oder einen Bereich mit Öl bedecken oder das Öl als Brennstoff verwenden wie unten
  beschrieben. Eine Kreatur oder einen Gegenstand bedecken: Wenn du die Angriffsaktion ausführst, kannst du einen deiner Angriffe
  dadurch ersetzen, dass du eine Flasche Öl wirfst. Wähle ein Ziel (Kreatur oder Gegenstand) im Abstand von bis zu sechs Metern
  von dir aus. Das Ziel muss

  einen Geschicklichkeitsrettungswurf (SG 8 plus dein Geschicklichkeitsmodifikator plus dein Übungsbonus) bestehen, oder es
  wird mit Öl bedeckt. Wenn das Ziel Feuerschaden erleidet, bevor das Öl (nach einer Minute) getrocknet ist, bewirkt das brennende
  Öl zusätzlich 5 Feuerschaden. Einen Bereich bedecken: Als VerwendenAktion kannst du eine Ölflasche auf ebenem Boden ausgießen.
  Das Öl bedeckt einen Bereich von 2,3 Quadratmetern im Abstand von bis zu 1,5 Metern von dir. Wenn das Öl angezündet wird,
  brennt es bis zum Ende des Zugs zwei Runden nach dem Entzünden (oder zwölf Sekunden lang) und fügt jeder Kreatur, die den
  Bereich betritt oder ihren Zug darin beendet, 5 Feuerschaden zu. Eine Kreatur kann diesen Schaden nur einmal pro Zug erleiden.
  Brennstoff: Öl dient als Brennstoff für Lampen und Laternen. Eine Flasche Öl brennt sechs Stunden lang in einer Lampe oder
  Laterne. Diese Brenndauer muss nicht am Stück erfolgen. Das brennende Öl kann (als Verwenden-Aktion) gelöscht und später
  erneut entzündet werden, bis es insgesamt sechs Stunden lang gebrannt hat.

  Papier (2 SM)

  Ein Bogen Papier bietet Platz für etwa 250 handgeschriebene Wörter.

  Parfüm (5 GM)

  Parfüm gibt es in Phiolen zu je 120 ml. Wenn du dich parfümierst, bist du eine Stunde lang bei Charismawürfen (Überzeugen)
  zum Beeinflussen von Humanoiden im Vorteil, die sich im Abstand von bis zu 1,5 Metern von dir befinden und dir gegenüber
  gleichgültig sind.

  Pergament (1 SM)

  Ein Bogen Pergament bietet Platz für etwa 250 handgeschriebene Wörter.

  Phiole (1 GM)

  Eine Phiole fasst bis zu 120 Milliliter.

  Priesterausrüstung (33 GM)

  Eine Priesterausrüstung enthält folgende Gegenstände: Decke, Lampe, Rucksack, Robe, sieben Tagesrationen, Weihwasser und
  Zunderkästchen.

  Rammbock, tragbar (4 GM)

  Mit einem tragbaren Rammbock kannst du Türen aufbrechen. Dabei erhältst du einen Bonus von +4 auf den Stärkewurf. Wenn ein
  anderer Charakter dir hilft, den Rammbock zu verwenden, bist du bei diesem Wurf im Vorteil.

  Rationen (5 SM) Rationen enthalten reisetaugliche Nahrung wie Trockenfleisch, Trockenfrüchte, Zwieback und Nüsse. Nahrungsmangel
  führt zu Risiken, die unter „Unterernährung“ unter „Regelglossar“ aufgeführt sind.

  Robe (1 GM)

  Eine Robe hat eine berufliche oder zeremonielle Bedeutung. Manche Veranstaltungen und Orte können nur in Roben von bestimmter
  Farbe oder mit bestimmten Symbolen besucht werden.

  Rucksack (2 GM)

  Ein Rucksack fasst bis zu 15 Kilogramm in einem Volumen von 28 Litern. Kann auch als Satteltasche dienen.

  Sack (1 KM)

  Ein Sack fasst bis zu 15 Kilogramm in einem Volumen von 28 Litern.

  Säure (25 GM)

  Wenn du die Angriffsaktion ausführst, kannst du einen deiner Angriffe dadurch ersetzen, dass du eine Phiole mit Säure wirfst.
  Wähle ein Ziel (Kreatur oder Gegenstand) im Abstand von bis zu sechs Metern von dir aus, das du sehen kannst. Das Ziel muss
  einen Geschicklichkeitsrettungswurf (SG 8 plus dein Geschicklichkeitsmodifikator plus dein Übungsbonus) bestehen, oder es
  erleidet 2W6 Säureschaden.

  Schaufel (2 GM)

  Mit der Schaufel kannst du in einer Stunde Arbeit ein Loch von 1,5 Metern Kantenlänge in die Erde (oder vergleichbares Material)
  graben.

  Schlafsack (1 GM)

  In einem Schlafsack kann eine kleine oder mittelgroße Kreatur schlafen. Im Schlafsack bestehst du Rettungswürfe gegen extreme
  Kälte (siehe „Werkzeugkasten fürs Spiel“) automatisch.

  Schloss (10 GM)

  Zu einem Schloss gehört ein Schlüssel. Ohne den Schlüssel kann eine Kreatur versuchen, das Schloss mit Diebeswerkzeug und
  einem erfolgreichen SG-15Geschicklichkeitswurf (Fingerfertigkeit) zu knacken.

  Schnur (1 SM)

  Ein Stück Schnur misst drei Meter. Du kannst als Verwenden-Aktion einen Knoten in die Schnur knüpfen.

  Seil (1 GM)

  Als Verwenden-Aktion kannst du mit einem erfolgreichen SG-10-Geschicklichkeitswurf (Fingerfertigkeit) einen Knoten in ein
  Seil knüpfen.

  Das Seil kann mit einem erfolgreichen SG-20Stärkewurf (Athletik) zerrissen werden. Du kannst eine Kreatur, die nicht bereitwillig
  ist, nur dann mit dem Seil fesseln, wenn die Kreatur gepackt, kampfunfähig oder festgesetzt ist. Werden die Beine der Kreatur
  gefesselt, so ist die Kreatur festgesetzt, bis sie entkommt. Um das Seil abzustreifen, muss die Kreatur als Aktion einen
  SG-15-Geschicklichkeitswurf (Akrobatik) bestehen.

  Signalpfeife (5 KM)

  Wenn eine Signalpfeife mit der Verwenden-Aktion geblasen wird, erzeugt sie einen Ton, der 180 Meter weit zu hören ist.

  Spiegel (5 GM)

  Ein stählerner Handspiegel ist nicht nur zu kosmetischen Zwecken nützlich, sondern auch zum Spähen um Ecken und zum Übermitteln
  von Lichtsignalen.

  Stachel, Eisen (1 GM)

  Eisenstachel gibt es in Bündeln zu je zehn Stück. Als Verwenden-Aktion kannst du einen Eisenstachel mit einem stumpfen Gegenstand
  wie einem leichten Hammer in Holz, Erde oder ähnliches Material treiben. So kannst du eine Tür verrammeln, oder du kannst
  ein Seil oder eine Kette am Stachel befestigen.

  Stange (5 KM)

  Eine Stange ist drei Meter lang. Du kannst sie verwenden, um etwas zu berühren, das bis zu drei Meter weit entfernt ist.
  Wenn du im Rahmen eines Hoch- oder Weitsprungs einen Stärkewurf (Athletik) ausführen musst und beim Springen die Stange
  verwenden kannst, bist du beim Wurf im Vorteil.

  Tinte (10 GM)

  Tinte gibt es in Flaschen zu je 30 ml (ausreichend für etwa 500 Seiten).

  Tintenfüller (2 KM)

  Um mit Tinte zu schreiben oder zu zeichnen, ist ein Tintenfüller erforderlich.

  Topf, Eisen (2 GM)

  Ein Eisentopf fasst bis zu 4 Liter.

  Trinkschlauch (2 SM)

  Ein Trinkschlauch fasst bis zu zwei Liter. Wenn du nicht genügend Wasser trinkst, riskierst du Dehydrierung (siehe „Regelglossar“).

  Truhe (5 GM)

  Eine Truhe bietet ein Volumen von 324 Litern.

  Unterhaltungskünstler-Ausrüstung (40 GM) Eine Unterhaltungskünstler-Ausrüstung enthält folgende Gegenstände: Blendlaterne,
  Glocke, drei Kostüme, acht Flaschen Öl, Rucksack, Schlafsack, Spiegel, neun Tagesrationen, Trinkschlauch und Zunderkästchen.

  Weihwasser (25 GM)

  Wenn du die Angriffsaktion ausführst, kannst du einen deiner Angriffe dadurch ersetzen, dass du eine Flasche mit Weihwasser
  wirfst. Ziele auf eine Kreatur im Abstand von bis zu sechs Metern von dir, die du sehen kannst. Wenn das Ziel ein Unhold
  oder ein Untoter ist, muss es einen Geschicklichkeitsrettungswurf (SG 8 plus dein Geschicklichkeitsmodifikator plus dein
  Übungsbonus) bestehen, oder es erleidet 2W8 gleißenden Schaden.

  Zauberschriftrolle (Zaubertrick: 30 GM, 1. Grad: 50 GM)

  Eine Zauberschriftrolle (Zaubertrick) oder Zauberschriftrolle (1. Grad) ist ein magischer Gegenstand mit den Worten eines
  Zaubertricks beziehungsweise Zaubers des 1. Grades nach Wahl des Schöpfers der Schriftrolle. Wenn sich der Zauber in der
  Liste deiner Klasse befindet, kannst du die Schriftrolle lesen und den Zauber mit normalem Zeitaufwand wirken, ohne Materialkomponenten
  zu benötigen. Wenn der Zauber einen Rettungs- oder Angriffs- wurf erfordert, beträgt der Zauberrettungswurf-SG 13 und der
  Angriffsbonus +5. Die Schriftrolle löst sich auf, wenn der Zauber gewirkt wurde.

  Als Zugtier einer Kutsche, eines Karrens, Streitwagens, Schlittens oder Wagens kann ein Tier höchstens das Fünffache seiner
  Grundtraglast ziehen. Wenn mehrere Tiere dasselbe Fahrzeug ziehen, wird ihre Traglast addiert.

  Rossharnisch

  Ein Rossharnisch ist eine Rüstung für Reittiere. Alle in der Tabelle „Rüstung“ unter „Ausrüstung“ aufgeführten Rüstungen
  sind auch als Rossharnische erhältlich. Sie kosten viermal so viel wie die normalen Versionen und wiegen doppelt so viel.

  Sättel

  Zu einem Sattel gehört Zaumzeug und jede sonstige Ausrüstung, die zum Verwenden des Sattels erforderlich ist. Mit einem
  Militärsattel bist du bei allen Attributswürfen im Vorteil, die du ausführst, um dich auf dem Reittier zu halten. Bei Wasserreittieren
  oder fliegenden Reittieren sind exotische Sättel erforderlich.

