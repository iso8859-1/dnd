  Werkzeug Werkzeug hilft dir, besondere Attributswürfe auszuführen, bestimmte Gegenstände herzustellen oder beides. In der
  Beschreibung des Werkzeugs sind Kosten, Gewicht sowie folgende Einträge enthalten:

  Attribut: Dieser Eintrag führt die Attribute auf, die verwendet werden, wenn mit diesem Werkzeug ein Attributswurf ausgeführt
  wird. Verwenden: Dieser Eintrag führt auf, was du mit dem Werkzeug tun kannst, wenn du die Verwenden-Aktion ausführst. Mit
  jeder Verwenden-Aktion kannst du eines dieser Dinge tun. Außerdem ist hier der SG für die Aktion angegeben. Herstellen:
  Dieser Eintrag führt gegebenenfalls auf, was du mit dem Werkzeug herstellen kannst. Die Regeln zum Herstellen findest du
  unter „Nichtmagische Gegenstände herstellen“, „Heiltränke brauen“ und „Zauberschriftrollen verfassen“ weiter hinten unter
  „Ausrüstung“. Varianten: Dieser Eintrag erscheint, wenn das Werkzeug Varianten hat. In diesem Fall sind die Varianten aufgeführt.
  Jede Variante erfordert separate Übung.

  Übung im Umgang mit Werkzeug

  Wenn du Übung im Umgang mit einem Werkzeug hast, fügst du jedem Attributswurf, der dieses Werkzeug verwendet, deinen Übungsbonus
  hinzu. Wenn du in einer Fertigkeit geübt bist, die bei diesem Wurf verwendet wird, ist der Wurf außerdem noch im Vorteil.
  Deine Merkmale könnten dir Übung im Umgang mit einem Werkzeug verleihen. Monster haben Übung im Umgang mit allen Werkzeugen,
  die in ihrem Wertekasten aufgeführt sind.

  Handwerkszeug

  Handwerkszeug ist dazu da, bestimmte Gegenstände im Rahmen eines Handwerks herzustellen. Jedes dieser Werkzeuge erfordert
  separate Übung.

  Alchemistenausrüstung (50 GM)

  Attribut: Intelligenz Gewicht: 4 kg Verwenden: Eine Substanz identifizieren (SG 15) oder ein Feuer entfachen (SG 15) Herstellen:
  Alchemistenfeuer, Materialkomponentenbeutel, Öl, Papier, Parfüm, Säure

  Brauereizubehör (20 GM) Attribut: Intelligenz Gewicht: 4,5 kg Verwenden: Ein vergiftetes Getränk erkennen (SG 15) oder Alkohol
  identifizieren (SG 10) Herstellen: Gegengift

  Glasbläserwerkzeug (30 GM) Attribut: Intelligenz Gewicht: 2,5 kg Verwenden: Bestimmen, was ein Glasbehälter in den letzten
  24 Stunden enthalten hat (SG 15) Herstellen: Fernrohr, Glasflasche, Lupe, Phiole

  Holzschnitzwerkzeug (1 GM) Attribut: Geschicklichkeit Gewicht: 2,5 kg Verwenden: Muster in Holz schnitzen (SG 10) Herstellen:
  Fernkampfwaffen (außer Muskete, Pistole und Schleuder), Kampfstab, Knüppel, Zweihandknüppel, Arkaner Fokus, Blasrohrpfeile,
  Bolzen, Druidischer Fokus, Pfeile, Tintenfüller

  Juwelierwerkzeug (25 GM) Attribut: Intelligenz Gewicht: 1 kg Verwenden: Den Wert eines Edelsteins bestimmen (SG 15) Herstellen:
  Arkaner Fokus, Heiliges Symbol

  Kalligrafiewerkzeug (10 GM) Attribut: Geschicklichkeit Gewicht: 2,5 kg Verwenden: Ästhetischen und fälschungssicheren Text
  notieren (SG 15) Herstellen: Tinte, Zauberschriftrolle

  Kartografenwerkzeug (15 GM) Attribut: Weisheit Gewicht: 3 kg Verwenden: Die Karte eines kleinen Gebiets zeichnen (SG 15)
  Herstellen: Karte

  Kochutensilien (1 GM) Attribut: Weisheit Gewicht: 4 kg Verwenden: Geschmack von Nahrung verbessern (SG 10), verdorbene oder
  vergiftete Nahrung erkennen (SG 15) Herstellen: Rationen

  Ledererwerkzeug (5 GM) Attribut: Geschicklichkeit Gewicht: 2,5 kg Verwenden: Einem Ledergegenstand Verzierungen hinzufügen
  (SG 10) Herstellen: Peitsche, Schleuder, Fellrüstung, beschlagene Lederrüstung, Lederrüstung, Armbrustbolzen-Beutel, Beutel,
  Karten- oder Schriftrollenbehälter, Köcher, Pergament, Rucksack, Trinkschlauch

