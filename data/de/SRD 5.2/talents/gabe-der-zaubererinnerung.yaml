  Magische Gegenstände In jedem Abenteuer gibt es möglicherweise – nicht garantiert – magische Gegenstände zu finden. Unter
  „Magische Gegenstände“ weiter hinten in diesem Dokument werden Hunderte magische Gegenstände beschrieben. Im Folgenden erfährst
  du, was du über den Umgang mit magischen Gegenständen wissen musst.

  Einen magischen Gegenstand identifizieren

  Manche magischen Gegenstände sind nicht von ihren nichtmagischen Gegenstücken zu unterscheiden. Andere sind auf den ersten
  Blick als magisch zu erkennen. Wenn du einen magischen Gegenstand in die Hand nimmst, bemerkst du, dass er außergewöhnlich
  ist, jedoch erfährst du seine magischen Eigenschaften nicht automatisch. Der Zauber Identifizieren ist die schnellste Methode,
  die Eigenschaften eines Gegenstands zu enthüllen. Alternativ kannst du dich bei einer kurzen Rast auf einen magischen Gegenstand
  konzentrieren,

  während du physischen Kontakt mit ihm hast. Am Ende der Rast sind dir seine Eigenschaften und deren Verwendung (jedoch keine
  Flüche, die er möglicherweise trägt) bekannt. Manchmal trägt ein magischer Gegenstand Hinweise auf seine Eigenschaften.
  Das Befehlswort zum Aktivieren eines Rings könnte in seine Innenseite graviert sein, oder der Ring ist mit Federmustern
  geschmückt, um darauf hinzuweisen, dass es sich um einen Ring des Federfalls handelt. Auch das Tragen eines Gegenstands
  sowie das Experimentieren damit kann Hinweise auf seine Eigenschaften liefern. Tränke sind ein Sonderfall: Hier genügt eine
  kleine Geschmacksprobe, um die Wirkung eines Tranks zu erkennen. Mit anderen Gegenständen muss möglicherweise mehr experi-
  mentiert werden. Beispiel: Wenn dein Charakter einen Ring des Schwimmens anlegt, könnte der SL sagen: „Deine Bewegungen
  fühlen sich eigenartig flüssig an.“ Vielleicht springst du nun in einen Fluss, um zu erfahren, was geschieht. Der SL könnte
  dann anmerken, dass du unerwartet gut schwimmst.

  Höchstens drei Gegenstände

  Manche magischen Gegenstände erfordern, dass eine bestimmte Bindung an sie hergestellt wird, ehe ihre magischen Eigenschaften
  genutzt werden können: Dies ist die sogenannte Einstimmung. Ohne Einstimmung auf einen Gegenstand, der Ein- stimmung erfordert,
  sind nur dessen nichtmagische Vorzüge verfügbar, sofern in der Beschreibung nicht anders angegeben. Beispielsweise bietet
  ein magischer Schild, der Einstimmung erfordert, einer nicht eingestimmten Kreatur die Vorzüge eines normalen Schilds, jedoch
  keine seiner magischen Eigenschaften.

  Zum Nutzen seiner Eigenschaften muss ein magischer Gegenstand möglicherweise getragen oder geführt werden. Wenn er getragen
  werden muss, dann muss dies auf die vorgesehene Weise geschehen: Stiefel gehören an die Füße, Handschuhe an die Hände, Hüte
  und Helme auf den Kopf, Ringe an die Finger. Eine magische Rüstung muss angelegt, ein Schild an den Arm geschnallt, ein
  Umhang um die Schultern gelegt werden. Eine Waffe muss gehalten werden. Die meisten magischen Gegenstände, die getragen
  werden sollen, passen unabhängig von Größe und Körperbau zu jeder Kreatur. Magische Kleidungs- stücke können beispielsweise
  problemlos angepasst werden oder tun dies sogar auf magische Art selbst.

  Einstimmung

  Einstimmen während einer kurzen Rast

  Zum Einstimmen auf einen Gegenstand musst du eine kurze Rast mit dem Gegenstand verbringen und dich ausschließlich auf ihn
  konzentrieren, während du in physischem Kontakt mit ihm bist. Die kurze Rast kann nicht dieselbe sein wie die, in der du
  die Eigenschaften des Gegenstands erfahren hast. Die Konzentration auf den Gegenstand kann bei einer Waffe aus Training,
  bei einem Zauberstab aus Meditation oder aus einer sonstigen jeweils passenden Aktivität bestehen. Wenn die kurze Rast unterbrochen
  wird, misslingt die Einstimmung. Anderenfalls bist du am Ende der kurzen Rast auf den magischen Gegenstand eingestimmt und
  kannst auf all seine magischen Fähigkeiten zugreifen.

  Du kannst auf höchstens drei magische Gegen- stände zugleich eingestimmt sein. Jeder Versuch, sich auf einen vierten Gegenstand
  einzustimmen, misslingt: Du musst zuerst deine Einstimmung auf einen der drei Gegenstände beenden. Außerdem kannst du dich
  auf höchstens ein Exemplar eines Gegenstands einstimmen. Es ist dir beispielsweise nicht möglich, dich auf jeweils mehr
  als einen Ring des Schutzes einzustimmen.

  Einstimmung beenden

  Deine Einstimmung auf einen Gegenstand endet, wenn du die Voraussetzungen für die Einstimmung nicht mehr erfüllst, wenn
  der Gegenstand mindes- tens 24 Stunden lang weiter als 30 Meter von dir entfernt ist, wenn du stirbst oder wenn sich eine
  andere Kreatur auf den Gegenstand einstimmt. Sofern der Gegenstand nicht verflucht ist, kannst du die Einstimmung auch freiwillig
  beenden, indem du eine weitere kurze Rast damit verbringst, dich auf den Gegenstand zu konzentrieren.

  Gegenstände tragen und führen

  Mehrere gleichartige Gegenstände

  Von bestimmten magischen Gegenständen kannst du jeweils höchstens einen tragen. Normalerweise kannst du nur ein Paar Schuhe,
  ein Paar Handschuhe oder Panzerhandschuhe, ein Paar Armschienen, eine Rüstung, eine Kopfbedeckung und einen Umhang tragen.
  Der SL könnte Ausnahmen machen.

  Paarweise Gegenstände

  Paarweise Gegenstände wie Stiefel, Armschienen, Panzerhandschuhe und Handschuhe gewähren ihre Vorzüge nur dann, wenn beide
  Teile des Paars getragen werden. Wenn ein Charakter beispielsweise an einem Fuß einen Stiefel des Schreitens und Springens
  und am anderen einen Stiefel der Elfen trägt, erhält er von keinem einen Vorzug.

  Nichtmagische Gegenstände herstellen

  Zauberschriftrollen verfassen

  Zum Herstellen von nichtmagischen Gegenständen brauchst du Werkzeuge, Rohmaterial und Zeit wie jeweils unten beschrieben.
  Wenn du die Vorausset- zungen erfüllst, stellst du den Gegenstand her und kannst ihn verwenden oder zum normalen Preis verkaufen.

  Ein Zauberwirker kann einen Zauber auf eine Schriftrolle übertragen und so anhand der unten beschriebenen Regeln eine Zauberschriftrolle
  herstellen.

  Werkzeug

  Im Abschnitt „Werkzeug“ unter „Ausrüstung“ ist aufgeführt, welches Werkzeug zum Herstellen bestimmter Gegenstände erforderlich
  ist. Der SL legt fest, welches Werkzeug für nicht aufgeführte Gegenstände erforderlich sind. Du musst das erforderliche
  Werkzeug verwenden und Übung im Umgang damit haben, um den Gegen- stand herzustellen. Wer dir hilft, muss ebenfalls Übung
  damit haben.

  Rohmaterial

  Um einen Gegenstand herzustellen, brauchst du Rohmaterial im Wert seines halben Kaufpreises (abgerundet). Beispiel: Du brauchst
  Rohmaterial im Wert von 750 GM, um eine Ritterrüstung herzustellen, da sie einen Kaufpreis von 1.500 GM hat. Der SL bestimmt,
  ob passende Rohmaterialien verfügbar sind.

  Zeit

  Um zu bestimmen, wie viele Tage (bei einer täglichen Arbeitszeit von acht Stunden) das Herstellen eines Gegenstands dauert,
  teilst du seinen Kaufpreis in GM durch zehn (runde angebrochene Tage auf). Beispiel: Du brauchst fünf Tage, um eine schwere
  Armbrust herzustellen, da sie einen Kaufpreis von 50 GM hat. Wenn es mehrere Tage dauert, einen Gegenstand herzustellen,
  muss es sich nicht um aufeinander folgende Tage handeln. Charaktere können zusammenarbeiten, um die Herstellungszeit zu
  verkürzen. Teile die zum Herstellen erforderliche Zeit durch die Anzahl von Charakteren, die am Gegenstand arbeiten. Normalerweise
  kann dir nur jeweils ein anderer Charakter helfen, doch der SL gestattet möglicherweise mehr Helfer.

  Heiltränke brauen

  Ein Charakter, der Übung im Umgang mit der Kräuterkundeausrüstung hat, kann einen Heiltrank herstellen. Dazu braucht er
  die Ausrüstung, Rohmaterial im Wert von 25 GM und einen Tag (acht Stunden Arbeit).

  Zeit und Kosten

  Das Verfassen einer Zauberschriftrolle kostet Zeit und Geld je nach Grad des Zaubers, wie in der Tabelle „Kosten für Zauberschriftrollen“
  aufgeführt. Für jeden Tag, den das Verfassen dauert, musst du acht Stunden Arbeit verrichten. Wenn eine Schriftrolle mehrere
  Tage erfordert, müssen diese Tage nicht aufeinanderfolgen.

  Voraussetzungen für den Verfasser

  Zum Verfassen einer Zauberschriftrolle benötigst du entweder Übung in der Fertigkeit Arkane Kunde oder im Umgang mit Kalligrafiewerkzeug,
  und du musst den Zauber an jedem Tag des Verfassens vorbereitet haben. Außerdem musst du alle Materialkomponenten verfügbar
  haben, die für den Zauber erforderlich sind. Wenn der Zauber seine Materialkomponenten verbraucht, geschieht dies erst beim
  Fertigstellen der Schriftrolle. Der Zauber der Schriftrolle verwendet deinen Zauberrettungs- wurf-SG und deinen Zauberangriffsbonus.

  Zaubertricks

  Wenn es sich beim verfassten Zauber um einen Zaubertrick handelt, funktioniert die Version auf der Schriftrolle so, als
  hätte der Zauberwirker deine Stufe.

