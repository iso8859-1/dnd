id: klon
type: spell
template: spell
name: Klon
lang: de
level: 8
school: Nekromantiezauber
casting_time: 1 Stunde
range: Berührung
components: V, G, M (ein Diamant im Wert von mindestens 1.000 GM, den der Zauber verbraucht, und ein verschließbares Gefäß
  im Wert von mindestens 2.000 GM, das groß genug ist, um die zu klonende Kreatur aufzunehmen)
duration: Unmittelbar
description: Du berührst eine Kreatur oder mindestens 16 Kubik- zentimeter von ihrem Fleisch. Im Gefäß, das du für den Zauber
  verwendet hast, wächst ein regloses Duplikat der Kreatur. Es ist nach 120 Tagen ausge- wachsen. Du bestimmst, ob es so alt
  wie die Kreatur oder jünger ist. Der Klon bleibt reglos und beliebig lange erhalten, sofern das Gefäß nicht geöffnet wird.
  Stirbt die ursprüngliche Kreatur, wenn der Klon ausgewachsen ist, so wird ihre Seele auf den Klon übertragen, sofern sie
  frei und bereitwillig ist. Der Klon ist körperlich mit dem Original identisch und besitzt dessen Persönlichkeit, seine Erinnerungen
  und Fähigkeiten, jedoch nicht seine Ausrüstung. Überreste der ursprünglichen Kreatur werden gegebenenfalls reglos und können
  nicht wiederbelebt werden, da sich die Seele der Kreatur anderswo befindet.
source_book: SRD 5.2 DE
