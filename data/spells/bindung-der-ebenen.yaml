id: bindung-der-ebenen
type: spell
template: spell
name: Bindung der Ebenen
lang: de
level: 5
school: Bannzauber
casting_time: 1 Stunde
range: 18 Meter
components: V, G, M (ein Juwel im Wert von mindestens 1.000 GM, das der Zauber verbraucht)
duration: 24 Stunden
description: 'Du versuchst, ein celestisches Wesen, einen Elementar, ein Feenwesen oder einen Unhold in deinen Dienst zu verpflichten.
  Die Kreatur muss sich für die gesamte Wirkungsdauer in Reichweite Schutzkreis befinden. (Normalerweise wird die Kreatur
  zuerst in einen umgekehrten  beschworen, wo sie gefangen bleibt, während du den Zauber wirkst.) Nach Wirken des Zaubers
  muss das Ziel einen Charismarettungswurf bestehen, oder es muss dir für die Wirkungsdauer dienen. Wenn die Kreatur durch
  einen anderen Zauber beschworen oder erschaffen wurde, verlängert sich dessen Wirkungsdauer auf die Wirkungsdauer von Bindung
  der Ebenen. Eine verpflichtete Kreatur muss deine Befehle nach besten Kräften befolgen. Du kannst der Kreatur befehlen,
  dich auf ein Abenteuer zu begleiten, einen Ort zu bewachen oder eine Botschaft zu übermitteln. Ist sie dir jedoch feindlich
  gesinnt, so versucht sie, deine Worte zu verdrehen, um ihre eigenen Ziele zu verfolgen. Wenn die Kreatur deine Anweisungen
  vollständig ausgeführt hat, bevor der Zauber endet, kehrt sie zu dir zurück und meldet Vollzug, sofern du dich auf derselben
  Existenzebene befindest. Falls nicht, kehrt sie an den Ort zurück, an dem du sie verpflichtet hast, und verbleibt dort,
  bis Verwenden von Zauberplätzen höheren Grades: der Zauber endet. Die Wirkungsdauer wird erhöht: bei einem Zauberplatzgrad
  von 6 auf zehn Tage, bei einem Zauberplatzgrad von 7 auf 30 Tage, bei einem Zauberplatzgrad von 8 auf 180 Tage, bei einem
  Zauberplatzgrad von 9 auf 366 Tage.'
source_book: SRD 5.2 DE
