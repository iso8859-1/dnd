description: 'Du erzeugst an einem Punkt in Reichweite eine Säureblase, die in einer Kugel mit einem Radius von 1,5 Metern
  explodiert. Jede Kreatur in der Kugel muss einen Geschicklichkeitsrettungswurf Zaubertrick-Aufwertung: bestehen, oder sie
  erleidet 1W6 Säureschaden. Der Schaden wird um jeweils 1W6 erhöht, wenn du die 5. (2W6), die 11. (3W6) und die 17. (4W6)
  Stufe erreichst.'
source_book: SRD 5.2 DE
