id: schwebende-scheibe
type: spell
template: spell
name: Schwebende Scheibe
lang: de
level: 1
school: Beschwörungszauber
casting_time: Aktion oder Ritual
range: 9 Meter
components: V, G, M (ein Tropfen Quecksilber)
duration: 1 Stunde
description: Dieser Zauber erschafft eine waagerechte runde Fläche aus Energie mit einem Durchmesser von 90 Zentimetern und
  einer Dicke von 2,5 Zentimetern. Sie schwebt in einem freien Bereich deiner Wahl in Reichweite, den du sehen kannst, 90
  Zentimeter über dem Boden. Die Scheibe bleibt für die Wirkungsdauer bestehen und kann bis zu 250 Kilogramm tragen. Wenn
  sie mit mehr Gewicht belastet wird, endet der Zauber, und alles auf der Scheibe fällt zu Boden. Die Scheibe ist unbeweglich,
  solange du dich im Abstand von bis zu sechs Metern von ihr befindest. Entfernst du dich mehr als sechs Meter von ihr, so
  folgt dir die Scheibe, sodass sie im Abstand von bis zu sechs Metern von dir bleibt. Sie kann sich über unebenes Gelände,
  Treppen, Abhänge und dergleichen bewegen, jedoch keinen Höhenunterschied von mindestens drei Metern überwinden. Beispielsweise
  kann die Scheibe nicht über eine drei Meter tiefe Grube hinwegschweben oder eine solche Grube verlassen, falls sie darin
  erschaffen wurde. Wenn du dich um mehr als 30 Meter von der Scheibe entfernst (meist, weil sie sich nicht um ein Hindernis
  bewegen kann, um dir zu folgen), endet der Zauber.
source_book: SRD 5.2 DE
