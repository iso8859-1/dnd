id: schutzkreis
type: spell
template: spell
name: Schutzkreis
lang: de
level: 3
school: Bannzauber
casting_time: 1 Minute
range: 3 Meter
components: V, G, M (Salz und Silberpulver im Wert von mindestens 100 GM, das der Zauber verbraucht)
duration: 1 Stunde
description: 'Du erschaffst einen sechs Meter hohen Zylinder aus magischer Energie mit einem Radius von drei Metern um einen
  Punkt auf dem Boden in Reichweite, den du sehen kannst. Wo der Zylinder den Boden oder eine andere Oberfläche schneidet,
  erscheinen leuchtende Runen. Wähle mindestens einen der folgenden Kreaturen- typen aus: celestische Wesen, Elementare, Feenwesen,
  Unholde oder Untote. Der Kreis beeinflusst eine Kreatur des ausgewählten Typs wie folgt: • Die Kreatur kann den Zylinder
  nicht freiwillig auf nichtmagische Weise betreten. Versucht die Kreatur, Teleportation oder Ebenenreisen zu verwenden, so
  muss sie zuerst einen Charismarettungswurf bestehen. • Die Kreatur ist bei Angriffswürfen gegen Ziele innerhalb des Zylinders
  im Nachteil. • Ziele innerhalb des Zylinders können von der Kreatur nicht besessen, bezaubert oder verängstigt werden. Jedes
  Mal, wenn du diesen Zauber wirkst, kannst du seine Wirkung umkehren, sodass Kreaturen des ausgewählten Typs den Zylinder
  nicht verlassen können und Ziele außerhalb des Zylinders Verwenden von Zauberplätzen höheren Grades: geschützt sind. Für
  jeden Zauberplatzgrad über dem 3. wird die Wirkungsdauer um eine Stunde erhöht.'
source_book: SRD 5.2 DE
