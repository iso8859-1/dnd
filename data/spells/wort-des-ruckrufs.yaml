id: wort-des-ruckrufs
type: spell
template: spell
name: Wort des Rückrufs
lang: de
level: 6
school: Beschwörungszauber
casting_time: Aktion
range: 1,5 Meter
components: V
duration: Unmittelbar
description: Dieser Zauber teleportiert dich und bis zu fünf bereitwillige Kreaturen im Abstand von bis zu 1,5 Metern von
  dir sofort zu einer zuvor festgelegten Zuflucht. Du und alle Kreaturen, die mit dir teleportiert werden, erscheint in einem
  freien Bereich, der dem von dir als Zuflucht bestimmten Ort am nächsten liegt (siehe unten). Wenn du diesen Zauber wirkst,
  ohne eine Zuflucht festgelegt zu haben, hat er keinen Effekt. Du musst einen Ort, beispielsweise einen Tempel, als Zuflucht
  benennen, um diesen Zauber dort zu wirken.
source_book: SRD 5.2 DE
