id: verwandlung
type: spell
template: spell
name: Verwandlung
lang: de
level: 4
school: Verwandlungszauber
casting_time: Aktion
range: 18 Meter
components: V, G, M (Kokon einer Raupe)
duration: Konzentration, bis zu 1 Stunde
description: Du versuchst, eine Kreatur in Reichweite, die du sehen kannst, in ein Tier zu verwandeln. Das Ziel muss einen
  Weisheitsrettungswurf bestehen, oder es nimmt für die Wirkungsdauer eine Tiergestalt an. Dabei kann es sich um ein beliebiges
  Tier deiner Wahl handeln, dessen Herausforderungsgrad nicht höher als der des Ziels ist (wenn das Ziel keinen Herausforderungsgrad
  hat, verwende seine Stufe). Die Spielwerte des Ziels werden vom Wertekasten des Tieres ersetzt. Das Ziel behält jedoch Gesinnung,
  Persönlichkeit, Kreaturentyp, Trefferpunkte sowie Trefferpunktewürfel bei. Beispiele für Wertekästen von Tieren findest
  du im Abschnitt „Tiere“ unter „Monster“. Das Ziel erhält eine Anzahl von temporären Trefferpunkten, die der Anzahl von Trefferpunkten
  der Tiergestalt entspricht. Nach der Wirkungsdauer dieses Zaubers verbleibende temporäre Treffer- punkte gehen verloren.
  Der Zauber endet beim Ziel vorzeitig, wenn es keine temporären Trefferpunkte übrig hat. Das Ziel kann nur Aktionen ausführen,
  die in seiner neuen Gestalt anatomisch möglich sind. Es kann weder sprechen noch Zauber wirken. Die Ausrüstung des Ziels
  verschmilzt mit seiner neuen Gestalt. Die Kreatur kann die Ausrüstung nicht verwenden oder anderweitig nutzen.
source_book: SRD 5.2 DE
