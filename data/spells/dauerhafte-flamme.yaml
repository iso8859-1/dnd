id: dauerhafte-flamme
type: spell
template: spell
name: Dauerhafte Flamme
lang: de
level: 2
school: Hervorrufungszauber
casting_time: Aktion
range: Berührung
components: V, G, M (Rubinstaub im Wert von mindestens 50 GM, den der Zauber verbraucht)
duration: Bis der Zauber gebannt wird
description: Eine Flamme bricht aus einem Gegenstand hervor, den du berührst. Der Effekt spendet in einem Radius von sechs
  Metern helles Licht und in einem Radius von weiteren sechs Metern dämmriges Licht. Er wirkt wie eine normale Flamme, erzeugt
  jedoch keine Wärme und verbraucht keinen Brennstoff. Die Flamme kann verdeckt oder verborgen, aber nicht erstickt oder gelöscht
  werden.
source_book: SRD 5.2 DE
