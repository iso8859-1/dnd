id: mit-tieren-sprechen
type: spell
template: spell
name: Mit Tieren sprechen
lang: de
level: 1
school: Erkenntniszauber
casting_time: Aktion oder Ritual
range: Selbst
components: V, G
duration: 10 Minuten
description: Für die Wirkungsdauer kannst du Tiere verstehen und verbal mit ihnen kommunizieren, und du kannst beliebige Fertigkeitsoptionen
  der Beeinflussen- Aktion auf sie anwenden. Die meisten Tiere haben zu Themen abseits von Überleben oder Gefährtenschaft
  nicht viel zu sagen. Sie sind jedoch zumindest in der Lage, Informationen über nahe Orte und Monster sowie über Ereignisse
  mitzuteilen, die sie innerhalb des letzten Tages erlebt haben.
source_book: SRD 5.2 DE
