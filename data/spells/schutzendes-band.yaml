id: schutzendes-band
type: spell
template: spell
name: Schützendes Band
lang: de
level: 2
school: Bannzauber
casting_time: Aktion
range: Berührung
components: V, G, M (ein Paar Platinringe im Wert von jeweils mindestens 50 GM, die du und das Ziel für die Wirkungsdauer
  tragen müsst)
duration: 1 Stunde
description: Du berührst eine bereitwillige Kreatur und erzeugst eine mystische Verbindung zwischen euch, die bestehen bleibt,
  bis der Zauber endet. Solange sich das Ziel im Abstand von bis zu 18 Metern von dir befindet, erhält es einen Bonus von
  +1 auf seine RK sowie auf Rettungswürfe und ist gegen alle Schadensarten resistent. Allerdings erleidest du jedes Mal, wenn
  dem Ziel Schaden zugefügt wird, die gleiche Menge Schaden. Der Zauber endet, falls deine Trefferpunkte auf 0 sinken oder
  ihr euch weiter als 18 Meter voneinander entfernt. Der Zauber endet auch, wenn er auf einen der beiden Beteiligten erneut
  gewirkt wird.
source_book: SRD 5.2 DE
