id: federfall
type: spell
template: spell
name: Federfall
lang: de
level: 1
school: Verwandlungszauber
casting_time: Reaktion, die du ausführst, wenn du oder eine Kreatur im Abstand von bis zu 18 Metern von dir, die du sehen
  kannst, stürzt
range: 18 Meter
components: V, M (eine kleine Feder oder Daune)
duration: 1 Minute
description: Wähle bis zu fünf Kreaturen in Reichweite aus, die gerade stürzen. Ihre Fallgeschwindigkeit verlangsamt sich
  für die Wirkungsdauer auf 18 Meter pro Runde. Wenn eine Kreatur während der Wirkungsdauer landet, erleidet sie keinen Schaden
  durch den Sturz, und der Zauber endet bei dieser Kreatur.
source_book: SRD 5.2 DE
