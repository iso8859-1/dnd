id: herrliches-herrenhaus
type: spell
template: spell
name: Herrliches Herrenhaus
lang: de
level: 7
school: Beschwörungszauber
casting_time: 1 Minute
range: 90 Meter
components: V, G, M (eine MiniaturTür im Wert von mindestens 15 GM)
duration: 24 Stunden
description: Du beschwörst in Reichweite eine schimmernde Tür, die für die Wirkungsdauer bestehen bleibt. Sie ist 1,5 Meter
  breit und drei Meter hoch, und sie führt zu einem extradimensionalen Anwesen. Du und jede Kreatur, die du beim Wirken des
  Zaubers bestimmst, könnt das extradimensionale Anwesen betreten, solange die Tür geöffnet ist. Du kannst sie öffnen oder
  schließen (keine Aktion erforderlich), wenn du dich im Abstand von bis zu neun Metern davon befindest. Ist die Tür geschlossen,
  so ist sie nicht wahrnehmbar. Hinter der Tür liegt eine herrliche Eingangshalle mit zahlreichen Zimmern. Die Atmosphäre
  des Anwesens ist sauber, frisch und warm. Du kannst einen beliebigen Grundriss erstellen, der allerdings 50 zusammenhängende
  Würfel mit je drei Metern Kantenlänge nicht überschreiten kann. Das Anwesen ist nach deinen Wünschen eingerichtet und dekoriert.
  Es gibt ausreichend Nahrung, um bis zu 100 Personen ein Festmahl mit neun Gängen zu servieren. Möbel und andere Gegenstände,
  die durch diesen Zauber erschaffen wurden, lösen sich in Rauch auf, wenn sie aus dem Anwesen entfernt werden. 100 nahezu
  durchsichtige Diener nehmen sich der Wünsche aller Gäste an. Du bestimmst, wie die Diener aussehen und welche Kleidung sie
  tragen. Sie sind unverwundbar und gehorchen deinen Befehlen. Dabei können sie Aufgaben ausführen, die auch Menschen ausführen
  könnten. Sie können jedoch nicht angreifen oder Aktionen ausführen, die anderen Kreaturen direkten Schaden zufügen würden.
  Die Diener können Gegenstände holen und reinigen, Kleidung zusammenlegen, Feuer entfachen, Essen servieren, Wein einschenken
  und dergleichen. Sie können das Anwesen jedoch nicht verlassen. Wenn der Zauber endet, werden alle Kreaturen und Gegenstände
  aus dem extradimensionalen Bereich in die freien Bereiche ausgestoßen, die dem Eingang am nächsten liegen.
source_book: SRD 5.2 DE
