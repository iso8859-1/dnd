id: mit-stein-verschmelzen
type: spell
template: spell
name: Mit Stein verschmelzen
lang: de
level: 3
school: Verwandlungszauber
casting_time: Aktion oder Ritual
range: Berührung
components: V, G
duration: 8 Stunden
description: Du betrittst einen steinernen Gegenstand oder eine Oberfläche von ausreichender Größe, um deinen Körper aufzunehmen,
  und verschmilzt für die Wirkungsdauer mitsamt deiner Ausrüstung mit dem Stein. Dazu musst du den Stein berühren. Deine Anwesenheit
  ist nicht erkennbar und kann nur auf magische Weise wahrgenommen werden. Während du mit dem Stein verschmolzen bist, kannst
  du nicht sehen, was außerhalb vor sich geht. Du bist zudem bei Weisheitswürfen (Wahrnehmung), um Geräusche von außen zu
  hören, im Nachteil. Du bemerkst, wie die Zeit vergeht, und kannst Zauber auf dich selbst wirken. Zudem kannst du 1,5 Meter
  deiner Bewegungsrate verwenden, um den Stein dort zu verlassen, wo du ihn betreten hast. Dadurch endet der Zauber. Ansonsten
  kannst du dich nicht bewegen. Geringer physischer Schaden am Stein verletzt dich nicht. Wenn er teilweise zerstört oder
  seine Form verändert wird, sodass du nicht mehr hineinpasst, wirst du ausgestoßen und erleidest 6W6 Energieschaden. Wird
  der Stein vollständig zerstört oder in eine andere Substanz verwandelt, so wirst du ausgestoßen und erleidest 50 Energieschaden.
  Wenn du ausgestoßen wirst, gelangst du in den freien Bereich, der deinem Eintrittspunkt am nächsten liegt, und hast den
  Zustand Liegend.
source_book: SRD 5.2 DE
