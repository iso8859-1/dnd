id: wasserwandeln
type: spell
template: spell
name: Wasserwandeln
lang: de
level: 3
school: Verwandlungszauber
casting_time: Aktion oder Ritual
range: 9 Meter
components: V, G, M (ein Stück Kork)
duration: 1 Stunde
description: Dieser Zauber verleiht die Fähigkeit, sich über flüssige Oberflächen zu bewegen, darunter Wasser, Säure, Schlamm,
  Schnee, Treibsand oder Lava, als handele es sich um ungefährlichen, festen Boden (Kreaturen, die sich über geschmolzene
  Lava bewegen, können jedoch trotzdem Hitzeschaden erleiden). Bis zu zehn bereitwillige Kreaturen deiner Wahl in Reichweite
  erhalten für die Wirkungsdauer diese Fähigkeit. Ein betroffenes Ziel muss eine Bonusaktion ausführen, um von der Oberfläche
  der Flüssigkeit in die Flüssigkeit zu gelangen und umgekehrt. Wenn das Ziel jedoch in den Bereich fällt, gelangt es automatisch
  durch die Oberfläche in die Flüssigkeit darunter.
source_book: SRD 5.2 DE
