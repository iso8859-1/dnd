id: trugbild-projizieren
type: spell
template: spell
name: Trugbild projizieren
lang: de
level: 7
school: Illusionszauber
casting_time: Aktion
range: 800 km
components: V, G, M (eine Statuette von dir im Wert von mindestens 5 GM)
duration: Konzentration, bis zu 1 Tag
description: Du erschaffst ein illusionäres Abbild von dir selbst, das für die Wirkungsdauer bestehen bleibt. Das Abbild kann
  unabhängig von Hindernissen an einem beliebigen Ort in Reichweite erscheinen, den du schon einmal gesehen hast. Die Illusion
  sieht aus und klingt wie du, ist aber immateriell. Erleidet die Illusion Schaden, so verschwindet sie, und der Zauber endet.
  Du kannst durch ihre Augen sehen und durch ihre Ohren hören, als befändest du dich in ihrem Bereich. Als magische Aktion
  kannst du die Illusion bis zu 18 Meter weit bewegen und sie gestikulieren, sprechen und auf eine beliebige Art handeln lassen.
  Sie ahmt dein Verhalten perfekt nach. Physische Interaktionen mit dem Abbild enttarnen es als illusionär, da Dinge es einfach
  durchdringen können. Eine Kreatur, die das Abbild mit der Studieren-Aktion untersucht, kann mit einem erfolgreichen Intelligenzwurf
  (Nachforschungen) gegen deinen Zauberrettungswurf-SG erkennen, dass es sich um eine Illusion handelt. Erkennt eine Kreatur
  die Illusion als solche, so wird das Abbild für sie durchscheinend, und sämtliche Geräusche klingen für sie hohl.
source_book: SRD 5.2 DE
