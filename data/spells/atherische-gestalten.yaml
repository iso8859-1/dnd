id: atherische-gestalten
type: spell
template: spell
name: Ätherische Gestalten
lang: de
level: 7
school: Beschwörungszauber
casting_time: Aktion
range: Selbst
components: V, G
duration: Bis zu 8 Stunden
description: 'Du betrittst den Grenzbereich der Ätherebene, an dem sie sich mit deiner aktuellen Ebene über- schneidet. Für
  die Wirkungsdauer bleibst du in der Äthergrenze. Währenddessen kannst du dich in eine beliebige Richtung bewegen. Wenn du
  dich nach oben oder unten bewegst, kostet dich jeder Meter Bewegung zwei Meter deiner Bewegungsrate. Du kannst die Ebene,
  die du verlassen hast, in Graustufen wahrnehmen. Deine Sichtweite beträgt dabei 18 Meter. Während du dich auf der Ätherebene
  befindest, kannst du nur Kreaturen, Gegenstände und Effekte beeinflussen oder von ihnen beeinflusst werden, die sich ebenfalls
  dort befinden. Kreaturen, die sich nicht auf der Ätherebene befinden, können dich weder wahrnehmen noch mit dir interagieren,
  es sei denn, ein Merkmal erlaubt es ihnen. Wenn der Zauber endet, kehrst du auf die Ebene zurück, die du verlassen hast
  und erscheinst in dem Bereich, der deinem Bereich in der Äthergrenze entspricht. Erscheinst du in einem besetzten Bereich,
  so wirst du in den nächstliegenden freien Bereich geschoben und erleidest Energieschaden in sechsfacher Höhe der Anzahl
  an Metern, die du bewegt wurdest. Dieser Zauber endet sofort, wenn du dich beim Wirken bereits auf der Ätherebene oder einer
  Ebene befindest, die nicht an sie angrenzt (beispielsweise Verwenden von Zauberplätzen höheren Grades: auf den Äußeren Ebenen).
  Für jeden Zauberplatzgrad über dem 7. kannst du auf bis zu drei bereitwillige Kreaturen (dich eingeschlossen) zielen. Die
  Kreaturen müssen sich im Abstand von bis zu drei Metern von dir befinden, wenn du diesen Zauber wirkst.'
source_book: SRD 5.2 DE
