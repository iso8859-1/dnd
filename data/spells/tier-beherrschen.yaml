id: tier-beherrschen
type: spell
template: spell
name: Tier beherrschen
lang: de
level: 4
school: Verzauberungszauber
casting_time: Aktion
range: 18 Meter
components: V, G
duration: Konzentration, bis zu 1 Minute
description: 'Ein Tier in Reichweite, das du sehen kannst, muss einen Weisheitsrettungswurf bestehen, oder es ist für die
  Wirkungsdauer bezaubert. Wenn du oder deine Verbündeten gegen das Ziel kämpfen, ist es beim Rettungswurf im Vorteil. Wann
  immer das Ziel Schaden erleidet, wiederholt es den Rettungswurf. Bei einem Erfolg endet der Zauber bei ihm. Du verfügst
  über eine telepathische Verbindung mit dem bezauberten Ziel, solange ihr euch auf derselben Existenzebene befindet. Diese
  Verbindung kannst du in deinem Zug nutzen, um dem Ziel Befehle zu erteilen (keine Aktion erforderlich), beispielsweise „Greife
  diese Kreatur an“, „Laufe dorthin“ oder „Hole diesen Gegenstand“. Das Ziel gehorcht in seinem Zug, so gut es kann. Wenn
  es den Befehl ausgeführt hat und keine weiteren Anweisungen von dir erhält, verhält es sich nach seinen Wünschen und versucht
  vor allem, sich zu schützen. Du kannst dem Ziel befehlen, eine Reaktion auszuführen, musst dazu allerdings selbst eine Verwenden
  von Zauberplätzen höheren Grades: Reaktion ausführen. Deine Konzentration kann länger andauern: bei einem Zauberplatz des
  5. Grades bis zu zehn Minuten, bei einem Zauberplatz des 6. Grades bis zu einer Stunde und bei einem Zauberplatz ab dem
  7. Grad bis zu acht Stunden.'
source_book: SRD 5.2 DE
