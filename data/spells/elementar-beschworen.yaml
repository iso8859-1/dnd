id: elementar-beschworen
type: spell
template: spell
name: Elementar beschwören
lang: de
level: 5
school: Beschwörungszauber
casting_time: Aktion
range: 18 Meter
components: V, G
duration: Konzentration, bis zu 10 Minuten
description: 'Du beschwörst einen großen immateriellen Geist von den Elementarebenen, der in einem freien Bereich in Reichweite
  erscheint. Wähle das Element des Geistes aus, durch das seine Schadensart bestimmt wird: Erde (Schall), Feuer (Feuer), Luft
  (Blitz) oder Wasser (Kälte). Der Geist bleibt für die Wirkungsdauer bestehen. Wann immer eine Kreatur, die du sehen kannst,
  den Bereich des Geistes betritt oder ihren Zug im Abstand von bis zu 1,5 Metern vom Geist beginnt, kannst du die Kreatur
  zu einem Geschicklichkeitsrettungswurf zwingen, sofern der Geist keine Kreatur festgesetzt hat. Misslingt der Wurf, so erleidet
  das Ziel 8W8 Schaden je nach Art des Geists und ist festgesetzt, bis der Zauber endet. Das festgesetzte Ziel wiederholt
  den Rettungswurf zu Beginn jedes seiner Züge. Misslingt der Wurf, so erleidet das Ziel 4W8 Schaden je nach Art des Geists.
  Bei einem erfolgreichen Rettungswurf ist das Ziel nicht mehr vom Geist Verwenden von Zauberplätzen höheren Grades: festgesetzt.
  Für jeden Zauberplatzgrad über dem 5. wird der Schaden um 1W8 erhöht.'
source_book: SRD 5.2 DE
