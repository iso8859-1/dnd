id: einfache-illusion
type: spell
template: spell
name: Einfache Illusion
lang: de
level: 0
school: Illusion
casting_time: Aktion
range: 9 Meter
components: G, M (ein Stück Vlies)
duration: 1 Minute
description: 'Du erschaffst für die Wirkungsdauer ein Geräusch oder das Abbild eines Gegenstands in Reichweite. Die jeweiligen
  Effekte sind unten beschrieben. Die Illusion endet, wenn du diesen Zauber erneut wirkst. Eine Kreatur, die das Geräusch
  oder Abbild mit der Studieren-Aktion untersucht, kann die Illusion mit einem erfolgreichen Intelligenzwurf (Nachfor- schungen)
  gegen deinen Zauberrettungswurf-SG als solche erkennen. In diesem Fall wird die Illusion Geräusch: für sie weniger deutlich
  wahrnehmbar. Die Lautstärke des Geräuschs kann so leise wie ein Flüstern oder so laut wie ein Schrei sein. Dies kann deine
  Stimme oder die einer anderen Person sein, aber auch Löwengebrüll, Trommeln oder ein anderes beliebiges Geräusch. Für die
  Wirkungsdauer kannst du einen durchgehenden Laut oder unterschiedliche kurze Laute erzeugen. Bild: Das Abbild eines Gegenstands
  - beispiels- weise ein Stuhl, schlammige Fußabdrücke oder eine Truhe - darf nicht größer als ein Würfel mit 1,5 Metern Kantenlänge
  sein. Es kann weder Geräu- sche noch Gerüche, Licht oder andere sensorische Effekte erzeugen. Physische Interaktionen mit
  dem Abbild enttarnen es als Illusion, da Dinge es einfach durchdringen können.'
source_book: SRD 5.2 DE
