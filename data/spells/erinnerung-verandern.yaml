id: erinnerung-verandern
type: spell
template: spell
name: Erinnerung verändern
lang: de
level: 5
school: Verzauberungszauber
casting_time: Aktion
range: 9 Meter
components: V, G
duration: Konzentration, bis zu 1 Minute
description: 'Du versuchst, die Erinnerungen einer anderen Kreatur umzuformen. Eine Kreatur in Reichweite, die du sehen kannst,
  führt einen Weisheitsrettungswurf aus. Wenn du gegen die Kreatur kämpfst, ist sie bei ihrem Rettungswurf im Vorteil. Misslingt
  der Wurf, so ist das Ziel für die Wirkungsdauer bezaubert. Ein auf diese Art bezaubertes Ziel ist außerdem kampfunfähig
  und sich seiner Umgebung nicht bewusst, es kann dich jedoch hören. Erleidet es Schaden oder wird es von einem anderen Zauber
  betroffen, so endet dieser Zauber, und die Erinnerungen bleiben unverändert. Während diese Bezauberung anhält, kannst du
  die Erinnerungen des Ziels an ein Ereignis der letzten 24 Stunden verändern, das maximal zehn Minuten gedauert hat. Du kannst
  sämtliche Erinnerungen an das Ereignis dauerhaft entfernen, dem Ziel ermöglichen, sich mit absoluter Klarheit an das Ereignis
  zu erinnern, seine Erinnerungen an die Details des Ereignisses verändern oder eine andere Erinnerung erschaffen. Du musst
  mit dem Ziel sprechen und beschreiben, wie seine Erinnerungen beeinflusst werden. Das Ziel muss deine Sprache sprechen,
  damit die veränderten Erinnerungen Fuß fassen können. Sein Verstand füllt etwaige Lücken in den von dir beschriebenen Details.
  Endet der Zauber, bevor du die veränderten Erinnerungen beschrieben hast, so werden die Erinnerungen der Kreatur nicht modifiziert.
  Anderenfalls setzen sich die neuen Erinnerungen fest, wenn der Zauber endet. Veränderte Erinnerungen beeinflussen nicht
  notwendigerweise das Verhalten der Kreatur - insbesondere dann nicht, wenn sie mit den natürlichen Neigungen, der Gesinnung
  oder dem Glauben der Kreatur im Widerspruch stehen. Eine unlogische veränderte Erinnerung, beispielsweise daran, wie gerne
  die Kreatur in Säure gebadet hat, wird als Albtraum abgetan. Der SL kann eine veränderte Erinnerung als zu unsinnig erklären,
  Fluch brechenVollständige um die Kreatur signifikant zu beeinflussen. Genesung Die Zauber  oder stellen die wahren Erinnerungen
  der Verwenden von Zauberplätzen höheren Grades: Kreatur wieder her. Du kannst die Erinnerung des Ziels an ein Ereignis verändern,
  das in den vergangenen sieben Tagen (6. Zauberplatzgrad), in den vergangenen 30 Tagen (7. Zauberplatzgrad), den vergangenen
  365 Tagen (8. Zauberplatzgrad) oder zu einem beliebigen Zeitpunkt in der Vergangenheit der Kreatur (9. Zauberplatzgrad)
  stattgefunden hat.'
source_book: SRD 5.2 DE
