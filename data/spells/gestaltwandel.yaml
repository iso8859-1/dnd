id: gestaltwandel
type: spell
template: spell
name: Gestaltwandel
lang: de
level: 9
school: Verwandlungszauber
casting_time: Aktion
range: Selbst
components: V, G, M (ein Jadediadem im Wert von mindestens 1.500 GM)
duration: Konzentration, bis zu 1 Stunde
description: 'Du nimmst die Gestalt einer anderen Kreatur an, bis der Zauber endet oder du eine magische Aktion ausführst,
  um eine andere mögliche Gestalt anzu- nehmen. Bei der neuen Gestalt muss es sich um eine Kreatur handeln, deren Herausforderungsgrad
  höchstens deiner Stufe oder deinem Herausfor- derungsgrad entspricht. Du musst diese Art von Kreatur mindestens einmal gesehen
  haben, und es darf sich weder um ein Konstrukt noch um einen Untoten handeln. Wenn du den Zauber wirkst, erhältst du eine
  Anzahl von temporären Trefferpunkten, die der Anzahl von Trefferpunkten der ersten Gestalt entspricht, die du annimmst.
  Nach der Wirkungsdauer dieses Zaubers verbleibende temporäre Trefferpunkte gehen verloren. Deine Spielwerte werden durch
  den Wertekasten der ausgewählten Gestalt ersetzt. Du behältst jedoch Folgendes bei: Kreaturentyp, Gesinnung, Persönlichkeit,
  Werte für Intelligenz, Weisheit und Charisma, Trefferpunkte, Trefferpunktewürfel, Übungen sowie die Fähigkeit zu kommunizieren.
  Auch das Merkmal Zauberwirken behältst du bei, sofern du darüber verfügst. Bei der Verwandlung entscheidest du, ob deine
  Ausrüstung zu Boden fällt oder ihre Form und Größe ändert, sodass sie zu deiner neuen Gestalt passt, solange du diese beibehältst.'
source_book: SRD 5.2 DE
