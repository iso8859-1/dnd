id: seiltrick
type: spell
template: spell
name: Seiltrick
lang: de
level: 2
school: Verwandlungszauber
casting_time: Aktion
range: Berührung
components: V, G, M (ein Stück Seil)
duration: 1 Stunde
description: Du berührst ein Seil. Ein Seilende erhebt sich in die Luft, bis das gesamte Seil senkrecht zum Boden in der Luft
  hängt oder das Seilende eine Decke erreicht. Am oberen Ende des Seils öffnet sich ein unsichtbares Portal zu einem extradimensionalen
  Raum. Das Portal ist einen Meter mal 1,5 Meter groß und bleibt für die Wirkungsdauer bestehen. Der Raum kann über das Seil
  erreicht werden, das in den Raum hineingezogen werden oder heraushängen kann. Der Raum fasst bis zu acht Kreaturen von höchstens
  mittelgroßer Größe. Angriffe, Zauber und andere Effekte können den extradimensionalen Raum weder von innen noch von außen
  durchdringen. Kreaturen im Raum können jedoch durch das Portal nach draußen blicken. Alles, was im Raum enthalten ist, fällt
  heraus, wenn der Zauber endet.
source_book: SRD 5.2 DE
