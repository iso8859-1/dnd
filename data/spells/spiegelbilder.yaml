id: spiegelbilder
type: spell
template: spell
name: Spiegelbilder
lang: de
level: 2
school: Illusionszauber
casting_time: Aktion
range: Selbst
components: V, G
duration: 1 Minute
description: In deinem Bereich erscheinen drei illusionäre Duplikate deiner selbst. Für die Wirkungsdauer bewegen sich die
  Duplikate mit dir und imitieren deine Aktionen sowie deine Position, sodass die reale Version unmöglich zu erkennen ist.
  Wann immer dich eine Kreatur während der Wirkungsdauer des Zaubers mit einem Angriffswurf trifft, würfle für jedes verbleibende
  Duplikat mit einem 1W6. Würfelst du jeweils mindestens eine 3, wird statt dir das entsprechende Duplikat getroffen und dabei
  zerstört. Die Duplikate ignorieren alle anderen Schadensquellen und Effekte. Wenn alle drei Duplikate zerstört wurden, endet
  der Zauber. Eine Kreatur ist von diesem Zauber nicht betroffen, wenn sie den Zustand Blind hat oder aber über Blindsicht
  oder Wahrer Blick verfügt.
source_book: SRD 5.2 DE
