id: huter-des-glaubens
type: spell
template: spell
name: Hüter des Glaubens
lang: de
level: 4
school: Beschwörungszauber
casting_time: Aktion
range: 9 Meter
components: V
duration: 8 Stunden
description: In einem freien Bereich in Reichweite, den du sehen kannst, erscheint ein großer geisterhafter Wächter und schwebt
  dort für die Wirkungsdauer. Der Wächter besetzt diesen Bereich und ist unver- wundbar. Er erscheint in einer Gestalt, die
  deiner Gottheit oder deinem Pantheon entspricht. Ein Gegner, der sich in einem Zug erstmals in einen Bereich im Abstand
  von bis zu drei Metern vom Wächter bewegt oder den Zug dort beginnt, führt einen Geschicklichkeitsrettungswurf aus. Misslingt
  der Wurf, so erleidet er 20 gleißenden Schaden, anderenfalls die Hälfte. Wenn der Wächter insgesamt 60 Schaden bewirkt hat,
  verschwindet er.
source_book: SRD 5.2 DE
