id: winzige-hutte
type: spell
template: spell
name: Winzige Hütte
lang: de
level: 3
school: Hervorrufungszauber
casting_time: 1 Minute oder Ritual
range: Selbst
components: V, G, M (eine Kristallperle)
duration: 8 Stunden
description: Um dich herum entsteht eine Ausströmung von drei Metern und bleibt für die Wirkungsdauer ortsfest. Der Zauber
  misslingt beim Wirken, wenn die Ausströmung nicht groß genug ist, um alle Kreaturen in ihrem Bereich vollständig aufzunehmen.
  Kreaturen und Gegenstände, die sich beim Wirken des Zaubers innerhalb der Ausströmung befinden, können sich frei darin bewegen
  oder bewegt werden. Andere Kreaturen und Gegenstände können sie nicht passieren. Zauber des höchstens 3. Grades können nicht
  durch die Aura hindurch gewirkt werden, und ihre Effekte können sich nicht bis in die Aura erstrecken. Die Atmosphäre innerhalb
  der Ausströmung ist unabhängig vom Wetter außerhalb angenehm und trocken. Für die Wirkungsdauer kannst du befehlen, dass
  innerhalb der Aura dämmriges Licht oder Dunkelheit herrschen soll (keine Aktion erforderlich). Die Ausströmung ist von außen
  undurchsichtig und erscheint in einer Farbe deiner Wahl. Von innen ist sie durchsichtig. Der Zauber endet vorzeitig, wenn
  du die Ausströmung verlässt oder den Zauber erneut wirkst.
source_book: SRD 5.2 DE
