id: tote-erwecken
type: spell
template: spell
name: Tote erwecken
lang: de
level: 5
school: Nekromantiezauber
casting_time: 1 Stunde
range: Berührung
components: V, G, M (ein Diamant im Wert von mindestens 500 GM, den der Zauber verbraucht)
duration: Unmittelbar
description: Du erweckst eine tote Kreatur durch eine Berührung wieder zum Leben, sofern sie höchstens zehn Tage lang tot
  und nicht untot war, als sie starb. Sie wird mit 1 Trefferpunkt wieder lebendig. Dieser Zauber neutralisiert zudem sämtliche
  Gifte, die zum Zeitpunkt des Todes auf das Ziel gewirkt haben. Der Zauber schließt alle tödlichen Wunden, kann jedoch keine
  abgetrennten Gliedmaßen wieder- herstellen. Fehlen der Kreatur lebensnotwendige Körperteile oder Organe, beispielsweise
  ihr Kopf, so misslingt der Zauber automatisch. Von den Toten aufzuerstehen ist eine Tortur. Das Ziel erleidet einen Malus
  von -4 auf W20- Prüfungen. Nach jeder langen Rast wird der Malus um 1 verringert, bis er 0 beträgt.
source_book: SRD 5.2 DE
