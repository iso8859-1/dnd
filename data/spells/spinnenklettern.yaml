description: 'Eine bereitwillige Kreatur, die du berührst, erhält für die Wirkungsdauer die Fähigkeit, sich in alle Richtungen
  und mit freien Händen über senkrechte Oberflächen sowie an Decken zu bewegen. Außerdem erhält das Ziel eine Kletterbewegungsrate
  Verwenden von Zauberplätzen höheren Grades: in Höhe seiner Bewegungsrate. Für jeden Zauberplatzgrad über dem 2. kannst du
  auf eine weitere Kreatur zielen.'
source_book: SRD 5.2 DE
