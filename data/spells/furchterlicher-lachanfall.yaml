id: furchterlicher-lachanfall
type: spell
template: spell
name: Fürchterlicher Lachanfall
lang: de
level: 1
school: Verzauberungszauber
casting_time: Aktion
range: 9 Meter
components: V, G, M (eine Torte und eine Feder)
duration: Konzentration, bis zu 1 Minute
description: 'Eine Kreatur deiner Wahl in Reichweite, die du sehen kannst, führt einen Weisheitsrettungswurf aus. Misslingt
  der Wurf, so hat sie für die Wirkungsdauer die Zustände Liegend sowie Kampfunfähig. Während dieser Dauer lacht sie unkontrollierbar,
  sofern sie lachen kann, und kann den Zustand Liegend bei sich nicht beenden. Am Ende jedes ihrer Züge und jedes Mal, wenn
  sie Schaden erleidet, führt die Kreatur einen weiteren Weisheitsrettungswurf aus. Dabei ist sie im Vorteil, wenn der Rettungswurf
  durch Schaden ausgelöst wurde. Bei einem erfolgreichen Rettungswurf endet Verwenden von Zauberplätzen höheren Grades: der
  Zauber. Für jeden Zauberplatzgrad über dem 1. kannst du auf eine weitere Kreatur zielen.'
source_book: SRD 5.2 DE
