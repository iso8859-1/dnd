id: windwandeln
type: spell
template: spell
name: Windwandeln
lang: de
level: 6
school: Verwandlungszauber
casting_time: 1 Minute
range: 9 Meter
components: V, G, M (eine Kerze)
duration: 8 Stunden
description: Dieser Zauber verwandelt dich und bis zu zehn bereitwillige Kreaturen deiner Wahl in Reichweite für die Wirkungsdauer
  in gasförmige Gestalten, die als Wolkenschwaden erscheinen. In Wolkengestalt verfügt ein Ziel über eine Flugbewegungsrate
  von 90 Metern und kann schweben. Es ist gegen den Zustand Liegend immun und gegen Hieb-, Stich- und Wuchtschaden resistent.
  Die einzigen Aktionen, die ein Ziel in dieser Gestalt ausführen kann, sind die Spurt-Aktion oder eine magische Aktion, um
  die Rückverwandlung in seine normale Gestalt zu beginnen. Die Rückverwandlung dauert eine Minute, in der das Ziel betäubt
  ist. Bis der Zauber endet, kann das Ziel zur Wolkengestalt zurückkehren. Auch dies erfordert eine magische Aktion, gefolgt
  von einer einminütigen Verwandlung. Befindet sich ein Ziel in Wolkengestalt in der Luft, wenn der Zauber endet, so sinkt
  es eine Minute lang 18 Meter pro Runde hinab, bis es sicher landet. Wenn es nach einer Minute nicht landen kann, stürzt
  es die verbleibende Entfernung nach unten.
source_book: SRD 5.2 DE
