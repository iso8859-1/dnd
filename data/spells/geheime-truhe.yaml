id: geheime-truhe
type: spell
template: spell
name: Geheime Truhe
lang: de
level: 4
school: Beschwörungszauber
casting_time: Aktion
range: Berührung
components: V, G, M (eine Truhe in den Abmessungen 90 mal 60 mal 60 Zentimeter aus seltenen Materialien im Wert von mindestens
  5.000 GM und eine winzige Nachbildung der Truhe aus den gleichen Materialien im Wert von mindestens 50 GM)
duration: Bis der Zauber gebannt wird
description: Du versteckst eine Truhe mit ihrem gesamten Inhalt auf der Ätherebene. Dazu musst du beide Materialkomponenten
  für den Zauber berühren, die Truhe und die winzige Nachbildung. Die Truhe fasst bis zu 324 Liter anorganischen Materials
  (90 mal 60 mal 60 Zentimeter). Solange sich die Truhe auf der Ätherebene befindet, kannst du mit einer magischen Aktion
  die Nachbildung berühren, um die Truhe herbeizurufen. Sie erscheint in einem freien Bereich auf dem Boden im Abstand von
  bis zu 1,5 Metern von dir. Du kannst die Truhe wieder auf die Ätherebene zurückschicken, indem du mit einer magischen Aktion
  die Truhe und ihre Nachbildung gleichzeitig berührst. Nach 60 Tagen besteht am Ende jedes Tages eine kumulative Chance von
  fünf Prozent, dass der Zauber endet. Er endet auch dann, wenn du den Zauber erneut wirkst oder die winzige Nachbildung zerstört
  wird. Wenn der Zauber endet, während sich die große Truhe auf der Ätherebene befindet, bleibt sie dort, bis sie von dir
  oder jemand anderem gefunden wird.
source_book: SRD 5.2 DE
