id: vorahnung
type: spell
template: spell
name: Vorahnung
lang: de
level: 2
school: Erkenntniszauber
casting_time: 1 Minute oder Ritual
range: Selbst
components: V, G, M (besonders markierte Stöcke, Knochen, Karten oder andere Weissagungsgegenstände im Wert von mindestens
  25 GM)
duration: Unmittelbar
description: Du erhältst ein Omen von einem außerweltlichen Wesen zum Ergebnis eines Vorhabens, das innerhalb der nächsten
  30 Minuten geplant ist. Der SL wählt Odams Oemnen aus der Tabelle „Omen“ aus. OmenErgebnis des Vorhabens WohlGut WeheSchlecht
  Wohl und WeheGut und schlecht GleichgültigWeder gut noch schlecht Der Zauber berücksichtigt keinerlei Umstände wie andere
  Zauber, die das Ergebnis ändern könnten. Wenn du den Zauber vor einer langen Rast häufiger als einmal wirkst, erhöht dies
  das Risiko, keine Antwort zu erhalten, mit jedem Wirken nach dem ersten um jeweils 25 Prozent.
source_book: SRD 5.2 DE
