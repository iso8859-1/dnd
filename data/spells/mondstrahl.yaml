id: mondstrahl
type: spell
template: spell
name: Mondstrahl
lang: de
level: 2
school: Hervorrufungszauber
casting_time: Aktion
range: 36 Meter
components: V, G, M (Blatt einer Mondsamenpflanze)
duration: Konzentration, bis zu 1 Minute
description: 'In einem zwölf Meter hohen Zylinder mit einem Radius von bis zu 1,5 Metern um einen Punkt in Reichweite scheint
  ein silbriger Strahl fahlen Lichts herab. Für die Wirkungsdauer ist der Zylinder von dämmrigem Licht erfüllt, und du kannst
  in deinen folgenden Zügen eine magische Aktion ausführen, um den Zylinder bis zu 18 Meter weit zu bewegen. Wenn der Zylinder
  erscheint, führt jede Kreatur darin einen Konstitutionsrettungswurf aus. Misslingt der Wurf, so erleidet eine Kreatur 2W10
  gleißenden Verwandlung Schaden. Wenn ihre Gestalt gewandelt ist (beispiels- weise infolge des Zaubers ), nimmt sie außerdem
  ihre wahre Gestalt an und kann sich erst wieder verwandeln, wenn sie den Zylinder verlässt. Bei einem erfolgreichen Rettungswurf
  erleidet die Kreatur nur halb so viel Schaden. Eine Kreatur führt diesen Rettungswurf auch dann aus, wenn der Bereich des
  Zaubers sich in ihren Bereich bewegt, wenn die Kreatur den Bereich des Zaubers betritt oder ihren Zug darin beendet. Eine
  Kreatur kann diesen Verwenden von Zauberplätzen höheren Grades: Rettungswurf nur einmal pro Zug ausführen. Für jeden Zauberplatzgrad
  über dem 2. wird der Schaden um 1W10 erhöht.'
source_book: SRD 5.2 DE
